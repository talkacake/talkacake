        // --- COMPONENT FACTORY ---

        function createHeader(dataObj, id) {
            return `
            <div class="flex flex-col md:flex-row items-center gap-3 border-b border-slate-200 pb-3 mb-4">
                <button onclick="speakText('${dataObj.h.thai.replace(/'/g, "\\'")}')" class="bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full w-10 h-10 flex-shrink-0 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
                <div class="text-center md:text-left flex-grow">
                    <h2 class="text-2xl font-bold text-slate-800">${dataObj.h.thai}</h2>
                    <div id="ipa-${id}-h" class="hidden"><p class="ipa-text text-sm">${dataObj.h.ipa}</p></div>
                    <div id="en-${id}-h" class="hidden"><p class="en-text text-sm">${dataObj.h.en}</p></div>
                </div>
                <div class="flex gap-2 text-xs">
                     <button onclick="toggleVisibility('ipa-${id}-h', this)" class="text-slate-400 hover:text-slate-600 font-bold border border-slate-200 px-2 py-1 rounded">IPA</button>
                     <button onclick="toggleVisibility('en-${id}-h', this)" class="text-slate-400 hover:text-slate-600 font-bold border border-slate-200 px-2 py-1 rounded">EN</button>
                </div>
            </div>`;
        }

        function createInstr(dataObj, id) {
            return `
            <div class="flex flex-col md:flex-row items-center gap-3">
                <button onclick="speakText('${dataObj.i.thai.replace(/'/g, "\\'")}')" class="text-slate-400 hover:text-slate-600 flex-shrink-0">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
                <div class="text-center md:text-left flex-grow">
                    <p class="text-lg text-slate-700 font-medium">${dataObj.i.thai}</p>
                    <div id="ipa-${id}-i" class="hidden"><p class="ipa-text text-sm">${dataObj.i.ipa}</p></div>
                    <div id="en-${id}-i" class="hidden"><p class="en-text text-sm italic">${dataObj.i.en}</p></div>
                </div>
                <div class="flex gap-2 text-[10px]">
                     <button onclick="toggleVisibility('ipa-${id}-i', this)" class="text-slate-400 hover:bg-slate-200 px-2 py-1 rounded border border-transparent">IPA</button>
                     <button onclick="toggleVisibility('en-${id}-i', this)" class="text-slate-400 hover:bg-slate-200 px-2 py-1 rounded border border-transparent">EN</button>
                </div>
            </div>`;
        }

        function createCard(item, id, showSpeaker = false) {
            const speakerLabel = showSpeaker && item.speaker ? `<span class="text-xs font-bold text-slate-400 uppercase tracking-wide mb-1 block">${item.speaker}</span>` : '';
            return `
            <div class="bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-all border border-slate-100 animate-fade-in">
                ${speakerLabel}
                <div class="flex items-start gap-3">
                    <button onclick="speakText('${item.thai.replace(/'/g, "\\'")}')" class="mt-1 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full w-10 h-10 flex-shrink-0 flex items-center justify-center transition-colors">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                    <div class="flex-grow">
                        <p class="thai-text font-bold mb-2">${item.thai}</p>
                        <div id="ipa-${id}" class="hidden mb-1"><p class="ipa-text text-lg">${item.ipa}</p></div>
                        <div id="en-${id}" class="hidden"><p class="en-text text-sm border-t border-slate-100 pt-1 mt-1">${item.en}</p></div>
                        <div class="flex gap-2 mt-3">
                            <button onclick="toggleVisibility('ipa-${id}', this)" class="btn-toggle text-xs px-3 py-1 rounded-md border border-amber-200 text-amber-700 font-bold bg-amber-50 hover:bg-amber-100">IPA</button>
                            <button onclick="toggleVisibility('en-${id}', this)" class="btn-toggle text-xs px-3 py-1 rounded-md border border-slate-200 text-slate-600 font-bold bg-slate-50 hover:bg-slate-100">EN</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function createRandomCard(item, id) {
            return `
            <div class="flex flex-col items-center animate-fade-in w-full bg-white p-6 rounded-xl shadow-sm border border-emerald-100">
                <button onclick="speakText('${item.thai.replace(/'/g, "\\'")}')" class="mb-4 bg-emerald-100 text-emerald-700 hover:bg-emerald-200 rounded-full w-16 h-16 flex items-center justify-center transition-colors text-2xl">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
                <p class="text-3xl font-bold text-emerald-700 text-center mb-4">${item.thai}</p>
                <div id="ipa-${id}" class="hidden mb-2 text-center"><p class="ipa-text text-xl">${item.ipa}</p></div>
                <div id="en-${id}" class="hidden text-center mb-4"><p class="en-text text-lg border-t border-slate-200 pt-2">${item.en}</p></div>
                <div class="flex gap-3">
                    <button onclick="toggleVisibility('ipa-${id}', this)" class="btn-toggle px-4 py-2 rounded-lg border border-amber-200 text-amber-700 font-bold bg-amber-50 hover:bg-amber-100">IPA</button>
                    <button onclick="toggleVisibility('en-${id}', this)" class="btn-toggle px-4 py-2 rounded-lg border border-slate-200 text-slate-600 font-bold bg-slate-50 hover:bg-slate-100">EN</button>
                </div>
            </div>`;
        }

        // --- LOGIC ---

        function toggleVisibility(elementId, btn) {
            const el = document.getElementById(elementId);
            if (!el) return;
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                btn.classList.add('ring-2', 'ring-offset-1');
            } else {
                el.classList.add('hidden');
                btn.classList.remove('ring-2', 'ring-offset-1');
            }
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.8;
            
            // iOS Safari preference for Thai Voice
            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(voice => voice.lang === 'th-TH');
            if (thaiVoice) utterance.voice = thaiVoice;

            window.speechSynthesis.speak(utterance);
        }

        function generateRandomWord() {
            const randomIndex = Math.floor(Math.random() * fullVocabList.length);
            const item = fullVocabList[randomIndex];
            const html = createRandomCard(item, `rand-${Date.now()}`);
            document.getElementById('random-card-display').innerHTML = html;
        }

        function renderContent() {
            // Main Title (using custom header layout)
            document.getElementById('main-header').innerHTML = `
                <div class="flex flex-col items-center justify-center gap-2">
                    <button onclick="speakText('${uiData.mainTitle.thai.replace(/'/g, "\\'")}')" class="bg-slate-200 text-slate-700 hover:bg-slate-300 rounded-full w-12 h-12 flex items-center justify-center transition-colors mb-2">
                        <i class="fa-solid fa-volume-high text-xl"></i>
                    </button>
                    <h1 class="text-3xl md:text-4xl font-bold text-slate-800 text-center">${uiData.mainTitle.thai}</h1>
                    <div class="flex gap-2 text-xs mt-2">
                         <button onclick="toggleVisibility('ipa-main', this)" class="text-slate-500 hover:bg-slate-200 px-3 py-1 rounded-full border border-slate-300 font-bold">IPA</button>
                         <button onclick="toggleVisibility('en-main', this)" class="text-slate-500 hover:bg-slate-200 px-3 py-1 rounded-full border border-slate-300 font-bold">EN</button>
                    </div>
                    <div id="ipa-main" class="hidden mt-2"><p class="ipa-text text-xl">${uiData.mainTitle.ipa}</p></div>
                    <div id="en-main" class="hidden"><p class="en-text text-lg">${uiData.mainTitle.en}</p></div>
                </div>
            `;

            const sections = [
                { id: 'leadin', ui: uiData.leadIn, data: leadinData, hasSpeaker: false },
                { id: 'game', ui: uiData.game, data: [], hasSpeaker: false }, // Game content handled separately
                { id: 'roleplay1', ui: uiData.rp1, data: rp1Data, hasSpeaker: true },
                { id: 'roleplay2', ui: uiData.rp2, data: rp2Data, hasSpeaker: true },
                { id: 'roleplay3', ui: uiData.rp3, data: rp3Data, hasSpeaker: true },
                { id: 'roleplay4', ui: uiData.rp4, data: rp4Data, hasSpeaker: true },
                { id: 'roleplay5', ui: uiData.rp5, data: rp5Data, hasSpeaker: true },
                { id: 'roleplay6', ui: uiData.rp6, data: rp6Data, hasSpeaker: true }
            ];

            sections.forEach(sec => {
                document.getElementById(`h-${sec.id}`).innerHTML = createHeader(sec.ui, sec.id);
                document.getElementById(`i-${sec.id}`).innerHTML = createInstr(sec.ui, sec.id);
                
                if (sec.id !== 'game') {
                    document.getElementById(`c-${sec.id}`).innerHTML = sec.data.map((item, idx) => createCard(item, `${sec.id}-${idx}`, sec.hasSpeaker)).join('');
                }
            });
        }

        // Initialize App
        window.addEventListener('DOMContentLoaded', () => {
            renderContent();
            // Preload voices
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = () => {};
            }
        });
    </script>

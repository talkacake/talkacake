    // --- Helper Functions ---

    function createBlock(thai, ipa, en, emoji = "") {
        return `
        <div class="t-block">
            ${emoji ? `<span class="t-emoji">${emoji}</span>` : ''}
            <span class="t-thai">${thai}</span>
            <button class="btn btn-tts" onclick="speakText('${thai}')">🔊</button>
            <button class="btn" onclick="toggleDisplay(this, 'ipa')">IPA</button>
            <button class="btn" onclick="toggleDisplay(this, 'en')">EN</button>
            <div class="t-ipa hidden">${ipa}</div>
            <div class="t-en hidden">${en}</div>
        </div>`;
    }

    function speakText(text) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        } else {
            alert("Sorry, your browser doesn't support Text-To-Speech!");
        }
    }

    function toggleDisplay(btn, type) {
        const block = btn.parentElement;
        const target = block.querySelector(`.t-${type}`);
        if (target.classList.contains('hidden')) {
            target.classList.remove('hidden');
            target.style.display = 'block';
        } else {
            target.classList.add('hidden');
            target.style.display = 'none';
        }
    }

    function getRandomVocab() {
        const randomIndex = Math.floor(Math.random() * rawVocab.length);

        container.innerHTML = createBlock(item[0], item[1], item[2], item[3]);
        
        // Auto-play TTS on random select for immersion
        speakText(item[0]);
    }

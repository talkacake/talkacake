<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Review Lesson 🇹🇭</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdf4; /* Light green tinted background */
            color: #334155;
            touch-action: manipulation;
        }
        .font-thai {
            font-family: 'Sarabun', sans-serif;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .thai-block {
            transition: all 0.2s ease;
        }
        .thai-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .matched {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(100%);
        }
        .selected-match {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
            transform: scale(1.05);
        }
        
        /* Custom scrollbar for chat */
        #chat-history::-webkit-scrollbar {
            width: 6px;
        }
        #chat-history::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }

        /* --- STYLES FOR TTS/TOGGLE INTEGRATION --- */
        .interactive-text-container {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .tts-icon {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 50%;
            background-color: #f1f5f9;
            color: #475569;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .tts-icon:hover {
            background-color: #e2e8f0;
            transform: scale(1.1);
        }
        .tts-icon:active {
            transform: scale(0.95);
        }
        .toggle-btn {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            border: 1px solid #cbd5e1;
            background-color: white;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toggle-btn:hover {
            background-color: #f8fafc;
            border-color: #94a3b8;
            color: #475569;
        }
        .toggle-content {
            font-size: 0.85em;
            color: #64748b;
            font-weight: normal;
            display: block;
            width: 100%;
            margin-top: 0.25rem;
        }
        .toggle-content.ipa {
            font-family: monospace;
            color: #4f46e5; /* indigo-600 */
        }
        .toggle-content.en {
            font-style: italic;
            color: #0d9488; /* teal-600 */
        }
        .inline-block-wrapper {
            display: inline-block;
            vertical-align: top;
            margin-right: 0.25rem;
        }
    </style>
</head>

                <span class="text-[10px] font-mono opacity-80 mt-0.5 font-normal">tǎam-dtɔ̀ɔp (Q&A)</span>
            </button>
            <button onclick="switchTab(2)" id="tab-btn-2" class="whitespace-nowrap px-5 py-2.5 rounded-xl font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all flex flex-col items-center">
                <span>2. สนทนา 🤖</span>

            <button onclick="switchTab(4)" id="tab-btn-4" class="whitespace-nowrap px-5 py-2.5 rounded-xl font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all flex flex-col items-center">

    <main class="max-w-5xl mx-auto px-4 py-8">

        <!-- ================= TAB 2: INTERACTIVE CHAT ================= -->

                </div>

                <!-- Chat Options Area -->
                <div id="chat-options" class="grid grid-cols-1 gap-4 min-h-[120px]">
                    <!-- Options go here -->
                </div>
            </div>
        </section>

        <!-- ================= TAB 3: MATCHING ================= -->
        <section id="tab-3" class="tab-content">
            <div class="bg-white rounded-3xl shadow-md border border-gray-100 p-6 md:p-8">
                <div class="flex justify-between items-start mb-8">

                        </h2>
                        <div class="text-gray-500 text-lg" id="t3-instruction"></div>
                    </div>
                    <button onclick="initMatching()" class="text-lg bg-indigo-50 text-indigo-600 hover:bg-indigo-100 font-bold px-4 py-2 rounded-xl transition shadow-sm whitespace-nowrap mt-2">🔄 Reset</button>

                    🎉 Excellent matching!

                    <div class="flex flex-col gap-4" id="match-left"></div>
                    <div class="flex flex-col gap-4" id="match-right"></div>
                </div>
            </div>
        </section>

        <!-- ================= TAB 4: SENTENCE BUILDER (STORY) ================= -->
        <section id="tab-4" class="tab-content">

                </div>

                    <!-- Populated by JS -->
                </div>
            </div>
        </section>

        </section>

        function populateVoiceList() {
            voices = synth.getVoices().sort(function (a, b) {
                const aname = a.name.toUpperCase();
                const bname = b.name.toUpperCase();
                if (aname < bname) return -1;
                else if (aname == bname) return 0;
                else return +1;
            });
        }
        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        function speakThai(text) {
            if (synth.speaking) synth.cancel();
            let cleanText = text.replace(/<[^>]*>?/gm, ''); // Remove HTML
            cleanText = cleanText.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, ''); // Remove Emojis
            cleanText = cleanText.replace(/[_-]/g, ' '); 
            
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'th-TH'; 
            
            const thaiVoice = voices.find(voice => voice.lang === 'th-TH');
            if (thaiVoice) {
                utterance.voice = thaiVoice;
            }

            utterance.rate = 0.85; 
            synth.speak(utterance);
        }

        function handleMatchSelect(side, element, val) {
            // Deselect others on the same side
            document.querySelectorAll(`.match-item-${side}`).forEach(el => {
                if(el !== element) el.classList.remove('selected-match');
            });

            // Toggle selection
            if(element.classList.contains('selected-match')) {
                element.classList.remove('selected-match');
                if(side === 'th') selectedTh = null; else selectedEn = null;
            } else {
                element.classList.add('selected-match');
                if(side === 'th') selectedTh = {el: element, val}; else selectedEn = {el: element, val};
            }

            // If both sides are selected
            if(selectedTh && selectedEn) {
                if(selectedTh.val === selectedEn.val) {
                    selectedTh.el.classList.add('matched', 'border-emerald-500');
                    selectedEn.el.classList.add('matched', 'border-emerald-500');
                    selectedTh.el.classList.remove('selected-match');
                    selectedEn.el.classList.remove('selected-match');
                    matchedCount++;
                    selectedTh = null; selectedEn = null;
                    if(matchedCount === matchData.length) {
                        setTimeout(() => {
                            const successMsg = document.getElementById('match-success');
                            if (successMsg) successMsg.classList.remove('hidden');
                        }, 500);
                    }
                } else {
                    let t = selectedTh.el;
                    let e = selectedEn.el;
                    
                    // Remove selected styling immediately so the red override is visible
                    t.classList.remove('selected-match');
                    e.classList.remove('selected-match');

                    t.classList.add('!border-rose-500', '!bg-rose-50');

        const storySentences = [
            { target: "I wake up at 5 AM.", words: ['ฉัน', 'ตื่นนอน', 'ตีห้า'] },
            { target: "Before going to work, take a shower.", words: ['ก่อน', 'ไป', 'ทำงาน', 'อาบน้ำ'] },
            { target: "Have breakfast in the morning.", words: ['เมื่อเช้า', 'ทานอาหารเช้า'] },
            { target: "Sometimes, I do housework.", words: ['บางครั้ง', 'ฉัน', 'ทำ', 'งานบ้าน'] },
            { target: "I sleep late in the night.", words: ['ฉัน', 'นอน', 'ดึก'] } // Updated line
        ];

        let userSentencesState = {}; 

        function initSentences() {
            const container = document.getElementById('sentence-container');
            container.innerHTML = '';
            
            storySentences.forEach((sd, idx) => {
                userSentencesState[idx] = []; 
                let scrambled = [...sd.words].sort(() => Math.random() - 0.5);
                
                const sid = `stry-${idx}`;
                const html = `
                    <div class="bg-indigo-50/30 rounded-3xl p-6 border-2 border-indigo-100">
                        <div class="flex items-center gap-3 mb-4">
                            <span class="bg-indigo-600 text-white font-bold w-8 h-8 flex items-center justify-center rounded-full shrink-0">${idx + 1}</span>
                            <div class="flex-grow">
                                <span class="text-xl font-bold text-gray-700 italic">"${sd.target}"</span>
                            </div>
                        </div>
                        
                        <!-- Dropzone -->
                        <div class="min-h-[100px] bg-white border-4 border-dashed border-indigo-200 rounded-2xl mb-6 p-4 flex flex-wrap gap-2 items-center justify-center" id="sent-ans-${idx}">
                            <span class="text-gray-400 font-bold text-center">Tap blocks below to build the sentence here.</span>
                        </div>
                        
                        <!-- Word Bank -->
                        <div class="flex flex-wrap gap-3 justify-center" id="sent-bank-${idx}">
                            ${scrambled.map((w, wIdx) => `
                                <div id="bank-${idx}-${wIdx}" class="cursor-pointer transition-transform active:scale-95" onclick="moveToAnswer(${idx}, '${w}', 'bank-${idx}-${wIdx}')">
                                    <div class="bg-white border-2 border-indigo-100 p-3 rounded-xl shadow-sm text-center hover:bg-indigo-50 min-w-[100px]">
                                        <div class="font-thai text-xl font-bold text-indigo-900">${w}</div>
                                        <div class="text-[10px] font-mono text-indigo-500 mt-1">${dict[w]?.ipa || ''}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <!-- Controls -->
                        <div class="mt-6 flex justify-center gap-4">
                            <button onclick="checkSentenceOrder(${idx})" class="hidden px-8 py-3 bg-emerald-500 text-white font-bold rounded-xl shadow hover:bg-emerald-600 transition-all" id="sent-check-${idx}">Check Answer</button>
                            <button onclick="resetSentenceOrder(${idx})" class="px-6 py-3 bg-gray-200 text-gray-700 font-bold rounded-xl shadow hover:bg-gray-300 transition-all">Reset</button>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function moveToAnswer(sentIdx, word, elId) {
            document.getElementById(elId).classList.add('hidden');
            userSentencesState[sentIdx].push({ word, elId });
            renderAnswerBox(sentIdx);
            speakThai(word);
        }

        function renderAnswerBox(sentIdx) {
            const ansBox = document.getElementById(`sent-ans-${sentIdx}`);
            const checkBtn = document.getElementById(`sent-check-${sentIdx}`);
            
            if (userSentencesState[sentIdx].length === 0) {
                ansBox.innerHTML = '<span class="text-gray-400 font-bold text-center">Tap blocks below to build the sentence here.</span>';
                checkBtn.classList.add('hidden');
                return;
            }

            ansBox.innerHTML = userSentencesState[sentIdx].map((item, index) => `
                <div class="cursor-pointer transition-transform active:scale-95 animate-[fadeIn_0.2s_ease-out]" onclick="removeFromAnswer(${sentIdx}, ${index})">
                    <div class="bg-indigo-100 border border-indigo-200 p-2 rounded-lg text-center hover:bg-indigo-200">
                        <span class="font-thai text-lg font-bold text-indigo-900">${item.word}</span>
                    </div>
                </div>
            `).join('');
            
            if (userSentencesState[sentIdx].length === storySentences[sentIdx].words.length) {
                checkBtn.classList.remove('hidden');
            } else {
                checkBtn.classList.add('hidden');
            }
        }

        function removeFromAnswer(sentIdx, stateIndex) {
            const item = userSentencesState[sentIdx][stateIndex];
            document.getElementById(item.elId).classList.remove('hidden');
            userSentencesState[sentIdx].splice(stateIndex, 1);
            renderAnswerBox(sentIdx);
        }

        function resetSentenceOrder(sentIdx) {
            userSentencesState[sentIdx].forEach(item => {
                document.getElementById(item.elId).classList.remove('hidden');
            });
            userSentencesState[sentIdx] = [];
            renderAnswerBox(sentIdx);
        }

        function checkSentenceOrder(sentIdx) {
            const targetWords = storySentences[sentIdx].words.join('');
            const currentWords = userSentencesState[sentIdx].map(i => i.word).join('');
            const btn = document.getElementById(`sent-check-${sentIdx}`);
            
            if(targetWords === currentWords) {
                btn.classList.remove('bg-emerald-500', 'hover:bg-emerald-600');
                btn.classList.add('bg-green-600', 'ring-4', 'ring-green-200');
                btn.innerText = "✅ Correct!";
                btn.disabled = true;
                speakThai(storySentences[sentIdx].words.join(' '));
            } else {
                btn.classList.remove('bg-emerald-500');
                btn.classList.add('bg-rose-500');
                btn.innerText = "❌ Try Again";
                setTimeout(() => {
                    btn.classList.remove('bg-rose-500');
                    btn.classList.add('bg-emerald-500');
                    btn.innerText = "Check Answer";
                }, 1500);
            }
        }


        // ================= ACTIVITY 5: GAP FILL (DIALOGUE) =================
        const dialogueData = [
            {
                speaker: "A",
                thaiParts: ["เสาร์อาทิตย์นี้", "_____", "ไหม?"],
                ipaParts: ["sǎo-aa-thít níi", "...", "mái?"],
                enParts: ["This weekend,", "[Free]", "yes/no?"],
                targetWord: "ว่าง",
                options: ["ว่าง", "เที่ยว", "งีบ"]
            },
            {
                speaker: "B",
                thaiParts: ["ว่างครับ ผมชอบ", "_____", "กับเพื่อน"],
                ipaParts: ["wâang kráp. pǒm chɔ̂ɔp", "...", "gàp pʉ̂an"],
                enParts: ["Free. I like to", "[Hang out]", "with friends."],
                targetWord: "เที่ยว", 
                options: ["เก็บ", "เที่ยว", "ทำการบ้าน"]
            },
            {
                speaker: "A",
                thaiParts: ["ดีจัง ไปกิน", "_____", "กันไหม?"],
                ipaParts: ["dii jang, bpai gin", "...", "gan mái?"],
                enParts: ["Great. Go eat", "[Omelette]", "together?"],
                targetWord: "ไข่เจียว",
                options: ["มะนาว", "ไข่เจียว", "ห้องสมุด"]
            },
            {
                speaker: "B",
                thaiParts: ["ได้ครับ แต่ผมไม่ชอบแบบ", "_____", "นะ"],
                ipaParts: ["dâi kráp dtɛ̀ɛ pǒm mâi chɔ̂ɔp bɛ̀ɛp", "...", "ná"],
                enParts: ["Okay, but I don't like it", "[Too crispy]"],
                targetWord: "กรอบเกินไป",
                options: ["เปรี้ยว", "น่ากลัว", "กรอบเกินไป"]
            },
            {
                speaker: "A",
                thaiParts: ["โอเค งั้นเจอกัน พรุ่งนี้", "_____", "นะ"], // Updated sentence structure
                ipaParts: ["o-khee ngán jəə gan phrûng-níi", "...", "ná"],
                enParts: ["Okay, then see you tomorrow", "[Afternoon]", "."],
                targetWord: "ตอนบ่าย",
                options: ["กลางคืน", "ตอนบ่าย", "ดึก"]
            }
        ];

        function initGapFill() {
            const container = document.getElementById('gap-container');
            container.innerHTML = '';
            
            dialogueData.forEach((line, idx) => {
                
                let optionsHtml = line.options.sort(() => Math.random() - 0.5).map(w => {
                    const entry = dict[w] || { ipa: '', en: '' };
                    return `
                    <button onclick="fillDialogueGap(${idx}, '${w}', '${line.targetWord}')" class="bg-white border-2 border-amber-200 hover:border-amber-400 p-2 rounded-xl text-center shadow-sm transition-all flex-1 min-w-[100px]">
                        <div class="font-thai font-bold text-amber-900">${w}</div>
                        <div class="text-[10px] font-mono text-amber-600 mt-0.5">${entry.ipa}</div>
                    </button>
                    `;
                }).join('');

                const cid = `dlg-${idx}`;
                
                const html = `
                    <div class="flex gap-4">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg shrink-0 mt-2 ${line.speaker === 'A' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}">
                            ${line.speaker}
                        </div>
                        <div class="flex-grow">
                            <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-200">
                                <!-- TTS / Toggle Controls -->
                                <div class="flex gap-2 mb-3 items-center">
                                    <button onclick="speakDialogueLine(${idx})" class="w-6 h-6 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 flex items-center justify-center text-xs">🔊</button>
                                    <button onclick="toggleVisibility('${cid}-ipa')" class="text-[9px] font-bold border border-gray-300 px-1 rounded text-gray-500 uppercase">IPA</button>
                                    <button onclick="toggleVisibility('${cid}-en')" class="text-[9px] font-bold border border-gray-300 px-1 rounded text-gray-500 uppercase">EN</button>
                                </div>
                                
                                <!-- Sentence with Gap -->
                                <div class="text-xl font-thai text-gray-800 leading-loose flex flex-wrap items-baseline gap-y-2">
                                    <span>${line.thaiParts[0]}</span>
                                    <div id="dlg-slot-${idx}" class="mx-2 px-6 py-1 border-b-2 border-dashed border-gray-400 text-gray-400 min-w-[100px] text-center font-bold relative top-1">?</div>
                                    <span>${line.thaiParts[2] || ''}</span>
                                </div>
                                
                                <!-- Translations -->
                                <div id="${cid}-ipa" class="hidden text-sm font-mono text-indigo-500 mt-2">
                                    ${line.ipaParts[0]} <span class="text-gray-400">[...]</span> ${line.ipaParts[2] || ''}
                                </div>
                                <div id="${cid}-en" class="hidden text-sm italic text-teal-600 mt-1">
                                    ${line.enParts[0]} <span class="text-gray-400 font-bold">${line.enParts[1]}</span> ${line.enParts[2] || ''}
                                </div>

                                <!-- Options Row -->
                                <div class="mt-4 pt-4 border-t border-gray-100 flex flex-wrap gap-2" id="dlg-opts-${idx}">
                                    ${optionsHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }
        
        function speakDialogueLine(idx) {
            const line = dialogueData[idx];
            const slot = document.getElementById(`dlg-slot-${idx}`);
            const filledWord = slot.dataset.filledWord || "อะไร"; 
            const fullText = `${line.thaiParts[0]} ${filledWord} ${line.thaiParts[2] || ''}`.trim();
            speakThai(fullText);
        }

        function fillDialogueGap(idx, selectedWord, answerWord) {
            const slot = document.getElementById(`dlg-slot-${idx}`);
            const optsContainer = document.getElementById(`dlg-opts-${idx}`);
            
            if(selectedWord === answerWord) {
                // Correct
                slot.innerHTML = selectedWord;
                slot.dataset.filledWord = selectedWord;
                slot.classList.remove('border-dashed', 'border-gray-400', 'text-gray-400', 'text-rose-500', 'border-rose-500');
                slot.classList.add('border-solid', 'border-emerald-500', 'text-emerald-600', 'bg-emerald-50', 'rounded-lg');
                
                // Hide options
                optsContainer.classList.add('hidden');
                
                // Read word
                speakThai(selectedWord);
            } else {
                // Incorrect
                slot.innerHTML = "❌";
                slot.classList.add('text-rose-500', 'border-rose-500', 'animate-pulse');
                setTimeout(() => {
                    slot.innerHTML = "?";
                    slot.classList.remove('text-rose-500', 'border-rose-500', 'animate-pulse');
                }, 1000);
            }
        }

        // ================= INITIALIZATION =================
        window.onload = () => {
            setInteractiveHeadings();
            initQA();
            loadChatStep(currentChatStep);
            initMatching();
            initSentences();
            initGapFill();
        };

    </script>
</body>
</html>

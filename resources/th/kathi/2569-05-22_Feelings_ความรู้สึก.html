        let currentIdCounter = 0;
        function getUniqueId() {
            return `el-${currentIdCounter++}`;
        }

        function speakThai(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH';
                utterance.rate = 0.85; // Slightly slower for clear pronunciation
                window.speechSynthesis.speak(utterance);
            } else {
                console.warn('Text-to-speech is not supported.');
            }
        }

        function toggleVisibility(id) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('hidden');
        }

        // Core UI Builder function. Generates the Thai text with TTS, IPA, and EN toggles.
        function buildThaiBlock(th, ipa, en, sizeClass = "text-lg", wrapperClass = "mb-4", fontClass="font-medium") {
            const id = getUniqueId();
            const safeSpeak = th.replace(/['"]/g, "").replace(/[\uD83C-\uDBFF\uDC00-\uDFFF]+/g, '').trim(); // Strip emoji for TTS
            
            return `
                <div class="${wrapperClass}">
                    <div class="flex items-start flex-wrap gap-2">
                        <span class="${sizeClass} ${fontClass} text-slate-800 leading-snug">${th}</span>
                        <div class="flex gap-1 mt-0.5">
                            <button onclick="speakThai('${safeSpeak}')" class="btn-tts" title="Listen"><i class="fa-solid fa-volume-high"></i></button>
                            <button onclick="toggleVisibility('${id}-ipa')" class="btn-ipa">IPA</button>
                            <button onclick="toggleVisibility('${id}-en')" class="btn-en">EN</button>
                        </div>
                    </div>
                    <div id="${id}-ipa" class="hidden text-sky-600 font-medium text-[13px] mt-1.5 ml-1">${ipa}</div>
                    <div id="${id}-en" class="hidden text-slate-500 italic text-[13px] mt-1 ml-1">${en}</div>
                </div>
            `;
        }

        function switchTab(tabId) {
            // Update nav styles
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-amber-50', 'border-amber-400');
                btn.classList.add('border-transparent', 'hover:bg-slate-50');
            });
            const activeBtn = document.getElementById(`nav-btn-${tabId}`);
            activeBtn.classList.remove('border-transparent', 'hover:bg-slate-50');
            activeBtn.classList.add('bg-amber-50', 'border-amber-400');

            // Update content visibility
            document.querySelectorAll('.tab-section').forEach(sec => sec.classList.add('hidden'));
            document.getElementById(`sec-${tabId}`).classList.remove('hidden');
        }

        function renderApp() {
            // 1. Render Header
            const headerHtml = buildThaiBlock(appData.title.th, appData.title.ipa, appData.title.en, "text-2xl", "", "font-bold");
            document.getElementById('nav-header').innerHTML = headerHtml;

            // 2. Render Navigation Menu
            let navHtml = '';
            appData.nav.forEach(item => {
                const textBlock = buildThaiBlock(item.th, item.ipa, item.en, "text-base", "", "font-medium");
                navHtml += `
                    <button id="nav-btn-${item.id}" onclick="switchTab('${item.id}')" class="nav-btn flex items-start text-left px-4 py-3 rounded-xl border-l-4 border-transparent transition-all w-full min-w-[240px]">
                        <i class="fa-solid ${item.icon} text-amber-500 mt-1 mr-3 w-4 text-center"></i>
                        <div class="flex-grow">${textBlock}</div>
                    </button>
                `;
            });
            document.getElementById('nav-menu').innerHTML = navHtml;

            // 3. Render Main Content Sections
            let mainHtml = '';
            
            // Section: Intro
            mainHtml += `
                <section id="sec-intro" class="tab-section hidden">
                    <div class="mb-8 border-b border-slate-200 pb-4">
                        ${buildThaiBlock(appData.sections.intro.header.th, appData.sections.intro.header.ipa, appData.sections.intro.header.en, "text-3xl", "mb-2", "font-bold")}
                        ${buildThaiBlock(appData.sections.intro.instruction.th, appData.sections.intro.instruction.ipa, appData.sections.intro.instruction.en, "text-base", "", "text-slate-600")}
                    </div>
                    <div class="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-slate-100 space-y-6">
                        ${appData.sections.intro.content.map(q => buildThaiBlock(q.th, q.ipa, q.en, "text-xl")).join('')}
                    </div>
                </section>
            `;

            const diag = appData.sections.dialogue;
            let diagLines = diag.content.map(line => `
                <div class="flex gap-4 p-4 rounded-xl ${line.role.includes('ครู') ? 'bg-sky-50' : 'bg-amber-50'}">
                    <div class="font-bold whitespace-nowrap pt-1">${line.role}</div>
                    <div class="flex-grow">
                        ${buildThaiBlock(line.th, line.ipa, line.en, "text-xl", "mb-0")}
                    </div>
                </div>
            `).join('');

            mainHtml += `
                <section id="sec-dialogue" class="tab-section hidden">
                    <div class="mb-8 border-b border-slate-200 pb-4">
                        ${buildThaiBlock(diag.header.th, diag.header.ipa, diag.header.en, "text-3xl", "mb-2", "font-bold")}
                        ${buildThaiBlock(diag.instruction.th, diag.instruction.ipa, diag.instruction.en, "text-base", "", "text-slate-600")}
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mb-8">
                        <div class="p-6 md:p-8 space-y-4">
                            ${diagLines}
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-slate-100">
                        <div class="mb-6 pb-2 border-b border-slate-100">
                            ${buildThaiBlock(diag.subHeader.th, diag.subHeader.ipa, diag.subHeader.en, "text-2xl", "mb-0", "font-bold")}
                        </div>
                        <div class="space-y-6">
                            ${diag.subContent.map(q => buildThaiBlock(q.th, q.ipa, q.en, "text-xl")).join('')}
                        </div>
                    </div>
                </section>
            `;

            const vocab = appData.sections.vocab;
            let vocabItems = vocab.content.map(v => `
                <div class="bg-white border border-slate-100 rounded-2xl p-5 flex items-center gap-5 shadow-sm hover:shadow-md transition-shadow">
                    <div class="text-4xl flex-shrink-0 bg-slate-50 w-16 h-16 rounded-full flex items-center justify-center">${v.emoji}</div>
                    <div class="flex-grow">
                        ${buildThaiBlock(v.th, v.ipa, v.en, "text-2xl", "mb-0", "font-bold text-slate-800")}
                    </div>
                </div>
            `).join('');

            mainHtml += `
                <section id="sec-vocab" class="tab-section hidden">
                    <div class="mb-8 border-b border-slate-200 pb-4">
                        ${buildThaiBlock(vocab.header.th, vocab.header.ipa, vocab.header.en, "text-3xl", "mb-2", "font-bold")}
                        ${buildThaiBlock(vocab.instruction.th, vocab.instruction.ipa, vocab.instruction.en, "text-base", "", "text-slate-600")}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${vocabItems}
                    </div>
                </section>
            `;

            const tasks = appData.sections.main_tasks;
            let taskItems = tasks.content.map(t => `
                <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-100 relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-2 h-full bg-amber-400"></div>
                    <div class="mb-4">
                        ${buildThaiBlock(t.type, t.typeIpa, t.typeEn, "text-sm", "mb-2", "font-bold text-amber-600")}
                        ${buildThaiBlock(t.title.th, t.title.ipa, t.title.en, "text-2xl", "mb-0", "font-bold")}
                    </div>
                    <div class="bg-amber-50 rounded-xl p-5 border border-amber-100">
                        ${buildThaiBlock(t.desc.th, t.desc.ipa, t.desc.en, "text-lg", "mb-0", "text-amber-900")}
                    </div>
                </div>
            `).join('');

            mainHtml += `
                <section id="sec-main_tasks" class="tab-section hidden">
                    <div class="mb-8 border-b border-slate-200 pb-4">
                        ${buildThaiBlock(tasks.header.th, tasks.header.ipa, tasks.header.en, "text-3xl", "mb-2", "font-bold")}
                        ${buildThaiBlock(tasks.instruction.th, tasks.instruction.ipa, tasks.instruction.en, "text-base", "", "text-slate-600")}
                    </div>
                    <div class="grid gap-6">
                        ${taskItems}
                    </div>
                </section>
            `;

            const ext = appData.sections.ext_tasks;
            let extItems = ext.content.map(t => `
                <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-100 relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-2 h-full bg-sky-400"></div>
                    <div class="mb-4">
                        ${buildThaiBlock(t.type, t.typeIpa, t.typeEn, "text-sm", "mb-2", "font-bold text-sky-600")}
                        ${buildThaiBlock(t.title.th, t.title.ipa, t.title.en, "text-2xl", "mb-0", "font-bold")}
                    </div>
                    <div class="bg-sky-50 rounded-xl p-5 border border-sky-100">
                        ${buildThaiBlock(t.desc.th, t.desc.ipa, t.desc.en, "text-lg", "mb-0", "text-sky-900")}
                    </div>
                </div>
            `).join('');

            mainHtml += `
                <section id="sec-ext_tasks" class="tab-section hidden">
                    <div class="mb-8 border-b border-slate-200 pb-4">
                        ${buildThaiBlock(ext.header.th, ext.header.ipa, ext.header.en, "text-3xl", "mb-2", "font-bold")}
                        ${buildThaiBlock(ext.instruction.th, ext.instruction.ipa, ext.instruction.en, "text-base", "", "text-slate-600")}
                    </div>
                    <div class="grid gap-6">
                        ${extItems}
                    </div>
                </section>
            `;

            document.getElementById('main-content').innerHTML = mainHtml;

            // Start on intro tab
            switchTab('intro');
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', renderApp);

    </script>
</body>
</html>

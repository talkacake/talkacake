<!DOCTYPE html>
<html lang="th">
<head>

            transition: all 0.2s ease-in-out;
        }

            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        }

            transform: scale(1.02);
        }

            display: inline-flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.375rem;
            margin: 0.25rem 0;
            padding: 0.25rem 0.5rem;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e5e7eb;
            line-height: 1.8;
        }
        .thai-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: #111827;
        }
        .btn-tts {
            font-size: 1.25rem;
            cursor: pointer;
            transition: transform 0.1s;
            background: none;
            border: none;
            padding: 0;
        }
        .btn-tts:hover { transform: scale(1.2); }
        .btn-toggle {
            padding: 0.125rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            border: none;
        }

        .btn-ipa:hover { background-color: #bfdbfe; }
        .btn-en { background-color: #dcfce3; color: #166534; }
        .btn-en:hover { background-color: #bbf7d0; }
        .text-ipa { color: #2563eb; font-family: monospace; font-size: 1.1rem; background: #eff6ff; padding: 0 0.25rem; border-radius: 0.25rem;}
        .text-en { color: #16a34a; font-size: 1.1rem; background: #f0fdf4; padding: 0 0.25rem; border-radius: 0.25rem;}

</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="text-center space-y-4 pt-4 pb-8">
            <h1 class="text-5xl md:text-6xl font-bold text-green-600 drop-shadow-sm flex items-center justify-center gap-4">
                🩺 <span id="main-title"></span> 🌿
            </h1>
            <div id="sub-title" class="flex justify-center mt-4"></div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="flex flex-wrap justify-center gap-3 mb-8" id="nav-container">
            <!-- Tabs injected via JS -->
        </nav>

        <!-- Content Area -->
        <main class="glass-panel rounded-2xl p-6 md:p-10" id="content-area">
            <!-- Content injected via JS -->
        </main>

    </div>

<script>
// --- CORE UTILITIES ---
let idCounter = 0;

// Text-to-Speech Function
function speakThai(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'th-TH';
        utterance.rate = 0.85; // Slightly slower for A1+
        utterance.pitch = 1.0;
        window.speechSynthesis.speak(utterance);
    } else {
        alert("ขออภัย เบราว์เซอร์ของคุณไม่รองรับระบบอ่านออกเสียง");
    }
}

// Generate the Thai Block HTML with inline toggles
function T(th, ipa, en) {
    idCounter++;
    const safeTh = th.replace(/'/g, "\\'");
    return `
        <div class="thai-block">
            <span class="thai-text">${th}</span>
            <button onclick="speakThai('${safeTh}')" class="btn-tts" title="Listen">🔊</button>
            <button onclick="document.getElementById('ipa-${idCounter}').classList.toggle('hidden')" class="btn-toggle btn-ipa">IPA</button>
            <button onclick="document.getElementById('en-${idCounter}').classList.toggle('hidden')" class="btn-toggle btn-en">EN</button>
            <span id="ipa-${idCounter}" class="hidden text-ipa">${ipa}</span>
            <span id="en-${idCounter}" class="hidden text-en">${en}</span>
        </div>
    `;
}

// --- LESSON DATA ---

        { th: "เวลา เป็นไข้ คุณ ทำ อะไร", ipa: "wee-laa bpen kâi kun tam à-rai", en: "When you have a fever, what do you do?" },
        { th: "คุณ เคย ปวดหัว บ่อย ไหม", ipa: "kun kəəi bpùat hǔa bɔ̀ɔi mǎi", en: "Do you often have headaches?" }

// --- RENDERING ENGINE ---
const contentArea = document.getElementById('content-area');

function switchTab(tabId) {
    // Update nav styling
    document.querySelectorAll('.tab-btn').forEach(btn => {
        if (btn.dataset.tab === tabId) {
            btn.classList.add('active');
            btn.classList.remove('bg-white', 'text-gray-700', 'hover:bg-green-50');
        } else {
            btn.classList.remove('active');
            btn.classList.add('bg-white', 'text-gray-700', 'hover:bg-green-50');
        }
    });

    // Render content
    let html = '';
    
    if (tabId === 'leadin') {
        html += `<h2 class="text-3xl font-bold text-green-700 mb-6 flex items-center gap-2">✨ ${T("คำถาม นำเข้า สู่ บทเรียน", "kam-tǎam nam kâo sùu bòt-rian", "Lead-in Questions")}</h2>`;
        html += `<ul class="space-y-6 text-xl">`;
        lessonData.leadin.forEach((q, index) => {
            html += `<li class="flex items-start gap-3 bg-green-50 p-4 rounded-xl border border-green-100"><span class="text-green-600 font-bold">${index + 1}.</span> ${T(q.th, q.ipa, q.en)}</li>`;
        });
        html += `</ul>`;
    } 
    
    else if (tabId === 'dialogue') {
        html += `<h2 class="text-3xl font-bold text-blue-700 mb-4 flex items-center gap-2">💬 ${T(lessonData.dialogue.intro.th, lessonData.dialogue.intro.ipa, lessonData.dialogue.intro.en)}</h2>`;
        
        // Dialogue lines
        html += `<div class="bg-blue-50/50 p-4 md:p-6 rounded-2xl border border-blue-100 space-y-4 mb-8">`;
        lessonData.dialogue.lines.forEach(line => {
            const avatarColor = line.speaker === 'A' ? 'bg-blue-500' : 'bg-purple-500';
            html += `
                <div class="flex gap-4 items-start">
                    <div class="w-10 h-10 shrink-0 ${avatarColor} text-white rounded-full flex items-center justify-center font-bold text-lg shadow-sm">${line.speaker}</div>
                    <div class="flex-1 bg-white p-3 rounded-xl rounded-tl-none shadow-sm border border-gray-100">
                        ${T(line.th, line.ipa, line.en)}
                    </div>
                </div>
            `;
        });
        html += `</div>`;

        // Comprehension Questions
        html += `<h3 class="text-2xl font-bold text-orange-600 mb-4 flex items-center gap-2">🧐 ${T(lessonData.dialogue.comprehensionTitle.th, lessonData.dialogue.comprehensionTitle.ipa, lessonData.dialogue.comprehensionTitle.en)}</h3>`;
        html += `<div class="space-y-3">`;
        lessonData.dialogue.questions.forEach((q, i) => {
            html += `<div class="p-3 bg-orange-50 border border-orange-100 rounded-lg flex items-center gap-3">
                        <span class="font-bold text-orange-400 text-xl">Q${i+1}</span>
                        ${T(q.th, q.ipa, q.en)}
                    </div>`;
        });
        html += `</div>`;
    }

    else if (tabId === 'vocab') {
        html += `<h2 class="text-3xl font-bold text-purple-700 mb-6 flex items-center gap-2">🎯 ${T("คำศัพท์ เป้าหมาย", "kam-sàp bpâo-mǎai", "Target Vocabulary")}</h2>`;
        html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
        lessonData.targetVocab.forEach(v => {
            html += `
                <div class="word-card bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex items-center gap-4">
                    <div class="text-5xl">${v.emoji}</div>
                    <div class="flex-1">${T(v.th, v.ipa, v.en)}</div>
                </div>
            `;
        });
        html += `</div>`;
    }

    else if (tabId === 'tasks') {
        html += `<h2 class="text-3xl font-bold text-indigo-700 mb-6 flex items-center gap-2">🎬 ${T("กิจกรรม การพูด", "gìt-jà-gam gaan-pûut", "Speaking Tasks")}</h2>`;
        html += `<div class="space-y-6">`;
        lessonData.tasks.forEach(task => {
            let descHtml = Array.isArray(task.desc) 
                ? task.desc.map(d => `<div class="mb-2">${T(d.th, d.ipa, d.en)}</div>`).join('')
                : T(task.desc.th, task.desc.ipa, task.desc.en);

            html += `
                <div class="bg-white p-5 rounded-2xl border-l-4 border-indigo-500 shadow-sm">
                    <div class="mb-3">
                        <span class="inline-block px-3 py-1 bg-indigo-100 text-indigo-800 rounded-full text-sm font-bold mb-2">
                            ${task.type} ${T(task.typeTh, task.typeIpa, task.typeEn)}
                        </span>
                        <div class="text-2xl">${T(task.title.th, task.title.ipa, task.title.en)}</div>
                    </div>
                    <div class="pl-4 border-l-2 border-gray-100 bg-gray-50/50 p-3 rounded-r-lg">
                        ${descHtml}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
    }

    else if (tabId === 'extension') {
        html += `<h2 class="text-3xl font-bold text-rose-700 mb-6 flex items-center gap-2">🌟 ${T("กิจกรรม เสริม", "gìt-jà-gam sə̌əm", "Extension Activities")}</h2>`;
        html += `<div class="space-y-6">`;
        lessonData.extension.forEach(task => {
            let descHtml = Array.isArray(task.desc) 
                ? task.desc.map(d => `<div class="mb-2">${T(d.th, d.ipa, d.en)}</div>`).join('')
                : T(task.desc.th, task.desc.ipa, task.desc.en);

            html += `
                <div class="bg-white p-5 rounded-2xl border-l-4 border-rose-500 shadow-sm">
                    <div class="mb-3">
                        <span class="inline-block px-3 py-1 bg-rose-100 text-rose-800 rounded-full text-sm font-bold mb-2">
                            ${task.type} ${T(task.typeTh, task.typeIpa, task.typeEn)}
                        </span>
                        <div class="text-2xl">${T(task.title.th, task.title.ipa, task.title.en)}</div>
                    </div>
                    <div class="pl-4 border-l-2 border-gray-100 bg-gray-50/50 p-3 rounded-r-lg">
                        ${descHtml}
                    </div>
                </div>
            `;
        });
        html += `</div>`;
    }

    contentArea.innerHTML = html;
}

// --- INITIALIZATION ---
function init() {
    document.getElementById('main-title').innerHTML = T(lessonData.title.th, lessonData.title.ipa, lessonData.title.en);
    
    // Add subtitle
    if (document.getElementById('sub-title') && lessonData.subtitle) {
        document.getElementById('sub-title').innerHTML = T(lessonData.subtitle.th, lessonData.subtitle.ipa, lessonData.subtitle.en);
    }

    const navContainer = document.getElementById('nav-container');
    lessonData.tabs.forEach((tab, index) => {
        const btn = document.createElement('button');
        btn.dataset.tab = tab.id;
        btn.className = `tab-btn px-4 py-2 rounded-xl font-bold text-lg shadow-sm border border-gray-200`;
        // Make the inner content of the button use our Thai formatter
        btn.innerHTML = T(tab.th, tab.ipa, tab.en);
        
        // Custom click handler to avoid triggering TTS/Toggle when clicking the main button area
        btn.onclick = (e) => {
            // Only switch tab if they didn't click inside the thai-block buttons
            if(e.target.tagName !== 'BUTTON' || e.target === btn) {
                switchTab(tab.id);
            }
        };
        navContainer.appendChild(btn);
    });

    // Start on first tab
    switchTab(lessonData.tabs[0].id);
}

// Run on load
window.onload = init;

</script>
</body>
</html>

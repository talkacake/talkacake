<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>วางแผนดูคอนเสิร์ต</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .toggle-content {
            display: none;
            transition: all 0.3s ease;
        }
        .toggle-content.active {
            display: block;
        }
    </style>
</head>
<body class="p-4 md:p-8 max-w-4xl mx-auto">

    <!-- Header Section -->
    <header class="text-center mb-10 bg-white rounded-2xl shadow-sm p-8 border-t-4 border-blue-500">
        <h1 class="text-4xl font-bold text-gray-800">วางแผนดูคอนเสิร์ต</h1>
    </header>

    <main id="app-container" class="space-y-12">
        <!-- Content will be injected here via JavaScript -->
    </main>

    <script>
        // Data Structure containing the entire lesson
        const lessonData = [
            {
                category: 'section',
                th: 'ส่วนที่ 1: คำศัพท์',
                ipa: 'sùuan tîi nʉ̀ng: kam-sàp',
                en: 'Part 1: Vocabulary'
            },
            { category: 'vocab', th: 'นาน', ipa: 'naan', en: 'long time' },
            { category: 'vocab', th: 'นักแสดง', ipa: 'nák-sà-daeng', en: 'actors; actresses' },
            { category: 'vocab', th: 'เนื้อเพลง', ipa: 'nʉ́ʉa-plaeeng', en: 'lyrics' },
            { category: 'vocab', th: 'ความหมาย', ipa: 'kwaam-măai', en: 'meaning' },
            { category: 'vocab', th: 'แก้ปัญหา', ipa: 'gâe-bpan-hăa', en: 'solve problems' },
            { category: 'vocab', th: 'ธันวา', ipa: 'than-waa', en: 'December' },
            { category: 'vocab', th: 'สิงหา', ipa: 'sǐng-hăa', en: 'August' },
            { category: 'vocab', th: 'ตั๋ว', ipa: 'dtŭa', en: 'tickets' },
            { category: 'vocab', th: 'บัญชี', ipa: 'ban-chee', en: 'account(ing)' },
            { category: 'vocab', th: 'ธนาคาร', ipa: 'thá-naa-khaan', en: 'bank' },

            {
                category: 'section',
                th: 'ส่วนที่ 2: บทสนทนา',
                ipa: 'sùuan tîi sŏng: bòt-sŏn-thá-naa',
                en: 'Part 2: Conversation'
            },
            {
                category: 'dialogue',
                speaker: 'A: ',
                th: 'คุณไม่ได้ไปดูคอนเสิร์ตมานานแค่ไหนแล้ว',
                ipa: 'kun mâi dâai bpai doo kon-sə̀ət maa naan kâe năi láew?',
                en: 'How long has it been since you went to a concert?'
            },
            {
                category: 'dialogue',
                speaker: 'B: ',
                th: 'นานมากแล้ว ตั้งแต่เดือนสิงหา',
                ipa: 'naan mâak láew, dtâng-dtàe dʉʉan sǐng-hăa.',
                en: 'A very long time, since August.'
            },
            {
                category: 'dialogue',
                speaker: 'A: ',
                th: 'เดือนธันวานี้ มีคอนเสิร์ตใหญ่ เราไปซื้อตั๋วกันไหม',
                ipa: 'dʉʉan than-waa née, mee kon-sə̀ət yài. rao bpai sʉ́ʉ dtŭa gan măi?',
                en: 'This December there is a big concert. Shall we go buy tickets together?'
            },
            {
                category: 'dialogue',
                speaker: 'B: ',
                th: 'ดีเลย! ฉันชอบนักแสดงและนักร้องคนนี้มาก เนื้อเพลงของเขามีความหมายดี',
                ipa: 'dee ləəy! chăn chôp nák-sà-daeng láe nák-róng kon née mâak. nʉ́ʉa-plaeeng kŏng kăo mee kwaam-măai dee.',
                en: 'Great! I really like this actor and singer. His lyrics have good meaning.'
            },
            {
                category: 'dialogue',
                speaker: 'A: ',
                th: 'แต่เดี๋ยวก่อน ฉันมีปัญหาตอนจ่ายเงิน แอพธนาคารของฉันเข้าไม่ได้',
                ipa: 'dtàe dǐao gòn, chăn mee bpan-hăa dton jàai ngən. aép thá-naa-khaan kŏng chăn kâo mâi dâai.',
                en: 'But wait, I have a problem paying. I cannot access my bank app.'
            },
            {
                category: 'dialogue',
                speaker: 'B: ',
                th: 'บัญชีของคุณมีปัญหาหรือเปล่า เราต้องแก้ปัญหานี้ก่อน',
                ipa: 'ban-chee kŏng kun mee bpan-hăa rʉ̆ʉ bplào? rao dtông gâe bpan-hăa née gòn.',
                en: 'Is there a problem with your account? We need to solve this problem first.'
            },

            {
                category: 'section',
                th: 'ส่วนที่ 3: ฝึกพูด',
                ipa: 'sùuan tîi săam: fʉ̀k pôot',
                en: 'Part 3: Speaking Practice'
            },
            {
                category: 'question',
                th: '1. คุณชอบฟังเพลงที่มีความหมายแบบไหน',
                ipa: '1. kun chôp fang plaeeng tîi mee kwaam-măai bàep năi?',
                en: '1. What kind of meaning do you like in the songs you listen to?'
            },
            {
                category: 'question',
                th: '2. ถ้าแอพธนาคารมีปัญหา คุณจะแก้ปัญหาอย่างไร',
                ipa: '2. tâa aép thá-naa-khaan mee bpan-hăa, kun jà gâe bpan-hăa yàang-rai?',
                en: '2. If the bank app has a problem, how will you solve the problem?'
            },
            {
                category: 'question',
                th: '3. ปกติคุณซื้อตั๋วคอนเสิร์ตหรือตั๋วหนังล่วงหน้านานไหม',
                ipa: '3. bpòk-gà-dtì kun sʉ́ʉ dtŭa kon-sə̀ət rʉ̆ʉ dtŭa năng lûang-nâa naan măi?',
                en: '3. Do you usually buy concert or movie tickets a long time in advance?'
            }
        ];

        // Text-to-Speech Function
        function speakThai(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH';
                utterance.rate = 0.85; // Slightly slower for language learners
                window.speechSynthesis.speak(utterance);
            } else {
                alert("ขออภัย เบราว์เซอร์ของคุณไม่รองรับระบบเสียง (Sorry, your browser doesn't support Text-to-Speech)");
            }
        }

        // Toggle visibility function
        function toggleVisibility(id) {
            const el = document.getElementById(id);
            if (el.classList.contains('active')) {
                el.classList.remove('active');
            } else {
                el.classList.add('active');
            }
        }

        // Generate HTML Builder
        function createItemBlock(item, index) {
            const isHeader = item.category === 'section';
            const bgClass = isHeader ? 'bg-blue-50 border-l-4 border-blue-500' : 'bg-white border border-gray-200';
            const textClass = isHeader ? 'text-2xl font-bold text-blue-800' : 'text-xl font-medium text-gray-800';
            const containerPadding = isHeader ? 'p-4 rounded-r-xl' : 'p-5 rounded-xl shadow-sm hover:shadow-md transition-shadow';
            
            let speakerTag = '';
            if (item.speaker) {
                speakerTag = `<span class="font-bold text-indigo-600 mr-2">${item.speaker}</span>`;
            }

            return `
                <div class="${bgClass} ${containerPadding} w-full">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="${textClass} leading-relaxed flex-1">
                            ${speakerTag}${item.th}
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <button onclick="speakThai('${item.th.replace(/'/g, "\\'")}')" 
                                class="flex items-center justify-center bg-sky-100 text-sky-700 hover:bg-sky-200 hover:text-sky-800 px-4 py-2 rounded-lg font-medium transition-colors">
                                🔊 ฟัง
                            </button>
                            <button onclick="toggleVisibility('ipa-${index}')" 
                                class="flex items-center justify-center bg-emerald-100 text-emerald-700 hover:bg-emerald-200 hover:text-emerald-800 px-4 py-2 rounded-lg font-medium transition-colors">
                                🗣️ IPA
                            </button>
                            <button onclick="toggleVisibility('en-${index}')" 
                                class="flex items-center justify-center bg-purple-100 text-purple-700 hover:bg-purple-200 hover:text-purple-800 px-4 py-2 rounded-lg font-medium transition-colors">
                                🇬🇧 EN
                            </button>
                        </div>
                    </div>
                    
                    <div class="mt-3 space-y-2">
                        <div id="ipa-${index}" class="toggle-content bg-emerald-50 text-emerald-800 p-3 rounded-lg text-lg border border-emerald-100">
                            <span class="font-semibold mr-2">IPA:</span> ${item.ipa}
                        </div>
                        <div id="en-${index}" class="toggle-content bg-purple-50 text-purple-800 p-3 rounded-lg text-lg border border-purple-100">
                            <span class="font-semibold mr-2">EN:</span> ${item.en}
                        </div>
                    </div>
                </div>
            `;
        }

        // Render Content
        function renderLesson() {
            const container = document.getElementById('app-container');
            
            let currentSectionHTML = '';

            lessonData.forEach((item, index) => {
                const block = createItemBlock(item, index);
                
                if (item.category === 'section') {
                    // Close previous section wrapper if it exists and open a new one
                    if (currentSectionHTML !== '') {
                        container.innerHTML += `<div class="space-y-4 mb-10">${currentSectionHTML}</div>`;
                    }
                    currentSectionHTML = block;
                } else {
                    currentSectionHTML += block;
                }
            });

            // Append the last section
            if (currentSectionHTML !== '') {
                container.innerHTML += `<div class="space-y-4 mb-10">${currentSectionHTML}</div>`;
            }
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', renderLesson);
    </script>
</body>
</html>

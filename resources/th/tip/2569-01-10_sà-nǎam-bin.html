<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สนามบิน (The Airport)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f9ff; /* Sky-50 */
        }
        .thai-text {
            color: #0c4a6e; /* Sky-900 */
        }
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #0ea5e9; /* Sky-500 */
            border-radius: 4px;
        }
        .btn-toggle {
            transition: all 0.2s;
        }
        .btn-toggle.active {
            background-color: #0284c7; /* Sky-600 */
            color: white;
            border-color: #0284c7;
        }
        .card-anim {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="pb-20">

    <!-- Navbar -->

        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">

                <button onclick="toggleAll('en')" class="text-xs bg-sky-50 hover:bg-sky-100 px-2 py-1 rounded text-sky-800 border border-sky-200">All EN</button>

    </nav>

    <div class="max-w-3xl mx-auto px-4 mt-6 space-y-8">

            </div>
            
            <div class="bg-blue-50 rounded-xl p-6 text-center border border-blue-100 min-h-[220px] flex flex-col justify-center items-center relative">

                    <p class="text-gray-400 italic">Ready?</p>
                </div>
                <button onclick="randomWord()" class="mt-6 bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-full shadow-lg transform active:scale-95 transition-all flex items-center gap-2">
                    <span>🎲</span> Next Word
                </button>
            </div>
        </section>

        <!-- SCENARIO 1: Flight Delay -->

            <div class="flex items-center mb-4 gap-2">
                <span class="text-2xl">⏰</span>
                <div id="header-delay" class="flex-1"></div>
            </div>
            <div class="space-y-6" id="container-delay"></div>
        </section>

        <!-- SCENARIO 2: Carry-on Weight -->

            <div class="flex items-center mb-4 gap-2">
                <span class="text-2xl">⚖️</span>
                <div id="header-weight" class="flex-1"></div>
            </div>
            <div class="space-y-6" id="container-weight"></div>
        </section>

        <!-- SCENARIO 3: Lost Luggage -->

            <div class="flex items-center mb-4 gap-2">
                <span class="text-2xl">🧳</span>
                <div id="header-lost" class="flex-1"></div>
            </div>
            <div class="space-y-6" id="container-lost"></div>
        </section>

        <!-- SECTION 4: EXTENSION ACTIVITIES -->
        <section class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-pink-500">
            <div class="flex items-center mb-6 gap-2">
                <span class="text-2xl">🎭</span>
                <div id="header-extension" class="flex-1"></div>
            </div>

            <!-- Immigration -->
            <div class="mb-8">
                <div id="header-imm" class="mb-4"></div>
                <div class="space-y-6" id="container-imm"></div>
            </div>

            <!-- Gate Change -->
            <div class="mb-8 pl-4 border-l-2 border-pink-100">
                <div id="header-gate" class="mb-4"></div>
                <div class="space-y-6" id="container-gate"></div>
            </div>

            <!-- SIM Card -->
            <div class="pl-4 border-l-2 border-pink-100 mb-8">
                <div id="header-sim" class="mb-4"></div>
                <div class="space-y-6" id="container-sim"></div>

                <div id="header-miss" class="mb-4"></div>
                <div class="space-y-6" id="container-miss"></div>
            </div>
        </section>

    </div>

        // --- RANDOMIZER FUNCTION ---
        function randomWord() {
            const container = document.getElementById('random-card-content');
            const randomItem = vocabList[Math.floor(Math.random() * vocabList.length)];
            
            container.innerHTML = '';
            
            const card = document.createElement('div');
            card.className = "card-anim";
            
            card.innerHTML = `
                <div class="flex flex-col items-center gap-2">
                    <button onclick="speakThai('${randomItem.t}')" class="text-sky-500 hover:text-sky-700 mb-2">
                         <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                    <h3 class="text-3xl font-bold text-gray-800 text-center mb-2 cursor-pointer" onclick="speakThai('${randomItem.t}')">${randomItem.t}</h3>
                    
                    <div class="flex gap-2 mb-3">
                        <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="text-xs border border-sky-300 px-3 py-1 rounded text-sky-600 hover:bg-sky-100">Show IPA</button>
                        <div class="hidden text-lg font-mono text-indigo-600 bg-indigo-50 px-2 rounded">${randomItem.i}</div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="text-xs border border-sky-300 px-3 py-1 rounded text-sky-600 hover:bg-sky-100">Show EN</button>
                        <div class="hidden text-lg text-gray-600 font-semibold">${randomItem.e}</div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }

        // --- RENDER FUNCTIONS ---
        function renderList(data, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 
            data.forEach(item => {
                const el = createInteractiveElement(item);
                el.classList.add('border-b', 'border-gray-100', 'pb-4'); 
                container.appendChild(el);
            });
        }

        function renderSingle(dataItem, targetId, customClass = '') {
            const container = document.getElementById(targetId);
            if(container) {
                container.innerHTML = ''; 
                const el = createInteractiveElement(dataItem);
                if(customClass) {
                    const thaiText = el.querySelector('.thai-content');
                    thaiText.className = `thai-content cursor-pointer select-none leading-relaxed text-gray-800 ${customClass}`;
                }
                container.appendChild(el);
            }
        }

        // Core Function
        function createInteractiveElement(item) {
            const template = document.getElementById('sentence-template');
            const clone = template.content.cloneNode(true);
            const root = clone.querySelector('div'); 

            const thaiEl = clone.querySelector('.thai-content');
            thaiEl.textContent = item.thai;
            thaiEl.onclick = () => speakThai(item.thai);

            clone.querySelector('.ipa-display').textContent = item.ipa;
            clone.querySelector('.en-display').textContent = item.en;

            const speakBtn = clone.querySelector('.speak-btn');
            speakBtn.onclick = () => speakThai(item.thai);

            const ipaBtn = clone.querySelector('.ipa-toggle');
            const ipaDiv = clone.querySelector('.ipa-display');
            ipaBtn.onclick = () => { ipaDiv.classList.toggle('hidden'); toggleBtnStyle(ipaBtn); };

            const enBtn = clone.querySelector('.en-toggle');
            const enDiv = clone.querySelector('.en-display');
            enBtn.onclick = () => { enDiv.classList.toggle('hidden'); toggleBtnStyle(enBtn); };

            ipaDiv.classList.add('all-ipa');
            enDiv.classList.add('all-en');

            return root;
        }

        function toggleBtnStyle(btn) {
            btn.classList.toggle('active');
        }

        // --- TTS LOGIC ---
        function speakThai(text) {
            window.speechSynthesis.cancel();
            const cleanText = text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}]/gu, ''); 
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'th-TH';
            utterance.rate = 0.9; 
            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(v => v.lang.includes('th'));
            if (thaiVoice) utterance.voice = thaiVoice;
            window.speechSynthesis.speak(utterance);
        }

        // --- TOGGLE ALL ---
        function toggleAll(type) {
            const targets = document.querySelectorAll(`.all-${type}`);
            if(targets.length === 0) return;
            const isHidden = targets[0].classList.contains('hidden');
            targets.forEach(el => {
                if (isHidden) el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
            const allBtns = document.querySelectorAll(`.${type}-toggle`);
            allBtns.forEach(btn => {
                const isActive = btn.classList.contains('active');
                if (isHidden && !isActive) toggleBtnStyle(btn);
                if (!isHidden && isActive) toggleBtnStyle(btn);
            });
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            // Headers
            renderSingle(uiData.headerDelay, 'header-delay', 'text-xl font-bold');
            renderSingle(uiData.headerWeight, 'header-weight', 'text-xl font-bold');
            renderSingle(uiData.headerLost, 'header-lost', 'text-xl font-bold');
            
            // Extension Headers
            renderSingle(uiData.headerExtension, 'header-extension', 'text-xl font-bold');
            renderSingle(uiData.headerImm, 'header-imm', 'text-lg font-bold text-gray-700');
            renderSingle(uiData.headerGate, 'header-gate', 'text-lg font-bold text-gray-700');
            renderSingle(uiData.headerSim, 'header-sim', 'text-lg font-bold text-gray-700');
            renderSingle(uiData.headerMiss, 'header-miss', 'text-lg font-bold text-red-700');

            // Dialogue Lists
            renderList(dataDelay, 'container-delay');
            renderList(dataWeight, 'container-weight');
            renderList(dataLost, 'container-lost');
            
            // Extension Lists
            renderList(dataImm, 'container-imm');
            renderList(dataGate, 'container-gate');
            renderList(dataSim, 'container-sim');
            renderList(dataMiss, 'container-miss');
            
            randomWord();
            window.speechSynthesis.getVoices();
        });

    </script>

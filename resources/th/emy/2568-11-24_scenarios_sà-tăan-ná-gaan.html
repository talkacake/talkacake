<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f9ff;
        }
        h1, h2, h3 {
            font-family: 'Kanit', sans-serif;
        }
        .thai-text {
            color: #1e3a8a;
            line-height: 1.6;
        }
        .ipa-text {
            font-family: 'Courier New', Courier, monospace;
            color: #db2777;
        }
        /* Added !important to ensure this overrides Tailwind's display classes */
        .hidden-content {
            display: none !important;
        }
        .btn-toggle {
            transition: all 0.2s;
            border-width: 1px;
        }
        .btn-toggle:hover {
            transform: translateY(-1px);
        }
        .btn-toggle.active {
            background-color: #eff6ff;
            font-weight: bold;
            border-color: #4f46e5;
            color: #4f46e5;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
        }
        .speaker-icon {
            cursor: pointer;
            transition: transform 0.1s;
        }
        .speaker-icon:active {
            transform: scale(0.9);
        }
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }
    </style>
</head>

        // --- Functions ---

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        }

        // Modified function to support styling for headers and text size options
        function createInteractiveElement(item, uniqueId, isHeader = false, isNav = false) {
            const wrapper = document.createElement('div');
            // If nav, we want inline behavior to fit in the navbar
            wrapper.className = isNav ? "flex items-center gap-2" : "flex flex-col";

            // Row 1: Speaker + Thai Text + Controls
            const topRow = document.createElement('div');
            topRow.className = "flex flex-wrap items-center gap-2";
            if (!isNav && !isHeader) topRow.classList.add("mb-2"); // Spacing for regular dialogue
            
            // Speaker Icon
            const speakerBtn = document.createElement('button');
            speakerBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
            speakerBtn.className = isNav 
                ? "speaker-icon bg-indigo-700 hover:bg-indigo-500 text-white w-8 h-8 rounded-full flex items-center justify-center"
                : "speaker-icon bg-gray-100 hover:bg-indigo-500 hover:text-white text-gray-500 w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center";
            speakerBtn.onclick = (e) => {
                e.stopPropagation();
                speak(item.thai);
            };

            // Thai Text
            const thaiText = document.createElement(isHeader || isNav ? 'h3' : 'p');
            thaiText.textContent = item.thai;
            if (isNav) {
                thaiText.className = "thai-text text-xl font-bold text-white";
            } else if (isHeader) {
                thaiText.className = "thai-text text-xl font-bold text-gray-800";
            } else {
                thaiText.className = "thai-text font-medium text-lg flex-grow";
            }

            // Controls
            const controls = document.createElement('div');
            controls.className = "flex gap-1 ml-2";

            const btnIpa = document.createElement('button');
            btnIpa.textContent = "IPA";
            btnIpa.className = `btn-toggle px-2 py-0.5 rounded text-xs border border-transparent shadow-sm ${isNav ? "bg-indigo-500 text-white hover:bg-indigo-400" : "bg-white text-gray-600 border-gray-300 hover:bg-gray-50"}`;
            btnIpa.onclick = () => toggleContent(btnIpa, `ipa-${uniqueId}`);

            const btnEn = document.createElement('button');
            btnEn.textContent = "EN";
            btnEn.className = `btn-toggle px-2 py-0.5 rounded text-xs border border-transparent shadow-sm ${isNav ? "bg-indigo-500 text-white hover:bg-indigo-400" : "bg-white text-gray-600 border-gray-300 hover:bg-gray-50"}`;
            btnEn.onclick = () => toggleContent(btnEn, `en-${uniqueId}`);

            controls.appendChild(btnIpa);
            controls.appendChild(btnEn);

            topRow.appendChild(speakerBtn);
            topRow.appendChild(thaiText);
            topRow.appendChild(controls);

            // Hidden Content Rows
            const contentContainer = document.createElement('div');
            contentContainer.className = isNav ? "absolute top-16 left-0 right-0 bg-indigo-800 p-2 shadow-lg z-50 rounded-b-lg hidden-content-wrapper" : "ml-10";

            // IPA Box
            const ipaDiv = document.createElement('div');
            ipaDiv.id = `ipa-${uniqueId}`;
            ipaDiv.className = "hidden-content ipa-text text-sm mb-1 bg-pink-50 p-2 rounded-md inline-block border border-pink-100";
            ipaDiv.textContent = item.ipa;

            // EN Box
            const enDiv = document.createElement('div');
            enDiv.id = `en-${uniqueId}`;
            enDiv.className = "hidden-content text-gray-700 text-sm italic bg-gray-50 p-2 rounded-md block border border-gray-200";
            enDiv.textContent = item.en;

            contentContainer.appendChild(ipaDiv);
            contentContainer.appendChild(enDiv);
            
            // Special handling for Nav to avoid breaking layout
            if(isNav) {
                // For navbar we just append the hidden divs to the topRow but they are hidden anyway.
                // Actually, positioning absolute for Nav toggles is better if we want to see them.
                // Let's simplify: for Nav, just show them below the title in the flow if possible, or simple block
                wrapper.appendChild(topRow);
                const navHiddenContainer = document.createElement('div');
                navHiddenContainer.className = "ml-10"; // Indent under text
                navHiddenContainer.appendChild(ipaDiv);
                navHiddenContainer.appendChild(enDiv);
                wrapper.appendChild(navHiddenContainer);
            } else {
                wrapper.appendChild(topRow);
                wrapper.appendChild(contentContainer);
            }

            return wrapper;
        }

        // Main Card Creator (incorporating role logic)
        function createInteractiveCard(item, index, sectionId) {
            const container = document.createElement('div');
            container.className = "flex flex-col border-b border-gray-100 pb-4 last:border-0";
            
            const userRoles = ["คนซื้อ", "ลูกค้า", "เพื่อน 2"];
            const isUser = userRoles.includes(item.role);

            // Role Tag
            if (item.role) {
                const roleTag = document.createElement('span');
                roleTag.className = `text-xs font-bold uppercase tracking-wide mb-1 ${isUser ? "text-indigo-600" : "text-orange-600"}`;
                roleTag.textContent = item.role;
                container.appendChild(roleTag);
            }

            // Reuse the generic element creator for the content
            // We pass false for header to get standard text styling
            const content = createInteractiveElement(item, `${sectionId}-${index}`, false, false);
            container.appendChild(content);

            return container;
        }

        function toggleContent(btn, elementId) {
            const el = document.getElementById(elementId);
            btn.classList.toggle('active');
            if (el.classList.contains('hidden-content')) {
                el.classList.remove('hidden-content');
            } else {
                el.classList.add('hidden-content');
            }
        }

        // --- Initialization ---

        function injectHeader(elementId, data, isHeader = false, isNav = false) {
            const el = document.getElementById(elementId);
            if(el) {
                el.appendChild(createInteractiveElement(data, elementId, isHeader, isNav));
            }
        }

        function renderScenario(data, containerId, sectionPrefix) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            data.forEach((item, index) => {
                container.appendChild(createInteractiveCard(item, index, sectionPrefix));
            });
        }

        function renderVocab() {
            const container = document.getElementById('vocab-container');
            container.innerHTML = '';
            vocab_list.forEach((item, index) => {
                // Reuse Card creator but vocab has no role, so it just renders content
                container.appendChild(createInteractiveCard(item, index, 'vocab'));
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Render Headers
            injectHeader('nav-title-container', headerData.navTitle, true, true);
            injectHeader('sc1-header', headerData.sc1Title, true);
            injectHeader('sc1-desc', headerData.sc1Desc); // Description uses normal text style but is static data
            injectHeader('sc2-header', headerData.sc2Title, true);
            injectHeader('sc2-desc', headerData.sc2Desc);
            injectHeader('sc3-header', headerData.sc3Title, true);
            injectHeader('sc3-desc', headerData.sc3Desc);
            injectHeader('vocab-header', headerData.vocabTitle, true);

            // Render Lists
            renderScenario(scenario1_shopping, 'dialogue-container-1', 'sc1');
            renderScenario(scenario2_restaurant, 'dialogue-container-2', 'sc2');
            renderScenario(scenario3_smalltalk, 'dialogue-container-3', 'sc3');
            renderVocab();
        });

    </script>
</body>
</html>

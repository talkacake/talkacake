<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey to Thailand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f9ff;
            -webkit-tap-highlight-color: transparent;
        }
        .thai-text {
            line-height: 1.5;
            color: #1e3a8a;
        }
        .ipa-text {
            font-family: monospace; 
            color: #d946ef; /* Fuchsia for phonetics */
        }
        .en-text {
            color: #059669; /* Emerald for English */
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .card:active {
            transform: scale(0.98);
        }
        button:focus {
            outline: none;
        }
    </style>
</head>
<body class="pb-10">

    <!-- Sticky Header -->
    <header id="main-header" class="sticky top-0 z-50 bg-white/95 backdrop-blur-sm shadow-md p-3 text-center rounded-b-xl border-b border-gray-100">
        <!-- JS will inject H1 here -->
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <!-- Instructions -->
        <div id="instruction-area" class="mb-6"></div>

        <!-- Section 1: Vocabulary Quick Fire -->
        <section id="vocab-section">
            <div id="vocab-header" class="mb-4"></div>
            <div id="vocab-container" class="grid grid-cols-1 gap-4">
                <!-- Vocab cards generated by JS -->
            </div>
        </section>

        <!-- Section 2: At the Restaurant -->
        <section id="roleplay-food">
            <div id="food-header" class="mt-8 mb-4"></div>
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 mb-4">
                <div id="food-context" class="mb-4 pb-2 border-b border-blue-200 border-dashed"></div>
                <div id="food-dialogue" class="space-y-4">
                    <!-- Dialogue generated by JS -->
                </div>
            </div>
        </section>

        <!-- Section 3: Shopping -->
        <section id="roleplay-shop">
            <div id="shop-header" class="mt-8 mb-4"></div>
            <div class="bg-purple-50 p-4 rounded-xl border border-purple-100 mb-4">
                <div id="shop-context" class="mb-4 pb-2 border-b border-purple-200 border-dashed"></div>
                <div id="shop-dialogue" class="space-y-4">
                    <!-- Dialogue generated by JS -->
                </div>
            </div>
        </section>

        <!-- Section 4: Social / Work -->
        <section id="roleplay-social">
            <div id="social-header" class="mt-8 mb-4"></div>
            <div class="bg-green-50 p-4 rounded-xl border border-green-100 mb-4">
                <div id="social-context" class="mb-4 pb-2 border-b border-green-200 border-dashed"></div>
                <div id="social-dialogue" class="space-y-4">
                    <!-- Dialogue generated by JS -->
                </div>
            </div>
        </section>

    </main>

        // UI Text Translations
        const uiText = {

            headerWarmup: { th: "อุ่นเครื่อง: คำศัพท์จำเป็น", ipa: "ùn-khrûeang: kham-sàp jam-pen", en: "Warm Up: Essentials" },
            headerFood: { th: "บทบาทสมมติ: การสั่งอาหาร", ipa: "bòt-bàat sǒm-mót: gaan sàng aa-hǎan", en: "Roleplay: Ordering Food" },
            contextFood: { th: "บริบท: มื้อเย็นที่ร้านอาหารทะเล", ipa: "bɔɔ-rí-bòt: mûue-yen thîi ráan aa-hǎan thá-lee", en: "Context: Dinner at a seafood restaurant" },

        const shopDialogue = [
            { speaker: "Seller", icon: "👵", th: "เชิญเลือกเครื่องประดับได้เลยค่ะ", ipa: "chəən " + vocabList.select.ipa + " " + vocabList.accessories.ipa + " dâay ləəy khâ", en: "Please go ahead and select accessories." },
            { speaker: "You", icon: "🧑‍🏫", th: "หมวกสานใบนี้ทำมาจากอะไรครับ", ipa: vocabList.straw_hat.ipa + " bai níi " + vocabList.made_of.ipa + " kráp", en: "What is this straw hat made of?" },
            { speaker: "Seller", icon: "👵", th: "ทำจากไม้ไผ่ค่ะ ราคาถูกนะ", ipa: "tham jàak máai-phài khâ " + vocabList.price.ipa + " " + vocabList.cheap.ipa + " ná", en: "Made from bamboo. The price is cheap." },

        // --- Functions ---

        function playAudio(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH'; 
            utterance.rate = 0.8; 
            
            let voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                 window.speechSynthesis.speak(utterance);
            } else {
                setTimeout(() => {
                    window.speechSynthesis.speak(utterance);
                }, 100);
            }
        }

        // Expanded function to handle different UI types
        function createToggleItem(item, type = 'dialogue') {
            const container = document.createElement('div');
            
            // Base styling based on type
            if (type === 'card') {
                container.className = "card p-4 flex flex-col items-center text-center space-y-3 relative";
            } else if (type === 'h1') {
                container.className = "flex flex-col items-center justify-center";
            } else if (type === 'h2') {
                container.className = "flex flex-col items-start";
            } else if (type === 'context') {
                container.className = "flex flex-col items-start";
            } else if (type === 'instruction') {
                container.className = "flex flex-col items-center justify-center";
            } else { // default dialogue or simple row
                container.className = "bg-white p-4 rounded-lg shadow-sm border-l-4 border-blue-400";
            }

            // Header (Speaker Name for dialogue)
            if (type === 'dialogue' && item.speaker) {
                const speaker = document.createElement('div');
                speaker.className = "text-xs font-bold text-gray-400 uppercase tracking-wide mb-1";
                speaker.innerHTML = `${item.icon} ${item.speaker}`;
                container.appendChild(speaker);
            }

            // Main Thai Text Row
            const thaiLine = document.createElement('div');
            thaiLine.className = "flex items-center gap-2 w-full";
            
            // Justify content based on type
            if (['card', 'h1', 'instruction'].includes(type)) {
                thaiLine.classList.add('justify-center');
            } else {
                thaiLine.classList.add('justify-start');
            }

            const textSpan = document.createElement('span');
            textSpan.className = "thai-text font-bold";
            
            // Font sizing based on type
            if (type === 'h1') textSpan.className += " text-2xl text-blue-900";
            else if (type === 'h2') textSpan.className += " text-xl text-gray-700";
            else if (type === 'card') textSpan.className += " text-lg";
            else if (type === 'context') textSpan.className += " text-sm text-gray-600 font-semibold";
            else if (type === 'instruction') textSpan.className += " text-xs text-gray-500 font-normal";
            else textSpan.className += " text-lg"; // dialogue

            textSpan.innerText = item.th;
            if(type === 'card') textSpan.innerHTML = `<span class="block text-4xl mb-2">${item.icon}</span>` + item.th;
            
            // Audio Button (Adjust size for headers)
            const audioBtn = document.createElement('button');
            const btnSizeClass = (type === 'h1' || type === 'h2') ? "p-2" : "p-2";
            const btnColorClass = (type === 'context' || type === 'instruction') ? "text-gray-400 hover:text-blue-600" : "bg-blue-100 hover:bg-blue-200 text-blue-600 rounded-full";
            
            audioBtn.className = `${btnColorClass} ${btnSizeClass} transition-colors ml-1 flex-shrink-0`;
            
            // Different icon size for instruction
            const iconSize = (type === 'instruction' || type === 'context') ? 16 : 20;
            
            audioBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="${iconSize}" height="${iconSize}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                </svg>
            `;
            audioBtn.onclick = () => playAudio(item.th);

            thaiLine.appendChild(textSpan);
            thaiLine.appendChild(audioBtn);
            container.appendChild(thaiLine);

            // Controls (IPA/EN Buttons)
            const controls = document.createElement('div');
            // Adjust width/margin based on type
            if (['card', 'h1', 'instruction'].includes(type)) {
                controls.className = "flex gap-2 mt-2 w-full max-w-[200px] justify-center";
            } else {
                controls.className = "flex gap-2 mt-2 w-full max-w-[250px] justify-start";
            }

            // Smaller buttons for headers/context
            const isSmall = ['h1', 'h2', 'context', 'instruction'].includes(type);
            const btnPy = isSmall ? "py-0.5" : "py-1";
            const btnText = isSmall ? "text-xs" : "text-sm";
            
            const ipaBtn = document.createElement('button');
            ipaBtn.className = `flex-1 bg-fuchsia-100 text-fuchsia-700 ${btnPy} px-3 rounded ${btnText} font-semibold hover:bg-fuchsia-200 transition-colors`;
            ipaBtn.innerText = "IPA";
            
            const enBtn = document.createElement('button');
            enBtn.className = `flex-1 bg-emerald-100 text-emerald-700 ${btnPy} px-3 rounded ${btnText} font-semibold hover:bg-emerald-200 transition-colors`;
            enBtn.innerText = "EN";

            controls.appendChild(ipaBtn);
            controls.appendChild(enBtn);
            container.appendChild(controls);

            // Hidden Content
            const ipaContent = document.createElement('div');
            ipaContent.className = `hidden mt-1 text-center ipa-text bg-fuchsia-50 p-1 rounded w-full ${isSmall ? 'text-xs' : ''}`;
            ipaContent.innerText = `/${item.ipa}/`;

            const enContent = document.createElement('div');
            enContent.className = `hidden mt-1 text-center en-text bg-emerald-50 p-1 rounded w-full ${isSmall ? 'text-xs' : 'text-sm'}`;
            enContent.innerText = item.en;

            // Toggle Logic
            ipaBtn.onclick = () => {
                ipaContent.classList.toggle('hidden');
                ipaBtn.classList.toggle('ring-2');
                ipaBtn.classList.toggle('ring-fuchsia-400');
            };
            
            enBtn.onclick = () => {
                enContent.classList.toggle('hidden');
                enBtn.classList.toggle('ring-2');
                enBtn.classList.toggle('ring-emerald-400');
            };

            container.appendChild(ipaContent);
            container.appendChild(enContent);

            return container;
        }

        // --- Render ---

        function render() {
            // UI Header Elements
            document.getElementById('main-header').appendChild(createToggleItem(uiText.mainTitle, 'h1'));
            document.getElementById('instruction-area').appendChild(createToggleItem(uiText.instruction, 'instruction'));

            // Section Headers & Contexts
            document.getElementById('vocab-header').appendChild(createToggleItem(uiText.headerWarmup, 'h2'));
            
            document.getElementById('food-header').appendChild(createToggleItem(uiText.headerFood, 'h2'));
            document.getElementById('food-context').appendChild(createToggleItem(uiText.contextFood, 'context'));
            
            document.getElementById('shop-header').appendChild(createToggleItem(uiText.headerShop, 'h2'));
            document.getElementById('shop-context').appendChild(createToggleItem(uiText.contextShop, 'context'));
            
            document.getElementById('social-header').appendChild(createToggleItem(uiText.headerSocial, 'h2'));
            document.getElementById('social-context').appendChild(createToggleItem(uiText.contextSocial, 'context'));

            // Content
            const vocabContainer = document.getElementById('vocab-container');
            const foodContainer = document.getElementById('food-dialogue');
            const shopContainer = document.getElementById('shop-dialogue');
            const socialContainer = document.getElementById('social-dialogue');

            // Render Warmup (Grid layout)
            vocabContainer.className = "grid grid-cols-2 gap-3";
            warmupItems.forEach(item => {
                vocabContainer.appendChild(createToggleItem(item, 'card'));
            });

            // Render Dialogues
            foodDialogue.forEach(item => foodContainer.appendChild(createToggleItem(item)));
            shopDialogue.forEach(item => shopContainer.appendChild(createToggleItem(item)));
            socialDialogue.forEach(item => socialContainer.appendChild(createToggleItem(item)));
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', render);

    </script>
</body>
</html>

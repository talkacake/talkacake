                    const cleanText = thai.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');

                    u.lang = 'th-TH';
                    u.rate = 0.9;
                    window.speechSynthesis.speak(u);
                } else {
                    alert('TTS Not Supported on this browser.');
                }

                    {/* View: Menu */}
                    {view === 'menu' && (
                        <main className="p-4 space-y-8 animate-fade">
                            <div className="text-center py-4 bg-white rounded-3xl shadow-sm border border-pink-100 p-6">
                                <InteractiveText thai="มาทบทวนคำศัพท์กัน! 🎊" ipa="maa thóp-thuan kham-sàp gan!" en="Let's review vocabulary!" bold={true} size="text-2xl" color="text-pink-600" />
                                <div className="mt-2 flex justify-center">
                                    <InteractiveText thai="เลือกกิจกรรมด้านล่างเพื่อเริ่มฝึกพูด" ipa="lʉ̂ak gìt-jà-gam dâan lâang phʉ̂a rə̂əm fʉ̀k phûut" en="Select an activity below to start practicing speaking." color="text-gray-500" />
                                </div>
                            </div>

                            {/* CORE SECTION */}
                            <section>
                                <div className="flex items-center gap-2 mb-4 border-b border-gray-200 pb-2">
                                    <div className="h-8 w-2 bg-pink-500 rounded-full"></div>
                                    <InteractiveText thai="กิจกรรมหลัก" ipa="gìt-jà-gam làk" en="Main Activities" bold={true} size="text-xl" />
                                </div>
                                <div className="grid grid-cols-1 gap-4">
                                    {activities.filter(a => a.type === 'core').map(act => (
                                        <div key={act.id} onClick={() => openActivity(act)} className="bg-white p-5 rounded-2xl shadow-sm hover:shadow-md transition-shadow cursor-pointer border border-pink-100 flex items-start gap-4 active:scale-[0.98]">
                                            <div className="text-4xl shrink-0 bg-pink-50 p-3 rounded-full">{act.emoji}</div>
                                            <div className="w-full">
                                                <InteractiveText thai={act.titleThai} ipa={act.titleIpa} en={act.titleEn} bold={true} size="text-lg" />
                                                <div className="mt-1">
                                                    <InteractiveText thai={act.descThai} ipa={act.descIpa} en={act.descEn} size="text-sm" color="text-gray-500" />
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            {/* EXTENSION SECTION */}
                            <section className="pt-4">
                                <div className="flex items-center gap-2 mb-4 border-b border-gray-200 pb-2">
                                    <div className="h-8 w-2 bg-blue-500 rounded-full"></div>
                                    <InteractiveText thai="กิจกรรมเพิ่มเติม" ipa="gìt-jà-gam phə̂əm-dtəəm" en="Additional Activities" bold={true} size="text-xl" />
                                </div>
                                <div className="grid grid-cols-1 gap-4">
                                    {activities.filter(a => a.type === 'ext').map(act => (
                                        <div key={act.id} onClick={() => openActivity(act)} className="bg-white p-5 rounded-2xl shadow-sm hover:shadow-md transition-shadow cursor-pointer border border-blue-100 flex items-start gap-4 active:scale-[0.98]">
                                            <div className="text-4xl shrink-0 bg-blue-50 p-3 rounded-full">{act.emoji}</div>
                                            <div className="w-full">
                                                <InteractiveText thai={act.titleThai} ipa={act.titleIpa} en={act.titleEn} bold={true} size="text-lg" />
                                                <div className="mt-1">
                                                    <InteractiveText thai={act.descThai} ipa={act.descIpa} en={act.descEn} size="text-sm" color="text-gray-500" />
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </main>
                    )}

                    {/* View: Activity */}
                    {view === 'activity' && activeAct && (
                        <main className="p-4 animate-fade">
                            <div className="mb-4 inline-block">
                                <button onClick={() => setView('menu')} className="flex items-center gap-1 bg-white border border-gray-200 px-4 py-2 rounded-xl shadow-sm hover:bg-gray-50">
                                    <Icons.ArrowLeft size={16}/> 
                                    <InteractiveText thai="กลับ" ipa="glàp" en="Back" bold={true} color="text-gray-600" />
                                </button>
                            </div>

                            <div className="bg-white rounded-3xl p-4 sm:p-6 shadow-sm border border-pink-100">
                                <div className="text-center mb-8 border-b border-gray-100 pb-6">
                                    <div className="text-6xl mb-4 bg-pink-50 w-24 h-24 mx-auto flex items-center justify-center rounded-full">{activeAct.emoji}</div>
                                    <div className="flex justify-center">
                                        <InteractiveText thai={activeAct.titleThai} ipa={activeAct.titleIpa} en={activeAct.titleEn} size="text-2xl" bold={true} />
                                    </div>
                                </div>

                                <div className="bg-slate-50 p-4 rounded-xl mb-6 border border-slate-100">
                                    <div className="flex items-center gap-2 mb-2">
                                        <InteractiveText thai="📌 คำสั่ง:" ipa="kham-sàŋ" en="Instructions:" bold={true} color="text-gray-700" />
                                    </div>
                                    <InteractiveText thai={activeAct.descThai} ipa={activeAct.descIpa} en={activeAct.descEn} color="text-gray-600" />
                                </div>

                                {/* Content Generation */}
                                {activeAct.content()}

                                {/* Target Vocab list */}
                                <div className="mt-10 bg-pink-50/50 p-4 rounded-xl border border-pink-100">
                                    <div className="mb-4 border-b border-pink-200 pb-2">
                                        <InteractiveText thai="🎯 คำศัพท์ที่ใช้ในภารกิจนี้:" ipa="kham-sàp thîi chái nai phaa-rá-gìt níi" en="Vocabulary used in this mission:" bold={true} color="text-pink-800" />
                                    </div>
                                    <div className="flex flex-col gap-2">
                                        {activeAct.vocabIds.map(vId => {
                                            const vInfo = allVocab.find(v => v.t === vId) || {t: vId, em:'✨', p:'', e:''};
                                            return (
                                                <div key={vId} className="bg-white p-2 rounded-lg border border-pink-100 shadow-sm">
                                                    <InteractiveText thai={`${vInfo.em} ${vInfo.t}`} ipa={vInfo.p} en={vInfo.e} bold={true} />
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </main>
                    )}

                    {/* Full Vocab Modal (Scrollable for iOS) */}
                    {showVocabList && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex flex-col justify-end sm:justify-center sm:p-4 animate-fade backdrop-blur-sm">
                            <div className="bg-white h-[85vh] sm:h-[80vh] w-full max-w-lg mx-auto sm:rounded-3xl rounded-t-3xl shadow-2xl flex flex-col">
                                <div className="flex justify-between items-center p-4 border-b">
                                    <div className="flex-1">
                                        <InteractiveText thai="📖 คลังคำศัพท์ทั้งหมด" ipa="khlang kham-sàp tháng-mòt" en="All Vocabulary Bank" size="text-xl" bold={true} />
                                    </div>
                                    <button onClick={toggleVocab} className="p-3 bg-gray-100 rounded-full text-gray-600 hover:bg-gray-200 transition-colors ml-2 shrink-0">
                                        <Icons.X size={24} />
                                    </button>
                                </div>
                                <div className="p-4 overflow-y-auto modal-scroll flex-1 bg-slate-50">
                                    <div className="grid grid-cols-1 gap-3">
                                        {allVocab.map((v, i) => (
                                            <div key={i} className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm hover:border-pink-200 transition-colors">
                                                <InteractiveText thai={`${v.em} ${v.t}`} ipa={v.p} en={v.e} bold={true} size="text-lg" />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

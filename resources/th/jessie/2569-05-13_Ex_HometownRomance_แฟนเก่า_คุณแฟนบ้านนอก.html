<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แฟนเก่า</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Fonts: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .font-thai { font-family: 'Sarabun', sans-serif; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.3s ease-in-out; }
        .animate-slide { animation: fadeIn 0.3s ease-out forwards; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .btn-press { transition: transform 0.1s; }
        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                refresh: <><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></>,
                book: <><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></>,
                message: <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>,
                zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                play: <polygon points="5 3 19 12 5 21 5 3"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- TTS Engine ---
        const speakThai = (text, e) => {
            if(e) e.stopPropagation();
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        };

        // --- Core SmartText Component ---
        const SmartText = ({ th, ipa, en, emoji = "", size = "md", isTitle = false, isButton = false, titleColor = "text-slate-800" }) => {
            const [showIPA, setShowIPA] = useState(false);
            const [showEN, setShowEN] = useState(false);

            const textSize = size === "lg" ? "text-xl md:text-2xl font-bold" : 
                             size === "xl" ? "text-2xl md:text-3xl font-bold" : 
                             "text-lg md:text-xl font-medium";

            if (isButton) {
                return (
                    <div className="flex flex-col items-center">
                        <span className="font-bold text-sm mt-1">{th}</span>
                        {(showIPA || showEN) && (
                            <div className="text-xs mt-1 opacity-80 text-center">
                                {showIPA && <div>/{ipa}/</div>}
                                {showEN && <div className="italic">{en}</div>}
                            </div>
                        )}
                        <div className="flex gap-1 mt-1">
                            {ipa && <button onClick={(e) => { e.stopPropagation(); setShowIPA(!showIPA); }} className="px-1.5 py-0.5 bg-white/20 rounded text-[9px] border border-white/30">IPA</button>}
                            {en && <button onClick={(e) => { e.stopPropagation(); setShowEN(!showEN); }} className="px-1.5 py-0.5 bg-white/20 rounded text-[9px] border border-white/30">EN</button>}
                        </div>
                    </div>
                );
            }

            return (
                <div className={`flex flex-col gap-2 ${isTitle ? 'mb-4' : 'bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-3 w-full'}`}>
                    <div className={`flex items-start gap-3 ${isTitle ? 'justify-center text-center' : ''}`}>
                        {emoji && <span className="text-2xl shrink-0 mt-0.5">{emoji}</span>}
                        <div className={`flex-1 ${isTitle ? 'flex flex-col items-center' : ''}`}>
                            <div className="flex items-center gap-2 mb-2 flex-wrap">
                                <button 
                                    onClick={(e) => speakThai(th, e)}
                                    className={`p-2 rounded-full btn-press shrink-0 ${isTitle ? (titleColor.includes('white') ? 'bg-white/20 text-white hover:bg-white/30' : 'bg-white text-slate-500 shadow-sm hover:bg-slate-50') : 'bg-rose-100 text-rose-600 hover:bg-rose-200'}`}
                                >
                                    <Icon name="play" size={16} />
                                </button>
                                <span className={`${textSize} ${isTitle ? titleColor : 'text-slate-800'} leading-snug break-words font-thai`}>{th}</span>
                            </div>

                            <div className={`flex gap-2 ${isTitle ? 'justify-center' : ''}`}>
                                {ipa && (
                                    <button 
                                        onClick={() => setShowIPA(!showIPA)}
                                        className={`px-3 py-1 rounded-lg text-sm font-bold border btn-press ${showIPA ? 'bg-amber-100 text-amber-700 border-amber-200' : 'bg-slate-50 text-slate-400 border-slate-200'} ${isTitle ? (titleColor.includes('white') ? '!bg-white/20 !border-white/30 !text-white' : 'bg-white shadow-sm hover:bg-slate-50') : ''}`}
                                    >
                                        IPA
                                    </button>
                                )}
                                {en && (
                                    <button 
                                        onClick={() => setShowEN(!showEN)}
                                        className={`px-3 py-1 rounded-lg text-sm font-bold border btn-press ${showEN ? 'bg-indigo-100 text-indigo-700 border-indigo-200' : 'bg-slate-50 text-slate-400 border-slate-200'} ${isTitle ? (titleColor.includes('white') ? '!bg-white/20 !border-white/30 !text-white' : 'bg-white shadow-sm hover:bg-slate-50') : ''}`}
                                    >
                                        EN
                                    </button>
                                )}
                            </div>

                            {showIPA && <div className={`mt-2 font-mono text-sm pl-3 border-l-2 ${isTitle ? 'text-center border-l-0 text-amber-600' : 'text-left border-amber-300 text-amber-600'} ${isTitle && titleColor.includes('white') ? '!text-rose-100' : ''}`}>{ipa}</div>}
                            {showEN && <div className={`mt-1 text-sm pl-3 border-l-2 ${isTitle ? 'text-center border-l-0 text-indigo-700 italic' : 'text-left border-indigo-300 text-indigo-700'} ${isTitle && titleColor.includes('white') ? '!text-rose-100' : ''}`}>{en}</div>}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Data ---
        // Target Vocab
        const targetVocab = [
            { t: "นาน", i: "naan", e: "long time", em: "⏳" },
            { t: "ป่วย", i: "bpùuai", e: "sick", em: "🤒" },
            { t: "คิดถึง", i: "kít-tʉ̌ng", e: "miss (someone)", em: "🥺" }
        ];

        // Target Structures
        const targetStructures = [
            { t: "ไม่เจอกันนานเลยนะ", i: "mâi jer gan naan ləəi ná", e: "Long time no see", em: "👋" },
            { t: "ดูเหมือน...", i: "duu mʉ̌an...", e: "Looks like... / Seems like...", em: "👀" }
        ];

        // Video Script
        const scriptData = [
            { speaker: "เจน", t: "ไม่เจอกันนานเลยนะ", i: "mâi jer gan naan ləəi ná", e: "Haven't seen you for a long time.", em: "👱‍♀️" },
            { speaker: "เจน", t: "ศิเป็นยังไงบ้าง", i: "Sì bpen yang-ngai bâang", e: "How are you, Si?", em: "👱‍♀️" },
            { speaker: "เจน", t: "สบายดีไหม", i: "sà-baai dii mǎi", e: "Are you doing well?", em: "👱‍♀️" },
            { speaker: "ศิ", t: "ศิดูเหมือนคนป่วยเหรอ", i: "Sì duu mʉ̌an kon bpùuai rɔ̌ɔ", e: "Do I look like a sick person?", em: "👩🏻" },
            { speaker: "เจน", t: "เจนคิดถึงศินะ", i: "Jen kít-tʉ̌ng Sì ná", e: "Jane misses Si, you know.", em: "👱‍♀️" }
        ];

        const qaData = [
            {
                q: { th: "คุณเคยไปเที่ยวคนเดียวไหม?", ipa: "kun kəəi bpai tîao kon diao mǎi?", en: "Have you ever traveled alone?" },
                a: { th: "เคย สนุกมาก", ipa: "kəəi, sà-nùk mâak", en: "Yes, it was very fun." }
            },
            {
                q: { th: "ถ้าป่วย คุณจะทำยังไง?", ipa: "tâa bpùai, kun jà tam yang ngai?", en: "If you are sick, what will you do?" },
                a: { th: "ก็ต้องไปปรึกษาหมอ", ipa: "gɔ̂ɔ dtɔ̂ɔng bpai bprʉ̀k sǎa mɔ̌ɔ", en: "I have to consult a doctor." }
            },
            {
                q: { th: "เมื่อวานเกิดอะไรขึ้น?", ipa: "mʉ̂ʉ waan gə̀ət à-rai kʉ̂n?", en: "What happened yesterday?" },
                a: { th: "รถชนกัน", ipa: "rót chon gan", en: "Cars crashed." }
            },
            {
                q: { th: "คุณหิวไหม?", ipa: "kun hǐu mǎi?", en: "Are you hungry?" },
                a: { th: "กินอาหารให้ตรงเวลานะ", ipa: "gin aa-hǎan hâi dtrong wee-laa ná", en: "Eat on time." }
            },
            {
                q: { th: "เขาเป็นคนยังไง?", ipa: "kǎo bpen kon yang ngai?", en: "What kind of person is he?" },
                a: { th: "เขาใจร้อนและขี้โมโห", ipa: "kǎo jai rɔ́ɔn lɛ́ kîi moo-hǒo", en: "He is hot-tempered and gets angry easily." }
            }
        ];

        const orderData = [
            {
                jumbled: [{th:"พี่คะ "}, {th:"นวด "}, {th:"หน่อยค่ะ "}, {th:"ช่วย "}],
                target: { th: "พี่คะ ช่วย นวด หน่อยค่ะ ", ipa: "pîi ká chûai nûat nɔ̀ɔi kâ", en: "Sister, please help massage a bit." }
            },
            {
                jumbled: [{th:"ไม่ควร "}, {th:"ขับรถ "}, {th:"คนแก่ "}],
                target: { th: "คนแก่ ไม่ควร ขับรถ ", ipa: "kon gɛ̀ɛ mâi kuan kàp rót", en: "Old people shouldn't drive." }
            },
            {
                jumbled: [{th:"ซื้อ "}, {th:"อย่างอื่น "}, {th:"จะ "}],
                target: { th: "จะ ซื้อ อย่างอื่น ", ipa: "jà sʉ́ʉ yàang ʉ̀ʉn", en: "Will buy something else." }
            },
            {
                jumbled: [{th:"ดูเหมือน "}, {th:"ป่วย "}, {th:"คน "}],
                target: { th: "ดูเหมือน คน ป่วย ", ipa: "duu mʉ̌an kon bpùai", en: "Looks like a sick person." }
            },
            {
                jumbled: [{th:"กัน "}, {th:"คุย "}, {th:"อะไร "}],
                target: { th: "คุย อะไร กัน ", ipa: "kui à-rai gan", en: "What are you talking about?" }
            }
        ];

        const gapFillData = [
            {
                pre: "ไม่ได้เจอ", post: "นานเลยนะ",
                options: [
                    { th: "กอด", correct: false },
                    { th: "กัน", correct: true },
                    { th: "ไป", correct: false }
                ],
                full: { th: "ไม่ได้เจอกันนานเลยนะ", ipa: "mâi dâi jəə gan naan ləəi ná", en: "Haven't seen each other for a long time." }
            },
            {
                pre: "เขา", post: "คนป่วยเหรอ",
                options: [
                    { th: "รู้สึก", correct: false },
                    { th: "ดูเหมือน", correct: true },
                    { th: "โกรธ", correct: false }
                ],
                full: { th: "เขาดูเหมือนคนป่วยเหรอ", ipa: "kǎo duu mʉ̌an kon bpùai rɔ̌ɔ", en: "Does he look like a sick person?" }
            },
            {
                pre: "ขับรถช้าๆ นะคะ ทาง", post: "",
                options: [
                    { th: "ปลอดภัย", correct: false },
                    { th: "อันตราย", correct: true },
                    { th: "สวย", correct: false }
                ],
                full: { th: "ขับรถช้าๆ นะคะ ทางอันตราย", ipa: "kàp rót cháa-cháa ná ká taang an-dtà-raai", en: "Drive slowly please, the road is dangerous." }
            },
            {
                pre: "มี", post: "อะไรกินบ้าง?",
                options: [
                    { th: "หมา", correct: false },
                    { th: "ข่าว", correct: false },
                    { th: "อาหาร", correct: true }
                ],
                full: { th: "มีอาหารอะไรกินบ้าง?", ipa: "mii aa-hǎan à-rai gin bâang?", en: "Is there any food to eat?" }
            },
            {
                pre: "ฉัน", post: "เธอมากนะ",
                options: [
                    { th: "คิดถึง", correct: true },
                    { th: "ลืม", correct: false },
                    { th: "ทิ้ง", correct: false }
                ],
                full: { th: "ฉันคิดถึงเธอมากนะ", ipa: "chǎn kít-tʉ̌ng təə mâak ná", en: "I miss you very much." }
            }
        ];

        const matchingData = [
            { id: 1, th: "คิดถึง", emoji: "🥺" },
            { id: 2, th: "ป่วย", emoji: "🤒" },
            { id: 3, th: "นาน", emoji: "⏳" },
            { id: 4, th: "โกรธ", emoji: "😠" },
            { id: 5, th: "เพื่อน", emoji: "👫" }
        ];

        const errorData = [
            {
                sentence: ["เขา", "บอก", "ว่า", "กินยา", "ไม่", "สบาย"],
                wrongIdx: 3,
                full: { th: "เขาบอกว่าไม่สบาย", ipa: "kǎo bɔ̀ɔk wâa mâi sà-baai", en: "He said he is not well." }
            },
            {
                sentence: ["ขับรถ", "หมอ", "ช้าๆ", "นะ", "อันตราย"],
                wrongIdx: 1,
                full: { th: "ขับรถช้าๆ นะ อันตราย", ipa: "kàp rót cháa-cháa ná an-dtà-raai", en: "Drive slowly, it's dangerous." }
            },
            {
                sentence: ["ฉัน", "คิดถึง", "ร่ม", "ครอบครัว", "มาก"],
                wrongIdx: 2,
                full: { th: "ฉันคิดถึงครอบครัวมาก", ipa: "chǎn kít-tʉ̌ng krɔ̂ɔp-krua mâak", en: "I miss my family very much." }
            },
            {
                sentence: ["เห็น", "หมา", "แว่นตา", "ทะเล", "ไหม"],
                wrongIdx: 2,
                full: { th: "เห็นหมาทะเลไหม", ipa: "hěn mǎa tá-lee mǎi", en: "Do you see the sea dog (seal)?" } 
            },
            {
                sentence: ["เพื่อน", "เก่า", "ตกหมึก", "ไม่ได้", "เจอ", "กัน", "นาน"],
                wrongIdx: 2,
                full: { th: "เพื่อนเก่า ไม่ได้เจอกันนาน", ipa: "pʉ̂an gào mâi dâi jəə gan naan", en: "Old friend, haven't seen each other for a long time." }
            }
        ];

        const QandA = ({ items }) => {
            const [currentIdx, setCurrentIdx] = useState(0);
            return (
                <div className="bg-sky-50 p-5 rounded-[2rem] shadow-sm border border-sky-100 mb-6">
                    <SmartText th="ถาม-ตอบ" ipa="tǎam-dtɔ̀ɔp" en="Q&A" emoji="💬" size="lg" isTitle={true} titleColor="text-sky-700"/>
                    <div className="text-right mb-2 text-sm text-slate-400 font-bold">{currentIdx + 1} / {items.length}</div>
                    
                    <div className="bg-white p-4 rounded-xl border border-sky-200 mb-4 shadow-sm">
                        <span className="text-xs font-bold text-sky-500 uppercase tracking-widest block mb-2">Q</span>
                        <SmartText th={items[currentIdx].q.th} ipa={items[currentIdx].q.ipa} en={items[currentIdx].q.en} emoji="❓" />
                    </div>

                    <div className="bg-white p-4 rounded-xl border border-sky-200 mb-4 shadow-sm">
                        <span className="text-xs font-bold text-emerald-500 uppercase tracking-widest block mb-2">A</span>
                        <SmartText th={items[currentIdx].a.th} ipa={items[currentIdx].a.ipa} en={items[currentIdx].a.en} emoji="💡" />
                    </div>

                    <div className="flex justify-between mt-4">
                        <button onClick={() => setCurrentIdx(prev => Math.max(0, prev - 1))} disabled={currentIdx === 0} className="p-3 bg-white text-slate-500 rounded-xl font-bold btn-press disabled:opacity-50">⬅️</button>
                        <button onClick={() => setCurrentIdx(prev => Math.min(items.length - 1, prev + 1))} disabled={currentIdx === items.length - 1} className="px-6 py-3 bg-sky-500 text-white rounded-xl font-bold btn-press shadow-md disabled:opacity-50"><SmartText th="ข้อต่อไป" ipa="kɔ̂ɔ dtɔ̀ɔ bpai" en="Next" isButton={true}/></button>
                    </div>
                </div>
            );
        }

        const OrderSentence = ({ items }) => {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [selectedWords, setSelectedWords] = useState([]);
            const [availableWords, setAvailableWords] = useState([]);
            const [isCorrect, setIsCorrect] = useState(false);
            const [showError, setShowError] = useState(false);

            useEffect(() => { resetQuestion(); }, [currentIdx]);

            const resetQuestion = () => {
                setAvailableWords([...items[currentIdx].jumbled]);
                setSelectedWords([]);
                setIsCorrect(false);
                setShowError(false);
            };

            const selectWord = (word, index) => {
                setSelectedWords([...selectedWords, word]);
                const newAvailable = [...availableWords];
                newAvailable.splice(index, 1);
                setAvailableWords(newAvailable);
                setShowError(false);
            };

            const unselectWord = (word, index) => {
                setAvailableWords([...availableWords, word]);
                const newSelected = [...selectedWords];
                newSelected.splice(index, 1);
                setSelectedWords(newSelected);
                setShowError(false);
                setIsCorrect(false);
            };

            const checkAnswer = () => {
                const currentAnswer = selectedWords.map(w => w.th).join('').replace(/\s+/g, '');
                const targetAnswer = items[currentIdx].target.th.replace(/\s+/g, '');
                if (currentAnswer === targetAnswer && availableWords.length === 0) {
                    setIsCorrect(true); setShowError(false); speakThai(items[currentIdx].target.th);
                } else { setShowError(true); }
            };

            return (
                <div className="bg-orange-50 p-5 rounded-[2rem] shadow-sm border border-orange-100 mb-6">
                    <SmartText th="เรียงประโยค" ipa="riang bprà-yòok" en="Order Sentence" emoji="🧩" size="lg" isTitle={true} titleColor="text-orange-700"/>
                    <div className="text-right mb-2 text-sm text-slate-400 font-bold">{currentIdx + 1} / {items.length}</div>
                    
                    <div className="min-h-[80px] p-4 bg-white rounded-xl mb-4 border-2 border-dashed border-orange-200 flex flex-wrap gap-2 items-center shadow-inner">
                        {selectedWords.map((w, i) => (
                            <button key={i} onClick={() => unselectWord(w, i)} className="px-4 py-2 bg-orange-500 text-white rounded-lg font-bold text-lg shadow-sm btn-press font-thai">
                                {w.th.trim()}
                            </button>
                        ))}
                    </div>

                    <div className="flex flex-wrap gap-2 mb-6 justify-center">
                        {availableWords.map((w, i) => (
                            <button key={i} onClick={() => selectWord(w, i)} className="px-4 py-2 bg-white text-slate-700 border border-slate-300 rounded-lg font-bold text-lg hover:bg-slate-50 btn-press shadow-sm font-thai">
                                {w.th.trim()}
                            </button>
                        ))}
                    </div>

                    <div className="flex flex-col items-center gap-3 mb-4">
                        {availableWords.length === 0 && !isCorrect && (
                            <button onClick={checkAnswer} className="w-full py-3 bg-slate-800 text-white rounded-xl font-bold text-lg btn-press shadow-md">
                                <SmartText th="ตรวจคำตอบ" ipa="dtruat kam-dtɔ̀ɔp" en="Check Answer" isButton={true}/>
                            </button>
                        )}
                        {showError && <div className="text-rose-500 font-bold animate-shake text-sm flex flex-col items-center">
                            <span>❌</span>
                            <SmartText th="ลองใหม่อีกครั้ง" ipa="lɔɔng mài ìik kráng" en="Try again" isButton={true}/>
                        </div>}
                    </div>

                    {isCorrect && (
                        <div className="animate-slide bg-white p-4 rounded-xl border-2 border-emerald-400 mb-4 shadow-sm">
                            <SmartText th={items[currentIdx].target.th} ipa={items[currentIdx].target.ipa} en={items[currentIdx].target.en} emoji="✅" />
                        </div>
                    )}

                    <div className="flex justify-between items-center gap-2">
                        <button onClick={resetQuestion} className="flex-1 py-2 text-slate-500 bg-white border border-slate-200 rounded-xl font-bold btn-press"><SmartText th="เริ่มใหม่" ipa="rə̂əm mài" en="Start over" isButton={true}/></button>

                        { th: "เมื่อวานเกิดอะไรขึ้น เล่าให้ฟังหน่อย", ipa: "mʉ̂ʉa waan gə̀ət à rai kʉ̂n lâo hâi fang nɔ̀ɔi", en: "What happened yesterday? Tell me." }

                {

                    items: [
                        { th: "สัมภาษณ์เพื่อนเกี่ยวกับการไปหาหมอ", ipa: "sǎm-pâat pʉ̂an gìao gàp gaan bpai hǎa mɔ̌ɔ", en: "Interview a friend about going to the doctor." },
                        { th: "Q: ครั้งที่แล้วไปหาหมอเมื่อไหร่?", ipa: "Q: kráng tîi lɛ́ɛo bpai hǎa mɔ̌ɔ mʉ̂ʉa rài?", en: "Q: When did you go to the doctor last time?" },
                        { th: "Q: อาการเป็นยังไง?", ipa: "Q: aa gaan bpen yang ngai?", en: "Q: What were the symptoms?" }
                    ]
                },
                {
                    icon: "📖", title: { th: "เล่าเรื่อง (Story-telling)", ipa: "lâo rʉ̂ang", en: "Story-telling" }, color: "bg-blue-50",
                    items: [
                        { th: "เล่าเรื่องตอนที่คุณ ป่วย", ipa: "lâo rʉ̂ang dtɔɔn tîi kun bpùuai", en: "Tell a story about when you were sick." },
                        { th: "มีไข้ไหม ไปหาหมอไหม กินยาไหม", ipa: "mii kâi mǎi bpai hǎa mɔ̌ɔ mǎi gin yaa mǎi", en: "Did you have a fever? Did you go to the doctor? Did you take medicine?" }
                    ]
                },
                {
                    icon: "📊", title: { th: "นำเสนอ (Presentation)", ipa: "nam sà-nə̌ə", en: "Presentation" }, color: "bg-amber-50",
                    items: [
                        { th: "แนะนำวิธีดูแลตัวเองตอนป่วย", ipa: "nɛ́-nam wí tii duu lɛɛ dtua eeng dtɔɔn bpùuai", en: "Recommend ways to take care of yourself when sick." },
                        { th: "เช่น กินอาหารให้ตรงเวลา กินยา", ipa: "chên gin aa hǎan hâi dtrong wee laa gin yaa", en: "For example: Eat on time, take medicine." }
                    ]
                }
            ];

            return (
                <div className="space-y-6 pb-8 fade-in">
                    <div className="text-center mb-6">
                        <SmartText th="กิจกรรมเพิ่มเติม" ipa="gìt-jà-gam pêem dtəəm" en="Extension Activities" size="xl" isTitle={true} titleColor="text-slate-800" />
                    </div>
                    {extData.map((ext, i) => (
                        <SimpleCard key={i} title={ext.title} emoji={ext.icon} items={ext.items} bgColor={ext.color} />

        };

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState("review");

            return (
                <div className="max-w-md mx-auto min-h-screen relative shadow-2xl bg-slate-50 overflow-x-hidden">
                    
                    {/* Header */}
                    <div className="bg-sky-500 p-6 text-white rounded-b-3xl shadow-md sticky top-0 z-50 pb-safe">
                        <SmartText th="แฟนเก่า" ipa="faen gào" en="Ex-partner" emoji="💔" size="xl" isTitle={true} titleColor="text-white drop-shadow-md" />
                        
                        {/* Tabs */}
                        <div className="flex bg-white/20 p-1 rounded-xl mt-2 backdrop-blur-sm shadow-inner">
                            <button onClick={() => setActiveTab("review")} className={`flex-1 py-3 rounded-lg text-sm font-bold btn-press flex flex-col items-center gap-1 ${activeTab === "review" ? "bg-white text-sky-600 shadow-sm" : "text-white hover:bg-white/20"}`}>
                                <SmartText th="ทบทวน" ipa="tóp-tuan" en="Review" isButton={true} />
                            </button>
                            <button onClick={() => setActiveTab("lesson")} className={`flex-1 py-3 rounded-lg text-sm font-bold btn-press flex flex-col items-center gap-1 ${activeTab === "lesson" ? "bg-white text-sky-600 shadow-sm" : "text-white hover:bg-white/20"}`}>
                                <SmartText th="บทเรียน" ipa="bòt-rian" en="Lesson" isButton={true} />

                            <button onClick={() => setActiveTab("extension")} className={`flex-1 py-3 rounded-lg text-sm font-bold btn-press flex flex-col items-center gap-1 ${activeTab === "extension" ? "bg-white text-sky-600 shadow-sm" : "text-white hover:bg-white/20"}`}>

                            </button>
                        </div>
                    </div>

                    {/* Content Area */}
                    <div className="px-4 pt-6 pb-28">
                        {activeTab === 'review' && (
                            <div className="animate-slide">
                                <QandA items={qaData} />
                                <OrderSentence items={orderData} />
                                <GapFill items={gapFillData} />
                                <Matching pairs={matchingData} />
                                <ErrorCorrection items={errorData} />
                            </div>
                        )}
                        
                        {activeTab === 'lesson' && <LessonSection />}
                        {activeTab === 'extension' && <ExtensionSection />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ฝึกพูดภาษาไทย</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .btn-press { transition: transform 0.1s; }
        .btn-press:active { transform: scale(0.95); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide { animation: slideIn 0.3s ease-out forwards; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.3s ease-in-out; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body class="text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                refresh: <><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></>,
                book: <><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></>,
                message: <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>,
                zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                check: <polyline points="20 6 9 17 4 12"/>,
                x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- TTS Engine ---
        const speakThai = (text, e) => {
            if(e) e.stopPropagation();
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        };

        // --- Core SmartText Component ---
        const SmartText = ({ th, ipa, en, emoji = "", size = "md", isTitle = false, isButton = false }) => {
            const [showIPA, setShowIPA] = useState(false);
            const [showEN, setShowEN] = useState(false);

            const textSize = size === "lg" ? "text-xl md:text-2xl font-bold" : 
                             size === "xl" ? "text-2xl md:text-3xl font-bold" : 
                             "text-lg md:text-xl font-medium";

            if (isButton) {
                return (
                    <div className="flex flex-col items-center">
                        <span className="font-bold text-lg">{th}</span>
                        {(showIPA || showEN) && (
                            <div className="text-xs mt-1 opacity-80 text-center">
                                {showIPA && <div>/{ipa}/</div>}
                                {showEN && <div className="italic">{en}</div>}
                            </div>
                        )}
                        <div className="flex gap-1 mt-2">
                            {ipa && <button onClick={(e) => { e.stopPropagation(); setShowIPA(!showIPA); }} className="px-2 py-1 bg-white/20 rounded text-[10px]">IPA</button>}
                            {en && <button onClick={(e) => { e.stopPropagation(); setShowEN(!showEN); }} className="px-2 py-1 bg-white/20 rounded text-[10px]">EN</button>}
                        </div>
                    </div>
                );
            }

            return (
                <div className={`flex flex-col gap-2 ${isTitle ? 'mb-4 w-full' : 'bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-3 w-full'}`}>
                    <div className={`flex items-start gap-3 ${isTitle ? 'justify-center text-center flex-col items-center' : ''}`}>
                        {emoji && <span className={`shrink-0 ${isTitle ? 'text-5xl drop-shadow-md mb-2' : 'text-2xl mt-0.5'}`}>{emoji}</span>}
                        <div className={`flex-1 w-full ${isTitle ? 'flex flex-col items-center' : ''}`}>
                            <div className={`flex items-center gap-2 mb-2 flex-wrap w-full ${isTitle ? 'justify-center' : ''}`}>
                                <button 
                                    onClick={(e) => speakThai(th, e)}
                                    className={`p-2 rounded-full btn-press shrink-0 ${isTitle ? 'bg-white/20 text-white hover:bg-white/30' : 'bg-sky-100 text-sky-600 hover:bg-sky-200'}`}
                                >
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                                </button>
                                <span className={`${textSize} ${isTitle ? 'text-white' : 'text-slate-800'} leading-snug break-words`}>{th}</span>
                            </div>

                            <div className={`flex gap-2 ${isTitle ? 'justify-center' : ''}`}>
                                {ipa && (
                                    <button 
                                        onClick={() => setShowIPA(!showIPA)}
                                        className={`px-3 py-1 rounded-lg text-sm font-bold border btn-press ${showIPA ? 'bg-indigo-100 text-indigo-700 border-indigo-200' : 'bg-slate-50 text-slate-400 border-slate-200'} ${isTitle ? '!bg-white/20 !border-white/30 !text-white' : ''}`}
                                    >
                                        IPA
                                    </button>
                                )}
                                {en && (
                                    <button 
                                        onClick={() => setShowEN(!showEN)}
                                        className={`px-3 py-1 rounded-lg text-sm font-bold border btn-press ${showEN ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-slate-50 text-slate-400 border-slate-200'} ${isTitle ? '!bg-white/20 !border-white/30 !text-white' : ''}`}
                                    >
                                        EN
                                    </button>
                                )}
                            </div>

                            {showIPA && <div className={`mt-2 font-mono text-sm pl-3 border-l-2 text-left w-full ${isTitle ? 'border-white/50 text-sky-100' : 'border-indigo-300 text-indigo-600'}`}>{ipa}</div>}
                            {showEN && <div className={`mt-1 text-sm pl-3 border-l-2 text-left w-full ${isTitle ? 'border-white/50 text-sky-100 italic' : 'border-emerald-300 text-emerald-700 italic'}`}>{en}</div>}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Exercise Components ---
        const QandA = ({ items }) => {
            const [currentIdx, setCurrentIdx] = useState(0);
            return (
                <div className="bg-sky-50 p-5 rounded-[2rem] shadow-sm border border-sky-100 mb-6">
                    <SmartText th="ถาม-ตอบ" ipa="tǎam-dtɔ̀ɔp" en="Q&A" emoji="💬" size="lg" />
                    <div className="text-right mb-2 text-sm text-slate-400 font-bold">{currentIdx + 1} / {items.length}</div>
                    
                    <div className="bg-white p-4 rounded-xl border border-sky-200 mb-4 shadow-sm">
                        <span className="text-xs font-bold text-sky-500 uppercase tracking-widest block mb-2">Q</span>
                        <SmartText th={items[currentIdx].q.th} ipa={items[currentIdx].q.ipa} en={items[currentIdx].q.en} emoji="❓" />
                    </div>

                    <div className="bg-white p-4 rounded-xl border border-sky-200 mb-4 shadow-sm">
                        <span className="text-xs font-bold text-emerald-500 uppercase tracking-widest block mb-2">A</span>
                        <SmartText th={items[currentIdx].a.th} ipa={items[currentIdx].a.ipa} en={items[currentIdx].a.en} emoji="💡" />
                    </div>

                    <div className="flex justify-between mt-4">
                        <button onClick={() => setCurrentIdx(prev => Math.max(0, prev - 1))} disabled={currentIdx === 0} className="p-3 bg-white text-slate-500 rounded-xl font-bold btn-press disabled:opacity-50">⬅️</button>
                        <button onClick={() => setCurrentIdx(prev => Math.min(items.length - 1, prev + 1))} disabled={currentIdx === items.length - 1} className="px-6 py-3 bg-sky-500 text-white rounded-xl font-bold btn-press shadow-md disabled:opacity-50">ข้อต่อไป ➡️</button>
                    </div>
                </div>
            );
        }

        const OrderSentence = ({ items }) => {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [selectedWords, setSelectedWords] = useState([]);
            const [availableWords, setAvailableWords] = useState([]);
            const [isCorrect, setIsCorrect] = useState(false);
            const [showError, setShowError] = useState(false);

            useEffect(() => { resetQuestion(); }, [currentIdx]);

            const resetQuestion = () => {
                setAvailableWords([...items[currentIdx].jumbled]);
                setSelectedWords([]);
                setIsCorrect(false);
                setShowError(false);
            };

            const selectWord = (word, index) => {
                setSelectedWords([...selectedWords, word]);
                const newAvailable = [...availableWords];
                newAvailable.splice(index, 1);
                setAvailableWords(newAvailable);
                setShowError(false);
            };

            const unselectWord = (word, index) => {
                setAvailableWords([...availableWords, word]);
                const newSelected = [...selectedWords];
                newSelected.splice(index, 1);
                setSelectedWords(newSelected);
                setShowError(false);
                setIsCorrect(false);
            };

            const checkAnswer = () => {
                const currentAnswer = selectedWords.map(w => w.th).join('').replace(/\s+/g, '');
                const targetAnswer = items[currentIdx].target.th.replace(/\s+/g, '');
                if (currentAnswer === targetAnswer && availableWords.length === 0) {
                    setIsCorrect(true); setShowError(false); speakThai(items[currentIdx].target.th);
                } else { setShowError(true); }
            };

            return (
                <div className="bg-orange-50 p-5 rounded-[2rem] shadow-sm border border-orange-100 mb-6">
                    <SmartText th="เรียงประโยค" ipa="riang bprà-yòok" en="Order Sentence" emoji="🧩" size="lg" />
                    <div className="text-right mb-2 text-sm text-slate-400 font-bold">{currentIdx + 1} / {items.length}</div>
                    
                    <div className="min-h-[80px] p-4 bg-white rounded-xl mb-4 border-2 border-dashed border-orange-200 flex flex-wrap gap-2 items-center shadow-inner">
                        {selectedWords.map((w, i) => (
                            <button key={i} onClick={() => unselectWord(w, i)} className="px-4 py-2 bg-orange-500 text-white rounded-lg font-bold text-lg shadow-sm btn-press">
                                {w.th.trim()}
                            </button>
                        ))}
                    </div>

                    <div className="flex flex-wrap gap-2 mb-6 justify-center">
                        {availableWords.map((w, i) => (
                            <button key={i} onClick={() => selectWord(w, i)} className="px-4 py-2 bg-white text-slate-700 border border-slate-300 rounded-lg font-bold text-lg hover:bg-slate-50 btn-press shadow-sm">
                                {w.th.trim()}
                            </button>
                        ))}
                    </div>

                    <div className="flex flex-col items-center gap-3 mb-4">
                        {availableWords.length === 0 && !isCorrect && (
                            <button onClick={checkAnswer} className="px-8 py-3 bg-slate-800 text-white rounded-xl font-bold text-lg btn-press shadow-md">
                                ตรวจคำตอบ
                            </button>
                        )}
                        {showError && <div className="text-rose-500 font-bold animate-shake text-sm">❌ ลองใหม่อีกครั้ง</div>}
                    </div>

                    {isCorrect && (
                        <div className="animate-slide bg-white p-4 rounded-xl border-2 border-emerald-400 mb-4 shadow-sm">
                            <SmartText th={items[currentIdx].target.th} ipa={items[currentIdx].target.ipa} en={items[currentIdx].target.en} emoji="✅" />
                        </div>
                    )}

                    <div className="flex justify-between items-center">
                        <button onClick={resetQuestion} className="px-4 py-2 text-slate-500 bg-white border border-slate-200 rounded-xl font-bold btn-press">เริ่มใหม่</button>
                        {isCorrect && currentIdx < items.length - 1 && <button onClick={() => setCurrentIdx(currentIdx + 1)} className="px-6 py-2 bg-orange-500 text-white rounded-xl font-bold btn-press shadow-md">ข้อต่อไป ➡️</button>}
                        {isCorrect && currentIdx === items.length - 1 && <span className="text-emerald-600 font-bold mr-2">🎉 เก่งมาก!</span>}
                    </div>
                </div>
            );
        };

        const GapFill = ({ items }) => {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [selectedOpt, setSelectedOpt] = useState(null);
            const [isCorrect, setIsCorrect] = useState(false);
            const [showError, setShowError] = useState(false);

            useEffect(() => {
                setSelectedOpt(null); setIsCorrect(false); setShowError(false);
            }, [currentIdx]);

            const handleSelect = (idx, correct) => {
                setSelectedOpt(idx);
                if (correct) { setIsCorrect(true); setShowError(false); speakThai(items[currentIdx].full.th); } 
                else { setIsCorrect(false); setShowError(true); }
            };

            const q = items[currentIdx];

            return (
                <div className="bg-purple-50 p-5 rounded-[2rem] shadow-sm border border-purple-100 mb-6">
                    <SmartText th="เติมคำในช่องว่าง" ipa="dtəəm kam nai chɔ̂ng wâang" en="Gap Fill" emoji="🕳️" size="lg" />
                    <div className="text-right mb-2 text-sm text-slate-400 font-bold">{currentIdx + 1} / {items.length}</div>
                    
                    <div className="bg-white p-6 rounded-xl border border-purple-200 mb-6 shadow-sm text-center text-xl font-bold text-slate-700 leading-relaxed">
                        {q.pre} <span className={`inline-block border-b-2 px-4 min-w-[80px] ${isCorrect ? 'text-emerald-600 border-emerald-500' : (showError ? 'text-rose-500 border-rose-500' : 'border-slate-400 text-slate-400')}`}>
                            {selectedOpt !== null ? q.options[selectedOpt].th : "..."}
                        </span> {q.post}
                    </div>

                    <div className="grid grid-cols-1 gap-3 mb-4">
                        {q.options.map((opt, i) => (
                            <button 
                                key={i} onClick={() => handleSelect(i, opt.correct)} disabled={isCorrect}
                                className={`p-4 rounded-xl border-2 font-bold text-lg transition-all btn-press
                                    ${isCorrect && opt.correct ? 'bg-emerald-100 border-emerald-500 text-emerald-800' : 
                                      selectedOpt === i && !opt.correct ? 'bg-rose-100 border-rose-500 text-rose-800 animate-shake' : 
                                      'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'}`}
                            >
                                {opt.th}
                            </button>
                        ))}
                    </div>

                    {isCorrect && (
                        <div className="animate-slide bg-white p-4 rounded-xl border border-emerald-200 mb-4">
                            <SmartText th={q.full.th} ipa={q.full.ipa} en={q.full.en} emoji="✅" />
                        </div>
                    )}

                    <div className="flex justify-end">
                        {isCorrect && currentIdx < items.length - 1 && <button onClick={() => setCurrentIdx(c => c + 1)} className="px-6 py-2 bg-purple-500 text-white rounded-xl font-bold btn-press shadow-md">ข้อต่อไป ➡️</button>}
                        {isCorrect && currentIdx === items.length - 1 && <span className="text-emerald-600 font-bold">🎉 จบแล้ว</span>}
                    </div>
                </div>
            );
        };

        const Matching = ({ pairs }) => {
            const [selectedLeft, setSelectedLeft] = useState(null);
            const [selectedRight, setSelectedRight] = useState(null);
            const [solved, setSolved] = useState([]);
            const [shaking, setShaking] = useState(false);
            
            // Randomize right side on mount
            const [rightOptions, setRightOptions] = useState([]);
            useEffect(() => { setRightOptions([...pairs].sort(() => Math.random() - 0.5)); }, []);

            const handleLeft = (id) => { if(!solved.includes(id)) { setSelectedLeft(id); checkMatch(id, selectedRight); } };
            const handleRight = (id) => { if(!solved.includes(id)) { setSelectedRight(id); checkMatch(selectedLeft, id); } };

            const checkMatch = (l, r) => {
                if (l && r) {
                    if (l === r) {
                        setSolved([...solved, l]); setSelectedLeft(null); setSelectedRight(null);
                        speakThai(pairs.find(p => p.id === l).th);
                    } else {
                        setShaking(true);
                        setTimeout(() => { setShaking(false); setSelectedLeft(null); setSelectedRight(null); }, 500);
                    }
                }
            };

            return (
                <div className={`bg-emerald-50 p-5 rounded-[2rem] shadow-sm border border-emerald-100 mb-6 ${shaking ? 'animate-shake' : ''}`}>
                    <SmartText th="จับคู่ความหมาย" ipa="jàp-kûu kwaam-mǎi" en="Matching" emoji="🔗" size="lg" />
                    <div className="grid grid-cols-2 gap-4 mt-4">
                        <div className="space-y-3">
                            {pairs.map(p => (
                                <button key={p.id} onClick={() => handleLeft(p.id)} disabled={solved.includes(p.id)}
                                    className={`w-full p-4 rounded-xl border-2 font-bold text-left btn-press transition-colors
                                        ${solved.includes(p.id) ? 'bg-emerald-200 border-emerald-500 text-emerald-800 opacity-60' : 
                                          selectedLeft === p.id ? 'bg-emerald-500 border-emerald-600 text-white' : 'bg-white border-slate-200 text-slate-700'}`}
                                >
                                    {p.th}
                                </button>
                            ))}
                        </div>
                        <div className="space-y-3">
                            {rightOptions.map(p => (
                                <button key={p.id} onClick={() => handleRight(p.id)} disabled={solved.includes(p.id)}
                                    className={`w-full p-4 rounded-xl border-2 font-medium text-left btn-press transition-colors flex items-center justify-center
                                        ${solved.includes(p.id) ? 'bg-emerald-200 border-emerald-500 text-emerald-800 opacity-60' : 
                                          selectedRight === p.id ? 'bg-emerald-500 border-emerald-600 text-white' : 'bg-white border-slate-200 text-slate-500'}`}
                                >
                                    {p.emoji}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const ErrorCorrection = ({ items }) => {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [isCorrect, setIsCorrect] = useState(false);
            const [showError, setShowError] = useState(false);

            useEffect(() => { setIsCorrect(false); setShowError(false); }, [currentIdx]);

            const q = items[currentIdx];

            const handleSelect = (idx) => {
                if (idx === q.wrongIdx) { setIsCorrect(true); setShowError(false); speakThai(q.full.th); } 
                else { setIsCorrect(false); setShowError(true); }
            };

            return (
                <div className="bg-rose-50 p-5 rounded-[2rem] shadow-sm border border-rose-100 mb-6">
                    <SmartText th="หาคำที่ผิด" ipa="hǎa kam tîi pìt" en="Find the mistake" emoji="🔍" size="lg" />
                    <div className="text-right mb-2 text-sm text-slate-400 font-bold">{currentIdx + 1} / {items.length}</div>
                    
                    <div className="flex flex-wrap justify-center gap-2 mb-6 bg-white p-6 rounded-xl border border-rose-200 shadow-sm">
                        {q.sentence.map((w, i) => (
                            <button 
                                key={i} onClick={() => handleSelect(i)} disabled={isCorrect}
                                className={`text-xl font-bold p-2 rounded-lg transition-colors btn-press ${isCorrect && i === q.wrongIdx ? 'bg-rose-500 text-white line-through' : 'text-slate-800 hover:bg-slate-100'}`}
                            >
                                {w}
                            </button>
                        ))}
                    </div>

                    {showError && <div className="text-rose-500 font-bold text-center animate-shake text-sm mb-4">❌ คำนี้ยังไม่ใช่ ลองหาดูดีๆ</div>}

                    {isCorrect && (
                        <div className="animate-slide bg-white p-4 rounded-xl border border-emerald-200 mb-4">
                            <div className="text-emerald-600 font-bold mb-2">ประโยคที่ถูกต้อง:</div>
                            <SmartText th={q.full.th} ipa={q.full.ipa} en={q.full.en} emoji="✅" />
                        </div>
                    )}

                    <div className="flex justify-end">
                        {isCorrect && currentIdx < items.length - 1 && <button onClick={() => setCurrentIdx(c => c + 1)} className="px-6 py-2 bg-rose-500 text-white rounded-xl font-bold btn-press shadow-md">ข้อต่อไป ➡️</button>}
                        {isCorrect && currentIdx === items.length - 1 && <span className="text-emerald-600 font-bold">🎉 จบแล้ว</span>}
                    </div>
                </div>
            );
        };

        // --- Data ---
        // (Only using provided vocab)
        const qaData = [
            {
                q: { th: "คุณชอบไปเที่ยวทะเลไหม?", ipa: "kun chɔ̂ɔp bpai tîao tá-lee mǎi?", en: "Do you like going to the sea?" },
                a: { th: "ชอบมากค่ะ ทะเลสวย", ipa: "chɔ̂ɔp mâak kâ, tá-lee sǔuai", en: "I like it very much. The sea is beautiful." }
            },
            {
                q: { th: "เมื่อวานเกิดอะไรขึ้น?", ipa: "mʉ̂ʉa waan gə̀ət à rai kʉ̂n?", en: "What happened yesterday?" },
                a: { th: "รถชนกัน รถพยาบาลมา", ipa: "rót chon gan, rót pá yaa baan maa", en: "Cars collided, an ambulance came." }
            },
            {
                q: { th: "ตอนกลางคืนคุณทำอะไร?", ipa: "dtɔɔn glaang kʉʉn kun tam à rai?", en: "What do you do at night?" },
                a: { th: "ฉันนอน ไม่ก็ดูทีวี", ipa: "chǎn nɔɔn, mâi gɔ̂ɔ duu tii wii", en: "I sleep, or watch TV." }
            },
            {
                q: { th: "คุณหิวไหม มีอะไรกินบ้าง?", ipa: "kun hǐu mǎi, mii à rai gin bâang?", en: "Are you hungry? What is there to eat?" },
                a: { th: "มีข้าวผัดรวมมิตร กินให้อร่อยนะ", ipa: "mii kâao pàt ruam mít, gin hâi à rɔ̀ɔi ná", en: "There is mixed seafood fried rice. Enjoy your meal." }
            },
            {
                q: { th: "ปวดคอ ทำยังไงดี?", ipa: "bpùat kɔɔ, tam yang ngai dii?", en: "My neck hurts, what should I do?" },

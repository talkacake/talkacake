<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ไม่ชอบไวน์ค่ะ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Google Fonts: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f8fafc; /* Slate 50 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        button { touch-action: manipulation; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- Icons ---
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );

        const Icons = {
            Volume2: (props) => (<IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" /></IconBase>),
            BookOpen: (props) => (<IconBase {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></IconBase>),
            Video: (props) => (<IconBase {...props}><polygon points="23 7 16 12 23 17 23 7" /><rect x="1" y="5" width="15" height="14" rx="2" ry="2" /></IconBase>),
            ExternalLink: (props) => (<IconBase {...props}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" x2="21" y1="14" y2="3" /></IconBase>),
            User: (props) => (<IconBase {...props}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></IconBase>),
            Zap: (props) => (<IconBase {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></IconBase>),
            Star: (props) => (<IconBase {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></IconBase>),
            Message: (props) => (<IconBase {...props}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" /></IconBase>),
            Link: (props) => (<IconBase {...props}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" /><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" /></IconBase>)
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconMap = {
                'book': Icons.BookOpen,
                'message': Icons.Message,
                'zap': Icons.Zap,
                'video': Icons.Video,
                'link': Icons.Link,
                'external-link': Icons.ExternalLink,
                'user': Icons.User,
                'star': Icons.Star
            };
            const Comp = iconMap[name.toLowerCase()] || Icons.Star;
            return <Comp size={size} className={className} />;
        };

        // --- TTS Helper ---
        const getThaiVoice = () => {
            const voices = window.speechSynthesis.getVoices();
            return voices.find(v => v.lang.includes('th') || v.name.includes('Thai'));
        };

        // --- Core SmartText Component ---
        const SmartText = ({ th, ipa, en, emoji = null, size = "md", color = "text-slate-700", bg = "bg-transparent", isBlock = false, isTitle = false, isButton = false }) => {
            const [showIPA, setShowIPA] = useState(false);
            const [showEN, setShowEN] = useState(false);

            const speak = (e) => {
                e.stopPropagation();
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(th);
                utterance.lang = 'th-TH';
                utterance.rate = 0.8;
                const thaiVoice = getThaiVoice();
                if (thaiVoice) utterance.voice = thaiVoice;
                window.speechSynthesis.speak(utterance);
            };

            const sizeClasses = {
                sm: "text-base",
                md: "text-lg md:text-xl",
                lg: "text-xl md:text-2xl font-bold",
                xl: "text-2xl md:text-3xl font-bold"
            };

            return (
                <div className={`flex flex-col ${isBlock ? 'w-full' : 'inline-flex align-top'} mb-2`}>
                    <div className={`flex flex-wrap items-center gap-2 ${bg} rounded-xl px-2 py-1`}>
                        {emoji && <span className="text-2xl md:text-3xl shrink-0">{emoji}</span>}
                        
                        {!isTitle && !isButton && (
                            <button 
                                onClick={speak}
                                className="p-1.5 md:p-2 text-indigo-500 bg-indigo-50 hover:bg-indigo-100 rounded-full transition active:scale-95 shadow-sm border border-indigo-100 shrink-0"
                            >
                                <Icons.Volume2 size={18} />
                            </button>
                        )}

                        <span className={`${sizeClasses[size]} ${color} font-medium leading-relaxed ${isTitle ? 'flex-1 text-center text-indigo-700' : ''}`}>
                            {th}
                            {isTitle && !isButton && (
                                <button onClick={speak} className="ml-2 inline-flex text-indigo-400 hover:text-indigo-600 align-middle">
                                    <Icons.Volume2 size={20} />
                                </button>
                            )}
                        </span>
                        
                        {(ipa || en) && !isButton && (
                            <div className={`flex gap-1 shrink-0 ${isTitle ? 'w-full justify-center mt-2' : 'ml-auto'}`}>
                                {ipa && (
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); setShowIPA(!showIPA); }}
                                        className={`px-2 py-0.5 text-[10px] md:text-xs rounded-lg border font-bold uppercase transition
                                            ${showIPA ? 'bg-amber-100 text-amber-700 border-amber-300' : 'bg-slate-100 text-slate-400 border-slate-200'}`}
                                    >
                                        IPA
                                    </button>
                                )}
                                {en && (
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); setShowEN(!showEN); }}
                                        className={`px-2 py-0.5 text-[10px] md:text-xs rounded-lg border font-bold uppercase transition
                                            ${showEN ? 'bg-emerald-100 text-emerald-700 border-emerald-300' : 'bg-slate-100 text-slate-400 border-slate-200'}`}
                                    >
                                        EN
                                    </button>
                                )}
                            </div>
                        )}
                    </div>

                    {(showIPA || showEN) && !isButton && (
                        <div className={`mt-1 pl-3 border-l-2 border-indigo-200 animate-fadeIn ${isTitle ? 'text-center border-l-0 w-full' : 'ml-9 text-left'}`}>
                            {showIPA && ipa && <div className="text-amber-600 font-mono text-sm mb-0.5">/{ipa}/</div>}
                            {showEN && en && <div className="text-emerald-600 italic text-sm">{en}</div>}
                        </div>
                    )}
                </div>
            );
        };

        // --- Data Definitions ---
        const targetVocab = [
            { th: "นมเปรี้ยว", ipa: "nom-bprîao", en: "sour milk", emoji: "🧃" },
            { th: "อย่างอื่น", ipa: "yàang ʉ̀ʉn", en: "other things / anything else", emoji: "🤷" },
            { th: "นอกจาก", ipa: "nɔ̂ɔk jàak", en: "except / besides", emoji: "🚫" },
            { th: "เกลียด", ipa: "glìat", en: "hate", emoji: "😠" },
            { th: "คอล", ipa: "kɔɔn", en: "call (video/voice)", emoji: "📱" }
        ];

        const leadInQuestions = [
            { th: "คุณชอบดื่มไวน์ไหม?", ipa: "kun chɔ̂ɔp dʉ̀ʉm waai mǎi?", en: "Do you like drinking wine?", emoji: "🍷" },
            { th: "คุณคอลกับเพื่อนบ่อยไหม?", ipa: "kun kɔɔn gàp pʉ̂an bɔ̀ɔi mǎi?", en: "Do you call your friends often?", emoji: "📱" },
            { th: "เวลาเพื่อนพูดเรื่องคนอื่น คุณชอบฟังไหม?", ipa: "wee-laa pʉ̂an pûut rʉ̂ang kon ʉ̀ʉn kun chɔ̂ɔp fang mǎi?", en: "When a friend talks about someone else, do you like to listen?", emoji: "👂" }
        ];

        const videoScript = [
            { role: "เพื่อน", th: "ทำไมมึงไม่กินไวน์ที่กูซื้อให้มึงวะ", ipa: "tam-mai mʉng mâi gin waai tîi guu sʉ́ʉ hâi mʉng wá", en: "Why don't you drink the wine I bought for you?", emoji: "😠" },
            { role: "ลัลล์", th: "ลัลล์ไม่ชอบไวน์ค่ะ", ipa: "Lan mâi chɔ̂ɔp waai kâ", en: "Lan doesn't like wine.", emoji: "🍷" },
            { role: "เพื่อน", th: "ค่ะ ไม่ชอบค่ะ", ipa: "kâ, mâi chɔ̂ɔp kâ", en: "Right, doesn't like it.", emoji: "🙄" },
            { role: "ลัลล์", th: "ทำไม มึงจะพูดอะไร อีเจ้", ipa: "tam-mai, mʉng jà pûut à-rai, ii-jêe", en: "Why, what are you going to say, sis?", emoji: "🤨" },
            { role: "เพื่อน", th: "กูน่ะ คอลกับมึงมาชั่วโมงนึงเนี่ย", ipa: "guu nà, kɔɔn gàp mʉng maa chûa-moong nʉng nîa", en: "I've been calling with you for an hour now.", emoji: "📱" },
            { role: "เพื่อน", th: "กูไม่ได้ยินอย่างอื่นเลยนะ", ipa: "guu mâi dâi-yin yàang ʉ̀ʉn ləəi ná", en: "I haven't heard anything else.", emoji: "🤷" },
            { role: "เพื่อน", th: "นอกจากคุณไวน์เขาอย่างงั้น", ipa: "nɔ̂ɔk jàak kun waai kǎo yàang ngán", en: "Except 'Mr. Wine is like that...'", emoji: "🚫" },
            { role: "เพื่อน", th: "คุณไวน์เขาอย่างงี้", ipa: "kun waai kǎo yàang ngíi", en: "'Mr. Wine is like this...'", emoji: "💬" },
            { role: "เพื่อน", th: "คุณไวน์เขาไม่ชอบอันนั้น", ipa: "kun waai kǎo mâi chɔ̂ɔp an nán", en: "'Mr. Wine doesn't like that...'", emoji: "🙅" },
            { role: "เพื่อน", th: "คุณไวน์เขาเกลียดอันนี้", ipa: "kun waai kǎo glìat an níi", en: "'Mr. Wine hates this...'", emoji: "😠" },
            { role: "เพื่อน", th: "ตอนนี้กูรู้แล้วนะว่า ชอบแดกนมเปรี้ยวเนี่ย ฮะ", ipa: "dtɔɔn níi guu rúu lɛ́ɛo ná wâa, chɔ̂ɔp dɛ̀ɛk nom-bprîao nîa, há", en: "Now I know he likes to drink sour milk, huh!", emoji: "🧃" },
            { role: "เพื่อน", th: "เกลียดค่ะ อันนี้คือเกลียดมากค่ะ", ipa: "glìat kâ, an níi kʉʉ glìat mâak kâ", en: "'Hate it', this means you hate it a lot!", emoji: "😤" },
            { role: "ลัลล์", th: "เขาเรียกว่า เก็บ data เนาะ", ipa: "kǎo rîak wâa gèp daa-dtâa nɔ́", en: "It's called collecting data, right?", emoji: "📊" }
        ];

        const comprehensionQuestions = [
            { th: "ลัลล์กับเพื่อนคอลกันนานเท่าไหร่?", ipa: "Lan gàp pʉ̂an kɔɔn gan naan tâo-rài?", en: "How long have Lan and her friend been calling?", emoji: "⏱️" },
            { th: "ลัลล์พูดเรื่องอะไรมากที่สุด?", ipa: "Lan pûut rʉ̂ang à-rai mâak tîi-sùt?", en: "What did Lan talk about the most?", emoji: "💬" },
            { th: "คุณไวน์เกลียดหรือชอบนมเปรี้ยว?", ipa: "kun waai glìat rʉ̌ʉ chɔ̂ɔp nom-bprîao?", en: "Does Mr. Wine hate or like sour milk?", emoji: "🧃" }
        ];

        const activitiesData = [
            {
                type: "บทบาทสมมติ", ipa: "bòt-bàat sǒm-mút", en: "Role-play", emoji: "🎭",
                title: "เพื่อนบ่นเรื่องแฟน", ipa: "pʉ̂an bòn rʉ̂ang fɛɛn", en: "Friend complaining about partner",
                details: [
                    { th: "A: คอลหาเพื่อน บ่นว่าเกลียดแฟน", ipa: "A: kɔɔn hǎa pʉ̂an, bòn wâa glìat fɛɛn", en: "A: Call a friend, complain that you hate your partner." },
                    { th: "B: ฟังเพื่อน และถามว่าทำไม", ipa: "B: fang pʉ̂an, lɛ́ tǎam wâa tam-mai", en: "B: Listen to the friend and ask why." },
                    { th: "คำศัพท์ที่ต้องใช้: คอล, เกลียด, นอกจาก", ipa: "kam-sàp tîi dtɔ̂ng chái: kɔɔn, glìat, nɔ̂ɔk-jàak", en: "Vocab to use: Call, Hate, Except" }
                ]
            },
            {
                type: "เกมพูดคุย", ipa: "geem pûut-kui", en: "Speaking Game", emoji: "🎲",
                title: "ฉันชอบทุกอย่าง... นอกจาก...", ipa: "chǎn chɔ̂ɔp túk yàang... nɔ̂ɔk-jàak...", en: "I like everything... except...",
                details: [
                    { th: "ผลัดกันแต่งประโยค", ipa: "plàt gan dtɛ̀ng bprà-yòok", en: "Take turns making sentences." },
                    { th: "ตัวอย่าง: ฉันกินได้ทุกอย่าง นอกจาก ไวน์", ipa: "dtua-yàang: chǎn gin dâi túk yàang, nɔ̂ɔk-jàak waai", en: "Example: I can eat anything, except wine." },
                    { th: "ตัวอย่าง: ฉันชอบทำทุกอย่าง นอกจาก คอลโทรศัพท์", ipa: "dtua-yàang: chǎn chɔ̂ɔp tam túk yàang, nɔ̂ɔk-jàak kɔɔn too-rá-sàp", en: "Example: I like doing everything, except calling on the phone." }
                ]
            },
            {
                type: "คำถามชวนคุย", ipa: "kam-tǎam chuan-kui", en: "Discussion", emoji: "🗣️",
                title: "คุณชอบ 'เก็บ Data' ไหม?", ipa: "kun chɔ̂ɔp 'gèp Data' mǎi?", en: "Do you like 'collecting data'?",
                details: [
                    { th: "เวลาชอบใคร คุณจะสังเกตเขาไหม?", ipa: "wee-laa chɔ̂ɔp krai, kun jà sǎng-gèet kǎo mǎi?", en: "When you like someone, do you observe them?" },
                    { th: "คุณจำได้ไหมว่าเพื่อนชอบ หรือ เกลียด อะไร?", ipa: "kun jam dâi mǎi wâa pʉ̂an chɔ̂ɔp rʉ̌ʉ glìat à-rai?", en: "Do you remember what your friends like or hate?" }
                ]
            }
        ];

        const extensionData = [
            {
                type: "โต้วาที", ipa: "dtôo-waa-tii", en: "Debate", emoji: "⚖️",
                title: "คอล VS พิมพ์แชท", ipa: "kɔɔn VS pim chɛ́t", en: "Calling VS Chatting",
                details: [
                    { th: "ฝ่าย A: คอลดีกว่า พิมพ์แชท", ipa: "fàai A: kɔɔn dii gwàa pim chɛ́t", en: "Side A: Calling is better than chatting." },
                    { th: "ฝ่าย B: พิมพ์แชท ดีกว่า คอล", ipa: "fàai B: pim chɛ́t dii gwàa kɔɔn", en: "Side B: Chatting is better than calling." },
                    { th: "บอกเหตุผล", ipa: "bɔ̀ɔk hèet-pǒn", en: "Give reasons." }
                ]
            },
            {
                type: "สัมภาษณ์", ipa: "sǎm-pâat", en: "Interview", emoji: "🎤",
                title: "ของที่เกลียดที่สุด", ipa: "kɔ̌ɔng tîi glìat tîi-sùt", en: "The thing you hate the most",
                details: [
                    { th: "สัมภาษณ์เพื่อน", ipa: "sǎm-pâat pʉ̂an", en: "Interview your friend." },
                    { th: "Q: คุณเกลียดอาหารอะไรที่สุด? ทำไม?", ipa: "Q: kun glìat aa-hǎan à-rai tîi-sùt? tam-mai?", en: "Q: What food do you hate the most? Why?" },
                    { th: "Q: นอกจากเรื่องอาหาร คุณเกลียดอะไรอีก?", ipa: "Q: nɔ̂ɔk-jàak rʉ̂ang aa-hǎan, kun glìat à-rai ìik?", en: "Q: Besides food, what else do you hate?" }
                ]
            },
            {
                type: "เล่าเรื่อง", ipa: "lâo rʉ̂ang", en: "Story-telling", emoji: "📖",
                title: "เพื่อนที่ชอบพูดเรื่องแฟน", ipa: "pʉ̂an tîi chɔ̂ɔp pûut rʉ̂ang fɛɛn", en: "A friend who likes to talk about their partner",
                details: [
                    { th: "เล่าเรื่องเพื่อนของคุณ", ipa: "lâo rʉ̂ang pʉ̂an kɔ̌ɔng kun", en: "Tell a story about your friend." },
                    { th: "เพื่อนชอบคอลมาหาไหม?", ipa: "pʉ̂an chɔ̂ɔp kɔɔn maa hǎa mǎi?", en: "Does the friend like to call you?" },
                    { th: "เพื่อนพูดเรื่องอื่นบ้างไหม นอกจากเรื่องแฟน?", ipa: "pʉ̂an pûut rʉ̂ang ʉ̀ʉn bâang mǎi nɔ̂ɔk-jàak rʉ̂ang fɛɛn?", en: "Does the friend talk about other things besides their partner?" }
                ]
            },
            {
                type: "นำเสนอ", ipa: "nam-sà-nə̌ə", en: "Presentation", emoji: "📊",
                title: "วิธีคุยกับเพื่อนที่อกหัก", ipa: "wí-tii kui gàp pʉ̂an tîi òk-hàk", en: "How to talk to a heartbroken friend",
                details: [
                    { th: "แนะนำ 3 วิธี", ipa: "nɛ́-nam sǎam wí-tii", en: "Recommend 3 ways." },
                    { th: "ควรทำอะไร และ ไม่ควรทำอะไร (อย่างอื่น)", ipa: "kuan tam à-rai lɛ́ mâi kuan tam à-rai (yàang ʉ̀ʉn)", en: "What should you do and what shouldn't you do (other things)?" }
                ]
            }
        ];

        // --- App Component ---
        const App = () => {
            const [activeTab, setActiveTab] = useState("lesson");

            const TabButton = ({ id, th, ipa, en, icon }) => (
                <button 
                    onClick={() => setActiveTab(id)} 
                    className={`flex-1 py-3 px-1 rounded-xl transition-all border-2 flex flex-col items-center justify-center gap-1 ${activeTab === id ? 'bg-white border-indigo-500 shadow-md transform -translate-y-1' : 'bg-transparent border-transparent hover:bg-white/50 text-slate-500'}`}
                >
                    <Icon name={icon} size={20} className={activeTab === id ? 'text-indigo-600' : ''} />
                    <div className="w-full text-center">
                        <SmartText th={th} ipa={ipa} en={en} size="sm" color={activeTab === id ? 'text-indigo-800' : 'text-slate-600'} isButton={true} />
                    </div>
                </button>

            return (

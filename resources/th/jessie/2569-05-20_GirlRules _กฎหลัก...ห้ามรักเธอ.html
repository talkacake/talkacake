<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Girl Rules กฎหลัก...ห้ามรักเธอ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .btn-press { transition: transform 0.1s; }
        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const speakThai = (text, e) => {
            if(e) e.stopPropagation();
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        };

        const SmartText = ({ th, ipa, en, size = "md", isTitle = false }) => {
            const [showIPA, setShowIPA] = useState(false);
            const [showEN, setShowEN] = useState(false);
            const textSize = size === "lg" ? "text-xl font-bold" : "text-lg font-medium";

            return (
                <div className={`bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-3 w-full ${isTitle ? 'text-center' : ''}`}>
                    <div className="flex items-center gap-3">
                        <button onClick={(e) => speakThai(th, e)} className="p-2 bg-pink-100 text-pink-600 rounded-full hover:bg-pink-200 transition">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                        </button>
                        <span className={`${textSize} text-slate-800`}>{th}</span>
                    </div>
                    <div className="flex gap-2 mt-2">
                        <button onClick={() => setShowIPA(!showIPA)} className={`px-2 py-1 rounded text-xs font-bold ${showIPA ? 'bg-indigo-600 text-white' : 'bg-slate-200'}`}>IPA</button>
                        <button onClick={() => setShowEN(!showEN)} className={`px-2 py-1 rounded text-xs font-bold ${showEN ? 'bg-emerald-600 text-white' : 'bg-slate-200'}`}>EN</button>
                    </div>
                    {showIPA && <div className="mt-2 text-indigo-600 font-mono text-sm border-l-2 border-indigo-200 pl-2">/{ipa}/</div>}
                    {showEN && <div className="mt-1 text-emerald-700 italic text-sm border-l-2 border-emerald-200 pl-2">{en}</div>}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState("review");
            
            return (
                <div className="max-w-md mx-auto min-h-screen p-4">
                    <h1 className="text-2xl font-bold text-center mb-6 text-pink-700">Girl Rules กฎหลัก...ห้ามรักเธอ</h1>
                    
                    <div className="flex gap-2 mb-6">
                        {['ทบทวน', 'บทเรียน', 'กิจกรรม'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-2 rounded-lg font-bold ${activeTab === tab ? 'bg-pink-600 text-white' : 'bg-white border'}`}>
                                {tab}
                            </button>
                        ))}
                    </div>

                    {activeTab === 'ทบทวน' && <div className="animate-fadeIn"><p className="text-center mb-4">สุ่มคำศัพท์</p><RandomReview /></div>}
                    {activeTab === 'บทเรียน' && <div className="animate-fadeIn"><p className="text-center mb-4">วิดีโอ & บทสนทนา</p></div>}
                    {activeTab === 'กิจกรรม' && <div className="animate-fadeIn"><p className="text-center mb-4">กิจกรรมเสริม</p></div>}
                </div>
            );
        };

        const RandomReview = () => {
            // Vocab list would be placed here
            return <div className="text-center">ฝึกฝนคำศัพท์...</div>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

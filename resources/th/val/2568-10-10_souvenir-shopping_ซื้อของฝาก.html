            story: { thai: 'นักท่องเที่ยวคนหนึ่งอยากจะ <b class="text-blue-600">ซื้อ</b> <b class="text-blue-600">เสื้อเชิ้ต</b> <b class="text-blue-600">แขนสั้น</b> ให้แฟน แต่ดันไปสนใจ <b class="text-blue-600">แว่นกันแดด</b> กับ <b class="text-blue-600">น้ำหอม</b> แทน เขาพยายามจะ <b class="text-blue-600">ต่อราคา</b> แต่ดันเผลอไปขอ <b class="text-blue-600">แลก</b> <b class="text-blue-600">โทรศัพท์</b> ของตัวเองกับ <b class="text-blue-600">เครื่องทำกาแฟ</b> <b class="text-blue-600">คนขาย</b> ก็เลยงงไปเลย!', roman: 'nák thâwng-thîao khon nùng yàak jà séu sêua-chéut kăen-sân hâi faen, dtàe dan bpai sŏn-jai wâen-gan-dàet gàp nám-hŏm thaen. kăo phá-yaa-yaam jà dtòr raa-kaa, dtàe dan phlŏoe bpai kŏr lâek thoo-rá-sàp kŏng dtua-eeng gàp khrêuuang-tham gaa-fae. khon-kăai gôr loie ngong bpai loie!', eng: 'A tourist wants to <b>buy</b> a <b>short-sleeved</b> <b>shirt</b> for their partner, but gets interested in <b>sunglasses</b> and <b>perfume</b> instead. They try to <b>bargain</b>, but accidentally offer to <b>exchange</b> their own <b>phone</b> for a <b>coffee machine</b>. The <b>seller</b> is completely confused!' },
            subtitle: { thai: 'คำศัพท์ที่ควรใช้:', roman: 'kham-sàp thîi khuan chái:', eng: 'Vocabulary to use:' },
            vocab: [
                { thai: 'เสื้อเชิ้ต', roman: 'sʉ̂ʉa-chə́ət', eng: 'Shirts' }, { thai: 'แขนสั้น', roman: 'kɛ̌ɛn sân', eng: 'Short-sleeved' }, { thai: 'ซื้อ', roman: 'sʉ́ʉ', eng: 'Buy' }, { thai: 'ต่อราคา', roman: 'dtɔ̀ɔ raa kaa', eng: 'negotiate the price' }, { thai: 'แลก', roman: 'lɛ̂ɛk', eng: 'exchange' }, { thai: 'โทรศัพท์', roman: 'too-rá-sàp', eng: 'phone' }, { thai: 'คนขาย', roman: 'kon kǎai', eng: 'Seller' }, { thai: 'เครื่องทำกาแฟ', roman: 'krʉ̂ang tam gaa fɛɛ', eng: 'Coffee machine' }, { thai: 'น้ำหอม', roman: 'nám hɔ̌ɔm', eng: 'Perfume' }, { thai: 'แว่นกันแดด', roman: 'wɛ̂ɛn gan dɛ̀ɛt', eng: 'sunglasses' }, { thai: 'ลูกค้าซื้อให้แฟนหรือเปล่าครับ', roman: 'lûuk káa sʉ́ʉ hâi fɛɛn rʉ̌ʉ bplào kráp', eng: 'Are you buying it for your partner?' }

        },
        {
            title: { thai: 'สถานการณ์ที่ 2: กระเป๋าเจ้าปัญหา', roman: 'sà-thăa-ná-gaan thîi sŏng: grà-bpǎo jâo bpan-hăa', eng: 'Scenario 2: The Problematic Bag' },
            story: { thai: '<b class="text-blue-600">ลูกค้า</b> <b class="text-blue-600">ซื้อ</b> <b class="text-blue-600">กระเป๋า</b> สีดำใบ <b class="text-blue-600">ใหม่</b> แล้วถามว่า "<b class="text-blue-600">แล้วใบนี้ใส่โทรศัพท์ได้ไหมครับ</b>" <b class="text-blue-600">คนขาย</b> บอกว่าได้ แต่พอลูกค้า <b class="text-blue-600">ใส่</b> <b class="text-blue-600">โทรศัพท์</b> เข้าไป กระเป๋าดัน <b class="text-blue-600">เสีย</b>! เขาเลยอยากจะ <b class="text-blue-600">เปลี่ยนสี</b> เป็นใบอื่นที่ทำจาก <b class="text-blue-600">เหล็ก</b> แทน', roman: 'lûuk-káa séu grà-bpǎo sĭi-dam bai mài, láew thăam wâa "láew bai níi sài thoo-rá-sàp dâi măi khráp". khon-kăai bòk wâa dâi, dtàe por lûuk-káa sài thoo-rá-sàp khâo bpai, grà-bpǎo dan sĭa! kăo loie yàak jà bplìan sĭi bpen bai èun thîi tham jàak lèk thaen.', eng: 'A <b>customer</b> buys a <b>new</b> black <b>bag</b> and asks, "<b>Can I fit a phone in this bag?</b>" The <b>seller</b> says yes, but when the customer <b>puts</b> the <b>phone</b> inside, the bag is <b>broken</b>! So they want to <b>change the color</b> to another one made of <b>metal</b> instead.' },
            subtitle: { thai: 'คำศัพท์ที่ควรใช้:', roman: 'kham-sàp thîi khuan chái:', eng: 'Vocabulary to use:' },
            vocab: [
                { thai: 'กระเป๋า', roman: 'grà bpǎo', eng: 'Bags (with zip)' }, { thai: 'ลูกค้า', roman: 'lûuk káa', eng: 'Customer' }, { thai: 'ใหม่', roman: 'mài', eng: 'New' }, { thai: 'เสีย', roman: 'sǐa', eng: 'broken' }, { thai: 'เปลี่ยนสี', roman: 'bplìan sǐi', eng: 'change colour' }, { thai: 'ใส่', roman: 'sài', eng: 'Put on/wear' }, { thai: 'โทรศัพท์', roman: 'too-rá-sàp', eng: 'phone' }, { thai: 'เหล็ก', roman: 'lèk', eng: 'Metal' }, { thai: 'แล้วใบนี้ใส่โทรศัพท์ได้ไหมครับ', roman: 'lɛ́ɛo bai níi sài too-rá-sàp dâi mǎi kráp', eng: 'Can I fit a phone in this bag?' }
            ]
        },
        {
            title: { thai: 'สถานการณ์ที่ 3: สงครามไข่ต้ม', roman: 'sà-thăa-ná-gaan thîi săam: sŏng-khraam kài-dtôm', eng: 'Scenario 3: The Boiled Egg War' },
            story: { thai: '<b class="text-blue-600">ลูกค้า</b> ถามว่า "<b class="text-blue-600">ขายยังไงจ๊ะแม่ค้า</b>" แม่ค้าตอบว่า <b class="text-blue-600">ไข่ต้ม</b> "<b class="text-blue-600">ฟองละห้าบาทจ้า</b>" ลูกค้าโวยวาย "<b class="text-blue-600">แม่ค้า ทำไมขายแพงอย่างนั้นน่ะ</b>" แม่ค้าบ่นว่า "<b class="text-blue-600">ค่าของแพงจ้า</b>" ขายราคานี้ <b class="text-blue-600">ขาดทุน</b> เดี๋ยวก็ <b class="text-blue-600">เจ๊งกะบ๊ง</b> พอดี!', roman: 'lûuk-káa thăam wâa "kăai yang-ngai já mɛ̂ɛ-káa", mɛ̂ɛ-káa dtòp wâa kài-dtôm "fong lá hâa bàat jâa". lûuk-káa woei-waai "mɛ̂ɛ-káa, tham-mai kăai pɛɛng yàang-nán nà". mɛ̂ɛ-káa bòn wâa "khâa kŏng pɛɛng jâa", kăai raa-kaa níi kàat-thun, dĭao gôr jéng-gà-bóng por-dii!', eng: 'A <b>customer</b> asks, "<b>How do you sell these?</b>" The seller replies that the <b>boiled eggs</b> are "<b>5 baht per egg</b>." The customer exclaims, "<b>Seller, why are you selling them so expensive?</b>" The seller complains, "<b>The cost of goods is expensive!</b>" Selling at this price is a <b>loss</b>, she\'ll go <b>bankrupt</b>!' },
            subtitle: { thai: 'คำศัพท์ที่ควรใช้:', roman: 'kham-sàp thîi khuan chái:', eng: 'Vocabulary to use:' },
            vocab: [
                { thai: 'ไข่ต้มจ้ะ', roman: 'kài dtôm jâ', eng: 'Boiled eggs' }, { thai: 'ขายยังไงจ๊ะแม่ค้า', roman: 'kǎai yang ngai já mɛ̂ɛ káa', eng: 'How do you sell it?' }, { thai: 'ฟองละห้าบาทจ้า', roman: 'fɔɔng lá hâa bàat jâa', eng: '5 baht per egg' }, { thai: 'แพง', roman: 'pɛɛng', eng: 'Expensive' }, { thai: 'แม่ค้า ทำไมขายแพงอย่างนั้นน่ะ', roman: 'mɛ̂ɛ káa tam mai kǎai pɛɛng yàang nán nà', eng: 'Seller, why so expensive?' }, { thai: 'ค่าของแพงจ้า', roman: 'kâa kɔ̌ɔng pɛɛng jâa', eng: 'The cost of goods is expensive.' }, { thai: 'ขาดทุน', roman: 'kàat tun', eng: 'to make a loss' }, { thai: 'เจ๊งกะบ๊ง', roman: 'jéng gà bóng', eng: 'Gone bankrupt' }
            ]
        }
    ];
    
    // --- Web Speech API Setup ---
    let synth;
    let voices;
    function loadVoices() {
        if (typeof speechSynthesis === 'undefined') return;
        synth = window.speechSynthesis;
        const setVoices = () => { voices = synth.getVoices(); };
        setVoices();
        if (synth.onvoiceschanged !== undefined) { synth.onvoiceschanged = setVoices; }
    }
    loadVoices();

    function speak(text) {
        if (!synth) { console.error('TTS not supported.'); return; }
        if (synth.speaking) { synth.cancel(); }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'th-TH';
        utterance.rate = 0.9;
        const thaiVoice = (voices || []).find(voice => voice.lang === 'th-TH');
        if (thaiVoice) utterance.voice = thaiVoice;
        synth.speak(utterance);
    }

    // --- Helper Function ---
    function createTranslatableElement(data, tag = 'div', classes = '') {
        const container = document.createElement(tag);
        container.className = `translatable-container ${classes}`;
        
        const contentSpan = document.createElement('span');
        contentSpan.className = 'thai-text';
        contentSpan.innerHTML = `${data.thai} <button class="speak-btn">🔊</button>`;
        
        const translationDiv = document.createElement('div');
        translationDiv.className = 'translation-block';
        translationDiv.style.display = 'none';
        translationDiv.innerHTML = `
            <p class="phonetics text-sm text-gray-500 italic">${data.roman}</p>
            <p class="translation text-sm text-gray-700">${data.eng}</p>
        `;
        
        container.appendChild(contentSpan);
        container.appendChild(translationDiv);
        return container;
    }

    // --- Populate UI with Thai text ---
    function populateUI() {
        document.getElementById('main-title').appendChild(createTranslatableElement(uiText.mainTitle, 'span'));
        document.getElementById('part1-heading').appendChild(createTranslatableElement(uiText.part1.heading, 'span'));
        document.getElementById('part1-instruction').appendChild(createTranslatableElement(uiText.part1.instruction, 'span'));
        document.getElementById('part1-comprehension-heading').appendChild(createTranslatableElement(uiText.part1.compHeading, 'span'));
        const qList = document.getElementById('part1-questions');
        [uiText.part1.q1, uiText.part1.q2, uiText.part1.q3].forEach(q => qList.appendChild(createTranslatableElement(q, 'li')));

        document.getElementById('part2-heading').appendChild(createTranslatableElement(uiText.part2.heading, 'span'));
        document.getElementById('part2-instruction').appendChild(createTranslatableElement(uiText.part2.instruction, 'span'));
        document.getElementById('part3-heading').appendChild(createTranslatableElement(uiText.part3.heading, 'span'));
        document.getElementById('part3-instruction').appendChild(createTranslatableElement(uiText.part3.instruction, 'span'));
        document.getElementById('part4-heading').appendChild(createTranslatableElement(uiText.part4.heading, 'span'));
        document.getElementById('part4-instruction').appendChild(createTranslatableElement(uiText.part4.instruction, 'span'));
        document.getElementById('roleplay1-heading').appendChild(createTranslatableElement(uiText.part4.rp1_heading, 'span'));
        document.getElementById('roleplay1-instruction').appendChild(createTranslatableElement(uiText.part4.rp1_instruction, 'span'));
        document.getElementById('roleplay1-next').textContent = uiText.part4.rp1_button.thai;

        document.getElementById('part5-heading').appendChild(createTranslatableElement(uiText.part5.heading, 'span'));
        document.getElementById('part5-cultural-heading').appendChild(createTranslatableElement(uiText.part5.cultural_heading, 'span'));
        const culturalTipsList = document.getElementById('part5-cultural-tips');
        [uiText.part5.tip1, uiText.part5.tip2].forEach(tip => culturalTipsList.appendChild(createTranslatableElement(tip, 'li')));
        document.getElementById('part5-final-message').appendChild(createTranslatableElement(uiText.part5.final_message, 'span'));

        document.getElementById('bonus-heading').appendChild(createTranslatableElement(uiText.bonus.heading, 'span'));
        document.getElementById('bonus-instruction').appendChild(createTranslatableElement(uiText.bonus.instruction, 'span'));
    }
    populateUI();

    // --- Populate Content ---
    const vocabList = document.getElementById('vocab-list');
    vocabulary.forEach(item => vocabList.appendChild(createTranslatableElement(item, 'div', 'p-3 bg-gray-50 rounded-lg border')));

    const scriptContainer = document.getElementById('script-container');
    scriptWithTranslations.forEach(item => {
        const div = document.createElement('div');
        const speakerClass = item.speaker.includes('Customer') ? 'text-blue-800' : 'text-green-800';
        div.className = 'p-2 rounded-md hover:bg-blue-100 transition translatable-container';
        div.innerHTML = `
            <div class="flex items-center">
                <strong class="${speakerClass} mr-2">${item.speaker}:</strong>
                <span class="thai-text">${item.line} <button class="speak-btn">🔊</button></span>
                ${item.insight ? `<button class="insight-toggle text-blue-500 font-bold ml-2">(?)</button>` : ''}
            </div>
            <div class="translation-block" style="display: none;">
                <p class="phonetics text-sm text-gray-500 italic">${item.roman}</p>
                <p class="translation text-sm text-gray-700">${item.eng}</p>
            </div>
            ${item.insight ? `<p class="insight text-sm text-gray-700">${item.insight}</p>` : ''}
        `;
        scriptContainer.appendChild(div);
    });

    const bonusScenariosContainer = document.getElementById('bonus-vocab-scenarios');
    bonusScenarios.forEach(scenario => {
        const scenarioDiv = document.createElement('div');
        scenarioDiv.className = 'scenario-card';

        const title = createTranslatableElement(scenario.title, 'h4', 'scenario-title');
        const story = createTranslatableElement(scenario.story, 'p', 'scenario-story');
        const subtitle = createTranslatableElement(scenario.subtitle, 'h5', 'vocab-subtitle');
        
        const vocabGrid = document.createElement('div');
        vocabGrid.className = 'vocab-grid';

        scenario.vocab.forEach(item => {
            vocabGrid.appendChild(createTranslatableElement(item, 'div', 'p-2 border rounded'));
        });
        
        scenarioDiv.appendChild(title);
        scenarioDiv.appendChild(story);
        scenarioDiv.appendChild(subtitle);
        scenarioDiv.appendChild(vocabGrid);
        bonusScenariosContainer.appendChild(scenarioDiv);
    });


    // --- Event Delegation for whole page ---
    document.body.addEventListener('click', (e) => {
        const speakBtn = e.target.closest('.speak-btn');
        if (speakBtn) {
            e.stopPropagation();
            const text = speakBtn.closest('.thai-text').textContent.replace('🔊', '').trim();
            speak(text);
            return;
        }
        const insightToggle = e.target.closest('.insight-toggle');
        if (insightToggle) {
            e.stopPropagation();
            const insightP = insightToggle.closest('.translatable-container').querySelector('.insight');
            if(insightP) insightP.style.display = insightP.style.display === 'block' ? 'none' : 'block';
            return;
        }
        const translatableContainer = e.target.closest('.translatable-container');
        if (translatableContainer) {
            const translationBlock = translatableContainer.querySelector('.translation-block');
            if (translationBlock) {
                 translationBlock.style.display = translationBlock.style.display === 'block' ? 'none' : 'block';
            }
        }
    });

    // --- Role-Play Logic ---
    const roleplay1Chat = document.getElementById('roleplay1-chat');
    const roleplay1NextBtn = document.getElementById('roleplay1-next');
    
    const roleplayPrompts = [
        { type: 'prompt', data: { yourTurn: { thai: 'ตาคุณแล้ว:', roman: 'dtaa khun láew:', eng: 'Your turn:' }, promptLine: { thai: 'คุณอยู่ที่ตลาด ถามคนขายว่าใช้บัตรเครดิตได้ไหม', roman: 'khun yòo thîi dtà-làat, thăam khon-kăai wâa chái bàt khree-dìt dâi măi', eng: 'You are at a market. Ask the seller if you can use a credit card.' } } },
        { type: 'answer', data: scriptWithTranslations[0] },
        { type: 'seller', data: scriptWithTranslations[1] },
        { type: 'prompt', data: { yourTurn: { thai: 'ตาคุณแล้ว:', roman: 'dtaa khun láew:', eng: 'Your turn:' }, promptLine: { thai: 'ชี้ไปที่ยาหม่องแล้วถามราคา', roman: 'chíi bpai thîi yaa-mòng láew thăam raa-khaa', eng: 'Point to the herbal balm and ask the price.' } } },
        { type: 'answer', data: { speaker: 'ลูกค้า', line: 'อันนี้เท่าไหร่ครับ', roman: 'an níi thâo-rài khráp', eng: 'How much is this?' } },
        { type: 'seller', data: { speaker: 'คนขาย', line: '450 ครับ', roman: 'sìi rói hâa sìp khráp', eng: '450.' } },
        { type: 'prompt', data: { yourTurn: { thai: 'ตาคุณแล้ว:', roman: 'dtaa khun láew:', eng: 'Your turn:' }, promptLine: { thai: 'บอกคนขายว่า "แพงไป" แล้วขอส่วนลด', roman: 'bòk khon-kăai wâa "pɛɛng bpai" láew kŏr sùan-lót', eng: 'Tell the seller "It\'s too expensive" and ask for a discount.' } } },
        { type: 'answer', data: { speaker: 'ลูกค้า', line: 'แพงไปครับ ลดได้ไหมครับ', roman: 'pɛɛng bpai khráp, lót dâi măi khráp', eng: 'Too expensive. Can you give a discount?' } },
        { type: 'seller', data: { speaker: 'คนขาย', line: '440 ได้ครับ', roman: 'sìi rói sìi sìp dâi khráp', eng: 'I can do 440.' } },
        { type: 'prompt', data: { yourTurn: { thai: 'ตาคุณแล้ว:', roman: 'dtaa khun láew:', eng: 'Your turn:' }, promptLine: { thai: 'บอกคนขายว่า "จะซื้อเยอะนะ" แล้วเสนอราคา 420', roman: 'bòk khon-kăai wâa "jà séu yə́ ná" láew sà-nŏoe raa-khaa sìi rói yîi sìp', eng: 'Tell the seller "I will buy a lot" and offer the price of 420.' } } },
        { type: 'answer', data: { speaker: 'ลูกค้า', line: 'ผมจะซื้อเยอะนะ 420 ได้ไหม', roman: 'phŏm jà séu yə́ ná, sìi rói yîi sìp dâi măi', eng: 'I will buy a lot, can you do 420?' } },
        { type: 'seller', data: { speaker: 'คนขาย', line: 'โอเคๆ 420 ก็ได้', roman: 'oo-khee oo-khee, sìi rói yîi sìp gôr dâi', eng: 'Okay okay, 420 is fine.' } },
        { type: 'seller', data: { speaker: 'คนขาย', line: 'เยี่ยมมากครับ!', roman: 'yîam mâak khráp!', eng: 'Excellent!' } }
    ];
    let roleplayIndex = 0;

    function addInteractiveBubble(container, data, speaker) {
        const bubble = document.createElement('div');
        const speakerClass = speaker === 'seller' ? 'seller-bubble' : 'buyer-bubble';
        bubble.className = `chat-bubble ${speakerClass}`;
        const content = createTranslatableElement({thai: data.line, roman: data.roman, eng: data.eng});
        bubble.appendChild(content);
        container.appendChild(bubble);
        container.scrollTop = container.scrollHeight;
    }
    
    function addPrompt(container, data) {
        const promptDiv = document.createElement('div');
        promptDiv.className = 'prompt';
        const yourTurn = createTranslatableElement(data.yourTurn, 'p', 'font-semibold');
        const promptLine = createTranslatableElement(data.promptLine, 'p');
        promptDiv.appendChild(yourTurn);
        promptDiv.appendChild(promptLine);
        container.appendChild(promptDiv);
        container.scrollTop = container.scrollHeight;
    }

    roleplay1NextBtn.addEventListener('click', () => {
        if (roleplayIndex >= roleplayPrompts.length) {
             roleplay1NextBtn.disabled = true;
             roleplay1NextBtn.textContent = "จบแล้ว!";
             return;
        }
        const current = roleplayPrompts[roleplayIndex];
        if (current.type === 'seller') {
            addInteractiveBubble(roleplay1Chat, current.data, 'seller');
        } else if (current.type === 'prompt') {
            addPrompt(roleplay1Chat, current.data);
            roleplay1NextBtn.textContent = "แสดงคำตอบ"; // Show Answer
        } else if (current.type === 'answer') {
            addInteractiveBubble(roleplay1Chat, current.data, 'buyer');
            roleplay1NextBtn.textContent = "ต่อไป"; // Next
        }
        roleplayIndex++;
    });

});
</script>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รักสุดท้าย My Safe Zone - Speaking Lesson</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0fdf4; 
        }
        
        .smart-text-card {
            transition: all 0.3s ease;
        }

        .ipa-text {
            color: #d946ef; 
            font-family: 'Courier New', monospace;
        }

        .en-text {
            color: #2563eb; 
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #86efac;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4ade80;
        }

        .btn-toggle {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 12px;
            transition: all 0.2s;
            border: 1px solid #e5e7eb;
        }
        .btn-toggle.active-ipa {
            background-color: #fdf4ff;
            border-color: #d946ef;
            color: #d946ef;
        }
        .btn-toggle.active-en {
            background-color: #eff6ff;
            border-color: #2563eb;
            color: #2563eb;
        }
        
        .game-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-left: 6px solid #10b981;
        }

        .video-container {
            position: relative;
            min-height: 400px;
            border-radius: 1rem;
            background-color: #fff;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
    </style>
</head>
<body class="text-gray-800 pb-20">

            <div id="intro-title"></div>
            <div id="intro-desc"></div>
        </section>

        <!-- 1. Vocabulary Review Game (Now Section 1) -->
        <section id="review-section" class="space-y-6">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600">
                    <i class="fas fa-random"></i>
                </div>
                <!-- Smart Heading -->
                <div id="heading-review" class="flex-1"></div>
            </div>

            <div class="bg-gradient-to-br from-emerald-50 to-teal-50 p-8 rounded-3xl border border-emerald-100 text-center shadow-md">

                <!-- The Card Display -->

                <button onclick="randomVocab()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transform active:scale-95 transition-all flex items-center gap-2 mx-auto">

        <!-- 2. Video & Script (Now Section 2) -->

            <!-- Video Embed (X/Twitter) -->

        <!-- 5. Story Game -->

        <!-- 6. Create Menu -->

                    <i class="fas fa-utensils"></i>
                </div>

            </div>

                <div id="menu-intro"></div>
                
                <!-- Menu Card Template -->
                <div class="bg-amber-50 p-6 rounded-xl border border-amber-200 shadow-sm relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 text-amber-100 opacity-50">
                        <i class="fas fa-coffee text-9xl"></i>
                    </div>
                    
                    <h3 class="text-lg font-bold text-amber-800 mb-4 border-b border-amber-200 pb-2">My Safe Zone Cafe Menu</h3>
                    
                    <div class="space-y-4 relative z-10">

                            <label class="text-xs font-bold text-amber-600 uppercase tracking-wide">Name of Dish</label>

                        </div>
                        <div>
                            <label class="text-xs font-bold text-amber-600 uppercase tracking-wide">Ingredients (ส่วนผสม)</label>
                            <div id="menu-ingredients-prompt" class="mt-1"></div>
                        </div>
                         <div>
                            <label class="text-xs font-bold text-amber-600 uppercase tracking-wide">Why it's special?</label>

    </main>

    <!-- Footer -->

        <p>© 2024 Thai Speaking Lesson. Practice makes perfect!</p>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // --- DATA STORE ---
        const vocabList = [
            { thai: "ความสบายใจ", ipa: "khwaam-sa-baai-jai", en: "Peace of mind / Comfort" },
            { thai: "พื้นที่ปลอดภัย", ipa: "phuean-thii-plawd-phai", en: "Safe space / Safe zone" },
            { thai: "ยอมรับตัวตน", ipa: "yawm-rap-dtua-dton", en: "Accept one's true self" },
            { thai: "ความเข้าใจ", ipa: "khwaam-khao-jai", en: "Understanding" },
            { thai: "อยู่เคียงข้าง", ipa: "yuu-khiang-khaang", en: "Stay by (someone's) side" },
            { thai: "รักแท้", ipa: "rak-thae", en: "True love" },
            { thai: "อ้อมกอด", ipa: "aawm-gawt", en: "Embrace / Hug" },
            { thai: "ความอบอุ่น", ipa: "khwaam-op-un", en: "Warmth" }
        ];

        const content = {
            intro: {
                title: { thai: "ยินดีต้อนรับสู่บทเรียน: รักสุดท้าย My Safe Zone", ipa: "yin-dee-dtawn-rap suu bot-rian: rak-sut-thaai My Safe Zone", en: "Welcome to the lesson: My Last Love, My Safe Zone" },
                desc: { thai: "วันนี้เราจะฝึกพูดเกี่ยวกับความรักและความปลอดภัยทางใจ", ipa: "wan-nee rao ja fuek phuut giao-gap khwaam-rak lae khwaam-plawd-phai thaang-jai", en: "Today we will practice speaking about love and emotional safety." }
            },
            // NEW HEADINGS DATA
            headings: {
                review: { thai: "1. กิจกรรมทบทวนคำศัพท์", ipa: "git-ja-gam thop-thuan kham-sap", en: "1. Vocab Review Activity" },
                video: { thai: "2. ดูวิดีโอและบทสนทนา", ipa: "duu video lae bot-son-tha-naa", en: "2. Watch Video & Script" },
                script: { thai: "บทสนทนา (Script)", ipa: "bot-son-tha-naa", en: "Dialogue / Script" },
                videoTask: { thai: "คำถามจากวิดีโอ", ipa: "kham-thaam jaak video", en: "Questions from the video" },
                roleplay: { thai: "3. บทบาทสมมติสุดฮา", ipa: "bot-baat-som-mut sut haa", en: "3. Funny Role-Play" },
                debate: { thai: "4. โต้วาที", ipa: "dto-waa-thii", en: "4. Debate" },
                story: { thai: "5. เกมแต่งเรื่องต่อกัน", ipa: "game dtaeng rueang dtaw gan", en: "5. Story Chain Game" },
                menu: { thai: "6. กิจกรรมคิดเมนู", ipa: "git-ja-gam khit menu", en: "6. Create Menu Activity" }
            },
            // UPDATED SCRIPT
            scriptLines: [
                { thai: "ลิน: ละที่ให้ลินช่วยคิดเมนูใหม่อ่ะ ลินต้องทำไรมั่ง", ipa: "Lin: la thii hai Lin chuay khit menu mai a, Lin dtong tham rai mang", en: "Lin: So about asking me to help think of a new menu, what do I have to do?" }
            ],
            // UPDATED VIDEO TASK
            videoTask: {
                question: { thai: "ลินถามเกี่ยวกับการทำอะไร?", ipa: "Lin thaam giao-gap gaan tham a-rai?", en: "What did Lin ask about doing?" }
            },
            review: {
                instruction: { thai: "สุ่มคำศัพท์และแต่งประโยคให้เพื่อนฟัง", ipa: "sum kham-sap lae dtaeng pra-yok hai phuean fang", en: "Randomly select a word and make a sentence for your friends." }
            },
            roleplay: {
                title: { thai: "สถานการณ์: Safe Zone ที่ลืมวันครบรอบ", ipa: "sa-thaa-na-gaan: Safe Zone thii luem wan-khrop-rawp", en: "Scenario: The Safe Zone who forgot the anniversary" },
                scenario: { thai: "คุณลืมวันครบรอบแฟน! คุณต้องพูดแก้ตัวว่า 'ที่ฉันลืม เพราะฉันรู้สึกปลอดภัยกับเธอมากจนลืมวันเวลา'", ipa: "khun luem wan-khrop-rawp faen! khun dtong phuut gae-dtua waa 'thii chan luem phraw chan ruu-suek plawd-phai gap thoe maak jon luem wan-we-laa'", en: "You forgot your anniversary! You must make an excuse saying 'I forgot because I feel so safe with you that I lost track of time'." },
                task: { thai: "จับคู่และแสดงบทบาทสมมติ (คนหนึ่งโกรธ คนหนึ่งง้อ)", ipa: "jap-khuu lae sa-daeng bot-baat-som-mut (khon nueng grot, khon nueng ngaw)", en: "Pair up and roleplay (One person is angry, one tries to reconcile)." }
            },
            debate: {
                topic: { thai: "หัวข้อ: คนรักที่ดีต้อง 'ตื่นเต้น' หรือ 'สบายใจ'?", ipa: "hua-kaw: khon-rak thii dee dtong 'dtuen-dten' rue 'sa-baai-jai'?", en: "Topic: Should a good lover be 'Exciting' or 'Comforting'?" },
                sideA: { title: "ทีมตื่นเต้น (Exciting)", desc: "ความรักต้องมีสีสัน ไม่น่าเบื่อ (Love needs color, not boring)" },
                sideB: { title: "ทีมสบายใจ (Comfort)", desc: "ความรักคือการพักผ่อน (Love is resting)" } 
            },
            story: {
                instruction: { thai: "ช่วยกันแต่งเรื่องต่อกัน โดยใช้คำว่า...", ipa: "chuay-gan dtaeng rueang dtaw-gan doi chai kham waa...", en: "Help each other continue the story using the word..." },
                starter: { thai: "กาลครั้งหนึ่งนานมาแล้ว ฉันเดินเข้าไปในป่าแห่งความรัก...", ipa: "gaan-la-khrang-nueng naan maa laeo, chan doen khao bpai nai bpaa haeng khwaam-rak...", en: "Once upon a time, I walked into the forest of love..." }
            },
            menu: {
                intro: { thai: "สมมติว่าคุณเปิดคาเฟ่ชื่อ 'My Safe Zone' ลองคิดเมนูพิเศษ 1 อย่าง", ipa: "som-mut waa khun bpoet cafe chue 'My Safe Zone' long khit menu phi-set 1 yaang", en: "Imagine you open a cafe called 'My Safe Zone'. Create 1 special menu item." },
                namePrompt: { thai: "ชื่อเมนู (เช่น ลาเต้อุ่นใจ)", ipa: "chue-menu (chen laa-dtei un-jai)", en: "Menu Name (e.g., Warm Heart Latte)" },
                ingrPrompt: { thai: "ส่วนผสม (เช่น ความรัก 2 ช้อน)", ipa: "suan-phasom (chen khwaam-rak 2 chawn)", en: "Ingredients (e.g., 2 spoons of love)" },
                whyPrompt: { thai: "ทำไมกินแล้วถึงรู้สึกปลอดภัย?", ipa: "tham-mai gin laeo thueng ruu-suek plawd-phai?", en: "Why does eating this make you feel safe?" }
            }
        };

        // --- CORE FUNCTIONS ---

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function createSmartText(data, sizeClass = "text-lg") {
            const id = Math.random().toString(36).substr(2, 9);
            
            return `
                <div class="smart-text-container group relative inline-block w-full" id="${id}">
                    <div class="flex flex-wrap items-center gap-2 mb-1">
                        <span class="thai-text font-medium ${sizeClass} text-gray-800 leading-relaxed cursor-pointer hover:text-emerald-700 transition-colors" onclick="speak('${data.thai}')">
                            ${data.thai}
                        </span>
                        
                        <div class="inline-flex gap-1 opacity-100 sm:opacity-50 group-hover:opacity-100 transition-opacity ml-2">
                            <button onclick="speak('${data.thai}')" class="w-6 h-6 rounded-full bg-gray-100 hover:bg-emerald-100 text-gray-500 hover:text-emerald-600 flex items-center justify-center transition-all" title="Listen">
                                <i class="fas fa-volume-up text-xs"></i>
                            </button>
                            <button onclick="toggleVisibility('${id}', 'ipa', this)" class="btn-toggle text-xs text-gray-500 hover:text-fuchsia-600">IPA</button>
                            <button onclick="toggleVisibility('${id}', 'en', this)" class="btn-toggle text-xs text-gray-500 hover:text-blue-600">EN</button>
                        </div>
                    </div>

                    <div class="ipa-content hidden mt-1 ml-1" data-target="ipa">
                        <span class="text-sm ipa-text block bg-fuchsia-50 px-2 py-1 rounded w-fit">/${data.ipa}/</span>
                    </div>
                    <div class="en-content hidden mt-1 ml-1" data-target="en">
                        <span class="text-sm en-text block bg-blue-50 px-2 py-1 rounded w-fit italic">${data.en}</span>
                    </div>
                </div>
            `;
        }

        function toggleVisibility(containerId, type, btn) {
            const container = document.getElementById(containerId);
            const content = container.querySelector(`[data-target="${type}"]`);
            
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                if (type === 'ipa') btn.classList.add('active-ipa');
                else btn.classList.add('active-en');
            } else {
                content.classList.add('hidden');
                if (type === 'ipa') btn.classList.remove('active-ipa');
                else btn.classList.remove('active-en');
            }
        }

        function initPage() {
            // Intro
            document.getElementById('intro-title').innerHTML = createSmartText(content.intro.title, "text-2xl");
            document.getElementById('intro-desc').innerHTML = createSmartText(content.intro.desc);
            
            // HEADINGS INJECTION
            document.getElementById('heading-review').innerHTML = createSmartText(content.headings.review, "text-xl font-bold");
            document.getElementById('heading-video').innerHTML = createSmartText(content.headings.video, "text-xl font-bold");
            document.getElementById('heading-script').innerHTML = createSmartText(content.headings.script, "text-lg font-bold");
            document.getElementById('heading-video-task').innerHTML = createSmartText(content.headings.videoTask, "text-lg font-bold");
            document.getElementById('heading-roleplay').innerHTML = createSmartText(content.headings.roleplay, "text-xl font-bold");
            document.getElementById('heading-debate').innerHTML = createSmartText(content.headings.debate, "text-xl font-bold");
            document.getElementById('heading-story').innerHTML = createSmartText(content.headings.story, "text-xl font-bold");
            document.getElementById('heading-menu').innerHTML = createSmartText(content.headings.menu, "text-xl font-bold");

            // Script Section
            const scriptContainer = document.getElementById('script-content');
            scriptContainer.innerHTML = content.scriptLines.map((line, index) => 
                `<div class="p-2 ${index % 2 === 0 ? 'bg-gray-50' : 'bg-white'} rounded-lg border border-transparent hover:border-gray-200">
                    ${createSmartText(line, "text-base")}
                 </div>`
            ).join('');

            // Video Task
            document.getElementById('video-task-question').innerHTML = createSmartText(content.videoTask.question);

            // Review Instruction
            document.getElementById('review-instruction').innerHTML = createSmartText(content.review.instruction);

            // Roleplay
            document.getElementById('roleplay-title').innerHTML = createSmartText(content.roleplay.title, "text-xl");
            document.getElementById('roleplay-scenario').innerHTML = createSmartText(content.roleplay.scenario);
            document.getElementById('roleplay-task').innerHTML = createSmartText(content.roleplay.task, "text-base");

            // Debate
            document.getElementById('debate-topic').innerHTML = createSmartText(content.debate.topic, "text-xl");
            document.getElementById('debate-side-a').innerHTML = createSmartText({ thai: "ทีมตื่นเต้น", ipa: "thiim dtuen-dten", en: "Team Excitement" });
            document.getElementById('debate-desc-a').innerHTML = createSmartText({ thai: "ความรักต้องมีสีสัน ไม่น่าเบื่อ", ipa: "khwaam-rak dtong mii sii-san mai naa-buea", en: "Love must be colorful, not boring." });
            document.getElementById('debate-side-b').innerHTML = createSmartText({ thai: "ทีมสบายใจ", ipa: "thiim sa-baai-jai", en: "Team Comfort" });
            document.getElementById('debate-desc-b').innerHTML = createSmartText({ thai: "ความรักคือการพักผ่อน", ipa: "khwaam-rak khue gaan-phak-phon", en: "Love is resting." });

            // Story
            document.getElementById('story-instruction').innerHTML = createSmartText(content.story.instruction);
            document.getElementById('story-starter').innerHTML = createSmartText(content.story.starter, "text-xl");

            // Menu Task
            document.getElementById('menu-intro').innerHTML = createSmartText(content.menu.intro);
            document.getElementById('menu-name-prompt').innerHTML = createSmartText(content.menu.namePrompt, "text-base");
            document.getElementById('menu-ingredients-prompt').innerHTML = createSmartText(content.menu.ingrPrompt, "text-base");
            document.getElementById('menu-why-prompt').innerHTML = createSmartText(content.menu.whyPrompt, "text-base");
        }

        // 4. Game Logic: Random Vocab
        function randomVocab() {
            const display = document.getElementById('vocab-display');
            
            // Animation effect
            display.classList.add('scale-95', 'opacity-50');
            
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * vocabList.length);
                const word = vocabList[randomIndex];
                
                display.innerHTML = `
                    <div class="w-full text-center fade-in">
                        <div class="mb-2 text-sm text-emerald-500 font-bold tracking-widest uppercase">Your Word</div>
                        ${createSmartText(word, "text-4xl")}
                        <div class="mt-6 pt-4 border-t border-gray-100 w-full">
                            <p class="text-sm text-gray-500 mb-2">Task:</p>
                            <p class="text-gray-700 font-medium">แต่งประโยคด้วยคำนี้ (Make a sentence)</p>
                        </div>
                    </div>
                `;
                
                // Reset animation
                display.classList.remove('scale-95', 'opacity-50');
                
                // Auto speak the new word
                speak(word.thai);
            }, 200);
        }

        // Initialize on Load
        window.onload = initPage;

    </script>

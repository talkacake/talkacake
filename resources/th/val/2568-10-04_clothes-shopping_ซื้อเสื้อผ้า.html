            tip2: { thai: 'รู้ว่าควรต่อราคาที่ไหน การต่อราคาเป็นเรื่องปกติในตลาดกลางคืน ตลาดนัดสุดสัปดาห์ (เช่น จตุจักร) และร้านค้าริมทาง แต่จะไม่ทำในร้านสะดวกซื้อ ซูเปอร์มาร์เก็ต หรือห้างสรรพสินค้าใหญ่ๆ ที่มีป้ายราคาชัดเจน', roman: 'rúu wâa khuan dtòr raa-kaa thîi năi...', eng: 'Know where to bargain. It\'s expected at night markets, weekend markets (like Chatuchak), and street stalls. It\'s not done in convenience stores, supermarkets, or high-end malls with fixed prices.' },
            tip3: { thai: 'ขอให้สนุก! สนุกไปกับขั้นตอนการซื้อของและบทสนทนากับคนขายในท้องถิ่น', roman: 'kŏr hâi sà-nùk! sà-nùk bpai gàp khân-dton gaan séu kŏng láe bòt sŏn-thá-naa gàp khon-kăai nai thóng-thìn', eng: 'Have fun! Enjoy the process and the conversation with local sellers.' },
            final_message: { thai: 'คุณทำได้เยี่ยมมาก! ขอให้สนุกกับการช้อปปิ้งที่เมืองไทยนะ!', roman: 'khun tham dâi yîam mâak! kŏr hâi sà-nùk gàp gaan chóp-bpîng thîi meuuang thai ná!', eng: 'You did a great job! Have a wonderful and fun time shopping in Thailand!' }
        }
    };
    
    // --- Web Speech API Setup ---
    let synth;
    let voices;

    function loadVoices() {
        if (typeof speechSynthesis === 'undefined') return;
        synth = window.speechSynthesis;
        const setVoices = () => {
            voices = synth.getVoices();
        };
        setVoices();
        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = setVoices;
        }
    }
    loadVoices();

    function speak(text) {
        if (!synth) {
            console.error('Text-to-speech not supported.');
            return;
        }
        if (synth.speaking) {
            synth.cancel();
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'th-TH';
        utterance.rate = 0.9;
        const thaiVoice = (voices || []).find(voice => voice.lang === 'th-TH');
        if (thaiVoice) utterance.voice = thaiVoice;
        synth.speak(utterance);
    }

    // --- Helper Function ---
    function createTranslatableElement(data, tag = 'div', classes = '') {
        const container = document.createElement(tag);
        container.className = `translatable-container ${classes}`;
        container.innerHTML = `
            <span class="thai-text">${data.thai} <button class="speak-btn">🔊</button></span>
            <div class="translation-block" style="display: none;">
                <p class="phonetics text-sm text-gray-500 italic">${data.roman}</p>
                <p class="translation text-sm text-gray-700">${data.eng}</p>
            </div>
        `;
        return container;
    }

    // --- Populate UI with Thai text ---
    function populateUI() {
        document.getElementById('main-title').appendChild(createTranslatableElement(uiText.mainTitle, 'span'));
        document.getElementById('part2-heading').appendChild(createTranslatableElement(uiText.part2.heading, 'span'));
        document.getElementById('part2-instruction').appendChild(createTranslatableElement(uiText.part2.instruction, 'span'));
        document.getElementById('part2-comprehension-heading').appendChild(createTranslatableElement(uiText.part2.compHeading, 'span'));
        
        const qList = document.getElementById('part2-questions');
        [uiText.part2.q1, uiText.part2.q2, uiText.part2.q3].forEach(q => {
             qList.appendChild(createTranslatableElement(q, 'li'));
        });

        document.getElementById('part3-heading').appendChild(createTranslatableElement(uiText.part3.heading, 'span'));
        document.getElementById('part3-instruction').appendChild(createTranslatableElement(uiText.part3.instruction, 'span'));

        document.getElementById('part4-heading').appendChild(createTranslatableElement(uiText.part4.heading, 'span'));
        document.getElementById('part4-instruction').appendChild(createTranslatableElement(uiText.part4.instruction, 'span'));

        document.getElementById('part5-heading').appendChild(createTranslatableElement(uiText.part5.heading, 'span'));
        document.getElementById('part5-instruction').appendChild(createTranslatableElement(uiText.part5.instruction, 'span'));
        document.getElementById('roleplay1-heading').appendChild(createTranslatableElement(uiText.part5.rp1_heading, 'span'));
        document.getElementById('roleplay1-instruction').appendChild(createTranslatableElement(uiText.part5.rp1_instruction, 'span'));
        document.getElementById('roleplay1-next').textContent = uiText.part5.rp1_button.thai;
        document.getElementById('roleplay2-heading').appendChild(createTranslatableElement(uiText.part5.rp2_heading, 'span'));
        document.getElementById('roleplay2-instruction').appendChild(createTranslatableElement(uiText.part5.rp2_instruction, 'span'));
        document.getElementById('roleplay2-next').textContent = uiText.part5.rp2_button.thai;

        document.getElementById('part6-heading').appendChild(createTranslatableElement(uiText.part6.heading, 'span'));
        document.getElementById('part6-keyphrases-heading').appendChild(createTranslatableElement(uiText.part6.keyphrases_heading, 'span'));

        const keyPhrasesList = document.getElementById('part6-keyphrases-list');
        const keyPhrases = [
            { thai: 'อันนี้เท่าไหร่คะ', roman: 'an-níi thâo-rài khá', eng: 'How much is this?' },
            { thai: 'ลดได้ไหมคะ', roman: 'lót dâi măi khá', eng: 'Can you give a discount?' },
            { thai: '...บาท ไม่ได้เหรอ', roman: '...bàat, mâi dâi lĕor', eng: 'Can\'t you do ... Baht?' }
        ];
        keyPhrases.forEach(phrase => {
            keyPhrasesList.appendChild(createTranslatableElement(phrase, 'li'));
        });

        document.getElementById('part6-cultural-heading').appendChild(createTranslatableElement(uiText.part6.cultural_heading, 'span'));
        
        const culturalTipsList = document.getElementById('part6-cultural-tips');
        [uiText.part6.tip1, uiText.part6.tip2, uiText.part6.tip3].forEach(tip => {
            culturalTipsList.appendChild(createTranslatableElement(tip, 'li'));
        });
        document.getElementById('part6-final-message').appendChild(createTranslatableElement(uiText.part6.final_message, 'span'));
    }
    
    populateUI();

    // --- Populate Content ---
    const vocabList = document.getElementById('vocab-list');
    vocabulary.forEach(item => {
        vocabList.appendChild(createTranslatableElement(item, 'div', 'p-3 bg-gray-50 rounded-lg border'));
    });

    const scriptContainer = document.getElementById('script-container');
    scriptWithTranslations.forEach(item => {
        const div = document.createElement('div');
        const speakerClass = item.speaker.includes('Buyer') ? 'text-blue-800' : 'text-green-800';
        div.className = 'p-2 rounded-md hover:bg-blue-100 transition translatable-container';
        div.innerHTML = `
            <div class="flex items-center">
                <strong class="${speakerClass} mr-2">${item.speaker}:</strong>
                <span class="thai-text">${item.line} <button class="speak-btn">🔊</button></span>
                ${item.insight ? `<button class="insight-toggle text-blue-500 font-bold ml-2">(?)</button>` : ''}
            </div>
            <div class="translation-block" style="display: none;">
                <p class="phonetics text-sm text-gray-500 italic">${item.roman}</p>
                <p class="translation text-sm text-gray-700">${item.eng}</p>
            </div>
            ${item.insight ? `<p class="insight text-sm text-gray-700">${item.insight}</p>` : ''}
        `;
        scriptContainer.appendChild(div);
    });

    // --- Event Delegation for whole page ---
    document.body.addEventListener('click', (e) => {
        const speakBtn = e.target.closest('.speak-btn');
        if (speakBtn) {
            e.stopPropagation(); // prevent container click
            const text = speakBtn.closest('.thai-text, [data-text]').textContent.replace('🔊', '').trim();
            speak(text);
            return;
        }

        const insightToggle = e.target.closest('.insight-toggle');
        if (insightToggle) {
            e.stopPropagation();
            const insightP = insightToggle.closest('.translatable-container, div').querySelector('.insight');
            if(insightP) insightP.style.display = insightP.style.display === 'block' ? 'none' : 'block';
            return;
        }

        const translatableContainer = e.target.closest('.translatable-container');
        if (translatableContainer) {
            const translationBlock = translatableContainer.querySelector('.translation-block');
            if (translationBlock) {
                 translationBlock.style.display = translationBlock.style.display === 'block' ? 'none' : 'block';
            }
        }
    });

    // --- Role-Play Logic ---
    const roleplay1Chat = document.getElementById('roleplay1-chat');
    const roleplay1NextBtn = document.getElementById('roleplay1-next');
    let roleplay1Index = 0;

    function addInteractiveBubble(container, data, speaker) {
        const bubble = document.createElement('div');
        const speakerClass = speaker === 'seller' ? 'seller-bubble' : 'buyer-bubble';
        bubble.className = `chat-bubble ${speakerClass} translatable-container`;
        bubble.innerHTML = `
            <span class="thai-text">${data.line} <button class="speak-btn">🔊</button></span>
            <div class="translation-block" style="display: none;">
                <p class="phonetics text-xs italic">${data.roman}</p>
                <p class="translation text-xs">${data.eng}</p>
            </div>
        `;
        container.appendChild(bubble);
        container.scrollTop = container.scrollHeight;
    }

    roleplay1NextBtn.addEventListener('click', () => {
        if (roleplay1Index >= scriptWithTranslations.length) {
            roleplay1NextBtn.disabled = true;
            roleplay1NextBtn.textContent = "จบแล้ว!";
            return;
        }
        const currentLine = scriptWithTranslations[roleplay1Index];
        const speaker = currentLine.speaker.includes('Seller') ? 'seller' : 'buyer';
        addInteractiveBubble(roleplay1Chat, currentLine, speaker);
        roleplay1Index++;
    });

    // Role-Play 2
    const roleplay2Chat = document.getElementById('roleplay2-chat');
    const roleplay2NextBtn = document.getElementById('roleplay2-next');
    const roleplay2Prompts = [
        { type: 'seller', line: 'สวัสดีครับ/ค่ะ มีอะไรให้ช่วยไหม', roman: 'sà-wàt-dii khráp/khâ, mii à-rai hâi chûay măi', eng: 'Hello, can I help you?' },
        { type: 'prompt', line: 'You see a shirt you like. Ask how much it is.' },
        { type: 'answer', data: scriptWithTranslations[0] },
        { type: 'seller', data: scriptWithTranslations[1] },
        { type: 'prompt', line: 'Say it\'s pretty and ask for a discount.' },
        { type: 'answer', data: scriptWithTranslations[8] },
        { type: 'seller', data: scriptWithTranslations[9] },
        { type: 'prompt', line: 'Counter-offer with 800 Baht.' },
        { type: 'answer', data: scriptWithTranslations[12] },
        { type: 'seller', data: scriptWithTranslations[13] },
        { type: 'prompt', line: 'Confirm the deal and say you will take it.' },
        { type: 'answer', data: scriptWithTranslations[18] },
        { type: 'seller', data: scriptWithTranslations[19] },
        { type: 'prompt', line: 'Say you will pay with cash.' },
        { type: 'answer', data: scriptWithTranslations[20] },
        { type: 'seller', line: 'ขอบคุณครับ/ค่ะ!', roman: 'khòp khun khráp/khâ!', eng: 'Thank you!' }
    ];
    let roleplay2Index = 0;
    
    function addPrompt(container, text) {
        const promptDiv = document.createElement('div');
        promptDiv.className = 'prompt';
        promptDiv.innerHTML = `<p class="font-semibold">Your turn:</p><p>${text}</p>`;
        container.appendChild(promptDiv);
        container.scrollTop = container.scrollHeight;
    }

    roleplay2NextBtn.addEventListener('click', () => {
        if (roleplay2Index >= roleplay2Prompts.length) {
            addInteractiveBubble(roleplay2Chat, {line: 'เก่งมากค่ะ!', roman: 'gèng mâak khâ!', eng: 'Great job!'}, 'seller');
            roleplay2NextBtn.disabled = true;
            roleplay2NextBtn.textContent = "จบแล้ว!";
            return;
        }
        const current = roleplay2Prompts[roleplay2Index];
        if (current.type === 'seller') {
            addInteractiveBubble(roleplay2Chat, current.data || current, 'seller');
        } else if (current.type === 'prompt') {
            addPrompt(roleplay2Chat, current.line);
            roleplay2NextBtn.textContent = "แสดงคำตอบ"; // Show Answer
        } else if (current.type === 'answer') {
            addInteractiveBubble(roleplay2Chat, current.data, 'buyer');
            roleplay2NextBtn.textContent = "ต่อไป"; // Next
        }
        roleplay2Index++;
    });
});
</script>

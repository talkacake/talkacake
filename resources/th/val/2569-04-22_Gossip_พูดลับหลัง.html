<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8fafc; /* Very light slate background */
            color: #334155;
        }
        
        .ipa-text {
            color: #8b5cf6; /* Purple */
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
        }

        .en-text {
            color: #ec4899; /* Pink */
            font-style: italic;
            font-size: 0.95rem;
        }

        .btn-toggle {
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            background: white;
            transition: all 0.2s;
            cursor: pointer;
            color: #64748b;
        }
        .btn-toggle:hover {
            background-color: #f1f5f9;
        }
        .btn-toggle.active-ipa {
            background-color: #f5f3ff;
            border-color: #8b5cf6;
            color: #8b5cf6;
            font-weight: 600;
        }
        .btn-toggle.active-en {
            background-color: #fdf2f8;
            border-color: #ec4899;
            color: #ec4899;
            font-weight: 600;
        }

        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(71, 85, 105, 0.1);
        }

        @keyframes popUp {
            0% { transform: scale(0.8) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-pop {
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="pb-24">

    <!-- Navbar -->

    <!-- Main Content -->

            <div class="bg-white p-6 md:p-8 rounded-3xl card-shadow border border-blue-50 text-center relative overflow-hidden">
                <div id="instruction-review" class="mb-6 relative z-10"></div>
                
                <div id="vocab-card" class="bg-gradient-to-b from-blue-50 to-indigo-50 p-8 rounded-2xl min-h-[180px] flex flex-col items-center justify-center mb-8 border border-indigo-100 shadow-inner">
                    <p class="text-indigo-400 italic text-lg"><i class="fas fa-hand-pointer mr-2 animate-bounce"></i>กดปุ่มเพื่อสุ่มคำศัพท์...</p>
                </div>

                <button onclick="spinRoulette()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-full shadow-lg transform active:scale-95 transition-all flex items-center gap-2 mx-auto text-lg relative z-10">
                    <i class="fas fa-sync-alt"></i>
                    <span>สุ่มคำศัพท์</span>
                </button>
            </div>
        </section>

        <!-- 2. Lead-in Section -->

                <div class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center text-purple-500 text-2xl shadow-sm">🤔</div>
                <div id="heading-leadin" class="flex-1"></div>
            </div>

            <div class="bg-white p-6 md:p-8 rounded-3xl card-shadow border-l-8 border-purple-400">
                <ul id="leadin-questions" class="space-y-6">
                    <!-- Questions injected via JS -->
                </ul>
            </div>
        </section>

        <!-- 3. Video Section -->

            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-rose-100 flex items-center justify-center text-rose-500 text-2xl shadow-sm">🎬</div>
                <div id="heading-video" class="flex-1"></div>
            </div>

            <div class="bg-white p-6 md:p-8 rounded-3xl card-shadow border border-rose-50">
                
                <!-- TikTok Link Button (Since vt.tiktok embeds often fail) -->
                <div class="text-center mb-8">
                    <div class="text-5xl mb-4">📱🤫</div>
                    <a href="https://vt.tiktok.com/ZS9daRJGh/" target="_blank" class="inline-flex items-center gap-3 bg-slate-800 hover:bg-slate-900 text-white font-medium py-3 px-8 rounded-full transition-colors shadow-md">
                        <i class="fab fa-tiktok text-xl"></i>
                        <span>เปิดดูวิดีโอบน TikTok (0:00 - 0:20)</span>

                <div class="bg-gradient-to-b from-rose-50 to-white p-4 md:p-6 rounded-2xl border border-rose-100 shadow-inner">

                    <div id="script-content" class="space-y-4">

                    </div>
                </div>
            </div>
        </section>

        <!-- 4. Comprehension Section -->
        <section class="space-y-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-amber-100 flex items-center justify-center text-amber-500 text-2xl shadow-sm">❓</div>
                <div id="heading-comprehension" class="flex-1"></div>
            </div>

            <div class="bg-white p-6 md:p-8 rounded-3xl card-shadow border-t-8 border-amber-400">
                <ul id="comprehension-questions" class="space-y-6">
                    <!-- Questions injected via JS -->
                </ul>
            </div>
        </section>

        <!-- 5. Target Vocab Section -->
        <section class="space-y-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-pink-100 flex items-center justify-center text-pink-500 text-2xl shadow-sm">🎯</div>
                <div id="heading-vocab" class="flex-1"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="target-vocab-list">

            </div>
        </section>

        <!-- 6. Discussion Section -->
        <section class="space-y-4">

                <div class="w-12 h-12 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-500 text-2xl shadow-sm">💬</div>

            <div class="bg-white p-6 md:p-8 rounded-3xl card-shadow border-t-8 border-emerald-400">

                </ul>

        </section>

        <!-- 7. Real-life Role-Play -->

            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-fuchsia-100 flex items-center justify-center text-fuchsia-500 text-2xl shadow-sm">🎭</div>
                <div id="heading-roleplay" class="flex-1"></div>
            </div>

            <div class="bg-white p-6 md:p-8 rounded-3xl card-shadow border border-fuchsia-50">

                <div class="grid md:grid-cols-2 gap-6">
                    <div class="border-2 border-rose-100 p-6 rounded-2xl bg-white shadow-sm hover:shadow-md transition-shadow relative mt-4">
                        <div class="absolute -top-6 left-1/2 transform -translate-x-1/2 text-5xl bg-white px-2 rounded-full">😡👩‍⚕️</div>
                        <div id="rp-role-a" class="mt-2"></div>
                    </div>
                    <div class="border-2 border-indigo-100 p-6 rounded-2xl bg-white shadow-sm hover:shadow-md transition-shadow relative mt-4">
                        <div class="absolute -top-6 left-1/2 transform -translate-x-1/2 text-5xl bg-white px-2 rounded-full">🤫😅</div>
                        <div id="rp-role-b" class="mt-2"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 8. Real-life Debate -->
        <section class="space-y-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-orange-100 flex items-center justify-center text-orange-500 text-2xl shadow-sm">⚖️</div>
                <div id="heading-debate" class="flex-1"></div>
            </div>

            <div class="bg-white p-6 md:p-8 rounded-3xl card-shadow border-t-8 border-orange-400">
                <div id="debate-topic" class="mb-8 text-center bg-orange-50 p-6 rounded-2xl border border-orange-100 shadow-sm"></div>

                <div class="flex flex-col md:flex-row gap-6">
                    <div class="flex-1 border-2 border-blue-200 p-6 rounded-2xl text-center bg-blue-50 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 bg-blue-400"></div>
                        <div class="text-5xl mb-4">🗣️💥</div>
                        <div id="debate-side-a"></div>
                    </div>
                    <div class="flex items-center justify-center text-gray-300 font-black text-2xl">VS</div>
                    <div class="flex-1 border-2 border-purple-200 p-6 rounded-2xl text-center bg-purple-50 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 bg-purple-400"></div>
                        <div class="text-5xl mb-4">🤐💬</div>
                        <div id="debate-side-b"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 9. Extension Activities -->
        <section class="space-y-4 pt-12 border-t-2 border-dashed border-indigo-200">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 text-2xl shadow-sm">⏱️</div>
                <div id="heading-extension" class="flex-1"></div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <!-- Interview -->
                <div class="bg-white p-6 rounded-2xl card-shadow border-l-8 border-slate-300">
                    <div class="text-4xl mb-4">🎤🤫</div>
                    <div id="ext-interview-title" class="mb-3"></div>
                    <div id="ext-interview-desc" class="p-3 bg-slate-50 rounded-lg"></div>
                </div>
                <!-- Story telling -->
                <div class="bg-white p-6 rounded-2xl card-shadow border-l-8 border-slate-300">
                    <div class="text-4xl mb-4">📖😅</div>
                    <div id="ext-story-title" class="mb-3"></div>
                    <div id="ext-story-desc" class="p-3 bg-slate-50 rounded-lg"></div>
                </div>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="mt-20 py-8 text-center bg-white border-t border-slate-200">
        <p class="text-slate-500 text-sm font-medium"><i class="fas fa-comment-dots text-indigo-400"></i> Have fun practicing Thai! <i class="fas fa-comment-dots text-indigo-400"></i></p>
    </footer>

    <!-- JAVASCRIPT -->
    <script>
        // --- DATA STORE ---
        const content = {
            mainTitle: { t: "🗣️ พูดลับหลัง (Gossip)", i: "pûut láp lǎng", e: "Speaking Behind Someone's Back" },
            headings: {
                review: { t: "ทบทวนคำศัพท์เก่า 🎲", i: "tóp-tuan kăm-sàp gào", e: "Review Old Vocabulary" },
                leadin: { t: "ก่อนดูวิดีโอ... มาคุยกันหน่อย 🤔", i: "gɔ̀ɔn duu wí-dii-oo... maa kui gan nɔ̀ɔi", e: "Before watching... let's chat" },
                video: { t: "ดูวิดีโอและบทสนทนา 🎬", i: "duu wí-dii-oo lɛ́ bòt-sŏn-tá-naa", e: "Watch Video & Dialogue" },
                script: { t: "บทสนทนา 💬", i: "bòt-sŏn-tá-naa", e: "Dialogue / Script" },
                comprehension: { t: "คำถามจากวิดีโอ ❓", i: "kăm-tăam jàak wí-dii-oo", e: "Questions from the video" },
                discussion: { t: "มาคุยกันหลังดูวิดีโอ 💬", i: "maa kui gan lǎng duu wí-dii-oo", e: "Let's discuss after watching" },
                vocab: { t: "คำศัพท์เป้าหมาย 🎯", i: "kăm-sàp bpâo-mǎai", e: "Target Vocabulary" },
                roleplay: { t: "บทบาทสมมติในชีวิตจริง 🎭", i: "bòt-bàat sŏm-mút nai chii-wít jing", e: "Real-life Role-Play" },
                debate: { t: "โต้วาทีในชีวิตจริง ⚖️", i: "dtôo-waa-tii nai chii-wít jing", e: "Real-life Debate" },
                extension: { t: "กิจกรรมเสริม (ถ้ามีเวลาเหลือ) ⏱️", i: "gìt-jà-gam sěrm", e: "Extension Activities (If extra time)" }
            },
            review: {
                instruction: { t: "กดปุ่มเพื่อสุ่มคำศัพท์ พยายามอ่านด้วยตัวเองก่อน แล้วแต่งประโยคให้ครูฟัง 🗣️", i: "gòt bpùm pʉ̂a sùm kăm-sàp, pá-yaa-yaam àan dûai dtua-eeng gɔ̀ɔn, lɛ́ɛo dtɛ̀ng bprà-yòok hâi kruu fang", e: "Press the button to spin a word. Try to read it by yourself first, then make a sentence." }
            },
            leadin: [
                { t: "1. ที่ทำงานของคุณมีคนชอบ 'เม้ามอย' หรือพูดนินทาไหม? 🤫", i: "tîi-tam-ngaan kɔ̌ɔng kun mii kon chɔ̂ɔp 'máao mɔɔi' rʉ̌ʉ pûut nin-taa mǎi?", e: "1. Are there people who like to 'gossip' at your workplace?" },
                { t: "2. คุณเคยมีคน 'พูดลับหลัง' คุณไหม? คุณรู้สึกยังไง และทำยังไง? 😠", i: "kun kəəi mii kon 'pûut láp-lǎng' kun mǎi? kun rúu-sʉ̀k yang-ngai lɛ́ tam yang-ngai?", e: "2. Have you ever had someone 'talk behind your back'? How did you feel and what did you do?" }
            ],
            scriptLines: [
                { t: "👩‍⚕️ โบว์: วันนี้เคสเยอะ 📋", i: "boo: wan-níi kéet yə́", e: "Bow: Today there are many cases." },
                { t: "👨‍⚕️ เปรม: เหรอ 🤔", i: "bpreem: rə̌ə", e: "Prem: Oh really?" },
                { t: "👩‍🔬 พยาบาล1: คุณหมอคนนี้แหละที่มีคนมาพังงานแต่ง 💒💥", i: "pá-yaa-baan nʉ̀ng: kun mɔ̌ɔ kon níi lɛ̀ tîi mii kon maa păng ngaan-dtɛ̀ng", e: "Nurse 1: This is the doctor whose wedding got crashed." },
                { t: "👩‍🔬 พยาบาล1: เพราะว่าที่เจ้าบ่าวไปทำผู้หญิงคนอื่นท้องอ่ะ 🤰", i: "pá-yaa-baan nʉ̀ng: prɔ́-wâa tîi jâo-bàao bpai tam pûu-yǐng kon ʉ̀ʉn tɔ́ɔng à", e: "Nurse 1: Because the groom got another woman pregnant." },
                { t: "👩‍🔬 พยาบาล2: จริงดิ 😳", i: "pá-yaa-baan sɔ̌ɔng: jing dì", e: "Nurse 2: Really?" },
                { t: "👩‍🔬 พยาบาล1: อื้อ 🤫", i: "pá-yaa-baan nʉ̀ng: ʉ̂ʉ", e: "Nurse 1: Yeah." },
                { t: "👩‍⚕️ โบว์: แน่จริงก็มาพูดต่อหน้าสิ 🗣️😠", i: "boo: nɛ̂ɛ jing gɔ̂ɔ maa pûut dtɔ̀ɔ-nâa sì", e: "Bow: If you're so brave, come say it to my face." },
                { t: "👩‍⚕️ โบว์: พูดลับหลังทำไม 🙄", i: "boo: pûut láp-lǎng tam-mai", e: "Bow: Why talk behind my back?" },
                { t: "👩‍🔬 พยาบาล: ขอโทษค่ะ 🙏😰", i: "pá-yaa-baan: kɔ̌ɔ-tôot kâ", e: "Nurse: Sorry." }
            ],
            questions: [
                { t: "1. พยาบาลสองคนกำลังคุยเรื่องอะไรเกี่ยวกับหมอโบว์? 🗣️", i: "pá-yaa-baan sɔ̌ɔng kon gam-lang kui rʉ̂ang à-rai gìao-gàp mɔ̌ɔ boo?", e: "1. What are the two nurses talking about regarding Dr. Bow?" },
                { t: "2. ทำไมงานแต่งงานของหมอโบว์ถึงพัง? 💔", i: "tam-mai ngaan-dtɛ̀ng-ngaan kɔ̌ɔng mɔ̌ɔ boo tʉ̌ng păng?", e: "2. Why was Dr. Bow's wedding ruined?" },
                { t: "3. หมอโบว์ได้ยินที่พยาบาลพูดไหม? แล้วหมอโบว์พูดว่าอะไร? 👂😠", i: "mɔ̌ɔ boo dâai-yin tîi pá-yaa-baan pûut mǎi? lɛ́ɛo mɔ̌ɔ boo pûut wâa à-rai?", e: "3. Did Dr. Bow hear what the nurses said? And what did she say?" }
            ],
            discussionQuestions: [
                { t: "1. ถ้าคุณเป็นหมอโบว์ คุณจะทำยังไงกับพยาบาลสองคนนี้หลังจากพูดจบ? 🤔", i: "tâa kun bpen mɔ̌ɔ boo, kun jà tam yang-ngai gàp pá-yaa-baan sɔ̌ɔng kon níi lǎng-jàak pûut jòp?", e: "1. If you were Dr. Bow, what would you do with these two nurses after saying that?" },
                { t: "2. คุณคิดว่าการ 'พูดลับหลัง' เป็นเรื่องปกติในที่ทำงานไหม? ทำไมคนถึงชอบทำ? 🏢", i: "kun kít wâa gaan 'pûut láp-lǎng' bpen rʉ̂ang bpòk-gà-dtì nai tîi-tam-ngaan mǎi? tam-mai kon tʉ̌ng chɔ̂ɔp tam?", e: "2. Do you think 'talking behind someone's back' is normal in the workplace? Why do people like to do it?" }
            ],
            targetVocab: [
                { t: "💒 พังงานแต่ง", i: "păng ngaan-dtɛ̀ng", e: "to ruin/crash a wedding" },
                { t: "🤰 ท้อง", i: "tɔ́ɔng", e: "pregnant (or stomach)" },
                { t: "💪 แน่จริง", i: "nɛ̂ɛ jing", e: "if you're brave enough / so sure" },
                { t: "🗣️ พูดต่อหน้า", i: "pûut dtɔ̀ɔ-nâa", e: "to speak to (someone's) face" },
                { t: "🤫 พูดลับหลัง", i: "pûut láp-lǎng", e: "to speak behind (someone's) back" }
            ],
            roleplay: {
                scenario: { t: "สถานการณ์: ในห้องพักพนักงานที่ออฟฟิศ ☕🏢", i: "sà-tǎa-ná-gaan: nai hɔ̂ɔng pák pá-nák-ngaan tîi ɔ́pfít", e: "Scenario: In the staff break room at the office." },
                roleA: { t: "บทบาท A: คุณได้ยินเพื่อนร่วมงาน (B) 'พูดลับหลัง' คุณว่าคุณทำงานช้า คุณต้องเข้าไปเผชิญหน้าและบอกให้เขา 'พูดต่อหน้า' ถ้ายูน่ะ 'แน่จริง' 😠👉", i: "bòt-bàat A: kun dâai-yin pʉ̂an-rûam-ngaan (B) 'pûut láp-lǎng' kun wâa kun tam-ngaan cháa. kun dtɔ̂ng kâo bpai pà-chəən-nâa...", e: "Role A: You heard a coworker (B) 'talking behind your back' that you work slowly. Confront them and tell them to 'speak to your face' if they are 'brave enough'." },
                roleB: { t: "บทบาท B: คุณกำลังเม้ามอยเพลินๆ แต่เพื่อนร่วมงาน (A) มาได้ยินพอดี คุณตกใจและพยายามแก้ตัวหรือขอโทษ 😰🙏", i: "bòt-bàat B: kun gam-lang máo-mɔɔi pləən-pləən dtɛ̀ɛ pʉ̂an-rûam-ngaan (A) maa dâai-yin pɔɔ-dii. kun dtòk-jai lɛ́ pá-yaa-yaam gɛ̂ɛ-dtua...", e: "Role B: You are happily gossiping, but your coworker (A) overhears you. You are shocked and try to make excuses or apologize." }

            { t: "🧑‍✈️ ทำตาม", i: "tam-dtaam", e: "follow (instructions)" }
        ];

        // --- CORE FUNCTIONS ---

        function speak(text) {
            window.speechSynthesis.cancel();
            // Regex to remove all emojis before speaking
            const cleanText = text.replace(/[\u{1F600}-\u{1F6FF}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
            const utterance = new SpeechSynthesisUtterance(cleanText.trim());
            utterance.lang = 'th-TH';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function createSmartText(data, classes = "text-lg") {
            const id = Math.random().toString(36).substr(2, 9);
            const thai = data.thai || data.t;
            const ipa = data.ipa || data.i;
            const en = data.en || data.e;

            return `
                <div class="inline-block w-full text-left" id="${id}">
                    <div class="flex flex-wrap items-center gap-2 mb-1">
                        <span class="font-medium ${classes} text-slate-700 cursor-pointer hover:text-indigo-500 transition-colors" onclick="speak('${thai}')">
                            ${thai}
                        </span>
                        
                        <div class="inline-flex gap-1 ml-1">
                            <button onclick="speak('${thai}')" class="w-6 h-6 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 hover:text-indigo-600 flex items-center justify-center transition-all shadow-sm">
                                <i class="fas fa-volume-up text-xs"></i>
                            </button>
                            <button onclick="toggleVisibility('${id}', 'ipa', this)" class="btn-toggle shadow-sm">IPA</button>
                            <button onclick="toggleVisibility('${id}', 'en', this)" class="btn-toggle shadow-sm">EN</button>
                        </div>
                    </div>

                    <div class="ipa-content hidden mt-1 ml-2 pl-3 border-l-2 border-purple-300" data-target="ipa">
                        <span class="ipa-text">/${ipa}/</span>
                    </div>
                    <div class="en-content hidden mt-1 ml-2 pl-3 border-l-2 border-pink-300" data-target="en">
                        <span class="en-text">${en}</span>
                    </div>
                </div>
            `;
        }

        function toggleVisibility(containerId, type, btn) {
            const container = document.getElementById(containerId);
            const content = container.querySelector(`[data-target="${type}"]`);
            
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                if (type === 'ipa') btn.classList.add('active-ipa');
                else btn.classList.add('active-en');
            } else {
                content.classList.add('hidden');
                if (type === 'ipa') btn.classList.remove('active-ipa');
                else btn.classList.remove('active-en');
            }
        }

        function spinRoulette() {
            const card = document.getElementById('vocab-card');
            card.innerHTML = `<i class="fas fa-spinner fa-spin text-5xl text-indigo-300"></i>`;
            
            setTimeout(() => {
                const word = vocabPool[Math.floor(Math.random() * vocabPool.length)];
                card.innerHTML = `
                    <div class="animate-pop w-full text-center">
                        ${createSmartText(word, "text-3xl md:text-4xl text-indigo-900")}
                    </div>
                `;
                // Intentionally removed auto-speak so student reads first
            }, 600);
        }

        window.onload = function() {
            // Headings
            document.getElementById('main-page-title').innerHTML = createSmartText(content.mainTitle, "text-2xl font-bold text-indigo-600 flex justify-center");
            document.getElementById('heading-review').innerHTML = createSmartText(content.headings.review, "text-xl font-bold text-blue-700");
            document.getElementById('heading-leadin').innerHTML = createSmartText(content.headings.leadin, "text-xl font-bold text-purple-700");
            document.getElementById('heading-video').innerHTML = createSmartText(content.headings.video, "text-xl font-bold text-rose-700");
            document.getElementById('heading-script').innerHTML = createSmartText(content.headings.script, "text-lg font-bold text-gray-800");
            document.getElementById('heading-comprehension').innerHTML = createSmartText(content.headings.comprehension, "text-xl font-bold text-amber-700");
            document.getElementById('heading-discussion').innerHTML = createSmartText(content.headings.discussion, "text-xl font-bold text-emerald-700");
            document.getElementById('heading-vocab').innerHTML = createSmartText(content.headings.vocab, "text-xl font-bold text-pink-700");
            document.getElementById('heading-roleplay').innerHTML = createSmartText(content.headings.roleplay, "text-xl font-bold text-fuchsia-700");
            document.getElementById('heading-debate').innerHTML = createSmartText(content.headings.debate, "text-xl font-bold text-orange-700");
            document.getElementById('heading-extension').innerHTML = createSmartText(content.headings.extension, "text-lg font-bold text-slate-600");

            // Sections
            document.getElementById('instruction-review').innerHTML = createSmartText(content.review.instruction);

            document.getElementById('leadin-questions').innerHTML = content.leadin.map(q => 
                `<li class="bg-purple-50 p-4 rounded-xl border border-purple-100">${createSmartText(q, "text-base")}</li>`
            ).join('');

            document.getElementById('script-content').innerHTML = content.scriptLines.map((line, index) => {
                const isBow = line.t.includes('โบว์:');
                const bgColor = isBow ? 'bg-rose-50 border-rose-100' : 'bg-white border-gray-100';
                return `<div class="p-3 rounded-xl shadow-sm border ${bgColor}">${createSmartText(line, "text-base")}</div>`;
            }).join('');

            document.getElementById('comprehension-questions').innerHTML = content.questions.map(q => 
                `<li class="bg-amber-50 p-4 rounded-xl border border-amber-100">${createSmartText(q, "text-base")}</li>`
            ).join('');

            document.getElementById('discussion-questions').innerHTML = content.discussionQuestions.map(q => 
                `<li class="bg-emerald-50 p-4 rounded-xl border border-emerald-100">${createSmartText(q, "text-base")}</li>`
            ).join('');

            document.getElementById('target-vocab-list').innerHTML = content.targetVocab.map(v => 
                `<div class="bg-pink-50 p-5 rounded-2xl border border-pink-100 shadow-sm hover:shadow-md transition-shadow">${createSmartText(v, "text-xl font-bold text-pink-800")}</div>`
            ).join('');

            document.getElementById('rp-scenario').innerHTML = createSmartText(content.roleplay.scenario, "text-lg font-bold text-fuchsia-800");
            document.getElementById('rp-role-a').innerHTML = createSmartText(content.roleplay.roleA, "text-base");
            document.getElementById('rp-role-b').innerHTML = createSmartText(content.roleplay.roleB, "text-base");

            document.getElementById('debate-topic').innerHTML = createSmartText(content.debate.topic, "text-lg font-bold text-orange-800");
            document.getElementById('debate-side-a').innerHTML = createSmartText(content.debate.sideA, "text-base");
            document.getElementById('debate-side-b').innerHTML = createSmartText(content.debate.sideB, "text-base");

            document.getElementById('ext-interview-title').innerHTML = createSmartText(content.extension.interviewTitle, "text-lg font-bold text-slate-800");
            document.getElementById('ext-interview-desc').innerHTML = createSmartText(content.extension.interviewDesc, "text-sm text-slate-600");
            document.getElementById('ext-story-title').innerHTML = createSmartText(content.extension.storyTitle, "text-lg font-bold text-slate-800");
            document.getElementById('ext-story-desc').innerHTML = createSmartText(content.extension.storyDesc, "text-sm text-slate-600");
        };
    </script>
</body>

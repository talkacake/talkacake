        {
            title: { thai: 'สถานการณ์ที่ 2: GPS เจ้าปัญหา', roman: 'sà-thăa-ná-gaan thîi sŏng: jii-phii-ét jâo bpan-hăa', eng: 'Scenario 2: The Problematic GPS' },
            story: { thai: 'GPS บอกให้คุณ <b class="text-blue-600">กลับรถ</b> แต่คุณขับเลยไปแล้ว! ตอนนี้คุณอยู่บน <b class="text-blue-600">ทางด่วน</b> และไม่มีที่ให้ <b class="text-blue-600">จอดรถ</b> เลย คุณเลยต้องเปิด <b class="text-blue-600">แผนที่</b> กระดาษดูแทน', roman: 'jii-phii-ét bòk hâi khun glàp rót, dtàe khun kàp loie bpai láew! dton-níi khun yòo bon thaang-dùan láe mâi mii thîi hâi jòt rót loie. khun loie dtông bpòet phăen-thîi grà-dàat duu thaen.', eng: 'The GPS tells you to make a <b>U-turn</b>, but you\'ve already passed it! Now you are on the <b>expressway</b> with nowhere to <b>park the car</b>. You have to open a paper <b>map</b> instead.' },
            subtitle: { thai: 'คำศัพท์ที่ควรใช้:', roman: 'kham-sàp thîi khuan chái:', eng: 'Vocabulary to use:' },
            vocab: [
                { thai: 'กลับรถ', roman: 'glàp rót', eng: 'Make a U-turn' }, { thai: 'ทางด่วน', roman: 'thaang dùan', eng: 'Expressway' }, { thai: 'จอดรถ', roman: 'jòt rót', eng: 'Park the car' }, { thai: 'แผนที่', roman: 'phăen thîi', eng: 'Map' }
            ]
        }
    ];
    
    // --- Web Speech API Setup ---
    let synth;
    let voices;
    function loadVoices() {
        if (typeof speechSynthesis === 'undefined') return;
        synth = window.speechSynthesis;
        const setVoices = () => { voices = synth.getVoices(); };
        setVoices();
        if (synth.onvoiceschanged !== undefined) { synth.onvoiceschanged = setVoices; }
    }
    loadVoices();

    function speak(text) {
        if (!synth) { console.error('TTS not supported.'); return; }
        if (synth.speaking) { synth.cancel(); }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'th-TH';
        utterance.rate = 0.9;
        const thaiVoice = (voices || []).find(voice => voice.lang === 'th-TH');
        if (thaiVoice) utterance.voice = thaiVoice;
        synth.speak(utterance);
    }

    // --- Helper Function ---
    function createTranslatableElement(data, tag = 'div', classes = '') {
        const container = document.createElement(tag);
        container.className = `translatable-unit ${classes}`;

        const wrapper = document.createElement('div');
        wrapper.className = 'translatable-content-wrapper';
        wrapper.innerHTML = `
            <span class="thai-text">${data.thai}</span>
            <button class="speak-btn" aria-label="Speak">🔊</button>
            <button class="toggle-btn ipa-toggle" aria-label="Toggle IPA">IPA</button>
            <button class="toggle-btn en-toggle" aria-label="Toggle English">EN</button>
        `;
        
        const details = document.createElement('div');
        details.className = 'translatable-details';
        details.innerHTML = `
            <p class="phonetics text-sm text-gray-500 italic">${data.roman}</p>
            <p class="translation text-sm text-gray-700">${data.eng}</p>
        `;

        container.appendChild(wrapper);
        container.appendChild(details);
        return container;
    }

    // --- Populate UI with Thai text ---
    function populateUI() {
        document.getElementById('main-title').appendChild(createTranslatableElement(uiText.mainTitle, 'span'));
        document.getElementById('part1-heading').appendChild(createTranslatableElement(uiText.part1.heading, 'span'));
        document.getElementById('part1-instruction').appendChild(createTranslatableElement(uiText.part1.instruction, 'span'));
        document.getElementById('part1-comprehension-heading').appendChild(createTranslatableElement(uiText.part1.compHeading, 'span'));
        const qList = document.getElementById('part1-questions');
        [uiText.part1.q1, uiText.part1.q2, uiText.part1.q3].forEach(q => qList.appendChild(createTranslatableElement(q, 'li')));

        document.getElementById('part2-heading').appendChild(createTranslatableElement(uiText.part2.heading, 'span'));
        document.getElementById('part2-instruction').appendChild(createTranslatableElement(uiText.part2.instruction, 'span'));
        document.getElementById('part3-heading').appendChild(createTranslatableElement(uiText.part3.heading, 'span'));
        document.getElementById('part3-instruction').appendChild(createTranslatableElement(uiText.part3.instruction, 'span'));
        document.getElementById('part4-heading').appendChild(createTranslatableElement(uiText.part4.heading, 'span'));
        document.getElementById('part4-instruction').appendChild(createTranslatableElement(uiText.part4.instruction, 'span'));
        document.getElementById('roleplay1-heading').appendChild(createTranslatableElement(uiText.part4.rp1_heading, 'span'));
        document.getElementById('roleplay1-instruction').appendChild(createTranslatableElement(uiText.part4.rp1_instruction, 'span'));
        document.getElementById('roleplay1-next').textContent = uiText.part4.rp1_button.thai;

        document.getElementById('part5-heading').appendChild(createTranslatableElement(uiText.part5.heading, 'span'));
        document.getElementById('part5-cultural-heading').appendChild(createTranslatableElement(uiText.part5.cultural_heading, 'span'));
        const culturalTipsList = document.getElementById('part5-cultural-tips');
        [uiText.part5.tip1, uiText.part5.tip2].forEach(tip => culturalTipsList.appendChild(createTranslatableElement(tip, 'li')));
        document.getElementById('part5-final-message').appendChild(createTranslatableElement(uiText.part5.final_message, 'span'));

        document.getElementById('bonus-heading').appendChild(createTranslatableElement(uiText.bonus.heading, 'span'));
        document.getElementById('bonus-instruction').appendChild(createTranslatableElement(uiText.bonus.instruction, 'span'));
    }
    populateUI();

    // --- Populate Content ---
    const vocabList = document.getElementById('vocab-list');
    vocabulary.forEach(item => vocabList.appendChild(createTranslatableElement(item, 'div', 'p-3 bg-gray-50 rounded-lg border')));

    const scriptContainer = document.getElementById('script-container');
    scriptWithTranslations.forEach(item => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'p-2 rounded-md';

        const lineWrapper = document.createElement('div');
        lineWrapper.className = 'flex items-start';

        const speakerStrong = document.createElement('strong');
        const speakerClass = item.speaker.includes('ขับ') ? 'text-blue-800' : 'text-green-800';
        speakerStrong.className = `${speakerClass} mr-2 flex-shrink-0 pt-1`; // Added padding top for alignment
        speakerStrong.textContent = `${item.speaker}:`;
        
        const translatablePart = createTranslatableElement({ thai: item.line, roman: item.roman, eng: item.eng }, 'div', 'flex-grow');
        
        if (item.insight) {
            const wrapper = translatablePart.querySelector('.translatable-content-wrapper');
            const insightBtn = document.createElement('button');
            insightBtn.className = 'insight-toggle text-blue-500 font-bold ml-2';
            insightBtn.textContent = '(?)';
            insightBtn.setAttribute('aria-label', 'Toggle insight');
            wrapper.appendChild(insightBtn);
        }

        lineWrapper.appendChild(speakerStrong);
        lineWrapper.appendChild(translatablePart);
        itemDiv.appendChild(lineWrapper);

        if (item.insight) {
            const insightP = document.createElement('p');
            insightP.className = 'insight text-sm text-gray-700 ml-4'; // Added margin for alignment
            insightP.textContent = item.insight;
            itemDiv.appendChild(insightP);
        }

        scriptContainer.appendChild(itemDiv);
    });

    const bonusScenariosContainer = document.getElementById('bonus-vocab-scenarios');
    bonusScenarios.forEach(scenario => {
        const scenarioDiv = document.createElement('div');
        scenarioDiv.className = 'scenario-card';

        const title = createTranslatableElement(scenario.title, 'h4', 'scenario-title');
        const story = createTranslatableElement(scenario.story, 'p', 'scenario-story');
        story.querySelector('.thai-text').innerHTML = `${scenario.story.thai} <button class="speak-btn" aria-label="Speak">🔊</button>`;
        const subtitle = createTranslatableElement(scenario.subtitle, 'h5', 'vocab-subtitle');
        
        const vocabGrid = document.createElement('div');
        vocabGrid.className = 'vocab-grid';

        scenario.vocab.forEach(item => {
            vocabGrid.appendChild(createTranslatableElement(item, 'div', 'p-2 border rounded'));
        });
        
        scenarioDiv.appendChild(title);
        scenarioDiv.appendChild(story);
        scenarioDiv.appendChild(subtitle);
        scenarioDiv.appendChild(vocabGrid);
        bonusScenariosContainer.appendChild(scenarioDiv);
    });


    // --- Event Delegation for whole page ---
    document.body.addEventListener('click', (e) => {
        const speakBtn = e.target.closest('.speak-btn');
        if (speakBtn) {
            e.stopPropagation();
            const text = speakBtn.parentElement.querySelector('.thai-text').textContent.replace(/<[^>]*>?/gm, '').trim();
            speak(text);
            return;
        }

        const insightToggle = e.target.closest('.insight-toggle');
        if (insightToggle) {
            e.stopPropagation();
            const parentItem = insightToggle.closest('.p-2');
            const insightP = parentItem.querySelector('.insight');
            if(insightP) {
                insightP.style.display = insightP.style.display === 'block' ? 'none' : 'block';
            }
            return;
        }
        
        const ipaToggle = e.target.closest('.ipa-toggle');
        if (ipaToggle) {
            e.stopPropagation();
            const parentUnit = ipaToggle.closest('.translatable-unit');
            const phonetics = parentUnit.querySelector('.phonetics');
            if (phonetics) {
                phonetics.style.display = phonetics.style.display === 'block' ? 'none' : 'block';
                ipaToggle.classList.toggle('active');
            }
            return;
        }

        const enToggle = e.target.closest('.en-toggle');
        if (enToggle) {
            e.stopPropagation();
            const parentUnit = enToggle.closest('.translatable-unit');
            const translation = parentUnit.querySelector('.translation');
            if (translation) {
                translation.style.display = translation.style.display === 'block' ? 'none' : 'block';
                enToggle.classList.toggle('active');
            }
            return;
        }
    });

    // --- Role-Play Logic ---
    const roleplay1Chat = document.getElementById('roleplay1-chat');
    const roleplay1NextBtn = document.getElementById('roleplay1-next');
    
    const roleplayPrompts = [
        { type: 'prompt', data: { yourTurn: { thai: 'ตาคุณแล้ว:', roman: 'dtaa khun láew:', eng: 'Your turn:' }, promptLine: { thai: 'บอกเพื่อนให้ขับตรงไปเรื่อยๆ', roman: 'bòk phêuan hâi kàp dtrong bpai rêuuai-rêuuai', eng: 'Tell your friend to drive straight on.' } } },
        { type: 'answer', data: { speaker: 'คุณ', line: 'ตรงไปเรื่อยๆ เลย', roman: 'dtrong bpai rêuuai-rêuuai loie', eng: 'Go straight on.' } },
        { type: 'seller', data: { speaker: 'เพื่อน', line: 'โอเค!', roman: 'oo-khee', eng: 'Okay!' } },
        { type: 'prompt', data: { yourTurn: { thai: 'ตาคุณแล้ว:', roman: 'dtaa khun láew:', eng: 'Your turn:' }, promptLine: { thai: 'ข้างหน้าต้องขึ้นสะพาน บอกเพื่อนให้เตรียมตัว', roman: 'khâang-nâa dtông khêun sà-phaan, bòk phêuan hâi dtriiam dtua', eng: 'There\'s a bridge ahead. Tell your friend to get ready.' } } },
        { type: 'answer', data: { speaker: 'คุณ', line: 'เดี๋ยวเราต้องขึ้นสะพานนะ', roman: 'dĭao rao dtông khêun sà-phaan ná', eng: 'We have to go up the bridge soon.' } },
        { type: 'seller', data: { speaker: 'เพื่อน', line: 'แล้วต้องเลี้ยวทางไหน', roman: 'láew dtông líiao thaang năi', eng: 'And which way do I have to turn?' } },
        { type: 'prompt', data: { yourTurn: { thai: 'ตาคุณแล้ว:', roman: 'dtaa khun láew:', eng: 'Your turn:' }, promptLine: { thai: 'บอกให้เพื่อน "เลี้ยวออม"', roman: 'bòk hâi phêuan "líiao om"', eng: 'Tell your friend to "turn Aom".' } } },
        { type: 'answer', data: { speaker: 'คุณ', line: 'เตรียมเลี้ยวออมนะ', roman: 'dtriiam líiao om ná', eng: 'Get ready to turn Aom (right).' } },
        { type: 'seller', data: { speaker: 'เพื่อน', line: 'เลี้ยวออม!', roman: 'líiao om', eng: 'Turn Aom!' } }
    ];
    let roleplayIndex = 0;

    function addInteractiveBubble(container, data, speaker) {
        const bubble = document.createElement('div');
        const speakerClass = speaker === 'seller' ? 'seller-bubble' : 'buyer-bubble';
        bubble.className = `chat-bubble ${speakerClass}`;
        const content = createTranslatableElement({thai: data.line, roman: data.roman, eng: data.eng}, 'div');
        bubble.appendChild(content);
        container.appendChild(bubble);
        container.scrollTop = container.scrollHeight;
    }
    
    function addPrompt(container, data) {
        const promptDiv = document.createElement('div');
        promptDiv.className = 'prompt';
        const yourTurn = createTranslatableElement(data.yourTurn, 'p', 'font-semibold');
        const promptLine = createTranslatableElement(data.promptLine, 'p');
        promptDiv.appendChild(yourTurn);
        promptDiv.appendChild(promptLine);
        container.appendChild(promptDiv);
        container.scrollTop = container.scrollHeight;
    }

    roleplay1NextBtn.addEventListener('click', () => {
        if (roleplayIndex >= roleplayPrompts.length) {
             roleplay1NextBtn.disabled = true;
             roleplay1NextBtn.textContent = "จบแล้ว!";
             return;
        }
        const current = roleplayPrompts[roleplayIndex];
        if (current.type === 'seller') {
            addInteractiveBubble(roleplay1Chat, current.data, 'seller');
        } else if (current.type === 'prompt') {
            addPrompt(roleplay1Chat, current.data);
            roleplay1NextBtn.textContent = "แสดงคำตอบ"; // Show Answer
        } else if (current.type === 'answer') {
            addInteractiveBubble(roleplay1Chat, current.data, 'buyer');
            roleplay1NextBtn.textContent = "ต่อไป"; // Next
        }
        roleplayIndex++;
    });

});
</script>

</body>
</html>

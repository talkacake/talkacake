        // --- Reusable Component: Interactive Thai Text ---
        const ThaiText = ({ thai, ipa, en, emoji, fullWidth = false, isHeader = false, isInstruction = false, speaker = null }) => {
          const [showIPA, setShowIPA] = useState(false);
          const [showEN, setShowEN] = useState(false);

          const speak = (text) => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
          };

          const containerClass = isHeader 
            ? "flex flex-col mb-4 items-start border-b-2 border-indigo-100 pb-2" 
            : isInstruction
            ? "flex flex-col mb-2 items-center bg-white/50 p-2 rounded-lg"
            : `bg-white rounded-xl p-4 shadow-sm border border-slate-100 mb-3 flex flex-col transition-all ${fullWidth ? 'w-full' : ''}`;

          const textClass = isHeader
            ? "text-xl md:text-2xl font-bold text-indigo-700 hover:text-indigo-900 transition-colors text-left font-thai"
            : isInstruction
            ? "text-md font-bold text-slate-600 hover:text-indigo-600 text-center font-thai"
            : "text-xl md:text-2xl font-bold text-slate-800 hover:text-blue-600 transition-colors text-left font-thai leading-relaxed";

          return (
            <div className={containerClass}>
              <div className={`flex items-start ${isHeader ? 'justify-between w-full' : isInstruction ? 'justify-center gap-4 w-full' : 'justify-between mb-2 gap-2'}`}>
                <div className="flex flex-col flex-grow">
                   {speaker && (
                     <span className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">{speaker}</span>
                   )}
                   <div className="flex items-start gap-3">
                      {emoji && <span className={`${isHeader ? 'text-2xl' : 'text-2xl'} mt-1`}>{emoji}</span>}
                      <button 
                        onClick={() => speak(thai)}
                        className={textClass}
                      >
                        {thai} <Volume2 className={`inline w-4 h-4 ml-1 ${isHeader ? 'text-indigo-400' : 'text-blue-400'}`} />
                      </button>
                   </div>
                </div>
                
                <div className="flex gap-1 flex-shrink-0 mt-1">
                  <button 
                    onClick={() => setShowIPA(!showIPA)}
                    className={`px-2 py-1 rounded-md text-[10px] md:text-xs font-bold transition-all ${showIPA ? 'bg-amber-100 text-amber-700' : 'bg-slate-200 text-slate-500'}`}
                  >
                    IPA
                  </button>
                  <button 
                    onClick={() => setShowEN(!showEN)}
                    className={`px-2 py-1 rounded-md text-[10px] md:text-xs font-bold transition-all ${showEN ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-500'}`}
                  >
                    EN
                  </button>
                </div>
              </div>
              
              {(showIPA || showEN) && (
                <div className={`mt-1 pt-2 ${isInstruction ? 'w-full text-center border-t border-slate-200' : 'border-t border-slate-50 pl-0'} space-y-1`}>
                  {showIPA && <p className="text-amber-600 font-mono text-sm pl-1">{ipa}</p>}
                  {showEN && <p className="text-emerald-600 text-sm italic pl-1">{en}</p>}
                </div>
              )}
            </div>
          );
        };

          const [currentReviewIndex, setCurrentReviewIndex] = useState(null);
          const [randomVocab, setRandomVocab] = useState(null);

          // Initialize random word on load
          useEffect(() => {
            pickRandomWord();
          }, []);

          const pickRandomWord = () => {
            const randomIndex = Math.floor(Math.random() * reviewVocabData.length);
            setCurrentReviewIndex(randomIndex);
            setRandomVocab(reviewVocabData[randomIndex]);

          return (

                  { id: 'activity', icon: <MessageCircle size={18} />, label: 'กิจกรรม' },
                  { id: 'extension', icon: <ChevronRight size={18} />, label: 'เพิ่มเติม' },

                    {tab.icon} {tab.label}

                ))}
              </div>

                {/* --- SECTION 1: REVIEW --- */}

                        ipa="dtɛ̀ng bprà-yòok"

                        emoji=""
                        isHeader={true}
                      />

                        <div className="text-6xl mb-4">{randomVocab.emoji}</div>

                          ipa={randomVocab.ipa}
                          en={randomVocab.en}
                          emoji=""
                          fullWidth={true}
                        />
                      </div>
                      <button 
                        onClick={pickRandomWord}
                        className="w-full bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2"

                        en="Click sentences to listen"

                        isInstruction={true}

                          ipa={data.ipa} 
                          en={data.eng}
                          isHeader={true}
                        />
                        <div className="space-y-3">
                          {data.dialogue.map((item, i) => (
                            <ThaiText 
                                key={i} 
                                thai={item.thai} 
                                ipa={item.ipa} 
                                en={item.en} 
                                speaker={item.speaker}

                      </div>

                      </div>
                    </div>

                    {/* Debate */}
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                      <ThaiText 
                        thai="แลกเปลี่ยนความคิดเห็น" 
                        ipa="lɛ̂ɛk-bplìian kwaam-kít-hěn" 
                        en="Discussion"
                        emoji={<MessageCircle size={24} className="text-rose-600"/>}
                        isHeader={true}
                      />
                      <div className="mb-4">
                         <ThaiText 
                          thai="หัวข้อ: ขับรถยนต์ VS ขี่มอเตอร์ไซค์ ในกรุงเทพฯ"

                      <ThaiText

                {/* --- SECTION 4: EXTENSION --- */}
                {activeTab === 'extension' && (
                  <div className="animate-fade-in space-y-6">
                    <div className="bg-purple-50 p-4 rounded-xl border border-purple-100">
                       <ThaiText 
                          thai="กิจกรรมเพิ่มเติม" 
                          ipa="gìt-jà-gam pə̂əm-dtəəm"

                          ipa="sǒm-mút wâa kun hěn ù-bàt-dtì-hèet, lâo hâi tam-rùat fang"

                          isInstruction={true}
                        />
                       </div>
                       <ThaiText thai="มีรถชนกันที่หัวมุมถนน" ipa="mii rót chon gan tîi hǔa mum tà-nǒn" en="There was a car crash at the corner." emoji="💥" fullWidth />
                       <ThaiText thai="ไม่มีคนเจ็บ แต่รถเสียหายเยอะ" ipa="mâi mii kon jèp, dtɛ̀ɛ rót sǐia-hǎai yə́" en="No one hurt, but car damaged a lot." emoji="🤕❌" fullWidth />

                     <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">

                          ipa="sǎm-pâat" 
                          en="Interview"
                          emoji="🎤"
                          isHeader={true}
                        />

                          <ThaiText 
                            thai="ถามครูเกี่ยวกับรถติดที่แย่ที่สุด" 
                            ipa="tǎam kruu gìiao-gàp rót dtìt tîi yɛ̂ɛ tîi sùt" 
                            en="Ask the teacher about their worst traffic experience."
                            isInstruction={true}
                          />
                        </div>
                       <ThaiText thai="รถติดที่สุด ที่คุณเคยเจอ นานแค่ไหนครับ?" ipa="rót dtìt tîi sùt... naan kɛ̂ɛ nǎi?" en="The worst traffic you met... how long was it?" emoji="⏳🚗" fullWidth />

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ThaiLessonApp />);
    </script>
</body>

        const interviewData = [

            { speaker: "A1", thai: "ทำได้ค่ะ แต่ตอนแรก... ฉันต้องขอนอนก่อน", ipa: "tham dâai khà, dtàae dton-râaek... chǎn dtɔ̂ng khɔ̌ɔ nɔɔn gàɔn", en: "I can, but at first... I need to sleep." },
            { speaker: "Q2", thai: "คุณสะดวกทำงานถึงกี่โมง?", ipa: "khun sà-dùuak tham-ngaan thěung gìi moong?", en: "Until what time are you convenient to work?" },
            { speaker: "A2", thai: "ตีหนึ่งค่ะ เพราะหลังจากนั้นฉันต้องไปดูหนัง", ipa: "dtii nʉ̀ng khà, phráw lǎng-jàak-nán chǎn dtɔ̂ng bpai duu nǎng", en: "1am. Because after that I have to go watch a movie." },
            { speaker: "Q3", thai: "คุณทำอาหารอะไรได้บ้าง?", ipa: "khun tham aa-hǎan à-rai dâai bâang?", en: "What food can you cook?" },
            { speaker: "A3", thai: "ส้มตำใส่พริก 2 เม็ดค่ะ เมนูพิเศษ!", ipa: "sôm-dtam sài prík sɔ̌ɔng mét khà. mee-nuu pí-sèet!", en: "Papaya salad with 2 chillies. Special menu!" }
        ];

        // 6. EXTENSION DATA
        const extensionData = [
            { 
                speaker: "Task", 
                thai: "การนำเสนอ: 'ตารางชีวิตใหม่ของฉัน' 📅", 
                ipa: "gaan nam-sà-něuh: 'dtaa-raang chii-wít mài khǎawng chǎn'", 
                en: "Presentation: 'My New Life Schedule'. Create a funny routine (e.g. 1AM: Meditate, 2AM: Do laundry)" 
            },
            { 
                speaker: "Q1", 
                thai: "กินส้มตำใส่พริก 2 เม็ด แล้วนั่งสมาธิได้ไหม? 🌶️🧘‍♀️", 
                ipa: "gin sôm-dtam sài prík sɔ̌ɔng mét, láaeo nâng sà-maa-tí dâai mái?", 
                en: "Can you eat papaya salad with 2 chillies, and then meditate?" 
            },
            { 
                speaker: "Q2", 
                thai: "น้ำเก๊กฮวย ช่วยให้คุณภาพชีวิตดีขึ้นไหม? 🌼", 
                ipa: "náam-gék-huay chûuay hâi khoon-ná-pâap chii-wít dii khûn mái?", 
                en: "Does Chrysanthemum tea help improve quality of life?" 
            },
            { 
                speaker: "Q3", 
                thai: "ปกติคุณไถมือถือ ถึงตีหนึ่งไหม? 📱🌙", 
                ipa: "bpa-gà-dtì khun tǎi mʉʉ-tʉ̌ʉ thěung dtii nʉ̀ng mái?", 
                en: "Do you usually scroll on your phone until 1am?" 
            },
            { 
                speaker: "Q4", 
                thai: "ผงฟู... ใช้ล้างจานได้ไหม? 🥣🍽️", 
                ipa: "pǒng-foo... chái láang jaan dâai mái?", 
                en: "Baking powder... can you use it to wash dishes?" 
            }
        ];

        // --- FUNCTIONS ---

        function createCard(item, id, type, showSpeaker = false) {
            let containerClass = "bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-all border-b border-gray-100 card-enter";
            let textClass = "thai-text font-bold mb-2";
            let btnColor = "bg-gray-100 text-gray-700 hover:bg-gray-200";
            
            if (type === 'game') {
                textClass = "text-3xl font-bold text-red-600 text-center mb-4";
                btnColor = "bg-red-100 text-red-700 hover:bg-red-200";
            } else if (type === 'roleplay') {
                btnColor = "bg-orange-100 text-orange-700 hover:bg-orange-200";
            } else if (type === 'debate') {
                btnColor = "bg-blue-100 text-blue-700 hover:bg-blue-200";
            } else if (type === 'story') {
                btnColor = "bg-green-100 text-green-700 hover:bg-green-200";
            } else if (type === 'interview') {
                btnColor = "bg-purple-100 text-purple-700 hover:bg-purple-200";
            } else if (type === 'extension') {
                btnColor = "bg-teal-100 text-teal-700 hover:bg-teal-200";
            }

            const speakerLabel = showSpeaker && item.speaker ? `<span class="text-xs font-bold text-gray-400 uppercase tracking-wide mb-1 block">${item.speaker}</span>` : '';

            // Layout based on Type
            if (type === 'game') {
                return `
                <div class="flex flex-col items-center animate-fade-in w-full">
                    <button onclick="speakText('${item.thai.replace(/'/g, "\\'")}')" class="mb-4 ${btnColor} rounded-full w-16 h-16 flex items-center justify-center transition-colors shadow-sm text-2xl">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                    <p class="${textClass}">${item.thai}</p>
                    <div id="ipa-${id}" class="hidden mb-2 text-center"><p class="ipa-text text-xl">${item.ipa}</p></div>
                    <div id="en-${id}" class="hidden text-center mb-4"><p class="en-text text-lg border-t pt-2">${item.en}</p></div>
                    <div class="flex gap-3">
                        <button onclick="toggleVisibility('ipa-${id}', this)" class="btn-toggle px-4 py-2 rounded-lg border border-red-200 text-red-600 font-bold bg-white hover:bg-red-50">IPA</button>
                        <button onclick="toggleVisibility('en-${id}', this)" class="btn-toggle px-4 py-2 rounded-lg border border-gray-300 text-gray-500 font-bold bg-white hover:bg-gray-50">EN</button>
                    </div>
                </div>`;
            }

            return `
            <div class="${containerClass}">
                ${speakerLabel}
                <div class="flex items-start gap-3">
                    <button onclick="speakText('${item.thai.replace(/'/g, "\\'")}')" class="mt-1 ${btnColor} rounded-full w-10 h-10 flex-shrink-0 flex items-center justify-center transition-colors">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                    <div class="flex-grow">
                        <p class="${textClass}">${item.thai}</p>
                        <div id="ipa-${id}" class="hidden mb-1"><p class="ipa-text text-lg">${item.ipa}</p></div>
                        <div id="en-${id}" class="hidden"><p class="en-text text-sm border-t pt-1 mt-1 text-gray-500">${item.en}</p></div>
                        <div class="flex gap-2 mt-3">
                            <button onclick="toggleVisibility('ipa-${id}', this)" class="btn-toggle text-xs px-2 py-1 rounded border border-gray-200 text-gray-500 font-bold bg-white hover:bg-gray-50">IPA</button>
                            <button onclick="toggleVisibility('en-${id}', this)" class="btn-toggle text-xs px-2 py-1 rounded border border-gray-200 text-gray-500 font-bold bg-white hover:bg-gray-50">EN</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function createHeader(item, id) {
            return `
            <div class="flex flex-col items-center justify-center gap-2">
                <button onclick="speakText('${item.thai.replace(/'/g, "\\'")}')" class="bg-gray-100 text-gray-600 hover:bg-gray-200 rounded-full w-8 h-8 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
                <h2 class="text-2xl font-bold text-gray-800 text-center">${item.thai}</h2>
                <div class="flex gap-2 text-xs">
                     <button onclick="toggleVisibility('ipa-${id}', this)" class="text-gray-400 hover:text-gray-600">IPA</button>
                     <button onclick="toggleVisibility('en-${id}', this)" class="text-gray-400 hover:text-gray-600">EN</button>
                </div>
                <div id="ipa-${id}" class="hidden text-center"><p class="ipa-text">${item.ipa}</p></div>
                <div id="en-${id}" class="hidden text-center"><p class="en-text">${item.en}</p></div>
            </div>`;
        }
        
        function createInstr(item, id) {
             return `
            <div class="flex flex-col items-center gap-1">
                <div class="flex items-center gap-2">
                    <button onclick="speakText('${item.thai.replace(/'/g, "\\'")}')" class="text-gray-500 hover:text-gray-700">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                    <p class="text-lg text-gray-700 font-semibold">${item.thai}</p>
                </div>
                <div id="ipa-${id}" class="hidden text-center"><p class="ipa-text text-sm">${item.ipa}</p></div>
                <div id="en-${id}" class="hidden text-center"><p class="en-text text-sm italic">${item.en}</p></div>
                 <div class="flex gap-2 text-[10px] mt-1">
                     <button onclick="toggleVisibility('ipa-${id}', this)" class="text-gray-400">IPA</button>
                     <button onclick="toggleVisibility('en-${id}', this)" class="text-gray-400">EN</button>
                </div>
            </div>`;
        }

        // --- RENDER LOGIC ---

        function renderContent() {
            // Main Header
            document.getElementById('main-header').innerHTML = createHeader(uiData.mainTitle, 'main');

            // 1. Game
            document.getElementById('header-game').innerHTML = createHeader(uiData.headerGame, 'h-game');
            document.getElementById('instr-game').innerHTML = createInstr(uiData.instrGame, 'i-game');

            // 2. Role Play
            document.getElementById('header-roleplay').innerHTML = createHeader(uiData.headerRoleplay, 'h-role');
            document.getElementById('instr-roleplay').innerHTML = createInstr(uiData.instrRoleplay, 'i-role');
            document.getElementById('roleplay-container').innerHTML = roleplayData.map((item, idx) => createCard(item, `role-${idx}`, 'roleplay', true)).join('');

            // 3. Debate
            document.getElementById('header-debate').innerHTML = createHeader(uiData.headerDebate, 'h-deb');
            document.getElementById('instr-debate').innerHTML = createInstr(uiData.instrDebate, 'i-deb');
            document.getElementById('debate-container').innerHTML = debateData.map((item, idx) => createCard(item, `deb-${idx}`, 'debate', true)).join('');

            // 4. Story
            document.getElementById('header-story').innerHTML = createHeader(uiData.headerStory, 'h-story');
            document.getElementById('instr-story').innerHTML = createInstr(uiData.instrStory, 'i-story');
            document.getElementById('story-container').innerHTML = storyData.map((item, idx) => createCard(item, `story-${idx}`, 'story')).join('');

            // 5. Interview
            document.getElementById('header-interview').innerHTML = createHeader(uiData.headerInterview, 'h-int');
            document.getElementById('instr-interview').innerHTML = createInstr(uiData.instrInterview, 'i-int');
            document.getElementById('interview-container').innerHTML = interviewData.map((item, idx) => createCard(item, `int-${idx}`, 'interview', true)).join('');

            // 6. Extension
            document.getElementById('header-extension').innerHTML = createHeader(uiData.headerExtension, 'h-ext');
            document.getElementById('instr-extension').innerHTML = createInstr(uiData.instrExtension, 'i-ext');
            document.getElementById('extension-container').innerHTML = extensionData.map((item, idx) => createCard(item, `ext-${idx}`, 'extension', true)).join('');
        }

        function generateRandomWord() {
            const randomIndex = Math.floor(Math.random() * fullVocab.length);
            const item = fullVocab[randomIndex];
            const html = createCard(item, `rand-${Date.now()}`, 'game'); 
            document.getElementById('random-card-display').innerHTML = html;
        }

        function toggleVisibility(elementId, btn) {
            const el = document.getElementById(elementId);
            if (!el) return;
            
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                btn.classList.add('bg-gray-200');
            } else {
                el.classList.add('hidden');
                btn.classList.remove('bg-gray-200');
            }
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.8;
            
            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(voice => voice.lang === 'th-TH');
            if (thaiVoice) utterance.voice = thaiVoice;

            window.speechSynthesis.speak(utterance);
        }

        // Init
        window.addEventListener('DOMContentLoaded', () => {
            renderContent();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = () => {};
            }
        });

    </script>
</body>
</html>

            let btnSize = "";

                containerClass = "flex flex-col items-center justify-center";
                textClass = "text-4xl font-bold text-teal-800 text-center";
                btnSize = "px-2 py-0.5 text-[10px]";
                iconSize = "w-8 h-8 text-lg";
            } else if (type === 'header') {
                containerClass = "flex flex-wrap items-center gap-3";
                textClass = "text-2xl font-bold text-teal-900";
                btnSize = "px-2 py-1 text-xs";
                iconSize = "w-8 h-8 text-sm";
            } else if (type === 'instruction') {
                containerClass = "flex flex-wrap items-center gap-2";
                textClass = "text-lg text-gray-600";
                btnSize = "px-2 py-0.5 text-[10px]";
                iconSize = "w-6 h-6 text-xs";
            } else if (type === 'random-card') {
                // Large Card for the Review Game
                containerClass = "w-full bg-white animate-fade-in";
                textClass = "thai-text text-3xl font-bold mb-4 text-center";
                btnSize = "px-4 py-2 text-sm";
                iconSize = "w-16 h-16 text-2xl mx-auto mb-4";

                // Purple Card for Extension
                containerClass = "bg-purple-50 rounded-lg p-4 shadow-sm hover:shadow-md transition-shadow border-b border-purple-200";
                textClass = "thai-text font-semibold mb-2 text-purple-900 whitespace-pre-line"; /* Added whitespace-pre-line */
                btnSize = "px-3 py-1 text-xs";
                iconSize = "w-10 h-10";
            } else {

                containerClass = "bg-white rounded-lg p-4 shadow-sm hover:shadow-md transition-shadow border-b border-teal-100";
                textClass = "thai-text font-semibold mb-2";
                btnSize = "px-3 py-1 text-xs";
                iconSize = "w-10 h-10";
            }

                        <div class="flex gap-3 mt-2">
                            <button onclick="toggleVisibility('ipa-${id}', this)" class="btn-toggle font-bold ${btnSize} rounded border-2 border-orange-200 text-orange-600 hover:bg-orange-50 bg-white">IPA</button>
                            <button onclick="toggleVisibility('en-${id}', this)" class="btn-toggle font-bold ${btnSize} rounded border-2 border-gray-300 text-gray-500 hover:bg-gray-50 bg-white">EN</button>
                        </div>
                    </div>
                </div>`;
            }

            // Standard Layouts (and Extension)
            if (type === 'card' || type === 'extension-card') {
                const btnColor = type === 'extension-card' ? 'bg-purple-100 text-purple-700 hover:bg-purple-200' : `bg-teal-100 text-teal-700 hover:bg-teal-200`;
                
                return `
                <div class="${containerClass}">
                    ${speakerLabel}
                    <div class="flex items-start gap-3">
                        <button onclick="speakText('${item.thai.replace(/'/g, "\\'")}')" class="mt-1 ${btnColor} rounded-full ${iconSize} flex-shrink-0 flex items-center justify-center transition-colors">
                            <i class="fa-solid fa-volume-high"></i>
                        </button>
                        <div class="flex-grow">
                            <p class="${textClass}">${item.thai}</p>
                            <div id="ipa-${id}" class="hidden mb-1"><p class="ipa-text text-lg">${item.ipa}</p></div>
                            <div id="en-${id}" class="hidden"><p class="en-text text-sm border-t pt-1 mt-1 border-purple-200">${item.en}</p></div>
                            <div class="flex gap-2 mt-3">
                                <button onclick="toggleVisibility('ipa-${id}', this)" class="btn-toggle font-bold ${btnSize} rounded border border-orange-200 text-orange-600 hover:bg-orange-50 bg-white">IPA</button>
                                <button onclick="toggleVisibility('en-${id}', this)" class="btn-toggle font-bold ${btnSize} rounded border border-gray-300 text-gray-500 hover:bg-gray-50 bg-white">EN</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            } else {
                // Header/Instruction Inline Layout
                return `
                <div class="${containerClass}">
                    <div class="flex items-center gap-2 justify-center w-full">
                        <button onclick="speakText('${item.thai.replace(/'/g, "\\'")}')" class="bg-teal-100 text-teal-700 hover:bg-teal-200 rounded-full ${iconSize} flex-shrink-0 flex items-center justify-center transition-colors">
                            <i class="fa-solid fa-volume-high"></i>
                        </button>
                        <p class="${textClass}">${item.thai}</p>
                    </div>
                    <!-- Controls for Header/Inst hidden by default unless we want them interactive -->
                     <div class="flex justify-center gap-2 mt-1 w-full">
                         <button onclick="toggleVisibility('ipa-${id}', this)" class="text-xs text-orange-400 hover:text-orange-600">IPA</button>
                         <button onclick="toggleVisibility('en-${id}', this)" class="text-xs text-gray-400 hover:text-gray-600">EN</button>
                     </div>
                     <div class="w-full text-center">
                        <div id="ipa-${id}" class="hidden"><p class="ipa-text text-base">${item.ipa}</p></div>
                        <div id="en-${id}" class="hidden"><p class="en-text text-sm italic text-gray-400 mt-1">${item.en}</p></div>
                     </div>
                </div>`;
            }
        }

        // Logic for Random Word
        function generateRandomWord() {
            const randomIndex = Math.floor(Math.random() * randomReviewData.length);
            const item = randomReviewData[randomIndex];
            const html = createInteractiveElement(item, `rand-${Date.now()}`, 'random-card'); // Use timestamp for unique ID on re-render
            document.getElementById('random-word-display').innerHTML = html;
        }

        // Render Loop
        function renderContent() {
            // UI
            document.getElementById('main-header-container').innerHTML = createInteractiveElement(uiData.mainTitle, 'ui-main', 'title');
            
            document.getElementById('header-review').innerHTML = createInteractiveElement(uiData.headerReview, 'ui-h-review', 'header');
            document.getElementById('instr-review').innerHTML = createInteractiveElement(uiData.instrReview, 'ui-i-review', 'instruction');
            
            document.getElementById('header-vocab').innerHTML = createInteractiveElement(uiData.headerVocab, 'ui-h-vocab', 'header');
            document.getElementById('instr-vocab').innerHTML = createInteractiveElement(uiData.instrVocab, 'ui-i-vocab', 'instruction');
            
            document.getElementById('header-roleplay').innerHTML = createInteractiveElement(uiData.headerRoleplay, 'ui-h-role', 'header');
            document.getElementById('instr-roleplay').innerHTML = createInteractiveElement(uiData.instrRoleplay, 'ui-i-role', 'instruction');
            
            // Extension Headers
            document.getElementById('header-extension').innerHTML = createInteractiveElement(uiData.headerExtension, 'ui-h-ext', 'header');
            document.getElementById('instr-extension').innerHTML = createInteractiveElement(uiData.instrExtension, 'ui-i-ext', 'instruction');

            // Sections
            document.getElementById('vocab-container').innerHTML = vocabData.map((item, idx) => createInteractiveElement(item, `vocab-${idx}`, 'card')).join('');
            document.getElementById('roleplay-container').innerHTML = roleplayData.map((item, idx) => createInteractiveElement(item, `role-${idx}`, 'card', true)).join('');
            document.getElementById('extension-container').innerHTML = extensionData.map((item, idx) => createInteractiveElement(item, `ext-${idx}`, 'extension-card', true)).join('');
        }

        // Interactions
        function toggleVisibility(elementId, btn) {
            const el = document.getElementById(elementId);
            if (!el) return;
            
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                if(btn.classList.contains('btn-toggle')) {
                    btn.classList.add('bg-gray-100', 'ring-2', 'ring-offset-1', 'ring-gray-200');
                }
            } else {
                el.classList.add('hidden');
                if(btn.classList.contains('btn-toggle')) {
                    btn.classList.remove('bg-gray-100', 'ring-2', 'ring-offset-1', 'ring-gray-200');
                }
            }
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.8;
            
            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(voice => voice.lang === 'th-TH');
            if (thaiVoice) utterance.voice = thaiVoice;

            window.speechSynthesis.speak(utterance);
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderContent();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = () => {};
            }
        });

    </script>
</body>
</html>

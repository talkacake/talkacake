        .en-text {
            color: #475569; /* Slate for English */

        .btn-toggle {

            display: none;

<body class="p-4 md:p-8 max-w-4xl mx-auto pb-24">

            <div id="c-debate" class="space-y-4"></div>

            <div id="i-story" class="mb-6 bg-purple-50 p-3 rounded-lg"></div>
            <div id="c-story" class="space-y-4"></div>

            <div id="i-present" class="mb-6 bg-rose-50 p-3 rounded-lg"></div>

            { speaker: "B (You)", thai: "ไม่นาน! ง่ายนิดเดียวเอง! แล้วค่อย ไปกิน ข้าวเหนียว หมูอบ ด้วย! 🍚🐷", ipa: "mâi naan! ngâai-nít-diiao-eeng! lɛ́ɛw khɔ̂y bpai gin khâao-nǐeow mǒo-òp dûay!", en: "Not long! So easy! And then go eat sticky rice with roasted pork too!" },
            { speaker: "A", thai: "งั้น เดี๋ยวจะไปกินข้าวเย็น ด้วย! เปลี่ยน ชุดแป๊บ! 🍽️👗", ipa: "ngán dǐeow-jà-bpai-gin-kâao-yen dûay! bplìan chút bpɛ́p!", en: "Then I'll go eat dinner too! Change clothes a sec!" }
        ];

        const debateData = [
            { speaker: "Topic", thai: "นัดเพื่อน 'ตรงเวลาเป๊ะ' ⏰ VS นัดแบบ 'มีความยืดหยุ่น' 🤸‍♂️", ipa: "nát phʉ̂an 'dtrong-wee-laa bpé' VS nát bɛ̀ɛp 'mii kwaam yeût-yùn'", en: "Making plans 'exactly on time' VS Making plans 'with flexibility'" },
            { speaker: "Team ตรงเวลา", thai: "นัด ตรงเวลา ดีกว่า! ถ้าเพื่อน มาสาย ฉัน โกรธ 😠⏰", ipa: "nát dtrong-wee-laa dii gwàa! thâa phʉ̂an maa sǎai chǎn gròht", en: "Making plans on time is better! If a friend arrives late, I am angry." },
            { speaker: "Team ยืดหยุ่น", thai: "แต่ชีวิตจริงรถติดนะ! มี ความยืดหยุ่น ทำให้ คุณภาพชีวิต ดีขึ้น 🌿✨", ipa: "dtɛ̀ɛ chii-wít-jing rót dtìt ná! mii kwaam yeût-yùn tam-hâi khoon-ná-pâap chii-wít dii kʉ̂n", en: "But in real life there's traffic! Having flexibility makes quality of life better." },
            { speaker: "Team ตรงเวลา", thai: "ถ้าเพื่อน โลเล ตลอดเวลา... มัน เยอะไป! ฉัน เบื่อ 😒🌀", ipa: "thâa phʉ̂an lo:h-le:h dtà-lòot-way-laa... man yóe-bpai! chǎn bèuua", en: "If friend is flaky all the time... it's too much! I am bored." },
            { speaker: "Team ยืดหยุ่น", thai: "ก็แค่ ไถมือถือ รอ! ง่ายนิดเดียวเอง 📱😄", ipa: "gɔ̂ kɛ̂ɛ tǎi mʉʉ-tʉ̌ʉ rɔɔ! ngâai-nít-diiao-eeng", en: "Just scroll phone and wait! So easy." }
        ];

        const storyData = [
            { thai: "สถานการณ์: คุณ ชวน เพื่อนรัก มา ทำขนม ที่บ้าน 🍰🏠", ipa: "sà-thǎa-ná-gaan: khun chuan phʉ̂ean-rák maa tam kà-nǒm thîi bâan", en: "Situation: You invited a best friend to bake snacks at home." },
            { thai: "คุณผสม แป้ง, เกลือ, ผงฟู... แต่จู่ๆ ไฟดับ! 💡⚡️", ipa: "khun pà-sǒm bpâaeng, gleua, pǒng-foo... dtɛ̀ɛ jùu-jùu fai-dàp!", en: "You mixed flour, salt, baking powder... but suddenly power outage!" },
            { thai: "เล่าเรื่อง โดยใช้คำว่า: หาไม่เจอ, น้ำมัน, ตอนแรก, สุดท้ายก็, โกรธ 🔍🛢️😠", ipa: "lâo-rʉ̂ʉang dooi chái kham wâa: hăa-mâi-jer, nám-man, dton-râaek, sùt-táai-gôr, gròht", en: "Tell a story using: can't find it, oil, at first, finally, angry." },
            { thai: "คำถาม: คุณ ทำยังไง ต่อ? 🤔🛠️", ipa: "kham-thǎam: khun tam-yang-ngai dtɔ̀ɔ?", en: "Question: What did you do next to resolve it?" }
        ];

        const presentData = [
            { thai: "หัวข้อนำเสนอ: 'ทริปเมืองเก่า กับ ลูกพี่ลูกน้อง' 🏘️🧑‍🤝‍🧑", ipa: "hǔa-khɔ̂ɔ nam-sà-nə̌ə: 'trip meuang-gào gàp lôok-phêe-lôok-nɔ́ɔng'", en: "Presentation topic: 'Old town trip with cousins'" },
            { thai: "คุณจะทำอะไร บ้าง? อธิบาย แผนการของคุณ 📝📍", ipa: "khun jà tam à-rai bâang? à-thí-baai phɛ̌ɛn-gaan khɔ̌ng khun", en: "What will you do (list)? Explain your plan." },
            { thai: "คุณจะ เลี้ยง อาหารอะไร? จ่ายยังไง? เงินสด หรือ บัตร? 🍽️💸", ipa: "khun jà líang aa-hǎan à-rai? jàai yang-ngai? ngəən-sòt rʉ̌ʉ bàt?", en: "What food will you treat? How to pay? Cash or card?" }
        ];

        const interviewData = [
            { speaker: "Q1", thai: "ถ้า นัด กัน... คุณกลัว แมงมุม หรือ ผีเสื้อ ไหมเวลาเที่ยว นอกอาคาร? 🕷️🦋", ipa: "thâa nát gan... khun glua mɛɛng-mum rʉ̌ʉ pĭi-sêuuua mái wee-laa thîao nôrk-aa-kaan?", en: "If making plans... are you afraid of spiders or butterflies when traveling outdoors?" },
            { speaker: "Q2", thai: "ถ้าฉันบอกว่า 'ไม่รู้ว่า จะมีเวลาไหม' คุณจะ โกรธ หรือเปล่า? ⏳😠", ipa: "thâa chǎn bòk wâa 'mâi-rúu-wâa-jà-mii-way-laa-măi' khun jà gròht rĕu-bplào?", en: "If I say 'don't know if I'll have time', will you be angry or not?" },
            { speaker: "Q3", thai: "คุณมีความ พันธะ กับทริปนี้ไหม? หรือแค่ โลเล? 🤝🌀", ipa: "khun mii kwaam pan-tá gàp trip níi mái? rʉ̌ʉ kɛ̂ɛ lo:h-le:h?", en: "Do you have a commitment to this trip? Or just flaky?" }
        ];

        const discussData = [
            { thai: "1. การอ่านนิยาย ใน อ่าง อาบน้ำ... ทำให้ คุณภาพชีวิต ดีขึ้นไหม? หรือ เยอะไป? 🛁📖", ipa: "gaan àan-ní-yaaai nai àang àap-náam... tam-hâi khoon-ná-pâap chii-wít dii kʉ̂n mái? rʉ̌ʉ yóe-bpai?", en: "Does reading a novel in a bathtub... make quality of life better? Or too much?" },
            { thai: "2. ทุกวันนี้ นักท่องเที่ยว ตะวันตก ส่วนใหญ่ ทำลาย สิ่งแวดล้อม หรือเปล่า? 🌍🧳", ipa: "túk-wan-níi nák-thâawng-thîao dtà-wan-dtòk sùan-yài tam-laai sìng-wâet-lóm rĕu-bplào?", en: "These days, do most Western tourists destroy the environment or not?" },
            { thai: "3. ทำไมถึง บางคน ไถมือถืออยู่ดี เวลา นัด เจอเพื่อน? เศร้า ไหม? 📱😢", ipa: "tam-mai-tĕung baang khon tăi-mʉʉ-thʉ̌ʉ-yòo-dii wee-laa nát jəə phʉ̂an? sâo mái?", en: "How come some people scroll the phone anyway when meeting friends? Sad?" }
        ];

        // --- COMPONENT FACTORY ---

        function createHeader(dataObj, id) {
            return `
            <div class="flex flex-col md:flex-row items-center gap-3 border-b border-slate-200 pb-3 mb-4">
                <button onclick="speakText('${dataObj.h.thai.replace(/'/g, "\\'")}')" class="bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full w-10 h-10 flex-shrink-0 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
                <div class="text-center md:text-left flex-grow">
                    <h2 class="text-2xl font-bold text-slate-800">${dataObj.h.thai}</h2>
                    <div id="ipa-${id}-h" class="hidden"><p class="ipa-text text-sm">${dataObj.h.ipa}</p></div>
                    <div id="en-${id}-h" class="hidden"><p class="en-text text-sm">${dataObj.h.en}</p></div>
                </div>
                <div class="flex gap-2 text-xs">
                     <button onclick="toggleVisibility('ipa-${id}-h', this)" class="text-slate-400 hover:text-slate-600 font-bold border border-slate-200 px-2 py-1 rounded">IPA</button>
                     <button onclick="toggleVisibility('en-${id}-h', this)" class="text-slate-400 hover:text-slate-600 font-bold border border-slate-200 px-2 py-1 rounded">EN</button>
                </div>
            </div>`;
        }

        function createInstr(dataObj, id) {
            return `
            <div class="flex flex-col md:flex-row items-center gap-3">
                <button onclick="speakText('${dataObj.i.thai.replace(/'/g, "\\'")}')" class="text-slate-400 hover:text-slate-600 flex-shrink-0">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
                <div class="text-center md:text-left flex-grow">
                    <p class="text-lg text-slate-700 font-medium">${dataObj.i.thai}</p>
                    <div id="ipa-${id}-i" class="hidden"><p class="ipa-text text-sm">${dataObj.i.ipa}</p></div>
                    <div id="en-${id}-i" class="hidden"><p class="en-text text-sm italic">${dataObj.i.en}</p></div>
                </div>
                <div class="flex gap-2 text-[10px]">
                     <button onclick="toggleVisibility('ipa-${id}-i', this)" class="text-slate-400 hover:bg-slate-200 px-2 py-1 rounded border border-transparent">IPA</button>
                     <button onclick="toggleVisibility('en-${id}-i', this)" class="text-slate-400 hover:bg-slate-200 px-2 py-1 rounded border border-transparent">EN</button>
                </div>
            </div>`;
        }

        function createCard(item, id, showSpeaker = false, colorTheme = "amber") {
            const speakerLabel = showSpeaker && item.speaker ? `<span class="text-xs font-bold text-slate-400 uppercase tracking-wide mb-1 block">${item.speaker}</span>` : '';
            return `
            <div class="bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-all border border-slate-100 animate-fade-in">
                ${speakerLabel}
                <div class="flex items-start gap-3">
                    <button onclick="speakText('${item.thai.replace(/'/g, "\\'")}')" class="mt-1 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-full w-10 h-10 flex-shrink-0 flex items-center justify-center transition-colors">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                    <div class="flex-grow">
                        <p class="thai-text font-bold mb-2">${item.thai}</p>
                        <div id="ipa-${id}" class="hidden mb-1"><p class="ipa-text text-lg">${item.ipa}</p></div>
                        <div id="en-${id}" class="hidden"><p class="en-text text-sm border-t border-slate-100 pt-1 mt-1">${item.en}</p></div>
                        <div class="flex gap-2 mt-3">
                            <button onclick="toggleVisibility('ipa-${id}', this)" class="btn-toggle text-xs px-3 py-1 rounded-md border border-${colorTheme}-200 text-${colorTheme}-700 font-bold bg-${colorTheme}-50 hover:bg-${colorTheme}-100">IPA</button>
                            <button onclick="toggleVisibility('en-${id}', this)" class="btn-toggle text-xs px-3 py-1 rounded-md border border-slate-200 text-slate-600 font-bold bg-slate-50 hover:bg-slate-100">EN</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function createRandomCard(item, id) {
            return `
            <div class="flex flex-col items-center animate-fade-in w-full bg-white p-6 rounded-xl shadow-sm border border-emerald-100">
                <button onclick="speakText('${item.thai.replace(/'/g, "\\'")}')" class="mb-4 bg-emerald-100 text-emerald-700 hover:bg-emerald-200 rounded-full w-16 h-16 flex items-center justify-center transition-colors text-2xl">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
                <p class="text-3xl font-bold text-emerald-700 text-center mb-4">${item.thai}</p>
                <div id="ipa-${id}" class="hidden mb-2 text-center"><p class="ipa-text text-xl">${item.ipa}</p></div>
                <div id="en-${id}" class="hidden text-center mb-4"><p class="en-text text-lg border-t border-slate-200 pt-2">${item.en}</p></div>
                <div class="flex gap-3">
                    <button onclick="toggleVisibility('ipa-${id}', this)" class="btn-toggle px-4 py-2 rounded-lg border border-amber-200 text-amber-700 font-bold bg-amber-50 hover:bg-amber-100">IPA</button>
                    <button onclick="toggleVisibility('en-${id}', this)" class="btn-toggle px-4 py-2 rounded-lg border border-slate-200 text-slate-600 font-bold bg-slate-50 hover:bg-slate-100">EN</button>
                </div>
            </div>`;
        }

        // --- LOGIC ---

        function toggleVisibility(elementId, btn) {
            const el = document.getElementById(elementId);
            if (!el) return;
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                btn.classList.add('ring-2', 'ring-offset-1');
            } else {
                el.classList.add('hidden');
                btn.classList.remove('ring-2', 'ring-offset-1');
            }
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.8;
            
            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(voice => voice.lang === 'th-TH');
            if (thaiVoice) utterance.voice = thaiVoice;

            window.speechSynthesis.speak(utterance);
        }

        function generateRandomWord() {
            const randomIndex = Math.floor(Math.random() * fullVocabList.length);
            const item = fullVocabList[randomIndex];
            const html = createRandomCard(item, `rand-${Date.now()}`);
            document.getElementById('random-card-display').innerHTML = html;
        }

        function renderContent() {
            // Main Title
            document.getElementById('main-header').innerHTML = `
                <div class="flex flex-col items-center justify-center gap-2">
                    <button onclick="speakText('${uiData.mainTitle.thai.replace(/'/g, "\\'")}')" class="bg-slate-200 text-slate-700 hover:bg-slate-300 rounded-full w-12 h-12 flex items-center justify-center transition-colors mb-2">
                        <i class="fa-solid fa-volume-high text-xl"></i>
                    </button>
                    <h1 class="text-3xl md:text-4xl font-bold text-slate-800 text-center">${uiData.mainTitle.thai}</h1>
                    <div class="flex gap-2 text-xs mt-2">
                         <button onclick="toggleVisibility('ipa-main', this)" class="text-slate-500 hover:bg-slate-200 px-3 py-1 rounded-full border border-slate-300 font-bold">IPA</button>
                         <button onclick="toggleVisibility('en-main', this)" class="text-slate-500 hover:bg-slate-200 px-3 py-1 rounded-full border border-slate-300 font-bold">EN</button>
                    </div>
                    <div id="ipa-main" class="hidden mt-2"><p class="ipa-text text-xl">${uiData.mainTitle.ipa}</p></div>
                    <div id="en-main" class="hidden"><p class="en-text text-lg">${uiData.mainTitle.en}</p></div>
                </div>
            `;

            // Render Sections
            document.getElementById('h-leadin').innerHTML = createHeader(uiData.leadIn, 'leadin');
            document.getElementById('i-leadin').innerHTML = createInstr(uiData.leadIn, 'leadin');
            document.getElementById('c-leadin').innerHTML = leadinData.map((item, idx) => createCard(item, `leadin-${idx}`, false, 'sky')).join('');

            document.getElementById('h-game').innerHTML = createHeader(uiData.game, 'game');
            document.getElementById('i-game').innerHTML = createInstr(uiData.game, 'game');

            document.getElementById('h-roleplay').innerHTML = createHeader(uiData.roleplay, 'roleplay');
            document.getElementById('i-roleplay').innerHTML = createInstr(uiData.roleplay, 'roleplay');
            document.getElementById('c-roleplay').innerHTML = roleplayData.map((item, idx) => createCard(item, `role-${idx}`, true, 'indigo')).join('');

            document.getElementById('h-debate').innerHTML = createHeader(uiData.debate, 'debate');
            document.getElementById('i-debate').innerHTML = createInstr(uiData.debate, 'debate');
            document.getElementById('c-debate').innerHTML = debateData.map((item, idx) => createCard(item, `deb-${idx}`, true, 'orange')).join('');

            document.getElementById('h-story').innerHTML = createHeader(uiData.story, 'story');
            document.getElementById('i-story').innerHTML = createInstr(uiData.story, 'story');
            document.getElementById('c-story').innerHTML = storyData.map((item, idx) => createCard(item, `story-${idx}`, false, 'purple')).join('');

            document.getElementById('h-present').innerHTML = createHeader(uiData.presentation, 'present');
            document.getElementById('i-present').innerHTML = createInstr(uiData.presentation, 'present');
            document.getElementById('c-present').innerHTML = presentData.map((item, idx) => createCard(item, `pres-${idx}`, false, 'rose')).join('');

            document.getElementById('h-interview').innerHTML = createHeader(uiData.interview, 'int');
            document.getElementById('i-interview').innerHTML = createInstr(uiData.interview, 'int');
            document.getElementById('c-interview').innerHTML = interviewData.map((item, idx) => createCard(item, `int-${idx}`, true, 'teal')).join('');

            document.getElementById('h-discuss').innerHTML = createHeader(uiData.discuss, 'disc');
            document.getElementById('i-discuss').innerHTML = createInstr(uiData.discuss, 'disc');
            document.getElementById('c-discuss').innerHTML = discussData.map((item, idx) => createCard(item, `disc-${idx}`, false, 'amber')).join('');
        }

        // Initialize App
        window.addEventListener('DOMContentLoaded', () => {
            renderContent();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = () => {};
            }
        });
    </script>
</body>

        // Custom Web Component Definition
        class ThaiText extends HTMLElement {
            connectedCallback() {
                const thai = this.getAttribute('thai') || '';
                const ipa = this.getAttribute('ipa') || '';
                const en = this.getAttribute('en') || '';

                // Extract text without emojis for better TTS pronunciation
                const textForTTS = thai.replace(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\u{1F000}-\u{1F02F}]|[\u{1F0A0}-\u{1F0FF}]|[\u{1F1E6}-\u{1F1FF}]|[\u{1F201}-\u{1F251}]|[\u{1F900}-\u{1F9FF}]|[\u{1FA70}-\u{1FAFF}]|[\u{2B50}\u{2B55}\u{231A}\u{23F3}\u{23F0}\u{23F1}\u{23F2}\u{231B}\u{23E9}-\u{23EC}\u{23EA}\u{23EB}\u{23EC}\u{23F8}\u{23F9}\u{23FA}]/gu, '').trim();

                this.innerHTML = `
                    <div class="inline-flex flex-wrap items-center gap-2 my-1.5 p-2.5 bg-white rounded-xl border border-gray-200 shadow-sm w-full sm:w-auto hover:border-blue-300 transition-colors">
                        <span class="text-xl md:text-2xl font-medium text-gray-800 flex-grow leading-relaxed">${thai}</span>
                        <div class="flex items-center gap-2 ml-auto">
                            <button class="tts-btn w-10 h-10 flex items-center justify-center bg-blue-100 hover:bg-blue-200 text-blue-600 rounded-full transition-colors active:bg-blue-300" title="Play Audio">🔊</button>
                            <button class="ipa-btn px-3 py-1.5 text-sm bg-purple-100 hover:bg-purple-200 text-purple-700 rounded-lg transition-colors font-bold active:bg-purple-300">IPA</button>
                            <button class="en-btn px-3 py-1.5 text-sm bg-green-100 hover:bg-green-200 text-green-700 rounded-lg transition-colors font-bold active:bg-green-300">EN</button>
                        </div>
                        <div class="ipa-text hidden w-full text-base mt-2 pt-2 border-t border-purple-100 text-purple-600 italic font-medium">🗣️ ${ipa}</div>
                        <div class="en-text hidden w-full text-base mt-2 pt-2 border-t border-green-100 text-green-600 font-medium">🇬🇧 ${en}</div>
                    </div>
                `;

                // Event Listeners with stopPropagation to prevent parent click events
                this.querySelector('.tts-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    const utterance = new SpeechSynthesisUtterance(textForTTS);
                    utterance.lang = 'th-TH';
                    utterance.rate = 0.85; // Slightly slower for A1 student
                    window.speechSynthesis.speak(utterance);
                });

                const ipaText = this.querySelector('.ipa-text');
                this.querySelector('.ipa-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    ipaText.classList.toggle('hidden');
                });

                const enText = this.querySelector('.en-text');
                this.querySelector('.en-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    enText.classList.toggle('hidden');
                });
            }
        }
        
        // Define the custom element
        customElements.define('thai-text', ThaiText);

        // Application logic for random vocabulary draw
        function drawRandomWord() {
            if (vocabList.length === 0) return;
            const word = vocabList[Math.floor(Math.random() * vocabList.length)];
            const container = document.getElementById('random-word-container');
            
            // Re-render the container content with the drawn word
            container.innerHTML = `
                <div class="text-5xl mb-4 animate-bounce">${word.emoji}</div>
                <thai-text thai="${word.th}" ipa="${word.ipa}" en="${word.en}"></thai-text>
            `;
        }
    </script>

        // Text-to-Speech Function using Web Speech API
        function speakThai(text) {
            if ('speechSynthesis' in window) {
                // Cancel any ongoing speech to prevent queuing massive amounts if clicked repeatedly
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH';
                // Adjusting rate slightly slower for A1 learners
                utterance.rate = 0.85; 
                utterance.pitch = 1;

                window.speechSynthesis.speak(utterance);
            } else {
                console.warn("Text-to-Speech is not supported in this browser.");
            }
        }

        // Toggle visibility of IPA or EN sections
        function toggleSection(button, targetId, type) {
            const targetDiv = document.getElementById(targetId);
            const isOpening = !targetDiv.classList.contains('open');
            
            if (isOpening) {
                targetDiv.classList.add('open');
                if (type === 'ipa') button.classList.add('active-ipa');
                if (type === 'en') button.classList.add('active-en');
            } else {
                targetDiv.classList.remove('open');
                if (type === 'ipa') button.classList.remove('active-ipa');
                if (type === 'en') button.classList.remove('active-en');
            }
        }

                // Section Items

                    const textToSpeak = item.followUp ? `${item.thai} ${item.followUp.thai}` : item.thai;

                    htmlContent += `

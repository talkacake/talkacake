                        <ThaiText text="คุณ: ยินดีด้วยนะ เพื่อน! ทำงาน ที่ไหน?" ipa="kun: yin-dii dûai ná pʉ̂an! tam-ngaan tîi nǎi?" en="You: Congratulations, friend! Where do you work?" emoji="🙎‍♂️" speaker="B"/>
                        <ThaiText text="เพื่อน: ทำงาน ที่ ร้านอาหาร... ฉันจะ รวย แล้ว!" ipa="pʉ̂an: tam-ngaan tîi ráan aa-hăan... chǎn jà ruai lɛ́ɛo!" en="Friend: Working at a restaurant... I will be rich!" emoji="🤑" speaker="A"/>
                    </div>
                </div>

                {/* Real-life Interview */}
                <div className="bg-sky-50 p-5 rounded-[2rem] border-2 border-sky-200 shadow-sm">
                    <ThaiText text="สัมภาษณ์: เรื่องน่ายินดี" ipa="sǎm-pâat: rʉ̂ang nâa yin-dii" en="Interview: Good news" emoji="🎤" isHeader={true}/>
                    <ThaiText text="ตอบคำถามเหล่านี้" ipa="dtɔ̀ɔp kǎm-tǎam lǎo-níi" en="Answer these questions" emoji="💡" isBox={true} />
                    <div className="mt-4 space-y-2">
                        <ThaiText text="ปี นี้ คุณมีเรื่อง น่าตื่นเต้น ไหม?" ipa="bpee níi kun mii rʉ̂ang nâa-dtùuen-dtên mǎi?" en="This year, do you have any exciting news?" emoji="🤩" />
                        <ThaiText text="คุณอยากให้ เพื่อน พูด ยินดีด้วยนะ กับคุณ เรื่องอะไร?" ipa="kun yàak hâi pʉ̂an pûut yin-dii dûai ná gàp kun rʉ̂ang à-rai?" en="What do you want your friends to say 'congratulations' to you about?" emoji="🤔" />
                    </div>
                </div>

                {/* Speaking Game */}
                <div className="bg-emerald-50 p-5 rounded-[2rem] border-2 border-emerald-200 shadow-sm">
                    <ThaiText text="เกม: ข่าวดีของฉัน" ipa="geem: khàao dii kɔ̌ɔng chǎn" en="Game: My Good News" emoji="📰" isHeader={true}/>
                    <ThaiText text="นักเรียนบอก ข่าว ดี 1 เรื่อง ครูตอบ ยินดีด้วยนะ" ipa="nák-rian bɔ̀ɔk khàao dii nʉ̀ng rʉ̂ang kruu dtɔ̀op yin-dii dûai ná" en="Student tells 1 piece of good news, teacher replies Congrats." emoji="🎯" isBox={true} />
                    <ThaiText text="ตัวอย่าง: วันนี้ กิน หมูกรอบ... ยินดีด้วยนะ!" ipa="dtua-yàang: wan-níi gin mǔu-grɔ̀ɔp... yin-dii dûai ná!" en="Example: Today I ate crispy pork... Congratulations!" emoji="🐷" />
                </div>
            </div>
        );

        const ExtensionSection = () => (
            <div className="space-y-6 pb-8 fade-in">
                <ThaiText text="กิจกรรมเสริม" ipa="gìt-jà-gam sə̌əm" en="Extension Activities" emoji="🚀" isHeader={true} />

                {/* Real-life Debate */}
                <div className="bg-orange-50 p-5 rounded-[2rem] border-2 border-orange-200 shadow-sm">
                    <ThaiText text="โต้วาที: ข่าวดี" ipa="dtôo-waa-tii: khàao dii" en="Debate: Good news" emoji="⚖️" isHeader={true}/>
                    <ThaiText text="บอก ข่าว ดี ให้ เพื่อน รู้ VS ไม่ บอก ใคร" ipa="bɔ̀ɔk khàao dii hâi pʉ̂an rúu VS mâi bɔ̀ɔk krai" en="Tell good news to friends VS Don't tell anyone" emoji="🥊" isTitle={true}/>
                    <ThaiText text="คุณ คิดว่า แบบไหน ดีกว่ากัน? ทำไม?" ipa="kun kít wâa bɛ̀ɛp nǎi dii gwàa gan? tam-mai?" en="Which way do you think is better? Why?" emoji="🤔" isBox={true} />
                </div>

                {/* Real-life Story-telling */}
                <div className="bg-purple-50 p-5 rounded-[2rem] border-2 border-purple-200 shadow-sm">
                    <ThaiText text="เล่าเรื่อง: วันที่มีความสุข" ipa="lâo rʉ̂ang: wan tîi mee kwaam sùk" en="Storytelling: A happy day" emoji="😊" isHeader={true}/>
                    <ThaiText text="ใช้คำศัพท์: ยินดีด้วยนะ, มีความสุข, เลี้ยง, เพื่อน" ipa="chái kam-sàp: yin-dii dûai ná, mee kwaam sùk, líang, pʉ̂an" en="Use vocab: Congrats, Happy, Treat (pay for), Friend" emoji="🎯" isBox={true} />
                    <ThaiText text="เล่าเรื่อง วันที่คุณ มีความสุข มากๆ และ เพื่อน พูดว่า ยินดีด้วยนะ" ipa="lâo rʉ̂ang wan tîi kun mee kwaam sùk mâak mâak lɛ́ pʉ̂an pûut wâa yin-dii dûai ná" en="Tell a story about a day you were very happy and friends said congratulations." emoji="📖" />
                </div>

                {/* Real-life Presentation */}
                <div className="bg-teal-50 p-5 rounded-[2rem] border-2 border-teal-200 shadow-sm">
                    <ThaiText text="นำเสนอ: 3 ข่าวดีของวันนี้" ipa="nam-sà-nə̌ə: sǎam khàao dii kɔ̌ɔng wan-níi" en="Presentation: 3 Good news today" emoji="📊" isHeader={true}/>
                    <ThaiText text="บอก 3 ข่าว ดี ของ วันนี้ ให้ ครู ฟัง" ipa="bɔ̀ɔk sǎam khàao dii kɔ̌ɔng wan-níi hâi kroo fang" en="Tell 3 pieces of good news today to the teacher." emoji="🗣️" isBox={true} />
                </div>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const [currentTab, setCurrentTab] = useState('review');

            const tabs = [
                { id: 'review', icon: 'refresh', label: 'ทบทวน' },
                { id: 'lesson', icon: 'book', label: 'บทเรียน' },
                { id: 'speak', icon: 'message', label: 'พูด' },
                { id: 'ext', icon: 'zap', label: 'เสริม' }
            ];

            return (
                <div className="max-w-md mx-auto min-h-screen relative shadow-2xl bg-[#f8fafc] overflow-x-hidden">
                    
                    {/* Sticky Header */}
                    <div className="bg-white p-5 shadow-sm sticky top-0 z-40 border-b border-slate-200 flex items-center justify-center">
                        <ThaiText 
                            text="ยินดีด้วยนะ Congrats" 
                            ipa="yin-dii dûai ná" 
                            en="Congratulations" 
                            emoji="🎉" 
                            isTitle={true} 
                        />
                    </div>

                    {/* Content Area */}
                    <div className="px-5 pt-6 pb-28">
                        {currentTab === 'review' && <ReviewSection />}
                        {currentTab === 'lesson' && <LessonSection />}
                        {currentTab === 'speak' && <SpeakingSection />}
                        {currentTab === 'ext' && <ExtensionSection />}
                    </div>

                    {/* Bottom Navigation */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-200 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] rounded-t-3xl z-50 pb-safe">
                        <div className="flex justify-around px-2 py-3">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setCurrentTab(tab.id)}
                                    className={`flex flex-col items-center justify-center w-[22%] py-2 rounded-2xl transition-all ${currentTab === tab.id ? 'text-indigo-600 scale-110' : 'text-slate-400 hover:text-indigo-400'}`}
                                >
                                    <Icon name={tab.icon} size={24} className={currentTab === tab.id ? 'drop-shadow-md' : ''} />
                                    <span className={`text-[11px] mt-1 font-semibold ${currentTab === tab.id ? 'font-bold' : ''}`}>{tab.label}</span>
                                    {currentTab === tab.id && <div className="w-1 h-1 bg-indigo-600 rounded-full mt-1"></div>}
                                </button>
                            ))}
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

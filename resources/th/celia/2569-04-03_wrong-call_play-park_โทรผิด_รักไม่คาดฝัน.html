            const [showIpa, setShowIpa] = useState(false);
            const [showEn, setShowEn] = useState(false);

            const handleSpeak = (e) => {
                e.stopPropagation();
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text.replace(/\[.*?\]/g, '')); // Read without brackets

                    utterance.rate = 0.85;
                    window.speechSynthesis.speak(utterance);
                }
            };

            let textClass = "font-medium cursor-pointer group flex-1 flex flex-wrap items-center gap-2 ";

                textClass += "text-lg text-slate-700 italic justify-center text-center";

                            qNum={1}

                            qIpa="Ing-ing yàak jà too bpai tîi nǎi?"

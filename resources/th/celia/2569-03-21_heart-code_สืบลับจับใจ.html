            { t: "สวนสนุก", i: "sŭan-sà-nùk", e: "amusement park", em: "🎢" }, { t: "เฉยๆ", i: "chŏei-chŏei", e: "so so (feeling)", em: "😐" },
            { t: "สะเทือนอารมณ์", i: "sà-thʉ̄an-aa-rom", e: "emotional", em: "😢" }, { t: "วิวาห์", i: "wí-waa", e: "wedding", em: "💍" },
            { t: "ปฐพี", i: "bpà-thá-pee", e: "earth", em: "🌍" }, { t: "น่ากิน", i: "nâa-gin", e: "looks delicious", em: "🤤" },
            { t: "ส้มตำ", i: "sôm-dtam", e: "papaya salad", em: "🥗" }, { t: "ช้า", i: "cháa", e: "slow", em: "🐢" },
            { t: "ตื่น", i: "dteùn", e: "wake up", em: "⏰" }, { t: "เช้า", i: "cháo", e: "morning", em: "🌅" },
            { t: "เหรอ", i: "rǒr", e: "really?", em: "🤔" }, { t: "บอก", i: "bòk", e: "tell", em: "🗣️" },
            { t: "สำรวจ", i: "sàm-rùat", e: "explore", em: "🧭" }, { t: "ดิน", i: "din", e: "earth/soil", em: "🌍" },
            { t: "ลม", i: "lom", e: "wind", em: "💨" }, { t: "เนื้อเพลง", i: "nʉ́ʉa-pleng", e: "lyrics", em: "🎵" },
            { t: "ข่าว", i: "khàao", e: "news", em: "📰" }, { t: "ใจดี", i: "jai-dee", e: "kind", em: "😊" },
            { t: "ร้านอาหาร", i: "ráan-aa-hăan", e: "restaurant", em: "🍽️" }, { t: "ประหม่า", i: "bprà-màa", e: "nervous", em: "😳" },
            { t: "ทุก", i: "tóok", e: "every", em: "🔁" }, { t: "งาน", i: "ngaan", e: "work; job", em: "💼" },
            { t: "เลย", i: "loei", e: "immediately", em: "⚡️" }, { t: "วันจันทร์", i: "wan-jan", e: "Monday", em: "📅" },
            { t: "เก้า", i: "gâo", e: "9", em: "9️⃣" }
        ];

        // --- CORE COMPONENT: Interactive Thai Text ---
        const ThaiText = ({ text, ipa, en, emoji = "", speaker = "", isHeader = false, isTitle = false, isBox = false }) => {
            const [showIpa, setShowIpa] = useState(false);
            const [showEn, setShowEn] = useState(false);

            const handleSpeak = (e) => {
                e.stopPropagation();
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'th-TH';
                    utterance.rate = 0.85;
                    window.speechSynthesis.speak(utterance);
                }
            };

            let containerClass = "w-full rounded-2xl p-4 mb-3 transition-all relative ";
            let textClass = "font-medium cursor-pointer group flex-1 flex flex-wrap items-center gap-2 ";

            if (isTitle) {
                containerClass += "bg-emerald-600 shadow-lg border border-emerald-400";
                textClass += "text-2xl md:text-3xl font-bold text-white text-center justify-center";
            } else if (isHeader) {
                containerClass += "bg-emerald-50 border-2 border-emerald-200 shadow-sm";
                textClass += "text-xl md:text-2xl font-bold text-emerald-800";
            } else if (isBox) {
                containerClass += "bg-white border-2 border-dashed border-slate-300 shadow-sm";
                textClass += "text-lg text-slate-700 italic justify-center text-center";
            } else {
                containerClass += "bg-white border border-slate-200 shadow-sm hover:border-emerald-300 hover:shadow-md";
                textClass += "text-lg text-slate-800";
            }

            return (
                <div className={containerClass}>
                    {speaker && <div className="text-xs font-bold text-emerald-500 uppercase mb-1">{speaker}</div>}
                    
                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                        <div onClick={handleSpeak} className={textClass}>
                            {emoji && <span>{emoji}</span>}
                            <span className="hover:text-emerald-500 transition-colors">
                                {text} <span className="text-xl opacity-30 group-hover:opacity-100 transition-opacity">🔊</span>
                            </span>
                        </div>
                        
                        <div className="flex gap-2 shrink-0 self-end sm:self-auto">
                            <button 
                                onClick={() => setShowIpa(!showIpa)}
                                className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-colors ${showIpa ? 'bg-amber-400 text-amber-900 shadow-inner' : (isTitle ? 'bg-emerald-800 text-emerald-200 hover:bg-emerald-900' : 'bg-slate-100 text-slate-500 hover:bg-slate-200')}`}
                            >
                                IPA
                            </button>
                            <button 
                                onClick={() => setShowEn(!showEn)}
                                className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-colors ${showEn ? 'bg-blue-500 text-white shadow-inner' : (isTitle ? 'bg-emerald-800 text-emerald-200 hover:bg-emerald-900' : 'bg-slate-100 text-slate-500 hover:bg-slate-200')}`}
                            >
                                EN
                            </button>
                        </div>
                    </div>

                    {(showIpa || showEn) && (
                        <div className={`mt-3 pt-3 flex flex-col gap-2 fade-in border-t border-dashed ${isTitle ? 'border-emerald-400/50' : 'border-slate-200'}`}>
                            {showIpa && (
                                <div className={`flex items-start gap-2 font-mono ${isTitle ? 'text-amber-200' : 'text-amber-600'}`}>
                                    <span className="text-[10px] font-bold uppercase mt-1 opacity-60">IPA</span>
                                    <span>{ipa}</span>
                                </div>
                            )}
                            {showEn && (
                                <div className={`flex items-start gap-2 ${isTitle ? 'text-blue-100' : 'text-blue-600'}`}>
                                    <span className="text-[10px] font-bold uppercase mt-1 opacity-60">EN</span>
                                    <span className="italic">{en}</span>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- SECTIONS ---

        const ReviewSection = () => {
            const [currentIndex, setCurrentIndex] = useState(0);

            useEffect(() => { pickRandom(); }, []);

            const pickRandom = () => {
                const randIndex = Math.floor(Math.random() * reviewVocabList.length);
                setCurrentIndex(randIndex);
            };

            const word = reviewVocabList[currentIndex];
            if (!word) return null;

            return (
                <div className="space-y-4 pb-8 fade-in">
                    <ThaiText text="เกมทบทวนคำศัพท์" ipa="geem tób-tuan kam-sàp" en="Vocabulary Review Game" emoji="🎲" isHeader={true} />
                    <ThaiText text="สร้างประโยคจากคำนี้!" ipa="sâang bprà-yòok jàak kam níi!" en="Make a sentence from this word!" emoji="🎯" />
                    
                    <div className="bg-gradient-to-br from-emerald-500 to-teal-600 p-8 rounded-[2rem] shadow-xl text-center relative overflow-hidden mt-6">
                        <div className="text-8xl mb-6 drop-shadow-xl">{word.em}</div>
                        <ThaiText text={word.t} ipa={word.i} en={word.e} isTitle={true} />
                        
                        <button 
                            onClick={pickRandom}
                            className="mt-6 bg-white text-emerald-700 font-bold text-lg px-8 py-4 rounded-full shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-2 mx-auto w-full sm:w-auto"
                        >
                            <Icon name="refresh" size={20} /> <span>สุ่มคำใหม่</span>
                        </button>
                    </div>

                    <div className="mt-8">
                        <ThaiText text="ตัวอย่างในชีวิตจริง" ipa="dtua-yàang nai chii-wít jing" en="Real-life Example" emoji="💡" isHeader={true} />
                        <ThaiText text="ตอนนี้ ฉัน หิว มาก... อยากกิน อาหารตามสั่ง" ipa="dtɔɔn-níi chǎn hǐu mâak... yàak gin aa-hăan-dtaam-sàng" en="Right now I am very hungry... I want to eat made-to-order food." emoji="🍛" isBox={true} />
                    </div>
                </div>
            );
        };

        const VideoSection = () => (
            <div className="space-y-4 pb-8 fade-in">
                <ThaiText text="ดูวิดีโอคลิป" ipa="duu wí-dii-oo klíp" en="Watch the video clip" emoji="🎬" isHeader={true} />
                <ThaiText text="เริ่มดูที่นาที 0:00 - 0:05 นะคะ" ipa="rə̂əm duu tîi naa-tii sǔun tʉ̌ng hâa ná-ká" en="Please watch from 0:00 to 0:05" emoji="⏱️" />
                
                <div className="rounded-[2rem] overflow-hidden shadow-xl bg-black aspect-video relative border-4 border-emerald-100">
                    <iframe 
                        className="w-full h-full absolute top-0 left-0"
                        src="https://drive.google.com/file/d/1XRwpQnEbzw0EMiTvZVXJaHU262MMep1-/preview" 
                        title="Google Drive Video Player" 
                        frameBorder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowFullScreen>
                    </iframe>
                </div>

                <div className="mt-8 space-y-2">
                    <ThaiText text="บทสนทนา" ipa="bòt sǒn-tá-naa" en="Dialogue" emoji="💬" isHeader={true}/>
                    {scriptData.map((line, i) => (
                        <ThaiText key={i} text={line.t} ipa={line.i} en={line.e} emoji={line.em} speaker={line.speaker} />
                    ))}
                </div>
            </div>
        );

        const VocabSection = () => (
            <div className="space-y-4 pb-8 fade-in">
                <ThaiText text="คำศัพท์น่ารู้ 5 คำ" ipa="kam-sàp nâa-rúu hâa kam" en="5 Useful Vocabulary Words" emoji="🧠" isHeader={true} />
                <ThaiText text="ใช้คำศัพท์เหล่านี้ในชีวิตจริง" ipa="chái kam-sàp lǎo-níi nai chii-wít jing" en="Use these vocabulary words in real life" emoji="🌍" />
                
                <div className="flex flex-col gap-2 mt-4">
                    {targetVocab.map((v, i) => (
                        <ThaiText key={i} text={v.t} ipa={v.i} en={v.e} emoji={v.em} />
                    ))}
                </div>
            </div>
        );

        const SpeakingSection = () => (
            <div className="space-y-6 pb-8 fade-in">
                <ThaiText text="กิจกรรมพูดในชีวิตจริง" ipa="gìt-jà-gam pûut nai chii-wít jing" en="Real-life Speaking Activities" emoji="🗣️" isHeader={true} />

                {/* Real-life Roleplay */}
                <div className="bg-sky-50 p-5 rounded-[2rem] border-2 border-sky-200 shadow-sm">
                    <ThaiText text="บทบาทสมมติ: สั่งอาหารตอนรีบ" ipa="bòt-bàat sǒm-mút: sàng aa-hǎan dtɔɔn rîip" en="Roleplay: Ordering food in a hurry" emoji="🏃‍♂️" isHeader={true}/>
                    <ThaiText text="ใช้คำศัพท์: มีอะไรอีกบ้าง, ตอนนี้, ไม่มีเวลา" ipa="chái kam-sàp: mii à-rai ìik bâang, dtɔɔn-níi, mâi mii wee-laa" en="Use vocab: What else is there, Right now, Have no time" emoji="🎯" isBox={true} />
                    
                    <div className="mt-4 space-y-2">
                        <ThaiText text="คุณ: สั่ง กะเพรา หมูกรอบ ค่ะ ตอนนี้ ไม่มีเวลา แล้ว" ipa="kun: sàng gà-prao mǔu-grɔ̀ɔp kâ, dtɔɔn-níi mâi mii wee-laa lɛ́ɛo" en="You: Order crispy pork basil. Right now I have no time." emoji="🙋‍♀️" speaker="A"/>
                        <ThaiText text="พนักงาน: หมูกรอบ หมด แล้วครับ" ipa="pá-nák-ngaan: mǔu-grɔ̀ɔp mòt lɛ́ɛo kráp" en="Staff: Crispy pork is out of stock." emoji="👨‍🍳" speaker="B"/>
                        <ThaiText text="คุณ: งั้น มีอะไรอีกบ้าง คะ ที่ได้เร็วๆ?" ipa="kun: ngân mii à-rai ìik bâang ká tîi dâi reo-reo?" en="You: Then what else is there that is fast?" emoji="🤷‍♀️" speaker="A"/>
                    </div>
                </div>

                {/* Real-life Interview */}
                <div className="bg-orange-50 p-5 rounded-[2rem] border-2 border-orange-200 shadow-sm">
                    <ThaiText text="สัมภาษณ์: ทำความรู้จักเพื่อนใหม่" ipa="sǎm-pâat: tam kwaam rúu-jàk pʉ̂an mài" en="Interview: Getting to know a new friend" emoji="🤝" isHeader={true}/>
                    <ThaiText text="ตอบคำถามเหล่านี้" ipa="dtɔ̀ɔp kǎm-tǎam lǎo-níi" en="Answer these questions" emoji="🎯" isBox={true} />
                    
                    <div className="mt-4 space-y-2">
                        <ThaiText text="มีอะไรอีกบ้าง ที่ฉัน ยังไม่รู้ เกี่ยวกับ คุณ?" ipa="mii à-rai ìik bâang tîi chǎn yang mâi rúu gìao-gàp kun?" en="What else is there that I still don't know about you?" emoji="❓" />
                        <ThaiText text="เล่าเรื่อง ตลก เกี่ยวกับ ครอบครัว ของคุณให้ฟังหน่อย" ipa="lâo rʉ̂ang dtà-lòk gìao-gàp krɔ̂ɔp-krua kɔ̌ɔng kun hâi fang nòi" en="Tell me a funny story about your family." emoji="😂" />
                    </div>
                </div>

                {/* Real-life Discussion */}
                <div className="bg-amber-50 p-5 rounded-[2rem] border-2 border-amber-200 shadow-sm">
                    <ThaiText text="สนทนา: การบริหารเวลา" ipa="sǒn-tá-naa: gaan bɔɔ-rí-hǎan wee-laa" en="Discussion: Time Management" emoji="⏰" isHeader={true}/>
                    <ThaiText text="ทำไม ตอนเช้า คุณชอบพูดว่า 'ไม่มีเวลา'?" ipa="tam-mai dtɔɔn cháo kun chɔ̂ɔp pûut wâa 'mâi mii wee-laa'?" en="Why in the morning do you like to say 'I have no time'?" emoji="🌅" />
                </div>
            </div>
        );

        const ExtensionSection = () => (
            <div className="space-y-6 pb-8 fade-in">
                <ThaiText text="กิจกรรมเสริม" ipa="gìt-jà-gam sə̌əm" en="Extension Activities" emoji="🚀" isHeader={true} />

                {/* Real-life Debate */}
                <div className="bg-rose-50 p-5 rounded-[2rem] border-2 border-rose-200 shadow-sm">
                    <ThaiText text="โต้วาที: ความลับ" ipa="dtôo-waa-tii: kwaam-láp" en="Debate: Secrets" emoji="⚖️" isHeader={true}/>
                    <ThaiText text="รู้ทุกเรื่อง VS ยังไม่รู้ ดีกว่า" ipa="rúu túk rʉ̂ang VS yang mâi rúu dii gwàa" en="Knowing everything VS Better not to know" emoji="🥊" isTitle={true}/>
                    <ThaiText text="เกี่ยวกับ แฟน ของคุณ คุณอยาก รู้ ทุกเรื่องไหม? ทำไม?" ipa="gìao-gàp faen kɔ̌ɔng kun, kun yàak rúu túk rʉ̂ang mǎi? tam-mai?" en="About your partner, do you want to know everything? Why?" emoji="🤔" isBox={true} />
                </div>

                {/* Real-life Story-telling */}
                <div className="bg-purple-50 p-5 rounded-[2rem] border-2 border-purple-200 shadow-sm">
                    <ThaiText text="เล่าเรื่อง: วันที่ฉันสาย" ipa="lâo rʉ̂ang: wan tîi chǎn sǎai" en="Storytelling: The day I was late" emoji="🏃‍♀️" isHeader={true}/>
                    <ThaiText text="ใช้คำศัพท์: ไม่มีเวลา, ลืม, ตื่น, ขับรถ" ipa="chái kam-sàp: mâi mii wee-laa, lʉʉm, dtʉ̀ʉn, kàp rót" en="Use vocab: Have no time, Forget, Wake up, Drive a car" emoji="🎯" isBox={true} />
                    <ThaiText text="เล่าเรื่อง วันที่คุณ ไม่มีเวลา และไปทำงานสาย" ipa="lâo rʉ̂ang wan tîi kun mâi mii wee-laa lɛ́ bpai tam-ngaan sǎai" en="Tell a story about a day you had no time and went to work late." emoji="🏢" />
                </div>

                {/* Real-life Presentation */}
                <div className="bg-emerald-50 p-5 rounded-[2rem] border-2 border-emerald-200 shadow-sm">
                    <ThaiText text="นำเสนอ: 3 ความลับของฉัน" ipa="nam-sà-nə̌ə: sǎam kwaam-láp kɔ̌ɔng chǎn" en="Presentation: My 3 Secrets" emoji="🤫" isHeader={true}/>
                    <ThaiText text="บอก 3 สิ่ง เกี่ยวกับ ตัวคุณ ที่ครู ยังไม่รู้" ipa="bɔ̀ɔk sǎam sìng gìao-gàp dtua kun tîi kruu yang mâi rúu" en="Tell 3 things about yourself that the teacher still doesn't know." emoji="🗣️" isBox={true} />
                </div>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const [currentTab, setCurrentTab] = useState('review');

            const tabs = [
                { id: 'review', icon: 'refresh', label: 'ทบทวน' },
                { id: 'video', icon: 'play', label: 'วิดีโอ' },
                { id: 'vocab', icon: 'star', label: 'คำศัพท์' },
                { id: 'speak', icon: 'message', label: 'พูด' },
                { id: 'ext', icon: 'zap', label: 'เสริม' }
            ];

            return (
                <div className="max-w-md mx-auto min-h-screen relative shadow-2xl bg-[#f8fafc] overflow-x-hidden">
                    
                    {/* Sticky Header */}
                    <div className="bg-white p-5 shadow-sm sticky top-0 z-40 border-b border-slate-200">
                        <ThaiText 
                            text="สืบลับจับใจ heart code" 
                            ipa="sʉ̀ʉp láp jàp jai heart code" 
                            en="Investigating Secrets, Capturing Hearts (Heart Code)" 
                            emoji="🔎❤️" 
                            isTitle={true} 
                        />
                    </div>

                    {/* Content Area */}
                    <div className="px-5 pt-6 pb-28">
                        {currentTab === 'review' && <ReviewSection />}
                        {currentTab === 'video' && <VideoSection />}
                        {currentTab === 'vocab' && <VocabSection />}
                        {currentTab === 'speak' && <SpeakingSection />}
                        {currentTab === 'ext' && <ExtensionSection />}
                    </div>

                    {/* Bottom Navigation */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-200 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] rounded-t-3xl z-50 pb-safe">
                        <div className="flex justify-between px-2 py-3">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setCurrentTab(tab.id)}
                                    className={`flex flex-col items-center justify-center w-[20%] py-2 rounded-2xl transition-all ${currentTab === tab.id ? 'text-emerald-600 scale-110' : 'text-slate-400 hover:text-emerald-400'}`}
                                >
                                    <Icon name={tab.icon} size={24} className={currentTab === tab.id ? 'drop-shadow-md' : ''} />
                                    <span className={`text-[11px] mt-1 font-semibold ${currentTab === tab.id ? 'font-bold' : ''}`}>{tab.label}</span>
                                    {currentTab === tab.id && <div className="w-1 h-1 bg-emerald-600 rounded-full mt-1"></div>}
                                </button>
                            ))}
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

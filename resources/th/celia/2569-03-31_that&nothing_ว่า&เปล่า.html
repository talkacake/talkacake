        // --- CORE COMPONENT: Interactive Thai Text ---
        const ThaiText = ({ text, ipa, en, emoji = "", speaker = "", isHeader = false, isTitle = false, isBox = false }) => {
            const [showIpa, setShowIpa] = useState(false);
            const [showEn, setShowEn] = useState(false);

            const handleSpeak = (e) => {
                e.stopPropagation();
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'th-TH';
                    utterance.rate = 0.85;
                    window.speechSynthesis.speak(utterance);
                }
            };

            let containerClass = "w-full rounded-2xl p-4 mb-3 transition-all relative ";
            let textClass = "font-medium cursor-pointer group flex-1 flex flex-wrap items-center gap-2 ";

            if (isTitle) {
                containerClass += "bg-teal-600 shadow-lg border border-teal-400";
                textClass += "text-2xl md:text-3xl font-bold text-white text-center justify-center";
            } else if (isHeader) {
                containerClass += "bg-teal-50 border-2 border-teal-200 shadow-sm";
                textClass += "text-xl md:text-2xl font-bold text-teal-800";
            } else if (isBox) {
                containerClass += "bg-white border-2 border-dashed border-slate-300 shadow-sm";
                textClass += "text-lg text-slate-700 italic justify-center text-center";
            } else {
                containerClass += "bg-white border border-slate-200 shadow-sm hover:border-teal-300 hover:shadow-md";
                textClass += "text-lg text-slate-800";
            }

            return (
                <div className={containerClass}>

                            >

                            const isSelectedAndCorrect = answers[qNum] === true && c.correct;
                            const isSelectedAndWrong = answers[qNum] === false && !c.correct;
                            let btnClass = "w-full text-left p-3 rounded-xl border-2 transition-all font-medium ";
                            
                            if (isSelectedAndCorrect) btnClass += "bg-green-100 border-green-500 text-green-800";
                            else if (isSelectedAndWrong) btnClass += "bg-red-50 border-red-300 text-red-700 opacity-50";
                            else btnClass += "bg-slate-50 border-slate-200 text-slate-700 hover:border-teal-400";

                            return (
                                <button key={i} onClick={() => checkAnswer(qNum, c.correct)} className={btnClass}>
                                    {c.text} {isSelectedAndCorrect && "✅"} {isSelectedAndWrong && "❌"}
                                </button>
                            );
                        })}
                    </div>
                </div>
            );

            return (
                <div className="space-y-6 pb-8 fade-in">
                    <ThaiText text="เรียนรู้คำศัพท์ใหม่: เปล่า & ว่า" ipa="rian-rúu kam-sàp mài: bplàao lɛ́ wâa" en="Learn new vocab: Plao & Waa" emoji="📚" isHeader={true} />
                    
                    {/* Target Vocab */}
                    <div className="bg-slate-100 p-4 rounded-2xl border border-slate-200">
                        {targetVocab.map((v, i) => (
                            <ThaiText key={i} text={v.t} ipa={v.i} en={v.e} emoji={v.em} />
                        ))}
                    </div>

                    {/* Dialogue 1: เปล่า */}
                    <div className="bg-sky-50 p-5 rounded-[2rem] border-2 border-sky-200 shadow-sm mt-6">
                        <ThaiText text="บทสนทนา 1: ร้านอาหาร" ipa="bòt sǒn-tá-naa nʉ̀ng: ráan aa-hǎan" en="Dialogue 1: Restaurant" emoji="🍽️" isHeader={true}/>
                        <div className="mt-4 space-y-2">
                            <ThaiText text="พนักงาน: รับ น้ำหวาน หรือเปล่า คะ?" ipa="pá-nák-ngaan: ráp náam-wǎan rʉ̌ʉ-bplàao ká?" en="Staff: Do you want sweet drinks or not?" speaker="A" emoji="💁‍♀️"/>
                            <ThaiText text="ลูกค้า: เปล่า ครับ ขอ น้ำเปล่า 1 แก้ว" ipa="lûuk-káa: bplàao kráp, kɔ̌ɔ náam-bplàao nʉ̀ng gɛ̂ɛo" en="Customer: No, I'll have 1 plain water." speaker="B" emoji="🙋‍♂️"/>
                        </div>
                        <Question 
                            qNum={1} 
                            qText="คำว่า 'เปล่า' ในประโยค 'เปล่าครับ ขอน้ำเปล่า' มีความหมายว่าอะไร?" 
                            choices={[
                                { text: "ก. น้ำ (Water)", correct: false },
                                { text: "ข. ไม่ / ไม่เอา (No)", correct: true },
                                { text: "ค. ใช่ (Yes)", correct: false }
                            ]} 
                        />
                    </div>

                    {/* Dialogue 2: ว่า */}
                    <div className="bg-amber-50 p-5 rounded-[2rem] border-2 border-amber-200 shadow-sm mt-6">
                        <ThaiText text="บทสนทนา 2: คุยกับเพื่อน" ipa="bòt sǒn-tá-naa sɔ̌ɔng: kui gàp pʉ̂an" en="Dialogue 2: Talking to a friend" emoji="👥" isHeader={true}/>
                        <div className="mt-4 space-y-2">
                            <ThaiText text="เค้ก: ครู บอกว่า พรุ่งนี้ ไม่มี เรียน" ipa="kéek: kruu bɔ̀ɔk wâa prûng-níi mâi mii rian" en="Cake: The teacher said that tomorrow there is no class." speaker="A" emoji="👧"/>
                            <ThaiText text="ดิน: จริงเหรอ? ฉัน คิดว่า เรา มี เรียน นะ" ipa="din: jing rɔ̌ɔ? chǎn kít wâa rao mii rian ná" en="Din: Really? I think that we have class." speaker="B" emoji="👦"/>
                        </div>
                        <Question 
                            qNum={2} 
                            qText="คำว่า 'ว่า' ทำหน้าที่อะไรในประโยค?" 
                            choices={[
                                { text: "ก. เป็นคำถาม (Question word)", correct: false },
                                { text: "ข. แปลว่า 'ด่า' (To scold)", correct: false },
                                { text: "ค. เชื่อมประโยค แปลว่า 'that' (Conjunction)", correct: true }
                            ]} 
                        />
                    </div>
                </div>
            );
        };

        const SpeakingSection = () => (
            <div className="space-y-6 pb-8 fade-in">
                <ThaiText text="กิจกรรมพูดในชีวิตจริง" ipa="gìt-jà-gam pûut nai chii-wít jing" en="Real-life Speaking Activities" emoji="🗣️" isHeader={true} />

                {/* Real-life Roleplay */}
                <div className="bg-rose-50 p-5 rounded-[2rem] border-2 border-rose-200 shadow-sm">
                    <ThaiText text="บทบาทสมมติ: สั่งอาหาร" ipa="bòt-bàat sǒm-mút: sàng aa-hǎan" en="Roleplay: Ordering Food" emoji="🍛" isHeader={true}/>
                    <ThaiText text="ใช้คำศัพท์: หรือเปล่า, เปล่า, น้ำเปล่า, บอกว่า" ipa="chái kam-sàp: rʉ̌ʉ-bplàao, bplàao, náam-bplàao, bɔ̀ɔk wâa" en="Use vocab: Or not, No, Plain water, Say that" emoji="🎯" isBox={true} />
                    
                    <div className="mt-4 space-y-2">
                        <ThaiText text="ครู: รับ ไข่ดาว หรือเปล่า คะ?" ipa="kruu: ráp khài-daao rʉ̌ʉ-bplàao ká?" en="Teacher: Want a fried egg or not?" emoji="👩‍🏫" speaker="ครู"/>
                        <ThaiText text="นักเรียน: เปล่า ครับ แฟน บอกว่า ไม่กิน ไข่ดาว" ipa="nák-rian: bplàao kráp, faen bɔ̀ɔk wâa mâi gin khài-daao" en="Student: No, my partner said that they don't eat fried eggs." emoji="👨‍🎓" speaker="นักเรียน"/>
                    </div>
                </div>

                {/* Speaking Game */}
                <div className="bg-purple-50 p-5 rounded-[2rem] border-2 border-purple-200 shadow-sm">
                    <ThaiText text="เกมต่อประโยคซุบซิบ" ipa="geem dtɔ̀ɔ bprà-yòok súp-síp" en="Gossip Chain Game" emoji="🤫" isHeader={true}/>
                    <ThaiText text="พูดว่า: 'เพื่อน บอกว่า...'" ipa="pûut wâa: 'pʉ̂an bɔ̀ɔk wâa...'" en="Say: 'My friend said that...'" emoji="🎯" isBox={true} />
                    <ThaiText text="ตัวอย่าง: เพื่อน บอกว่า ร้านนี้ แพง มาก" ipa="dtua-yàang: pʉ̂an bɔ̀ɔk wâa ráan níi paaeng mâak" en="Example: Friend said that this shop is very expensive." emoji="💸" />
                </div>

                {/* Real-life Interview */}
                <div className="bg-indigo-50 p-5 rounded-[2rem] border-2 border-indigo-200 shadow-sm">
                    <ThaiText text="สัมภาษณ์: ความคิดเห็นของคุณ" ipa="sǎm-pâat: kwaam-kít-hěn kɔ̌ɔng kun" en="Interview: Your Opinions" emoji="🎤" isHeader={true}/>
                    <ThaiText text="ตอบโดยใช้คำว่า 'คิดว่า'" ipa="dtɔ̀ɔp dooi chái kam wâa 'kít wâa'" en="Answer using the word 'Think that'" emoji="💡" isBox={true} />
                    <div className="mt-4 space-y-2">
                        <ThaiText text="คุณ คิดว่า ภาษาไทย ยาก หรือเปล่า?" ipa="kun kít wâa paa-sǎa thai yâak rʉ̌ʉ-bplàao?" en="Do you think that Thai language is difficult or not?" emoji="🇹🇭" />
                        <ThaiText text="คุณ คิดว่า วันนี้ อากาศ ร้อน หรือเปล่า?" ipa="kun kít wâa wan-níi aa-gàat rɔ́ɔn rʉ̌ʉ-bplàao?" en="Do you think that today the weather is hot or not?" emoji="☀️" />
                    </div>
                </div>
            </div>
        );

        const ExtensionSection = () => (
            <div className="space-y-6 pb-8 fade-in">
                <ThaiText text="กิจกรรมเสริม" ipa="gìt-jà-gam sə̌əm" en="Extension Activities" emoji="🚀" isHeader={true} />

                {/* Real-life Debate */}
                <div className="bg-orange-50 p-5 rounded-[2rem] border-2 border-orange-200 shadow-sm">
                    <ThaiText text="โต้วาที: น้ำเปล่า VS น้ำอัดลม" ipa="dtôo-waa-tii: náam-bplàao VS náam-àt-lom" en="Debate: Plain Water VS Soft Drinks" emoji="⚖️" isHeader={true}/>
                    <ThaiText text="คุณ คิดว่า อะไร ดีกว่ากัน? ทำไม?" ipa="kun kít wâa à-rai dii gwàa gan? tam-mai?" en="What do you think is better? Why?" emoji="🤔" isBox={true} />
                </div>

                {/* Real-life Story-telling */}
                <div className="bg-emerald-50 p-5 rounded-[2rem] border-2 border-emerald-200 shadow-sm">
                    <ThaiText text="เล่าเรื่อง: การเข้าใจผิด" ipa="lâo rʉ̂ang: gaan kâo-jai pìt" en="Storytelling: Misunderstanding" emoji="🤦‍♂️" isHeader={true}/>
                    <ThaiText text="ใช้คำศัพท์: คิดว่า, บอกว่า, เปล่า" ipa="chái kam-sàp: kít wâa, bɔ̀ɔk wâa, bplàao" en="Use vocab: Think that, Say that, No" emoji="🎯" isBox={true} />
                    <ThaiText text="เล่าเรื่องตลกที่คุณ คิดว่า เป็นแบบหนึ่ง แต่จริงๆ เปล่า เลย" ipa="lâo rʉ̂ang dtà-lòk tîi kun kít wâa bpen bɛ̀ɛp nʉ̀ng dtɛ̀ɛ jing-jing bplàao ləəi" en="Tell a funny story where you thought it was one way, but actually it wasn't at all." emoji="😂" />
                </div>

                {/* Real-life Presentation */}
                <div className="bg-sky-50 p-5 rounded-[2rem] border-2 border-sky-200 shadow-sm">
                    <ThaiText text="นำเสนอ: แนะนำร้านอาหาร" ipa="nam-sà-nə̌ə: náe-nam ráan aa-hǎan" en="Presentation: Recommend a restaurant" emoji="🍽️" isHeader={true}/>
                    <ThaiText text="บอกว่า ทำไม คุณ คิดว่า ร้านนี้ ดี" ipa="bɔ̀ɔk wâa tam-mai kun kít wâa ráan níi dii" en="Tell that why you think that this restaurant is good." emoji="🗣️" isBox={true} />
                </div>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const [currentTab, setCurrentTab] = useState('review');

            const tabs = [
                { id: 'review', icon: 'refresh', label: 'ทบทวน' },
                { id: 'lesson', icon: 'book', label: 'บทเรียน' },
                { id: 'speak', icon: 'message', label: 'พูด' },
                { id: 'ext', icon: 'zap', label: 'เสริม' }
            ];

            return (
                <div className="max-w-md mx-auto min-h-screen relative shadow-2xl bg-[#f8fafc] overflow-x-hidden">
                    
                    {/* Sticky Header */}
                    <div className="bg-white p-5 shadow-sm sticky top-0 z-40 border-b border-slate-200 flex items-center justify-center">
                        <h1 className="text-2xl font-bold text-teal-600 flex items-center gap-2">
                            <span>💬</span> เปล่า & ว่า
                        </h1>
                    </div>

                    {/* Content Area */}
                    <div className="px-5 pt-6 pb-28">
                        {currentTab === 'review' && <ReviewSection />}
                        {currentTab === 'lesson' && <LessonSection />}
                        {currentTab === 'speak' && <SpeakingSection />}
                        {currentTab === 'ext' && <ExtensionSection />}
                    </div>

                    {/* Bottom Navigation */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-200 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] rounded-t-3xl z-50 pb-safe">
                        <div className="flex justify-around px-2 py-3">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setCurrentTab(tab.id)}
                                    className={`flex flex-col items-center justify-center w-[22%] py-2 rounded-2xl transition-all ${currentTab === tab.id ? 'text-teal-600 scale-110' : 'text-slate-400 hover:text-teal-400'}`}
                                >
                                    <Icon name={tab.icon} size={24} className={currentTab === tab.id ? 'drop-shadow-md' : ''} />
                                    <span className={`text-[11px] mt-1 font-semibold ${currentTab === tab.id ? 'font-bold' : ''}`}>{tab.label}</span>
                                    {currentTab === tab.id && <div className="w-1 h-1 bg-teal-600 rounded-full mt-1"></div>}
                                </button>
                            ))}
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

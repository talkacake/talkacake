            const [showEn, setShowEn] = useState(false);

                e.stopPropagation();
                if ('speechSynthesis' in window) {
                    // Cancel any ongoing speech to make it responsive
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'th-TH';
                    utterance.rate = 0.85;
                    window.speechSynthesis.speak(utterance);
                }
            };

            const baseClass = isTitle
                ? "text-2xl md:text-3xl font-bold text-white modern-font"
                : isHeader 
                    ? "text-2xl md:text-3xl font-bold text-teal-800 modern-font" 
                    : isQuote 
                        ? "text-xl font-semibold text-rose-700 italic" 
                        : "text-lg text-slate-800";

            return (
                <div className={containerClass}>

                    <div className="flex flex-wrap items-center justify-between gap-3">

                            className={`flex-1 flex items-center gap-2 cursor-pointer group active:scale-[0.98] transition-transform`}
                        >
                            {emoji && <span className="text-2xl drop-shadow-sm">{emoji}</span>}
                            <span className={`${baseClass} group-hover:text-teal-600 transition-colors`}>

                            </button>
                        </div>
                    </div>

                    {/* Toggle Content */}
                    {(showIpa || showEn) && (
                        <div className={`mt-3 pt-3 border-t border-dashed flex flex-col gap-2 animation-fade-in ${isTitle ? 'border-teal-500/50' : 'border-teal-100'}`}>
                            {showIpa && (
                                <div className={`flex items-start gap-2 font-mono ${isTitle ? 'text-amber-300' : 'text-amber-700'}`}>
                                    <span className="text-xs font-bold uppercase mt-0.5 opacity-60">IPA</span>
                                    <span>{ipa}</span>
                                </div>
                            )}
                            {showEn && (
                                <div className={`flex items-start gap-2 ${isTitle ? 'text-indigo-200' : 'text-indigo-700'}`}>
                                    <span className="text-xs font-bold uppercase mt-0.5 opacity-60">EN</span>
                                    <span className="italic">{en}</span>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- SECTIONS ---

        const ReviewSection = () => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [showCardIpa, setShowCardIpa] = useState(false);
            const [showCardEn, setShowCardEn] = useState(false);

            useEffect(() => {
                // Pick a random word on load
                pickRandom();
            }, []);

            const pickRandom = () => {
                const randIndex = Math.floor(Math.random() * reviewVocabList.length);
                setCurrentIndex(randIndex);
                setShowCardIpa(false);
                setShowCardEn(false);
            };

            const word = reviewVocabList[currentIndex];

            if (!word) return null;

            const handleCardSpeak = () => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(word.t);
                    utterance.lang = 'th-TH';
                    utterance.rate = 0.85;
                    window.speechSynthesis.speak(utterance);
                }
            };

            return (
                <div className="space-y-6 interactive-box pb-10">
                    <ThaiText text="เกมทบทวนคำศัพท์" ipa="geem tób-tuan kam-sàp" en="Vocabulary Review Game" emoji="🎲" isHeader={true} />
                    <ThaiText text="แต่งประโยคจากคำนี้" ipa="dtɛ̀ng bprà-yòok jàak kam níi" en="Make a sentence from this word" emoji="🗣️" />
                    
                    <div className="bg-gradient-to-br from-teal-400 to-emerald-500 p-8 rounded-3xl shadow-xl flex flex-col items-center justify-center text-center text-white relative overflow-hidden mt-6">
                        <div className="text-8xl mb-4 drop-shadow-lg cursor-pointer hover:scale-110 transition-transform" onClick={handleCardSpeak}>{word.em}</div>
                        
                        <h2 className="text-4xl font-bold mb-4 modern-font cursor-pointer flex items-center gap-2 hover:text-teal-100 transition-colors" onClick={handleCardSpeak}>
                            {word.t} <span className="text-2xl opacity-70">🔊</span>
                        </h2>

                        <div className="flex gap-3 mb-4">
                            <button 
                                onClick={() => setShowCardIpa(!showCardIpa)}
                                className={`px-4 py-2 text-sm font-bold rounded-xl transition-colors shadow-sm ${showCardIpa ? 'bg-amber-400 text-amber-900' : 'bg-teal-700/50 text-white hover:bg-teal-600'}`}
                            >
                                IPA
                            </button>
                            <button 
                                onClick={() => setShowCardEn(!showCardEn)}
                                className={`px-4 py-2 text-sm font-bold rounded-xl transition-colors shadow-sm ${showCardEn ? 'bg-indigo-500 text-white' : 'bg-teal-700/50 text-white hover:bg-teal-600'}`}
                            >
                                EN
                            </button>
                        </div>

                        {showCardIpa && <p className="text-xl font-mono text-amber-200 bg-black/20 px-4 py-2 rounded-xl mb-3 w-full animation-fade-in">{word.i}</p>}
                        {showCardEn && <p className="text-lg italic text-indigo-100 bg-black/20 px-4 py-2 rounded-xl w-full animation-fade-in">"{word.e}"</p>}
                        
                        <button 
                            onClick={pickRandom}
                            className="mt-8 bg-white text-teal-700 font-bold text-lg px-8 py-4 rounded-full shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center gap-2"
                        >
                            <span>สุ่มคำใหม่</span> 🔄
                        </button>
                    </div>

                    <div className="mt-8">
                        <ThaiText text="ตัวอย่างการแต่งประโยคตลกๆ" ipa="dtua-yàang gaan dtɛ̀ng bprà-yòok dtà-lòk dtà-lòk" en="Example of a funny sentence" emoji="🤣" />
                        <ThaiText text="ฉันชอบกินกะเพราไข่ดาว แต่บางครั้งไข่ดาวก็กลายเป็นไข่เจียว" ipa="chǎn chɔ̂ɔp gin gà-prao khài-daao, dtɛ̀ɛ baang-khráng khài-daao gɔ̂ glaai bpen khài-jiao" en="I like eating basil with a fried egg, but sometimes the fried egg becomes an omelet." isQuote={true} />
                    </div>
                </div>
            );
        };

        const VideoSection = () => {
            const [answers, setAnswers] = useState({});

            const checkAnswer = (qNum, isCorrect) => {
                setAnswers(prev => ({...prev, [qNum]: isCorrect}));
            };

            const Question = ({ qNum, qText, qIpa, qEn, choices }) => (
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-6">
                    <ThaiText text={qText} ipa={qIpa} en={qEn} emoji="❓" isQuote={true} />
                    <div className="space-y-3 mt-4">
                        {choices.map((c, i) => {
                            const isSelectedAndCorrect = answers[qNum] === true && c.correct;
                            const isSelectedAndWrong = answers[qNum] === false && !c.correct;
                            let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all font-medium text-lg ";
                            
                            if (isSelectedAndCorrect) btnClass += "bg-green-100 border-green-500 text-green-800";
                            else if (isSelectedAndWrong) btnClass += "bg-red-50 border-red-300 text-red-700 opacity-50";
                            else btnClass += "bg-slate-50 border-slate-200 text-slate-700 hover:border-teal-400 hover:bg-teal-50";

                            return (
                                <button 
                                    key={i} 
                                    onClick={() => checkAnswer(qNum, c.correct)}
                                    className={btnClass}
                                >
                                    {c.text} {isSelectedAndCorrect && "✅"} {isSelectedAndWrong && "❌"}
                                </button>
                            );
                        })}
                    </div>
                </div>
            );

            return (
                <div className="space-y-6 interactive-box pb-10">
                    <ThaiText text="ดูวิดีโอและตอบคำถาม" ipa="duu wí-dii-oo lɛ́ɛo dtɔ̀ɔp kǎm-tǎam" en="Watch the video and answer questions" emoji="🎬" isHeader={true} />
                    
                    <div className="rounded-3xl overflow-hidden shadow-xl bg-black aspect-video relative">
                        <iframe 
                            className="w-full h-full absolute top-0 left-0"
                            src="https://www.youtube.com/embed/_c1nRLiUaJU?start=0&end=10&cc_load_policy=1" 
                            title="YouTube video player" 
                            frameBorder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowFullScreen>
                        </iframe>
                    </div>

                    <div className="mt-8 space-y-3">
                        <ThaiText text="บทสนทนาจากวิดีโอ" ipa="bòt sǒn-tá-naa jàak wí-dii-oo" en="Dialogue from the video" emoji="💬" isHeader={true}/>
                        {scriptData.map((line, i) => (
                            <ThaiText key={i} text={line.t} ipa={line.i} en={line.e} emoji={line.em} speaker={line.speaker} />
                        ))}
                    </div>

                    <div className="mt-8 space-y-2">
                        <ThaiText text="คำถามทดสอบความเข้าใจ" ipa="kǎm-tǎam tót-sɔ̀ɔp kwaam kâo-jai" en="Comprehension Questions" emoji="📝" isHeader={true}/>
                        
                        <Question 
                            qNum={1}
                            qText="ผู้ชายถามว่าอะไร?" 
                            qIpa="pûu-chaai tǎam wâa à-rai?" 
                            qEn="What did the man ask?"
                            choices={[
                                { text: "ก. กินข้าวหรือยัง", correct: false },
                                { text: "ข. ชื่ออะไรครับ", correct: true },
                                { text: "ค. ไปไหนมา", correct: false }
                            ]}
                        />
                        <Question 
                            qNum={2}
                            qText="ทำไมรุ่นพี่ถึงบ่น?" 
                            qIpa="tam-mai rûn-pîi tʉ̌ng bòn?" 
                            qEn="Why did the senior complain?"
                            choices={[
                                { text: "ก. อากาศร้อนมาก", correct: false },
                                { text: "ข. หิวข้าว", correct: false },
                                { text: "ค. สาขานี้คนชื่อเจนเยอะจัง", correct: true }
                            ]}
                        />
                        <Question 
                            qNum={3}
                            qText="ชื่ออะไรที่เจนให้เรียกได้?" 
                            qIpa="chʉ̂ʉ à-rai tîi Jen hâi rîak dâi?" 
                            qEn="What name did Jane say she can be called?"
                            choices={[
                                { text: "ก. เจนนี่", correct: true },
                                { text: "ข. จอย", correct: false },
                                { text: "ค. จูน", correct: false }
                            ]}
                        />
                    </div>
                </div>
            );
        };

        const TargetVocabSection = () => (
            <div className="space-y-4 interactive-box pb-10">
                <ThaiText text="คำศัพท์ใหม่จากวิดีโอ" ipa="kam-sàp mài jàak wí-dii-oo" en="New vocabulary from the video" emoji="🌟" isHeader={true} />
                <ThaiText text="เรียนรู้คำศัพท์ 5 คำนี้เพื่อใช้ทำกิจกรรม" ipa="rian-rúu kam-sàp 5 kam níi pʉ̂a chái tam gìt-jà-gam" en="Learn these 5 words to use in activities" emoji="🧠" />
                
                <div className="grid grid-cols-1 gap-3 mt-4">
                    {targetVocab.map((v, i) => (
                        <ThaiText key={i} text={v.t} ipa={v.i} en={v.e} emoji={v.em} />
                    ))}
                </div>
            </div>
        );

        const SpeakingSection = () => (
            <div className="space-y-8 interactive-box pb-10">
                <ThaiText text="กิจกรรมฝึกพูดสุดฮา" ipa="gìt-jà-gam fʉ̀k pûut sùt haa" en="Funny Speaking Activities" emoji="🎭" isHeader={true} />

                {/* Roleplay */}
                <div className="bg-orange-50 border-2 border-orange-200 p-5 rounded-3xl">
                    <ThaiText text="สวมบทบาท: ร้านอาหารสาขาคนเยอะ" ipa="sǔam bòt-bàat: ráan aa-hǎan sǎa-khǎa kon yə́" en="Roleplay: Crowded branch restaurant" emoji="🎪" isHeader={true}/>
                    <ThaiText text="ใช้คำศัพท์: สาขา, เยอะจัง, สั่ง, หมูกรอบ, ก็ได้" ipa="chái kam-sàp: sǎa-khǎa, yə́ jang, sàng, mǔu-grɔ̀ɔp, gɔ̂ dâi" en="Use vocab: Branch, So many, Order, Crispy pork, ...is fine too" emoji="🎯" />
                    
                    <div className="mt-4 space-y-3">
                        <ThaiText text="ลูกค้า: ทำไมคน สาขานี้ เยอะจัง!" ipa="lûuk-káa: tam-mai kon sǎa-khǎa níi yə́ jang!" en="Customer: Why are there so many people at this branch!" emoji="🙎‍♂️" />
                        <ThaiText text="พนักงาน: สั่ง อะไรดีคะ? หมูกรอบ หมดแล้วค่ะ" ipa="pá-nák-ngaan: sàng à-rai dii ká? mǔu-grɔ̀ɔp mòt lɛ́ɛo kâ" en="Staff: What would you like to order? Crispy pork is sold out." emoji="💁‍♀️" />
                        <ThaiText text="ลูกค้า: งั้นกินสาขาอื่น ก็ได้!" ipa="lûuk-káa: ngân gin sǎa-khǎa ʉ̀ʉn gɔ̂ dâi!" en="Customer: Then eating at another branch is fine too!" emoji="🏃‍♂️" />
                    </div>
                </div>

                {/* Funny Interview */}
                <div className="bg-blue-50 border-2 border-blue-200 p-5 rounded-3xl">
                    <ThaiText text="สัมภาษณ์ตลก: สัมภาษณ์หมาที่บ้าน" ipa="sǎm-pâat dtà-lòk: sǎm-pâat mǎa tîi bâan" en="Funny Interview: Interviewing a dog at home" emoji="🎤" isHeader={true}/>
                    <ThaiText text="ใช้คำศัพท์: ชื่ออะไร, ไหนหรอ, อาหารตามสั่ง" ipa="chái kam-sàp: chʉ̂ʉ à-rai, nǎi rɔ̌ɔ, aa-hǎan dtaam sàng" en="Use vocab: What is your name, Where/Which one, Cooked-to-order food" emoji="🎯" />
                    
                    <div className="mt-4 space-y-3">
                        <ThaiText text="นักข่าว: สวัสดีครับ คุณหมา ชื่ออะไร ครับ?" ipa="nák-kàao: sà-wàt-dii kráp, kun mǎa chʉ̂ʉ à-rai kráp?" en="Reporter: Hello, Mr. Dog, what is your name?" emoji="🕵️‍♂️" />
                        <ThaiText text="หมา: โฮ่งๆ! (ชื่อโฮ่งครับ)" ipa="mǎa: hông hông! (chʉ̂ʉ hông kráp)" en="Dog: Woof woof! (Name is Woof)" emoji="🐶" />
                        <ThaiText text="นักข่าว: ชอบกินอะไรครับ?" ipa="nák-kàao: chɔ̂ɔp gin à-rai kráp?" en="Reporter: What do you like to eat?" emoji="🕵️‍♂️" />
                        <ThaiText text="หมา: อาหารตามสั่ง... ของเจ้าของ ก็ได้!" ipa="mǎa: aa-hǎan dtaam sàng... kɔ̌ɔng jâo-kɔ̌ɔng gɔ̂ dâi!" en="Dog: Cooked-to-order food... the owner's food is fine too!" emoji="🍖" />
                    </div>
                </div>
            </div>
        );

        const ExtensionSection = () => (
            <div className="space-y-8 interactive-box pb-10">
                <ThaiText text="กิจกรรมเสริมเวลาเหลือ" ipa="gìt-jà-gam sə̌əm wee-laa lʉ̌a" en="Extension Activities (If time left)" emoji="🚀" isHeader={true} />

                {/* Funny Debate */}
                <div className="bg-purple-50 border-2 border-purple-200 p-5 rounded-3xl">
                    <ThaiText text="โต้วาที: เป็นนักศึกษา หรือ เป็นหมา ดีกว่ากัน?" ipa="dtôo-waa-tii: bpen nák-sʉ̀k-sǎa rʉ̌ʉ bpen mǎa dii gwàa gan?" en="Funny Debate: Is it better to be a uni student or a dog?" emoji="⚖️" isHeader={true}/>
                    <ThaiText text="ใช้คำศัพท์: นักศึกษา, หมา, เยอะจัง, เรียน, นอน" ipa="chái kam-sàp: nák-sʉ̀k-sǎa, mǎa, yə́ jang, rian, nɔɔn" en="Use vocab: Uni student, Dog, So many, Study, Sleep" emoji="🎯" />
                    
                    <div className="mt-4 space-y-3">
                        <ThaiText text="นักศึกษาต้องเรียน เยอะจัง!" ipa="nák-sʉ̀k-sǎa dtɔ̂ng rian yə́ jang!" en="University students have to study so much!" emoji="😫" />
                        <ThaiText text="หมานอนทั้งวัน... เป็นหมา ก็ได้!" ipa="mǎa nɔɔn táng wan... bpen mǎa gɔ̂ dâi!" en="Dogs sleep all day... being a dog is fine too!" emoji="🐕" />
                    </div>
                </div>

                {/* Story Telling */}
                <div className="bg-pink-50 border-2 border-pink-200 p-5 rounded-3xl">
                    <ThaiText text="เล่าเรื่อง: ไปเดตกับแฟนเก่าของพี่น้อง" ipa="lâo rʉ̂ang: bpai dèt gàp fɛɛn gào kɔ̌ɔng pîi-nóng" en="Storytelling: Dating your sibling's ex" emoji="💔" isHeader={true}/>
                    <ThaiText text="ใช้คำศัพท์: แฟน, พี่น้อง, ทำไม, ช็อก, สาขา" ipa="chái kam-sàp: fɛɛn, pîi-nóng, tam-mai, chɔ́k, sǎa-khǎa" en="Use vocab: Partner, Siblings, Why, Shocked, Major/Branch" emoji="🎯" />
                    
                    <div className="mt-4 space-y-3">
                        <ThaiText text="เล่าเรื่องของคุณให้ตลกที่สุด!" ipa="lâo rʉ̂ang kɔ̌ɔng kun hâi dtà-lòk tîi-sùt!" en="Tell your story as funny as possible!" emoji="🤣" />
                    </div>
                </div>
            </div>
        );

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [currentTab, setCurrentTab] = useState('review');

            const tabs = [
                { id: 'review', icon: '🎲', label: 'ทบทวน' },
                { id: 'video', icon: '🎬', label: 'วิดีโอ' },
                { id: 'vocab', icon: '🌟', label: 'คำศัพท์' },
                { id: 'speak', icon: '🎭', label: 'พูด' },
                { id: 'ext', icon: '🚀', label: 'เสริม' }
            ];

            return (
                <div className="max-w-xl mx-auto min-h-screen relative pb-24 shadow-2xl bg-white overflow-hidden">
                    
                    {/* Header */}
                    <div className="bg-teal-600 p-6 rounded-b-[40px] shadow-md text-center mb-8 relative">
                        <div className="absolute top-4 left-4 text-4xl opacity-20">🇹🇭</div>
                        <div className="absolute bottom-4 right-4 text-4xl opacity-20">🐘</div>
                        <ThaiText 
                            text="เจน (จะ) เป็นดาวสินกำ" 
                            ipa="Jen (jà) bpen daao sǐn-gam" 
                            en="Jane (will) be the star of Fine Arts" 
                            emoji="✨" 
                            isTitle={true} 
                        />
                    </div>

                    {/* Content Area */}
                    <div className="px-5">
                        {currentTab === 'review' && <ReviewSection />}
                        {currentTab === 'video' && <VideoSection />}
                        {currentTab === 'vocab' && <TargetVocabSection />}
                        {currentTab === 'speak' && <SpeakingSection />}
                        {currentTab === 'ext' && <ExtensionSection />}
                    </div>

                    {/* Bottom Navigation */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-xl mx-auto bg-white border-t border-teal-100 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] rounded-t-3xl z-50">
                        <div className="flex justify-around p-3">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setCurrentTab(tab.id)}
                                    className={`flex flex-col items-center justify-center w-16 h-16 rounded-2xl transition-all ${currentTab === tab.id ? 'bg-teal-500 text-white scale-110 shadow-lg' : 'bg-transparent text-slate-400 hover:bg-teal-50 hover:text-teal-600'}`}
                                >
                                    <span className="text-2xl mb-1">{tab.icon}</span>
                                    <span className="text-[10px] font-bold">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

    <!-- Fonts: Kanit (Modern Thai Font) -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---

                zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                play: <polygon points="5 3 19 12 5 21 5 3"/>

            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}

        };

        // --- MASSIVE VOCABULARY DATA ---
        const reviewVocabList = [

            { t: "แนะนำ", i: "náe-nam", e: "recommend", em: "💡" }, { t: "รมควัน", i: "rom-kwan", e: "smoked", em: "🥓" },
            { t: "หมัก", i: "màk", e: "marinate", em: "🥩" }, { t: "กะเพรา", i: "gà-prao", e: "basil", em: "🌿" },
            { t: "รสชาติ", i: "rót-châat", e: "Flavours", em: "😋" }, { t: "ยำ", i: "yam", e: "spicy salad", em: "🥗" },

            { t: "พิเศษ", i: "phí-sèet", e: "special", em: "✨" }, { t: "ไข่ดาว", i: "khài-daao", e: "fried eggs", em: "🍳" },
            { t: "ไข่กวน", i: "khài-guan", e: "scrambled eggs", em: "🍳" }, { t: "ปลาหมึก", i: "bplaa-mʉ̀k", e: "squid", em: "🦑" },

            { t: "ดูอร่อย", i: "duu à-rɔ̀i", e: "looks delicious", em: "😋" }, { t: "วันนี้", i: "wan-níi", e: "today", em: "📅" },
            { t: "พรุ่งนี้", i: "prûng níi", e: "tomorrow", em: "📅" }, { t: "ลืม", i: "lʉ̄m", e: "to forget", em: "🤦" },
            { t: "ทำ", i: "tam", e: "do", em: "🛠️" }, { t: "ครอบครัว", i: "krôp-krua", e: "family", em: "👨‍👩‍👧‍👦" },

            { t: "น้อง", i: "nóng", e: "younger sibling", em: "👶" }, { t: "เพื่อน", i: "pêuan", e: "friends", em: "🧑‍🤝‍🧑" },
            { t: "อายุ", i: "aa-yú", e: "age", em: "🎂" }, { t: "ทำงาน", i: "tam-ngaan", e: "To work", em: "💼" },
            { t: "เป็น", i: "bpen", e: "To be", em: "🔗" }, { t: "ผม", i: "pŏm", e: "hair / I", em: "👨" },
            { t: "น่าตื่นเต้น", i: "nâa-dtùuen-dtên", e: "exciting", em: "🤩" }, { t: "เรียน", i: "rian", e: "learn", em: "📚" },
            { t: "ไส้กรอก", i: "sâi-gròk", e: "sausage", em: "🌭" }, { t: "ตลก", i: "dtà-lòk", e: "funny", em: "🤣" },
            { t: "อยู่", i: "yùu", e: "live / stay", em: "📍" }, { t: "แฟน", i: "faen", e: "partner", em: "👨‍❤️‍💋‍👨" },
            { t: "ลูก", i: "lûuk", e: "offspring", em: "👶" }, { t: "พ่อแม่", i: "pɔ̂ɔ-mâe", e: "parents", em: "🤱" },

            { t: "บ้าน", i: "bâan", e: "house", em: "🏠" }, { t: "เนื้อ", i: "nʉ́a", e: "beef", em: "🥩" },
            { t: "ไป", i: "bpai", e: "Go", em: "🚶" }, { t: "เที่ยว", i: "tîao", e: "travel", em: "🚗" },
            { t: "ขับรถ", i: "khàp rót", e: "Drive", em: "🚘" }, { t: "สอน", i: "sɔ̌ɔn", e: "teach", em: "👨‍🏫" },
            { t: "ซื้อ", i: "sʉ́ʉ", e: "buy", em: "🛍️" }, { t: "แพง", i: "paaeng", e: "expensive", em: "💸" },
            { t: "เมื่อวาน", i: "mʉ̂ʉ waan", e: "yesterday", em: "⏪" }, { t: "เข้าใจ", i: "kâo-jai", e: "understand", em: "💡" },
            { t: "รู้", i: "rúu", e: "know", em: "🧠" }, { t: "เห็น", i: "hěn", e: "see", em: "👁️" },
            { t: "รู้สึก", i: "rúu-sùek", e: "To feel", em: "😊" }, { t: "เยอะ", i: "yér", e: "a lot", em: "🔢" },
            { t: "ร้องไห้", i: "róng-hâi", e: "To cry", em: "😭" }, { t: "เงินสด", i: "ngoen-sòt", e: "cash", em: "💵" },
            { t: "บัตร", i: "bàt", e: "card", em: "💳" }, { t: "ข้าว", i: "kâao", e: "rice", em: "🍚" },
            { t: "ให้", i: "hâi", e: "give", em: "🎁" }, { t: "เวลา", i: "way-laa", e: "time", em: "⏰" },
            { t: "ดื่ม", i: "dùuem", e: "drink", em: "🥤" }, { t: "เรียบร้อย", i: "rîap-rói", e: "all set", em: "✅" },
            { t: "เหนื่อย", i: "nèuuay", e: "tired", em: "😩" }, { t: "ทำไม", i: "tam-mai", e: "why", em: "❓" },
            { t: "ติดงาน", i: "dtìt-ngaan", e: "stuck at work", em: "💼" }, { t: "หนาว", i: "năao", e: "cold", em: "🥶" },
            { t: "ตำรวจ", i: "tam-lùuat", e: "police", em: "👮‍♂️" }, { t: "หมด", i: "mòt", e: "out of stock", em: "🚫" },
            { t: "สนุก", i: "sa-nùk", e: "fun", em: "🎉" }, { t: "ช้า", i: "cháa", e: "slow", em: "🐢" },
            { t: "ตื่น", i: "dteùn", e: "wake up", em: "⏰" }, { t: "เช้า", i: "cháo", e: "morning", em: "🌅" },
            { t: "บอก", i: "bòk", e: "tell", em: "🗣️" }, { t: "ข่าว", i: "khàao", e: "news", em: "📰" },
            { t: "ใจดี", i: "jai-dee", e: "kind", em: "😊" }, { t: "ร้านอาหาร", i: "ráan-aa-hăan", e: "restaurant", em: "🍽️" },
            { t: "เริ่ม", i: "rêrm", e: "start", em: "🚀" }, { t: "เร็ว", i: "rew", e: "fast", em: "⚡" },
            { t: "นอน", i: "nawn", e: "sleep", em: "😴" }, { t: "ครู", i: "kroo", e: "teacher", em: "🧑‍🏫" },
            { t: "เลือก", i: "lʉ̂ak", e: "choose", em: "✅" }, { t: "ช้อนส้อม", i: "cháwn-sôrm", e: "cutlery", em: "🍴" },
            { t: "ทำอาหารเอง", i: "tham-aa-hǎan-ayng", e: "cook myself", em: "👩‍🍳" }, { t: "ข้างนอก", i: "kâang-nôrk", e: "outside", em: "🚪" }
        ];

        // --- CORE COMPONENT: Interactive Thai Text ---
        const ThaiText = ({ text, ipa, en, emoji = "", speaker = "", isHeader = false, isTitle = false, isBox = false }) => {
            const [showIpa, setShowIpa] = useState(false);
            const [showEn, setShowEn] = useState(false);

            const handleSpeak = (e) => {
                e.stopPropagation();
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'th-TH';
                    utterance.rate = 0.85;
                    window.speechSynthesis.speak(utterance);
                }
            };

            let containerClass = "w-full rounded-2xl p-4 mb-3 transition-all relative ";
            let textClass = "font-medium cursor-pointer group flex-1 flex flex-wrap items-center gap-2 ";

            if (isTitle) {
                containerClass += "bg-indigo-600 shadow-lg border border-indigo-400";
                textClass += "text-2xl md:text-3xl font-bold text-white text-center justify-center";
            } else if (isHeader) {
                containerClass += "bg-indigo-50 border-2 border-indigo-200 shadow-sm";
                textClass += "text-xl md:text-2xl font-bold text-indigo-800";
            } else if (isBox) {
                containerClass += "bg-white border-2 border-dashed border-slate-300 shadow-sm";
                textClass += "text-lg text-slate-700 italic justify-center text-center";
            } else {
                containerClass += "bg-white border border-slate-200 shadow-sm hover:border-indigo-300 hover:shadow-md";
                textClass += "text-lg text-slate-800";
            }

            return (
                <div className={containerClass}>
                    {speaker && <div className="text-xs font-bold text-indigo-500 uppercase mb-1">{speaker}</div>}
                    
                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                        <div onClick={handleSpeak} className={textClass}>
                            {emoji && <span>{emoji}</span>}
                            <span className="hover:text-indigo-500 transition-colors">
                                {text} <span className="text-xl opacity-30 group-hover:opacity-100 transition-opacity">🔊</span>
                            </span>
                        </div>
                        
                        <div className="flex gap-2 shrink-0 self-end sm:self-auto">
                            <button onClick={() => setShowIpa(!showIpa)} className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-colors ${showIpa ? 'bg-amber-400 text-amber-900 shadow-inner' : (isTitle ? 'bg-indigo-800 text-indigo-200' : 'bg-slate-100 text-slate-500')}`}>
                                IPA
                            </button>
                            <button onClick={() => setShowEn(!showEn)} className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-colors ${showEn ? 'bg-blue-500 text-white shadow-inner' : (isTitle ? 'bg-indigo-800 text-indigo-200' : 'bg-slate-100 text-slate-500')}`}>
                                EN
                            </button>
                        </div>
                    </div>

                    {(showIpa || showEn) && (
                        <div className={`mt-3 pt-3 flex flex-col gap-2 fade-in border-t border-dashed ${isTitle ? 'border-indigo-400/50' : 'border-slate-200'}`}>
                            {showIpa && (
                                <div className={`flex items-start gap-2 font-mono ${isTitle ? 'text-amber-200' : 'text-amber-600'}`}>
                                    <span className="text-[10px] font-bold uppercase mt-1 opacity-60">IPA</span>
                                    <span>{ipa}</span>
                                </div>
                            )}
                            {showEn && (
                                <div className={`flex items-start gap-2 ${isTitle ? 'text-indigo-100' : 'text-indigo-600'}`}>
                                    <span className="text-[10px] font-bold uppercase mt-1 opacity-60">EN</span>
                                    <span className="italic">{en}</span>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- SECTIONS ---

        const ReviewSection = () => {
            const [currentIndex, setCurrentIndex] = useState(0);

            useEffect(() => { pickRandom(); }, []);

            const pickRandom = () => {
                setCurrentIndex(Math.floor(Math.random() * reviewVocabList.length));
            };

            const word = reviewVocabList[currentIndex];
            if (!word) return null;

            return (
                <div className="space-y-4 pb-8 fade-in">
                    <ThaiText text="เกมทบทวนคำศัพท์" ipa="geem tób-tuan kam-sàp" en="Vocabulary Review Game" emoji="🎲" isHeader={true} />
                    <ThaiText text="สร้างประโยคจากคำนี้!" ipa="sâang bprà-yòok jàak kam níi!" en="Make a sentence from this word!" emoji="🎯" />
                    
                    <div className="bg-gradient-to-br from-indigo-500 to-purple-600 p-8 rounded-[2rem] shadow-xl text-center relative overflow-hidden mt-6">

                        <ThaiText text={word.t} ipa={word.i} en={word.e} isTitle={true} />
                        
                        <button onClick={pickRandom} className="mt-6 bg-white text-indigo-700 font-bold text-lg px-8 py-4 rounded-full shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-2 mx-auto w-full sm:w-auto">
                            <Icon name="refresh" size={20} /> <span>สุ่มคำใหม่</span>
                        </button>
                    </div>
                </div>
            );
        };

        const SpeakingSection = () => (
            <div className="space-y-6 pb-8 fade-in">
                <ThaiText text="กิจกรรมพูดในชีวิตจริง" ipa="gìt-jà-gam pûut nai chii-wít jing" en="Real-life Speaking Activities" emoji="🗣️" isHeader={true} />

                {/* Roleplay */}
                <div className="bg-sky-50 p-5 rounded-[2rem] border-2 border-sky-200 shadow-sm">
                    <ThaiText text="บทบาทสมมติ: สั่งอาหาร" ipa="bòt-bàat sǒm-mút: sàng aa-hǎan" en="Roleplay: Ordering Food" emoji="🍛" isHeader={true}/>
                    <ThaiText text="ใช้คำศัพท์: สั่ง, อาหารตามสั่ง, หมด, หมูกรอบ, แพง" ipa="chái kam-sàp: sàng, aa-hǎan dtaam-sàng, mòt, mǔu-grɔ̀ɔp, paaeng" en="Use vocab: Order, Cooked-to-order, Out of stock, Crispy pork, Expensive" emoji="🎯" isBox={true} />
                    <div className="mt-4 space-y-2">
                        <ThaiText text="คุณ: สั่ง อาหาร หน่อยครับ/ค่ะ" ipa="kun: sàng aa-hǎan nòi kráp/kâ" en="You: I'd like to order some food." emoji="🙋" speaker="A"/>
                        <ThaiText text="พนักงาน: หมูกรอบ หมด แล้ว เอาอย่าง อื่น ไหม?" ipa="pá-nák-ngaan: mǔu-grɔ̀ɔp mòt lɛ́ɛo, ao yàang ʉ̀ʉn mǎi?" en="Staff: Crispy pork is out of stock. Want something else?" emoji="👨‍🍳" speaker="B"/>

                    <ThaiText text="ใช้คำศัพท์: ครอบครัว, กี่คน, ใจดี, ตลก" ipa="chái kam-sàp: krɔ̂ɔp-krua, gìi kon, jai-dii, dtà-lòk" en="Use vocab: Family, How many people, Kind, Funny" emoji="🎯" isBox={true} />
                    <div className="mt-4 space-y-2">
                        <ThaiText text="ครอบครัว ของคุณ มี กี่คน?" ipa="krɔ̂ɔp-krua kɔ̌ɔng kun mii gìi kon?" en="How many people are in your family?" emoji="❓" />
                        <ThaiText text="ใคร ตลก ที่สุด ใน บ้าน?" ipa="krai dtà-lòk tîi-sùt nai bâan?" en="Who is the funniest in the house?" emoji="😂" />
                    </div>
                </div>

                {/* Discussion */}
                <div className="bg-amber-50 p-5 rounded-[2rem] border-2 border-amber-200 shadow-sm">
                    <ThaiText text="สนทนา: งาน และ เวลา" ipa="sǒn-tá-naa: ngaan lɛ́ wee-laa" en="Discussion: Work and Time" emoji="💼" isHeader={true}/>
                    <div className="mt-4 space-y-2">
                        <ThaiText text="คุณ ตื่น กี่โมง?" ipa="kun dtʉ̀ʉn gìi moong?" en="What time do you wake up?" emoji="⏰" />
                        <ThaiText text="ทำงาน เหนื่อย ไหม? ทำไม?" ipa="tam-ngaan nèuuay mǎi? tam-mai?" en="Is working tiring? Why?" emoji="😩" />
                    </div>
                </div>
            </div>
        );

        const ExtensionSection = () => (
            <div className="space-y-6 pb-8 fade-in">
                <ThaiText text="กิจกรรมเสริม" ipa="gìt-jà-gam sə̌əm" en="Extension Activities" emoji="🚀" isHeader={true} />

                {/* Debate */}
                <div className="bg-rose-50 p-5 rounded-[2rem] border-2 border-rose-200 shadow-sm">
                    <ThaiText text="โต้วาที: เรื่องกิน" ipa="dtôo-waa-tii: rʉ̂ang gin" en="Debate: Eating matters" emoji="⚖️" isHeader={true}/>

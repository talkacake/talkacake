<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronouns</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-active-ipa { background-color: #e9d5ff !important; color: #6b21a8 !important; }
        .btn-active-en { background-color: #dcfce3 !important; color: #166534 !important; }
    </style>
</head>
<body class="antialiased text-gray-800 pb-20">

    <div id="app" class="max-w-3xl mx-auto px-4 py-8 space-y-6">
        <!-- Content gets injected here by JS -->
    </div>

    <script>
        // Lesson Content Data
        const lessonData = [
            {
                type: 'title',
                th: "สรรพนาม 🏷️",
                ipa: "sàp-pá-naam",
                en: "Pronouns"
            },
            {
                type: 'header',
                th: "คำถามก่อนเรียน ❓",
                ipa: "kham-tǎam gɔ̀ɔn riian",
                en: "Lead-in Questions"
            },
            {
                type: 'normal',
                th: "ปกติคุณเรียกเพื่อนว่าอะไร? 🗣️",
                ipa: "bpòk-gà-dtì kun rîak pʉ̂an wâa à-rai?",
                en: "What do you usually call your friends?"
            },
            {
                type: 'normal',
                th: "เวลาคุยกับครอบครัว คุณเรียกตัวเองว่าอะไร? 👨‍👩‍👧‍👦",
                ipa: "wee-laa kui gàp krôop-krua kun rîak dtua-eeng wâa à-rai?",
                en: "When talking to your family, what do you call yourself?"
            },
            {
                type: 'header',
                th: "5 คำสรรพนามที่พบบ่อย ✋",
                ipa: "hâa kham sàp-pá-naam tîi póp bòi",
                en: "5 Most Common Pronouns"
            },
            {
                type: 'vocab',
                th: "เขา 👤",
                ipa: "kăo",
                en: "He / She / They"
            },
            {
                type: 'vocab',
                th: "เรา 👥",
                ipa: "rao",
                en: "We / I"
            },
            {
                type: 'vocab',
                th: "ตัวเอง 🪞",
                ipa: "dtua-eeng",
                en: "Yourself / Myself / You (informal, among close friends/couples)"
            },
            {
                type: 'vocab',
                th: "คุณ 👔",
                ipa: "kun",
                en: "You (polite)"
            },
            {
                type: 'vocab',
                th: "หนู 👧",
                ipa: "nǔu",
                en: "I (used by females/children) / You (used to address children)"
            },
            {
                type: 'header',
                th: "บทสนทนา 💬",
                ipa: "bòt sǒn-tá-naa",
                en: "Dialogue (Talking about a new colleague)"
            },
            {
                type: 'dialogue',
                th: "คุณ ได้ยินไหม? เขา เป็นวิศวกรใหม่ 🧑‍🔧",
                ipa: "kun dâi-yin mǎi? kăo bpen wít-sà-wá-gon mài",
                en: "Did you hear? He is a new engineer."
            },
            {
                type: 'dialogue',
                th: "เรา ไม่รู้! เขา อายุเท่าไร? 🎂",
                ipa: "rao mâi rúu! kăo aa-yú tâo-rài?",
                en: "I didn't know! How old is he?"
            },
            {
                type: 'dialogue',
                th: "ยี่สิบเจ็ดปี เขา อายุเท่า เรา ทั้งคู่ 👫",
                ipa: "yîi sìp jèt bpii. kăo aa-yú tâo rao táng kôo",
                en: "27 years old. He is the same age as both of us."
            },
            {
                type: 'dialogue',
                th: "แล้ว ตัวเอง จะไปทักทาย เขา ไหม? 👋",
                ipa: "láeo dtua-eeng jà bpai ták-taai kăo mǎi?",
                en: "And will you go say hi to him?"
            },
            {
                type: 'dialogue',
                th: "ไปสิ! หนู อยากแนะนำตัว 🙋‍♂️",
                ipa: "bpai sì! nǔu yàak náe-nam-dtua",
                en: "Of course! I want to introduce myself."
            },
            {
                type: 'header',
                th: "คำถามความเข้าใจ 🧠",
                ipa: "kham-tǎam kwaam-kâo-jai",
                en: "Comprehension Questions"
            },
            {
                type: 'normal',
                th: "เขา ทำงานอะไร? 💼",
                ipa: "kăo tam-ngaan à-rai?",
                en: "What does he work as?"
            },
            {
                type: 'normal',
                th: "เขา อายุเท่าไร? 🔢",
                ipa: "kăo aa-yú tâo-rài?",
                en: "How old is he?"
            },
            {
                type: 'header',
                th: "ภารกิจในชีวิตจริง 🎬",
                ipa: "paa-rá-gìt nai chii-wít jing",
                en: "Real-life Tasks"
            },
            {
                type: 'task',
                th: "บทบาทสมมติ 🎭: คุณเป็นพยาบาล คุยกับบรรณารักษ์ในโรงพยาบาล ใช้ 'คุณ', 'เรา', 'เขา' ถามว่ามาจากที่ไหน (เช่น แม่เป็นคนอเมริกัน)",
                ipa: "bòt-bàat sǒm-mút: kun bpen pá-yaa-baan kui gàp ban-naa-rák nai roong-pá-yaa-baan. chái 'kun', 'rao', 'kăo' tǎam wâa maa jàak tîi-nǎi (chên: mâe bpen kon a-may-rí-gan)",
                en: "Role-play: You are a nurse talking to a librarian in the hospital. Use 'คุณ', 'เรา', 'เขา' to ask where they are from (e.g. Mother is American)."
            },
            {
                type: 'task',
                th: "เกมการพูด 🎲: ทายซิฉันคือใคร? อธิบายคนในครอบครัว เช่น พี่ชาย ใช้ 'เขา' และบอกว่าเขา 'เหมือนพ่อ' ไหม ให้ครูทายว่าคือใคร",
                ipa: "geem gaan pûut: taai sí chǎn kʉʉ krai? à-tí-baai kon nai krôop-krua chên pîi-chaai. chái 'kăo' láe bòok wâa kăo 'mʉ̌an pɔ̂ɔ' mǎi. hâi kruu taai wâa kʉʉ krai",
                en: "Speaking Game: Who am I? Describe a family member like an older brother. Use 'เขา' and say if he is 'like father'. Let the teacher guess who it is."
            },
            {
                type: 'task',
                th: "สัมภาษณ์ 🎤: สัมภาษณ์ครู ใช้ 'คุณ' ถามว่า 'อะไรอร่อย' และ 'ไม่กินเผ็ดใช่ไหม'",
                ipa: "sǎm-pâat: sǎm-pâat kruu. chái 'kun' tǎam wâa 'à-rai à-ròi' láe 'mâi gin pèd châi mǎi'",
                en: "Interview: Interview the teacher. Use 'คุณ' and ask 'what is delicious' and 'you don't eat spicy, right?'."
            },
            {
                type: 'task',
                th: "สนทนา 💬: คุณไปทำงานยังไง? เดิน หรือ รถไฟ? ใช้ 'เรา' และ 'ตัวเอง'",
                ipa: "sǒn-tá-naa: kun bpai tam-ngaan yang-ngai? dern rʉ̌ʉ rót-fai? chái 'rao' láe 'dtua-eeng'",
                en: "Discussion: How do you go to work? Walk or train? Use 'เรา' and 'ตัวเอง'."
            },
            {
                type: 'task',
                th: "โต้วาที ⚖️: โยเกิร์ตเปรี้ยวกับหวานทั้งคู่ คุณชอบรสอะไรมากกว่ากัน ทำไม? ใช้ 'เรา'",
                ipa: "dtôo-waa-tii: yoo-gèrt bprîao gàp wǎan táng kôo. kun châawp rót à-rai mâak gwàa gan? tam-mai? chái 'rao'",
                en: "Debate: Yogurt is both sour and sweet. Which flavor do you like more? Why? Use 'เรา'."
            },
            {
                type: 'header',
                th: "กิจกรรมเพิ่มเติม 🚀",
                ipa: "gìt-jà-gam pə̂əm-dtəəm",
                en: "Extension Activities"
            },
            {
                type: 'task',
                th: "เล่าเรื่อง 📚: เล่าเรื่องนักเรียนหิวข้าว ไปเรียนเคมีที่โรงเรียน ใช้ 'หนู' หรือ 'เขา'",
                ipa: "lâo rʉ̂ang: lâo rʉ̂ang nák-riian hǐw kâao, bpai riian kee-mii tîi roong-riian. chái 'nǔu' rʉ̌ʉ 'kăo'",
                en: "Story-telling: Tell a story about a hungry student going to study chemistry at school. Use 'หนู' or 'เขา'."
            },
            {
                type: 'task',
                th: "นำเสนอ 📊: แนะนำครอบครัวของคุณ ใครเป็นวิศวกรหรือนักสังคมสงเคราะห์ ใช้ 'เขา' และ 'เรา'",
                ipa: "nam-sà-nə̌ə: náe-nam krôop-krua kɔ̌ɔng kun. krai bpen wít-sà-wá-gon rʉ̌ʉ nák-sǎng-kom-sǒng-khrɔ́. chái 'kăo' láe 'rao'",
                en: "Presentation: Introduce your family. Who is an engineer or social worker? Use 'เขา' and 'เรา'."
            }
        ];

        // Core Render Logic
        function renderApp() {
            const container = document.getElementById('app');
            let htmlString = '';

            lessonData.forEach((item, index) => {
                let cardClass = "bg-white p-5 rounded-3xl shadow-sm border border-gray-200 transition-shadow hover:shadow-md";
                let textClass = "text-xl font-medium text-gray-800";

                // Styling based on block type
                if (item.type === 'title') {
                    cardClass = "bg-blue-50 p-6 rounded-[2rem] shadow-sm border border-blue-200";
                    textClass = "text-3xl font-bold text-center text-blue-800";
                } else if (item.type === 'header') {
                    cardClass = "bg-indigo-50 p-5 rounded-3xl border border-indigo-200 mt-6";
                    textClass = "text-2xl font-bold text-indigo-800";
                } else if (item.type === 'vocab') {
                    cardClass = "bg-teal-50 p-5 rounded-3xl border border-teal-200 ml-4";
                    textClass = "text-2xl font-bold text-teal-800";
                } else if (item.type === 'dialogue') {
                    cardClass = "bg-amber-50 p-5 rounded-3xl border-l-4 border-l-amber-400 ml-4";
                    textClass = "text-lg text-amber-900";
                } else if (item.type === 'task') {
                    cardClass = "bg-rose-50 p-5 rounded-3xl border border-rose-200";
                    textClass = "text-lg text-rose-900";
                }

                htmlString += `
                <div class="${cardClass}">
                    <div class="flex items-start justify-between gap-4">
                        <div class="${textClass} flex-1 leading-relaxed">${item.th}</div>
                        
                        <!-- TTS Button -->
                        <button onclick="speakThai(${index})" class="flex-shrink-0 bg-white border border-gray-200 text-blue-500 p-3 rounded-full hover:bg-blue-50 active:scale-95 transition-all shadow-sm flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
                            </svg>
                        </button>
                    </div>

                    <!-- Toggle Buttons -->
                    <div class="flex gap-2 mt-4">
                        <button onclick="toggleView('ipa', ${index})" id="btn-ipa-${index}" class="px-4 py-2 text-sm font-semibold bg-gray-100 text-gray-500 rounded-xl hover:bg-purple-100 transition-colors">IPA</button>
                        <button onclick="toggleView('en', ${index})" id="btn-en-${index}" class="px-4 py-2 text-sm font-semibold bg-gray-100 text-gray-500 rounded-xl hover:bg-green-100 transition-colors">EN</button>
                    </div>

                    <!-- Hidden Content Areas -->
                    <div id="ipa-${index}" class="hidden mt-4 p-4 bg-purple-50 text-purple-800 rounded-2xl font-mono text-base border border-purple-100">
                        ${item.ipa}
                    </div>
                    <div id="en-${index}" class="hidden mt-3 p-4 bg-green-50 text-green-800 rounded-2xl text-base border border-green-100">
                        ${item.en}
                    </div>
                </div>
                `;
            });

            container.innerHTML = htmlString;
        }

        // Toggle IPA and EN views
        function toggleView(type, index) {
            const contentDiv = document.getElementById(`${type}-${index}`);
            const btn = document.getElementById(`btn-${type}-${index}`);
            
            if (contentDiv.classList.contains('hidden')) {
                // Show content
                contentDiv.classList.remove('hidden');
                btn.classList.add(`btn-active-${type}`);
                btn.classList.remove('bg-gray-100', 'text-gray-500');
            } else {
                // Hide content
                contentDiv.classList.add('hidden');
                btn.classList.remove(`btn-active-${type}`);
                btn.classList.add('bg-gray-100', 'text-gray-500');
            }
        }

        // Text-to-Speech Function
        function speakThai(index) {
            const text = lessonData[index].th;
            
            // Strip emojis so TTS engine doesn't read out "Smiling face..." 
            const textToSpeak = text.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '');
            
            // Cancel any ongoing speech
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(textToSpeak.trim());
            utterance.lang = 'th-TH'; // Thai language code
            utterance.rate = 0.85;    // Slightly slower for A1 learners
            
            window.speechSynthesis.speak(utterance);
        }

        // Initialize the app
        renderApp();
    </script>
</body>
</html>

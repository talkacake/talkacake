        // Core Functions
        function drawRandomVocab() {
            const displayDiv = document.getElementById('vocab-display');
            displayDiv.classList.remove('hidden');
            
            // Re-trigger CSS animation
            displayDiv.classList.remove('animate-pop');
            void displayDiv.offsetWidth; 
            displayDiv.classList.add('animate-pop');

            const randomIndex = Math.floor(Math.random() * vocabList.length);
            const word = vocabList[randomIndex];

            document.getElementById('vocab-th').innerText = word.th;
            document.getElementById('vocab-ipa').innerText = word.ipa;
            document.getElementById('vocab-en').innerText = word.en;

            // Reset Vocab Toggles to Hidden
            document.getElementById('vocab-ipa-container').classList.add('hidden');
            document.getElementById('vocab-en-container').classList.add('hidden');
            
            const btnIpa = document.getElementById('btn-vocab-ipa');
            btnIpa.classList.remove('btn-active-ipa');
            btnIpa.classList.add('bg-slate-200', 'text-slate-600');
            
            const btnEn = document.getElementById('btn-vocab-en');
            btnEn.classList.remove('btn-active-en');
            btnEn.classList.add('bg-slate-200', 'text-slate-600');
        }

        // Vocab Toggle Logic
        function toggleVocab(type) {
            const container = document.getElementById(`vocab-${type}-container`);
            const btn = document.getElementById(`btn-vocab-${type}`);
            
            if (container.classList.contains('hidden')) {
                container.classList.remove('hidden');
                btn.classList.add(`btn-active-${type}`);
                btn.classList.remove('bg-slate-200', 'text-slate-600');
            } else {
                container.classList.add('hidden');
                btn.classList.remove(`btn-active-${type}`);
                btn.classList.add('bg-slate-200', 'text-slate-600');
            }
        }

        // Render Main Lesson
        function renderApp() {
            const container = document.getElementById('lesson-content');
            let htmlString = '';

            lessonData.forEach((item, index) => {
                let cardClass = "bg-white p-5 rounded-3xl shadow-sm border border-slate-200 transition-all hover:shadow-md hover:border-amber-300";
                let textClass = "text-xl font-medium text-slate-800";
                
                // Styling by block type
                if (item.type === 'header') {
                    cardClass = "bg-amber-600 p-6 rounded-3xl mt-10 shadow-md text-white border-none";
                    textClass = "text-2xl font-bold text-white";
                } else if (item.type === 'vocab') {
                    cardClass = "bg-white p-5 rounded-3xl shadow-sm border-2 border-red-100 flex items-center gap-4 ml-0 sm:ml-4";
                    textClass = "text-xl font-bold text-red-700";
                } else if (item.type === 'dialogue') {
                    cardClass = "bg-orange-50 p-5 rounded-3xl border-l-[6px] border-l-orange-400 ml-2 sm:ml-6";
                    textClass = "text-[1.15rem] text-orange-900 font-medium";
                } else if (item.type === 'task') {
                    cardClass = "bg-yellow-50 p-5 rounded-3xl border border-yellow-200 shadow-sm";
                    textClass = "text-[1.15rem] text-yellow-900 font-medium";
                }

                const isHeader = item.type === 'header';
                const audioBtnColor = isHeader 
                    ? "bg-white/20 text-white hover:bg-white/30 border-transparent backdrop-blur-sm" 
                    : "bg-slate-100 border-slate-200 text-amber-600 hover:bg-amber-100 hover:border-amber-300";
                
                const toggleBg = isHeader 
                    ? "bg-white/20 text-white hover:bg-white/30 border-transparent backdrop-blur-sm" 
                    : "bg-slate-50 text-slate-500 hover:bg-slate-100 border-slate-200";

                // Audio Button SVG
                const audioIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" /></svg>`;

                htmlString += `
                <div class="${cardClass}">
                    <div class="${item.type === 'vocab' ? 'flex items-center w-full' : 'flex items-start justify-between gap-4'}">
                        
                        <div class="${textClass} flex-1 leading-relaxed ${item.type === 'vocab' ? 'mb-0' : 'mb-2'}">${item.th}</div>
                        
                        <button onclick="speakText('${item.th.replace(/'/g, "\\'")}')" class="flex-shrink-0 border p-3 rounded-full active:scale-95 transition-all flex items-center justify-center ${audioBtnColor}">
                            ${audioIcon}
                        </button>
                    </div>

                    <div class="flex gap-2 ${item.type === 'vocab' ? 'mt-0' : 'mt-4'} ${item.type === 'vocab' ? 'w-full mt-3' : ''}">
                        <button onclick="toggleView('ipa', ${index})" id="btn-ipa-${index}" class="px-5 py-2 text-sm font-semibold rounded-xl transition-colors border ${toggleBg}">IPA</button>
                        <button onclick="toggleView('en', ${index})" id="btn-en-${index}" class="px-5 py-2 text-sm font-semibold rounded-xl transition-colors border ${toggleBg}">EN</button>
                    </div>

                    <div id="ipa-${index}" class="hidden mt-4 p-4 bg-red-50 text-red-800 rounded-2xl font-mono text-base border border-red-200 shadow-inner animate-reveal">
                        <span class="text-[10px] font-bold uppercase tracking-wider text-red-500 block mb-1">Pronunciation</span>
                        ${item.ipa}
                    </div>
                    <div id="en-${index}" class="hidden mt-3 p-4 bg-sky-50 text-sky-800 rounded-2xl text-base border border-sky-200 shadow-inner animate-reveal">
                        <span class="text-[10px] font-bold uppercase tracking-wider text-sky-500 block mb-1">Translation</span>
                        ${item.en}
                    </div>
                </div>
                `;
            });

            container.innerHTML = htmlString;
        }

        // View Toggler (EN-title / IPA / EN)
        function toggleView(type, index) {
            const contentDiv = document.getElementById(`${type}-${index}`);
            const btn = document.getElementById(`btn-${type}-${index}`);
            
            if (contentDiv.classList.contains('hidden')) {
                // Show
                contentDiv.classList.remove('hidden');
                btn.classList.add(`btn-active-${type}`);
                
                // Remove default inactive classes
                btn.classList.remove('bg-slate-50', 'text-slate-500', 'border-slate-200', 'bg-white/20', 'text-white', 'border-transparent');
            } else {
                // Hide
                contentDiv.classList.add('hidden');
                btn.classList.remove(`btn-active-${type}`);
                
                // Restore default classes depending on header or normal block
                if (btn.id.includes('title') || btn.closest('.bg-amber-600')) {
                    btn.classList.add('bg-white/20', 'text-white', 'border-transparent');
                } else {
                    btn.classList.add('bg-slate-50', 'text-slate-500', 'border-slate-200');
                }
            }
        }

        // Text-to-Speech (TTS)
        function speakText(text) {
            // Remove Emojis, English alphabet markers (A:, B:), and dots
            let textToSpeak = text.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '');
            textToSpeak = textToSpeak.replace(/A:|B:/g, '');
            textToSpeak = textToSpeak.replace(/\.\.\./g, '');
            
            window.speechSynthesis.cancel(); // Stop any currently playing audio
            
            const utterance = new SpeechSynthesisUtterance(textToSpeak.trim());
            utterance.lang = 'th-TH'; // Thai Voice
            utterance.rate = 0.8;     // Slower speed for A1 student
            utterance.pitch = 1.0;
            
            window.speechSynthesis.speak(utterance);
        }

        // Initialize App on load
        window.onload = renderApp;
    </script>

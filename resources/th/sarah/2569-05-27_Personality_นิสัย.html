<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>นิสัย - Personality</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #faf5ff; /* Light violet background */
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom Active Button Styles */
        .btn-active-en-title { background-color: #f3e8ff !important; color: #7e22ce !important; border-color: #d8b4fe !important; }
        .btn-active-ipa { background-color: #fce7f3 !important; color: #be185d !important; border-color: #fbcfe8 !important; }
        .btn-active-en { background-color: #e0f2fe !important; color: #0284c7 !important; border-color: #bae6fd !important; }
        
        /* Smooth Animations */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-reveal {
            animation: slideDown 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="antialiased text-gray-800 pb-24">

    <div class="max-w-3xl mx-auto px-4 py-8 space-y-8">
        
        <!-- Header Section -->
        <div class="bg-violet-600 text-white p-8 rounded-[2rem] shadow-xl text-center relative overflow-hidden">
            <div class="absolute -left-2 -bottom-4 text-8xl opacity-20">🧠</div>
            <div class="absolute -right-4 -top-4 text-8xl opacity-20">🎭</div>
            <h1 class="text-4xl font-bold mb-5 drop-shadow-md">นิสัย 🎭</h1>
            <div class="flex justify-center gap-3 relative z-10">
                <button onclick="speakText('นิสัย')" class="bg-white/20 hover:bg-white/30 text-white p-3 rounded-full transition-all backdrop-blur-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" /></svg>
                </button>
                <button onclick="toggleView('en-title', 'title')" id="btn-en-title-title" class="px-6 py-2 text-sm font-semibold bg-white/20 hover:bg-white/30 rounded-xl transition-colors border border-transparent backdrop-blur-sm">EN</button>
                <button onclick="toggleView('ipa', 'title')" id="btn-ipa-title" class="px-6 py-2 text-sm font-semibold bg-white/20 hover:bg-white/30 rounded-xl transition-colors border border-transparent backdrop-blur-sm">IPA</button>
            </div>
            <div id="en-title-title" class="hidden mt-4 text-violet-100 font-bold text-3xl bg-black/10 py-2 rounded-xl animate-reveal">Personality</div>
            <div id="ipa-title" class="hidden mt-4 text-violet-100 font-mono text-xl bg-black/10 py-2 rounded-xl animate-reveal">ní-sǎi</div>
        </div>

        <!-- Main Lesson Content Container -->
        <div id="lesson-content" class="space-y-6">
            <!-- Content gets injected here via JS -->
        </div>

    </div>

    <script>
        // Lesson Flow (Tasks & Dialogues)
        const lessonData = [
            {
                type: 'header',
                th: "คำถามก่อนเรียน ❓", ipa: "kam-tǎam gɔ̀ɔn rian", en: "Lead-in Questions"
            },
            {
                type: 'normal',
                th: "ปกติ คุณ ชอบใส่ เสื้อผ้า สีอะไร? 👕🎨", ipa: "bpòk-gà-dtì kun chôop sài sʉ̂ʉa-pâa sǐi à-rai?", en: "Normally, what color clothes do you like to wear?"
            },
            {
                type: 'normal',
                th: "คุณชอบใส่ กางเกงขาสั้น หรือ กางเกงขายาว? 🩳👖", ipa: "kun chôop sài gaang-geeng kǎa sân rʉ̌ʉ gaang-geeng kǎa yaao?", en: "Do you like wearing shorts or long pants?"
            },
            {
                type: 'normal',
                th: "คุณคิดว่า เสื้อผ้า บอก นิสัย ไหม? 🤔👗", ipa: "kun kít wâa sʉ̂ʉa-pâa bòok ní-sǎi mǎi?", en: "Do you think clothes tell a person's personality?"
            },
            {
                type: 'header',
                th: "คำศัพท์: นิสัย 🧠", ipa: "kam-sàp: ní-sǎi", en: "Vocabulary: Personality"
            },
            {
                type: 'vocab',
                th: "ใจดี ❤️", ipa: "jai-dii", en: "kind / good-hearted"
            },
            {
                type: 'vocab',
                th: "ตลก 😂", ipa: "dtà-lòk", en: "funny"
            },
            {
                type: 'vocab',
                th: "คุยเก่ง 🗣️", ipa: "kui gèng", en: "talkative / good at talking"
            },
            {
                type: 'vocab',
                th: "เงียบ 🤫", ipa: "ngîiap", en: "quiet"
            },
            {
                type: 'vocab',
                th: "ใจร้อน 😤", ipa: "jai-rɔ́ɔn", en: "impatient / hot-tempered"
            },
            {
                type: 'header',
                th: "บทสนทนา: เดือนเกิดกับนิสัย 💬", ipa: "bòt sǒn-tá-naa: dʉʉan gə̀ət gàp ní-sǎi", en: "Dialogue: Birth Month and Personality"
            },
            {
                type: 'dialogue',
                th: "A: คุณ เกิด เดือนอะไร? 🎂", ipa: "A: kun gə̀ət dʉʉan à-rai?", en: "A: What month were you born?"
            },
            {
                type: 'dialogue',
                th: "B: เรา เกิด เดือนเมษา 🥵 แล้ว คุณ ล่ะ?", ipa: "B: rao gə̀ət dʉʉan mee-sǎa. láeo kun là?", en: "B: I was born in April. And you?"
            },
            {
                type: 'dialogue',
                th: "A: เรา เกิด เดือนตุลา 🍂 เขาบอกว่า คน เดือนตุลา ใจดี ❤️ และ คุยเก่ง 🗣️", ipa: "A: rao gə̀ət dʉʉan dtù-laa. kǎo bòok wâa kon dʉʉan dtù-laa jai-dii láe kui gèng", en: "A: I was born in October. They say October people are kind and talkative."
            },
            {
                type: 'dialogue',
                th: "B: คน เดือนเมษา ใจร้อน 😤 แต่ ตลก นะ 😂", ipa: "B: kon dʉʉan mee-sǎa jai-rɔ́ɔn dtàae dtà-lòk ná", en: "B: April people are hot-tempered but funny."
            },
            {
                type: 'dialogue',
                th: "A: แฟน คุณ เกิด เดือนอะไร? นิสัย ยังไง? 👫", ipa: "A: faen kun gə̀ət dʉʉan à-rai? ní-sǎi yang-ngai?", en: "A: What month was your partner born? How is their personality?"
            },
            {
                type: 'dialogue',
                th: "B: เขา เกิด เดือนกุมภา 💝 เขา เป็น คน เงียบๆ 🤫", ipa: "B: kǎo gə̀ət dʉʉan gum-paa. kǎo bpen kon ngîiap-ngîiap", en: "B: He/She was born in February. He/She is a quiet person."
            },
            {
                type: 'header',
                th: "คำถามความเข้าใจ 🧠", ipa: "kam-tǎam kwaam-kâo-jai", en: "Comprehension Questions"
            },
            {
                type: 'normal',
                th: "คน เดือนตุลา นิสัย ยังไง? 🍂", ipa: "kon dʉʉan dtù-laa ní-sǎi yang-ngai?", en: "How is the personality of October people?"
            },
            {
                type: 'normal',
                th: "B เกิด เดือนอะไร? 🎂", ipa: "B gə̀ət dʉʉan à-rai?", en: "What month was B born?"
            },
            {
                type: 'normal',
                th: "แฟน ของ B คุยเก่ง ไหม? 🗣️", ipa: "faen kɔ̌ɔng B kui gèng mǎi?", en: "Is B's partner talkative?"
            },
            {
                type: 'header',
                th: "คำถามพูดคุย 🗣️", ipa: "kam-tǎam pûut-kui", en: "Discussion Questions"
            },
            {
                type: 'normal',
                th: "คุณ เป็น คน นิสัย ยังไง? 🤔", ipa: "kun bpen kon ní-sǎi yang-ngai?", en: "What is your personality?"
            },
            {
                type: 'normal',
                th: "เพื่อน ของ คุณ เป็น คน ตลก ไหม? 😂", ipa: "pʉ̂an kɔ̌ɔng kun bpen kon dtà-lòk mǎi?", en: "Is your friend a funny person?"
            },
            {
                type: 'normal',
                th: "คุณ ชอบ คน นิสัย แบบไหน? ❤️", ipa: "kun chôop kon ní-sǎi bàep nǎi?", en: "What kind of personality do you like in a person?"
            },
            {
                type: 'header',
                th: "ภารกิจในชีวิตจริง 🎬", ipa: "paa-rá-gìt nai chii-wít jing", en: "Real-life Tasks"
            },
            {
                type: 'task',
                th: "บทบาทสมมติ 🎭: สัมภาษณ์เพื่อนร่วมงานใหม่ ถามว่า เกิด เดือนอะไร? และ เป็น คน นิสัย ยังไง?", ipa: "bòt-bàat sǒm-mút: sǎm-pâat pʉ̂an rûam ngaan mài. tǎam wâa gə̀ət dʉʉan à-rai? láe bpen kon ní-sǎi yang-ngai?", en: "Role-play: Interview a new colleague. Ask what month they were born and what their personality is like."
            },
            {
                type: 'task',
                th: "เกมการพูด 🎲: ทายสิใครเอ่ย? อธิบาย เสื้อผ้า และ นิสัย ของเพื่อน 1 คน ให้ครูทาย", ipa: "geem gaan pûut: taai sí krai ə̀əi? à-tí-baai sʉ̂ʉa-pâa láe ní-sǎi kɔ̌ɔng pʉ̂an nʉ̀ng kon. hâi kruu taai", en: "Speaking Game: Guess who! Describe the clothes and personality of 1 friend. Let the teacher guess."
            },
            {
                type: 'task',
                th: "สัมภาษณ์ 🎤: ถามครูว่า คน เดือนมกรา นิสัย ยังไง? ครู ใจร้อน ไหม?", ipa: "sǎm-pâat: tǎam kruu wâa kon dʉʉan mók-gà-raa ní-sǎi yang-ngai? kruu jai-rɔ́ɔn mǎi?", en: "Interview: Ask the teacher how January people's personalities are. Is the teacher hot-tempered?"
            },
            {
                type: 'task',
                th: "โต้วาที ⚖️: คน คุยเก่ง 🗣️ vs คน เงียบ 🤫 ใคร ทำงาน เก่ง กว่ากัน? ทำไม?", ipa: "dtôo-waa-tii: kon kui gèng vs kon ngîiap. krai tam-ngaan gèng gwàa gan? tam-mai?", en: "Debate: Talkative person vs Quiet person. Who works better? Why?"
            },
            {
                type: 'header',
                th: "กิจกรรมเพิ่มเติม 🚀", ipa: "gìt-jà-gam pə̂əm-dtəəm", en: "Extension Activities"
            },
            {
                type: 'task',
                th: "เล่าเรื่อง 📚: เล่าเรื่องคนที่ ใจร้อน 😤 ที่สุดที่คุณรู้จัก เขาเป็นใคร? เกิด เดือนอะไร?", ipa: "lâo rʉ̂ang: lâo rʉ̂ang kon tîi jai-rɔ́ɔn tîi-sùt tîi kun rúu-jàk. kǎo bpen krai? gə̀ət dʉʉan à-rai?", en: "Story-telling: Tell a story about the most hot-tempered person you know. Who are they? What month were they born?"
            },
            {
                type: 'task',
                th: "นำเสนอ 📊: พรีเซนต์สเปกแฟนของคุณ! อยากได้คน นิสัย ยังไง? ใส่ เสื้อผ้า แบบไหน?", ipa: "nam-sà-nə̌ə: pree-sén sà-bpék faen kɔ̌ɔng kun! yàak dâi kon ní-sǎi yang-ngai? sài sʉ̂ʉa-pâa bàep nǎi?", en: "Presentation: Present your ideal partner! What personality do you want? What kind of clothes do they wear?"
            }
        ];

        // Render Main Lesson
        function renderApp() {
            const container = document.getElementById('lesson-content');
            let htmlString = '';

            lessonData.forEach((item, index) => {
                let cardClass = "bg-white p-5 rounded-3xl shadow-sm border border-slate-200 transition-all hover:shadow-md hover:border-violet-300";
                let textClass = "text-xl font-medium text-slate-800";
                
                // Styling by block type
                if (item.type === 'header') {
                    cardClass = "bg-violet-600 p-6 rounded-3xl mt-10 shadow-md text-white border-none";
                    textClass = "text-2xl font-bold text-white";
                } else if (item.type === 'vocab') {
                    cardClass = "bg-white p-5 rounded-3xl shadow-sm border-2 border-pink-100 flex items-center gap-4 ml-0 sm:ml-4";
                    textClass = "text-xl font-bold text-pink-600";
                } else if (item.type === 'dialogue') {
                    cardClass = "bg-fuchsia-50 p-5 rounded-3xl border-l-[6px] border-l-fuchsia-400 ml-2 sm:ml-6";
                    textClass = "text-[1.15rem] text-fuchsia-900 font-medium";
                } else if (item.type === 'task') {
                    cardClass = "bg-indigo-50 p-5 rounded-3xl border border-indigo-200 shadow-sm";
                    textClass = "text-[1.15rem] text-indigo-900 font-medium";
                }

                const isHeader = item.type === 'header';
                const audioBtnColor = isHeader 
                    ? "bg-white/20 text-white hover:bg-white/30 border-transparent backdrop-blur-sm" 
                    : "bg-slate-100 border-slate-200 text-violet-600 hover:bg-violet-100 hover:border-violet-300";
                
                const toggleBg = isHeader 
                    ? "bg-white/20 text-white hover:bg-white/30 border-transparent backdrop-blur-sm" 
                    : "bg-slate-50 text-slate-500 hover:bg-slate-100 border-slate-200";

                // Audio Button SVG
                const audioIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" /></svg>`;

                htmlString += `
                <div class="${cardClass}">
                    <div class="${item.type === 'vocab' ? 'flex items-center w-full' : 'flex items-start justify-between gap-4'}">
                        
                        <div class="${textClass} flex-1 leading-relaxed ${item.type === 'vocab' ? 'mb-0' : 'mb-2'}">${item.th}</div>
                        
                        <button onclick="speakText('${item.th.replace(/'/g, "\\'")}')" class="flex-shrink-0 border p-3 rounded-full active:scale-95 transition-all flex items-center justify-center ${audioBtnColor}">
                            ${audioIcon}
                        </button>
                    </div>

                    <div class="flex gap-2 ${item.type === 'vocab' ? 'mt-0' : 'mt-4'} ${item.type === 'vocab' ? 'w-full mt-3' : ''}">
                        <button onclick="toggleView('ipa', ${index})" id="btn-ipa-${index}" class="px-5 py-2 text-sm font-semibold rounded-xl transition-colors border ${toggleBg}">IPA</button>
                        <button onclick="toggleView('en', ${index})" id="btn-en-${index}" class="px-5 py-2 text-sm font-semibold rounded-xl transition-colors border ${toggleBg}">EN</button>
                    </div>

                    <div id="ipa-${index}" class="hidden mt-4 p-4 bg-pink-50 text-pink-800 rounded-2xl font-mono text-base border border-pink-200 shadow-inner animate-reveal">
                        <span class="text-[10px] font-bold uppercase tracking-wider text-pink-500 block mb-1">Pronunciation</span>
                        ${item.ipa}
                    </div>
                    <div id="en-${index}" class="hidden mt-3 p-4 bg-indigo-50 text-indigo-800 rounded-2xl text-base border border-indigo-200 shadow-inner animate-reveal">
                        <span class="text-[10px] font-bold uppercase tracking-wider text-indigo-600 block mb-1">Translation</span>
                        ${item.en}
                    </div>
                </div>
                `;
            });

            container.innerHTML = htmlString;
        }

        // View Toggler (EN-title / IPA / EN)
        function toggleView(type, index) {
            const contentDiv = document.getElementById(`${type}-${index}`);
            const btn = document.getElementById(`btn-${type}-${index}`);
            
            if (contentDiv.classList.contains('hidden')) {
                // Show
                contentDiv.classList.remove('hidden');
                btn.classList.add(`btn-active-${type}`);
                
                // Remove default inactive classes
                btn.classList.remove('bg-slate-50', 'text-slate-500', 'border-slate-200', 'bg-white/20', 'text-white', 'border-transparent');
            } else {
                // Hide
                contentDiv.classList.add('hidden');
                btn.classList.remove(`btn-active-${type}`);
                
                // Restore default classes depending on header or normal block
                if (btn.id.includes('title') || btn.closest('.bg-violet-600')) {
                    btn.classList.add('bg-white/20', 'text-white', 'border-transparent');
                } else {
                    btn.classList.add('bg-slate-50', 'text-slate-500', 'border-slate-200');
                }
            }
        }

        // Text-to-Speech (TTS)
        function speakText(text) {
            // Remove Emojis, English alphabet markers (A:, B:), and dots
            let textToSpeak = text.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '');
            textToSpeak = textToSpeak.replace(/A:|B:/g, '');
            textToSpeak = textToSpeak.replace(/\.\.\./g, '');
            
            window.speechSynthesis.cancel(); // Stop any currently playing audio
            
            const utterance = new SpeechSynthesisUtterance(textToSpeak.trim());
            utterance.lang = 'th-TH'; // Thai Voice
            utterance.rate = 0.8;     // Slower speed for A1 student
            utterance.pitch = 1.0;
            
            window.speechSynthesis.speak(utterance);
        }

        // Initialize App on load
        window.onload = renderApp;
    </script>
</body>
</html>

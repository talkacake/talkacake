<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สุขภาพจิต</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Sarabun -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8fafc; /* Light slate background */
            -webkit-tap-highlight-color: transparent;
        }
        .slide-down {
            animation: slideDown 0.25s ease-out forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Custom scrollbar for embedded views */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 antialiased p-3 sm:p-6 md:p-8 min-h-screen pb-24">

    <div class="max-w-3xl mx-auto space-y-6 sm:space-y-8" id="app">
        
        <!-- Header Section -->
        <div id="header-container" class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 text-center">
            <!-- Rendered by JS -->
        </div>

        <!-- Section 1: Review -->
        <div class="bg-white rounded-3xl shadow-sm border border-emerald-100 p-5 sm:p-8">
            <div id="review-header"></div>
            
            <button onclick="rollRandomVocab()" class="w-full py-4 mt-6 bg-emerald-500 text-white text-xl font-bold rounded-2xl shadow hover:bg-emerald-600 transition-colors flex items-center justify-center gap-3 mb-6 touch-manipulation">
                <span class="text-3xl">🎲</span> สุ่มคำศัพท์
            </button>
            
            <div id="randomizer-result" class="min-h-[140px] flex items-center justify-center bg-slate-50 rounded-2xl border-2 border-dashed border-slate-300 p-2 sm:p-4 transition-all">
                <p class="text-slate-400 font-medium text-lg text-center">คลิกปุ่มเพื่อสุ่มคำศัพท์</p>
            </div>
        </div>

        <!-- Section 2: Dialogue -->
        <div class="bg-white rounded-3xl shadow-sm border border-blue-100 p-5 sm:p-8">
            <div id="dialogue-header"></div>
            <div id="dialogue-content" class="mt-6 space-y-4"></div>
        </div>

        <!-- Section 3: Target Vocab -->
        <div class="bg-white rounded-3xl shadow-sm border border-purple-100 p-5 sm:p-8">
            <div id="vocab-header"></div>
            <div id="vocab-content" class="mt-6 space-y-4"></div>
        </div>

        <!-- Section 4: Main Activities -->
        <div class="bg-white rounded-3xl shadow-sm border border-orange-100 p-5 sm:p-8">
            <div id="main-activity-header"></div>
            <div id="main-activity-content" class="mt-6 space-y-4"></div>
        </div>

        <!-- Section 5: Extension Activities -->
        <div class="bg-white rounded-3xl shadow-sm border border-pink-100 p-5 sm:p-8">
            <div id="extension-header"></div>
            <div id="extension-content" class="mt-6 space-y-4"></div>
        </div>
    </div>

    <!-- JavaScript Data and Logic -->
    <script>
        // Data Structure
        const lessonData = {
            header: { emoji: '🧠🤍', th: 'สุขภาพจิต', ipa: 'sùk-kà-pâap jìt', en: 'Mental Health' },
            
            review: {
                header: { emoji: '🔄', th: 'ทบทวนคำศัพท์', ipa: 'tóp-tuan kam-sàp', en: 'Vocabulary Review' },
                instruction: { emoji: '🗣️', th: 'สุ่มคำศัพท์ด้านล่างและแต่งประโยคให้สมบูรณ์', ipa: 'sùm kam-sàp dâan lâang láe dtàeng bprà-yòhk hâi sŏm-buun', en: 'Randomize a vocabulary word below and make a complete sentence.' },
                words: [
                    { emoji: '🐔', th: 'ไก่', ipa: 'gài', en: 'chicken' },
                    { emoji: '🐦🪶', th: 'จิก', ipa: 'jìk', en: 'to peck' },
                    { emoji: '🧒', th: 'เด็ก', ipa: 'dèk', en: 'child' },
                    { emoji: '⚰️', th: 'ตาย', ipa: 'dtaai', en: 'to die' },
                    { emoji: '🔛', th: 'บน', ipa: 'bon', en: 'on' },
                    { emoji: '👄', th: 'ปาก', ipa: 'bpàak', en: 'mouth' },
                    { emoji: '🏺', th: 'โอ่ง', ipa: 'òng', en: 'water jar' },
                    { emoji: '👻', th: 'ผี', ipa: 'pĕe', en: 'ghost' },
                    { emoji: '🏦🤝📦', th: 'ฝาก', ipa: 'fàak', en: 'to deposit / to leave with' },
                    { emoji: '👜', th: 'ถุง', ipa: 'tŭng', en: 'bag' },
                    { emoji: '🍚', th: 'ข้าว', ipa: 'kâao', en: 'rice' },
                    { emoji: '🧪🧫', th: 'สาร', ipa: 'săan', en: 'substance / milled rice' },
                    { emoji: '🎁', th: 'ให้', ipa: 'hâi', en: 'to give' },
                    { emoji: '🧍‍♀️', th: 'ฉัน', ipa: 'chăn', en: 'I / me' },
                    { emoji: '🗣️✨', th: 'คล่อง', ipa: 'klông', en: 'fluently' },
                    { emoji: '📝', th: 'แต่งประโยค', ipa: 'dtàeng bprà-yòhk', en: 'to make sentences' },
                    { emoji: '💬🗣️', th: 'บทสนทนา', ipa: 'bòt sŏn-tá-naa', en: 'dialogue' },
                    { emoji: '🥹🙏', th: 'ซึ้งใจ', ipa: 'séung-jai', en: 'touched / deeply appreciative' },
                    { emoji: '😌🏆', th: 'ภูมิใจ', ipa: 'puum-jai', en: 'proud' },
                    { emoji: '😊💪', th: 'ภูมิใจในตัวเอง', ipa: 'puum-jai nai dtua-ehng', en: 'proud of myself' },
                    { emoji: '🩺📄', th: 'รายงานทางการแพทย์', ipa: 'raai-ngaan taang gaan-pâet', en: 'medical report' },
                    { emoji: '🎯🧹', th: 'เป็นคนเป๊ะ', ipa: 'bpĕn kon bpé', en: 'be a perfectionist' },
                    { emoji: '🧊🥶', th: 'ค้าง', ipa: 'káang', en: 'to freeze (system; electronic device)' }
                ]
            },

            dialogue: {
                header: { emoji: '💬', th: 'บทสนทนา: คุยกับแม่', ipa: 'bòt sŏn-tá-naa: kui gàp mâe', en: 'Dialogue: Talking to Mom' },
                lines: [
                    { emoji: '👧🏽', speaker: 'ลูก', th: 'แม่คะ ช่วงนี้หนูรู้สึกว่าตัวเองกำลังหมดไฟเลยค่ะ', ipa: 'mâe ká, chûang née nŭu ráng-sèuk wâa dtua-ehng gam-lang mòt fai loei kâ', en: 'Mom, lately I feel like I am completely burnt out.' },
                    { emoji: '👩🏽', speaker: 'แม่', th: 'เป็นอะไรลูก เครียดสะสมเรื่องงานเหรอ หรือเพราะว่าเป็นคนเป๊ะเกินไป?', ipa: 'bpĕn à-rai lûuk, krîat sà-sŏm rêuang ngaan rĕr? rĕu pròr wâa bpĕn kon bpé gern bpai?', en: 'What is wrong, dear? Accumulated stress from work? Or is it because you are too much of a perfectionist?' },
                    { emoji: '👧🏽', speaker: 'ลูก', th: 'ใช่ค่ะ หนูคิดว่าจะไปพบจิตแพทย์เพื่อปรึกษาดูค่ะ', ipa: 'châi kâ, nŭu kít wâa jà bpai póp jìt-dtà-pâet pêua bprèuk-săa duu kâ', en: 'Yes. I am thinking of going to see a psychiatrist to consult.' },
                    { emoji: '👩🏽', speaker: 'แม่', th: 'ดีแล้วลูก เรื่องสุขภาพจิตสำคัญมาก หาเวลาพักผ่อนหย่อนใจบ้างนะ', ipa: 'dee láeo lûuk, rêuang sùk-kà-pâap jìt săm-kan mâak, hăa way-laa pák-pòn yòn-jai bâang ná', en: 'That is good, dear. Mental health is very important. Find some time to relax and unwind too.' },
                    { emoji: '👧🏽', speaker: 'ลูก', th: 'ขอบคุณค่ะแม่ หนูจะพยายามเยียวยาจิตใจตัวเองค่ะ', ipa: 'kòp kun kâ mâe, nŭu jà pá-yaa-yaam yiao-yaa jìt-jai dtua-ehng kâ', en: 'Thank you, mom. I will try to heal my own mind.' }
                ]
            },

            targetVocab: {
                header: { emoji: '🎯', th: 'คำศัพท์ใหม่', ipa: 'kam-sàp mài', en: 'New Vocabulary' },
                words: [
                    { emoji: '🪫🔥', th: 'หมดไฟ', ipa: 'mòt fai', en: 'to be burnt out (lit. out of fire)' },
                    { emoji: '😫📚', th: 'เครียดสะสม', ipa: 'krîat sà-sŏm', en: 'accumulated stress / chronic stress' },
                    { emoji: '🧑‍⚕️🛋️', th: 'พบจิตแพทย์', ipa: 'póp jìt-dtà-pâet', en: 'to see a psychiatrist' },
                    { emoji: '🌴🍹', th: 'พักผ่อนหย่อนใจ', ipa: 'pák-pòn yòn-jai', en: 'to relax / to unwind / recreation' },
                    { emoji: '🩹❤️', th: 'เยียวยา', ipa: 'yiao-yaa', en: 'to heal / to remedy (mental or physical)' }
                ]
            },

            mainActivities: {
                header: { emoji: '🎭', th: 'กิจกรรมการพูด', ipa: 'gìt-jà-gam gaan pûut', en: 'Speaking Activities' },
                tasks: [
                    { emoji: '📱', th: 'บทบาทสมมติ: โทรหาแม่เพื่ออธิบายอาการหมดไฟของคุณ และบอกว่าคุณจะไปพบจิตแพทย์', ipa: 'bòt-bàat sŏm-mút: toh hăa mâe pêua à-tí-baai aa-gaan mòt fai kŏng kun, láe bòk wâa kun jà bpai póp jìt-dtà-pâet', en: 'Role-play: Call mom to explain your burnout symptoms and tell her you are going to see a psychiatrist.' },
                    { emoji: '❓', th: 'คำถามอภิปราย: ทำไมบางคนถึงอายที่จะไปพบจิตแพทย์? เราจะเปลี่ยนความคิดนี้ได้อย่างไร?', ipa: 'kam-tăam à-pí-bpraai: tam-mai baang kon tĕung aai tîi jà bpai póp jìt-dtà-pâet? rao jà bplìan kwaam kít née dâi yàang-rai?', en: 'Discussion Question: Why are some people ashamed to see a psychiatrist? How can we change this mindset?' },
                    { emoji: '🧩', th: 'เกมการพูด: ครูจะใบ้คำศัพท์เกี่ยวกับสุขภาพจิตและคำศัพท์เก่า ให้คุณทายว่าเป็นคำว่าอะไร', ipa: 'gaym gaan pûut: kruu jà bâi kam-sàp gìao gàp sùk-kà-pâap jìt láe kam-sàp gào, hâi kun taai wâa bpĕn kam wâa à-rai', en: 'Speaking Game: The teacher will hint vocabulary about mental health and old vocab. You guess what word it is.' }
                ]
            },

            extensionActivities: {
                header: { emoji: '🌟', th: 'กิจกรรมเสริม', ipa: 'gìt-jà-gam sĕrm', en: 'Extension Activities' },
                instruction: { emoji: '⏱️', th: 'หากมีเวลาเหลือ ให้ทำกิจกรรมเหล่านี้', ipa: 'hàak mee way-laa lĕua, hâi tam gìt-jà-gam lào née', en: 'If there is time left, do these activities.' },
                tasks: [
                    { emoji: '📖', th: 'เล่าเรื่อง: เล่าประสบการณ์ที่คุณเคยเครียดสะสม และวิธีที่คุณใช้เยียวยาตัวเอง', ipa: 'lâo rêuang: lâo bprà-sòp-gaan tîi kun koey krîat sà-sŏm, láe wí-tee tîi kun chái yiao-yaa dtua-ehng', en: 'Story-telling: Tell an experience where you had accumulated stress, and the methods you used to heal yourself.' },
                    { emoji: '🎤', th: 'สัมภาษณ์: สัมภาษณ์ครูเกี่ยวกับสถานที่พักผ่อนหย่อนใจที่ครูชอบไปมากที่สุด', ipa: 'săm-pâat: săm-pâat kruu gìao gàp sà-tăan-tîi pák-pòn yòn-jai tîi kruu chôp bpai mâak tîi sùt', en: 'Interview: Interview the teacher about the relaxation place they like to go to the most.' },
                    { emoji: '⚖️', th: 'โต้วาที: สุขภาพร่างกาย สำคัญกว่า สุขภาพจิต จริงหรือไม่?', ipa: 'dtôh-waa-tee: sùk-kà-pâap râang gaai săm-kan gwàa sùk-kà-pâap jìt, jing rĕu mâi?', en: 'Debate: Physical health is more important than mental health. True or false?' },
                    { emoji: '📊', th: 'นำเสนอ: พูดนำเสนอ 1 นาที แนะนำวิธีป้องกันอาการหมดไฟในการทำงาน', ipa: 'nam sà-nĕr: pûut nam sà-nĕr nèung naa-tee, náe-nam wí-tee bpông-gan aa-gaan mòt fai nai gaan tam ngaan', en: 'Presentation: Give a 1-minute presentation recommending ways to prevent burnout at work.' }
                ]
            }
        };

        // State mechanism for audio
        let currentUtterance = null;

        // Function to create each interactive row/block
        function createInteractiveBlock(item, isHeader = false) {
            const speakerTag = item.speaker ? `<span class="font-bold text-blue-700 mr-2 border-b-2 border-blue-200 pb-1">${item.speaker}:</span>` : '';
            const emojiTag = item.emoji ? `<span class="mr-3 text-2xl sm:text-3xl shrink-0 drop-shadow-sm">${item.emoji}</span>` : '';
            
            const uniqueId = Math.random().toString(36).substr(2, 9);
            const ipaId = `ipa-${uniqueId}`;
            const enId = `en-${uniqueId}`;

            const safeThaiText = item.th.replace(/'/g, "\\'").replace(/"/g, "&quot;");
            
            const titleClass = isHeader ? "text-xl sm:text-2xl font-bold text-slate-800" : "text-lg text-slate-700 font-medium";
            const containerClass = isHeader ? "bg-slate-50 border-slate-200" : "bg-white border-slate-100";

            return `
            <div class="${containerClass} rounded-2xl shadow-sm border p-4 sm:p-5 transition hover:shadow-md w-full">
                <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4">
                    <div class="${titleClass} leading-relaxed flex-1 flex items-start">
                        ${emojiTag}
                        <div class="pt-0.5">${speakerTag}${item.th}</div>
                    </div>
                    <div class="flex items-center gap-2 self-start sm:self-center shrink-0">
                        <button onclick="speakThai('${safeThaiText}')" class="flex items-center justify-center w-10 h-10 sm:w-11 sm:h-11 bg-sky-50 text-sky-600 rounded-full hover:bg-sky-100 transition shadow-sm touch-manipulation focus:outline-none focus:ring-2 focus:ring-sky-400" title="ฟังเสียง (Listen)">
                            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 001.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06zM18.584 5.106a.75.75 0 011.06 0c3.808 3.807 3.808 9.98 0 13.788a.75.75 0 11-1.06-1.06 8.25 8.25 0 000-11.668.75.75 0 010-1.06z"/><path d="M15.932 7.757a.75.75 0 011.061 0 4.5 4.5 0 010 6.364.75.75 0 01-1.06-1.06 3 3 0 000-4.243.75.75 0 010-1.061z"/></svg>
                        </button>
                        <button onclick="toggleVisibility('${ipaId}')" class="px-3 py-2 sm:px-3.5 sm:py-2.5 text-xs sm:text-sm font-bold tracking-wide bg-violet-50 text-violet-700 rounded-xl hover:bg-violet-100 transition shadow-sm touch-manipulation focus:outline-none focus:ring-2 focus:ring-violet-400">IPA</button>
                        <button onclick="toggleVisibility('${enId}')" class="px-3 py-2 sm:px-3.5 sm:py-2.5 text-xs sm:text-sm font-bold tracking-wide bg-teal-50 text-teal-700 rounded-xl hover:bg-teal-100 transition shadow-sm touch-manipulation focus:outline-none focus:ring-2 focus:ring-teal-400">EN</button>
                    </div>
                </div>
                <div id="${ipaId}" class="hidden mt-4 px-4 py-3 bg-violet-50 text-violet-800 rounded-xl text-base font-medium tracking-wide border border-violet-100 w-full slide-down"><span class="text-violet-400 mr-2 font-bold text-sm">IPA</span> ${item.ipa}</div>
                <div id="${enId}" class="hidden mt-3 px-4 py-3 bg-teal-50 text-teal-800 rounded-xl text-base border border-teal-100 w-full slide-down"><span class="text-teal-400 mr-2 font-bold text-sm">EN</span> ${item.en}</div>
            </div>
            `;
        }

        function toggleVisibility(elementId) {
            const el = document.getElementById(elementId);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        }

        // Web Speech API wrapper for iOS compatibility
        function speakThai(text) {
            if (!('speechSynthesis' in window)) {
                alert("อุปกรณ์ของคุณไม่รองรับระบบเสียง (TTS is not supported).");
                return;
            }
            
            window.speechSynthesis.cancel(); // Stop any currently playing audio
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.85; // Optimal speed for learning
            utterance.pitch = 1.0;
            
            // iOS specific handling: ensure voices are loaded
            let voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                const thaiVoice = voices.find(voice => voice.lang.includes('th'));
                if (thaiVoice) utterance.voice = thaiVoice;
            }

            window.speechSynthesis.speak(utterance);
        }

        // Handle iOS voice loading quirk
        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = function() {
                window.speechSynthesis.getVoices();
            };
        }

        function rollRandomVocab() {
            const words = lessonData.review.words;
            const randomIndex = Math.floor(Math.random() * words.length);
            const selectedWord = words[randomIndex];
            
            const container = document.getElementById('randomizer-result');
            container.innerHTML = createInteractiveBlock(selectedWord);
            
            // Automatically play sound when selected
            setTimeout(() => speakThai(selectedWord.th), 100);
        }

        function initializePage() {
            // Header Content
            document.getElementById('header-container').innerHTML = `
                <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-800 flex items-center justify-center gap-3">
                    <span class="text-4xl sm:text-5xl">${lessonData.header.emoji}</span>
                    ${lessonData.header.th}
                </h1>
                <div class="mt-6 flex justify-center gap-2 sm:gap-3 flex-wrap">
                    <button onclick="speakThai('${lessonData.header.th}')" class="px-4 py-2 bg-sky-100 text-sky-700 rounded-full text-sm font-semibold hover:bg-sky-200 transition touch-manipulation shadow-sm">🔊 ฟังเสียง</button>
                    <button onclick="toggleVisibility('header-ipa')" class="px-4 py-2 bg-violet-100 text-violet-700 rounded-full text-sm font-semibold hover:bg-violet-200 transition touch-manipulation shadow-sm">IPA</button>
                    <button onclick="toggleVisibility('header-en')" class="px-4 py-2 bg-teal-100 text-teal-700 rounded-full text-sm font-semibold hover:bg-teal-200 transition touch-manipulation shadow-sm">EN</button>
                </div>
                <div id="header-ipa" class="hidden mt-4 text-violet-700 font-medium text-lg slide-down">${lessonData.header.ipa}</div>
                <div id="header-en" class="hidden mt-2 text-teal-700 text-lg slide-down">${lessonData.header.en}</div>
            `;

            // Sections Rendering
            document.getElementById('review-header').innerHTML = createInteractiveBlock(lessonData.review.header, true);
            document.getElementById('review-header').innerHTML += `<div class="mt-4">` + createInteractiveBlock(lessonData.review.instruction) + `</div>`;
            
            document.getElementById('dialogue-header').innerHTML = createInteractiveBlock(lessonData.dialogue.header, true);
            document.getElementById('dialogue-content').innerHTML = lessonData.dialogue.lines.map(line => createInteractiveBlock(line)).join('');

            document.getElementById('vocab-header').innerHTML = createInteractiveBlock(lessonData.targetVocab.header, true);
            document.getElementById('vocab-content').innerHTML = lessonData.targetVocab.words.map(word => createInteractiveBlock(word)).join('');

            document.getElementById('main-activity-header').innerHTML = createInteractiveBlock(lessonData.mainActivities.header, true);
            document.getElementById('main-activity-content').innerHTML = lessonData.mainActivities.tasks.map(task => createInteractiveBlock(task)).join('');

            document.getElementById('extension-header').innerHTML = createInteractiveBlock(lessonData.extensionActivities.header, true);
            document.getElementById('extension-header').innerHTML += `<div class="mt-4">` + createInteractiveBlock(lessonData.extensionActivities.instruction) + `</div>`;
            document.getElementById('extension-content').innerHTML = lessonData.extensionActivities.tasks.map(task => createInteractiveBlock(task)).join('');
        }

        window.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>

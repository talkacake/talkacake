        // UI Generation Functions
        function createInteractiveBlock(item, isHeader = false) {
            const speakerTag = item.speaker ? `<span class="font-bold text-sky-700 mr-2 border-b-2 border-sky-200 pb-1">${item.speaker}:</span>` : '';
            const emojiTag = item.emoji ? `<span class="mr-3 text-2xl sm:text-3xl shrink-0 drop-shadow-sm">${item.emoji}</span>` : '';
            
            const uniqueId = Math.random().toString(36).substr(2, 9);
            const ipaId = `ipa-${uniqueId}`;
            const enId = `en-${uniqueId}`;

            // Make text safe for inline JS
            const safeThaiText = item.th.replace(/'/g, "\\'").replace(/"/g, "&quot;");
            
            const titleClass = isHeader ? "text-xl sm:text-2xl font-bold text-slate-800" : "text-lg text-slate-700 font-medium";
            const containerClass = isHeader ? "bg-slate-50 border-slate-200" : "bg-white border-slate-100";

            return `
            <div class="${containerClass} rounded-2xl shadow-sm border p-4 sm:p-5 transition hover:shadow-md w-full">
                <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4">
                    <div class="${titleClass} leading-relaxed flex-1 flex items-start">
                        ${emojiTag}
                        <div class="pt-0.5">${speakerTag}${item.th}</div>
                    </div>
                    <div class="flex items-center gap-2 self-start sm:self-center shrink-0">
                        <button onclick="speakThai('${safeThaiText}')" class="flex items-center justify-center w-10 h-10 sm:w-11 sm:h-11 bg-sky-100 text-sky-700 rounded-full hover:bg-sky-200 transition shadow-sm touch-manipulation focus:outline-none focus:ring-2 focus:ring-sky-400" title="ฟังเสียง (Listen)">
                            <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M13.5 4.06c0-1.336-1.616-2.005-2.56-1.06l-4.5 4.5H4.508c-1.141 0-2.318.664-2.66 1.905A9.76 9.76 0 001.5 12c0 .898.121 1.768.35 2.595.341 1.24 1.518 1.905 2.659 1.905h1.93l4.5 4.5c.945.945 2.561.276 2.561-1.06V4.06zM18.584 5.106a.75.75 0 011.06 0c3.808 3.807 3.808 9.98 0 13.788a.75.75 0 11-1.06-1.06 8.25 8.25 0 000-11.668.75.75 0 010-1.06z"/><path d="M15.932 7.757a.75.75 0 011.061 0 4.5 4.5 0 010 6.364.75.75 0 01-1.06-1.06 3 3 0 000-4.243.75.75 0 010-1.061z"/></svg>
                        </button>
                        <button onclick="toggleVisibility('${ipaId}')" class="px-3 py-2 sm:px-3.5 sm:py-2.5 text-xs sm:text-sm font-bold tracking-wide bg-indigo-50 text-indigo-700 rounded-xl hover:bg-indigo-100 transition shadow-sm touch-manipulation focus:outline-none focus:ring-2 focus:ring-indigo-400">IPA</button>
                        <button onclick="toggleVisibility('${enId}')" class="px-3 py-2 sm:px-3.5 sm:py-2.5 text-xs sm:text-sm font-bold tracking-wide bg-teal-50 text-teal-700 rounded-xl hover:bg-teal-100 transition shadow-sm touch-manipulation focus:outline-none focus:ring-2 focus:ring-teal-400">EN</button>
                    </div>
                </div>
                <div id="${ipaId}" class="hidden mt-4 px-4 py-3 bg-indigo-50 text-indigo-800 rounded-xl text-base font-medium tracking-wide border border-indigo-100 w-full slide-down"><span class="text-indigo-500 mr-2 font-bold text-sm">IPA</span> ${item.ipa}</div>
                <div id="${enId}" class="hidden mt-3 px-4 py-3 bg-teal-50 text-teal-800 rounded-xl text-base border border-teal-100 w-full slide-down"><span class="text-teal-500 mr-2 font-bold text-sm">EN</span> ${item.en}</div>
            </div>
            `;
        }

        function toggleVisibility(elementId) {
            const el = document.getElementById(elementId);
            el.classList.toggle('hidden');
        }

        // TTS setup specifically catering to iOS quirks
        function speakThai(text) {
            if (!('speechSynthesis' in window)) {
                alert("อุปกรณ์ของคุณไม่รองรับระบบเสียง (TTS is not supported).");
                return;
            }
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.85; 
            utterance.pitch = 1.0;
            
            let voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                const thaiVoice = voices.find(voice => voice.lang.includes('th'));
                if (thaiVoice) utterance.voice = thaiVoice;
            }
            window.speechSynthesis.speak(utterance);
        }

        // iOS voice loading fix
        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
        }

        function rollRandomVocab() {
            const words = lessonData.review.words;
            const randomIndex = Math.floor(Math.random() * words.length);
            const selectedWord = words[randomIndex];
            
            const container = document.getElementById('randomizer-result');
            container.innerHTML = createInteractiveBlock(selectedWord);
            
            setTimeout(() => speakThai(selectedWord.th), 100);
        }

        function initializePage() {
            // Header
            document.getElementById('header-container').innerHTML = `
                <h1 class="text-3xl sm:text-4xl lg:text-5xl font-extrabold text-slate-800 flex items-center justify-center gap-3">

                    ${lessonData.header.th}
                </h1>
                <div class="mt-6 flex justify-center gap-2 sm:gap-3 flex-wrap">
                    <button onclick="speakThai('${lessonData.header.th}')" class="px-4 py-2 bg-sky-100 text-sky-800 rounded-full text-sm font-semibold hover:bg-sky-200 transition touch-manipulation shadow-sm">🔊 ฟังเสียง</button>
                    <button onclick="toggleVisibility('header-ipa')" class="px-4 py-2 bg-indigo-100 text-indigo-700 rounded-full text-sm font-semibold hover:bg-indigo-200 transition touch-manipulation shadow-sm">IPA</button>
                    <button onclick="toggleVisibility('header-en')" class="px-4 py-2 bg-teal-100 text-teal-700 rounded-full text-sm font-semibold hover:bg-teal-200 transition touch-manipulation shadow-sm">EN</button>
                </div>
                <div id="header-ipa" class="hidden mt-4 text-indigo-700 font-medium text-lg slide-down">${lessonData.header.ipa}</div>
                <div id="header-en" class="hidden mt-2 text-teal-700 text-lg slide-down">${lessonData.header.en}</div>
            `;

            // Sections Rendering
            document.getElementById('review-header').innerHTML = createInteractiveBlock(lessonData.review.header, true);
            document.getElementById('review-header').innerHTML += `<div class="mt-4">` + createInteractiveBlock(lessonData.review.instruction) + `</div>`;
            
            document.getElementById('leadin-header').innerHTML = createInteractiveBlock(lessonData.leadin.header, true);
            document.getElementById('leadin-content').innerHTML = lessonData.leadin.questions.map(q => createInteractiveBlock(q)).join('');

            // Rendering Email Exercise
            document.getElementById('email-header').innerHTML = createInteractiveBlock(lessonData.emailExercise.header, true);
            document.getElementById('email-content').innerHTML = lessonData.emailExercise.emailContent.map(line => createInteractiveBlock(line)).join('');
            document.getElementById('email-choices').innerHTML = lessonData.emailExercise.choices.map(choice => createInteractiveBlock(choice)).join('');
            document.getElementById('comprehension-header').innerHTML = createInteractiveBlock(lessonData.emailExercise.comprehensionHeader, true);
            document.getElementById('comprehension-content').innerHTML = lessonData.emailExercise.questions.map(q => createInteractiveBlock(q)).join('');

            document.getElementById('dialogue-header').innerHTML = createInteractiveBlock(lessonData.dialogue.header, true);
            document.getElementById('dialogue-content').innerHTML = lessonData.dialogue.lines.map(line => createInteractiveBlock(line)).join('');
            document.getElementById('dialogue-comprehension-header').innerHTML = createInteractiveBlock(lessonData.dialogue.comprehensionHeader, true);
            document.getElementById('dialogue-comprehension-content').innerHTML = lessonData.dialogue.questions.map(q => createInteractiveBlock(q)).join('');

            document.getElementById('vocab-header').innerHTML = createInteractiveBlock(lessonData.targetVocab.header, true);
            document.getElementById('vocab-content').innerHTML = lessonData.targetVocab.words.map(word => createInteractiveBlock(word)).join('');

            document.getElementById('main-activity-header').innerHTML = createInteractiveBlock(lessonData.mainActivities.header, true);
            document.getElementById('main-activity-content').innerHTML = lessonData.mainActivities.tasks.map(task => createInteractiveBlock(task)).join('');

            document.getElementById('extension-header').innerHTML = createInteractiveBlock(lessonData.extensionActivities.header, true);
            document.getElementById('extension-header').innerHTML += `<div class="mt-4">` + createInteractiveBlock(lessonData.extensionActivities.instruction) + `</div>`;
            document.getElementById('extension-content').innerHTML = lessonData.extensionActivities.tasks.map(task => createInteractiveBlock(task)).join('');
        }

        window.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>

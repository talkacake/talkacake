<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>บทเรียนภาษาไทย: โฆษณา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { margin: 0; padding: 0; background-color: #f8fafc; min-height: 100vh; }
      #root:empty::before {
        content: "กำลังโหลดบทเรียน... (Loading...)";
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #64748b;
        font-family: sans-serif;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      import React from 'react';
      import { createRoot } from 'react-dom/client';

      const loadApp = async () => {
        try {
          const basePath = window.location.pathname.endsWith('/')
            ? window.location.pathname
            : window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);

          const appUrl = `${basePath}src/2569-03-08_koht-sa-naa.js`;

          console.log('Loading:', appUrl);

          const module = await import(appUrl);
          const App = module.default;

          const root = createRoot(document.getElementById('root'));
          root.render(React.createElement(App));
        } catch (error) {
          console.error(error);
          document.getElementById('root').innerHTML = `
            <div style="padding:40px;color:#ef4444;text-align:center;font-family:sans-serif;">
              <h3>❌ เกิดข้อผิดพลาดในการโหลดระบบ</h3>
              <p>ไม่สามารถโหลดไฟล์ src/2569-03-08_koht-sa-naa.js</p>
              <pre style="white-space:pre-wrap;text-align:left;background:#fee2e2;padding:12px;border-radius:8px;display:inline-block;max-width:90%;">${String(error)}</pre>
            </div>
          `;
        }
      };

      loadApp();
    </script>
  </body>
</html>

            { em: "🎬", t: "หนัง", i: "năng", e: "movie" },
            { em: "🔗🧷", t: "ติด", i: "tìt", e: "addicted to; stuck" },

            { r: "แม่ค้า", t: "ลดไม่ได้แล้วจ้า ฉันขายขาดทุนแล้ว", i: "lót mâi dâi lɛ́ɛo jâa, chǎn kǎai kàat tun lɛ́ɛo", e: "Can't discount anymore. I'm selling at a loss.", em: "📉" },
            { r: "ลูกค้า", t: "โอเคครับ จ่ายด้วยบัตรได้ไหมครับ", i: "oo-kee kráp, jàai dûai bàt dâi mǎi kráp", e: "Okay. Can I pay with a card?", em: "💳" },
            { r: "แม่ค้า", t: "รับแต่เงินสดจ้า", i: "ráp dtɛ̀ɛ ngən sòt jâa", e: "Cash only.", em: "💵" },
            { r: "ลูกค้า", t: "นี่ครับ ไม่ต้องทอนนะครับ", i: "nîi kráp, mâi dtɔ̂ng tɔɔn ná kráp", e: "Here you go. Keep the change.", em: "🪙" }
        ];

        // Scenario 2: Restaurant
        const restaurantDialogue = [
            { r: "พนักงาน", t: "อาหารรสชาติเป็นยังไงบ้างคะ", i: "aa-hǎan rót châat bpen yang ngai bâang ká", e: "How is the taste of the food?", em: "👩‍🍳" },
            { r: "ลูกค้า", t: "อร่อยกว่าที่คิดครับ แต่แหนมเปรี้ยวเกินไป", i: "à-rɔ̀ɔi gwàa tîi kít kráp, dtɛ̀ɛ nɛ̌ɛm bprîao gəən bpai", e: "More delicious than I thought, but the fermented pork is too sour.", em: "😋" },
            { r: "พนักงาน", t: "ขอโทษค่ะ รับอย่างอื่นเพิ่มไหมคะ", i: "kɔ̌ɔ tôot kâ, ráp yàang ʉ̀ʉn pə̂əm mǎi ká", e: "Sorry about that. Would you like to order anything else?", em: "🙏" },
            { r: "ลูกค้า", t: "ขอหมูสามชั้นครับ อาหารเฮลตี้หายากนะครับ", i: "kɔ̌ɔ mǔu sǎam chán kráp, aa-hǎan heen-dtîi hǎa yâak ná kráp", e: "I'll have pork belly. Healthy food is hard to find, huh?", em: "🥓" }

        // Scenario 3: Hotel Problem
        const hotelDialogue = [
            { r: "ลูกค้า", t: "เกิดอะไรขึ้นครับ มีน้ำรั่วในห้อง", i: "gə̀ət à-rai kʉ̂n kráp, mii nám rûua nai hɔ̂ng", e: "What happened? There's a water leak in the room.", em: "💧" },
            { r: "พนักงาน", t: "ใจเย็นๆนะคะ มีปัญหาตรงตู้เย็นหรือเปล่าคะ", i: "jai yen yen ná ká, mii bpan-hǎa dtrong dtûu yen rʉ̌ʉ bplào ká", e: "Calm down. Is there a problem at the fridge?", em: "🧊" },
            { r: "ลูกค้า", t: "ไม่รู้ทำยังไงครับ ช่วยแก้ไขให้หน่อย", i: "mâi rúu tam yang ngai kráp, chûai gɛ̂ɛ kǎi hâi nɔ̀ɔi", e: "I don't know what to do. Please help fix it.", em: "🛠️" },
            { r: "พนักงาน", t: "ได้ค่ะ เดี๋ยวให้คนไปทำความสะอาดและแก้ไขให้ค่ะ", i: "dâi kâ, dǐao hâi kon bpai tam kwaam sà-àat lɛ́ gɛ̂ɛ kǎi hâi kâ", e: "Okay, I will have someone go clean and fix it for you.", em: "🧽" }
        ];

        // --- COMPONENTS ---

        // Interactive Text Component (Core of the lesson)
        const InteractiveText = ({ text, ipa, en, emoji, speaker, isHeader, isInstruction, className }) => {
            const [showIPA, setShowIPA] = useState(false);
            const [showEN, setShowEN] = useState(false);

            const speak = () => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH';
                utterance.rate = 0.85; 
                window.speechSynthesis.speak(utterance);
            };

            const containerClass = isHeader 
                ? "bg-transparent mb-4 w-full" 
                : isInstruction 
                    ? "bg-amber-50 p-4 rounded-xl mb-4 w-full border border-amber-200 shadow-sm"
                    : "bg-white p-5 rounded-2xl shadow-sm mb-4 border-l-4 border-teal-500 w-full hover:shadow-md transition-shadow";

            const textClass = isHeader
                ? "text-2xl md:text-3xl text-slate-800 font-bold thai-text"
                : isInstruction
                    ? "text-lg md:text-xl text-slate-700 thai-text font-medium"
                    : "text-xl md:text-2xl text-slate-800 font-medium thai-text";

            return (
                <div className={`${containerClass} ${className || ''}`}>
                    {speaker && <div className="text-sm text-teal-600 mb-2 font-bold tracking-wide">{speaker}</div>}
                    <div className="flex items-start justify-between gap-4">
                        <div className="flex-1 cursor-pointer group" onClick={speak}>
                            <p className={textClass}>
                                {text} {emoji} <span className="text-slate-300 group-hover:text-teal-500 text-xl inline-block align-middle transition-colors ml-1">🔊</span>

                            <button 
                                onClick={(e) => { e.stopPropagation(); setShowIPA(!showIPA); }}
                                className={`px-3 py-1.5 text-xs rounded-lg font-bold btn-toggle border ${showIPA ? 'bg-indigo-100 text-indigo-700 border-indigo-200' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}
                            >
                                IPA
                            </button>
                            <button 
                                onClick={(e) => { e.stopPropagation(); setShowEN(!showEN); }}
                                className={`px-3 py-1.5 text-xs rounded-lg font-bold btn-toggle border ${showEN ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}
                            >
                                EN
                            </button>
                        </div>
                    </div>
                    
                    {(showIPA || showEN) && (
                        <div className="mt-4 space-y-2 p-3 bg-slate-50 rounded-xl animate-fade-in border border-slate-100">
                            {showIPA && <p className="text-indigo-600 font-mono text-base md:text-lg border-b border-slate-200 pb-2">{ipa}</p>}
                            {showEN && <p className="text-slate-600 text-base md:text-lg">{en}</p>}
                        </div>
                    )}
                </div>
            );
        };

        // Section 1: Review Game Component
        const ReviewGame = () => {
            const [currentCard, setCurrentCard] = useState(null);
            
            const pickCard = () => {
                const random = reviewVocabList[Math.floor(Math.random() * reviewVocabList.length)];
                setCurrentCard(random);
            };

            useEffect(() => { pickCard(); }, []);

            if (!currentCard) return <div>Loading...</div>;

            return (
                <div className="flex flex-col items-center bg-gradient-to-br from-teal-50 to-emerald-50 p-6 rounded-[2rem] shadow-inner border border-teal-100">
                    <InteractiveText 
                        text="ทบทวนคำศัพท์" 
                        ipa="tóp-tuan kam-sàp" 
                        en="Review Vocabulary" 
                        emoji="🎯"
                        isHeader={true}
                    />
                    
                    <div className="w-full max-w-sm bg-white rounded-[2rem] shadow-xl p-8 min-h-[300px] flex flex-col items-center justify-center relative mb-8 text-center border-4 border-white">
                        <div className="text-7xl mb-6 drop-shadow-md">{currentCard.em}</div>
                        <InteractiveText 
                            text={currentCard.t} 
                            ipa={currentCard.i} 
                            en={currentCard.e} 
                        />
                    </div>

                    <div className="flex flex-col gap-4 w-full max-w-sm">
                        <InteractiveText 
                            text="แต่งประโยคจากคำนี้" 
                            ipa="dtɛ̀ng bprà-yòok jàak kam níi" 
                            en="Make a sentence from this word"
                            isInstruction={true}
                            className="text-center"
                        />
                        <button 
                            onClick={pickCard}

        // Main App Component
        const App = () => {
            const [section, setSection] = useState('review');

            return (

                                {[
                                    {id: 'review', icon: '🎯', label: 'ทบทวน'},
                                    {id: 'shopping', icon: '🛍️', label: 'ซื้อของ'},
                                    {id: 'restaurant', icon: '🍽️', label: 'ร้านอาหาร'},
                                    {id: 'hotel', icon: '🏨', label: 'โรงแรม'},
                                    {id: 'activity', icon: '🗣️', label: 'กิจกรรม'}

                                <InteractiveText 
                                    text="ฝึกถาม-ตอบ เรื่องรสชาติอาหาร"

                                <div className="bg-white rounded-3xl p-6 shadow-md border border-slate-100 space-y-3">

                                        <InteractiveText key={index} speaker={line.r} text={line.t} ipa={line.i} en={line.e} emoji={line.em} />
                                    ))}

                            </section>
                        )}

                        {/* 4. SCENARIO 3: HOTEL PROBLEM */}
                        {section === 'hotel' && (

                                <InteractiveText 
                                    text="ฝึกอธิบายปัญหาและขอความช่วยเหลือ" 
                                    ipa="fʉ̀k à-tí-baai bpan-hǎa lɛ́ kɔ̌ɔ kwaam chûai-lʉ̌a" 
                                    en="Practice explaining problems and asking for help"
                                    isInstruction={true}

                                <div className="bg-white rounded-3xl p-6 shadow-md border border-slate-100 space-y-3">
                                    {hotelDialogue.map((line, index) => (
                                        <InteractiveText key={index} speaker={line.r} text={line.t} ipa={line.i} en={line.e} emoji={line.em} />
                                    ))}
                                </div>
                            </section>
                        )}

                        {/* 5. ACTIVITIES SECTION */}
                        {section === 'activity' && (
                            <section className="animate-fade-in space-y-8">
                                <InteractiveText text="กิจกรรมสนทนา" ipa="gìt-jà-gam sǒn-tá-naa" en="Speaking Activities" isHeader={true} emoji="🗣️" />

                                {/* Debate: Cash vs Card */}
                                <div className="bg-white p-6 rounded-3xl shadow-md border border-indigo-100">
                                    <InteractiveText text="ชวนคุย: จ่ายยังไงดี?" ipa="chuan kui: jàai yang ngai dii?" en="Discussion: How to pay?" isHeader={true} emoji="💳" />
                                    <InteractiveText text="ที่ประเทศไทย คุณชอบจ่ายด้วย เงินสด หรือ บัตร เพราะอะไร?" ipa="tîi bprà-têet tai, kun chɔ̂ɔp jàai dûai ngən sòt rʉ̌ʉ bàt? pərɔ́ à-rai?" en="In Thailand, do you prefer to pay with cash or card? Why?" isInstruction={true} />
                                    
                                    <div className="flex gap-4 mt-4">
                                        <div className="flex-1 bg-indigo-50 p-4 rounded-xl border border-indigo-100 text-center">
                                            <div className="text-4xl mb-2">💵</div>
                                            <InteractiveText text="เงินสด" ipa="ngən sòt" en="Cash" className="!p-0 !mb-0 !border-0 bg-transparent shadow-none" />
                                        </div>
                                        <div className="flex-1 bg-indigo-50 p-4 rounded-xl border border-indigo-100 text-center">
                                            <div className="text-4xl mb-2">💳</div>
                                            <InteractiveText text="บัตร" ipa="bàt" en="Card" className="!p-0 !mb-0 !border-0 bg-transparent shadow-none" />
                                        </div>
                                    </div>
                                </div>

                                {/* Problem Solving: What would you do? */}
                                <div className="bg-white p-6 rounded-3xl shadow-md border border-rose-100">
                                    <InteractiveText text="แก้ปัญหา: จะทำยังไง?" ipa="gɛ̂ɛ bpan-hǎa: jà tam yang ngai?" en="Problem Solving: What will you do?" isHeader={true} emoji="⚠️" />
                                    
                                    <div className="space-y-4">
                                        <div className="bg-rose-50 p-5 rounded-2xl border border-rose-100">
                                            <InteractiveText text="1. แม่ค้าขายของแพงมาก คุณจะพูดว่าอะไร?" ipa="mɛ̂ɛ káa kǎai kɔ̌ɔng pɛɛng mâak, kun jà pûut wâa à-rai?" en="1. The seller is selling things very expensively. What will you say?" emoji="💸" />
                                        </div>
                                        <div className="bg-rose-50 p-5 rounded-2xl border border-rose-100">
                                            <InteractiveText text="2. คุณทำพาสปอร์ตหายที่ห้าง เกิดอะไรขึ้น ต่อไป?" ipa="kun tam pâat-spɔ̀ɔt hǎai tîi hâang, gə̀ət à-rai kʉ̂n dtɔ̀ɔ bpai?" en="2. You lost your passport at the mall. What happens next?" emoji="🛂" />
                                        </div>
                                        <div className="bg-rose-50 p-5 rounded-2xl border border-rose-100">
                                            <InteractiveText text="3. อาหาร เปรี้ยวเกินไป และ ขม คุณจะบอกพนักงานว่าอะไร?" ipa="aa-hǎan bprîao gəən bpai lɛ́ kǒm, kun jà bɔ̀ɔk pá-nák-ngaan wâa à-rai?" en="3. The food is too sour and bitter. What will you tell the staff?" emoji="😖" />
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}

                    </main>

                    {/* Floating Help Note */}
                    <div className="fixed bottom-6 right-6 bg-slate-800/90 text-white backdrop-blur shadow-2xl p-4 px-6 rounded-full z-50 text-base flex items-center gap-3 font-['Sarabun'] animate-bounce">
                        <span>กดข้อความเพื่อฟังเสียง</span>
                        <span className="text-2xl">🔊</span>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

                                    <div className="relative z-10">
                                        <InteractiveText text="ดีเบต: วิธีลืมแฟนเก่า" ipa="dii-bèet: wí-tii lʉʉm fɛɛn gào" en="Debate: How to forget an ex" isHeader={true} emoji="⚖️" />
                                        <InteractiveText text="เลือก 1 ข้อ และให้เหตุผล" ipa="lʉ̂ak nʉ̀ng kɔ̂ɔ lɛ́ hâi hèt-pǒn" en="Choose 1 option and give reasons" isInstruction={true} />
                                        
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
                                            <div className="border border-rose-200 rounded-xl p-4 bg-rose-50/50">
                                                <InteractiveText text="ทีม A: บล็อกไปเลย! (Out of sight)" ipa="tiim A: blɔ́k bpai ləəi!" en="Team A: Block them completely!" emoji="🚫" />
                                            </div>
                                            <div className="border border-teal-200 rounded-xl p-4 bg-teal-50/50">
                                                <InteractiveText text="ทีม B: เป็นเพื่อนกันได้" ipa="tiim B: bpen pʉ̂an gan dâi" en="Team B: We can be friends." emoji="🤝" />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Interview: The Psychologist */}
                                <div className="bg-white p-6 rounded-3xl shadow-md border border-amber-100 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-24 h-24 bg-amber-50 rounded-bl-full opacity-50 z-0"></div>
                                    <div className="relative z-10">
                                        <InteractiveText text="สัมภาษณ์: ผู้เชี่ยวชาญด้านความรัก" ipa="sǎm-pâat: pûu-chîao-chaan dâan kwaam-rák" en="Interview: Love Expert" isHeader={true} emoji="🎤" />
                                        <InteractiveText text="ให้นักเรียนเป็นผู้เชี่ยวชาญ ครูจะเป็นนักข่าว" ipa="hâi nák-rian bpen pûu-chîao-chaan, kruu jà bpen nák-kàao" en="Student is the expert, teacher is the reporter." isInstruction={true} />
                                        
                                        <div className="mt-4 space-y-3">
                                            <InteractiveText text="นักข่าว: อาการ ติด ความรัก เป็นยังไงครับ?" ipa="nák-kàao: aa-gaan dtìt kwaam-rák bpen yang-ngai kráp?" en="Reporter: What are the symptoms of love addiction?" emoji="❓" />
                                            <InteractiveText text="ผู้เชี่ยวชาญ: ... (นักเรียนตอบ)" ipa="pûu-chîao-chaan: ... (nák-rian dtɔ̀ɔp)" en="Expert: ... (Student answers)" emoji="💬" />
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}

                        {/* 4. EXTENSION SECTION */}
                        {section === 'extension' && (
                            <section className="animate-fade-in space-y-8">
                                <InteractiveText text="กิจกรรมเสริม" ipa="gìt-jà-gam sěrm" en="Extension Activities" isHeader={true} emoji="🚀" />

                                {/* Story Telling */}
                                <div className="bg-white p-6 rounded-3xl shadow-md border border-sky-100 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-24 h-24 bg-sky-50 rounded-bl-full opacity-50 z-0"></div>
                                    <div className="relative z-10">
                                        <InteractiveText text="แต่งเรื่องจากประสบการณ์: เดตที่แย่ที่สุด" ipa="dtɛ̀ng rʉ̂ang jàak bprà-sòp-gaan: dèet tîi yɛ̂ɛ tîi-sùt" en="Storytelling: The worst date" isHeader={true} emoji="📖" />
                                        <InteractiveText text="เล่าเรื่องตลกๆ โดยใช้คำศัพท์เหล่านี้" ipa="lâo rʉ̂ang dtà-lòk dtà-lòk dooi chái kam-sàp lào níi" en="Tell a funny story using these words" isInstruction={true} />
                                        
                                        <div className="flex flex-wrap gap-2 mt-4">
                                            {['กลางคืน', 'คลื่นไส้', 'ไม่รับสาย', 'ตลก', 'แฟนเก่า'].map(word => (
                                                <div key={word} className="bg-sky-50 px-4 py-2 rounded-full border border-sky-200 shadow-sm">
                                                    <InteractiveText text={word} ipa="" en="" className="!p-0 !mb-0 !border-0 bg-transparent shadow-none hover:shadow-none" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* Presentation */}
                                <div className="bg-white p-6 rounded-3xl shadow-md border border-orange-100 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-24 h-24 bg-orange-50 rounded-bl-full opacity-50 z-0"></div>
                                    <div className="relative z-10">
                                        <InteractiveText text="พรีเซนต์: วิธีแก้เมาค้าง หรือ แก้เศร้า" ipa="present: wí-tii gɛ̂ɛ mao kâang rʉ̌ʉ gɛ̂ɛ sâo" en="Presentation: How to cure a hangover or sadness" isHeader={true} emoji="📊" />
                                        <InteractiveText text="นักเรียนแนะนำ 3 วิธี ช่วยเพื่อนที่กำลัง คลื่นไส้ หรือ อกหัก" ipa="nák-rian nɛ́-nam sǎam wí-tii chûai pʉ̂an tîi gam-lang klʉ̂ʉn-sâi rʉ̌ʉ òk-hàk" en="Student recommends 3 ways to help a friend who is nauseous or heartbroken." isInstruction={true} />
                                        
                                        <div className="mt-4 space-y-3">
                                            <InteractiveText text="วิธีที่ 1: ดื่มน้ำเยอะๆ" ipa="wí-tii tîi nʉ̀ng: dʉ̀ʉm náam yə́ yə́" en="Way 1: Drink lots of water" emoji="💧" />
                                            <InteractiveText text="วิธีที่ 2: ..." ipa="wí-tii tîi sɔ̌ɔng: ..." en="Way 2: ..." emoji="2️⃣" />
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}

                    </main>

                    {/* Floating Help Note */}
                    <div className="fixed bottom-6 right-6 bg-slate-800/90 text-white backdrop-blur shadow-2xl p-3 px-5 rounded-full z-50 text-sm flex items-center gap-2 font-['Sarabun'] animate-bounce">
                        <span>แตะข้อความเพื่อฟังเสียง</span>
                        <span className="text-xl">🔊</span>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

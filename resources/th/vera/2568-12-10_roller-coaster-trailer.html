            { r: "ลอฟต์", t: "พอขึ้นไปถึงจุดสูงสุดนะ", i: "pɔɔ kʉ̂n bpai tʉ̌ng jùt sǔng sùt ná", e: "When it reaches the highest point,", em: "🔝" },
            { r: "ลอฟต์", t: "เหมือนโลกมันหยุดนิ่ง", i: "mʉ̌an lôok man yùt nîng", e: "It's like the world stands still.", em: "🌍" },
            { r: "ลอฟต์", t: "จะถอยก็คงไม่ได้แล้วแหละ", i: "jà tɔ̌ɔi gɔ̂ kong mâi dâi lɛ́ɛo lɛ̀", e: "Turning back probably isn't an option anymore.", em: "🚫" },
            { r: "เพียว", t: "ยิ้มไรวะ", i: "yím rai wá", e: "What are you smiling at?", em: "😒" },
        ];

        // --- COMPONENTS ---

        const InteractiveText = ({ text, ipa, en, emoji, speaker, isHeader, isInstruction }) => {
            const [showIPA, setShowIPA] = useState(false);
            const [showEN, setShowEN] = useState(false);

            const speak = () => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            };

            // Different styles based on context
            const containerClass = isHeader 
                ? "bg-transparent mb-4 w-full" 
                : isInstruction 
                    ? "bg-yellow-50 p-2 rounded-lg mb-2 w-full border border-yellow-100"
                    : "bg-white p-4 rounded-xl shadow-md mb-4 border-l-4 border-blue-400 w-full hover:shadow-lg transition-shadow";

            const textClass = isHeader
                ? "text-2xl md:text-3xl text-gray-800 font-bold thai-text"
                : isInstruction
                    ? "text-lg text-gray-700 thai-text"
                    : "text-xl md:text-2xl text-blue-900 font-medium thai-text";

            return (
                <div className={containerClass}>
                    {speaker && <div className="text-sm text-gray-500 mb-1 font-bold">{speaker}</div>}
                    <div className="flex items-start justify-between gap-2">
                        <div className="flex-1 cursor-pointer" onClick={speak}>
                            <p className={textClass}>
                                {text} {emoji} <span className="text-gray-400 text-base inline-block align-middle">🔊</span>
                            </p>
                        </div>
                        <div className="flex gap-1 flex-col sm:flex-row shrink-0">
                            <button 
                                onClick={(e) => { e.stopPropagation(); setShowIPA(!showIPA); }}
                                className={`px-2 py-1 text-xs rounded font-bold transition-colors ${showIPA ? 'bg-yellow-200 text-yellow-800' : 'bg-gray-200 text-gray-500'}`}
                            >
                                IPA
                            </button>
                            <button 
                                onClick={(e) => { e.stopPropagation(); setShowEN(!showEN); }}
                                className={`px-2 py-1 text-xs rounded font-bold transition-colors ${showEN ? 'bg-green-200 text-green-800' : 'bg-gray-200 text-gray-500'}`}
                            >
                                EN
                            </button>
                        </div>
                    </div>
                    
                    {(showIPA || showEN) && (
                        <div className="mt-2 space-y-1 animate-fade-in">
                            {showIPA && <p className="text-blue-600 font-mono text-sm sm:text-base">{ipa}</p>}
                            {showEN && <p className="text-gray-600 italic text-sm sm:text-base">{en}</p>}
                        </div>
                    )}
                </div>
            );
        };

        const VocabCard = ({ item }) => {
            return (
                <div className="bg-orange-50 p-4 rounded-lg border border-orange-200 flex flex-col items-center text-center h-full shadow-sm">
                    <div className="text-4xl mb-2">{item.em}</div>
                    <InteractiveText 
                        text={item.t} 
                        ipa={item.i} 
                        en={item.e} 
                        emoji=""
                    />
                </div>
            );
        };

        const ReviewGame = () => {
            const [currentCard, setCurrentCard] = useState(null);
            const [isFlipped, setIsFlipped] = useState(false);

            const pickCard = () => {
                setIsFlipped(false);
                const random = reviewVocabList[Math.floor(Math.random() * reviewVocabList.length)];
                setCurrentCard(random);
            };

            const speak = (txt) => {
                const u = new SpeechSynthesisUtterance(txt);
                u.lang = 'th-TH';
                window.speechSynthesis.speak(u);
            };

            useEffect(() => { pickCard(); }, []);

            if (!currentCard) return <div>Loading...</div>;

            return (
                <div className="flex flex-col items-center bg-indigo-50 p-6 rounded-2xl shadow-inner border border-indigo-100">
                    <InteractiveText 
                        text="ทบทวนคำศัพท์" 
                        ipa="tóp-tuan kam-sàp" 
                        en="Review Vocabulary" 
                        emoji="🃏"
                        isHeader={true}
                    />
                    
                    <div className="w-full max-w-sm bg-white rounded-xl shadow-xl p-8 min-h-[250px] flex flex-col items-center justify-center relative mb-6 text-center card-anim">
                        <div className="text-6xl mb-4">{currentCard.em}</div>
                        <h3 
                            className="text-3xl font-bold text-gray-800 mb-2 cursor-pointer thai-text"
                            onClick={() => speak(currentCard.t)}
                        >
                            {currentCard.t} 🔊
                        </h3>
                        
                        {isFlipped ? (
                            <div className="mt-4 animate-fade-in">
                                <p className="text-blue-600 font-mono text-lg mb-1">{currentCard.i}</p>
                                <p className="text-gray-500 text-lg">{currentCard.e}</p>
                            </div>
                        ) : (
                            <div className="mt-4">
                                <InteractiveText 
                                    text="แต่งประโยค หรือ ตอบคำถาม" 
                                    ipa="dtɛ̀ng bprà-yòok rʉ̌ʉ dtɔ̀ɔp kam-tǎam" 
                                    en="Make a sentence or answer a question" 
                                    isInstruction={true}
                                />
                            </div>
                        )}
                    </div>

                    <div className="flex gap-4 flex-wrap justify-center">
                        <button 
                            onClick={() => setIsFlipped(!isFlipped)}
                            className="bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-2 px-6 rounded-full shadow-md transition-transform active:scale-95 flex items-center gap-2"
                        >
                             <span>เฉลย (Reveal)</span>
                        </button>
                        <button 
                            onClick={pickCard}
                            className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-full shadow-md transition-transform active:scale-95 flex items-center gap-2"
                        >
                            <span>คำต่อไป (Next) ➡️</span>
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [section, setSection] = useState('review');

            return (
                <div className="min-h-screen pb-12">
                    {/* Header */}
                    <header className="bg-gradient-to-r from-blue-500 to-indigo-600 text-white p-4 shadow-lg sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-bold flex items-center gap-2">
                                🎢 Roller Coaster
                            </h1>
                            <nav className="flex gap-2 text-sm overflow-x-auto">
                                <button onClick={() => setSection('review')} className={`px-3 py-1 rounded-full whitespace-nowrap ${section === 'review' ? 'bg-white text-blue-600' : 'bg-blue-700/50'}`}>ทบทวน</button>
                                <button onClick={() => setSection('vocab')} className={`px-3 py-1 rounded-full whitespace-nowrap ${section === 'vocab' ? 'bg-white text-blue-600' : 'bg-blue-700/50'}`}>ศัพท์ใหม่</button>
                                <button onClick={() => setSection('story')} className={`px-3 py-1 rounded-full whitespace-nowrap ${section === 'story' ? 'bg-white text-blue-600' : 'bg-blue-700/50'}`}>เรื่องราว</button>
                                <button onClick={() => setSection('activity')} className={`px-3 py-1 rounded-full whitespace-nowrap ${section === 'activity' ? 'bg-white text-blue-600' : 'bg-blue-700/50'}`}>กิจกรรม</button>
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto p-4 space-y-8 mt-4">
                        
                        {/* SECTION 1: REVIEW */}
                        {section === 'review' && (
                            <section className="animate-fade-in">
                                <ReviewGame />
                                <div className="mt-4 p-4 bg-yellow-50 rounded-lg border border-yellow-200">
                                    <InteractiveText 
                                        text="สำหรับครู: ใช้การ์ดสุ่มเพื่อถามคำถามนักเรียน"
                                        ipa="sǎm-ràp kruu: chái gàat sùm pʉ̂a tǎam kam-tǎam nák-rian"
                                        en="For Teacher: Use the random card to ask the student questions."
                                        isInstruction={true}
                                        emoji="💡"
                                    />
                                </div>
                            </section>
                        )}

                        {/* SECTION 2: NEW VOCAB */}
                        {section === 'vocab' && (
                            <section className="animate-fade-in">
                                <div className="mb-6 border-b-2 border-orange-200 pb-2">
                                    <InteractiveText 
                                        text="คำศัพท์ใหม่" 
                                        ipa="kam-sàp mài" 
                                        en="New Vocabulary"
                                        isHeader={true}
                                        emoji="🔑"
                                    />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {targetVocab.map((v, i) => (
                                        <VocabCard key={i} item={v} />
                                    ))}
                                </div>
                            </section>
                        )}

                        {/* SECTION 3: STORY SCRIPT */}
                        {section === 'story' && (
                            <section className="animate-fade-in">
                                <div className="mb-6 border-b-2 border-blue-200 pb-2">
                                    <InteractiveText 
                                        text="บทสนทนา" 
                                        ipa="bòt sǒn-tá-naa" 
                                        en="Dialogue"
                                        isHeader={true}
                                        emoji="🎬"
                                    />
                                </div>

                                {/* New Content: Video Link & Instruction */}
                                <div className="mb-6 p-4 bg-blue-50 rounded-xl border border-blue-100 text-center">
                                    <InteractiveText 
                                        text="ดูวิดีโอก่อนอ่านบทสนทนา" 
                                        ipa="duu wí-dii-oo gɔ̀ɔn àan bòt sǒn-tá-naa" 
                                        en="Watch the video before reading the dialogue"
                                        isInstruction={true}
                                        emoji="👀"
                                    />
                                    <a 
                                        href="https://www.tiktok.com/@motionmindsenterta/video/7524349813157039367" 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="inline-block mt-2 bg-black text-white px-6 py-3 rounded-full font-bold hover:bg-gray-800 transition-colors shadow-lg flex items-center justify-center gap-2 mx-auto w-fit"
                                    >
                                        <span>🎵 Open TikTok Video</span>
                                    </a>
                                </div>

                                <div className="space-y-2">
                                    {scriptData.map((line, index) => (
                                        <InteractiveText 
                                            key={index}
                                            speaker={line.r}
                                            text={line.t}
                                            ipa={line.i}
                                            en={line.e}
                                            emoji={line.em}
                                        />
                                    ))}
                                </div>
                            </section>
                        )}

                        {/* SECTION 4: ACTIVITIES */}
                        {section === 'activity' && (
                            <section className="animate-fade-in space-y-6">
                                <div className="mb-6 border-b-2 border-green-200 pb-2">
                                    <InteractiveText 
                                        text="กิจกรรมพูดคุย" 
                                        ipa="gìt-jà-gam pûut-kui" 
                                        en="Speaking Activity"
                                        isHeader={true}
                                        emoji="🗣️"
                                    />
                                </div>

                                {/* Role Play */}
                                <div className="bg-white p-6 rounded-xl shadow-md border border-gray-100">
                                    <InteractiveText 
                                        text="บทบาทสมมติ (Role Play)" 
                                        ipa="bòt-bàat sǒm-mút" 
                                        en="Role Play"
                                        isHeader={true}
                                        emoji="🎭"
                                    />
                                    <InteractiveText 
                                        text="ให้นักเรียนเลือกเป็น เพียว หรือ ลอฟต์" 
                                        ipa="hâi nák-rian lʉ̂ak bpen Pure rʉ̌ʉ Loft" 
                                        en="Let student choose to be Pure or Loft"
                                        isInstruction={true}
                                    />
                                    <InteractiveText 
                                        text="อ่านบทสนทนาด้วยอารมณ์" 
                                        ipa="àan bòt sǒn-tá-naa dûai aa-rom" 
                                        en="Read dialogue with emotion"
                                        isInstruction={true}
                                        emoji="😤"
                                    />

                                    <div className="flex gap-4 mt-4">
                                        <div className="bg-pink-100 p-3 rounded-lg text-center flex-1">
                                            <div className="text-2xl mb-1">😟</div>
                                            <div className="font-bold text-pink-700">เพียว (Sad)</div>
                                        </div>
                                        <div className="bg-blue-100 p-3 rounded-lg text-center flex-1">
                                            <div className="text-2xl mb-1">🎢</div>
                                            <div className="font-bold text-blue-700">ลอฟต์ (Deep)</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Discussion */}
                                <div className="bg-white p-6 rounded-xl shadow-md border border-gray-100">
                                    <InteractiveText 
                                        text="ชวนคุย" 
                                        ipa="chuan kui" 
                                        en="Discussion"
                                        isHeader={true}
                                        emoji="💬"
                                    />
                                    <div className="space-y-4">
                                        <InteractiveText 
                                            text="คุณคิดว่า ความรัก เหมือน Roller Coaster ไหม?"
                                            ipa="kun kít wâa · kwaam rák · mʉ̌an Roller Coaster mǎi?"
                                            en="Do you think love is like a Roller Coaster?"
                                            emoji="🤔"
                                        />
                                        <InteractiveText 
                                            text="คุณเคยรู้สึกว่า โลกหยุดนิ่ง ไหม?"
                                            ipa="kun kəəi rúu sʉ̀k wâa · lôok yùt nîng · mǎi?"
                                            en="Have you ever felt like the world stood still?"
                                            emoji="🌍"
                                        />
                                    </div>
                                </div>

                                {/* Game */}
                                <div className="bg-gradient-to-br from-orange-100 to-red-100 p-6 rounded-xl shadow-md">
                                    <InteractiveText 
                                        text="เกม: จริง หรือ ไม่จริง?" 
                                        ipa="game: jing rʉ̌ʉ mâi jing?" 
                                        en="Game: True or False?"
                                        isHeader={true}
                                        emoji="🔥"
                                    />
                                    <InteractiveText 
                                        text="ตอบว่า จริง หรือ ไม่จริง" 
                                        ipa="dtɔ̀ɔp wâa jing rʉ̌ʉ mâi jing" 
                                        en="Answer True or False"
                                        isInstruction={true}
                                    />
                                    
                                    <div className="space-y-3 mt-4">
                                        <InteractiveText 
                                            text="1. Roller Coaster น่ากลัวกว่าผี"
                                            ipa="1. Roller Coaster nâa-glua gwàa pǐi"
                                            en="1. Roller Coaster is scarier than ghosts."
                                            emoji="👻"
                                        />
                                        <InteractiveText 
                                            text="2. ถ้าอกหัก ต้องดื่มแอลกอฮอล์"
                                            ipa="2. tâa òk-hàk · dtɔ̂ng dʉ̀ʉm alcohol"
                                            en="2. If heartbroken, must drink alcohol."
                                            emoji="🍺"
                                        />
                                        <InteractiveText 
                                            text="3. การ ถอย คือคนแพ้"
                                            ipa="3. gaan tɔ̌ɔi · kʉʉ kon pɛ́ɛ"
                                            en="3. Retreating means being a loser."
                                            emoji="👎"
                                        />
                                    </div>
                                </div>

                            </section>
                        )}

                    </main>

                    {/* Footer / Controls hint */}
                    <div className="fixed bottom-4 right-4 bg-white/95 backdrop-blur p-2 rounded-lg shadow-lg border border-gray-200 z-50 max-w-[200px]">
                         <InteractiveText 
                            text="แตะที่ประโยคเพื่อฟังเสียง" 
                            ipa="dtɛ̀ tîi bprà-yòok pʉ̂a fang sǐang" 
                            en="Tap sentence to listen"
                            isInstruction={true}
                        />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

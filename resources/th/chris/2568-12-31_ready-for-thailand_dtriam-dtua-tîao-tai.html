<body class="pb-24">

    <div class="max-w-3xl mx-auto px-4 pt-6 space-y-8">

        <!-- SECTION 1: WARM UP (Identity) -->

            <div id="header-warmup" class="mb-4"></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="section-warmup"></div>
        </section>

        <!-- SECTION 2: SURVIVAL PHRASES -->

            <div id="header-survival" class="mb-4"></div>
            <div class="bg-amber-50 rounded-2xl p-1 border border-amber-100">
                <div id="section-survival" class="divide-y divide-amber-100/50"></div>
            </div>
        </section>

        <!-- SECTION 3: SOCIAL SCENARIO -->
        <section>
            <div id="header-social" class="mb-4"></div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">

                    Dialogue: Making Friends
                </div>
                <div id="section-social" class="divide-y divide-slate-100"></div>
            </div>
        </section>

        <!-- SECTION 4: DINING SCENARIO -->

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">

                    Dialogue: The Restaurant

        </section>

            <div id="header-extension" class="mb-4"></div>
            <div class="bg-emerald-50 rounded-2xl p-1 border border-emerald-100">
                <div id="section-extension" class="divide-y divide-emerald-100/50"></div>
            </div>
        </section>

    </div>

        // --- RENDER FUNCTIONS ---

        function renderHeader(id, info) {

        // --- UTILITIES ---

        function toggle(id) {
            const el = document.getElementById(id);
            if(el) {
                el.classList.toggle('hidden');
                // Optional: Add animation class here if desired
            }
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.85; // Slightly clearer speed
            
            // Prefer a Thai voice if available
            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(v => v.lang.includes('th'));
            if (thaiVoice) utterance.voice = thaiVoice;
            
            window.speechSynthesis.speak(utterance);
        }

        function testAudio() {
            speakText("สวัสดีครับ ขอให้สนุกกับการเรียนครับ");
        }

        // --- INIT ---
        
        window.onload = function() {
            // Render Headers
            Object.keys(headers).forEach(key => renderHeader(`header-${key}`, headers[key]));

            // Render Sections
            renderWarmup();
            renderSurvival();
            renderDialogue('section-social', 'social');
            renderDialogue('section-dining', 'dining');
            renderExtension();

            // Pre-load voices (Chrome fix)
            window.speechSynthesis.getVoices();
        };

    </script>
</body>
</html>

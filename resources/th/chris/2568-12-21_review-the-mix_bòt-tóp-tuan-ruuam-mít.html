<body class="pb-24">

            </div>
        </section>

        <!-- SECTION 5: LETTER HUNT -->

            <div id="header-hunt" class="mb-4"></div>
            <div id="section-hunt" class="grid grid-cols-1 gap-4"></div>
        </section>

    </div>

        // --- RENDERERS ---

        function renderHeader(id, info) {
            const container = document.getElementById(id);
            if (!container) return;
            
            const textColor = info.textColor || 'text-gray-800';
            let html = `
                <div class="flex flex-col gap-2 border-b-2 border-gray-100 pb-3">
                    <div class="flex items-center gap-3">
                        <button onclick="speakText('${info.thai}')" class="flex-shrink-0 w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center hover:bg-indigo-200 transition">

                        </button>
                        <div class="flex-grow">
                            <div class="flex items-center gap-2 flex-wrap">
                                <h2 class="text-xl font-bold ${textColor} thai-font cursor-pointer hover:opacity-75 transition" onclick="speakText('${info.thai}')">

                                </div>
                            </div>

                            <div id="${id}-h-en" class="hidden mt-1 text-sm text-gray-500 pl-2 border-l-2 border-gray-200">${info.en}</div>
                        </div>
                    </div>`;

            if (info.subThai) {
                html += `
                    <div class="ml-11 mt-1">
                        <div class="flex items-center gap-2">
                            <span class="text-sm italic text-gray-500 thai-font cursor-pointer hover:text-gray-700" onclick="speakText('${info.subThai}')">${info.subThai}</span>

                    <div class="flex items-center gap-3 mb-2">

                        <div class="text-2xl thai-font text-gray-800 cursor-pointer" onclick="speakText('${item.thai}')">${item.emoji} ${item.thai}</div>

        // --- UTILS ---

        function toggle(id) {
            const el = document.getElementById(id);
            if(el) el.classList.toggle('hidden');
        }

        function toggleHunt(idPrefix) {
            const q = document.getElementById(`${idPrefix}-q`);
            const a = document.getElementById(`${idPrefix}-a`);
            if(q.classList.contains('hidden')) {
                q.classList.remove('hidden');
                a.classList.add('hidden');
            } else {
                q.classList.add('hidden');
                a.classList.remove('hidden');
            }
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.8; 
            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(v => v.lang.includes('th'));
            if (thaiVoice) utterance.voice = thaiVoice;
            window.speechSynthesis.speak(utterance);
        }

        function testAudio() {
            speakText("สวัสดีครับ");
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            Object.keys(headers).forEach(key => renderHeader(`header-${key}`, headers[key]));
            renderWarmup();
            renderFlashcards();
            renderMath();
            renderRoleplay();
            renderHunt();
        });

    </script>
</body>

                    </div>
                     <!-- Answer State (Hidden by default) -->
                    <div id="${cardId}-answer" class="hidden text-4xl thai-font text-gray-800 mb-4 transition-all duration-300">
                        ${item.highlighted}
                    </div>

                    <button onclick="toggleQuizAnswer('${cardId}')" class="w-full py-2 bg-amber-100 text-amber-800 rounded-lg font-semibold hover:bg-amber-200 transition thai-font">
                        เฉลย (Reveal)
                    </button>

                    <div class="mt-4 pt-3 border-t border-amber-100 flex justify-between text-xs text-gray-500">
                        <span>${item.ipa}</span>
                        <span>${item.en}</span>
                    </div>
                </div>
            </div>
            `;
        }

        function renderSection(dataArray, elementId) {
            const container = document.getElementById(elementId);
            container.innerHTML = dataArray.map((item, index) => createCard(item, index, elementId)).join('');
        }

        function renderMenuSection(dataArray, elementId) {
            const container = document.getElementById(elementId);
            container.innerHTML = dataArray.map((item, index) => createMenuRow(item, index, elementId)).join('');
        }

        function renderQuizSection(dataArray, elementId) {
            const container = document.getElementById(elementId);
            container.innerHTML = dataArray.map((item, index) => createQuizCard(item, index, elementId)).join('');
        }
        
        function renderHeader(headerId, key) {
             const container = document.getElementById(headerId);
             if(container && headers[key]) {
                 container.innerHTML = createInteractiveHeader(headerId, headers[key]);
             }
        }

        // INITIALIZE
        document.addEventListener('DOMContentLoaded', () => {
            
            // Render Headers
            renderHeader('header-warmer', 'warmer');
            renderHeader('header-newvocab', 'newvocab');
            renderHeader('header-menu', 'menu');
            renderHeader('header-drills', 'drills');
            renderHeader('header-roleplay', 'roleplay');
            renderHeader('header-quiz', 'quiz');

            // Render Content
            renderSection(data.warmer, 'section-warmer');
            renderSection(data.newvocab, 'section-newvocab');
            renderMenuSection(data.menu, 'section-menu');
            renderSection(data.drills, 'section-drills');
            renderSection(data.roleplay, 'section-roleplay');
            renderQuizSection(data.quiz, 'section-quiz');
        });

        // UTILITIES
        function toggleVisibility(id) {
            const el = document.getElementById(id);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        }

        function toggleQuizAnswer(idPrefix) {
            const q = document.getElementById(`${idPrefix}-question`);
            const a = document.getElementById(`${idPrefix}-answer`);
            
            if (q.classList.contains('hidden')) {
                q.classList.remove('hidden');
                a.classList.add('hidden');
            } else {
                q.classList.add('hidden');
                a.classList.remove('hidden');
            }
        }

        function speakText(text) {
            // Cancel any current speech
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.8; // Slightly slower for A1 student
            
            // iOS/Mobile often requires explicit voice selection if default isn't set correctly
            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(v => v.lang.includes('th'));
            if (thaiVoice) utterance.voice = thaiVoice;

            window.speechSynthesis.speak(utterance);
        }

        // Helper to unlock audio context on iOS
        function testAudio() {
            speakText("สวัสดีครับ");
        }

        // Voice loading is async in Chrome
        window.speechSynthesis.onvoiceschanged = () => {
            // Voices loaded
        };

    </script>
</body>
</html>

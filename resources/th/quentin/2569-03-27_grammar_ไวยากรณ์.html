        // Core Functions
        
        // 1. Text to Speech Function
        function playTTS(text) {
            // Stop current speech before starting new one
            window.speechSynthesis.cancel();
            
            // Strip emojis to prevent TTS from reading them out in Thai (e.g., "รูปหน้ายิ้ม")
            const cleanText = text.replace(/[^\u0E00-\u0E7F\w\s.,?!]/g, '').trim();
            
            if (!cleanText) return;

            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'th-TH';
            utterance.rate = 0.85; // Slightly slower for A2 learner
            window.speechSynthesis.speak(utterance);
        }

        // 2. Generate Interactive Block UI
        function createInteractiveBlock(emoji, thai, ipa, en, isCustomClasses = "") {
            const container = document.createElement('div');
            // Adding a soft border, padding, and subtle hover effect
            container.className = `flex flex-col gap-2 p-3 bg-white rounded-xl shadow-sm border border-gray-100 mb-2 transition-all hover:shadow-md ${isCustomClasses}`;

            const topRow = document.createElement('div');
            topRow.className = 'flex items-center gap-2 flex-wrap';

            const textSpan = document.createElement('span');
            textSpan.className = 'text-lg md:text-xl font-medium text-gray-800 flex-grow mr-2';
            textSpan.innerHTML = `<span class="mr-1">${emoji}</span> ${thai}`;

            // Buttons Container
            const btnGroup = document.createElement('div');
            btnGroup.className = 'flex items-center gap-2';

            const ttsBtn = document.createElement('button');
            ttsBtn.className = 'bg-blue-100 text-blue-600 p-2 rounded-full hover:bg-blue-200 transition focus:outline-none focus:ring-2 focus:ring-blue-300';
            ttsBtn.title = 'ฟังเสียง / Play Audio';
            ttsBtn.innerHTML = '🔊';
            ttsBtn.onclick = () => playTTS(thai);

            const ipaBtn = document.createElement('button');
            ipaBtn.className = 'bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-xs font-bold hover:bg-purple-200 transition focus:outline-none';
            ipaBtn.innerText = 'IPA';

            const enBtn = document.createElement('button');
            enBtn.className = 'bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold hover:bg-emerald-200 transition focus:outline-none';
            enBtn.innerText = 'EN';

            btnGroup.appendChild(ttsBtn);
            btnGroup.appendChild(ipaBtn);
            btnGroup.appendChild(enBtn);

            topRow.appendChild(textSpan);
            topRow.appendChild(btnGroup);

            // Hidden contents
            const ipaDiv = document.createElement('div');
            ipaDiv.className = 'hidden text-purple-600 font-mono text-sm pl-3 border-l-2 border-purple-200 mt-1 py-1';
            ipaDiv.innerText = ipa;

            const enDiv = document.createElement('div');
            enDiv.className = 'hidden text-emerald-600 text-sm pl-3 border-l-2 border-emerald-200 mt-1 py-1';
            enDiv.innerText = en;

            // Toggle logic
            ipaBtn.onclick = () => ipaDiv.classList.toggle('hidden');
            enBtn.onclick = () => enDiv.classList.toggle('hidden');

            container.appendChild(topRow);
            container.appendChild(ipaDiv);
            container.appendChild(enDiv);

            return container;
        }

        // 3. Initialize Static HTML Elements
        function initializeThaiContent() {
            const elements = document.querySelectorAll('.thai-content');
            elements.forEach(el => {
                const emoji = el.getAttribute('data-emoji') || '';
                const thai = el.getAttribute('data-thai') || '';
                const ipa = el.getAttribute('data-ipa') || '';
                const en = el.getAttribute('data-en') || '';
                
                // Keep original custom classes on the wrapper if any, pass them to inner block
                const extraClasses = el.className.replace('thai-content', '').trim();
                
                const block = createInteractiveBlock(emoji, thai, ipa, en);
                
                // Clear original element and append the interactive block
                el.innerHTML = '';
                el.className = extraClasses; // Keep wrapper transparent basically
                el.appendChild(block);
            });
        }

        // 4. Random Vocab Logic
        document.getElementById('randomVocabBtn').addEventListener('click', () => {
            const displayArea = document.getElementById('vocabDisplayArea');
            
            // Randomly select a word
            const randomIndex = Math.floor(Math.random() * vocabList.length);
            const word = vocabList[randomIndex];

            // Clear area
            displayArea.innerHTML = '';
            displayArea.className = 'min-h-[120px] bg-white rounded-2xl p-2 md:p-4 border-2 border-blue-300 shadow-inner flex items-center justify-center transition-all';

            // Create and append block
            const block = createInteractiveBlock(word.e, word.t, word.ipa, word.en, "w-full ring-2 ring-blue-100");
            displayArea.appendChild(block);
            
            // Auto play TTS for the new word
            setTimeout(() => playTTS(word.t), 300);
        });

        // Run on load
        window.addEventListener('DOMContentLoaded', () => {
            initializeThaiContent();
        });

    </script>

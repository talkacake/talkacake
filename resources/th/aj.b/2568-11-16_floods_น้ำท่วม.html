    .vocab-item { padding: 0.75rem 1rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; cursor: pointer; transition: background-color 0.2s, border-color 0.2s; display: flex; align-items: center; justify-content: center; }

    .vocab-item.wrong { background-color: #ef4444; color: white; border-color: #dc2626; }
    .tts-button, .toggle-btn { background: transparent; border: 1px solid #cbd5e1; cursor: pointer; padding: 0.25rem 0.5rem; border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center; transition: background-color .2s; margin-left: 0.5rem; font-size: 0.75rem; flex-shrink: 0; }

  <script>
    /***** Robust TTS & Toggle Functions *****/
    const synth = 'speechSynthesis' in window ? window.speechSynthesis : null;
    let voices = [];
    let thaiVoice = null;
    let voicesReadyResolve;
    const voicesReady = new Promise(res => voicesReadyResolve = res);

    function pickThaiVoice() { if (!voices.length) return; thaiVoice = voices.find(v => v.lang === 'th-TH') || voices.find(v => v.lang.startsWith('th')) || null; }
    function loadVoices() { if (!synth) return; const list = synth.getVoices(); if (list && list.length) { voices = list; pickThaiVoice(); if (voicesReadyResolve) { voicesReadyResolve(); voicesReadyResolve = null; } } }
    if (synth) { loadVoices(); if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices; }
    let ttsUnlocked = false;
    function unlockTTS() { if (!synth || ttsUnlocked) return; ttsUnlocked = true; const u = new SpeechSynthesisUtterance(''); u.volume = 0; synth.speak(u); }
    document.addEventListener('click', unlockTTS, { once: true });
    async function speak(text) { if (!synth) return; unlockTTS(); await voicesReady; const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'th-TH'; utterance.rate = 0.9; if (thaiVoice) utterance.voice = thaiVoice; synth.cancel(); synth.speak(utterance); }
    function toggleContent(btn, type) { const block = btn.closest('.interactive-text-block'); const content = block.querySelector(`.toggle-content.${type}`); if (content) { const isHidden = content.style.display === 'none' || content.style.display === ''; content.style.display = isHidden ? 'block' : 'none'; btn.classList.toggle('bg-blue-200', isHidden); } }

    function createInteractiveText() {
        const template = document.getElementById('interactiveTextTemplate');
        for (const id in textData) {
            const data = textData[id];
            const container = document.getElementById(id);
            if(container){
                const clone = template.content.cloneNode(true);
                const mainEl = clone.querySelector('.main-text');
                let newEl;
                if (data.type) {
                    newEl = document.createElement(data.type);
                    if (data.class) newEl.className = data.class;
                    if(data.type === 'a'){ newEl.href = data.href; newEl.target = '_blank'; }
                } else { newEl = document.createElement('p'); newEl.className = 'thai-font text-lg'; }
                newEl.innerHTML = data.thai;
                mainEl.replaceWith(newEl);
                clone.querySelector('.ipa').textContent = data.ipa;
                clone.querySelector('.en').textContent = data.en;
                
                // Hide buttons for empty Thai text
                if (data.thai.trim() === '') {
                    clone.querySelector('.tts-button').style.display = 'none';
                    clone.querySelector('.toggle-btn[onclick*="\'ipa\'"]').style.display = 'none';
                    // We keep EN button for instruction rows that are intentionally blank in Thai
                    if (data.en.trim() === '') {
                         clone.querySelector('.toggle-btn[onclick*="\'en\'"]').style.display = 'none';
                    }
                }

                if (data.class && data.class.includes('text-sm')) {
                    clone.querySelector('.tts-button').style.display = 'none';
                    clone.querySelector('.toggle-btn').style.display = 'none';
                }
                container.appendChild(clone);
            }
        }
    }
    
    document.addEventListener('DOMContentLoaded', createInteractiveText);
  </script>
  
  <script>
    // Game Logic
    const vocab = [
        { id: 1, thai: 'ฝนถล่ม', eng: 'Rain barrage / heavy downpour' },
        { id: 2, thai: 'น้ำท่วมขัง', eng: 'Standing floodwater' },
        { id: 3, thai: 'เร่งระบายน้ำ', eng: 'To accelerate drainage' },
        { id: 4, thai: 'ผู้ว่าราชการ', eng: 'Governor' },
        { id: 5, thai: 'ปริมาณฝน', eng: 'Rainfall amount' },
        { id: 6, thai: 'ย่านเศรษฐกิจ', eng: 'Economic area / district' },
        { id: 7, thai: 'สถานีสูบน้ำ', eng: 'Pumping station' },
        { id: 8, thai: 'จุดวิกฤต', eng: 'Critical point' },
        { id: 9, thai: 'ซ้ำซาก', eng: 'Recurring / repetitive' },
        { id: 10, thai: 'ประสิทธิภาพ', eng: 'Efficiency' },
        { id: 11, thai: 'แล้วเสร็จ', eng: 'To be completed / finished' },
        { id: 12, thai: 'ดำเนินการ', eng: 'To proceed / operate' }
    ];

    const thaiWordsContainer = document.getElementById('thai-words');
    const engMeaningsContainer = document.getElementById('eng-meanings');
    const feedbackEl = document.getElementById('feedback');
    const resetBtn = document.getElementById('reset-btn');

    let selectedThai = null;
    let selectedEng = null;
    let matchedPairs = 0;
    let isChecking = false; // Lock variable to prevent clicks during animation

    function shuffle(array) { 
        let currentIndex = array.length, randomIndex; 
        while (currentIndex !== 0) { 
            randomIndex = Math.floor(Math.random() * currentIndex); 
            currentIndex--; 
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]]; 
        } 
        return array; 
    }

    function initGame() {
        thaiWordsContainer.innerHTML = '';
        engMeaningsContainer.innerHTML = '';
        feedbackEl.textContent = '';
        resetBtn.style.display = 'none';
        selectedThai = null;
        selectedEng = null;
        matchedPairs = 0;
        isChecking = false;
        
        const shuffledThai = shuffle([...vocab]);
        const shuffledEng = shuffle([...vocab]);
        
        shuffledThai.forEach(item => { 
            const div = document.createElement('div'); 
            div.textContent = item.thai; 
            div.className = 'vocab-item thai-font'; 
            div.dataset.id = item.id; 
            div.addEventListener('click', onThaiWordClick); 
            thaiWordsContainer.appendChild(div); 
        });
        
        shuffledEng.forEach(item => { 
            const div = document.createElement('div'); 
            div.textContent = item.eng; 
            div.className = 'vocab-item'; 
            div.dataset.id = item.id; 
            div.addEventListener('click', onEngMeaningClick); 
            engMeaningsContainer.appendChild(div); 
        });
    }

    function onThaiWordClick(e) { 
        if (isChecking || e.target.classList.contains('matched')) return; 
        
        if (selectedThai) {
            selectedThai.classList.remove('selected');
        }
        
        selectedThai = e.target; 
        selectedThai.classList.add('selected'); 
        
        checkMatch();
    }
    
    function onEngMeaningClick(e) { 
        if (isChecking || e.target.classList.contains('matched')) return; 

        if (selectedEng) {
            selectedEng.classList.remove('selected');
        }

        selectedEng = e.target; 
        selectedEng.classList.add('selected'); 
        
        checkMatch();
    }

    function checkMatch() {
        if (!selectedThai || !selectedEng) return;

        isChecking = true; // Engage lock

        if (selectedThai.dataset.id === selectedEng.dataset.id) {
            // Correct Match
            selectedThai.classList.remove('selected'); 
            selectedEng.classList.remove('selected');
            selectedThai.classList.add('matched'); 
            selectedEng.classList.add('matched');
            
            selectedThai = null;
            selectedEng = null;
            
            matchedPairs++;
            if (matchedPairs === vocab.length) { 
                feedbackEl.textContent = 'เยี่ยมมากค่ะ! ถูกต้องทั้งหมด!'; 
                resetBtn.style.display = 'block'; 
            }
            isChecking = false; // Release lock
        } else {
            // Wrong Match
            selectedThai.classList.add('wrong'); 
            selectedEng.classList.add('wrong');
            
            const wrongThai = selectedThai;
            const wrongEng = selectedEng;

            selectedThai = null;
            selectedEng = null;

            setTimeout(() => {
                if (wrongThai) {
                    wrongThai.classList.remove('wrong'); 
                    wrongThai.classList.remove('selected'); 
                }
                if (wrongEng) {
                    wrongEng.classList.remove('wrong');
                    wrongEng.classList.remove('selected');
                }
                
                isChecking = false; // Release lock only after animation
            }, 800);
        }
    }
    
    resetBtn.addEventListener('click', initGame);
    initGame();
  </script>

</body>
</html>

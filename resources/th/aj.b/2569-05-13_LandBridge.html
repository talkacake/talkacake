                additionalVocab: { t: "คำศัพท์เพิ่มเติม 📚", i: "kham-sàp phə̂əm-dtəəm", e: "Additional Vocabulary" }

            leadin: [
                { t: "1. ในมุมมองของคุณ การสร้างโครงสร้างพื้นฐานขนาดใหญ่ (Mega Projects) ช่วยพัฒนาประเทศได้จริงไหม? 🏗️📈", i: "nai mum mɔɔng khɔ̌ɔng khun, gaan sâang khroong-sâang phʉ́ʉn-thǎan khà-nàat yài chûuay phat-thá-naa bprà-thêet dâi jing mǎi?", e: "1. In your view, do mega infrastructure projects actually help develop a country?" },
                { t: "2. คุณคิดว่าสิ่งแวดล้อมสำคัญกว่าการเติบโตทางเศรษฐกิจหรือไม่? ทำไม? 🌳🆚💰", i: "khun khít wâa sìng-wâet-lɔ́ɔm sǎm-khan gwàa gaan dtə̀əp-dtoo thaang sèet-thà-gìt rʉ̌ʉ mâi? tham-mai?", e: "2. Do you think the environment is more important than economic growth? Why?" },

            ],
            scriptLines: [
                { t: "ทำไมโครงการ Land Bridge ถึงถูกมองว่า ไม่คุ้มค่า 📉", i: "tham-mai kroong-gaan Land Bridge thʉ̌ng thùuk mɔɔng wâa mâi khúm khâa", e: "Why is the Land Bridge project viewed as not cost-effective?" },
                { t: "Land Bridge โครงการมูลค่ากว่า 1 ล้านล้านบาทกลายเป็นที่ถกเถียงในแง่ของความคุ้มค่า 💰🗣️", i: "Land Bridge kroong-gaan muun-lá-khâa gwàa nʉ̀ng láan láan bàat glaai bpen thîi thòk thǐiang nai ngâae khɔ̌ɔng khwaam khúm khâa", e: "Land Bridge, a project worth over 1 trillion baht, has become debated in terms of cost-effectiveness" },

                { t: "การใช้ Land Bridge หมายความว่า เรือต้องมาจอดที่ท่าเรืออีกฝั่งหนึ่ง ยกตู้คอนเทนเนอร์ลง ⚓📦", i: "gaan chái Land Bridge mǎai khwaam wâa rʉʉa dtɔ̂ng maa jɔ̀ɔt thîi thâa-rʉʉa ìik fàng nʉ̀ng, yók dtûu khɔn-theen-nə̂ə long", e: "Using the Land Bridge means a ship has to dock at a port on one side, lift containers down" },

                { t: "แล้วยกตู้สินค้าขึ้นเรืออีกลำ สิ่งที่ตามมาคือ ต้นทุนที่เพิ่มขึ้น ⬆️🚢", i: "láeo yók dtûu sǐn-kháa khʉ̂n rʉʉa ìik lam. sìng thîi dtaam maa khʉʉ dtôn thun thîi phə̂əm khʉ̂n", e: "Then lift the containers onto another ship. What follows is increased costs." },
                { t: "นั่นคือค่าบริการท่าเรือ ค่าขนส่งทางบก 🏢🛤️", i: "nân khʉʉ khâa bɔɔ-rí-gaan thâa rʉʉa, khâa khǒn sòng thaang bòk", e: "That is port service fees, land transport fees" },
                { t: "ซึ่งโดยรวมแล้วอาจสูงกว่าการแล่นเรือไปยังช่องแคบมะละกา ซึ่งเสียแค่ค่าน้ำมัน 🌊⛽", i: "sʉ̂ng dooy ruuam láeo àat sǔung gwàa gaan lâen rʉʉa bpai yang chɔ̂ng khâep má-lá-gaa, sʉ̂ng sǐia khâe khâa náam-man", e: "which overall might be higher than sailing to the Strait of Malacca, which only costs fuel." },
                { t: "อีกทั้งความเสี่ยงสินค้าเสียหาย ทุกครั้งที่มีการยกมีความเสี่ยงที่สินค้าเสียหายหรือล่าช้า ⚠️📦", i: "ìik tháng khwaam sìiang sǐn-kháa sǐia hǎai. thúk khráng thîi mii gaan yók mii khwaam sìiang thîi sǐn-kháa sǐia hǎai rʉ̌ʉ lâa cháa", e: "Additionally, the risk of cargo damage. Every time there is lifting, there is a risk of cargo getting damaged or delayed." },
                { t: "และประเด็นต่อมาคือ อาจช่วยประหยัดเวลาเพียงเล็กน้อย ⏱️🤏", i: "láe bprà-den dtɔ̀ɔ maa khʉʉ àat chûuay bprà-yàt wee-laa phiiang lék nɔ́ɔy", e: "And the next point is, it might only save a little bit of time." },
                { t: "รัฐบาลระบุว่า Land Bridge จะช่วยร่นระยะเวลาประมาณ 4 วัน 🗓️", i: "rát-thà-baan rá-bù wâa Land Bridge jà chûuay rôn rá-yá wee-laa bprà-maan sìi wan", e: "The government stated that Land Bridge will help shorten the time by about 4 days." },
                { t: "แต่การแล่นเรือผ่านช่องแคบมะละกานั้นใช้เวลาประมาณ 2 วัน 🌊✌️", i: "dtàe gaan lâen rʉʉa phàan chɔ̂ng khâep má-lá-gaa nán chái wee-laa bprà-maan sɔ̌ɔng wan", e: "But sailing through the Strait of Malacca takes about 2 days." },
                { t: "และการยกตู้คอนเทนเนอร์ขึ้นลงจากท่าเรือถูกมองว่า อาจใช้เวลาอย่างน้อย 50-60 ชั่วโมง 🏗️⌛", i: "láe gaan yók dtûu khɔn-theen-nə̂ə khʉ̂n long jàak thâa rʉʉa thùuk mɔɔng wâa àat chái wee-laa yàang nɔ́ɔy hâa-sìp thʉ̌ng hòk-sìp chûua moong", e: "And lifting containers up and down the port is viewed as potentially taking at least 50-60 hours." },

                { t: "ซึ่งในอีกด้านหนึ่ง สิงคโปร์ไม่ได้มีดีแค่ทางผ่าน แต่เป็นท่าเรือที่มีระบบครบวงจร 🇸🇬✨", i: "sʉ̂ng nai ìik dâan nʉ̀ng, sǐng-khà-bpoo mâi dâi mii dii khâe thaang phàan, dtàe bpen thâa rʉʉa thîi mii rá-bòp króp wong-jɔɔn", e: "On the other hand, Singapore is not just a good passageway, but a port with a comprehensive system" },
                { t: "เช่น การซ่อมเรือ เติมน้ำมัน ประกันภัย และการเงิน 🛠️⛽🏦", i: "chên gaan sɔ̂m rʉʉa, dtəəm náam-man, bprà-gan phai, láe gaan ngən", e: "such as ship repair, refueling, insurance, and finance." },
                { t: "โดยต้นทุนการก่อสร้างที่สูง เพื่อให้คุ้มทุนในระยะเวลาที่กำหนด ค่าบริการอาจตั้งไว้สูงจนจูงใจให้เรือมาใช้น้อย 🏗️💸", i: "dooy dtôn thun gaan gɔ̀ɔ sâang thîi sǔung, phʉ̂ʉa hâi khúm thun nai rá-yá wee-laa thîi gam-nòt, khâa bɔɔ-rí-gaan àat dtâng wái sǔung jon juung jai hâi rʉʉa maa chái nɔ́ɔy", e: "With high construction costs, to break even within a set timeframe, service fees might be set so high that it incentivizes fewer ships to use it." },

        const vocabPool = rawVocabData.trim().split('\n').map(line => {
            const parts = line.split('\t').map(p => p.trim());
            if(parts.length >= 3) {
                const firstPart = parts[0];
                const emojiMatch = firstPart.match(/^([\p{Emoji}\s]+)/u);
                let emoji = "✨", th = "", ipa = "", en = "";
                if(emojiMatch) {
                    emoji = emojiMatch[1].trim();
                    th = firstPart.replace(emojiMatch[1], '').trim();
                } else {
                    th = firstPart;
                }
                
                if(!th && parts.length >= 4) {
                    th = parts[1]; ipa = parts[2]; en = parts[3];
                } else if (parts.length === 4) {
                    th = parts[1]; ipa = parts[2]; en = parts[3];
                } else {
                    ipa = parts[1]; en = parts[2];
                }
                return { emoji, th, ipa, en };
            }
            return null;
        }).filter(v => v !== null);

        // --- CORE FUNCTIONS ---
        function speak(text, btnElement) {
            window.speechSynthesis.cancel();
            document.querySelectorAll('.tts-playing').forEach(el => el.classList.remove('tts-playing'));
            if(btnElement) btnElement.classList.add('tts-playing');

            const cleanText = text.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '').trim();
            const msg = new SpeechSynthesisUtterance(cleanText);
            
            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(voice => voice.lang === 'th-TH' || voice.lang === 'th_TH');
            if (thaiVoice) msg.voice = thaiVoice;
            else msg.lang = 'th-TH';
            
            msg.rate = 0.9;
            msg.onend = () => { if(btnElement) btnElement.classList.remove('tts-playing'); };
            msg.onerror = () => { if(btnElement) btnElement.classList.remove('tts-playing'); };
            window.speechSynthesis.speak(msg);
        }

        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

        function toggleLang(btn, lang) {
            btn.classList.toggle(`active-${lang}`);
            const container = btn.closest('.flex').parentElement;
            let target = container.querySelector('.' + lang);
            if (!target) {
                target = btn.closest('div').parentElement.querySelector('.' + lang);
            }
            if(target) target.classList.toggle('hidden-content');
        }

        // --- UI BUILDER ---
        function createSmartText(data, textClass = "text-lg text-gray-800") {
            const id = Math.random().toString(36).substr(2, 9);
            const thaiText = data.t;
            const ipaText = data.i;
            const enText = data.e;

            // Optional: Ex. sentence for grammar
            const exText = data.ex ? `<div class="mt-2 pl-4 border-l-2 border-purple-300 text-sm text-gray-600 thai-text">${data.ex}</div>` : '';

            return `
                <div class="mb-3" id="${id}">
                    <div class="flex flex-wrap items-center gap-2 mb-1">
                        <span class="font-medium ${textClass} thai-text">${thaiText}</span>
                        <button onclick="speak('${thaiText.replace(/'/g, "\\'")}', this)" class="tts-button text-blue-500 text-lg">🔊</button>
                        <div class="flex gap-1 ml-auto">
                            <button onclick="toggleLang(this, 'ipa')" class="btn-toggle">IPA</button>
                            <button onclick="toggleLang(this, 'en')" class="btn-toggle">EN</button>
                        </div>
                    </div>
                    <div class="ipa hidden-content text-orange-600 font-mono text-sm mb-1">${ipaText}</div>
                    <div class="en hidden-content text-blue-600 italic text-sm mb-1">${enText}</div>
                    ${exText}
                </div>
            `;
        }

        function randomVocab() {
            const displayArea = document.getElementById('vocab-card'); 
            const word = vocabPool[Math.floor(Math.random() * vocabPool.length)];
            
            // Random question templates
            const questions = [
                `คุณคิดว่า <b>${word.th}</b> สำคัญยังไง?`,
                `แต่งประโยคด้วยคำว่า <b>${word.th}</b> ให้ฟังหน่อย`,
                `คุณนึกถึงอะไรเมื่อได้ยินคำว่า <b>${word.th}</b>?`,
                `<b>${word.th}</b> เกี่ยวข้องกับชีวิตคุณไหม?`
            ];
            const q = questions[Math.floor(Math.random() * questions.length)];
            const cleanQ = q.replace(/<\/?b>/g, '');

            displayArea.innerHTML = `
                <div class="text-center w-full animate-pop">
                    <div class="text-5xl mb-4">${word.emoji}</div>
                    <div class="flex flex-wrap items-center justify-center gap-2 mb-2">
                        <span class="text-3xl font-bold text-indigo-700 thai-text">${word.th}</span>
                        <button onclick="speak('${word.th}', this)" class="tts-button text-blue-500 text-2xl">🔊</button>
                    </div>
                    <div class="flex gap-2 justify-center mt-3 mb-2">
                        <button onclick="toggleLang(this, 'ipa')" class="btn-toggle text-xs">IPA</button>
                        <button onclick="toggleLang(this, 'en')" class="btn-toggle text-xs">EN</button>
                    </div>
                    <div class="ipa hidden-content text-orange-600 font-mono text-base mb-1 w-full text-center">/${word.ipa}/</div>
                    <div class="en hidden-content text-blue-600 italic text-base w-full text-center">${word.en}</div>
                    
                    <div class="mt-6 p-4 bg-indigo-50 border border-indigo-100 rounded-xl text-left">
                        <div class="flex items-center gap-2">
                            <span class="text-indigo-900 font-medium">💬 ครูถาม (Tutor asks):</span>

                        </div>
                        <p class="text-lg mt-1 text-indigo-800">${q}</p>
                    </div>

            document.getElementById('heading-vocab').innerHTML = createHeader(content.headings.vocab, "🎯", "text-purple-700");
            document.getElementById('heading-grammar').innerHTML = createHeader(content.headings.grammar, "🧱", "text-purple-700");
            document.getElementById('heading-discussion').innerHTML = createHeader(content.headings.discussion, "🗣️", "text-teal-700");
            document.getElementById('heading-speaking').innerHTML = createHeader(content.headings.speaking, "🎤", "text-yellow-600");
            document.getElementById('heading-extension').innerHTML = createHeader(content.headings.extension, "⏱️", "text-gray-700");
            document.getElementById('heading-additional-vocab').innerHTML = createHeader(content.headings.additionalVocab, "📚", "text-slate-700");

            // Content
            document.getElementById('instruction-review').innerHTML = createSmartText(content.review.instruction, "text-gray-700 text-lg text-center");
            
            document.getElementById('leadin-questions').innerHTML = content.leadin.map(q => 
                `<div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100">${createSmartText(q)}</div>`
            ).join('');

            document.getElementById('script-content').innerHTML = content.scriptLines.map((line) => {
                const isTeacher = line.t.includes('ครู:');
                const bg = isTeacher ? 'bg-white border-gray-200' : 'bg-rose-50 border-rose-100';
                return `<div class="p-3 rounded-xl shadow-sm border ${bg}">${createSmartText(line, "text-[0.95rem]")}</div>`;
            }).join('');

            document.getElementById('vid-comp-questions').innerHTML = content.vidComp.map(q => 
                `<div class="bg-amber-50 p-4 rounded-xl border border-amber-100">${createSmartText(q)}</div>`
            ).join('');

            document.getElementById('target-vocab-list').innerHTML = content.targetVocab.map(v => 
                `<div class="bg-purple-50 p-4 rounded-xl border border-purple-100 flex flex-col justify-center">
                    <div class="text-3xl mb-2 text-center">${v.emoji}</div>
                    ${createSmartText(v, "text-xl font-bold text-center text-purple-900 w-full")}
                </div>`
            ).join('');

            document.getElementById('target-grammar-list').innerHTML = content.grammar.map(g => 
                `<div class="bg-purple-50 p-4 rounded-xl border border-purple-100">
                    ${createSmartText(g, "text-lg font-bold text-purple-800")}
                </div>`
            ).join('');

            document.getElementById('discussion-questions').innerHTML = content.discussion.map(q => 
                `<div class="bg-teal-50 p-4 rounded-xl border border-teal-100">${createSmartText(q)}</div>`
            ).join('');

            document.getElementById('speaking-tasks').innerHTML = content.speaking.map(task => 
                `<div class="bg-yellow-50 p-5 rounded-2xl border border-yellow-200">
                    <div class="text-4xl mb-3">${task.icon}</div>
                    <div class="font-bold text-xl text-yellow-800 mb-2">${task.title}</div>
                    ${createSmartText({t: task.desc, i: task.i, e: task.e}, "text-gray-800")}
                </div>`
            ).join('');

            document.getElementById('extension-tasks').innerHTML = content.extension.map(task => 
                `<div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm">
                    <div class="text-4xl mb-3">${task.icon}</div>
                    <div class="font-bold text-xl text-gray-800 mb-2">${task.title}</div>
                    ${createSmartText({t: task.desc, i: task.i, e: task.e}, "text-gray-700")}
                </div>`
            ).join('');

            document.getElementById('additional-vocab-list').innerHTML = content.additionalVocab.map(v => 
                `<div class="bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">${createSmartText(v, "text-xl font-bold text-slate-800")}</div>`
            ).join('');
        };
    </script>
</body>
</html>

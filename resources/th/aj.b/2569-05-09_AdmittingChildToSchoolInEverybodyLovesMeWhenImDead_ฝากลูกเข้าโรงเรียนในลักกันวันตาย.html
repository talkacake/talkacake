<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฝากลูกเข้าโรงเรียนในลักกันวันตาย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f4f9;
            color: #1e293b;
        }
        
        .ipa-text {
            color: #d97706; 
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
        }

        .en-text {
            color: #2563eb; 
            font-style: italic;
            font-size: 0.95rem;
        }

        .btn-toggle {
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            background: white;
            transition: all 0.2s;
            cursor: pointer;
            color: #64748b;
            font-weight: 600;
        }
        .btn-toggle:hover { background-color: #f1f5f9; }
        .btn-toggle.active-ipa { background-color: #fffbeb; border-color: #d97706; color: #d97706; }
        .btn-toggle.active-en { background-color: #eff6ff; border-color: #2563eb; color: #2563eb; }

        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
        
        .tts-button {
            cursor: pointer;
            transition: transform 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 0;
            color: #0ea5e9;
        }
        .tts-button:active { transform: scale(0.85); }
        .tts-playing { color: #dc2626 !important; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @keyframes popIn {
            0% { transform: scale(0.9) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .yt-video-container {
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            background: #000;
        }
        .yt-video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .hidden-content { display: none !important; }
    </style>
</head>
<body class="pb-24">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b-4 border-indigo-500">
        <div class="max-w-4xl mx-auto px-4 py-4 text-center flex justify-center items-center gap-3">
            <h1 class="text-2xl md:text-3xl font-bold text-indigo-800 flex items-center justify-center gap-2">
                🏫 ฝากลูกเข้าโรงเรียนในลักกันวันตาย 💼
            </h1>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 mt-8 space-y-10">

        <!-- 1. Review Section -->
        <section class="bg-white p-6 md:p-8 rounded-3xl card-shadow border border-indigo-50">
            <div id="heading-review" class="mb-6 pb-4 border-b border-gray-100"></div>

            <div class="text-center relative overflow-hidden bg-indigo-50 p-6 rounded-2xl border border-indigo-100 mb-8">
                <div id="instruction-review" class="mb-6 relative z-10"></div>
                
                <div id="vocab-card" class="bg-white p-8 rounded-2xl min-h-[160px] flex flex-col items-center justify-center mb-6 shadow-sm border border-gray-100">
                    <p class="text-indigo-400 italic text-lg font-medium"><i class="fas fa-hand-pointer mr-2 animate-bounce"></i>พร้อมแล้วกดปุ่มสุ่มคำศัพท์...</p>
                </div>

                <button onclick="randomVocab()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-10 rounded-full shadow-lg transform active:scale-95 transition-all flex items-center justify-center gap-2 mx-auto text-lg">
                    <i class="fas fa-random"></i>
                    <span>สุ่มคำศัพท์</span>
                </button>
            </div>
        </section>

        <!-- 2. Lead-in Section -->
        <section class="bg-white p-6 md:p-8 rounded-3xl card-shadow border-t-8 border-emerald-400">
            <div id="heading-leadin" class="mb-6 pb-4 border-b border-gray-100"></div>
            <div id="leadin-questions" class="space-y-4"></div>
        </section>

        <!-- 3. Video Section -->
        <section class="bg-white p-6 md:p-8 rounded-3xl card-shadow border border-rose-50">
            <div id="heading-video" class="mb-6 pb-4 border-b border-gray-100"></div>

            <!-- YouTube Embed -->
            <div class="yt-video-container mb-8 max-w-sm mx-auto shadow-lg border-4 border-gray-900">
                <iframe src="https://www.youtube.com/embed/2II8pPN1rms" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>

            <div class="bg-rose-50 p-5 md:p-6 rounded-2xl border border-rose-100 shadow-inner">
                <div id="heading-script" class="mb-5 pb-3 border-b-2 border-rose-200"></div>
                <div id="script-content" class="space-y-4">
                    <!-- Script injected via JS -->
                </div>
            </div>
        </section>

        <!-- 4. Comprehension Section (Video) -->
        <section class="bg-white p-6 md:p-8 rounded-3xl card-shadow border-t-8 border-amber-400">
            <div id="heading-vid-comp" class="mb-6 pb-4 border-b border-gray-100"></div>
            <div id="vid-comp-questions" class="space-y-4"></div>
        </section>

        <!-- 5. Target Vocab Section -->
        <section class="bg-white p-6 md:p-8 rounded-3xl card-shadow border border-purple-50">
            <div id="heading-vocab" class="mb-6 pb-4 border-b border-gray-100"></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8" id="target-vocab-list"></div>

            <div id="heading-grammar" class="mb-6 pb-4 border-b border-gray-100 mt-8"></div>
            <div class="space-y-4" id="target-grammar-list"></div>
        </section>

        <!-- 6. Reading Section -->
        <section class="bg-white p-6 md:p-8 rounded-3xl card-shadow border border-sky-50">
            <div id="heading-reading" class="mb-6 pb-4 border-b border-gray-100"></div>
            
            <div class="bg-sky-50 p-6 md:p-8 rounded-2xl border border-sky-100 mb-8 shadow-inner">
                <div id="reading-title" class="mb-4 text-center font-bold text-xl text-sky-800"></div>
                <div id="reading-passage" class="space-y-4"></div>
            </div>

            <div id="heading-read-comp" class="mb-6 pb-4 border-b border-gray-100"></div>
            <div id="read-comp-questions" class="space-y-4"></div>
        </section>

        <!-- 7. Discussion Questions -->
        <section class="bg-white p-6 md:p-8 rounded-3xl card-shadow border-t-8 border-teal-400">
            <div id="heading-discussion" class="mb-6 pb-4 border-b border-gray-100"></div>
            <div id="discussion-questions" class="space-y-4"></div>
        </section>

        <!-- 8. Speaking Tasks -->
        <section class="bg-white p-6 md:p-8 rounded-3xl card-shadow border border-yellow-100">
            <div id="heading-speaking" class="mb-6 pb-4 border-b border-gray-100"></div>
            <div class="grid grid-cols-1 gap-6" id="speaking-tasks"></div>
        </section>

        <!-- 9. Extension Activities -->
        <section class="bg-gray-50 p-6 md:p-8 rounded-3xl shadow-inner border border-gray-200">
            <div id="heading-extension" class="mb-6 pb-4 border-b border-gray-300"></div>
            <div class="grid grid-cols-1 gap-6" id="extension-tasks"></div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="mt-16 py-8 text-center bg-white border-t border-gray-200">
        <p class="text-indigo-600 text-sm font-medium">สนุกกับการเรียนภาษาไทยนะครับ! 🇹🇭✨</p>
    </footer>

    <!-- JAVASCRIPT -->
    <script>
        // --- DATA STORE ---
        const content = {
            headings: {
                review: { t: "ทบทวนคำศัพท์เก่า 🎲", i: "thóp-thuuan kham-sàp gào", e: "Review Old Vocabulary" },
                leadin: { t: "ก่อนเริ่มบทเรียน 🤔", i: "gɔ̀ɔn rə̂əm bòt-riian", e: "Before we start" },
                video: { t: "วิดีโอ: ฝากลูกเข้าโรงเรียน 🎬", i: "wí-dii-oo: fàak lûuk khâo rohng-riian", e: "Video: Getting child into school" },
                script: { t: "บทสนทนา 💬", i: "bòt sǒn-thá-naa", e: "Transcript" },
                vidComp: { t: "คำถามจากวิดีโอ ❓", i: "khǎm-thǎam jàak wí-dii-oo", e: "Video Comprehension" },
                vocab: { t: "คำศัพท์เป้าหมาย 🎯", i: "kham-sàp bpâo-mǎai", e: "Target Vocabulary" },
                grammar: { t: "โครงสร้างประโยค 🧱", i: "khroong-sâang bprà-yôok", e: "Sentence Structures" },
                reading: { t: "บทอ่านสั้นๆ 📖", i: "bòt àan sân-sân", e: "Short Reading" },
                readComp: { t: "คำถามจากบทอ่าน ❓", i: "khǎm-thǎam jàak bòt àan", e: "Reading Comprehension" },
                discussion: { t: "ชวนคุย 🗣️", i: "chuuan khui", e: "Discussion" },
                speaking: { t: "กิจกรรมฝึกพูด 🎤", i: "gìt-jà-gam fʉ̀k phûut", e: "Speaking Activities" },
                extension: { t: "กิจกรรมเพิ่มเติม ⏱️", i: "gìt-jà-gam phə̂əm-dtəəm", e: "Extension Activities" }
            },
            review: {
                instruction: { t: "ครูสุ่มคำศัพท์ 1 คำ แล้วตั้งคำถามโดยใช้คำนั้นให้นักเรียนตอบ 🗣️", i: "khruu sùm kham-sàp nʉ̀ng kham láeo dtâng khǎm-thǎam dooy chái kham nán hâi nák-riian dtɔ̀ɔp", e: "Teacher randomly selects 1 word and asks a question using that word for the student to answer." }
            },
            leadin: [
                { t: "1. ในประเทศของคุณ พ่อแม่ต้องจ่ายเงินพิเศษเพื่อให้ลูกเข้าโรงเรียนดังๆ ไหม? 🏫💰", i: "nai bprà-thêet khɔ̌ɔng khun phɔ̂ɔ-mâae dtɔ̂ng jàai ngən phǐ-sèet phʉ̂ʉa hâi lûuk khâo rohng-riian dang dang mǎi?", e: "1. In your country, do parents have to pay extra money to get their kids into famous schools?" },
                { t: "2. คุณคิดว่าอะไรคือสาเหตุที่ทำให้พ่อแม่ยอมทำทุกอย่างเพื่อให้ลูกเข้าโรงเรียนดีๆ? 🤔👨‍👩‍👧‍👦", i: "khun khít wâa à-rai khʉʉ sǎa-hèet thîi tham hâi phɔ̂ɔ-mâae yɔɔm tham thúk yàang phʉ̂ʉa hâi lûuk khâo rohng-riian dii dii?", e: "2. What do you think is the reason parents are willing to do anything to get their kids into good schools?" },
                { t: "3. คุณรู้จักคำว่า 'แป๊ะเจี๊ยะ' (เงินบริจาคพิเศษ) ในสังคมไทยไหม? ✉️💸", i: "khun rúu-jàk kham wâa 'bpáe-jíia' nai sǎng-khom thai mǎi?", e: "3. Do you know the word 'Pae Jia' (special donation money) in Thai society?" }
            ],
            scriptLines: [
                { t: "ครู: ต้องขอบคุณคุณโทนี่กับคุณจาเน็ตนะครับ 🙏", i: "khruu: dtɔ̂ng khɔ̀ɔp-khun khun thoo-nîi gàp khun jaa-nét ná khráp", e: "Teacher: I must thank Tony and Janet." },
                { t: "ครู: ที่อุตส่าห์สนับสนุนโรงเรียนของเราตลอดเวลาสองปีที่ผ่านมานะครับ 🏫", i: "khruu: thîi ùt-sàa sà-nàp-sà-nǔn rohng-riian khɔ̌ɔng rao dtà-lɔ̀ɔt wee-laa sɔ̌ɔng bpii thîi phàan maa ná khráp", e: "Teacher: For going out of your way to support our school over the past two years." },
                { t: "ครู: อีกนิดเดียวเอง สู้ๆครับ ✌️", i: "khruu: ìik nít diao eeng, sûu sûu khráp", e: "Teacher: Just a little bit more. Keep fighting." },
                { t: "โทนี่: เรื่องสโนว์นี่ 👧", i: "thoo-nîi: rʉ̂ʉang sà-noo nîi", e: "Tony: About Snow..." },
                { t: "โทนี่: พอจะแนะนำได้ไหมครับว่า มันต้องยังไง ❓", i: "thoo-nîi: phɔɔ jà náe-nam dâi mǎi khráp wâa man dtɔ̂ng yang-ngai", e: "Tony: Could you recommend what we need to do?" },
                { t: "ครู: อืม...Hard to say เพราะว่ามันไม่ได้ขึ้นอยู่กับผมเนาะ 🤷‍♂️", i: "khruu: uum... Hard to say phrɔ́ wâa man mâi dâi khʉ̂n yùu gàp phǒm nɔ́", e: "Teacher: Hmm... Hard to say because it doesn't depend on me, right?" },
                { t: "ครู: มันขึ้นอยู่กับผู้ปกครองท่านอื่นด้วย ใช่ไหมครับ 👪", i: "khruu: man khʉ̂n yùu gàp phûu-bpòk-khrɔɔng thâan ʉ̀ʉn dûuay, châi mǎi khráp", e: "Teacher: It depends on other parents too, right?" },
                { t: "ครู: ผมแนะนำให้คุณโทนี่เช็กเว็บไซต์ของเรานะครับ 💻", i: "khruu: phǒm náe-nam hâi khun thoo-nîi chék wép-sái khɔ̌ɔng rao ná khráp", e: "Teacher: I recommend you check our website." },
                { t: "ครู: เรามี update ranking real-time เลย นะครับ 📊", i: "khruu: rao mii update ranking real-time ləəi ná khráp", e: "Teacher: We update the ranking in real-time." },
                { t: "โทนี่: เอ่อ...รู้ครับ แต่...เหลืออีกสิบอันดับเนี่ย 📉", i: "thoo-nîi: ə̀ə... rúu khráp dtàe... lʉ̌ʉa ìik sìp an-dàp nîia", e: "Tony: Uh... I know, but... there are 10 ranks left..." },
                { t: "โทนี่: คือ...ตัวเลขมัน...ต้องยังไงอ่ะครับ 💰", i: "thoo-nîi: khʉʉ... dtua-lêek man... dtɔ̂ng yang-ngai à khráp", e: "Tony: I mean... the numbers... what does it have to be?" },
                { t: "ครู: คือคุณโทนี่ ผมไม่อยากให้คุณคิดเรื่องเงินเลยนะครับ 💸", i: "khruu: khʉʉ khun thoo-nîi, phǒm mâi yàak hâi khun khít rʉ̂ʉang ngən ləəi ná khráp", e: "Teacher: I mean, Tony, I don't want you to think about money at all." },
                { t: "ครู: คิดซะว่า มันเป็นการ support การศึกษาบ้านเราใช่ไหมครับ 📚", i: "khruu: khít sá wâa, man bpen gaan support gaan-sʉ̀k-sǎa bâan rao châi mǎi khráp", e: "Teacher: Just think of it as supporting our education system, right?" },

            reading: {
                title: { t: "การบริจาคเงินแลกที่นั่งเรียน 🏫💸", i: "gaan bɔɔ-rí-jàak ngən lâek thîi nâng riian", e: "Donating money in exchange for a school seat" },
                passage: [
                    { t: "ในสังคมไทย มีระบบที่คนทั่วไปเรียกว่า 'แป๊ะเจี๊ยะ' หรือเงินบริจาคพิเศษ", i: "nai sǎng-khom thai, mii rá-bòp thîi khon thûua-bpai rîiak wâa 'bpáe-jíia' rʉ̌ʉ ngən bɔɔ-rí-jàak phǐ-sèet", e: "In Thai society, there is a system commonly called 'Pae Jia' or special donation money." },

        const vocabPool = rawVocabData.trim().split('\n').map(line => {
            const parts = line.split('\t').map(p => p.trim());
            if(parts.length >= 3) {
                const firstPart = parts[0];
                const emojiMatch = firstPart.match(/^([\p{Emoji}\s]+)/u);
                let emoji = "✨", th = "", ipa = "", en = "";
                if(emojiMatch) {
                    emoji = emojiMatch[1].trim();
                    th = firstPart.replace(emojiMatch[1], '').trim();
                } else {
                    th = firstPart;
                }
                
                if(!th && parts.length >= 4) {
                    th = parts[1]; ipa = parts[2]; en = parts[3];
                } else if (parts.length === 4) {
                    th = parts[1]; ipa = parts[2]; en = parts[3];
                } else {
                    ipa = parts[1]; en = parts[2];
                }
                return { emoji, th, ipa, en };
            }
            return null;
        }).filter(v => v !== null);

        // --- CORE FUNCTIONS ---
        function speak(text, btnElement) {
            window.speechSynthesis.cancel();
            document.querySelectorAll('.tts-playing').forEach(el => el.classList.remove('tts-playing'));
            if(btnElement) btnElement.classList.add('tts-playing');

            const cleanText = text.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '').trim();
            const msg = new SpeechSynthesisUtterance(cleanText);
            
            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(voice => voice.lang === 'th-TH' || voice.lang === 'th_TH');
            if (thaiVoice) msg.voice = thaiVoice;
            else msg.lang = 'th-TH';
            
            msg.rate = 0.9;
            msg.onend = () => { if(btnElement) btnElement.classList.remove('tts-playing'); };
            msg.onerror = () => { if(btnElement) btnElement.classList.remove('tts-playing'); };
            window.speechSynthesis.speak(msg);
        }

        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

        function toggleLang(btn, lang) {
            btn.classList.toggle(`active-${lang}`);
            const container = btn.closest('.flex').parentElement;
            let target = container.querySelector('.' + lang);
            if (!target) {
                target = btn.closest('div').parentElement.querySelector('.' + lang);
            }
            if(target) target.classList.toggle('hidden-content');
        }

        // --- UI BUILDER ---
        function createSmartText(data, textClass = "text-lg text-gray-800") {
            const id = Math.random().toString(36).substr(2, 9);
            const thaiText = data.t;
            const ipaText = data.i;
            const enText = data.e;

            return `
                <div class="mb-3" id="${id}">
                    <div class="flex flex-wrap items-center gap-2 mb-1">
                        <span class="font-medium ${textClass} thai-text">${thaiText}</span>
                        <button onclick="speak('${thaiText.replace(/'/g, "\\'")}', this)" class="tts-button text-blue-500 text-lg">🔊</button>
                        <div class="flex gap-1 ml-auto">
                            <button onclick="toggleLang(this, 'ipa')" class="btn-toggle">IPA</button>
                            <button onclick="toggleLang(this, 'en')" class="btn-toggle">EN</button>
                        </div>
                    </div>
                    <div class="ipa hidden-content text-orange-600 font-mono text-sm mb-1">${ipaText}</div>
                    <div class="en hidden-content text-blue-600 italic text-sm mb-1">${enText}</div>
                </div>
            `;
        }

        function createHeader(data, icon, colorClass) {
            return `
                <div class="flex flex-wrap items-center gap-3">
                    <span class="text-3xl">${icon}</span>
                    <h2 class="text-2xl font-bold ${colorClass} thai-text">${data.t}</h2>
                    <button onclick="speak('${data.t.replace(/'/g, "\\'")}', this)" class="tts-button text-blue-500 text-xl">🔊</button>
                    <div class="flex gap-1 ml-auto">
                        <button onclick="toggleLang(this, 'ipa')" class="btn-toggle">IPA</button>
                        <button onclick="toggleLang(this, 'en')" class="btn-toggle">EN</button>
                    </div>
                </div>
                <div class="ipa hidden-content text-orange-600 font-mono text-sm mt-1 ml-12">${data.i}</div>
                <div class="en hidden-content text-blue-600 italic text-sm mt-1 ml-12">${data.e}</div>
            `;
        }

        function randomVocab() {
            const displayArea = document.getElementById('vocab-card'); 
            const word = vocabPool[Math.floor(Math.random() * vocabPool.length)];
            
            displayArea.innerHTML = `
                <div class="text-center w-full animate-pop">
                    <div class="text-5xl mb-4">${word.emoji}</div>
                    <div class="flex flex-wrap items-center justify-center gap-2 mb-2">
                        <span class="text-3xl font-bold text-indigo-700 thai-text">${word.th}</span>
                        <button onclick="speak('${word.th}', this)" class="tts-button text-blue-500 text-2xl">🔊</button>
                    </div>
                    <div class="flex gap-2 justify-center mt-3 mb-2">
                        <button onclick="toggleLang(this, 'ipa')" class="btn-toggle text-xs">IPA</button>
                        <button onclick="toggleLang(this, 'en')" class="btn-toggle text-xs">EN</button>
                    </div>
                    <div class="ipa hidden-content text-orange-600 font-mono text-base mb-1 w-full text-center">/${word.ipa}/</div>
                    <div class="en hidden-content text-blue-600 italic text-base w-full text-center">${word.en}</div>
                </div>
            `;
        }

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Speaking Lesson: Dinner</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* Use Sarabun for Thai text and Inter for an English fallback */
        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Custom styles for the interactive elements */
        .thai-text {
            font-family: 'Sarabun', sans-serif;
            font-size: 1.5rem; /* 24px */
            font-weight: 500;
            color: #111827; /* gray-900 */
        }

        .toggle-btn {
            display: inline-block;
            padding: 0.25rem 0.75rem; /* py-1 px-3 */
            margin-right: 0.5rem; /* mr-2 */
            border-radius: 9999px; /* rounded-full */
            font-size: 0.75rem; /* text-xs */
            font-weight: 700; /* font-bold */
            background-color: #E5E7EB; /* bg-gray-200 */
            color: #4B5563; /* text-gray-600 */
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }
        .toggle-btn:hover {
            background-color: #D1D5DB; /* bg-gray-300 */
        }
        .toggle-btn.active {
            background-color: #DBEAFE; /* bg-blue-100 */
            color: #1D4ED8; /* text-blue-700 */
            border-color: #BFDBFE; /* border-blue-200 */
        }

        .tts-btn {
            display: inline-block;
            padding: 0.5rem; /* p-2 */
            margin-right: 0.5rem; /* mr-2 */
            border-radius: 9999px; /* rounded-full */
            background-color: #F3F4F6; /* bg-gray-100 */
            color: #3B82F6; /* text-blue-500 */
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tts-btn:hover {
            background-color: #E5E7EB; /* bg-gray-200 */
            color: #2563EB; /* text-blue-600 */
        }

        .translation-box {
            font-size: 0.9rem; /* text-sm */
            padding: 0.5rem 0.75rem; /* py-2 px-3 */
            margin-top: 0.5rem; /* mt-2 */
            border-radius: 0.5rem; /* rounded-lg */
            background-color: #F9FAFB; /* bg-gray-50 */
            border-left: 4px solid #D1D5DB; /* border-l-4 border-gray-300 */
        }
        .translation-box.ipa {
            color: #4B5563; /* text-gray-600 */
            border-color: #93C5FD; /* border-blue-300 */
        }
        .translation-box.en {
            color: #111827; /* text-gray-900 */
            font-style: italic;
            border-color: #A7F3D0; /* border-emerald-300 */
        }
        
        .hidden {
            display: none;
        }

        /* --- Header Styles --- */
        #header {
            background: linear-gradient(to right, #EA580C, #C2410C); /* Orange gradient for food theme */
            color: white;
            padding: 1.5rem; 
            border-radius: 0.75rem; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        #header .thai-text {
            color: #FFFFFF; 
        }
        #header .tts-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: #FFFFFF;
        }
        #header .tts-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        #header .toggle-btn {
            background-color: rgba(255, 255, 255, 0.2);
            color: #FFEDD5; /* orange-100 */
        }
        #header .toggle-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
        #header .toggle-btn.active {
            background-color: #FFFFFF;
            color: #C2410C; /* orange-700 */
            border-color: transparent;
        }
        #header .translation-box {
            background-color: rgba(0, 0, 0, 0.15);
        }
        #header .translation-box.ipa {
            color: #FFEDD5; 
            border-color: #FDBA74; 
        }
        #header .translation-box.en {
            color: #FFFFFF;
            border-color: #6EE7B7; 
        }
    </style>
</head>

<body class="bg-gray-50">

    <div class="container mx-auto max-w-4xl p-6 md:p-10">

        <!-- Header -->
        <header class="mb-10" id="header">
            <!-- JS will inject header content here -->
        </header>
        
        <!-- Main Content -->
        <main class="space-y-12">
            
            <!-- ====== Part 1: Review ====== -->
            <section class="bg-white p-6 md:p-8 rounded-xl shadow-lg border border-gray-200">
                <div class="space-y-8" id="review-questions-container">
                    <!-- Review questions will be dynamically inserted here -->
                </div>
            </section>

            <!-- ====== Part 2: New Lesson - Dinner with Friends ====== -->
            <section class="bg-white p-6 md:p-8 rounded-xl shadow-lg border border-gray-200">
                <div id="lesson-title" class="mb-6 pb-4 border-b border-gray-100">
                    <!-- Title will be dynamically inserted here -->
                </div>
                
                <!-- New Vocabulary -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8" id="new-vocabulary-container">
                    <!-- New vocabulary cards will be dynamically inserted here -->
                </div>

                <!-- Discussion -->
                <div class="space-y-8 mb-8" id="discussion-questions-container">
                    <!-- Discussion questions will be dynamically inserted here -->
                </div>

                <!-- Role Play -->
                <div id="roleplay-title" class="mb-4"></div>
                <div class="bg-orange-50 p-4 md:p-6 rounded-lg border border-orange-200" id="roleplay-container">
                    <!-- Role-play scenario will be dynamically inserted here -->
                </div>

            </section>

        </main>

    </div>

    <script>
        // === Data for the lesson ===
        const lessonData = {
            header: { thai: "อาหารเย็นกับเพื่อน", ipa: "aa-hǎan yen gàp pûeuan", en: "Dinner with Friends", emoji: "🍽️" },
            reviewQuestions: [
                { thai: "สวัสดีตอนเย็น สบายดีไหม", ipa: "sà-wàt-dii dton yen. sà baai dii mái", en: "Good evening. How are you?", emoji: "🌇" },
                { thai: "คุณกินข้าวเช้ามาหรือยัง", ipa: "khun gin kâao cháao maa rĕu yang", en: "Did you eat breakfast yet?", emoji: "🍳" },
                { thai: "คุณชอบกินซูชิหรือกินผลไม้มากกว่ากัน", ipa: "khun chɔ̂ɔp gin suu-chí rĕu gin pǒn-lá-mái mâak gwàa gan", en: "Do you like eating sushi or fruit more?", emoji: "🍣/🍎" },
                { thai: "ร้านอาหารไทยร้านนี้มีอะไรแซ่บ", ipa: "ráan aa-hǎan tai ráan níi mii à-rai sâap", en: "What is delicious/spicy at this Thai restaurant?", emoji: "🌶️" },
                { thai: "คุณกินเผ็ดได้ไหม", ipa: "khun gin pèt dâi mái", en: "Can you eat spicy food?", emoji: "🥵" },
                { thai: "วันเกิดของคุณคือเมื่อไร", ipa: "wan gèrt kɔ̌ɔng khun kue mûea-rai", en: "When is your birthday?", emoji: "🎂" },
                { thai: "น้ำร้านนี้ฟรีไหม", ipa: "nám ráan níi frii mái", en: "Is the water at this shop free?", emoji: "💧" },
                { thai: "คุณสั่งอาหารได้ไหม", ipa: "khun sàng aa-hǎan dâi mái", en: "Can you order food?", emoji: "📝" },
                { thai: "ร้านอาหารอยู่ไกลจากบ้านคุณไหม", ipa: "ráan aa-hǎan yùu glai jàak bâan khun mái", en: "Is the restaurant far from your house?", emoji: "🏠" },
                { thai: "ยินดีที่ได้รู้จักครับ/ค่ะ", ipa: "yin-dii tîi dâai rúu-jàk khráp/khâ", en: "Nice to meet you.", emoji: "🤝" }
            ],
            lessonTitle: { thai: "วันนี้: นัดกินข้าว", ipa: "wan-níi: nát gin kâao", en: "Today: Meeting for a meal", emoji: "🍻" },
            newVocabulary: [
                { thai: "เพื่อน", ipa: "pûeuan", en: "Friend", emoji: "👯‍♂️" },
                { thai: "หิว", ipa: "hǐw", en: "Hungry", emoji: "🤤" },
                { thai: "อิ่ม", ipa: "ìm", en: "Full (stomach)", emoji: "🤰" },
                { thai: "อร่อย", ipa: "à-ròi", en: "Delicious (General)", emoji: "😋" },
                { thai: "เช็คบิล", ipa: "chék-bin", en: "Check bill / Bill please", emoji: "🧾" }
            ],
            discussionQuestions: [
                { thai: "ตอนนี้คุณหิวไหม", ipa: "dtorn-níi khun hǐw mái", en: "Are you hungry right now?", emoji: "🕐" },
                { thai: "คุณชอบไปกินข้าวกับเพื่อนไหม", ipa: "khun chɔ̂ɔp bpai gin kâao gàp pûeuan mái", en: "Do you like going to eat with friends?", emoji: "👨‍👩‍👧‍👦" },
                { thai: "ปกติคุณสั่งอาหารเองไหม", ipa: "bpòk-gà-dtì khun sàng aa-hǎan eeng mái", en: "Do you usually order food yourself?", emoji: "🙋" }
            ],
            roleplayTitle: { thai: "ลองเล่น: สั่งอาหารกับเพื่อน", ipa: "lɔɔng lên: sàng aa-hǎan gàp pûeuan", en: "Role-Play: Ordering food with a friend", emoji: "🎭" },
            roleplayScene: [
                { thai: "เลือกบท: A หรือ B", ipa: "lûeak bòt: ei rĕu bii", en: "Choose your role: A or B", emoji: "🎲" },
                { thai: "A: นัดเพื่อนกินข้าว (หิวมาก)", ipa: "ei: nát pûeuan gin kâao (hǐw mâak)", en: "A: Meeting a friend (Very hungry).", emoji: "😫" },
                { thai: "B: เป็นเพื่อน (ไม่ค่อยหิว)", ipa: "bii: bpen pûeuan (mâi kôi hǐw)", en: "B: You are the friend (Not very hungry).", emoji: "😐" },
                { thai: "เป้าหมาย: ทักทาย, ถามว่าหิวไหม, สั่งอาหาร (ใส่/ไม่ใส่พริก), และเช็คบิล", ipa: "bpâo-măai: ták-taai, tăam wâa hǐw mái, sàng aa-hǎan (sài/mâi sài prík), láe chék-bin", en: "Goal: Greet, ask if hungry, order food (add/no chili), and check the bill.", emoji: "✅" }
            ]
        };
        
        // === Web Speech API for TTS ===
        const synth = window.speechSynthesis;
        let voices = [];

        function populateVoiceList() {
            voices = synth.getVoices().filter(voice => voice.lang.startsWith('th'));
            if (voices.length === 0) {
                // Fallback if no Thai voice is immediately available
                voices = synth.getVoices().filter(voice => voice.lang.startsWith('th') || voice.lang === 'en-US');
            }
        }

        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        function speak(text, lang = 'th-TH') {
            if (synth.speaking) {
                synth.cancel();
                return;
            }
            if (text !== '') {
                const utterThis = new SpeechSynthesisUtterance(text);
                utterThis.lang = lang;
                
                // Try to find a specific Thai voice
                let thaiVoice = voices.find(voice => voice.lang === 'th-TH');
                
                if (thaiVoice) {
                    utterThis.voice = thaiVoice;
                } else if (voices.length > 0) {
                    utterThis.voice = voices[0];
                }
                
                utterThis.pitch = 1;
                utterThis.rate = 0.8;
                synth.speak(utterThis);
            }
        }

        // === Function to create the interactive block ===
        function createInteractiveBlock(data, container, type = 'default') {
            const { thai, ipa, en, emoji } = data; // Destructure the data object
            const idSuffix = Math.random().toString(36).substring(2, 9);
            
            const block = document.createElement('div');
            block.className = 'interactive-block'; // Base class
            
            let emojiSpan = '';
            if (emoji && type !== 'vocabCard') {
                // Add emoji span, but special styling for header
                let emojiClass = (container.id === 'header') ? 'text-3xl' : 'text-2xl';
                emojiSpan = `<span class="${emojiClass} mr-2">${emoji}</span>`;
            }

            let content = `
                <div class="flex items-center">
                    <!-- TTS Button -->
                    <button class="tts-btn" title="Speak">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                          <path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM12.293 7.293a1 1 0 011.414 0L15 8.586l1.293-1.293a1 1 0 111.414 1.414L16.414 10l1.293 1.293a1 1 0 11-1.414 1.414L15 11.414l-1.293 1.293a1 1 0 01-1.414-1.414L13.586 10l-1.293-1.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <!-- Emoji -->
                    ${emojiSpan}
                    <!-- Thai Text -->
                    <span class="thai-text">${thai}</span>
                </div>
                <div class="ml-12 pl-1 mt-2">
                    <!-- Toggle Buttons -->
                    <div>
                        <button class="toggle-btn ipa-toggle" data-target="ipa-${idSuffix}">IPA</button>
                        <button class="toggle-btn en-toggle" data-target="en-${idSuffix}">EN</button>
                    </div>
                    <!-- Hidden Content -->
                    <div id="ipa-${idSuffix}" class="translation-box ipa hidden">
                        ${ipa}
                    </div>
                    <div id="en-${idSuffix}" class="translation-box en hidden">
                        ${en}
                    </div>
                </div>
            `;

            if (type === 'vocabCard') {
                block.innerHTML = `
                    <div class="border border-gray-200 rounded-lg shadow-sm overflow-hidden h-full flex flex-col">
                        <div class="w-full h-40 bg-gray-100 flex items-center justify-center">
                            <span class="text-7xl">${emoji || '💬'}</span>
                        </div>
                        <div class="p-4 flex-grow">
                            ${content}
                        </div>
                    </div>
                `;
            } else {
                block.innerHTML = content;
                // Only add margin-bottom to non-header, non-vocab-card blocks
                if (container.id !== 'header') {
                    block.classList.add('mb-4');
                }
            }

            container.appendChild(block);

            // Add event listeners for the new block
            const ttsBtn = block.querySelector('.tts-btn');
            ttsBtn.addEventListener('click', () => speak(thai));

            const ipaToggle = block.querySelector('.ipa-toggle');
            const enToggle = block.querySelector('.en-toggle');
            const ipaContent = block.querySelector(`#ipa-${idSuffix}`);
            const enContent = block.querySelector(`#en-${idSuffix}`);

            ipaToggle.addEventListener('click', () => {
                ipaContent.classList.toggle('hidden');
                ipaToggle.classList.toggle('active');
            });
            
            enToggle.addEventListener('click', () => {
                enContent.classList.toggle('hidden');
                enToggle.classList.toggle('active');
            });
        }
        
        // === Load all content on page load ===
        document.addEventListener('DOMContentLoaded', () => {
            const containers = {
                header: document.getElementById('header'),
                reviewQuestions: document.getElementById('review-questions-container'),
                lessonTitle: document.getElementById('lesson-title'),
                newVocabulary: document.getElementById('new-vocabulary-container'),
                discussionQuestions: document.getElementById('discussion-questions-container'),
                roleplayTitle: document.getElementById('roleplay-title'),
                roleplay: document.getElementById('roleplay-container')
            };

            // Page Header
            createInteractiveBlock(lessonData.header, containers.header);
            
            // Part 1: Review
            lessonData.reviewQuestions.forEach(q => {
                createInteractiveBlock(q, containers.reviewQuestions);
            });

            // Part 2: Lesson
            createInteractiveBlock(lessonData.lessonTitle, containers.lessonTitle);
            
            // New Vocab
            lessonData.newVocabulary.forEach(v => {
                createInteractiveBlock(v, containers.newVocabulary, 'vocabCard');
            });

            // Discussion
            lessonData.discussionQuestions.forEach(q => {
                createInteractiveBlock(q, containers.discussionQuestions);
            });

            // Role-Play
            createInteractiveBlock(lessonData.roleplayTitle, containers.roleplayTitle);
            lessonData.roleplayScene.forEach(line => {
                createInteractiveBlock(line, containers.roleplay);
            });
        });

    </script>
</body>
</html>

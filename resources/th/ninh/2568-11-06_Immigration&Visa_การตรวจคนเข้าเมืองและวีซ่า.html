    .translation { color: #1f2937; }

      font-size: 0.8rem; margin-left: 0.35rem; background: #fff; color: #475569;
      transition: background-color .2s, color .2s, border-color .2s;

    .speaker-icon:hover, .toggle-btn:hover { background-color: #e2e8f0; }
    .speaker-icon svg { width: 1rem; height: 1rem; }
    /* Custom modal for alerts */
    #alert-modal {
      position: fixed; inset: 0; background-color: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity .3s ease;
    }
    #alert-modal.visible { opacity: 1; pointer-events: auto; }
  </style>
</head>

    const vocabulary = [

      /* New label for Additional Vocabulary */

      'q3': { thai: 'ถ้าคุณอยากทำงานในไทย คุณต้องมีวีซ่าทำงาน และ ใบอนุญาตทำงาน ใช่ไหม', phonetic: 'thâa khun yàak tham-ngaan nai thai, khun tɔ̂ng mii wii-sâa tham-ngaan lɛ́ bai à-nú-yâat tham-ngaan, châi măi', english: 'If you want to work in Thailand, you need a work visa and a work permit, right?' },

    };

    /* -------------------- TTS -------------------- */
    const synth = 'speechSynthesis' in window ? window.speechSynthesis : null;
    let voices = [];
    let thVoice = null, enVoice = null;
    let voicesReadyResolve; const voicesReady = new Promise(res => voicesReadyResolve = res);

    function pickVoices() {
      if (!voices.length) return;
      thVoice = voices.find(v => v.lang === 'th-TH') || voices.find(v => v.lang?.toLowerCase().startsWith('th')) || null;
      enVoice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang?.toLowerCase().startsWith('en')) || null;
    }
    function loadVoices() {
      if (!synth) return;
      const list = synth.getVoices();
      if (list && list.length) {
        voices = list; pickVoices();
        if (voicesReadyResolve) { voicesReadyResolve = voicesReadyResolve(); }
      }
    }
    if (synth) { loadVoices(); if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices; }

    async function speak(text, lang = 'th') {
      if (!synth) { showCustomAlert('เบราว์เซอร์ของคุณไม่รองรับการอ่านออกเสียง'); return; }
      await voicesReady;
      const u = new SpeechSynthesisUtterance(text);
      if (lang === 'en') { u.lang = 'en-US'; if (enVoice) u.voice = enVoice; u.rate = 1.0; }
      else { u.lang = 'th-TH'; if (thVoice) u.voice = thVoice; u.rate = 0.9; }
      synth.cancel(); synth.speak(u);
    }

        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        <path d="M19.07 5.93a10 10 0 0 1 0 14.14"></path>
      </svg>`;
    }

    function createInteractiveThaiElement(item, customClasses = '', tag = 'div') {
      const container = document.createElement(tag);
      container.className = `interactive-thai sarabun-thai ${customClasses}`.trim();

      const thai = item.thai ?? item.title ?? '';
      const ipa  = item.phonetic ?? '';
      const en   = item.english ?? '';
      const thaiTTS = item.tts_text || thai;

      container.innerHTML = `
        <span class="thai-text text-lg">${thai}</span>
        <button class="speaker-icon" data-lang="th" aria-label="Speak Thai">${iconSvg()}</button>
        <button class="toggle-btn btn-ipa" aria-expanded="false">IPA</button>
        <button class="toggle-btn btn-en" aria-expanded="false">EN</button>
        <span class="phonetic hidden block mt-1 text-md">${ipa}</span>
        <span class="translation hidden block mt-1 text-md">
          <span class="en-text">${en}</span>
          <button class="speaker-icon ml-2 align-middle" data-lang="en" aria-label="Speak English">${iconSvg()}</button>
        </span>
      `;

      const thaiBtn = container.querySelector('.speaker-icon[data-lang="th"]');
      thaiBtn.addEventListener('click', (e) => { e.stopPropagation(); speak(thaiTTS, 'th'); });

      const ipaBtn = container.querySelector('.btn-ipa');
      const ipaEl = container.querySelector('.phonetic');
      ipaBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isHidden = ipaEl.classList.contains('hidden');
        ipaEl.classList.toggle('hidden');
        ipaBtn.setAttribute('aria-expanded', String(isHidden));
      });

      const enBtn = container.querySelector('.btn-en');
      const enWrap = container.querySelector('.translation');
      const enSpeak = container.querySelector('.speaker-icon[data-lang="en"]');
      enBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const isHidden = enWrap.classList.contains('hidden');
        enWrap.classList.toggle('hidden');
        enBtn.setAttribute('aria-expanded', String(isHidden));
      });
      enSpeak.addEventListener('click', (e) => {
        e.stopPropagation();
        const text = enWrap.querySelector('.en-text')?.textContent?.trim() || '';
        if (text) speak(text, 'en');
      });

      return container;
    }

    function createInteractiveFor(targetEl, data, customClasses = '') {
      const tagName = ['H1','H2','H3','H4','H5','H6','LI','SPAN'].includes(targetEl.tagName) ? 'span' : 'div';
      return createInteractiveThaiElement(data, customClasses, tagName);
    }

    /* -------------------- Page population -------------------- */
    const speakerMap = {
      'ตม.': { thai: 'ตม.', phonetic: 'dtɔɔ-mɔɔ', english: 'Immigration Officer (Airport)', tts_text: 'ตอมอ' },
      'นักท่องเที่ยว': { thai: 'นักท่องเที่ยว', phonetic: 'nák-thɔ̂ɔng-tîao', english: 'Tourist' },
      'เจ้าหน้าที่': { thai: 'เจ้าหน้าที่', phonetic: 'jâo-nâa-thîi', english: 'Officer (Immigration Office)' }
    };

    document.addEventListener('DOMContentLoaded', () => {
      // Header & section labels
      for (const id in interactivePhrases) {
        const el = document.getElementById(id);
        if (!el) continue;
        const block = createInteractiveFor(el, interactivePhrases[id]);
        el.innerHTML = '';
        el.appendChild(block);
      }

      // Vocabulary
      const vocabContainer = document.getElementById('vocab-grid');
      vocabContainer.innerHTML = '';
      vocabulary.forEach(word => {
        const item = createInteractiveThaiElement(word, 'border rounded-lg p-3 bg-slate-50');
        vocabContainer.appendChild(item);
      });

      // Additional Vocabulary (NEW)
      const extraVocabContainer = document.getElementById('extra-vocab-grid');
      if (extraVocabContainer) {
        extraVocabContainer.innerHTML = '';
        additionalVocabulary.forEach(word => {
          const item = createInteractiveThaiElement(word, 'border rounded-lg p-3 bg-slate-50');
          extraVocabContainer.appendChild(item);
        });
      }

      // Dialogue
      const dialogueContainer = document.getElementById('dialogue-container');
      dialogueContainer.innerHTML = '';
      for (const key in dialogue) {
        const scen = dialogue[key];

        const scenTitle = createInteractiveThaiElement(
          { thai: scen.title, phonetic: scen.phonetic, english: scen.english, tts_text: scen.title },
          'text-xl font-bold text-sky-700 mb-2',
          'div'
        );
        dialogueContainer.appendChild(scenTitle);

        const linesWrap = document.createElement('div');
        linesWrap.className = 'pl-4 border-l-2 border-sky-200 space-y-4';
        scen.lines.forEach(line => {
          const row = document.createElement('div');
          row.className = 'flex items-start gap-4 p-2';

          const speakerCol = document.createElement('div');
          speakerCol.className = 'w-1/4 md:w-1/6 text-right flex items-center justify-end';
          const speakerData = speakerMap[line.speaker] || { thai: line.speaker, phonetic: '', english: '' };
          const spk = createInteractiveThaiElement(speakerData, 'font-bold text-gray-700', 'span');
          speakerCol.appendChild(spk);
          const colon = document.createElement('span');
          colon.className = 'ml-1 font-bold text-gray-600 sarabun-thai';
          colon.textContent = ':';
          speakerCol.appendChild(colon);

          const contentCol = createInteractiveThaiElement(line, 'p-3 rounded-lg flex-1 text-lg bg-slate-50', 'div');

          row.appendChild(speakerCol);
          row.appendChild(contentCol);
          linesWrap.appendChild(row);
        });

        dialogueContainer.appendChild(linesWrap);
        const hr = document.createElement('hr');
        hr.className = 'my-4 border-t-2 border-gray-100';
        dialogueContainer.appendChild(hr);
      }
    });

    /* -------------------- Alerts -------------------- */
    const alertModal = document.getElementById('alert-modal');
    const alertMessage = document.getElementById('alert-message');
    const alertClose = document.getElementById('alert-close');
    function showCustomAlert(msg){ alertMessage.textContent = msg; alertModal.classList.add('visible'); }
    alertClose.addEventListener('click', () => alertModal.classList.remove('visible'));
  </script>
</body>
</html>

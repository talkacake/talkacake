<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- UI Components ---
        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
            const baseStyle = "px-4 py-3 rounded-xl font-bold transition-all shadow-sm flex items-center justify-center gap-2 text-lg active:scale-95";
            const variants = {
                primary: "bg-blue-500 text-white hover:bg-blue-600 disabled:bg-blue-300",
                secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200 border-2 border-gray-200",
                success: "bg-green-500 text-white hover:bg-green-600",
                danger: "bg-red-100 text-red-700 hover:bg-red-200 border-2 border-red-200"
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
                {children}
                </button>
            );
        };

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white rounded-3xl shadow-lg p-4 md:p-8 border border-gray-100 ${className}`}>
                {children}
            </div>
        );

        // --- Core Feature: Thai Text Block with TTS & Toggles ---
        const ThaiText = ({ thai, ipa, en, icon = "", className = "", compact = false }) => {
            const [showIpa, setShowIpa] = useState(false);
            const [showEn, setShowEn] = useState(false);

            const speak = (e) => {
                e.stopPropagation();
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(thai);
                utterance.lang = 'th-TH';
                utterance.rate = 0.85; 
                window.speechSynthesis.speak(utterance);
            };

            const toggleBtnClass = (isActive, activeColor) => 
                `px-2 py-1 md:px-3 md:py-2 rounded-lg font-bold text-xs md:text-sm transition-all shadow-sm border ${
                isActive ? `${activeColor} text-white border-transparent` : 'bg-gray-50 text-gray-600 border-gray-200'
                }`;

            return (
                <div className={`bg-white p-3 md:p-4 rounded-xl border-2 border-gray-100 shadow-sm w-full transition-all hover:border-blue-200 ${className}`}>
                <div className={`flex flex-wrap items-center justify-between gap-3 ${compact ? 'flex-col items-start' : ''}`}>
                    
                    {/* Main Thai Text & Icon */}
                    <div className="flex items-center gap-3">
                    {icon && <span className="text-3xl md:text-4xl">{icon}</span>}
                    <span className="text-xl md:text-2xl font-black text-gray-800 tracking-wide">{thai}</span>
                    </div>

                    {/* Action Buttons */}
                    <div className="flex gap-2 items-center w-full md:w-auto justify-end">
                    <button 
                        onClick={speak} 
                        className="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center hover:bg-blue-200 active:scale-95 transition-all text-xl shadow-sm border border-blue-200" 
                        aria-label="Play audio"
                    >
                        🔊
                    </button>
                    {ipa && (
                        <button onClick={(e) => { e.stopPropagation(); setShowIpa(!showIpa); }} className={toggleBtnClass(showIpa, 'bg-purple-500')}>
                        IPA
                        </button>
                    )}
                    {en && (
                        <button onClick={(e) => { e.stopPropagation(); setShowEn(!showEn); }} className={toggleBtnClass(showEn, 'bg-green-500')}>
                        EN
                        </button>
                    )}
                    </div>
                </div>

                {/* Expanded Info */}
                {(showIpa || showEn) && (
                    <div className="pt-3 mt-2 border-t border-gray-100 flex flex-col gap-1 text-left animate-fade-in">
                    {showIpa && <span className="text-purple-600 font-bold text-lg leading-relaxed">{ipa}</span>}
                    {showEn && <span className="text-green-600 font-bold text-lg leading-relaxed">{en}</span>}
                    </div>
                )}
                </div>
            );
        };

        // --- Main App Component ---
        function App() {
            const [currentStep, setCurrentStep] = useState(0);

            const steps = [
                { id: 'intro' },
                { id: 'task1' },
                { id: 'task2' },
                { id: 'task3' },
                { id: 'task4' },
                { id: 'extension' }
            ];

            return (
                <div className="min-h-screen pb-20">
                {/* Top Navigation Bar */}
                <nav className="fixed top-0 w-full bg-white/90 backdrop-blur-md shadow-sm z-50 px-4 py-3 flex justify-between items-center">
                    <div className="font-bold text-xl text-blue-600 flex items-center gap-2">
                    🇹🇭 <span className="hidden sm:inline">Review</span>
                    </div>
                    <div className="flex items-center gap-4">
                    <div className="px-4 py-2 bg-blue-50 text-blue-700 font-bold rounded-full border border-blue-200 shadow-sm">
                        🎯 {currentStep} / {steps.length - 1}
                    </div>
                    </div>
                </nav>

                {/* Main Content Area */}
                <main className="pt-24 px-4 max-w-3xl mx-auto">
                    {/* Progress Bar */}
                    <div className="w-full bg-gray-200 h-3 rounded-full mb-8 overflow-hidden shadow-inner">
                    <div 
                        className="bg-blue-500 h-3 rounded-full transition-all duration-500 ease-out"
                        style={{ width: `${(currentStep / (steps.length - 1)) * 100}%` }}
                    ></div>
                    </div>

                    {/* Step Routing */}
                    <div className="animate-fade-in-up">
                    {currentStep === 0 && <StepIntro setStep={setCurrentStep} />}
                    {currentStep === 1 && <Task1_Matching setStep={setCurrentStep} />}
                    {currentStep === 2 && <Task2_Jumbled setStep={setCurrentStep} />}
                    {currentStep === 3 && <Task3_GapFill setStep={setCurrentStep} />}
                    {currentStep === 4 && <Task4_InteractiveConvo setStep={setCurrentStep} />}
                    {currentStep === 5 && <Task5_Extension setStep={setCurrentStep} />}
                    </div>
                </main>
                </div>
            );
        }

        // ==========================================
        // STEP COMPONENTS
        // ==========================================

        function StepIntro({ setStep }) {
            return (
                <div className="space-y-6">
                <ThaiText 
                    icon="👋" 
                    thai="สวัสดี! ยินดีต้อนรับ" 
                    ipa="sà-wàt-dii! yin-dii dtɔ̂ɔn-ráp" 
                    en="Hello! Welcome" 
                    className="text-center shadow-md bg-blue-50 border-blue-200" 
                />
                
                <Card className="space-y-6">
                    <ThaiText 
                    icon="📖" 
                    thai="คำแนะนำ" 
                    ipa="kam nɛ́-nam" 
                    en="Instructions" 
                    />
                    
                    <div className="space-y-4 bg-yellow-50 p-4 rounded-xl border border-yellow-200">
                    <ThaiText 
                        icon="1️⃣" 
                        thai="พยายามอ่านก่อน" 
                        ipa="pá-yaa-yaam àan gɔ̀ɔn" 
                        en="Try to read first" 
                    />
                    <ThaiText 
                        icon="2️⃣" 
                        thai="เดาความหมาย" 
                        ipa="dao kwaam-mǎai" 
                        en="Guess the meaning" 
                    />
                    <ThaiText 
                        icon="3️⃣" 
                        thai="กดปุ่ม IPA หรือ EN ถ้าไม่รู้" 
                        ipa="gòt bpùm IPA rʉ̌ʉ EN tâa mâi rúu" 
                        en="Press the IPA or EN button if you don't know" 
                    />
                    </div>

                    <Button onClick={() => setStep(1)} className="w-full py-4 text-xl mt-8 shadow-md">
                    🚀 เริ่มเรียน (rə̂əm rian / Start)
                    </Button>
                </Card>
                </div>
            );
        }

        // ------------------------------------------
        // TASK 1: MATCHING & Q&A
        // ------------------------------------------
        function Task1_Matching({ setStep }) {
            const pairs = [
                { id: 1, thai: "กลัว", ipa: "glua", en: "Afraid", icon: "😨" },
                { id: 2, thai: "รังเกียจ", ipa: "rang-gìat", en: "Disgusted", icon: "🤢" },
                { id: 3, thai: "โกรธ", ipa: "gòh-roht", en: "Angry", icon: "😡" },
                { id: 4, thai: "อาย", ipa: "aai", en: "Shy/Embarrassed", icon: "😳" },
                { id: 5, thai: "งง", ipa: "ngong", en: "Confused", icon: "😵‍💫" },
            ];

            const [selectedThai, setSelectedThai] = useState(null);
            const [selectedIcon, setSelectedIcon] = useState(null);
            const [matchedIds, setMatchedIds] = useState([]);

            const handleSelectThai = (item) => {
                if (matchedIds.includes(item.id)) return;
                setSelectedThai(item);
                checkMatch(item, selectedIcon);
            };

            const handleSelectIcon = (item) => {
                if (matchedIds.includes(item.id)) return;
                setSelectedIcon(item);
                checkMatch(selectedThai, item);
            };

            const checkMatch = (tItem, iItem) => {
                if (tItem && iItem) {
                if (tItem.id === iItem.id) {
                    setMatchedIds([...matchedIds, tItem.id]);
                }
                setTimeout(() => {
                    setSelectedThai(null);
                    setSelectedIcon(null);
                }, 500);
                }
            };

            const isComplete = matchedIds.length === pairs.length;

            return (
                <div className="space-y-6">
                <ThaiText icon="🧠" thai="งานที่ 1: จับคู่ความรู้สึก" ipa="ngaan tîi nʉ̀ng: jàp-kûu kwaam-rúu-sʉ̀k" en="Task 1: Match the feelings" className="bg-blue-100 border-blue-300" />

                <Card>
                    <div className="grid grid-cols-2 gap-4 md:gap-8 mb-8">
                    {/* Thai Column */}
                    <div className="space-y-3">
                        {[...pairs].sort((a,b) => a.thai.localeCompare(b.thai)).map(item => (
                        <div 
                            key={`t-${item.id}`} 
                            onClick={() => handleSelectThai(item)}
                            className={`cursor-pointer rounded-xl transition-all ${matchedIds.includes(item.id) ? 'opacity-40 grayscale pointer-events-none' : ''} ${selectedThai?.id === item.id ? 'ring-4 ring-blue-400' : ''}`}
                        >
                            <ThaiText thai={item.thai} ipa={item.ipa} en={item.en} compact={true} />
                        </div>
                        ))}
                    </div>

                    {/* Icons Column */}
                    <div className="space-y-3">
                        {[...pairs].sort((a,b) => b.id - a.id).map(item => (
                        <button
                            key={`i-${item.id}`}
                            onClick={() => handleSelectIcon(item)}
                            disabled={matchedIds.includes(item.id)}
                            className={`w-full h-full min-h-[80px] rounded-xl text-5xl transition-all border-4 flex items-center justify-center bg-gray-50
                            ${matchedIds.includes(item.id) ? 'border-green-400 bg-green-50 opacity-40 grayscale' : 
                                selectedIcon?.id === item.id ? 'border-blue-400 shadow-md scale-105' : 
                                'border-gray-200 hover:border-blue-300'}
                            `}
                        >
                            {item.icon}
                        </button>
                        ))}
                    </div>
                    </div>

                    {isComplete && (
                    <div className="bg-green-50 p-4 md:p-6 rounded-2xl border-2 border-green-300 animate-fade-in text-center space-y-4 shadow-sm">
                        <ThaiText icon="🎉" thai="ถูกต้อง! เก่งมาก" ipa="tùuk-dtɔ̂ɔng! gèng mâak" en="Correct! Very good" className="bg-green-100 border-green-400" />
                        
                        <div className="pt-4 border-t border-green-200 space-y-4">
                        <ThaiText icon="🗣️" thai="ถามและตอบกับครู" ipa="tǎam lɛ́ dtɔ̀ɔp gàp kruu" en="Ask and answer with the teacher" />
                        
                        <div className="space-y-2">
                            <ThaiText icon="🧑‍🏫" thai="ครั้งที่แล้วเมื่อไร" ipa="kráng tîi-lɛ́ɛo mʉ̂a-rài?" en="When was the last time?" />
                            <ThaiText icon="👨" thai="ผม ... ครับ" ipa="pǒm ... kráp" en="I was ... (polite masc)" />
                            <ThaiText icon="👉" thai="แล้วคุณล่ะ" ipa="lɛ́ɛw kun lâ?" en="And you?" />
                        </div>
                        </div>
                        
                        <Button onClick={() => setStep(2)} className="mt-6 mx-auto w-full">ต่อไป ➡️</Button>
                    </div>
                    )}
                </Card>
                </div>
            );
        }

        // ------------------------------------------
        // TASK 2: JUMBLED SENTENCES & INTERVIEW
        // ------------------------------------------
        function Task2_Jumbled({ setStep }) {
            const sentences = [
                {
                id: 1,
                words: [
                    { id: 'w1', thai: 'ผม', ipa: 'pǒm', en: 'I (masc)' },
                    { id: 'w2', thai: 'ชอบ', ipa: 'chɔ̂ɔp', en: 'like' },
                    { id: 'w3', thai: 'กิน', ipa: 'gin', en: 'to eat' },
                    { id: 'w4', thai: 'ข้าวกะเพรา', ipa: 'kâao gà-prao', en: 'basil rice' }
                ],
                correctOrder: ['w1', 'w2', 'w3', 'w4']
                },
                {
                id: 2,
                words: [
                    { id: 'w5', thai: 'จอง', ipa: 'jaawng', en: 'book/reserve' },
                    { id: 'w6', thai: 'โรงแรมหมา', ipa: 'roong-rɛɛm mǎa', en: 'dog hotel' },
                    { id: 'w7', thai: 'กี่', ipa: 'gìi', en: 'how many' },
                    { id: 'w8', thai: 'คืน', ipa: 'kʉʉn', en: 'nights' }
                ],
                correctOrder: ['w5', 'w6', 'w7', 'w8']
                },
                {
                id: 3,
                words: [
                    { id: 'w9', thai: 'ขับรถ', ipa: 'kàp rót', en: 'drive' },
                    { id: 'w10', thai: 'กลับบ้าน', ipa: 'glàp bâan', en: 'return home' },
                    { id: 'w11', thai: 'กี่', ipa: 'gìi', en: 'how many' },
                    { id: 'w12', thai: 'ชั่วโมง', ipa: 'chûa-moong', en: 'hours' }
                ],
                correctOrder: ['w9', 'w10', 'w11', 'w12']
                },
                {
                id: 4,
                words: [
                    { id: 'w13', thai: 'ติดตั้ง', ipa: 'dtìt-dtâng', en: 'install' },
                    { id: 'w14', thai: 'ถังอ็อกซิเจน', ipa: 'tǎng ɔ́k-sì-jen', en: 'oxygen tank' },
                    { id: 'w15', thai: 'ให้', ipa: 'hâi', en: 'for/give' },
                    { id: 'w16', thai: 'คนไทย', ipa: 'kon tai', en: 'Thai people' }
                ],
                correctOrder: ['w13', 'w14', 'w15', 'w16']
                },
                {
                id: 5,
                words: [
                    { id: 'w17', thai: 'ขอ', ipa: 'kɔ̌ɔ', en: 'ask for' },
                    { id: 'w18', thai: 'เมนู', ipa: 'mee-nuu', en: 'menu' },
                    { id: 'w19', thai: 'ภาษาอังกฤษ', ipa: 'paa-sǎa ang-grìt', en: 'English language' },
                    { id: 'w20', thai: 'หน่อย', ipa: 'nɔ̀ɔi', en: 'please/a bit' }
                ],
                correctOrder: ['w17', 'w18', 'w19', 'w20']
                }
            ];

            const [activeSentence, setActiveSentence] = useState(0);
            const [currentSlots, setCurrentSlots] = useState([]);
            
            const [availableWords, setAvailableWords] = useState(() => 
                [...sentences[0].words].sort(() => Math.random() - 0.5)
            );

            const handleWordClick = (word) => {
                setAvailableWords(availableWords.filter(w => w.id !== word.id));
                setCurrentSlots([...currentSlots, word]);
            };

            const handleSlotClick = (word) => {
                setCurrentSlots(currentSlots.filter(w => w.id !== word.id));
                setAvailableWords([...availableWords, word]);
            };

            const currentData = sentences[activeSentence];
            
            const isSentenceCorrect = currentSlots.length === currentData?.words.length && 
                currentSlots.every((w, i) => w.id === currentData.correctOrder[i]);

            const nextSentence = () => {
                if (activeSentence < sentences.length - 1) {
                    const nextIdx = activeSentence + 1;
                    setActiveSentence(nextIdx);
                    setCurrentSlots([]); 
                    setAvailableWords([...sentences[nextIdx].words].sort(() => Math.random() - 0.5)); 
                } else {
                    setActiveSentence(sentences.length);
                }
            };

            return (
                <div className="space-y-6">
                <ThaiText icon="⏰" thai="งานที่ 2: เรียงประโยค" ipa="ngaan tîi sɔ̌ɔng: riang bprà-yòok" en="Task 2: Order Sentences" className="bg-blue-100 border-blue-300" />

                <Card>
                    {activeSentence < sentences.length ? (
                    <div className="space-y-6">
                        <ThaiText icon="🧩" thai="เรียงประโยคให้ถูกต้อง" ipa="riang bprà-yòok hâi tùuk-dtɔ̂ɔng" en="Order the sentence correctly" />
                        
                        {/* Answer Slots */}
                        <div className="flex flex-wrap gap-2 min-h-[120px] p-4 bg-gray-100 rounded-2xl border-4 border-dashed border-gray-300 items-start">
                        {currentSlots.length === 0 && <span className="text-gray-400 italic text-lg w-full text-center mt-4">👉 กดเลือกคำด้านล่าง</span>}
                        {currentSlots.map(w => (
                            <div key={w.id} onClick={() => handleSlotClick(w)} className="cursor-pointer hover:opacity-80 w-full sm:w-auto">
                            <ThaiText thai={w.thai} ipa={w.ipa} en={w.en} className="bg-blue-50 border-blue-300 shadow-md" compact={true} />
                            </div>
                        ))}
                        </div>

                        {/* Available Words */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-4 border-t border-gray-100">
                        {availableWords.map(w => (
                            <div key={w.id} onClick={() => handleWordClick(w)} className="cursor-pointer hover:scale-95 transition-transform">
                            <ThaiText thai={w.thai} ipa={w.ipa} en={w.en} compact={true} />
                            </div>
                        ))}
                        </div>

                        {isSentenceCorrect && (
                        <div className="text-center animate-fade-in mt-8 p-6 bg-green-50 rounded-2xl border border-green-200">
                            <ThaiText icon="✅" thai="ถูกต้อง!" ipa="tùuk-dtɔ̂ɔng!" en="Correct!" className="bg-green-100 border-green-400 mb-4" />
                            <Button onClick={nextSentence} className="mx-auto w-full">
                                {activeSentence < sentences.length - 1 ? "ข้อต่อไป ➡️" : "ไปที่บทสัมภาษณ์ ➡️"}
                            </Button>
                        </div>
                        )}
                    </div>
                    ) : (
                    <div className="bg-yellow-50 p-4 md:p-6 rounded-2xl border-2 border-yellow-300 animate-fade-in space-y-6">
                        <ThaiText icon="🎙️" thai="ถามคำถามครู" ipa="tǎam kǎm-tǎam kruu" en="Ask the teacher questions" className="bg-yellow-100 border-yellow-400" />
                        
                        <div className="space-y-4">
                        <ThaiText icon="1️⃣" thai="ตื่นกี่โมง" ipa="dtʉ̀ʉn gìi moong?" en="What time do you wake up?" />
                        <ThaiText icon="2️⃣" thai="ขับรถกลับบ้านกี่ชั่วโมง" ipa="kàp rót glàp bâan gìi chûa-moong?" en="How many hours to drive home?" />
                        <ThaiText icon="3️⃣" thai="จองกี่ห้อง" ipa="jaawng gìi hɔ̂ɔng?" en="How many rooms did you book?" />
                        <ThaiText icon="4️⃣" thai="ชอบกินอะไรบ้าง" ipa="chɔ̂ɔp gin à-rai bâang?" en="What do you like to eat?" />
                        <ThaiText icon="5️⃣" thai="ทำงานเรียบร้อยไหม" ipa="tam-ngaan rîap-rɔ́ɔi mái?" en="Is the work finished/neat?" />
                        </div>

                        <Button onClick={() => setStep(3)} className="w-full mt-6">ต่อไป ➡️</Button>
                    </div>
                    )}
                </Card>
                </div>
            );
        }

        // ------------------------------------------
        // TASK 3: GAP FILL & ROLEPLAY (Various Situations)
        // ------------------------------------------
        function Task3_GapFill({ setStep }) {
            const [answers, setAnswers] = useState({ q1: null, q2: null, q3: null, q4: null, q5: null });
            
            const questions = [
                {
                id: 'q1',
                icon: '🤝',
                sentenceBefore: 'พยายาม',
                sentenceAfter: 'คน',
                ipaBefore: 'pá-yaa-yaam ',
                ipaAfter: ' kon',
                options: [
                    { thai: 'ช่วย', ipa: 'chûay', en: 'help' },
                    { thai: 'ตี', ipa: 'dtii', en: 'hit' },
                    { thai: 'ซ่อน', ipa: 'sɔ̂n', en: 'hide' }
                ],
                correct: 'ช่วย'
                },
                {
                id: 'q2',
                icon: '🏦',
                sentenceBefore: 'มี',
                sentenceAfter: 'ธนาคาร 2 บัญชี',
                ipaBefore: 'mii ',
                ipaAfter: ' tá-naa-kaan sɔ̌ɔng ban-chii',
                options: [
                    { thai: 'บัญชี', ipa: 'ban-chii', en: 'account' },
                    { thai: 'เอกสาร', ipa: 'èek-gà-sǎan', en: 'document' },
                    { thai: 'รหัส', ipa: 'rá-hàt', en: 'password' }
                ],
                correct: 'บัญชี'
                },
                {
                id: 'q3',
                icon: '🏠',
                sentenceBefore: '',
                sentenceAfter: 'ขึ้นราคา 10% ทุกปี',
                ipaBefore: '',
                ipaAfter: ' kʉ̂n raa-kaa sìp pboer-cen túk bpii',
                options: [
                    { thai: 'บ้าน', ipa: 'bâan', en: 'house' },
                    { thai: 'พาสปอร์ต', ipa: 'páat-bpòt', en: 'passport' },

                            <ThaiText thai={`${currentData.contextThai}${currentData.correctWordThai}`} ipa={`${currentData.contextIpa}${currentData.correctWordIpa}`} en={currentData.correctWordEn} icon={currentData.correctIcon} />
                            <Button onClick={nextError} className="mx-auto mt-4 w-full">
                                {activeError < errors.length - 1 ? "ข้อต่อไป ➡️" : "ดูสรุป ➡️"}
                            </Button>
                            </div>
                        )}
                        </div>
                    ) : (
                        <div className="mt-8 pt-8 border-t border-purple-200 animate-fade-in space-y-6">
                        <ThaiText icon="🗣️" thai="คุยและแสดงความคิดเห็น" ipa="kui lɛ́ sà-dɛɛng kwaam-kít-hěn" en="Discuss and share opinions" />
                        
                        <div className="space-y-4">
                            <ThaiText icon="1️⃣" thai="ทำงานเยอะ ดีไหม?" ipa="tam-ngaan yə́, dii mái?" en="Is working a lot good?" className="bg-white border-blue-200" />
                            <ThaiText icon="2️⃣" thai="ซื้อที่ดิน เป็นการลงทุนที่ดีไหม?" ipa="sʉ́ʉ tîi-din bpen gaan-long-tun tîi dii mái?" en="Is buying land a good investment?" className="bg-white border-blue-200" />
                            <ThaiText icon="3️⃣" thai="ทำธุรกิจกับคนจีน ยากไหม?" ipa="tam tú-rá-gìt gàp kon jiin yâak mái?" en="Is doing business with Chinese people difficult?" className="bg-white border-blue-200" />
                            <ThaiText icon="4️⃣" thai="เที่ยวรอบโลก ดีไหม?" ipa="tîao rɔ̂ɔp lôok dii mái?" en="Is traveling around the world good?" className="bg-white border-blue-200" />
                            <ThaiText icon="5️⃣" thai="มีบ้านหลายหลัง ดีไหม?" ipa="mii bâan lǎai lǎng dii mái?" en="Is having many houses good?" className="bg-white border-blue-200" />
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-sm border border-purple-100 mt-6">
                            <ThaiText icon="💡" thai="ตัวอย่างคำตอบ" ipa="dtua-yàang kam-dtɔ̀ɔp" en="Example Answers" />
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                                <div className="space-y-2 p-4 bg-green-50 rounded-xl border border-green-200">
                                    <ThaiText icon="👍" thai="ดี" ipa="dii" en="Good" />
                                    <ThaiText thai="มีเงินเยอะ" ipa="mii ngən yə́" en="Have lots of money" icon="💰" />
                                </div>
                                <div className="space-y-2 p-4 bg-red-50 rounded-xl border border-red-200">
                                    <ThaiText icon="👎" thai="ไม่ดี" ipa="mâi dii" en="Not good" />
                                    <ThaiText thai="ไม่มีเวลา" ipa="mâi mii wee-laa" en="No time" icon="⏰" />
                                </div>
                            </div>
                        </div>

                        </div>
                    )}
                </Card>
                
                {activeError >= errors.length && (
                    <div className="text-center pb-10 space-y-6 mt-10">
                    <ThaiText icon="🎉" thai="จบการเรียน" ipa="jòp gaan rian" en="End of lesson" className="text-center bg-yellow-100 border-yellow-400 max-w-sm mx-auto" />
                    <Button onClick={() => setStep(0)} variant="secondary" className="mx-auto border-gray-300">เริ่มใหม่ (Restart)</Button>
                    </div>
                )}
                </div>
            );
        }

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

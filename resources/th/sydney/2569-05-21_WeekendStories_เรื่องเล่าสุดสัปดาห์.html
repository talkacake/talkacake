<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เรื่องเล่าสุดสัปดาห์ Weekend Stories / Catch-up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0fdfa; /* Light teal background */
        }
        .btn-press {
            transition: all 0.1s ease;
        }
        .btn-press:active {
            transform: scale(0.95);
        }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="text-gray-800 pb-20">

    <!-- Top Navigation / Header -->
    <header class="bg-teal-600 text-white p-6 shadow-md sticky top-0 z-50 rounded-b-3xl">
        <div class="max-w-3xl mx-auto flex flex-col items-center text-center">
            <h1 class="text-3xl font-bold mb-2 flex items-center gap-2">
                เรื่องเล่าสุดสัปดาห์ 🌤️🏡
            </h1>
            <div class="flex gap-2 mt-2">
                <button onclick="speakTh('เรื่องเล่าสุดสัปดาห์')" class="btn-press bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1 backdrop-blur-sm">
                    🔊 ฟัง
                </button>
                <button onclick="toggleVisibility('header-ipa')" class="btn-press bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-full text-sm font-semibold backdrop-blur-sm">
                    🗣️ IPA
                </button>
                <button onclick="toggleVisibility('header-en')" class="btn-press bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-full text-sm font-semibold backdrop-blur-sm">
                    🇬🇧 EN
                </button>
            </div>
            <div id="header-ipa" class="hidden mt-3 text-teal-100 font-mono text-lg bg-teal-800/50 px-4 py-1 rounded-lg">rʉ̂ang lâo sùt-sàp-daa</div>
            <div id="header-en" class="hidden mt-1 text-white font-medium bg-teal-800/50 px-4 py-1 rounded-lg">Weekend Stories / Catch-up</div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 mt-8 space-y-12">

        <!-- Section 1: Q&A Warm Up -->
        <section id="section-warmup" class="bg-white rounded-3xl p-6 shadow-sm border border-teal-100">
            <!-- Header generated by JS -->
            <div id="header-warmup"></div>
            <div class="mt-6 space-y-4 max-h-[500px] overflow-y-auto pr-2 rounded-xl border border-gray-100 bg-gray-50/50 p-2" id="qa-container">
                <!-- 30 Q&A blocks injected here -->
            </div>
        </section>

        <!-- Section 2: Reading Baby Steps -->
        <section id="section-reading" class="bg-white rounded-3xl p-6 shadow-sm border border-purple-100">
            <div id="header-reading"></div>
            
            <div class="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-6">
                <!-- Consonant Cho Chang -->
                <div class="bg-purple-50 rounded-2xl p-5 border border-purple-100 text-center flex flex-col items-center justify-center">
                    <div class="text-6xl font-bold text-purple-700 mb-2">ช</div>
                    <button onclick="speakTh('ช ช้าง')" class="btn-press bg-purple-200 text-purple-800 px-3 py-1 rounded-full text-sm font-bold mb-4">🔊 choo-cháang</button>
                    <p class="text-sm text-purple-600 mb-4 font-semibold">Find 'ช' in these words:</p>
                    <div class="w-full space-y-2" id="reading-cho"></div>
                </div>

                <!-- Vowel Sara E -->
                <div class="bg-pink-50 rounded-2xl p-5 border border-pink-100 text-center flex flex-col items-center justify-center">
                    <div class="text-6xl font-bold text-pink-700 mb-2">เ-</div>
                    <button onclick="speakTh('สระ เอ')" class="btn-press bg-pink-200 text-pink-800 px-3 py-1 rounded-full text-sm font-bold mb-4">🔊 sà-rà-e</button>
                    <p class="text-sm text-pink-600 mb-4 font-semibold">Find 'เ-' in these words:</p>
                    <div class="w-full space-y-2" id="reading-e"></div>
                </div>

                <!-- Consonant Gaw Gai (Review) -->
                <div class="bg-blue-50 rounded-2xl p-5 border border-blue-100 text-center flex flex-col items-center justify-center">
                    <div class="text-6xl font-bold text-blue-700 mb-2">ก</div>
                    <button onclick="speakTh('ก ไก่')" class="btn-press bg-blue-200 text-blue-800 px-3 py-1 rounded-full text-sm font-bold mb-4">🔊 gaw-gài</button>
                    <p class="text-sm text-blue-600 mb-4 font-semibold">Review: Find 'ก' in these words:</p>
                    <div class="w-full space-y-2" id="reading-gaw"></div>
                </div>

                <!-- Consonant Ngo Ngu & Vowel Sara Aa (Review) -->
                <div class="bg-yellow-50 rounded-2xl p-5 border border-yellow-100 text-center flex flex-col items-center justify-center">
                    <div class="text-6xl font-bold text-yellow-700 mb-2">ง / -า</div>
                    <button onclick="speakTh('ง งู, สระ อา')" class="btn-press bg-yellow-200 text-yellow-800 px-3 py-1 rounded-full text-sm font-bold mb-4">🔊 ngaw-ngoo, sà-rà-aa</button>
                    <p class="text-sm text-yellow-600 mb-4 font-semibold">Review: Find 'ง' or '-า' in these words:</p>
                    <div class="w-full space-y-2" id="reading-ngo-aa"></div>
                </div>
            </div>
        </section>

        <!-- Section 3: Roleplay -->
        <section id="section-roleplay" class="bg-white rounded-3xl p-6 shadow-sm border border-blue-100">
            <div id="header-roleplay"></div>
            <div class="mt-6 space-y-4 bg-blue-50/30 p-4 rounded-2xl border border-blue-50" id="roleplay-container">
                <!-- Dialogues injected here -->
            </div>
        </section>

        <!-- Section 4: Game (Have you ever?) -->
        <section id="section-game" class="bg-white rounded-3xl p-6 shadow-sm border border-orange-100">
            <div id="header-game"></div>
            <div class="mt-6 space-y-4" id="game-container">
                <!-- Game items injected here -->
            </div>
        </section>

        <!-- Section 5: Story-telling -->
        <section id="section-story" class="bg-white rounded-3xl p-6 shadow-sm border border-green-100">
            <div id="header-story"></div>
            <div class="mt-6 space-y-4 bg-green-50/30 p-4 rounded-2xl border border-green-50" id="story-container">
                <!-- Story items injected here -->
            </div>
        </section>

    </main>

    <script>
        // --- 1. Global Utilities ---
        
        let currentAudio = null;

        function speakTh(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.85; 
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        function toggleVisibility(elementId) {
            const el = document.getElementById(elementId);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                el.classList.add('block');
            } else {
                el.classList.remove('block');
                el.classList.add('hidden');
            }
        }

        // Component Generator for standard Interactive Text Blocks
        function createBlock(th, ipa, en, emoji, bgClass = 'bg-white border-gray-100 hover:bg-gray-50') {
            const id = 'block-' + Math.random().toString(36).substr(2, 9);
            return `
                <div class="p-4 rounded-2xl shadow-sm border ${bgClass} transition-colors mb-4">
                    <div class="text-2xl text-gray-800 font-semibold mb-3 flex items-center flex-wrap gap-2">
                        <span>${th}</span> <span class="text-2xl">${emoji}</span>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="speakTh('${th}')" class="btn-press flex items-center gap-1 bg-pink-100 hover:bg-pink-200 text-pink-700 px-3 py-1.5 rounded-full text-sm font-bold">
                            🔊 ฟัง
                        </button>
                        <button onclick="toggleVisibility('ipa-${id}')" class="btn-press flex items-center gap-1 bg-purple-100 hover:bg-purple-200 text-purple-700 px-3 py-1.5 rounded-full text-sm font-bold">
                            🗣️ IPA
                        </button>
                        <button onclick="toggleVisibility('en-${id}')" class="btn-press flex items-center gap-1 bg-teal-100 hover:bg-teal-200 text-teal-700 px-3 py-1.5 rounded-full text-sm font-bold">
                            🇬🇧 EN
                        </button>
                    </div>
                    <div id="ipa-${id}" class="hidden mt-3 p-3 bg-purple-50 text-purple-800 rounded-xl font-mono text-lg border border-purple-100">
                        ${ipa}
                    </div>
                    <div id="en-${id}" class="hidden mt-2 p-3 bg-teal-50 text-teal-800 rounded-xl text-lg font-medium border border-teal-100">
                        ${en}
                    </div>
                </div>
            `;
        }

            { role: "Neighbor", th: "สวัสดีครับ คุณเป็นช่างสักใช่ไหม", ipa: "sà-wàt-dee kráp. kun bpen châang sàk châi mǎi?", en: "Hello. You are a tattoo artist, right?", emoji: "👋🖋️" },

        const readingChoData = [
            { th: "ช่างไฟ", ipa: "châang fai", en: "electrician" },
            { th: "ช่างสัก", ipa: "châang sàk", en: "tattoo artist" },
            { th: "ชื้น", ipa: "chʉ́ʉn", en: "humid/damp" }
        ];

        const readingEData = [
            { th: "เคย", ipa: "kheuy", en: "used to / have been" },
            { th: "เร็ว", ipa: "reo", en: "fast" },
            { th: "เจอ", ipa: "jəə", en: "meet" }
        ];

        // New data for Gaw Gai
        const readingGawData = [
            { th: "ตลก", ipa: "dtà-lòk", en: "funny" },
            { th: "แปลก", ipa: "plàek", en: "strange" },
            { th: "เข้าใจ", ipa: "kâo-jai", en: "understand" }
        ];

        // New data for Ngo Ngu and Sara Aa
        const readingNgoAaData = [
            { th: "ล้างจาน", ipa: "láang jaan", en: "wash dishes" },
            { th: "อ่าน", ipa: "àan", en: "to read" },
            { th: "เพื่อนบ้าน", ipa: "pʉ̂an bâan", en: "neighbor" }
        ];

        // --- 3. Initialization ---

        window.onload = () => {
            // Render Section Headers
            Object.keys(sectionHeaders).forEach(key => {
                const headData = sectionHeaders[key];
                const headId = 'header-' + key;
                document.getElementById(headId).innerHTML = createBlock(headData.th, headData.ipa, headData.en, headData.emoji, 'bg-transparent border-0 !p-0 !mb-0 shadow-none');
            });

            // Render Q&A
            const qaHtml = qaQuestions.map((q, index) => createBlock(`${index + 1}. ${q.th}`, q.ipa, q.en, q.emoji, 'bg-white border-teal-100')).join('');
            document.getElementById('qa-container').innerHTML = qaHtml;

            // Render Roleplay
            const rpHtml = roleplayData.map(r => {
                const color = r.role === 'You' ? 'bg-blue-100 border-blue-200' : 'bg-green-100 border-green-200';
                return createBlock(`[${r.role}] ${r.th}`, r.ipa, r.en, r.emoji, color);
            }).join('');
            document.getElementById('roleplay-container').innerHTML = rpHtml;

            // Render Game
            const gameHtml = gameData.map(g => createBlock(g.th, g.ipa, g.en, g.emoji, 'bg-orange-50 border-orange-200')).join('');
            document.getElementById('game-container').innerHTML = gameHtml;

            // Render Story
            const storyHtml = storyData.map(s => createBlock(s.th, s.ipa, s.en, s.emoji, 'bg-yellow-50 border-yellow-200')).join('');
            document.getElementById('story-container').innerHTML = storyHtml;

            // Render Reading
            const renderReadingItem = (item, color) => `
                <div class="bg-white rounded-xl p-3 shadow-sm border border-${color}-100 flex justify-between items-center w-full">
                    <span class="text-xl font-bold text-gray-800">${item.th}</span>
                    <div class="flex gap-1">
                        <button onclick="speakTh('${item.th}')" class="btn-press bg-${color}-100 text-${color}-700 p-1.5 rounded-lg text-xs font-bold">🔊</button>
                        <button onclick="toggleVisibility('read-${item.ipa.replace(/ /g, '')}')" class="btn-press bg-gray-100 text-gray-700 p-1.5 rounded-lg text-xs font-bold">👀</button>
                    </div>
                </div>
                <div id="read-${item.ipa.replace(/ /g, '')}" class="hidden w-full text-center p-2 text-sm bg-${color}-50 text-${color}-800 rounded-lg mb-2 border border-${color}-100">
                    <span class="font-mono">${item.ipa}</span> <br> ${item.en}
                </div>
            `;
            
            document.getElementById('reading-cho').innerHTML = readingChoData.map(item => renderReadingItem(item, 'purple')).join('');
            document.getElementById('reading-e').innerHTML = readingEData.map(item => renderReadingItem(item, 'pink')).join('');
            document.getElementById('reading-gaw').innerHTML = readingGawData.map(item => renderReadingItem(item, 'blue')).join('');
            document.getElementById('reading-ngo-aa').innerHTML = readingNgoAaData.map(item => renderReadingItem(item, 'yellow')).join('');
        };
    </script>
</body>
</html>

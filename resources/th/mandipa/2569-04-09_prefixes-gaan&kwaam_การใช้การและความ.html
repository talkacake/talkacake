            { speaker: "👩‍🦰", thai: "ทำไมล่ะคะ", ipa: "tam-mai lâ ká", en: "Why?" },
            { speaker: "👨", thai: "เพราะว่าวันนี้มีงานเยอะมากครับ", ipa: "pró-wâa wan-níi mii ngaan yóe mâak kráp", en: "Because there's a lot of work today." },
            { speaker: "👩‍🦰", thai: "อ๋อ แล้วการเรียนภาษาไทยล่ะ สนุกไหม", ipa: "ŏr, láew gaan-riian paa-săa-thai lâ, sà-nùk măi", en: "Oh, and what about learning Thai? Is it fun?" },
            { speaker: "👨", thai: "สนุกครับ การเรียนทำให้ผมมีความสุขมาก", ipa: "sà-nùk kráp, gaan-riian tam-hâi pŏm mii kwaam-sùk mâak", en: "It's fun. Learning gives me a lot of happiness." },
            { speaker: "👩‍🦰", thai: "ดีจัง การพักผ่อนก็สำคัญนะ ไปหาของหวานกินกันเถอะ", ipa: "dii jang, gaan-pák-pòn gô săm-kan ná. bpai hăa kŏng-wăan gin gan tòe", en: "Great. Resting is also important. Let's go find some dessert to eat." }
        ];

        const questions = [
            { emoji: "1️⃣", thai: "ผู้ชายมีความรู้สึกอย่างไรเกี่ยวกับการทำงาน", ipa: "pûu-chaai mii kwaam-rúu-sèuk yàang-rai gìiao-gàp gaan-tam-ngaan", en: "How does the man feel about working?" },
            { emoji: "2️⃣", thai: "อะไรที่ทำให้เขามีความสุข", ipa: "à-rai tîi tam-hâi kăo mii kwaam-sùk", en: "What gives him happiness?" },
            { emoji: "3️⃣", thai: "ผู้หญิงคิดว่าอะไรสำคัญ", ipa: "pûu-yĭng kít wâa à-rai săm-kan", en: "What does the woman think is important?" }
        ];

        const tasks = [
            { 
                emoji: "🎲🔗", 
                title: { thai: "เกม: ต่อประโยค", ipa: "geem: dtòr bprà-yòok", en: "Game: Sentence chain" },
                desc: { thai: "แต่งประโยคโดยใช้คำว่า 'การ' หรือ 'ความ' ต่อจากเพื่อน", ipa: "dtàeng bprà-yòok dooi chái kam wâa 'gaan' rĕu 'kwaam' dtòr jàak pêuan", en: "Make a sentence using 'Gaan' or 'Kwaam' continuing from your friend" }
            },
            { 
                emoji: "🗣️🏢", 
                title: { thai: "โต้วาที: ทำงานที่บ้าน หรือ ออฟฟิศ", ipa: "dtôo-waa-tii: tam-ngaan-tîi-bâan rĕu óf-fít", en: "Debate: Work from home or Office" },
                desc: { thai: "เปรียบเทียบ 'การทำงาน' ที่บ้านและ 'การทำงาน' ที่ออฟฟิศ ว่าแบบไหนดีกว่ากัน", ipa: "bpriiap-tîiap 'gaan-tam-ngaan' tîi bâan láe 'gaan-tam-ngaan' tîi óf-fít wâa bàep năi dii gwàa gan", en: "Compare 'working' at home and 'working' at the office, which one is better?" }
            },
            { 
                emoji: "💬🏖️", 
                title: { thai: "อภิปราย: วันหยุด", ipa: "à-pí-bpraai: wan-yùt", en: "Discussion: Weekends" },
                desc: { thai: "พูดคุยเกี่ยวกับ 'การพักผ่อน' และ 'ความสุข' ของคุณในวันหยุด", ipa: "pûut-kui gìiao-gàp 'gaan-pák-pòn' láe 'kwaam-sùk' kŏng kun nai wan-yùt", en: "Discuss your 'resting' and 'happiness' on weekends" }
            }
        ];

        const extensions = [
            { 
                emoji: "🎤🎨", 
                title: { thai: "สัมภาษณ์: งานอดิเรก", ipa: "săm-pâat: ngaan-à-dì-rèek", en: "Interview: Hobbies" },
                desc: { thai: "ถามเพื่อนเกี่ยวกับ 'การเล่น' กีฬา หรือ 'ความชอบ' ในเวลาว่าง", ipa: "tăam pêuan gìiao-gàp 'gaan-lên' gii-laa rĕu 'kwaam-chôp' nai wee-laa wâang", en: "Ask your friend about 'playing' sports or 'preferences' in free time" }
            },
            { 
                emoji: "📖😂", 
                title: { thai: "เล่าเรื่อง: เรื่องตลก", ipa: "lâo-rêuang: rêuang dtà-lòk", en: "Story-telling: Funny story" },
                desc: { thai: "เล่าเรื่องที่ทำให้เกิด 'ความตลก' หรือ 'ความแปลกใจ'", ipa: "lâo rêuang tîi tam-hâi gèrt 'kwaam-dtà-lòk' rĕu 'kwaam-bplàaek-jai'", en: "Tell a story that causes 'funniness' or 'surprise'" }
            },
            { 
                emoji: "📊🍲", 
                title: { thai: "นำเสนอ: อาหารไทย", ipa: "nam-sà-nĕr: ăa-hăan-thai", en: "Presentation: Thai food" },
                desc: { thai: "นำเสนอ 'การทำอาหาร' หรือ 'ความอร่อย' ของอาหารไทยที่คุณชอบ", ipa: "nam-sà-nĕr 'gaan-tam-ăa-hăan' rĕu 'kwaam-à-ròi' kŏng ăa-hăan-thai tîi kun chôp", en: "Present 'cooking' or 'deliciousness' of Thai food you like" }
            }
        ];

        // Core Component Builder Function
        function createThaiBlock(data, isTitle = false, isLarge = false) {
            const wrap = document.createElement('div');
            wrap.className = 'inline-flex flex-col mb-4 mr-4 align-top w-full sm:w-auto';

            const mainContainer = document.createElement('div');
            mainContainer.className = `inline-flex items-center flex-wrap gap-2 p-2 bg-white rounded-xl shadow-sm border border-gray-200 transition-all hover:shadow-md ${isTitle ? 'w-full justify-center bg-gray-50' : ''}`;

            const textSpan = document.createElement('span');
            textSpan.className = `font-bold text-gray-800 tracking-wide ${isLarge ? 'text-3xl sm:text-4xl text-blue-700' : isTitle ? 'text-2xl text-gray-900' : 'text-xl'}`;
            textSpan.innerText = (data.emoji ? data.emoji + ' ' : '') + data.thai;

            const btnGroup = document.createElement('div');
            btnGroup.className = 'flex gap-1 sm:ml-2 pl-2 border-l-2 border-gray-100 flex-shrink-0';

            // Text-to-Speech Button
            const ttsBtn = document.createElement('button');
            ttsBtn.innerHTML = '🔊';
            ttsBtn.className = 'w-8 h-8 flex items-center justify-center bg-blue-100 hover:bg-blue-200 text-blue-700 rounded-full transition-colors cursor-pointer text-sm';
            ttsBtn.onclick = () => {
                const utterance = new SpeechSynthesisUtterance(data.thai);
                utterance.lang = 'th-TH';
                utterance.rate = 0.85; // slightly slower for A1
                window.speechSynthesis.speak(utterance);
            };

            // IPA Button
            const ipaBtn = document.createElement('button');
            ipaBtn.innerText = 'IPA';
            ipaBtn.className = 'px-2 py-1 bg-purple-100 hover:bg-purple-200 text-purple-800 text-xs font-bold rounded-md transition-colors cursor-pointer';

            // EN Button
            const enBtn = document.createElement('button');
            enBtn.innerText = 'EN';
            enBtn.className = 'px-2 py-1 bg-green-100 hover:bg-green-200 text-green-800 text-xs font-bold rounded-md transition-colors cursor-pointer';

            mainContainer.appendChild(textSpan);
            btnGroup.appendChild(ttsBtn);
            btnGroup.appendChild(ipaBtn);
            btnGroup.appendChild(enBtn);
            mainContainer.appendChild(btnGroup);

            // Detail Panel (Hidden by default)
            const detailContainer = document.createElement('div');
            detailContainer.className = `mt-2 min-h-[24px] transition-all duration-300 ease-in-out ${isTitle ? 'text-center' : 'text-left'}`;

            const detailText = document.createElement('span');
            detailText.className = 'hidden';

            let activeDetail = null;

            ipaBtn.onclick = () => {
                if (activeDetail === 'ipa') {
                    detailText.classList.add('hidden');
                    activeDetail = null;
                    ipaBtn.classList.remove('ring-2', 'ring-purple-400');
                } else {
                    detailText.innerText = data.ipa;
                    detailText.className = 'text-base font-medium px-4 py-1.5 rounded-full bg-purple-100 text-purple-900 inline-block animate-fade-in shadow-inner';
                    activeDetail = 'ipa';
                    ipaBtn.classList.add('ring-2', 'ring-purple-400');
                    enBtn.classList.remove('ring-2', 'ring-green-400');
                }
            };

            enBtn.onclick = () => {
                if (activeDetail === 'en') {
                    detailText.classList.add('hidden');
                    activeDetail = null;
                    enBtn.classList.remove('ring-2', 'ring-green-400');
                } else {
                    detailText.innerText = data.en;
                    detailText.className = 'text-base font-medium px-4 py-1.5 rounded-full bg-green-100 text-green-900 inline-block animate-fade-in shadow-inner';
                    activeDetail = 'en';
                    enBtn.classList.add('ring-2', 'ring-green-400');
                    ipaBtn.classList.remove('ring-2', 'ring-purple-400');
                }
            };

            detailContainer.appendChild(detailText);
            wrap.appendChild(mainContainer);
            wrap.appendChild(detailContainer);

            return wrap;
        }

        // Initialize Application
        document.addEventListener('DOMContentLoaded', () => {
            
            // 1. Render UI Headings
            document.getElementById('header-container').appendChild(createThaiBlock(uiContent.header, true, true));
            document.getElementById('review-title-container').appendChild(createThaiBlock(uiContent.reviewTitle, true));
            document.getElementById('leadin-title-container').appendChild(createThaiBlock(uiContent.leadInTitle, true));
            document.getElementById('grammar-title-container').appendChild(createThaiBlock(uiContent.grammarTitle, true));
            document.getElementById('dialogue-title-container').appendChild(createThaiBlock(uiContent.dialogueTitle, true));
            document.getElementById('questions-title-container').appendChild(createThaiBlock(uiContent.questionsTitle, true));
            document.getElementById('tasks-title-container').appendChild(createThaiBlock(uiContent.tasksTitle, true));
            document.getElementById('extensions-title-container').appendChild(createThaiBlock(uiContent.extensionsTitle, true));

            // 2. Vocab Review Logic
            const vocabDisplay = document.getElementById('random-vocab-display');
            const instructionContainer = document.getElementById('review-instruction-container');
            
            document.getElementById('btn-randomize').onclick = () => {
                const randomItem = vocabulary[Math.floor(Math.random() * vocabulary.length)];
                vocabDisplay.innerHTML = '';
                vocabDisplay.appendChild(createThaiBlock(randomItem, false, true));
                
                instructionContainer.innerHTML = '';
                instructionContainer.appendChild(createThaiBlock(uiContent.reviewInstruction));
                instructionContainer.classList.remove('opacity-0');
            };

            // 2.5 Render Lead-in Questions
            const leadInContent = document.getElementById('leadin-content');
            leadInQuestions.forEach(q => {
                leadInContent.appendChild(createThaiBlock(q));
            });

            // 3. Render Target Grammar (การ/ความ)
            const grammarList = document.getElementById('grammar-list');
            targetGrammar.forEach(word => {
                grammarList.appendChild(createThaiBlock(word));
            });

            // 4. Render Dialogue
            const dialogueContent = document.getElementById('dialogue-content');
            dialogue.forEach(line => {
                const lineWrap = document.createElement('div');
                lineWrap.className = 'flex items-start gap-3 bg-white p-3 rounded-xl shadow-sm border border-yellow-100';
                
                const speakerIcon = document.createElement('div');
                speakerIcon.className = 'text-3xl mt-2';
                speakerIcon.innerText = line.speaker;
                
                lineWrap.appendChild(speakerIcon);
                lineWrap.appendChild(createThaiBlock(line));
                dialogueContent.appendChild(lineWrap);
            });

            // 5. Render Questions
            const questionsContent = document.getElementById('questions-content');
            questions.forEach(q => {
                questionsContent.appendChild(createThaiBlock(q));
            });

            // 6. Render Tasks
            const tasksContent = document.getElementById('tasks-content');
            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = 'bg-pink-50 p-5 rounded-2xl border border-pink-200 shadow-sm flex flex-col items-center text-center';
                card.appendChild(createThaiBlock(task.title));
                card.appendChild(createThaiBlock(task.desc));
                tasksContent.appendChild(card);
            });

            // 7. Render Extensions
            const extensionsContent = document.getElementById('extensions-content');
            extensions.forEach(ext => {
                const card = document.createElement('div');
                card.className = 'bg-white p-5 rounded-2xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow';
                card.appendChild(createThaiBlock(ext.title));
                
                const descContainer = document.createElement('div');
                descContainer.className = 'mt-2 pl-4 border-l-2 border-gray-100';
                descContainer.appendChild(createThaiBlock(ext.desc));
                
                card.appendChild(descContainer);
                extensionsContent.appendChild(card);
            });

        });
    </script>
</body>
</html>

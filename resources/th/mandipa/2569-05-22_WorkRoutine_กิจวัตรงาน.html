        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Clean Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* Glassmorphism containers */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>

                <!-- Rendered via JS -->

                <!-- Rendered via JS -->

            { speaker: "👨", thai: "เลิกงานตอน 5 โมงเย็น แล้วก็กลับบ้านไปพักผ่อน", ipa: "lêrk ngaan dtaawn hâa moong yen, láew-gô glàp bâan bpai pák-pàwn", en: "I finish work at 5 PM, and then go home to rest." }
        ];

        const comprehensionQuestions = [
            { emoji: "1️⃣", thai: "เขาเริ่มงานแล้วทำอะไรก่อน", ipa: "kăo rêrm ngaan láew tam à-rai gòrn", en: "What does he do first after starting work?" },
            { emoji: "2️⃣", thai: "ทำไมบางวันเขาพักเที่ยงช้า", ipa: "tam-mai baang wan kăo pák tîang cháa", en: "Why does he take his lunch break late some days?" },
            { emoji: "3️⃣", thai: "เขาเลิกงานตอนกี่โมง", ipa: "kăo lêrk ngaan dtaawn gìi moong", en: "What time does he finish work?" }
        ];

        const tasks = [
            { 
                emoji: "🎭⏰", 
                title: { thai: "บทบาทสมมติ: ถามตารางงาน", ipa: "bòt-bàat sŏm-mút: tăam dtaa-raang ngaan", en: "Role-play: Asking work schedule" },
                desc: { thai: "ถามเพื่อนว่า เริ่มงาน, ประชุม, และเลิกงานตอนกี่โมง", ipa: "tăam pêuan wâa rêrm ngaan, bprà-chum, láe lêrk ngaan dtaawn gìi moong", en: "Ask your friend what time they start work, have meetings, and finish work." }
            },
            { 
                emoji: "🎲✉️", 
                title: { thai: "เกม: กิจวัตรต่อไปคืออะไร", ipa: "geem: gìt-jà-wát dtòr-bpai kʉʉ à-rai", en: "Game: What's the next routine?" },
                desc: { thai: "เล่ากิจวัตรงานทีละขั้นตอน เช่น ตอบอีเมล แล้วก็ประชุม", ipa: "lâo gìt-jà-wát ngaan tii-lá kân-dtaawn chên dtòr ii-meel láew-gô bprà-chum", en: "Tell work routines step-by-step, e.g., reply emails and then have a meeting." }
            },
            { 
                emoji: "💬🍽️", 
                title: { thai: "อภิปราย: เวลาพักเที่ยง", ipa: "à-pí-bpraai: wee-laa pák tîang", en: "Discussion: Lunch break time" },
                desc: { thai: "ตอนพักเที่ยงคุณชอบกินข้าวกับใคร และกินอะไร", ipa: "dtaawn pák tîang kun chôp gin kâao gàp krai láe gin à-rai", en: "During lunch break, who do you like to eat with and what do you eat?" }
            }
        ];

        const extensions = [
            { 
                emoji: "🗣️⚖️", 
                title: { thai: "โต้วาที: ประชุมเช้า vs ประชุมบ่าย", ipa: "dtôo-waa-tii: bprà-chum cháao vs bprà-chum bàai", en: "Debate: Morning vs Afternoon Meeting" },
                desc: { thai: "คุณชอบประชุมตอนเช้าหรือตอนบ่ายมากกว่ากัน เพราะอะไร", ipa: "kun chôp bprà-chum dtaawn cháao rĕu dtaawn bàai mâak gwàa gan prɔ́ à-rai", en: "Do you prefer morning or afternoon meetings? Why?" }
            },
            { 
                emoji: "🎤💻", 
                title: { thai: "สัมภาษณ์: ตอบอีเมลด่วน", ipa: "săm-pâat: dtòp ii-meel dùan", en: "Interview: Replying to urgent emails" },
                desc: { thai: "ถ้ามีอีเมลด่วนตอนเลิกงาน คุณจะตอบไหม หรือรอพรุ่งนี้", ipa: "tâa mii ii-meel dùan dtaawn lêrk ngaan kun jà dtòp măi rĕu rɔɔ prûng-níi", en: "If there's an urgent email when finishing work, will you reply or wait until tomorrow?" }
            },
            { 
                emoji: "📖😵‍💫", 
                title: { thai: "เล่าเรื่อง: วันที่งานเยอะ", ipa: "lâo-rêuang: wan tîi ngaan yóe", en: "Story-telling: A day with a lot of work" },
                desc: { thai: "เล่าเรื่องวันที่คุณเริ่มงานเช้าและเลิกงานดึก ว่ารู้สึกยังไง", ipa: "lâo rêuang wan tîi kun rêrm ngaan cháao láe lêrk ngaan dèuk wâa rúu-sèuk yang-ngai", en: "Tell a story about a day you started work early and finished late, how did you feel?" }
            },
            { 
                emoji: "📊⏰", 
                title: { thai: "นำเสนอ: ตารางงานในฝัน", ipa: "nam-sà-nĕr: dtaa-raang ngaan nai făn", en: "Presentation: Dream work schedule" },
                desc: { thai: "ออกแบบตารางงานที่คุณอยากได้ เริ่มงานตอนไหน เลิกตอนไหน", ipa: "òrk-bàep dtaa-raang ngaan tîi kun yàak dâi rêrm ngaan dtaawn năi lêrk dtaawn năi", en: "Design your dream work schedule, when to start and when to finish." }
            }
        ];

        // --- 2. CORE COMPONENT BUILDER ---

        function createThaiBlock(data, options = {}) {
            const { isTitle = false, isLarge = false, hideDetails = false } = options;
            
            const wrap = document.createElement('div');
            wrap.className = 'inline-flex flex-col mb-4 mr-4 align-top max-w-full';

            const mainContainer = document.createElement('div');
            mainContainer.className = `inline-flex items-center flex-wrap gap-2 p-2.5 bg-white rounded-2xl shadow-sm border border-slate-200 transition-all hover:shadow-md ${isTitle ? 'w-full justify-center bg-slate-50' : ''}`;

            const textSpan = document.createElement('span');
            textSpan.className = `font-bold text-slate-800 tracking-wide break-words ${isLarge ? 'text-3xl sm:text-4xl text-sky-700' : isTitle ? 'text-xl sm:text-2xl text-slate-900' : 'text-lg sm:text-xl'}`;
            textSpan.innerText = (data.emoji ? data.emoji + ' ' : '') + data.thai;

            mainContainer.appendChild(textSpan);

            // Control Buttons
            if (!hideDetails) {
                const btnGroup = document.createElement('div');
                btnGroup.className = 'flex gap-1.5 sm:ml-3 pl-3 border-l-2 border-slate-100 flex-shrink-0';

                // TTS Button
                const ttsBtn = document.createElement('button');
                ttsBtn.innerHTML = '🔊';
                ttsBtn.className = 'w-9 h-9 flex items-center justify-center bg-sky-50 hover:bg-sky-100 text-sky-700 rounded-full transition-colors cursor-pointer text-sm shadow-sm active:scale-95';
                ttsBtn.onclick = () => {
                    const utterance = new SpeechSynthesisUtterance(data.thai);
                    utterance.lang = 'th-TH';
                    utterance.rate = 0.85; // A1 suitable speed
                    window.speechSynthesis.speak(utterance);
                };

                // IPA Button
                const ipaBtn = document.createElement('button');
                ipaBtn.innerText = 'IPA';
                ipaBtn.className = 'px-2.5 py-1.5 bg-purple-50 hover:bg-purple-100 text-purple-700 text-xs font-bold rounded-lg transition-colors cursor-pointer shadow-sm active:scale-95 border border-purple-100';

                // EN Button
                const enBtn = document.createElement('button');
                enBtn.innerText = 'EN';
                enBtn.className = 'px-2.5 py-1.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 text-xs font-bold rounded-lg transition-colors cursor-pointer shadow-sm active:scale-95 border border-emerald-100';

                btnGroup.appendChild(ttsBtn);
                btnGroup.appendChild(ipaBtn);
                btnGroup.appendChild(enBtn);
                mainContainer.appendChild(btnGroup);

                // Detail Panel
                const detailContainer = document.createElement('div');
                detailContainer.className = `mt-2 min-h-[28px] transition-all duration-300 ease-in-out ${isTitle ? 'text-center' : 'text-left'}`;

                const detailText = document.createElement('span');
                detailText.className = 'hidden';

                let activeDetail = null;

                const resetButtons = () => {
                    ipaBtn.classList.remove('ring-2', 'ring-purple-400', 'bg-purple-200');
                    enBtn.classList.remove('ring-2', 'ring-emerald-400', 'bg-emerald-200');
                };

                ipaBtn.onclick = () => {
                    if (activeDetail === 'ipa') {
                        detailText.classList.add('hidden');
                        activeDetail = null;
                        resetButtons();
                    } else {
                        resetButtons();
                        detailText.innerText = data.ipa;
                        detailText.className = 'text-[15px] font-medium px-4 py-1.5 rounded-full bg-purple-100 text-purple-900 inline-block animate-fade-in shadow-sm border border-purple-200';
                        activeDetail = 'ipa';
                        ipaBtn.classList.add('ring-2', 'ring-purple-400', 'bg-purple-200');
                    }
                };

                enBtn.onclick = () => {
                    if (activeDetail === 'en') {
                        detailText.classList.add('hidden');
                        activeDetail = null;
                        resetButtons();
                    } else {
                        resetButtons();
                        detailText.innerText = data.en;
                        detailText.className = 'text-[15px] font-medium px-4 py-1.5 rounded-full bg-emerald-100 text-emerald-900 inline-block animate-fade-in shadow-sm border border-emerald-200';
                        activeDetail = 'en';
                        enBtn.classList.add('ring-2', 'ring-emerald-400', 'bg-emerald-200');
                    }
                };

                detailContainer.appendChild(detailText);
                wrap.appendChild(mainContainer);
                wrap.appendChild(detailContainer);
            } else {
                wrap.appendChild(mainContainer);
            }

            return wrap;
        }

        // --- 3. INITIALIZATION ---

        document.addEventListener('DOMContentLoaded', () => {
            
            // Render Headings
            document.getElementById('header-container').appendChild(createThaiBlock(uiHeadings.header, { isTitle: true, isLarge: true }));
            document.getElementById('review-title-container').appendChild(createThaiBlock(uiHeadings.reviewTitle, { isTitle: true }));
            document.getElementById('leadin-title-container').appendChild(createThaiBlock(uiHeadings.leadInTitle, { isTitle: true }));
            document.getElementById('grammar-title-container').appendChild(createThaiBlock(uiHeadings.grammarTitle, { isTitle: true }));
            document.getElementById('dialogue-title-container').appendChild(createThaiBlock(uiHeadings.dialogueTitle, { isTitle: true }));
            document.getElementById('questions-title-container').appendChild(createThaiBlock(uiHeadings.questionsTitle, { isTitle: true }));
            document.getElementById('tasks-title-container').appendChild(createThaiBlock(uiHeadings.tasksTitle, { isTitle: true }));
            document.getElementById('extensions-title-container').appendChild(createThaiBlock(uiHeadings.extensionsTitle, { isTitle: true }));

            // Render Vocab Review Logic
            const vocabDisplay = document.getElementById('random-vocab-display');
            const instructionContainer = document.getElementById('review-instruction-container');
            
            document.getElementById('btn-randomize').onclick = () => {
                const randomItem = vocabulary[Math.floor(Math.random() * vocabulary.length)];
                vocabDisplay.innerHTML = '';
                vocabDisplay.appendChild(createThaiBlock(randomItem, { isLarge: true }));
                
                instructionContainer.innerHTML = '';
                instructionContainer.appendChild(createThaiBlock(uiHeadings.reviewInstruction));
                instructionContainer.classList.remove('opacity-0');
            };

            // Render Lead-in Questions
            const leadInContent = document.getElementById('leadin-content');
            leadInQuestions.forEach(q => leadInContent.appendChild(createThaiBlock(q)));

            // Render Target Grammar/Vocab
            const grammarList = document.getElementById('grammar-list');
            targetVocab.forEach(word => grammarList.appendChild(createThaiBlock(word)));

            // Render Dialogue
            const dialogueContent = document.getElementById('dialogue-content');
            dialogue.forEach(line => {
                const lineWrap = document.createElement('div');
                lineWrap.className = 'flex items-start gap-4 bg-white p-4 rounded-2xl shadow-sm border border-yellow-100 hover:shadow-md transition-shadow';
                
                const speakerIcon = document.createElement('div');
                speakerIcon.className = 'text-4xl mt-1 drop-shadow-sm';
                speakerIcon.innerText = line.speaker;
                
                lineWrap.appendChild(speakerIcon);
                lineWrap.appendChild(createThaiBlock(line));
                dialogueContent.appendChild(lineWrap);
            });

            // Render Comprehension Questions
            const questionsContent = document.getElementById('questions-content');
            comprehensionQuestions.forEach(q => questionsContent.appendChild(createThaiBlock(q)));

            // Render Practice Tasks
            const tasksContent = document.getElementById('tasks-content');
            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = 'bg-white p-6 rounded-3xl border border-emerald-100 shadow-sm flex flex-col items-center text-center hover:-translate-y-1 transition-transform duration-300';
                card.appendChild(createThaiBlock(task.title, { isTitle: true }));
                
                const descContainer = document.createElement('div');
                descContainer.className = 'mt-3 w-full border-t border-emerald-50 pt-3';
                descContainer.appendChild(createThaiBlock(task.desc));
                card.appendChild(descContainer);
                
                tasksContent.appendChild(card);
            });

            // Render Extensions
            const extensionsContent = document.getElementById('extensions-content');
            extensions.forEach(ext => {
                const card = document.createElement('div');
                card.className = 'bg-white p-6 rounded-3xl border border-slate-200 shadow-sm hover:shadow-md transition-all duration-300';
                card.appendChild(createThaiBlock(ext.title, { isTitle: true }));
                
                const descContainer = document.createElement('div');
                descContainer.className = 'mt-3 pl-4 border-l-2 border-slate-100 w-full text-left';
                descContainer.appendChild(createThaiBlock(ext.desc));
                
                card.appendChild(descContainer);
                extensionsContent.appendChild(card);
            });

        });
    </script>
</body>
</html>

        // --- FUNCTIONS ---

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH';
                utterance.rate = 0.9; 
                window.speechSynthesis.speak(utterance);
            } else {
                alert("TTS not supported");
            }
        }

        function toggleVisibility(elementId) {
            const el = document.getElementById(elementId);
            if (el.classList.contains('hidden-content')) {
                el.classList.remove('hidden-content');
                el.classList.add('show-content');
            } else {
                el.classList.add('hidden-content');
                el.classList.remove('show-content');
            }
        }

        // Render Universal Text Unit
        function renderInteractive(id, thai, ipa, en, options = {}) {
            const type = options.type || 'inline';
            const textSize = options.textSize || '';
            const emoji = options.emoji || '';

            // Layout 1: BUTTON (Special)
            if (type === 'button') {
                return `
                    <div class="inline-flex flex-col items-center">
                        <button onclick="randomReviewWord()" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 flex items-center mb-1">
                            <i class="fas fa-dice mr-2"></i> ${thai}
                        </button>
                        <div class="flex items-center mt-2">
                             <button onclick="speak('${thai}')" class="w-6 h-6 rounded-full bg-teal-100 text-teal-700 flex items-center justify-center text-xs hover:bg-teal-200 border border-teal-200 shadow-sm">
                                <i class="fas fa-volume-up"></i>
                            </button>
                            <button onclick="toggleVisibility('ipa-${id}')" class="ctrl-btn btn-ipa">IPA</button>
                            <button onclick="toggleVisibility('en-${id}')" class="ctrl-btn btn-en">EN</button>
                        </div>
                        <div id="ipa-${id}" class="hidden-content mt-1 text-xs text-gray-500 font-mono text-center bg-white p-1 rounded shadow-sm border border-yellow-200">${ipa}</div>
                        <div id="en-${id}" class="hidden-content mt-1 text-xs text-blue-700 font-medium text-center bg-white p-1 rounded shadow-sm border border-blue-200">${en}</div>
                    </div>
                `;
            }

            // Layout 2: BLOCK (Vocab cards / Questions)
            if (type === 'block') {
                return `
                <div class="bg-white p-4 rounded-xl border border-gray-200 hover:shadow-md transition shadow-sm">
                    <div class="flex items-start space-x-3">
                        ${emoji ? `<span class="text-3xl pt-1">${emoji}</span>` : ''}
                        <div class="flex-1">
                            <p class="thai-text font-bold text-slate-800 mb-2">${thai}</p>
                            
                            <div class="flex flex-wrap items-center">
                                <button onclick="speak('${thai.replace(/'/g, "\\'")}')" class="w-8 h-8 bg-teal-500 text-white rounded-full hover:bg-teal-600 flex items-center justify-center shadow-sm mr-2">
                                    <i class="fas fa-volume-up"></i>
                                </button>
                                <button onclick="toggleVisibility('ipa-${id}')" class="px-2 py-1 bg-yellow-50 text-yellow-800 rounded text-xs font-bold mr-2 hover:bg-yellow-200 border border-yellow-200">IPA</button>
                                <button onclick="toggleVisibility('en-${id}')" class="px-2 py-1 bg-blue-50 text-blue-800 rounded text-xs font-bold hover:bg-blue-200 border border-blue-200">EN</button>
                            </div>

                            <div id="ipa-${id}" class="hidden-content mt-3 text-sm text-gray-500 font-mono bg-slate-50 p-2 rounded border border-gray-100">${ipa}</div>
                            <div id="en-${id}" class="hidden-content mt-2 text-sm text-blue-700 font-medium bg-slate-50 p-2 rounded border border-gray-100">${en}</div>
                        </div>
                    </div>
                </div>`;
            }

            // Layout 3: INLINE / HEADER
            return `
                <div class="inline-block w-full">
                    <div class="flex flex-wrap items-center gap-2">
                        <span class="${textSize}">${thai}</span>
                        <div class="inline-flex items-center space-x-1 ml-1">
                            <button onclick="speak('${thai.replace(/'/g, "\\'")}')" class="tts-btn" title="Listen">

                        </div>
                    </div>

                    <div id="en-${id}" class="hidden-content mt-1 text-sm text-blue-700 font-medium ml-1 border-l-2 border-blue-400 pl-2 bg-blue-50 p-1 rounded shadow-sm">${en}</div>

        // Generate Script Breakdown HTML
        function generateScriptHTML(line, index) {
            let roleColor = "bg-gray-200 text-gray-800";
            if (line.role.includes("ออฟ")) roleColor = "bg-red-600 text-white";
            if (line.role.includes("มาย")) roleColor = "bg-blue-600 text-white";
            if (line.role.includes("เมนเทอร์")) roleColor = "bg-purple-600 text-white";

            // Simplify role name for display circle
            const displayRole = line.role.replace(" (สัมภาษณ์)", "");

            const basicLineHTML = renderInteractive(`script-${index}`, line.th, line.ipa, line.en, { type: 'inline', textSize: 'text-lg font-bold text-slate-800' });
            
            let breakdownHTML = "";
            if (line.breakdown) {
                const bd = line.breakdown;
                const bdTitle = renderInteractive(`bd-title-${index}`, "โครงสร้าง/คำศัพท์:", "krohng sâang / kam-sàp:", "Structure/Vocab:");
                const bdStruct = renderInteractive(`bd-str-${index}`, bd.structTh, bd.structIpa, bd.structEn, { textSize: 'font-semibold text-green-800' });
                const exTitle = renderInteractive(`ex-title-${index}`, "ตัวอย่าง:", "dtua yàang:", "Example:");
                const exBody = renderInteractive(`ex-body-${index}`, bd.exTh, bd.exIpa, bd.exEn, { textSize: 'text-gray-800' });
                const promptStudent = renderInteractive(`pr-std-${index}`, uiData['prompt-student'].th, uiData['prompt-student'].ipa, uiData['prompt-student'].en, { textSize: 'font-bold text-green-700' });
                const btnBreakdown = renderInteractive(`btn-bd-${index}`, uiData['btn-breakdown'].th, uiData['btn-breakdown'].ipa, uiData['btn-breakdown'].en, { textSize: 'text-xs text-white' });

                breakdownHTML = `
                    <div class="mt-2">
                        <button onclick="toggleVisibility('bd-panel-${index}')" class="bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1 rounded-md text-sm transition shadow-sm">
                            <i class="fas fa-lightbulb mr-1 text-yellow-300"></i> ${btnBreakdown}

                        <div id="bd-panel-${index}" class="hidden-content mt-3 bg-emerald-50 p-4 rounded-lg border border-emerald-200 shadow-inner">

                                <span class="text-sm text-emerald-600 font-bold">${bdTitle}</span><br>

                            </div>
                            <div class="mb-4 bg-white p-3 rounded border border-gray-200 shadow-sm">
                                <span class="text-sm text-gray-500 font-bold">${exTitle}</span><br>
                                ${exBody}
                            </div>
                            <div class="bg-white p-3 rounded border-2 border-dashed border-emerald-300">

                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="flex gap-4 p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition">
                    <div class="flex-shrink-0 w-14 h-14 ${roleColor} rounded-full flex items-center justify-center font-bold shadow-md text-xs overflow-hidden text-center leading-tight">
                        ${displayRole}
                    </div>
                    <div class="flex-grow pt-1">
                        ${basicLineHTML}
                        ${breakdownHTML}
                    </div>
                </div>
            `;

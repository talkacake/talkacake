            { role: "ติดกิ๊บ", th: "โอ๊ย เลอะเลยเหรอ เสียโฉมป่ะวะ อุ้ยๆๆ เสร็จยัง", ipa: "ói · lér loie rĕr · sĭia chŏhm bpà wá · úi úi úi · sèt yang", en: "Ouch! Is it smeared? Is my face ruined? Ooh ooh, are you done?" },
            { role: "ติดกิ๊บ", th: "เฮ้ย ขำไรวะ", ipa: "héuy · kăm rai wá", en: "Hey, what are you laughing at?" },
            { role: "พี่ชาย", th: "เปล่า ไม่มีอะไรๆ", ipa: "bplào · mâi mee à-rai à-rai", en: "Nothing, nothing." },
            { role: "ติดกิ๊บ", th: "โอ๊ย โอ๊ยฉันมีนัดต่อ เดี๋ยวฉันจะไปแล้ว", ipa: "ói · ói chăn mee nát dtàaw · dĭiao chăn jà bpai láew", en: "Ouch, ouch, I have an appointment next. I'm leaving soon." },
            { role: "พี่ชาย", th: "แกจะไปตอนนี้จริงเหรอ", ipa: "gae jà bpai dtawn née jing rĕr", en: "Are you really going right now?" },
            { role: "ติดกิ๊บ", th: "เออ พอดีว่า ฉันไปไถแอพแล้วเจอหนุ่มตี๋หน้าหล่อนมใหญ่กระแทกหัวใจอ่ะ ก็เลยว่า จะไปคาเฟ่แถวนี้หน่อย", ipa: "er · paaw-dee wâa · chăn bpai tăi app láew jer nùm dtĕe nâa làaw nom yài grà-tâek hŭua jai à · gôr loie wâa · jà bpai cafe tăew née nòi", en: "Yeah, I was swiping on an app and found a handsome guy with big pecs that hit my heart. So I'm going to a cafe around here." },
            { role: "พี่ชาย", th: "ตอนนี้เนี่ยนะ", ipa: "dtawn née nîia ná", en: "Right now?" },
            { role: "ติดกิ๊บ", th: "อืม ทำไม กลัวฉันโดนปู้ยี่ปู้ยำเหรอ", ipa: "eum · tam-mai · glua chăn dohn bpûu-yêe-bpûu-yam rĕr", en: "Yeah, why? Afraid I'll get ravaged/abused?" },
            { role: "พี่ชาย", th: "เปล่า แต่ว่า ฉันว่าแกอย่าไปเลย", ipa: "bplào · dtàe wâa · chăn wâa gae yàa bpai loie", en: "No, but... I think you shouldn't go." },
            { role: "ติดกิ๊บ", th: "ฉันจะไป ฉันอยากโดนคุกคามทางเพศ ไปดีกว่า", ipa: "chăn jà bpai · chăn yàak dohn kúk-kaam taang pêht · bpai dee gwàa", en: "I'm going. I want to be sexually harassed. Better get going." },
            { role: "พี่ชาย", th: "ติดกิ๊บ แต่ที่กูกลัวอ่ะ กูกลัวเขาขำหน้ามึงต่างหาก อีโง่", ipa: "dtìt-gíp · dtàe têe goo glua à · goo glua kăo kăm nâa meung dtàang hàak · ee ngôh", en: "Tit-gib! But what I'm afraid of... I'm afraid he'll laugh at your face instead, you idiot!" }
        ];

        // --- FUNCTIONS ---

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH';
                utterance.rate = 0.9; 
                window.speechSynthesis.speak(utterance);
            } else {
                alert("TTS not supported");
            }
        }

        function toggleVisibility(elementId) {
            const el = document.getElementById(elementId);
            if (el.classList.contains('hidden-content')) {
                el.classList.remove('hidden-content');
                el.classList.add('show-content');
            } else {
                el.classList.add('hidden-content');
                el.classList.remove('show-content');
            }
        }

        // Render Universal Text Unit
        function renderInteractive(id, thai, ipa, en, options = {}) {
            const type = options.type || 'inline';
            const textSize = options.textSize || '';
            const emoji = options.emoji || '';

            // Layout 1: BUTTON (Special)
            if (type === 'button') {
                return `
                    <div class="inline-flex flex-col items-center">
                        <button onclick="randomReviewWord()" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 flex items-center mb-1">
                            <i class="fas fa-dice mr-2"></i> ${thai}
                        </button>
                        <div class="flex items-center mt-2">
                             <button onclick="speak('${thai}')" class="w-6 h-6 rounded-full bg-teal-100 text-teal-700 flex items-center justify-center text-xs hover:bg-teal-200 border border-teal-200">
                                <i class="fas fa-volume-up"></i>
                            </button>
                            <button onclick="toggleVisibility('ipa-${id}')" class="ctrl-btn btn-ipa">IPA</button>
                            <button onclick="toggleVisibility('en-${id}')" class="ctrl-btn btn-en">EN</button>
                        </div>
                        <div id="ipa-${id}" class="hidden-content mt-1 text-xs text-gray-500 font-mono text-center bg-white p-1 rounded shadow-sm border border-yellow-200">${ipa}</div>
                        <div id="en-${id}" class="hidden-content mt-1 text-xs text-blue-700 font-medium text-center bg-white p-1 rounded shadow-sm border border-blue-200">${en}</div>
                    </div>
                `;
            }

            // Layout 2: BLOCK (Vocab cards, Script)
            if (type === 'block') {
                return `
                <div class="bg-white p-4 rounded-xl border border-gray-200 hover:shadow-md transition">
                    <div class="flex items-start space-x-3">
                        ${emoji ? `<span class="text-3xl pt-1">${emoji}</span>` : ''}
                        <div class="flex-1">
                            <p class="thai-text font-bold text-slate-800 mb-2">${thai}</p>
                            
                            <div class="flex flex-wrap items-center">
                                <button onclick="speak('${thai.replace(/'/g, "\\'")}')" class="w-8 h-8 bg-teal-500 text-white rounded-full hover:bg-teal-600 flex items-center justify-center shadow-sm mr-2">
                                    <i class="fas fa-volume-up"></i>
                                </button>
                                <button onclick="toggleVisibility('ipa-${id}')" class="px-2 py-1 bg-yellow-100 text-yellow-800 rounded text-xs font-bold mr-2 hover:bg-yellow-200 border border-yellow-200">IPA</button>
                                <button onclick="toggleVisibility('en-${id}')" class="px-2 py-1 bg-blue-100 text-blue-800 rounded text-xs font-bold hover:bg-blue-200 border border-blue-200">EN</button>
                            </div>

                            <div id="ipa-${id}" class="hidden-content mt-3 text-sm text-gray-500 font-mono bg-slate-50 p-2 rounded border border-gray-100">${ipa}</div>
                            <div id="en-${id}" class="hidden-content mt-2 text-sm text-blue-700 font-medium bg-slate-50 p-2 rounded border border-gray-100">${en}</div>
                        </div>
                    </div>
                </div>`;
            }

            // Layout 3: INLINE / HEADER
            return `
                <div class="inline-block w-full">
                    <div class="flex flex-wrap items-center gap-2">
                        <span class="${textSize}">${thai}</span>
                        <div class="inline-flex items-center space-x-1 ml-1">
                            <button onclick="speak('${thai.replace(/'/g, "\\'")}')" class="tts-btn" title="Listen">
                                <i class="fas fa-volume-up" style="font-size: 0.8rem;"></i>
                            </button>
                            <button onclick="toggleVisibility('ipa-${id}')" class="ctrl-btn btn-ipa">IPA</button>
                            <button onclick="toggleVisibility('en-${id}')" class="ctrl-btn btn-en">EN</button>
                        </div>
                    </div>
                    <div id="ipa-${id}" class="hidden-content mt-2 text-sm text-gray-500 font-mono ml-1 border-l-2 border-yellow-400 pl-2 bg-yellow-50 p-1 rounded">${ipa}</div>
                    <div id="en-${id}" class="hidden-content mt-1 text-sm text-blue-700 font-medium ml-1 border-l-2 border-blue-400 pl-2 bg-blue-50 p-1 rounded">${en}</div>
                </div>
            `;
        }

        // Random Review Generator
        function randomReviewWord() {
            const container = document.getElementById('card-word-container');
            const random = reviewVocab[Math.floor(Math.random() * reviewVocab.length)];
            const id = 'rev-dynamic';
            
            // Use emoji from data if available, else default
            const displayEmoji = random.emoji || "🤡";
            document.getElementById('card-emoji').innerText = displayEmoji;
            
            container.innerHTML = `
                <div class="animate-fadeIn">
                    <h3 class="text-4xl font-bold text-slate-800 mb-4">${random.th}</h3>
                    <div class="flex justify-center space-x-3">
                         <button onclick="speak('${random.th}')" class="w-12 h-12 bg-teal-500 text-white rounded-full flex items-center justify-center hover:bg-teal-600 shadow-lg transition transform hover:scale-110">
                            <i class="fas fa-volume-up fa-lg"></i>
                        </button>
                        <button onclick="toggleVisibility('ipa-${id}')" class="px-4 py-2 bg-yellow-200 text-yellow-900 rounded-lg font-bold shadow-sm hover:bg-yellow-300">IPA</button>
                        <button onclick="toggleVisibility('en-${id}')" class="px-4 py-2 bg-blue-200 text-blue-900 rounded-lg font-bold shadow-sm hover:bg-blue-300">EN</button>
                    </div>
                    <div id="ipa-${id}" class="hidden-content mt-4 text-xl text-gray-500 font-mono bg-white p-3 rounded-lg shadow-inner border border-gray-200">${random.ipa}</div>
                    <div id="en-${id}" class="hidden-content mt-2 text-xl text-blue-600 font-semibold bg-white p-3 rounded-lg shadow-inner border border-gray-200">${random.en}</div>
                </div>
            `;
        }

        // --- INITIALIZATION ---
        window.onload = function() {
            
            // Nav
            document.getElementById('nav-title-container').innerHTML = 
                renderInteractive('nav', uiData['nav-title'].th, uiData['nav-title'].ipa, uiData['nav-title'].en, { textSize: 'text-xl font-bold' });

            // Section 1
            document.getElementById('sec1-title-container').innerHTML = 
                renderInteractive('sec1t', uiData['sec1-title'].th, uiData['sec1-title'].ipa, uiData['sec1-title'].en);
            document.getElementById('sec1-desc-container').innerHTML = 
                renderInteractive('sec1d', uiData['sec1-desc'].th, uiData['sec1-desc'].ipa, uiData['sec1-desc'].en);
            document.getElementById('card-word-container').innerHTML = 
                renderInteractive('card', uiData['card-init'].th, uiData['card-init'].ipa, uiData['card-init'].en, { textSize: 'text-xl text-gray-400' });

                renderInteractive('btn-rnd', uiData['btn-random'].th, uiData['btn-random'].ipa, uiData['btn-random'].en, { type: 'button' });

            // Section 2
            document.getElementById('sec2-title-container').innerHTML = 
                renderInteractive('sec2t', uiData['sec2-title'].th, uiData['sec2-title'].ipa, uiData['sec2-title'].en);
            document.getElementById('sec2-desc-container').innerHTML = 
                renderInteractive('sec2d', uiData['sec2-desc'].th, uiData['sec2-desc'].ipa, uiData['sec2-desc'].en);

            // Section 3 (Script - Swapped)
            document.getElementById('sec3-title-container').innerHTML = 
                renderInteractive('sec3t', uiData['sec3-title'].th, uiData['sec3-title'].ipa, uiData['sec3-title'].en);
            const scriptContainer = document.getElementById('script-container');
            scriptData.forEach((line, index) => {
                let roleColor = "bg-gray-100 border-gray-200 text-gray-800";

                if(line.role === "ติดกิ๊บ") roleColor = "bg-pink-100 border-pink-200 text-pink-800";

                const html = `
                    <div class="flex gap-3">
                        <div class="flex-shrink-0 w-14 h-14 ${roleColor} rounded-full flex items-center justify-center font-bold shadow-sm text-xs overflow-hidden text-center p-1 leading-tight border-2">
                            ${line.role}
                        </div>
                        <div class="flex-grow">
                            ${renderInteractive(`script-${index}`, line.th, line.ipa, line.en, { type: 'block' })}
                        </div>
                    </div>
                `;
                scriptContainer.innerHTML += html;
            });

            const qContainer = document.getElementById('sec3-questions-container');
            qContainer.innerHTML += renderInteractive('q1', uiData['q1'].th, uiData['q1'].ipa, uiData['q1'].en, { type: 'block', emoji: '1️⃣' });
            qContainer.innerHTML += renderInteractive('q2', uiData['q2'].th, uiData['q2'].ipa, uiData['q2'].en, { type: 'block', emoji: '2️⃣' });
            qContainer.innerHTML += renderInteractive('q3', uiData['q3'].th, uiData['q3'].ipa, uiData['q3'].en, { type: 'block', emoji: '3️⃣' });

            // Section 4 (Vocab - Swapped)
            document.getElementById('sec4-title-container').innerHTML = 
                renderInteractive('sec4t', uiData['sec4-title'].th, uiData['sec4-title'].ipa, uiData['sec4-title'].en);
            const vocabContainer = document.getElementById('vocab-container');
            targetVocab.forEach((item, index) => {
                vocabContainer.innerHTML += renderInteractive(`vocab-${index}`, item.th, item.ipa, item.en, { type: 'block', emoji: item.emoji });
            });

            // Section 5
            document.getElementById('sec5-title-container').innerHTML = 
                renderInteractive('sec5t', uiData['sec5-title'].th, uiData['sec5-title'].ipa, uiData['sec5-title'].en);
            
            document.getElementById('act1-header').innerHTML = 
                renderInteractive('act1-h', uiData['act1-head'].th, uiData['act1-head'].ipa, uiData['act1-head'].en, { textSize: 'font-bold text-lg' });
            document.getElementById('act1-desc').innerHTML = 
                renderInteractive('act1-d', uiData['act1-desc'].th, uiData['act1-desc'].ipa, uiData['act1-desc'].en, { textSize: 'text-sm text-gray-600' });

            document.getElementById('act2-header').innerHTML = 
                renderInteractive('act2-h', uiData['act2-head'].th, uiData['act2-head'].ipa, uiData['act2-head'].en, { textSize: 'font-bold text-lg' });
            document.getElementById('act2-desc').innerHTML = 
                renderInteractive('act2-d', uiData['act2-desc'].th, uiData['act2-desc'].ipa, uiData['act2-desc'].en, { textSize: 'text-sm text-gray-600' });

            document.getElementById('act3-header').innerHTML = 
                renderInteractive('act3-h', uiData['act3-head'].th, uiData['act3-head'].ipa, uiData['act3-head'].en, { textSize: 'font-bold text-lg' });
            document.getElementById('act3-desc').innerHTML = 
                renderInteractive('act3-d', uiData['act3-desc'].th, uiData['act3-desc'].ipa, uiData['act3-desc'].en, { textSize: 'text-sm text-gray-600' });

            // Section 6
            document.getElementById('sec6-title-container').innerHTML = 
                renderInteractive('sec6t', uiData['sec6-title'].th, uiData['sec6-title'].ipa, uiData['sec6-title'].en);

            document.getElementById('ext1-header').innerHTML = 
                renderInteractive('ext1-h', uiData['ext1-head'].th, uiData['ext1-head'].ipa, uiData['ext1-head'].en, { textSize: 'font-bold text-lg' });
            document.getElementById('ext1-desc').innerHTML = 
                renderInteractive('ext1-d', uiData['ext1-desc'].th, uiData['ext1-desc'].ipa, uiData['ext1-desc'].en, { textSize: 'text-sm text-gray-600' });

            document.getElementById('ext2-header').innerHTML = 
                renderInteractive('ext2-h', uiData['ext2-head'].th, uiData['ext2-head'].ipa, uiData['ext2-head'].en, { textSize: 'font-bold text-lg' });
            document.getElementById('ext2-desc').innerHTML = 
                renderInteractive('ext2-d', uiData['ext2-desc'].th, uiData['ext2-desc'].ipa, uiData['ext2-desc'].en, { textSize: 'text-sm text-gray-600' });

            document.getElementById('ext3-header').innerHTML = 
                renderInteractive('ext3-h', uiData['ext3-head'].th, uiData['ext3-head'].ipa, uiData['ext3-head'].en, { textSize: 'font-bold text-lg' });
            document.getElementById('ext3-desc').innerHTML = 
                renderInteractive('ext3-d', uiData['ext3-desc'].th, uiData['ext3-desc'].ipa, uiData['ext3-desc'].en, { textSize: 'text-sm text-gray-600' });

            document.getElementById('ext4-header').innerHTML = 
                renderInteractive('ext4-h', uiData['ext4-head'].th, uiData['ext4-head'].ipa, uiData['ext4-head'].en, { textSize: 'font-bold text-lg' });
            document.getElementById('ext4-desc').innerHTML = 
                renderInteractive('ext4-d', uiData['ext4-desc'].th, uiData['ext4-desc'].ipa, uiData['ext4-desc'].en, { textSize: 'text-sm text-gray-600' });

            // Footer
            document.getElementById('footer-container').innerHTML = 
                renderInteractive('foot', uiData['footer-text'].th, uiData['footer-text'].ipa, uiData['footer-text'].en);
        };
    </script>

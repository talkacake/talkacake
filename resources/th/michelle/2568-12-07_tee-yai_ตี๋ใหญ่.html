        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        h1, h2, h3, h4, .btn-text, button, p, div {
            font-family: 'Sarabun', sans-serif;
        }
        .hidden-content {
            display: none;
        }
        .show-content {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .thai-text {
            font-size: 1.15rem;
            line-height: 1.6;
        }
        /* Button Styles for Text Units */
        .ctrl-btn {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .btn-ipa { background-color: #fef9c3; color: #854d0e; border-color: #fde047; } /* yellow-100 */
        .btn-ipa:hover { background-color: #fde047; }
        .btn-en { background-color: #dbeafe; color: #1e40af; border-color: #93c5fd; } /* blue-100 */
        .btn-en:hover { background-color: #bfdbfe; }
        
        .tts-btn {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: #ccfbf1; /* teal-100 */
            color: #0f766e; /* teal-700 */
            cursor: pointer;
            transition: all 0.2s;
        }
        .tts-btn:hover { background-color: #99f6e4; transform: scale(1.05); }

        /* iOS specific adjustments */
        button { touch-action: manipulation; }
    </style>

        // --- FUNCTIONS ---

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH';
                utterance.rate = 0.9; 
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Browser does not support TTS");
            }
        }

        function toggleVisibility(elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;
            if (el.classList.contains('hidden-content')) {
                el.classList.remove('hidden-content');
                el.classList.add('show-content');
            } else {
                el.classList.add('hidden-content');
                el.classList.remove('show-content');
            }
        }

        /**

         * @param {string} en - English Text
         * @param {object} options - { type: 'inline'|'block'|'button', emoji: string, textSize: string }
         */
        function renderInteractive(id, thai, ipa, en, options = {}) {
            const type = options.type || 'inline';
            const textSize = options.textSize || '';
            const emoji = options.emoji || '';

            // Layout 1: BUTTON Style (Special case for "Randomize" button)
            if (type === 'button') {

                        </button>
                        <div class="flex space-x-2">
                             <button onclick="speak('${thai}')" class="w-6 h-6 rounded-full bg-teal-100 text-teal-700 flex items-center justify-center text-xs hover:bg-teal-200">
                                <i class="fas fa-volume-up"></i>
                            </button>
                            <button onclick="toggleVisibility('ipa-${id}')" class="ctrl-btn btn-ipa">IPA</button>
                            <button onclick="toggleVisibility('en-${id}')" class="ctrl-btn btn-en">EN</button>
                        </div>
                        <div id="ipa-${id}" class="hidden-content mt-1 text-xs text-gray-500 font-mono text-center bg-white p-1 rounded shadow-sm border border-yellow-200">${ipa}</div>
                        <div id="en-${id}" class="hidden-content mt-1 text-xs text-blue-700 font-medium text-center bg-white p-1 rounded shadow-sm border border-blue-200">${en}</div>
                    </div>
                `;
            }

            // Layout 2: BLOCK Style (Vocab cards, Script lines)
            if (type === 'block') {
                return `
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 hover:shadow-md transition">
                    <div class="flex items-start space-x-3">
                        ${emoji ? `<span class="text-2xl pt-1">${emoji}</span>` : ''}
                        <div class="flex-1">
                            <p class="thai-text font-semibold text-gray-800 mb-2">${thai}</p>
                            
                            <!-- Control Bar -->
                            <div class="flex flex-wrap gap-2">
                                <button onclick="speak('${thai.replace(/'/g, "\\'")}')" class="px-3 py-1 bg-teal-500 text-white rounded-lg text-sm hover:bg-teal-600 flex items-center">
                                    <i class="fas fa-volume-up mr-1"></i> ฟัง
                                </button>
                                <button onclick="toggleVisibility('ipa-${id}')" class="px-3 py-1 bg-yellow-100 text-yellow-800 rounded-lg text-sm font-bold border border-yellow-200 hover:bg-yellow-200">
                                    IPA
                                </button>
                                <button onclick="toggleVisibility('en-${id}')" class="px-3 py-1 bg-blue-100 text-blue-800 rounded-lg text-sm font-bold border border-blue-200 hover:bg-blue-200">
                                    EN
                                </button>
                            </div>

                            <!-- Hidden Contents -->
                            <div id="ipa-${id}" class="hidden-content mt-3 text-sm text-gray-500 font-mono bg-yellow-50 p-2 rounded">${ipa}</div>
                            <div id="en-${id}" class="hidden-content mt-2 text-sm text-blue-700 font-medium bg-blue-50 p-2 rounded">${en}</div>
                        </div>
                    </div>
                </div>`;
            }

            // Layout 3: INLINE / HEADER Style (Titles, Instructions, Footer)
            // Displays: Text + [Speaker] [IPA] [EN] on same line (wrapping allowed)
            // Expands contents below.
            return `

                    <div class="flex flex-wrap items-center gap-2">

                    <div id="en-${id}" class="hidden-content mt-1 text-sm text-blue-700 font-medium ml-1 border-l-2 border-blue-400 pl-2 bg-blue-50 p-1 rounded">${en}</div>
                </div>
            `;
        }

        // Random Review Generator
        function randomReviewWord() {
            const container = document.getElementById('review-card');
            const random = reviewVocab[Math.floor(Math.random() * reviewVocab.length)];
            
            // Reusing the interactive logic manually for this dynamic card
            const id = 'rev-dynamic';
            container.innerHTML = `
                <div class="text-6xl mb-4 animate-bounce">${random.emoji}</div>
                <h3 class="text-4xl font-bold text-teal-700 mb-2">${random.th}</h3>
                
                <div class="flex space-x-2 justify-center mt-4">
                     <button onclick="speak('${random.th}')" class="w-10 h-10 bg-teal-100 text-teal-700 rounded-full flex items-center justify-center hover:bg-teal-200">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button onclick="toggleVisibility('ipa-${id}')" class="px-3 py-1 bg-yellow-100 text-yellow-800 rounded-lg text-sm font-bold border border-yellow-300">IPA</button>
                    <button onclick="toggleVisibility('en-${id}')" class="px-3 py-1 bg-blue-100 text-blue-800 rounded-lg text-sm font-bold border border-blue-300">EN</button>
                </div>

                <div id="ipa-${id}" class="hidden-content mt-3 text-lg text-gray-500 font-mono bg-white p-2 rounded shadow-sm">${random.ipa}</div>
                <div id="en-${id}" class="hidden-content mt-1 text-lg text-blue-600 font-semibold bg-white p-2 rounded shadow-sm">${random.en}</div>
            `;
        }

        // --- INITIALIZATION ---
        window.onload = function() {

            document.getElementById('nav-title-container').innerHTML =

            // Section 1

                renderInteractive('sec1d', uiData['sec1-desc'].th, uiData['sec1-desc'].ipa, uiData['sec1-desc'].en);

            // Section 2
            document.getElementById('sec2-title-container').innerHTML = 
                renderInteractive('sec2t', uiData['sec2-title'].th, uiData['sec2-title'].ipa, uiData['sec2-title'].en);
            document.getElementById('sec2-desc-container').innerHTML = 
                renderInteractive('sec2d', uiData['sec2-desc'].th, uiData['sec2-desc'].ipa, uiData['sec2-desc'].en);

            // Section 3
            document.getElementById('sec3-title-container').innerHTML = 
                renderInteractive('sec3t', uiData['sec3-title'].th, uiData['sec3-title'].ipa, uiData['sec3-title'].en);
            const vocabContainer = document.getElementById('vocab-container');
            targetVocab.forEach((item, index) => {
                vocabContainer.innerHTML += renderInteractive(`vocab-${index}`, item.th, item.ipa, item.en, { type: 'block', emoji: item.emoji });
            });

            // Section 4
            document.getElementById('sec4-title-container').innerHTML = 
                renderInteractive('sec4t', uiData['sec4-title'].th, uiData['sec4-title'].ipa, uiData['sec4-title'].en);
            const scriptContainer = document.getElementById('script-container');
            scriptData.forEach((line, index) => {
                let roleColor = "bg-gray-200";
                if(line.role === "A") roleColor = "bg-red-100 text-red-800";
                if(line.role === "B") roleColor = "bg-green-100 text-green-800";
                if(line.role === "C") roleColor = "bg-blue-100 text-blue-800";

                const html = `
                    <div class="flex gap-3">
                        <div class="flex-shrink-0 w-10 h-10 ${roleColor} rounded-full flex items-center justify-center font-bold shadow-sm">
                            ${line.role}
                        </div>
                        <div class="flex-grow">
                            ${renderInteractive(`script-${index}`, line.th, line.ipa, line.en, { type: 'block' })}
                        </div>
                    </div>
                `;
                scriptContainer.innerHTML += html;
            });

            // Section 5
            document.getElementById('sec5-title-container').innerHTML = 
                renderInteractive('sec5t', uiData['sec5-title'].th, uiData['sec5-title'].ipa, uiData['sec5-title'].en);
            
            // Activity 1
            const act1Header = renderInteractive('act1-t', uiData['act1-title'].th, uiData['act1-title'].ipa, uiData['act1-title'].en, { textSize: 'font-bold text-lg' });
            const act1Inst = renderInteractive('act1-i', uiData['act1-inst'].th, uiData['act1-inst'].ipa, uiData['act1-inst'].en, { textSize: 'text-sm text-gray-600' });
            const act1Content = renderInteractive('act1-c', 'คุณเป็นเจ้าของร้านค้า ลูกค้ามาโวยวาย (บ่น) ว่าสินค้าไม่ดี แต่คุณต้องสุภาพ', 'kun bpen jâo-kăawng ráan-káa ...', 'You are a shop owner. A customer comes to complain that the product is bad, but you must remain polite.', { type: 'block', emoji: '🏪' });
            
            document.getElementById('activity-1').innerHTML = `
                <div class="mb-2"><i class="fas fa-theater-masks mr-2 text-purple-600"></i> ${act1Header}</div>
                <div class="mb-3 pl-6">${act1Inst}</div>
                ${act1Content}
            `;

            // Activity 2
            const act2Header = renderInteractive('act2-t', uiData['act2-title'].th, uiData['act2-title'].ipa, uiData['act2-title'].en, { textSize: 'font-bold text-lg' });
            const act2Inst = renderInteractive('act2-i', uiData['act2-inst'].th, uiData['act2-inst'].ipa, uiData['act2-inst'].en, { textSize: 'text-sm text-gray-600' });
            const act2Content = renderInteractive('act2-c', 'ถ้ามีคนพูดจาหยาบคายใส่เรา เราควรด่ากลับทันที หรือควรเดินหนี?', 'tâa mee kon pôot-jaa yàap-kaai sài rao...', 'If someone speaks rudely to us, should we curse back immediately, or should we walk away?', { type: 'block', emoji: '🤔' });

            document.getElementById('activity-2').innerHTML = `

                <div class="mb-3 pl-6">${act2Inst}</div>
                ${act2Content}
            `;

            // Footer
            document.getElementById('footer-container').innerHTML = 
                renderInteractive('foot', uiData['footer-text'].th, uiData['footer-text'].ipa, uiData['footer-text'].en);

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        h1, h2, h3, h4, .btn-text, button, p, div {
            font-family: 'Sarabun', sans-serif;
        }
        .hidden-content {
            display: none;
        }
        .show-content {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .thai-text {
            font-size: 1.15rem;
            line-height: 1.6;
        }
        /* Button Styles for Text Units */
        .ctrl-btn {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .btn-ipa { background-color: #fef9c3; color: #854d0e; border-color: #fde047; } /* yellow-100 */
        .btn-ipa:hover { background-color: #fde047; }
        .btn-en { background-color: #dbeafe; color: #1e40af; border-color: #93c5fd; } /* blue-100 */
        .btn-en:hover { background-color: #bfdbfe; }
        
        .tts-btn {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: #ccfbf1; /* teal-100 */
            color: #0f766e; /* teal-700 */
            cursor: pointer;
            transition: all 0.2s;
        }
        .tts-btn:hover { background-color: #99f6e4; transform: scale(1.05); }

        /* iOS specific adjustments */
        button { touch-action: manipulation; }

        // --- FUNCTIONS ---

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH';
                utterance.rate = 0.9; 
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Browser does not support TTS");
            }
        }

        function toggleVisibility(elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;
            if (el.classList.contains('hidden-content')) {
                el.classList.remove('hidden-content');
                el.classList.add('show-content');
            } else {
                el.classList.add('hidden-content');
                el.classList.remove('show-content');
            }
        }

        function renderInteractive(id, thai, ipa, en, options = {}) {
            const type = options.type || 'inline';
            const textSize = options.textSize || '';
            const emoji = options.emoji || '';

            // Layout: BLOCK Style
            if (type === 'block') {
                return `
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 hover:shadow-md transition">
                    <div class="flex items-start space-x-3">
                        ${emoji ? `<span class="text-2xl pt-1">${emoji}</span>` : ''}
                        <div class="flex-1">
                            <p class="thai-text font-semibold text-gray-800 mb-2">${thai}</p>
                            <div class="flex flex-wrap gap-2">
                                <button onclick="speak('${thai.replace(/'/g, "\\'")}')" class="px-3 py-1 bg-teal-500 text-white rounded-lg text-sm hover:bg-teal-600 flex items-center">
                                    <i class="fas fa-volume-up mr-1"></i> ฟัง
                                </button>
                                <button onclick="toggleVisibility('ipa-${id}')" class="px-3 py-1 bg-yellow-100 text-yellow-800 rounded-lg text-sm font-bold border border-yellow-200 hover:bg-yellow-200">
                                    IPA
                                </button>
                                <button onclick="toggleVisibility('en-${id}')" class="px-3 py-1 bg-blue-100 text-blue-800 rounded-lg text-sm font-bold border border-blue-200 hover:bg-blue-200">
                                    EN
                                </button>
                            </div>
                            <div id="ipa-${id}" class="hidden-content mt-3 text-sm text-gray-500 font-mono bg-yellow-50 p-2 rounded">${ipa}</div>
                            <div id="en-${id}" class="hidden-content mt-2 text-sm text-blue-700 font-medium bg-blue-50 p-2 rounded">${en}</div>
                        </div>
                    </div>
                </div>`;
            }

            // Layout: COMPACT BLOCK (For useful vocab list)
            if (type === 'compact') {
                return `
                <div class="bg-white p-2 rounded-lg border border-gray-200 shadow-sm">
                    <div class="flex flex-col">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-gray-700">${thai}</span>
                            <button onclick="speak('${thai}')" class="text-teal-600 hover:text-teal-800"><i class="fas fa-volume-up"></i></button>
                        </div>
                        <div class="flex space-x-1">
                            <button onclick="toggleVisibility('ipa-${id}')" class="text-[10px] px-1 bg-yellow-100 rounded text-yellow-800">IPA</button>
                            <button onclick="toggleVisibility('en-${id}')" class="text-[10px] px-1 bg-blue-100 rounded text-blue-800">EN</button>
                        </div>
                        <div id="ipa-${id}" class="hidden-content text-xs text-gray-500 mt-1">${ipa}</div>
                        <div id="en-${id}" class="hidden-content text-xs text-blue-600 mt-1">${en}</div>
                    </div>
                </div>`;
            }

            // Layout: INLINE / HEADER Style
            return `
                <div class="inline-block w-full">
                    <div class="flex flex-wrap items-center gap-2">
                        <span class="${textSize}">${thai}</span>
                        <div class="inline-flex items-center space-x-1 ml-1">
                            <button onclick="speak('${thai.replace(/'/g, "\\'")}')" class="tts-btn" title="Listen">
                                <i class="fas fa-volume-up"></i>
                            </button>
                            <button onclick="toggleVisibility('ipa-${id}')" class="ctrl-btn btn-ipa">IPA</button>
                            <button onclick="toggleVisibility('en-${id}')" class="ctrl-btn btn-en">EN</button>
                        </div>
                    </div>
                    <div id="ipa-${id}" class="hidden-content mt-2 text-sm text-gray-500 font-mono ml-1 border-l-2 border-yellow-400 pl-2 bg-yellow-50 p-1 rounded">${ipa}</div>
                    <div id="en-${id}" class="hidden-content mt-1 text-sm text-blue-700 font-medium ml-1 border-l-2 border-blue-400 pl-2 bg-blue-50 p-1 rounded">${en}</div>
                </div>
            `;
        }

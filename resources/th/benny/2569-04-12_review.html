<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Review Lesson</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-active { background-color: #4f46e5; color: white; border-color: #4f46e5; }
        .tab-inactive { background-color: white; color: #4b5563; border-color: #e5e7eb; }
        .tab-inactive:hover { background-color: #f5f3ff; border-color: #c7d2fe; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-20">

    <!-- Header -->
    <header class="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-10">
        <div class="max-w-5xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold">Thai Review Lesson</h1>
                <p class="text-indigo-200 text-sm">Task-based interactive practice</p>
            </div>
            <button onclick="toggleEnglish()" id="toggleBtn" class="flex items-center gap-2 bg-white/20 hover:bg-white/30 px-4 py-2 rounded-full transition font-medium backdrop-blur-sm">
                <i data-lucide="eye" class="w-4 h-4"></i> <span id="btnText">Show English</span>
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 mt-6">
        <!-- Navigation -->
        <div class="flex overflow-x-auto gap-2 pb-4 mb-6 hide-scrollbar">
            <button onclick="switchTab('qa')" id="tab-qa" class="tab-active whitespace-nowrap px-5 py-3 rounded-xl font-bold transition flex items-center gap-2 border">
                <span>❓</span> 1. Q&A
            </button>
            <button onclick="switchTab('jumbled')" id="tab-jumbled" class="tab-inactive whitespace-nowrap px-5 py-3 rounded-xl font-bold transition flex items-center gap-2 border">
                <span>🧩</span> 2. Sentence Order
            </button>
            <button onclick="switchTab('gapFill')" id="tab-gapFill" class="tab-inactive whitespace-nowrap px-5 py-3 rounded-xl font-bold transition flex items-center gap-2 border">
                <span>📝</span> 3. Gap Fill
            </button>
            <button onclick="switchTab('conv')" id="tab-conv" class="tab-inactive whitespace-nowrap px-5 py-3 rounded-xl font-bold transition flex items-center gap-2 border">
                <span>🗣️</span> 4. Conversation
            </button>
            <button onclick="switchTab('match')" id="tab-match" class="tab-inactive whitespace-nowrap px-5 py-3 rounded-xl font-bold transition flex items-center gap-2 border">
                <span>🔗</span> 5. Matching
            </button>
            <button onclick="switchTab('error')" id="tab-error" class="tab-inactive whitespace-nowrap px-5 py-3 rounded-xl font-bold transition flex items-center gap-2 border">
                <span>❌</span> 6. Error Correction
            </button>
        </div>

        <!-- Content Sections -->
        <div id="content-area" class="transition-opacity duration-300">
            <!-- Sections will be injected here via JS -->
        </div>

        <!-- Extension Activities -->
        <div class="mt-16 border-t-2 border-slate-200 pt-8">
            <div class="bg-slate-800 text-slate-100 p-6 rounded-xl shadow-lg">
                <h2 class="text-2xl font-bold mb-6 flex items-center gap-2 text-white">
                    <i data-lucide="play" class="text-amber-400 w-6 h-6"></i> Extension Activities
                </h2>
                <p class="text-slate-300 mb-6 text-sm">Real-life scenarios using ONLY vocabulary learned so far.</p>
                <div class="grid md:grid-cols-2 gap-6" id="extensions-grid">
                    <!-- Extension items here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // DATA
        const vocabData = {
            qa: [
                { id: 1, qTh: "คุณชื่ออะไร", qPh: "Khun chûe à-rai?", aTh: "ผม/ฉันชื่อ...", aPh: "Phǒm / Chǎn chûe...", en: "What is your name?" },
                { id: 2, qTh: "คุณมาจากประเทศอะไร", qPh: "Khun maa jàak prà-têt à-rai?", aTh: "ผม/ฉันมาจากประเทศ...", aPh: "Phǒm / Chǎn maa jàak prà-têt...", en: "What country are you from?" },
                { id: 3, qTh: "คุณทำงานอะไร", qPh: "Khun tam-ngaan à-rai?", aTh: "ผม/ฉันเป็น...", aPh: "Phǒm / Chǎn bpen...", en: "What is your job?" },
                { id: 4, qTh: "สบายดีไหม", qPh: "sà-baai-dii-mái?", aTh: "สบายดี / เครียด / ไม่สบาย", aPh: "sà-baai-dii / krîat / mâi-sà-baai", en: "How are you?" },
                { id: 5, qTh: "เอาอะไร", qPh: "ao à-rai?", aTh: "เอาส้มตำ / น้ำเปล่า...", aPh: "ao sôm-dtam / náam bplào...", en: "What do you want?" }
            ],
            jumbled: [
                { id: 1, parts: [ {th: "ผม", ph: "Phǒm"}, {th: "มา", ph: "maa"}, {th: "จาก", ph: "jàak"}, {th: "ประเทศ", ph: "prà-têt"}, {th: "เกาหลี", ph: "gaw lǐi"} ], en: "I come from Korea." },
                { id: 2, parts: [ {th: "พ่อ", ph: "phâw"}, {th: "ทำงาน", ph: "tam-ngaan"}, {th: "เป็น", ph: "bpen"}, {th: "ตำรวจ", ph: "dtam-rùat"} ], en: "Dad works as a police officer." },
                { id: 3, parts: [ {th: "ขอ", ph: "Khǎw"}, {th: "ส้มตำ", ph: "sôm-dtam"}, {th: "สอง", ph: "sɔ̌ɔng"}, {th: "จาน", ph: "jaan"} ], en: "Can I have two plates of papaya salad?" },
                { id: 4, parts: [ {th: "ทำไม", ph: "tam-mai"}, {th: "เขา", ph: "khao"}, {th: "ไม่สบาย", ph: "mâi-sà-baai"} ], en: "Why is he/she unwell?" },
                { id: 5, parts: [ {th: "ฉัน", ph: "Chǎn"}, {th: "พูด", ph: "phôut"}, {th: "ภาษา", ph: "phaa-sǎa"}, {th: "ญี่ปุ่น", ph: "yîi-bpùn"}, {th: "ได้", ph: "dâi"} ], en: "I can speak Japanese." }
            ],
            gapFill: [
                { id: 1, textPre: "Phǒm", textPost: "jàak prà-têt yîi-bpùn.", options: ["maa", "mii", "ao"], answer: "maa", en: "I come from Japan." },
                { id: 2, textPre: "Khun", textPost: "à-rai?", options: ["krîat", "bpen", "chûe"], answer: "chûe", en: "What is your name?" },
                { id: 3, textPre: "Kâao sɔ̌ɔng", textPost: ".", options: ["jaan", "gâaeo", "kon"], answer: "jaan", en: "Two plates of rice." },
                { id: 4, textPre: "Khao tam-ngaan", textPost: "roong-pá-yaa-baan.", options: ["nai", "tîi", "jàak"], answer: "tîi", en: "He/She works at the hospital." },
                { id: 5, textPre: "Chǎn", textPost: "náam bplào.", options: ["ao", "hěn", "pèt"], answer: "ao", en: "I want plain water." }
            ],
            conversation: [
                { id: 1, prompt: "Sà-baai-dii-mái? 😊", options: ["sà-baai-dii", "pèt", "bpen dtiiw-dtêr"], answer: 0, en: "Are you well? -> Fine." },
                { id: 2, prompt: "Sàng tâo-rài? 🧾", options: ["khao phôut dâi", "kâao sɔ̌ɔng jaan", "sǎa-mii"], answer: 1, en: "How many servings? -> Two plates of rice." },
                { id: 3, prompt: "Khun tam-ngaan à-rai? 💼", options: ["mʉang Grung-têp", "bpen nák-ban-chee", "aa-yú sìp bpii"], answer: 1, en: "What is your job? -> Accountant." },
                { id: 4, prompt: "Ao ìik mái? 🙋‍♀️➕", options: ["hǎao láaeo", "ao nít-nòi", "sà-baai-dii"], answer: 1, en: "Do you want more? -> A bit." },
                { id: 5, prompt: "kâao jaan lá tâo-rài? 🍽️", options: ["yîi-sìp", "ngûang", "sôm-dtam"], answer: 0, en: "Price per plate? -> 20." }
            ],
            matching: [
                { id: 1, ph: "pèt", emoji: "🌶️", en: "Spicy" },
                { id: 2, ph: "mʉang", emoji: "🏙️", en: "City" },
                { id: 3, ph: "sôm-dtam", emoji: "🥗🌶️", en: "Papaya salad" },
                { id: 4, ph: "ngûang", emoji: "😴", en: "Sleepy" },
                { id: 5, ph: "bpen dtiiw-dtêr", emoji: "👨‍🏫", en: "Tutor" }
            ],
            errorCorrection: [
                { id: 1, sentence: ["Chǎn", "maa", "bpen", "yîi-bpùn"], errorIdx: 2, correction: "jàak", en: "I come from Japan." },
                { id: 2, sentence: ["Khun", "chûe", "thâo-rài", "?"], errorIdx: 2, correction: "à-rai", en: "What is your name?" },
                { id: 3, sentence: ["Náam bplào", "sɔ̌ɔng", "jaan"], errorIdx: 2, correction: "gâaeo", en: "Two glasses of water." },
                { id: 4, sentence: ["Khao", "aa-yú", "sɔ̌ɔng", "kon"], errorIdx: 3, correction: "bpii", en: "He is two years old." },
                { id: 5, sentence: ["Phǒm", "pèt", "aa-hăan-jeen"], errorIdx: 1, correction: "gin", en: "I eat Chinese food." }
            ]
        };

        let showEnglish = false;
        let currentTab = 'qa';

        // UI HELPERS
        function toggleEnglish() {
            showEnglish = !showEnglish;
            const btnText = document.getElementById('btnText');
            const toggleBtn = document.getElementById('toggleBtn');
            btnText.innerText = showEnglish ? 'Hide English' : 'Show English';
            renderCurrentTab();
            lucide.createIcons();
        }

        function switchTab(tabId) {
            document.getElementById(`tab-${currentTab}`).className = 'tab-inactive whitespace-nowrap px-5 py-3 rounded-xl font-bold transition flex items-center gap-2 border';
            currentTab = tabId;
            document.getElementById(`tab-${currentTab}`).className = 'tab-active whitespace-nowrap px-5 py-3 rounded-xl font-bold transition flex items-center gap-2 border';
            renderCurrentTab();
            lucide.createIcons();
        }

        // RENDER FUNCTIONS
        function renderCurrentTab() {
            const container = document.getElementById('content-area');
            container.innerHTML = '';
            
            switch(currentTab) {
                case 'qa': renderQA(container); break;
                case 'jumbled': renderJumbled(container); break;
                case 'gapFill': renderGapFill(container); break;
                case 'conv': renderConv(container); break;
                case 'match': renderMatch(container); break;
                case 'error': renderError(container); break;
            }
        }

        function renderQA(container) {
            container.innerHTML = `<h2 class="text-2xl font-bold mb-4">❓ Asking Questions (Q&A)</h2>`;
            vocabData.qa.forEach((item, idx) => {
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 mb-4 hover:shadow-md transition">
                        <div class="flex gap-4 items-start">
                            <span class="bg-blue-100 text-blue-700 font-bold px-3 py-1 rounded-full">${idx + 1}</span>
                            <div class="flex-1">
                                <h3 class="text-xl font-bold text-slate-800">${item.qPh}</h3>
                                <p class="text-sm text-slate-500 mb-2">${item.qTh}</p>
                                ${showEnglish ? `<p class="text-sm text-green-600 font-medium mb-3">En: ${item.en}</p>` : ''}
                                <div class="mt-4 bg-slate-50 p-3 rounded-lg">
                                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1">Answer Hint</span>
                                    <p class="text-lg text-slate-700 font-medium">${item.aPh}</p>
                                    <p class="text-xs text-slate-400">${item.aTh}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function renderJumbled(container) {
            container.innerHTML = `<h2 class="text-2xl font-bold mb-4">🧩 Sentence Order</h2>`;
            vocabData.jumbled.forEach((item, idx) => {
                const sectionId = `jumbled-${item.id}`;
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 mb-8" id="${sectionId}">
                        <div class="flex justify-between items-center mb-3">
                            <span class="bg-indigo-100 text-indigo-700 font-bold px-3 py-1 rounded-full text-sm">Sentence ${idx + 1}</span>
                            ${showEnglish ? `<span class="text-sm text-green-600 font-medium">${item.en}</span>` : ''}
                        </div>
                        <div id="dropzone-${item.id}" class="min-h-[60px] bg-slate-50 border-2 border-dashed border-slate-200 rounded-lg p-3 flex flex-wrap gap-2 mb-4 items-center">
                            <span class="text-slate-400 text-sm placeholder-text">Tap words below...</span>
                        </div>
                        <div id="words-${item.id}" class="flex flex-wrap gap-2 mb-4"></div>
                        <div class="flex items-center gap-3">
                            <button onclick="checkJumbled(${item.id})" class="bg-green-500 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 hover:bg-green-600">
                                <i data-lucide="check-circle-2" class="w-4 h-4"></i> Check
                            </button>
                            <button onclick="resetJumbled(${item.id})" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg flex items-center gap-2">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Reset
                            </button>
                            <div id="status-${item.id}" class="font-bold"></div>
                        </div>
                    </div>
                `;
                setTimeout(() => resetJumbled(item.id), 0);
            });
        }

        // Jumbled Logic
        let activeJumbled = {};
        function resetJumbled(id) {
            const item = vocabData.jumbled.find(v => v.id === id);
            activeJumbled[id] = { selected: [], available: [...item.parts].sort(() => Math.random() - 0.5) };
            renderJumbledButtons(id);
            document.getElementById(`status-${id}`).innerText = '';
        }

        function renderJumbledButtons(id) {
            const dz = document.getElementById(`dropzone-${id}`);
            const ws = document.getElementById(`words-${id}`);
            const placeholder = dz.querySelector('.placeholder-text');

            dz.innerHTML = '';
            if (activeJumbled[id].selected.length === 0) dz.appendChild(placeholder);
            activeJumbled[id].selected.forEach((part, i) => {
                const btn = document.createElement('button');
                btn.className = "bg-indigo-600 text-white px-4 py-2 rounded-lg shadow cursor-pointer hover:bg-indigo-700 transition";
                btn.innerHTML = `<span class="block font-bold">${part.ph}</span><span class="block text-[10px] opacity-70">${part.th}</span>`;
                btn.onclick = () => {
                    activeJumbled[id].available.push(activeJumbled[id].selected.splice(i, 1)[0]);
                    renderJumbledButtons(id);
                };
                dz.appendChild(btn);
            });

            ws.innerHTML = '';
            activeJumbled[id].available.forEach((part, i) => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-2 border-slate-200 text-slate-700 px-4 py-2 rounded-lg hover:border-indigo-400 hover:text-indigo-600 transition";
                btn.innerHTML = `<span class="block font-bold">${part.ph}</span><span class="block text-[10px] text-slate-400">${part.th}</span>`;
                btn.onclick = () => {
                    activeJumbled[id].selected.push(activeJumbled[id].available.splice(i, 1)[0]);
                    renderJumbledButtons(id);
                };
                ws.appendChild(btn);
            });
        }

        function checkJumbled(id) {
            const item = vocabData.jumbled.find(v => v.id === id);
            const status = document.getElementById(`status-${id}`);
            const isCorrect = activeJumbled[id].selected.every((s, i) => s.ph === item.parts[i].ph) && activeJumbled[id].selected.length === item.parts.length;
            
            if (isCorrect) {
                status.className = "text-green-600 font-bold flex items-center gap-1";
                status.innerHTML = `<i data-lucide="check-circle-2" class="w-4 h-4"></i> Correct!`;
            } else {
                status.className = "text-red-500 font-bold flex items-center gap-1";
                status.innerHTML = `<i data-lucide="x-circle" class="w-4 h-4"></i> Try again`;
            }
            lucide.createIcons();
        }

        function renderGapFill(container) {
            container.innerHTML = `<h2 class="text-2xl font-bold mb-4">📝 Gap Fill</h2>`;
            vocabData.gapFill.forEach((item, idx) => {
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex flex-col md:flex-row gap-4 justify-between md:items-center mb-4">
                        <div>
                            <div class="flex items-center gap-3 mb-2">
                                <span class="bg-amber-100 text-amber-700 font-bold px-3 py-1 rounded-full text-sm">${idx + 1}</span>
                                ${showEnglish ? `<span class="text-sm text-green-600 font-medium">${item.en}</span>` : ''}
                            </div>
                            <p class="text-xl font-medium text-slate-800">
                                ${item.textPre} <span id="gap-${item.id}" class="inline-block min-w-[80px] border-b-2 border-slate-300 text-center text-indigo-600 font-bold px-2">____</span> ${item.textPost}
                            </p>
                        </div>
                        <div class="flex flex-wrap gap-2 shrink-0">
                            ${item.options.map(opt => `
                                <button onclick="checkGap(${item.id}, '${opt}', '${item.answer}')" id="btn-${item.id}-${opt}" class="px-4 py-2 rounded-lg font-bold border-2 bg-white border-slate-200 text-slate-600 hover:border-indigo-300 hover:bg-indigo-50 transition">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
        }

        function checkGap(id, val, correct) {
            const display = document.getElementById(`gap-${id}`);
            display.innerText = val;
            vocabData.gapFill.find(v => v.id === id).options.forEach(opt => {
                const btn = document.getElementById(`btn-${id}-${opt}`);
                btn.className = "px-4 py-2 rounded-lg font-bold border-2 bg-white border-slate-200 text-slate-600 hover:border-indigo-300 hover:bg-indigo-50 transition";
                if (opt === val) {
                    btn.className = (val === correct) ? "px-4 py-2 rounded-lg font-bold border-2 bg-green-100 border-green-500 text-green-700" : "px-4 py-2 rounded-lg font-bold border-2 bg-red-100 border-red-500 text-red-700";
                }
            });
        }

        function renderConv(container) {
            container.innerHTML = `<h2 class="text-2xl font-bold mb-4">🗣️ Interactive Conversation</h2><div class="grid md:grid-cols-2 gap-4" id="conv-grid"></div>`;
            const grid = document.getElementById('conv-grid');
            vocabData.conversation.forEach((item, idx) => {
                grid.innerHTML += `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100">
                        <div class="mb-4">
                             <span class="bg-rose-100 text-rose-700 font-bold px-3 py-1 rounded-full text-sm mb-3 inline-block">Q ${idx + 1}</span>
                             <h3 class="text-xl font-bold text-slate-800">${item.prompt}</h3>
                             ${showEnglish ? `<p class="text-sm text-green-600 mt-1">${item.en}</p>` : ''}
                        </div>
                        <div class="space-y-2">
                            ${item.options.map((opt, oIdx) => `
                                <button onclick="checkConv(${item.id}, ${oIdx}, ${item.answer})" id="conv-${item.id}-${oIdx}" class="w-full text-left px-4 py-3 rounded-lg border-2 font-medium bg-white border-slate-200 text-slate-700 hover:border-slate-300 hover:bg-slate-50 transition flex justify-between items-center">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
        }

        function checkConv(id, chosen, correct) {
            vocabData.conversation.find(v => v.id === id).options.forEach((opt, idx) => {
                const btn = document.getElementById(`conv-${id}-${idx}`);
                btn.className = "w-full text-left px-4 py-3 rounded-lg border-2 font-medium bg-white border-slate-200 text-slate-700 transition flex justify-between items-center";
                if (idx === chosen) {
                    btn.className = (chosen === correct) ? "w-full text-left px-4 py-3 rounded-lg border-2 font-medium bg-green-100 border-green-500 text-green-800 transition flex justify-between items-center" : "w-full text-left px-4 py-3 rounded-lg border-2 font-medium bg-red-100 border-red-500 text-red-800 transition flex justify-between items-center";
                }
            });
        }

        function renderMatch(container) {
            container.innerHTML = `
                <h2 class="text-2xl font-bold mb-4">🔗 Matching</h2>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <div class="flex justify-between items-center mb-6">
                        <p class="text-slate-600 font-medium">Match the sound with the emoji.</p>
                        <div id="match-score" class="text-sm font-bold bg-slate-100 px-3 py-1 rounded-lg text-slate-600">Matched: 0 / 5</div>
                    </div>
                    <div class="flex gap-4 md:gap-12">
                        <div class="flex-1 space-y-3" id="match-left"></div>
                        <div class="flex-1 space-y-3" id="match-right"></div>
                    </div>
                </div>
            `;
            const left = document.getElementById('match-left');
            const right = document.getElementById('match-right');
            
            const shuffledL = [...vocabData.matching].sort(() => Math.random() - 0.5);
            const shuffledR = [...vocabData.matching].sort(() => Math.random() - 0.5);

            shuffledL.forEach(item => {
                left.innerHTML += `<button onclick="pickMatch('L', ${item.id})" id="match-l-${item.id}" class="w-full p-4 rounded-xl text-lg font-bold border-2 bg-white border-slate-200 text-slate-700 hover:border-teal-300 transition h-[74px]">${item.ph}${showEnglish ? `<span class="block text-xs font-normal text-slate-400">${item.en}</span>` : ''}</button>`;
            });
            shuffledR.forEach(item => {
                right.innerHTML += `<button onclick="pickMatch('R', ${item.id})" id="match-r-${item.id}" class="w-full p-4 rounded-xl text-3xl flex justify-center items-center border-2 bg-white border-slate-200 hover:border-teal-300 transition h-[74px]">${item.emoji}</button>`;
            });
        }

        let matchState = { L: null, R: null, count: 0 };
        function pickMatch(side, id) {
            if (matchState[side] === id) {
                matchState[side] = null;
                updateMatchStyles();
                return;
            }
            matchState[side] = id;
            updateMatchStyles();

            if (matchState.L !== null && matchState.R !== null) {
                if (matchState.L === matchState.R) {
                    const id = matchState.L;
                    document.getElementById(`match-l-${id}`).disabled = true;
                    document.getElementById(`match-r-${id}`).disabled = true;
                    document.getElementById(`match-l-${id}`).className = "w-full p-4 rounded-xl text-lg font-bold border-2 bg-slate-100 border-slate-200 text-slate-300 h-[74px]";
                    document.getElementById(`match-r-${id}`).className = "w-full p-4 rounded-xl text-3xl flex justify-center items-center border-2 bg-slate-100 border-slate-200 opacity-30 h-[74px]";
                    matchState.count++;
                    document.getElementById('match-score').innerText = `Matched: ${matchState.count} / 5`;
                    matchState.L = null; matchState.R = null;
                } else {
                    const ol = matchState.L; const or = matchState.R;
                    document.getElementById(`match-l-${ol}`).classList.add('bg-red-100', 'border-red-500');
                    document.getElementById(`match-r-${or}`).classList.add('bg-red-100', 'border-red-500');
                    setTimeout(() => {
                        matchState.L = null; matchState.R = null;
                        updateMatchStyles();
                    }, 500);
                }
            }
        }

        function updateMatchStyles() {
            vocabData.matching.forEach(item => {
                const btnL = document.getElementById(`match-l-${item.id}`);
                const btnR = document.getElementById(`match-r-${item.id}`);
                if (!btnL.disabled) {
                    btnL.className = (matchState.L === item.id) ? "w-full p-4 rounded-xl text-lg font-bold border-2 bg-teal-100 border-teal-500 text-teal-800 transition h-[74px]" : "w-full p-4 rounded-xl text-lg font-bold border-2 bg-white border-slate-200 text-slate-700 hover:border-teal-300 transition h-[74px]";
                }
                if (!btnR.disabled) {
                    btnR.className = (matchState.R === item.id) ? "w-full p-4 rounded-xl text-3xl flex justify-center items-center border-2 bg-teal-100 border-teal-500 transition h-[74px]" : "w-full p-4 rounded-xl text-3xl flex justify-center items-center border-2 bg-white border-slate-200 hover:border-teal-300 transition h-[74px]";
                }
            });
        }

        function renderError(container) {
            container.innerHTML = `<h2 class="text-2xl font-bold mb-4">❌ Error Correction</h2>`;
            vocabData.errorCorrection.forEach((item, idx) => {
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 mb-4">
                        <div class="flex gap-3 items-center mb-3">
                            <span class="bg-red-100 text-red-700 font-bold px-3 py-1 rounded-full text-sm">Find Error ${idx + 1}</span>
                            ${showEnglish ? `<span class="text-sm text-green-600 font-medium">${item.en}</span>` : ''}
                        </div>
                        <p class="text-sm text-slate-500 mb-4">Click the word that is <strong>incorrect</strong>.</p>
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${item.sentence.map((w, wIdx) => `
                                <button onclick="checkError(${item.id}, ${wIdx}, ${item.errorIdx}, '${item.correction}')" id="err-${item.id}-${wIdx}" class="text-xl md:text-2xl font-bold px-3 py-2 rounded-lg border-2 bg-white border-slate-200 text-slate-800 hover:bg-slate-50 hover:border-slate-300 transition">
                                    ${w}
                                </button>
                            `).join('')}
                        </div>
                        <div id="err-feedback-${item.id}" class="hidden mt-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-800 flex items-center gap-2 font-medium"></div>
                    </div>
                `;
            });
        }

        function checkError(id, clicked, errorIdx, correction) {
            const btn = document.getElementById(`err-${id}-${clicked}`);
            if (clicked === errorIdx) {
                btn.className = "text-xl md:text-2xl font-bold px-3 py-2 rounded-lg border-2 bg-green-100 border-green-500 text-green-800 line-through transition";
                const feedback = document.getElementById(`err-feedback-${id}`);
                feedback.classList.remove('hidden');
                feedback.innerHTML = `Correct! It should be: <strong class="text-xl bg-white px-2 py-1 rounded ml-2">${correction}</strong>`;
                vocabData.errorCorrection.find(v => v.id === id).sentence.forEach((_, i) => {
                    if (i !== errorIdx) document.getElementById(`err-${id}-${i}`).className = "text-xl md:text-2xl font-bold px-3 py-2 rounded-lg border-2 bg-white border-transparent text-slate-400 transition";
                });
            } else {
                btn.classList.add('bg-red-100', 'border-red-500', 'text-red-700');
                setTimeout(() => btn.classList.remove('bg-red-100', 'border-red-500', 'text-red-700'), 500);
            }
        }

        // INIT
        window.onload = () => {
            const extensions = [
                { title: "1. Role-play: Food Order 🍽️", desc: "T: Sà-baai-dii-mái? Ao à-rai?<br/>S: (Orders using vocab)<br/>T: Sàng tâo-rài?", color: "amber" },
                { title: "2. Who is it? 🕵️‍♂️", desc: "Ask Yes/No: Khao bpen dtam-rùat mái? / Khao aa-yú sìp bpii mái?", color: "blue" },
                { title: "3. Rice vs Noodles 🍚🍜", desc: "Debate! Use: kâao, gǔai-dtǐao, pèt, dii, châawp.", color: "green" },
                { title: "4. Discussion Qs 💬", desc: "• Khun châawp gin à-rai?<br/>• Krâwp-krua mii gîi kon?", color: "pink" },
                { title: "5. Interview 🎤", desc: "Teacher acts as recruiter: Phôut phaa-sǎa yîi-bpùn dâi mái?", color: "purple" }
            ];
            
            const grid = document.getElementById('extensions-grid');
            extensions.forEach(ex => {
                grid.innerHTML += `<div class="bg-slate-700 p-4 rounded-lg"><h3 class="text-lg font-bold text-${ex.color}-400 mb-2">${ex.title}</h3><p class="text-sm leading-relaxed">${ex.desc}</p></div>`;
            });

            switchTab('qa');
            lucide.createIcons();
        };
    </script>
</body>
</html>

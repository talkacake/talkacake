        // --- COMPONENTS ---

        // Universal Component for Thai Text + TTS + Toggles (DOM-Safe)
        const InteractiveText = ({ textObj, size = "md", color = "text-gray-800", isInline = false }) => {
            const [showIPA, setShowIPA] = useState(false);
            const [showEN, setShowEN] = useState(false);
            
            let txtSize = "text-base";
            if(size === "xl") txtSize = "text-2xl";
            if(size === "lg") txtSize = "text-xl";
            if(size === "sm") txtSize = "text-sm";
            
            return (
                <div className={`flex flex-col gap-1 ${isInline ? 'inline-flex' : 'mb-3'} w-full`}>
                    <div className="flex items-center gap-2 flex-wrap">
                        {textObj.emoji && <span className={`${txtSize}`}>{textObj.emoji}</span>}
                        <span 
                            onClick={(e) => { e.preventDefault(); e.stopPropagation(); speak(textObj.thai); }} 
                            className="cursor-pointer inline-flex items-center justify-center text-blue-600 hover:text-blue-800 flex-shrink-0 transition-transform active:scale-90 bg-blue-100 p-1.5 rounded-full shadow-sm"
                        >
                            <i className="ph ph-speaker-high text-lg"></i>
                        </span>
                        <span className={`${txtSize} font-bold ${color} thai-font leading-snug`}>{textObj.thai}</span>
                        
                        <div className="flex gap-1 ml-auto">
                            <span 
                                onClick={(e) => { e.preventDefault(); e.stopPropagation(); setShowIPA(!showIPA); }} 
                                className={`cursor-pointer inline-block text-[10px] px-2 py-1 rounded shadow-sm font-bold transition-colors ${showIPA ? 'bg-purple-500 text-white' : 'bg-white text-gray-500 border border-gray-200'}`}
                            >
                                IPA
                            </span>
                            <span 
                                onClick={(e) => { e.preventDefault(); e.stopPropagation(); setShowEN(!showEN); }} 
                                className={`cursor-pointer inline-block text-[10px] px-2 py-1 rounded shadow-sm font-bold transition-colors ${showEN ? 'bg-emerald-500 text-white' : 'bg-white text-gray-500 border border-gray-200'}`}
                            >
                                EN
                            </span>
                        </div>
                    </div>
                    
                    {(showIPA || showEN) && (
                        <div className="w-full bg-white/60 rounded-lg p-2 space-y-1 mt-1 border border-blue-50 shadow-inner">
                            {showIPA && <div className="text-purple-700 text-sm font-mono tracking-wide">/{textObj.ipa}/</div>}
                            {showEN && <div className="text-emerald-700 text-sm italic">"{textObj.en}"</div>}
                        </div>
                    )}
                </div>
            );
        };

        const RandomVocabGenerator = () => {
            const [currentWord, setCurrentWord] = useState(null);

            const pickRandom = () => {
                const randomIdx = Math.floor(Math.random() * previousVocab.length);
                setCurrentWord(previousVocab[randomIdx]);
            };

            useEffect(() => {
                pickRandom();
            }, []);

            return (
                <div className="bg-white rounded-2xl shadow-sm border-2 border-indigo-100 p-5 mb-6">
                    <InteractiveText textObj={uiText.instructionSentence} size="md" color="text-gray-600" />
                    
                    <div className="min-h-[140px] flex flex-col items-center justify-center bg-indigo-50 rounded-xl p-4 my-4 border border-indigo-200 shadow-inner">
                        {currentWord ? (
                            <div className="text-center w-full">
                                <div className="text-5xl mb-3">{currentWord.emoji}</div>
                                <InteractiveText textObj={{thai: currentWord.thai, ipa: currentWord.ipa, en: currentWord.en}} size="xl" color="text-indigo-900" />
                            </div>
                        ) : (
                            <span className="text-gray-400">...</span>
                        )}
                    </div>

                    <div className="flex justify-center mt-2">
                        <span onClick={pickRandom} className="cursor-pointer bg-indigo-500 hover:bg-indigo-600 text-white w-full py-3 rounded-xl shadow-md font-bold flex flex-col items-center gap-1 transition-transform active:scale-95">
                             <InteractiveText textObj={uiText.btnRandom} size="md" color="text-white" />
                        </span>
                    </div>
                </div>
            );
        };

        const VocabCard = ({ item }) => {
            return (
                <div className="bg-white p-4 rounded-xl shadow-sm border border-blue-100 flex flex-col">
                    <InteractiveText textObj={item} size="lg" color="text-blue-900" />
                </div>
            );
        };

        const CompQuestionItem = ({ qData }) => {
            const [showAnswer, setShowAnswer] = useState(false);
            
            return (
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-3">
                    <InteractiveText textObj={qData.q} size="md" color="text-slate-800" />
                    
                    {!showAnswer ? (
                        <span 
                            onClick={() => setShowAnswer(true)} 
                            className="cursor-pointer mt-2 inline-flex items-center gap-1 bg-slate-100 text-slate-500 px-3 py-1.5 rounded-lg text-sm font-bold hover:bg-slate-200 transition-colors"
                        >
                            <i className="ph ph-lightbulb"></i> {uiText.btnShowAnswer.thai}
                        </span>
                    ) : (
                        <div className="mt-3 pt-3 border-t border-slate-100 bg-emerald-50 p-3 rounded-lg">
                            <InteractiveText textObj={qData.a} size="md" color="text-emerald-800" />
                        </div>
                    )}
                </div>
            );
        };

        const ActivityCard = ({ activity }) => {
            return (
                <div className="bg-white border-2 border-slate-100 p-4 rounded-xl shadow-sm mb-3">
                    <div className="mb-2 inline-block bg-slate-100 px-2 py-1 rounded-lg">
                        <InteractiveText textObj={{...activity.type, emoji: activity.emoji}} size="sm" color="text-slate-600" isInline={true} />
                    </div>
                    <InteractiveText textObj={activity.task} size="md" color="text-slate-800" />
                </div>
            );
        };

        const App = () => {
            return (
                <div className="max-w-2xl mx-auto min-h-screen pb-20">
                    {/* Header */}
                    <header className="bg-blue-600 text-white p-6 rounded-b-3xl shadow-md mb-8 sticky top-0 z-50 border-b-4 border-blue-800">
                        <InteractiveText textObj={uiText.mainTitle} size="xl" color="text-white" />
                    </header>

                    <div className="px-4 space-y-10">
                        
                        {/* 1. Review (Random Vocab) */}
                        <section>
                            <div className="mb-4 bg-indigo-100 p-3 rounded-2xl inline-block shadow-sm">
                                <InteractiveText textObj={uiText.sectionReview} size="lg" color="text-indigo-900" />
                            </div>
                            <RandomVocabGenerator />
                        </section>

                        {/* 2. Video & Comprehension */}
                        <section>
                            <div className="mb-4 bg-slate-200 p-3 rounded-2xl inline-block shadow-sm">
                                <InteractiveText textObj={uiText.sectionVideo} size="lg" color="text-slate-900" />
                            </div>
                            
                            {/* YouTube Video Embed */}
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-6">
                                <div className="text-center mb-3">
                                     <InteractiveText textObj={uiText.instructionListen} size="md" color="text-slate-700" />
                                </div>
                                <div className="relative w-full overflow-hidden rounded-xl shadow-inner bg-black" style={{ paddingTop: '56.25%' }}>
                                    <iframe 
                                        className="absolute top-0 left-0 w-full h-full"
                                        src="https://www.youtube.com/embed/584Dgp4GtA0?start=0&end=12" 
                                        title="YouTube video player" 
                                        frameBorder="0" 
                                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                        allowFullScreen>
                                    </iframe>
                                </div>
                                
                                <div className="mt-5 space-y-2 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                    {dialogueScript.map((item, idx) => (
                                        <div key={idx} className="border-l-4 border-blue-400 pl-3">
                                            <div className="text-xs font-bold text-slate-400 mb-1">{item.speaker}</div>
                                            <InteractiveText textObj={item} size="md" color="text-slate-800" />
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="mb-4 inline-block">
                                <InteractiveText textObj={uiText.sectionComp} size="md" color="text-slate-800" />
                            </div>
                            
                            {compQuestions.map((q, idx) => (
                                <CompQuestionItem key={idx} qData={q} />
                            ))}
                        </section>

                        {/* 3. Target Vocab */}
                        <section>
                            <div className="mb-4 bg-blue-100 p-3 rounded-2xl inline-block shadow-sm">
                                <InteractiveText textObj={uiText.sectionVocab} size="lg" color="text-blue-900" />
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                {targetVocab.map((item, idx) => (
                                    <VocabCard key={idx} item={item} />
                                ))}
                            </div>
                        </section>

                        {/* 4. Real-life Tasks (Practice) */}
                        <section>
                            <div className="mb-4 bg-emerald-100 p-3 rounded-2xl inline-block shadow-sm">
                                <InteractiveText textObj={uiText.sectionPractice} size="lg" color="text-emerald-900" />
                            </div>
                            <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                {practiceActivities.map((act, idx) => (
                                    <ActivityCard key={idx} activity={act} />
                                ))}
                            </div>
                        </section>

                        {/* 5. Extension Activities */}
                        <section>
                            <div className="mb-4 bg-purple-100 p-3 rounded-2xl inline-block shadow-sm">
                                <InteractiveText textObj={uiText.sectionExtension} size="lg" color="text-purple-900" />
                            </div>
                            <div className="bg-white rounded-2xl shadow-sm border-2 border-purple-100 p-5 mb-6">
                                <div className="bg-purple-50 border border-purple-200 p-3 rounded-xl mb-4 text-center">
                                    <InteractiveText textObj={uiText.extensionNote} size="sm" color="text-purple-800" />
                                </div>
                                
                                <div className="space-y-3">
                                    {extensionActivities.map((act, idx) => (
                                        <ActivityCard key={idx} activity={act} />
                                    ))}
                                </div>
                            </div>
                        </section>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

        // --- Core UI Component Builder ---
        function TB(th, ipa, en, em = '✨') {
            const id = Math.random().toString(36).substr(2, 9);
            return `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 my-2 transition-all hover:shadow-md">
                    <div class="flex items-start gap-3">
                        <div class="text-2xl mt-1 shrink-0 bg-slate-50 p-2 rounded-xl">${em}</div>
                        <div class="flex-grow">
                            <div class="flex flex-wrap items-center gap-2 mb-1.5">
                                <span class="text-xl font-bold text-slate-800">${th}</span>
                                <button onclick="playTTS('${th}', event)" class="p-1.5 bg-green-100 text-green-700 rounded-full hover:bg-green-200 active:scale-95 transition-all"><i data-lucide="volume-2" class="w-4 h-4"></i></button>
                                <button onclick="toggleElement('ipa-${id}')" class="px-2 py-1 text-xs font-bold rounded-md bg-sky-100 text-sky-700 hover:bg-sky-200">IPA</button>
                                <button onclick="toggleElement('en-${id}')" class="px-2 py-1 text-xs font-bold rounded-md bg-emerald-100 text-emerald-700 hover:bg-emerald-200">EN</button>
                            </div>
                            <div id="ipa-${id}" class="ipa-content ${showAllIpa ? '' : 'hidden'} text-sky-600 font-semibold tracking-wide mb-1 text-sm bg-sky-50 py-1 px-2 rounded-md inline-block w-full">${ipa}</div>
                            <div id="en-${id}" class="en-content ${showAllEn ? '' : 'hidden'} text-emerald-600 italic text-sm bg-emerald-50 py-1 px-2 rounded-md inline-block w-full">${en}</div>
                        </div>
                    </div>
                </div>
            `;
        }

            if (event) { event.preventDefault(); event.stopPropagation(); }
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        function toggleElement(id) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('hidden');
        }

        function toggleGlobal(type) {
            if (type === 'ipa') {
                showAllIpa = !showAllIpa;
                document.querySelectorAll('.ipa-content').forEach(el => showAllIpa ? el.classList.remove('hidden') : el.classList.add('hidden'));
            } else {
                showAllEn = !showAllEn;
                document.querySelectorAll('.en-content').forEach(el => showAllEn ? el.classList.remove('hidden') : el.classList.add('hidden'));
            }
        }

        function getRandomVocab() {
            const randomIndex = Math.floor(Math.random() * vocabList.length);
            const v = vocabList[randomIndex];
            const container = document.getElementById('random-vocab-container');
            container.innerHTML = TB(v.th, v.ipa, v.en, v.em);
            lucide.createIcons();
        }

        function switchTab(tab) {
            ['review', 'learn', 'tasks', 'extensions'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    btn.classList.replace('bg-white', 'bg-green-600');
                    btn.classList.replace('text-green-700', 'text-white');
                } else {
                    btn.classList.replace('bg-green-600', 'bg-white');
                    btn.classList.replace('text-white', 'text-green-700');
                }
            });

            const area = document.getElementById('content-area');
            if (tab === 'review') area.innerHTML = getReviewHtml();
            if (tab === 'learn') area.innerHTML = getLearnHtml();
            if (tab === 'tasks') area.innerHTML = getTasksHtml();
            if (tab === 'extensions') area.innerHTML = getExtensionsHtml();
            
            lucide.createIcons();
            
            // Generate first random word if on review tab
            if (tab === 'review') getRandomVocab();
        }

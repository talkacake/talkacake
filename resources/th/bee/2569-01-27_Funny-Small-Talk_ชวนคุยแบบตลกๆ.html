<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Talk: Funny Edition</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #fff1f2; font-family: 'Sarabun', sans-serif; }
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap');
        
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .btn-press:active { transform: scale(0.95); }
        
        .pattern-bg {
            background-image: radial-gradient(#f43f5e 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DATA ---

        const pageTitle = {
            thai: "ชวนคุยแบบตลกๆ",
            ipa: "chuuan kui bàep dtà-lòk dtà-lòk",
            en: "Funny Small Talk",
            emoji: "🤪"
        };

        const sections = [
            { id: 'interview', title: "1. สัมภาษณ์แปลกๆ", sub: "Weird Interview", icon: "mic", emoji: "🎤" },
            { id: 'debate', title: "2. โต้วาทีหยุดโลก", sub: "Epic Debate", icon: "swords", emoji: "⚔️" },
            { id: 'roleplay', title: "3. บทบาทสมมติ", sub: "Crazy Roleplay", icon: "drama", emoji: "🎭" },
            { id: 'story', title: "4. เรื่องเล่าสามคำ", sub: "3-Word Story", icon: "book-open", emoji: "📚" }
        ];

        // Filtered High-Frequency Vocab for Small Talk
        const coreVocab = [
            { thai: "เคย", ipa: "kooei", en: "Ever / Used to" },
            { thai: "ตลก", ipa: "dtà-lòk", en: "Funny" },
            { thai: "หล่อ", ipa: "lɔ̀ɔ", en: "Handsome" },
            { thai: "เครียด", ipa: "krîat", en: "Stressed" },
            { thai: "ทำอาหาร", ipa: "tam aa-hǎan", en: "Cook" },
            { thai: "เกาหลี", ipa: "gao-lǐi", en: "Korea" },
            { thai: "ข้าวเหนียว", ipa: "kâao nǐao", en: "Sticky rice" },
            { thai: "น้ำแข็ง", ipa: "nám kɛ̌ng", en: "Ice" },
            { thai: "ร้องเพลง", ipa: "rɔ́ɔng pleeng", en: "Sing" },
            { thai: "ผี", ipa: "pǐi", en: "Ghost" } 
        ];

        const interviewQuestions = [
            {
                q: { thai: "คุณเคยร้องเพลงให้แมวฟังไหม?", ipa: "kun kooei rɔ́ɔng pleeng hâi maew fang mái?", en: "Have you ever sung a song for a cat?" },
                emoji: "🐱🎤"
            },
            {
                q: { thai: "คุณเคยทำอาหารไหม้ไหม?", ipa: "kun kooei tam aa-hǎan mâi mái?", en: "Have you ever burnt your food?" },
                emoji: "🍳🔥"
            },
            {
                q: { thai: "ตอนเด็กๆ คุณเคยเห็นผีในห้องน้ำไหม?", ipa: "dtɔɔn dèk-dèk kun kooei hěn pǐi nai hɔ̂ɔng-nám mái?", en: "When you were young, did you ever see a ghost in the bathroom?" },
                emoji: "👻🚽"
            },
            {
                q: { thai: "คุณเคยลืมชื่อเพื่อนสนิทไหม?", ipa: "kun kooei lʉʉm chʉ̂ʉ pʉ̂uan sà-nìt mái?", en: "Have you ever forgotten your best friend's name?" },
                emoji: "🤔❓"
            }
        ];

        const debates = [
            {
                topic: { thai: "เป็นคนตลก vs เป็นคนหล่อ", ipa: "bpen kon dtà-lòk VS bpen kon lɔ̀ɔ", en: "Being Funny VS Being Handsome" },
                teamA: { 
                    name: { thai: "ทีมตลก", ipa: "tiim dtà-lòk", en: "Funny Team" }, 
                    arg: { thai: "ทุกคนชอบคนตลก, ไม่เครียด, มีความสุข", ipa: "túk-kon chɔ̂ɔp kon dtà-lòk, mâi krîat, mii kwaam-sùk", en: "Everyone likes funny people, no stress, happy" } 
                },
                teamB: { 
                    name: { thai: "ทีมหล่อ", ipa: "tiim lɔ̀ɔ", en: "Handsome Team" }, 
                    arg: { thai: "ดูดี, แฟนเยอะ, ถ่ายรูปสวย", ipa: "duu dii, faen yér, tàai-rûup sǔuai", en: "Look good, many fans, good photos" } 
                }
            },
            {
                topic: { thai: "กินข้าวเหนียวทุกวัน vs กินอาหารเกาหลีทุกวัน", ipa: "gin kâao-nǐao túk wan VS gin aa-hǎan gao-lǐi túk wan", en: "Eat Sticky Rice everyday VS Eat Korean Food everyday" },
                teamA: { 
                    name: { thai: "ทีมข้าวเหนียว", ipa: "tiim kâao-nǐao", en: "Sticky Rice Team" }, 
                    arg: { thai: "อร่อย, ถูก, อิ่มนาน", ipa: "à-rɔ̀i, tùuk, ìm naan", en: "Delicious, cheap, full for long time" } 
                },
                teamB: { 
                    name: { thai: "ทีมเกาหลี", ipa: "tiim gao-lǐi", en: "Korean Team" }, 
                    arg: { thai: "เท่, รสชาติหลากหลาย, เหมือนในซีรี่ส์", ipa: "têe, rót-châat làak-lǎai, mʉ̌ʉan nai sii-rîi", en: "Cool, various tastes, like in series" } 
                }
            }
        ];

        const roleplays = [
            {
                title: { thai: "ซุปตาร์ตกอับ", ipa: "súp-dtaa dtòk-àp", en: "The Broke Superstar" },
                emoji: "😎💸",
                situation: { thai: "คุณเป็นดาราเกาหลี แต่ไม่มีเงิน คุณหิวข้าวเหนียวมาก", ipa: "kun bpen daa-raa gao-lǐi dtàe mâi mii ngəən. kun hǐu kâao-nǐao mâak", en: "You are a Korean star but have no money. You are craving sticky rice." },
                task: { thai: "ขอกินฟรีจากแม่ค้า", ipa: "kɔ̌ɔ gin frii jàak mâe-káa", en: "Ask to eat for free" }
            },
            {
                title: { thai: "แท็กซี่ขี้เหงา", ipa: "táek-sîi kîi-ngǎo", en: "The Lonely Taxi" },
                emoji: "🚕😭",
                situation: { thai: "คนขับแท็กซี่อยากคุยเรื่องแฟนเก่าตลอดเวลา คุณแค่อยากกลับบ้าน", ipa: "kon-kàp yàak kui rûuang faen-gào dtà-lɔ̀ɔt wee-laa", en: "Taxi driver wants to talk about his ex all the time. You just want to go home." },
                task: { thai: "เปลี่ยนเรื่องคุย", ipa: "bplìan rûuang kui", en: "Change the topic politely" }
            },
            {
                title: { thai: "หมอดูมั่ว", ipa: "mɔ̌ɔ-duu mûua", en: "The Fake Fortune Teller" },
                emoji: "🔮👀",
                situation: { thai: "เพื่อนบอกว่า 'พรุ่งนี้คุณจะโชคดี' แต่ต้อง 'เต้นหน้าร้านเซเว่น'", ipa: "pʉ̂uan bàawk wâa prûng-níi kun jà chôok-dii dtàe dtɔ̂ng dtên nâa ráan Seven", en: "Friend says 'Tomorrow you will be lucky' but you must 'Dance in front of 7-11'." },
                task: { thai: "ถามเหตุผลและปฏิเสธ", ipa: "tǎam hèet-pǒn láe bpà-dtì-sèet", en: "Ask why and refuse" }
            }
        ];

        // --- COMPONENTS ---

        const TTSButton = ({ text, size = "md", color = "rose" }) => {
            const speak = (e) => {
                e.stopPropagation();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'th-TH';
                window.speechSynthesis.speak(u);
            };
            const colorClass = color === "white" ? "text-slate-400 hover:text-slate-600" : "text-rose-500 hover:text-rose-600";
            return (
                <button onClick={speak} className={`transition-colors flex items-center justify-center rounded-full ${size === "lg" ? "p-2 bg-rose-50 hover:bg-rose-100" : "p-1 hover:bg-rose-50"} ${colorClass}`}>
                    <i data-lucide="volume-2" width={size === "lg" ? 24 : 16}></i>
                </button>
            );
        };

        const ToggleBtn = ({ text, active, onClick, color, size = "md" }) => (
            <button 
                onClick={(e) => { e.stopPropagation(); onClick(e); }}
                className={`font-bold rounded-full border transition-colors shadow-sm flex items-center justify-center ${
                    active 
                    ? (color === 'indigo' ? 'bg-indigo-600 text-white' : 'bg-emerald-600 text-white') 
                    : 'bg-white text-slate-400 hover:bg-slate-50'
                } ${size === "sm" ? "text-[9px] h-5 px-1.5" : "text-[10px] h-6 px-2"}`}
            >
                {text}
            </button>
        );

        const InteractiveText = ({ data, variant = "header", align = "center", className = "" }) => {
            const [showIPA, setShowIPA] = useState(false);
            const [showEN, setShowEN] = useState(false);

            const isHeader = variant === "header";
            const textSize = isHeader ? "text-xl font-bold" : variant === "sub" ? "text-lg font-bold" : "text-base font-medium";
            
            return (
                <div className={`flex flex-col ${align === "center" ? "items-center" : "items-start"} gap-1 ${className}`}>
                    <div className={`flex items-center gap-2 flex-wrap justify-${align}`}>
                        {data.emoji && <span className={isHeader ? "text-3xl" : "text-xl"}>{data.emoji}</span>}
                        <span className={`${textSize} text-slate-800`}>{data.thai}</span>
                        
                        <div className="flex gap-1 items-center ml-1">
                            <TTSButton text={data.thai} size={isHeader ? "md" : "sm"} />
                            <ToggleBtn text="IPA" active={showIPA} onClick={() => setShowIPA(!showIPA)} color="indigo" size="sm" />
                            <ToggleBtn text="EN" active={showEN} onClick={() => setShowEN(!showEN)} color="emerald" size="sm" />
                        </div>
                    </div>

                    {(showIPA || showEN) && (
                        <div className={`text-xs ${align === "center" ? "text-center" : "text-left"} animate-pop bg-white/80 px-2 py-1 rounded w-fit border border-rose-100 shadow-sm`}>
                            {showIPA && <div className="text-indigo-600 font-mono mb-0.5">/{data.ipa}/</div>}
                            {showEN && <div className="text-slate-500 italic">"{data.en}"</div>}
                        </div>
                    )}
                </div>
            );
        };

        // --- SECTIONS ---

        const InterviewSection = () => {
            const [index, setIndex] = useState(0);

            return (
                <div className="bg-white rounded-2xl p-6 shadow-md border-b-4 border-rose-400">
                    <div className="flex justify-between items-center mb-4">
                        <InteractiveText data={{thai: "สัมภาษณ์แปลกๆ", ipa: "sǎm-pâat bplàek-bplàek", en: "Weird Interview", emoji: "🎤"}} variant="sub" align="start" />
                        <span className="text-xs bg-rose-100 text-rose-600 px-2 py-1 rounded-full font-bold">Ask your teacher!</span>
                    </div>

                    <div className="bg-rose-50 p-6 rounded-xl border border-rose-100 text-center min-h-[160px] flex flex-col items-center justify-center animate-pop">
                        <div className="text-4xl mb-2">{interviewQuestions[index].emoji}</div>
                        <InteractiveText data={interviewQuestions[index].q} variant="header" align="center" />
                    </div>

                    <div className="flex gap-2 mt-4 justify-center">
                        <button onClick={() => setIndex((i) => (i > 0 ? i - 1 : interviewQuestions.length - 1))} className="p-2 rounded-full bg-slate-100 hover:bg-slate-200"><i data-lucide="arrow-left"></i></button>
                        <span className="py-2 text-slate-400 font-bold text-sm">{index + 1} / {interviewQuestions.length}</span>
                        <button onClick={() => setIndex((i) => (i < interviewQuestions.length - 1 ? i + 1 : 0))} className="p-2 rounded-full bg-slate-100 hover:bg-slate-200"><i data-lucide="arrow-right"></i></button>
                    </div>
                </div>
            );
        };

        const DebateSection = () => {
            const [active, setActive] = useState(0);
            const current = debates[active];

            return (
                <div className="bg-white rounded-2xl p-6 shadow-md border-b-4 border-purple-400">
                    <div className="mb-4">
                         <InteractiveText data={{thai: "โต้วาทีหยุดโลก", ipa: "dtôo-waa-tii yùt lôok", en: "World Stopping Debate", emoji: "⚔️"}} variant="sub" align="start" />
                    </div>

                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-4 text-center">
                        <p className="text-xs text-slate-400 uppercase font-bold mb-1">Topic:</p>
                        <InteractiveText data={current.topic} variant="header" align="center" />
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-green-50 p-3 rounded-lg border border-green-200">
                             <div className="mb-2 flex justify-center">
                                <InteractiveText data={current.teamA.name} variant="sub" align="center" />
                             </div>
                             <InteractiveText data={current.teamA.arg} variant="normal" align="start" />
                        </div>
                        <div className="bg-orange-50 p-3 rounded-lg border border-orange-200">
                             <div className="mb-2 flex justify-center">
                                <InteractiveText data={current.teamB.name} variant="sub" align="center" />
                             </div>
                             <InteractiveText data={current.teamB.arg} variant="normal" align="start" />
                        </div>
                    </div>
                    
                    <button onClick={() => setActive(active === 0 ? 1 : 0)} className="w-full mt-4 py-2 text-sm font-bold text-purple-600 hover:bg-purple-50 rounded-lg transition-colors">
                        เปลี่ยนหัวข้อ (Change Topic) <i data-lucide="refresh-cw" className="inline w-3 h-3 ml-1"></i>
                    </button>
                </div>
            );
        };

        const RolePlaySection = () => {
            const [card, setCard] = useState(null);

            return (
                <div className="bg-white rounded-2xl p-6 shadow-md border-b-4 border-yellow-400">
                    <div className="mb-4">
                         <InteractiveText data={{thai: "บทบาทสมมติหลุดโลก", ipa: "bòt-bàat sǒm-mút lùt-lôok", en: "Crazy Roleplay", emoji: "🎭"}} variant="sub" align="start" />
                    </div>

                    {!card ? (
                        <div className="grid grid-cols-3 gap-3">
                            {roleplays.map((rp, i) => (
                                <div key={i} onClick={() => setCard(rp)} className="cursor-pointer aspect-square bg-yellow-50 rounded-xl border-2 border-yellow-200 hover:bg-yellow-100 hover:scale-105 transition-all flex flex-col items-center justify-center p-2 text-center relative group">
                                    <div className="absolute top-1 right-1">
                                        <TTSButton text={rp.title.thai} size="sm" />
                                    </div>
                                    <div className="text-3xl mb-1">{rp.emoji}</div>
                                    <div className="text-xs font-bold text-yellow-800">{rp.title.thai}</div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="animate-pop bg-yellow-50 border-2 border-yellow-200 p-4 rounded-xl relative">
                            <button onClick={() => setCard(null)} className="absolute top-2 right-2 text-slate-400 hover:text-red-500 bg-white rounded-full p-1"><i data-lucide="x" width="16"></i></button>
                            <div className="mb-4 text-center">
                                <div className="text-4xl mb-2">{card.emoji}</div>
                                <InteractiveText data={card.title} variant="header" align="center" />
                            </div>
                            <div className="bg-white p-3 rounded-lg shadow-sm mb-3">
                                <InteractiveText data={{thai: "สถานการณ์", ipa: "sà-tǎan-ná-gaan", en: "Situation"}} variant="sub" align="start" className="mb-1 text-slate-500" />
                                <InteractiveText data={card.situation} variant="normal" align="start" />
                            </div>
                            <div className="bg-green-100 p-3 rounded-lg shadow-sm">
                                <InteractiveText data={{thai: "เป้าหมาย", ipa: "bpâo-mǎai", en: "Goal"}} variant="sub" align="start" className="mb-1 text-green-700" />
                                <InteractiveText data={card.task} variant="normal" align="start" />
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const StoryRoulette = () => {
            const [words, setWords] = useState([]);

            const spin = () => {
                const shuffled = [...coreVocab].sort(() => 0.5 - Math.random());
                setWords(shuffled.slice(0, 3));
            };

            return (
                <div className="bg-white rounded-2xl p-6 shadow-md border-b-4 border-blue-400">
                     <div className="mb-4">
                         <InteractiveText data={{thai: "เรื่องเล่าสามคำ", ipa: "rûuang-lâo sǎam kam", en: "3-Word Story", emoji: "🎲"}} variant="sub" align="start" />
                    </div>

                    <div className="flex justify-center gap-3 mb-6 min-h-[100px] items-center">
                        {words.length > 0 ? (
                            words.map((w, i) => (
                                <div key={i} className="animate-pop bg-blue-50 border border-blue-200 p-2 rounded-lg w-1/3 flex flex-col items-center justify-center text-center">
                                    <InteractiveText data={w} variant="normal" align="center" />
                                </div>
                            ))
                        ) : (
                            <span className="text-slate-400 italic">Press button to get words...</span>
                        )}
                    </div>

                    <button onClick={spin} className="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-all">
                        สุ่มคำศัพท์ (Spin!)
                    </button>
                    <p className="text-center text-xs text-slate-400 mt-2">Task: Make a short funny story using these 3 words.</p>
                </div>
            );
        };

        const App = () => {
            useEffect(() => {
                lucide.createIcons();
                window.speechSynthesis.getVoices();
            }, []);

            return (
                <div className="min-h-screen pattern-bg pb-20">
                    {/* Header */}
                    <div className="max-w-md mx-auto px-4 pt-6 pb-4">
                        <header className="bg-white p-4 rounded-2xl shadow-lg border-2 border-rose-100 text-center mb-6">
                            <InteractiveText data={pageTitle} variant="header" align="center" />
                        </header>

                        <div className="space-y-6">
                            <InterviewSection />
                            <DebateSection />
                            <RolePlaySection />
                            <StoryRoulette />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

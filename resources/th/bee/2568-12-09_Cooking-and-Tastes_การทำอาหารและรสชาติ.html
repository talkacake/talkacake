<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Lesson: Cooking & Tastes</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #fdfbf7; font-family: 'Sarabun', sans-serif; }
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap');
        
        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Data ---

        const pageTitle = {
            thai: "การทำอาหารและรสชาติ",
            ipa: "gaan tam-aa-hǎan láe rót-châat",
            en: "Cooking and Tastes",
            emoji: "🍳"
        };

        const sectionHeaders = {
            review: { thai: "1. ทบทวน", ipa: "nʉ̀ng. tóp-tuuan", en: "1. Review" },
            vocab: { thai: "2. คำศัพท์ใหม่", ipa: "sɔ̌ɔng. kam-sàp mài", en: "2. New Vocabulary" },
            activity: { thai: "3. กิจกรรม", ipa: "sǎam. gìt-jà-gam", en: "3. Activity" }
        };

        const activityPrompts = [
            { thai: "ชอบทำอาหารอะไรบ้าง?", ipa: "chɔ̂ɔp tam aa-hǎan à-rai bâang?", en: "What dishes do you like to cook?", emoji: "❓" },
            { thai: "ทำยังไง?", ipa: "tam yang-ngai?", en: "How do you do it?", emoji: "🤔" }
        ];

        // Review: Mixing Technician vocab (previous lesson) and Entertainment
        const reviewData = [
            {
                thai: "เมื่อวาน ไฟดับ หรือ ท่อรั่ว ไหม?",
                ipa: "mʉ̂ʉa-waan fai dàp rʉ̌ʉ tɔ̂ɔ rûua mái?",
                en: "Yesterday, was there a power outage or a leaking pipe?",
                emoji: "🔧"
            },
            {
                thai: "เสาร์อาทิตย์ที่แล้ว คุณดูซีรี่ส์เกาหลีไหม?",
                ipa: "sǎo aa-tít tîi lɛ́ɛo kun duu sii-rîi gao-lǐi mái?",
                en: "Last weekend, did you watch a Korean series?",
                emoji: "📺"
            },
            {
                thai: "คุณชอบนอนตื่นสาย หรือ ตื่นเช้า?",
                ipa: "kun chɔ̂ɔp nɔɔn dtʉ̀ʉn sǎai rʉ̌ʉ dtʉ̀ʉn cháao?",
                en: "Do you like waking up late or waking up early?",
                emoji: "⏰"
            }
        ];

        // New Lesson: Focus on specific food vocab from the list
        const vocabList = [
            { thai: "รสชาติ", ipa: "rót-châat", en: "Taste / Flavor", emoji: "👅" },
            { thai: "เปรี้ยว", ipa: "bprîao", en: "Sour", emoji: "🍋" },
            { thai: "เค็ม", ipa: "kem", en: "Salty", emoji: "🧂" },
            { thai: "ทอด", ipa: "tâawd", en: "To fry / Deep fry", emoji: "🍤" },
            { thai: "ทำเอง", ipa: "tam-eeng", en: "Make it yourself (Homemade)", emoji: "🏠" },
            { thai: "ถั่วงอก", ipa: "tùa-ngɔ̂ɔk", en: "Bean sprouts", emoji: "🌱" },
            { thai: "หน่อไม้", ipa: "nɔ̀ɔ-mái", en: "Bamboo shoots", emoji: "🎍" },
            { thai: "ไข่", ipa: "khài", en: "Egg", emoji: "🥚" }
        ];

        // Activity: Sentence Builder Options
        const menuBuilder = {
            header: { thai: "แต่งประโยค", ipa: "dtèng bprà-yòok", en: "Make a sentence" },
            col1: { thai: "1. วัตถุดิบ", ipa: "nʉ̀ng. wát-tù-dìp", en: "1. Ingredient" },
            col2: { thai: "2. วิธีทำ", ipa: "sɔ̌ɔng. wí-tii tam", en: "2. Method" },
            col3: { thai: "3. รสชาติ", ipa: "sǎam. rót-châat", en: "3. Taste" },
            placeholder: { thai: "เลือกส่วนผสมให้ครบ", ipa: "lʉ̂ʉak sùuan-pà-sǒm hâi króp", en: "Select all ingredients" },
            
            ingredients: [
                { thai: "ไข่", ipa: "khài", en: "Egg", emoji: "🥚" },
                { thai: "ไก่", ipa: "gài", en: "Chicken", emoji: "🍗" },
                { thai: "ปลา", ipa: "bplaa", en: "Fish", emoji: "🐟" }
            ],
            methods: [
                { thai: "ทอด", ipa: "tâawd", en: "Fried", emoji: "🍳" },
                { thai: "ต้ม", ipa: "dtôm", en: "Boiled", emoji: "🍲" }
            ],
            flavors: [
                { thai: "เปรี้ยว", ipa: "bprîao", en: "Sour", emoji: "🍋" },
                { thai: "เค็ม", ipa: "kem", en: "Salty", emoji: "🧂" },
                { thai: "อร่อย", ipa: "à-rɔ̀i", en: "Delicious", emoji: "😋" }
            ]
        };

        // --- Components ---

        const IconBtn = ({ icon, onClick, active, color, size="md" }) => {
            const sizeClass = size === "sm" ? "h-6 w-6 p-1" : "p-2";
            const baseClass = `${sizeClass} rounded-full transition-all btn-press flex items-center justify-center shadow-sm border`;
            const colors = {
                amber: active ? "bg-amber-500 text-white border-amber-600" : "bg-white text-amber-500 border-amber-200 hover:bg-amber-50",
                indigo: active ? "bg-indigo-600 text-white border-indigo-700" : "bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50",
                emerald: active ? "bg-emerald-600 text-white border-emerald-700" : "bg-white text-emerald-600 border-emerald-200 hover:bg-emerald-50",
                slate: "bg-slate-100 hover:bg-slate-200 text-slate-600 border-slate-300"
            };

            return (
                <button onClick={(e) => { e.stopPropagation(); onClick(e); }} className={`${baseClass} ${colors[color] || colors.amber}`}>
                    {icon}
                </button>
            );
        };

        const ToggleBtn = ({ text, active, onClick, color }) => (
            <button 
                onClick={(e) => { e.stopPropagation(); onClick(e); }}
                className={`text-[10px] font-bold h-7 w-7 rounded-full border transition-colors shadow-sm ${
                    active 
                    ? (color === 'indigo' ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-emerald-600 text-white border-emerald-600') 
                    : (color === 'indigo' ? 'bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50' : 'bg-white text-emerald-600 border-emerald-200 hover:bg-emerald-50')
                }`}
            >
                {text}
            </button>
        );

        // A reusable component for text that needs Audio/IPA/EN controls
        const InteractiveText = ({ data, size = "md", layout = "row", className = "" }) => {
            const [showIPA, setShowIPA] = useState(false);
            const [showEN, setShowEN] = useState(false);

            const speak = () => {
                const utterance = new SpeechSynthesisUtterance(data.thai);
                utterance.lang = 'th-TH';
                window.speechSynthesis.speak(utterance);
            };

            const textSize = size === "lg" ? "text-2xl" : size === "xl" ? "text-3xl" : size === "sm" ? "text-sm" : "text-lg";

            return (
                <div className={`flex flex-col ${className}`}>
                    <div className="flex items-center gap-2 flex-wrap">
                        {data.emoji && <span className="text-xl">{data.emoji}</span>}
                        <h3 className={`${textSize} font-bold text-slate-800`}>{data.thai}</h3>
                        
                        <div className="flex gap-1 ml-2 items-center">
                            <IconBtn icon={<i data-lucide="volume-2" width={size === "sm" ? 12 : 16}></i>} onClick={speak} color="amber" size="sm" />
                            <ToggleBtn text="IPA" active={showIPA} onClick={() => setShowIPA(!showIPA)} color="indigo" />
                            <ToggleBtn text="EN" active={showEN} onClick={() => setShowEN(!showEN)} color="emerald" />
                        </div>
                    </div>
                    
                    {(showIPA || showEN) && (
                        <div className="mt-1 ml-1 animate-fade-in">
                            {showIPA && <div className="text-indigo-600 font-mono text-sm">/{data.ipa}/</div>}
                            {showEN && <div className="text-slate-500 italic text-sm">"{data.en}"</div>}
                        </div>
                    )}
                </div>
            );
        };

        const KitchenItemBtn = ({ item, selected, onClick }) => {
            const [showIPA, setShowIPA] = useState(false);
            const [showEN, setShowEN] = useState(false);

            const speak = () => {
                const utterance = new SpeechSynthesisUtterance(item.thai);
                utterance.lang = 'th-TH';
                window.speechSynthesis.speak(utterance);
            };

            return (
                <div 
                    onClick={onClick}
                    className={`
                        relative p-2 rounded-lg border text-sm transition-all cursor-pointer flex flex-col gap-1
                        ${selected 
                            ? 'bg-orange-100 border-orange-400 text-orange-900 ring-2 ring-orange-200' 
                            : 'bg-white border-slate-200 hover:bg-slate-50 text-slate-700'}
                    `}
                >
                    <div className="flex justify-between items-center">
                        <span className="font-bold">{item.emoji} {item.thai}</span>
                        <div className="flex gap-1">
                             <button onClick={(e) => { e.stopPropagation(); speak(); }} className="text-amber-500 hover:text-amber-700"><i data-lucide="volume-2" width="14"></i></button>
                        </div>
                    </div>

                    <div className="flex gap-1 mt-1 justify-end">
                        <button onClick={(e) => { e.stopPropagation(); setShowIPA(!showIPA); }} className={`text-[9px] px-1 rounded border ${showIPA ? 'bg-indigo-100 border-indigo-300 text-indigo-700' : 'border-slate-200 text-slate-400'}`}>IPA</button>
                        <button onClick={(e) => { e.stopPropagation(); setShowEN(!showEN); }} className={`text-[9px] px-1 rounded border ${showEN ? 'bg-emerald-100 border-emerald-300 text-emerald-700' : 'border-slate-200 text-slate-400'}`}>EN</button>
                    </div>

                    {(showIPA || showEN) && (
                        <div className="text-[10px] pt-1 border-t border-dashed border-slate-300 mt-1">
                            {showIPA && <div className="text-indigo-600 font-mono">/{item.ipa}/</div>}
                            {showEN && <div className="text-slate-500 italic">"{item.en}"</div>}
                        </div>
                    )}
                </div>
            );
        };


        const ThaiCard = ({ data, highlight = false }) => {
            // Reusing InteractiveText logic but keeping the Card styling for main vocab
            const [showIPA, setShowIPA] = useState(false);
            const [showEN, setShowEN] = useState(false);

            const speak = () => {
                const utterance = new SpeechSynthesisUtterance(data.thai);
                utterance.lang = 'th-TH';
                window.speechSynthesis.speak(utterance);
            };

            return (
                <div className={`card-hover p-4 mb-3 rounded-xl border-l-4 bg-white shadow-sm ${highlight ? 'border-orange-500 bg-orange-50/50' : 'border-slate-300'}`}>
                    <div className="flex justify-between items-start gap-2">
                        <div className="flex-1">
                            <div className="flex items-center gap-2 mb-2">
                                <span className="text-2xl filter drop-shadow-sm">{data.emoji}</span>
                                <h3 className="text-xl font-bold text-slate-800">{data.thai}</h3>
                            </div>
                            
                            <div className={`transition-all duration-300 overflow-hidden ${showIPA || showEN ? 'max-h-24 opacity-100 mt-2' : 'max-h-0 opacity-0'}`}>
                                {showIPA && <div className="text-indigo-600 font-mono text-sm mb-1">/{data.ipa}/</div>}
                                {showEN && <div className="text-slate-500 italic text-sm">"{data.en}"</div>}
                            </div>
                        </div>

                        <div className="flex flex-col gap-2 shrink-0">
                            <IconBtn 
                                icon={<i data-lucide="volume-2" width="18"></i>} 
                                onClick={speak} 
                                color="amber" 
                            />
                            <div className="flex gap-1">
                                <ToggleBtn text="IPA" active={showIPA} onClick={() => setShowIPA(!showIPA)} color="indigo" />
                                <ToggleBtn text="EN" active={showEN} onClick={() => setShowEN(!showEN)} color="emerald" />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const KitchenBuilder = () => {
            const [ingredient, setIngredient] = useState(null);
            const [method, setMethod] = useState(null);
            const [flavor, setFlavor] = useState(null);

            const reset = () => {
                setIngredient(null);
                setMethod(null);
                setFlavor(null);
            };

            const fullSentence = () => {
                if (!ingredient || !method || !flavor) return null; // Return null to use placeholder component
                return {
                    thai: `${ingredient.thai} ${method.thai} ${flavor.thai}`,
                    ipa: `${ingredient.ipa} ${method.ipa} ${flavor.ipa}`,
                    en: `${ingredient.en} ${method.en} ${flavor.en}` // Approximate translation
                };
            };
            
            const result = fullSentence();

            return (
                <div className="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-200 mt-6">
                    <div className="mb-4 border-b pb-2">
                         <InteractiveText data={menuBuilder.header} size="lg" />
                    </div>

                    <div className="grid grid-cols-3 gap-2 sm:gap-4 mb-6">
                        {/* Column 1 */}
                        <div className="space-y-2">
                            <InteractiveText data={menuBuilder.col1} size="sm" className="mb-2" />
                            {menuBuilder.ingredients.map((item, i) => (
                                <KitchenItemBtn key={i} item={item} selected={ingredient === item} onClick={() => setIngredient(item)} />
                            ))}
                        </div>

                        {/* Column 2 */}
                        <div className="space-y-2">
                            <InteractiveText data={menuBuilder.col2} size="sm" className="mb-2" />
                            {menuBuilder.methods.map((item, i) => (
                                <KitchenItemBtn key={i} item={item} selected={method === item} onClick={() => setMethod(item)} />
                            ))}
                        </div>

                        {/* Column 3 */}
                        <div className="space-y-2">
                            <InteractiveText data={menuBuilder.col3} size="sm" className="mb-2" />
                            {menuBuilder.flavors.map((item, i) => (
                                <KitchenItemBtn key={i} item={item} selected={flavor === item} onClick={() => setFlavor(item)} />
                            ))}
                        </div>
                    </div>

                    {/* Result Box */}
                    <div className="bg-slate-800 rounded-xl p-4 text-center relative overflow-hidden min-h-[120px] flex flex-col items-center justify-center">
                        {result ? (
                             <div className="animate-fade-in w-full">
                                <div className="text-white text-2xl font-bold mb-2">{result.thai}</div>
                                <div className="text-slate-400 font-mono text-sm mb-4">/{result.ipa}/</div>
                                <div className="flex justify-center gap-3">
                                    <button onClick={() => {
                                        const u = new SpeechSynthesisUtterance(result.thai); 
                                        u.lang='th-TH'; 
                                        window.speechSynthesis.speak(u);
                                    }} className="bg-orange-500 hover:bg-orange-600 text-white px-4 py-1.5 rounded-full font-bold shadow-lg text-sm flex items-center gap-2">
                                        <i data-lucide="volume-2" width="16"></i> ฟัง
                                    </button>
                                    <button onClick={reset} className="bg-slate-600 hover:bg-slate-500 text-white px-4 py-1.5 rounded-full font-bold text-sm">
                                        ล้าง
                                    </button>
                                </div>
                             </div>
                        ) : (
                            <div className="text-slate-400 w-full flex flex-col items-center">
                                <InteractiveText data={menuBuilder.placeholder} size="md" className="text-slate-300" />
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            useEffect(() => {
                lucide.createIcons();
                window.speechSynthesis.getVoices();
            }, []);

            return (
                <div className="max-w-2xl mx-auto p-4 pb-20">
                    {/* Header */}
                    <header className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 sticky top-4 z-10 mb-8">
                        <InteractiveText data={pageTitle} size="xl" />
                    </header>

                    {/* Review Section */}
                    <section className="mb-10">
                        <div className="bg-blue-50 p-3 rounded-lg mb-4 border border-blue-100">
                             <InteractiveText data={sectionHeaders.review} size="lg" />
                        </div>
                        <div className="space-y-2">
                            {reviewData.map((item, idx) => (
                                <ThaiCard key={idx} data={item} />
                            ))}
                        </div>
                    </section>

                    {/* New Vocab Section */}
                    <section className="mb-10">
                         <div className="bg-orange-50 p-3 rounded-lg mb-4 border border-orange-100">
                            <InteractiveText data={sectionHeaders.vocab} size="lg" />
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            {vocabList.map((item, idx) => (
                                <ThaiCard key={idx} data={item} highlight={true} />
                            ))}
                        </div>
                    </section>

                    {/* Interactive Activity */}
                    <section>
                        <div className="bg-green-50 p-3 rounded-lg mb-4 border border-green-100">
                            <InteractiveText data={sectionHeaders.activity} size="lg" />
                        </div>
                        
                        {/* Prompts for Student */}
                        <div className="grid sm:grid-cols-2 gap-3 mb-4">
                            {activityPrompts.map((prompt, idx) => (
                                <div key={idx} className="bg-white border border-slate-200 rounded-lg p-3 shadow-sm">
                                    <InteractiveText data={prompt} size="md" />
                                </div>
                            ))}
                        </div>

                        <KitchenBuilder />
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

                window.speechSynthesis.speak(u);
            };
            const colorClass = color === "white" ? "text-slate-400 hover:text-slate-600" : "text-amber-500 hover:text-amber-600";
            return (
                <button onClick={speak} className={`transition-colors flex items-center justify-center rounded-full ${size === "lg" ? "p-2 hover:bg-amber-50" : "p-1 hover:bg-amber-50"} ${colorClass}`}>

                        { thai: "แอร์เย็นไปครับ", ipa: "ae yen bpai kráp", en: "AC is too cold." },
                        { thai: "ช่วยลดแอร์หน่อยได้ไหมครับ?", ipa: "chûai lót ae nɔ̀ɔi dâi mái kráp?", en: "Can you lower the AC?" },
                        { thai: "ทำไมไปทางนี้ครับ?", ipa: "tam-mai bpai taang níi kráp?", en: "Why go this way?" }
                    ]
                }
            ];

            return (
                <div>
                    <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                        <InteractiveText data={headers.activity} variant="header" align="center" className="mb-6" />

                        {/* Scenario Buttons */}
                        <div className="flex flex-col gap-3 mb-6">
                            {scenarios.map((scenario) => (
                                <button
                                    key={scenario.id}
                                    onClick={() => setActiveScenario(scenario.id)}
                                    className={`p-4 rounded-xl border-2 transition-all flex items-center gap-4 text-left ${
                                        activeScenario === scenario.id 
                                        ? 'bg-yellow-50 border-yellow-400 shadow-md' 
                                        : 'bg-white border-slate-100 hover:border-yellow-200 hover:bg-yellow-50/50'
                                    }`}
                                >
                                    <div className="bg-white p-2 rounded-full text-2xl shadow-sm border border-slate-100">
                                        {scenario.title.emoji}
                                    </div>
                                    <div>
                                        <h3 className={`font-bold text-lg ${activeScenario === scenario.id ? 'text-yellow-800' : 'text-slate-700'}`}>
                                            {scenario.title.thai}
                                        </h3>
                                        <p className="text-xs text-slate-400">{scenario.title.en}</p>
                                    </div>
                                    {activeScenario === scenario.id && (
                                        <div className="ml-auto text-yellow-500">
                                            <i data-lucide="check-circle" width="24"></i>
                                        </div>
                                    )}
                                </button>
                            ))}
                        </div>

                        {/* Active Content */}
                        <div className="animate-pop bg-slate-50 rounded-xl p-5 border border-slate-200">
                             <div className="bg-white p-4 rounded-lg shadow-sm mb-4">
                                <p className="text-xs text-slate-400 font-bold uppercase mb-2">สถานการณ์ (Situation):</p>
                                <InteractiveText data={scenarios[activeScenario].situation} variant="normal" align="start" />
                             </div>

                             <div className="space-y-3">
                                <p className="text-xs text-slate-400 font-bold uppercase">ประโยคช่วยพูด (Cues):</p>
                                {scenarios[activeScenario].cues.map((cue, idx) => (
                                    <div key={idx} className="bg-yellow-100/50 p-3 rounded-lg border border-yellow-100">
                                        <InteractiveText data={cue} variant="desc" align="start" />
                                    </div>
                                ))}
                             </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            useEffect(() => {
                lucide.createIcons();
                window.speechSynthesis.getVoices();
            }, []);

            return (
                <div className="min-h-screen pb-20">
                    {/* Decorative Taxi Header */}
                    <div className="h-4 taxi-pattern w-full sticky top-0 z-20"></div>

                    {/* Navbar */}
                    <header className="bg-white shadow-sm sticky top-4 z-10 rounded-b-2xl mx-2 border-x border-b border-slate-200">
                        <div className="max-w-2xl mx-auto px-4 py-3">
                             <InteractiveText data={pageTitle} variant="header" align="center" />
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 py-6">
                        <ReviewSection />
                        <ActivitySection />
                    </main>

                    <footer className="text-center text-slate-400 text-sm py-4">
                        ฝึกฝนบ่อยๆ นะครับ! (Practice often!) 🚕💨
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

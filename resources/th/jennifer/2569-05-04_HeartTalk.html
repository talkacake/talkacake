                        <Card title="วิดีโอ: Heart Talk" icon="💖" bg="bg-red-50" border="border-red-200">
                            <div className="mb-4">
                                <span className="bg-red-200 text-red-800 text-xs font-bold px-2 py-1 rounded">ก่อนดู (Lead-in)</span>
                                <div className="mt-2"><InteractiveText textObj={{thai:"คุณมีคนรู้ใจไหม", ipa:"khun mii khon rúu jai mǎi", en:"Do you have someone who knows your heart?"}} isQuestion={true} icon="💬" /></div>
                            </div>

                            <a href="https://x.com/Siam_Paragon/status/2047978923397714150" target="_blank" className="block text-center bg-black text-white p-3 rounded-xl mb-4 font-bold hover:bg-gray-800">
                                ▶️ ดูวิดีโอ X (Twitter)
                            </a>

                            <div className="mb-6">
                                <span className="bg-red-200 text-red-800 text-xs font-bold px-2 py-1 rounded">หลังดู (Comprehension)</span>
                                <div className="mt-2"><InteractiveText textObj={{thai:"หลิงและออมคุยกันทุกวันไหม", ipa:"lǐng láe oom khui gan thúk wan mǎi", en:"Do Ling and Orm talk everyday?"}} isQuestion={true} icon="1️⃣" /></div>
                                <div className="mt-2"><InteractiveText textObj={{thai:"คนรัก ต้องรักไหม", ipa:"khon rák, dtông rák mǎi", en:"A lover, must they love?"}} isQuestion={true} icon="2️⃣" /></div>
                            </div>

                            {/* Script Breakdown & Grammar */}
                            <div className="border-t border-red-200 pt-4 mb-6">
                                <h3 className="font-bold text-red-800 mb-3 thai-font text-lg">บทสนทนาและโครงสร้างประโยค (Script & Structures)</h3>
                                <div className="bg-white p-3 rounded-xl shadow-sm border border-red-100">
                                    {videoScript.map((item, idx) => (
                                        <React.Fragment key={idx}>
                                            <ScriptLine item={item} />
                                            {grammarData[idx] && (
                                                <GrammarFocus 
                                                    structure={grammarData[idx].structure}
                                                    example={grammarData[idx].example}
                                                    promptText={grammarData[idx].promptText}
                                                />
                                            )}
                                        </React.Fragment>
                                    ))}
                                </div>
                            </div>
                        </Card>

                        {/* Extension Activities */}
                        <div className="mt-8 border-t-[3px] border-dashed border-gray-300 pt-6">
                            <h2 className="text-xl font-bold text-gray-500 text-center mb-4 thai-font">กิจกรรมเสริม (Extension)</h2>
                            <Card title="สัมภาษณ์แฟนคลับ" icon="🎤">
                                <p className="text-sm text-gray-600 mb-3">สมมติว่าคุณเป็นนักข่าว สัมภาษณ์เกี่ยวกับซีรีส์ (Pretend you are a reporter interviewing about a series)</p>
                                <InteractiveText textObj={{thai:"คุณชอบนักแสดงคนไหน", ipa:"khun chôop nák-sà-daeng khon nǎi", en:"Which actor do you like?"}} />
                                <InteractiveText textObj={{thai:"ซีรีส์นี้ตลกไหม", ipa:"see-rîi níi dtà-lòk mǎi", en:"Is this series funny?"}} />
                                <InteractiveText textObj={{thai:"คุณดูซีรีส์จบหรือยัง", ipa:"khun duu see-rîi jòp rǔe yang", en:"Have you finished watching the series?"}} />
                            </Card>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

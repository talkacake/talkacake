<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กิจวัตร - Routines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8fafc;
            touch-action: manipulation;
        }
        .thai-card {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
            border-top: 4px solid #3b82f6;
        }
        .btn-toggle {
            padding: 2px 8px;
            font-size: 0.75rem;
            border-radius: 9999px;
            border: 1px solid #cbd5e1;
            transition: all 0.2s;
            margin-left: 4px;
        }
        .btn-toggle.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        .hidden-content {
            display: none;
        }
        .visible-content {
            display: block;
            margin-top: 4px;
        }
        .tts-btn {
            background: #e0f2fe;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-right: 8px;
            margin-left: 8px;
            transition: background 0.2s;
        }
        .tts-btn:hover { background: #bae6fd; }
        .section-container { margin-bottom: 3rem; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        
        <!-- Header -->
        <header class="text-center mb-10 mt-4">
            <h1 class="text-4xl font-bold text-blue-600 mb-4" id="main-title"></h1>
            <div id="intro-box" class="text-gray-500 font-light"></div>
        </header>

        <!-- Story 1: Morning -->
        <section class="section-container">
            <div id="header-story1" class="text-xl font-semibold mb-4 text-gray-700 border-b-2 border-blue-200 pb-2"></div>
            <div class="thai-card border-t-4 border-amber-400">
                <div class="p-6 border-2 border-dashed border-amber-200 rounded-xl bg-white text-center space-y-4">
                    <div class="text-4xl mb-4">🌅 ➡️ 🛏️ ➡️ 🚿 ➡️ ☕</div>
                    <div id="prompt-story1"></div>
                </div>
                <div class="mt-4 text-center">
                    <button onclick="toggleElement('q-story1')" class="bg-amber-100 text-amber-700 px-6 py-2 rounded-full font-semibold hover:bg-amber-200 transition shadow-sm" id="btn-q-story1"></button>
                </div>
                <div id="q-story1" class="hidden mt-4 bg-amber-50 p-4 rounded-xl border border-amber-100 space-y-2">
                    <div id="q1-1"></div>
                    <div id="q1-2"></div>
                    <div id="q1-3"></div>
                </div>
            </div>
        </section>

        <!-- Story 2: Day/Work -->
        <section class="section-container">
            <div id="header-story2" class="text-xl font-semibold mb-4 text-gray-700 border-b-2 border-blue-200 pb-2"></div>
            <div class="thai-card border-t-4 border-blue-400">
                <div class="p-6 border-2 border-dashed border-blue-200 rounded-xl bg-white text-center space-y-4">
                    <div class="text-4xl mb-4">🚗 ➡️ 🏢 ➡️ 💻 ➡️ 🍱</div>
                    <div id="prompt-story2"></div>
                </div>
                <div class="mt-4 text-center">
                    <button onclick="toggleElement('q-story2')" class="bg-blue-100 text-blue-700 px-6 py-2 rounded-full font-semibold hover:bg-blue-200 transition shadow-sm" id="btn-q-story2"></button>
                </div>
                <div id="q-story2" class="hidden mt-4 bg-blue-50 p-4 rounded-xl border border-blue-100 space-y-2">
                    <div id="q2-1"></div>
                    <div id="q2-2"></div>
                    <div id="q2-3"></div>
                </div>
            </div>
        </section>

        <!-- Story 3: Evening -->
        <section class="section-container">
            <div id="header-story3" class="text-xl font-semibold mb-4 text-gray-700 border-b-2 border-blue-200 pb-2"></div>
            <div class="thai-card border-t-4 border-orange-400">
                <div class="p-6 border-2 border-dashed border-orange-200 rounded-xl bg-white text-center space-y-4">
                    <div class="text-4xl mb-4">🏋️‍♂️ ➡️ 🛒 ➡️ 🍳 ➡️ 📺</div>
                    <div id="prompt-story3"></div>
                </div>
                <div class="mt-4 text-center">
                    <button onclick="toggleElement('q-story3')" class="bg-orange-100 text-orange-700 px-6 py-2 rounded-full font-semibold hover:bg-orange-200 transition shadow-sm" id="btn-q-story3"></button>
                </div>
                <div id="q-story3" class="hidden mt-4 bg-orange-50 p-4 rounded-xl border border-orange-100 space-y-2">
                    <div id="q3-1"></div>
                    <div id="q3-2"></div>
                    <div id="q3-3"></div>
                </div>
            </div>
        </section>

        <!-- Story 4: Night/Weekend -->
        <section class="section-container">
            <div id="header-story4" class="text-xl font-semibold mb-4 text-gray-700 border-b-2 border-blue-200 pb-2"></div>
            <div class="thai-card border-t-4 border-indigo-400">
                <div class="p-6 border-2 border-dashed border-indigo-200 rounded-xl bg-white text-center space-y-4">
                    <div class="text-4xl mb-4">🌙 ➡️ 📖 ➡️ 😴 ➡️ 🏖️</div>
                    <div id="prompt-story4"></div>
                </div>
                <div class="mt-4 text-center">
                    <button onclick="toggleElement('q-story4')" class="bg-indigo-100 text-indigo-700 px-6 py-2 rounded-full font-semibold hover:bg-indigo-200 transition shadow-sm" id="btn-q-story4"></button>
                </div>
                <div id="q-story4" class="hidden mt-4 bg-indigo-50 p-4 rounded-xl border border-indigo-100 space-y-2">
                    <div id="q4-1"></div>
                    <div id="q4-2"></div>
                    <div id="q4-3"></div>
                </div>
            </div>
        </section>

        <footer class="text-center text-gray-400 text-sm mt-20 pb-10">
            เล่าเรื่อง กิจวัตรประจำวัน ของคุณ 🗣️✨
        </footer>
    </div>

    <script>
        // TTS Function
        function speak(text) {
            const cleanText = text.replace(/[\u{1F600}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F300}-\u{1F5FF}\u{1F900}-\u{1F9FF}\u{1FA70}-\u{1FAFF}]/gu, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'th-TH';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }

        // Helper to generate Toggle Component
        function createThaiElement(thai, ipa, en, icon = "") {
            const id = Math.random().toString(36).substr(2, 9);
            const iconHtml = icon ? `<span class="mr-2">${icon}</span>` : '';
            return `
                <div class="my-2 w-full text-left">
                    <div class="flex items-center flex-wrap">
                        <span class="text-xl font-medium text-gray-800 leading-relaxed">${iconHtml}${thai}</span>
                        <button onclick="speak('${thai}')" class="tts-btn flex-shrink-0" title="Listen">🔊</button>
                        <button onclick="toggleDisplay('${id}-ipa')" id="${id}-ipa-btn" class="btn-toggle text-blue-500 hover:text-blue-700 flex-shrink-0">IPA</button>
                        <button onclick="toggleDisplay('${id}-en')" id="${id}-en-btn" class="btn-toggle text-green-500 hover:text-green-700 flex-shrink-0">EN</button>
                    </div>
                    <div id="${id}-ipa" class="hidden-content text-blue-600 text-sm italic pl-3 border-l-2 border-blue-200 ml-2 mt-1">[ ${ipa} ]</div>
                    <div id="${id}-en" class="hidden-content text-gray-500 text-sm font-light pl-3 border-l-2 border-gray-200 ml-2 mt-1">( ${en} )</div>
                </div>
            `;
        }

        function toggleDisplay(elementId) {
            const el = document.getElementById(elementId);
            const btn = document.getElementById(elementId + '-btn');
            if (el.classList.contains('hidden-content')) {
                el.classList.remove('hidden-content');
                el.classList.add('visible-content');
                btn.classList.add('active');
            } else {
                el.classList.remove('visible-content');
                el.classList.add('hidden-content');
                btn.classList.remove('active');
            }
        }

        function toggleElement(elementId) {
            const el = document.getElementById(elementId);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        }

        // Initialize Content
        window.onload = () => {
            // Main Title 
            document.getElementById('main-title').innerHTML = createThaiElement(
                "กิจวัตรประจำวัน", 
                "kit-ja-wat pra-jam-wan", 
                "Daily Routines"
            );
            document.getElementById('intro-box').innerHTML = createThaiElement(
                "เล่าเรื่อง กิจวัตรประจำวัน ของคุณ", 
                "lao rueang kit-ja-wat pra-jam-wan khong khun", 
                "Tell a story about your daily routines."
            );

            // Button texts
            document.getElementById('btn-q-story1').innerHTML = "ถาม (Ask)";
            document.getElementById('btn-q-story2').innerHTML = "ถาม (Ask)";
            document.getElementById('btn-q-story3').innerHTML = "ถาม (Ask)";
            document.getElementById('btn-q-story4').innerHTML = "ถาม (Ask)";

            // Story 1: Morning
            document.getElementById('header-story1').innerHTML = createThaiElement("1. ตอนเช้า (Morning)", "ton chao", "1. Morning");
            document.getElementById('prompt-story1').innerHTML = createThaiElement("ตอนเช้า คุณ ทำ อะไร บ้าง?", "ton chao khun tham a-rai bang", "In the morning, what do you do?");
            document.getElementById('q1-1').innerHTML = createThaiElement("ตื่นนอน กี่โมง?", "tuen non kee mong", "What time do you wake up?");
            document.getElementById('q1-2').innerHTML = createThaiElement("อาบน้ำ นาน ไหม?", "ap-nam nan mai", "Do you take a shower for a long time?");
            document.getElementById('q1-3').innerHTML = createThaiElement("คุณ ชอบ ดื่ม กาแฟ หรือ น้ำเปล่า?", "khun chop duem ka-fae rue nam-plao", "Do you like to drink coffee or plain water?");

            // Story 2: Day/Work
            document.getElementById('header-story2').innerHTML = createThaiElement("2. ตอนกลางวัน (Daytime)", "ton klang-wan", "2. Daytime");
            document.getElementById('prompt-story2').innerHTML = createThaiElement("ไป ที่ทำงาน หรือ โรงเรียน ยังไง?", "pai tee tham-ngan rue rong-rian yang-ngai", "How do you go to the workplace or school?");
            document.getElementById('q2-1').innerHTML = createThaiElement("ตอนเช้า รถติด ไหม?", "ton chao rot-tit mai", "Is there a traffic jam in the morning?");
            document.getElementById('q2-2').innerHTML = createThaiElement("ทำงาน สนุก ไหม?", "tham-ngan sa-nuk mai", "Is working fun?");
            document.getElementById('q2-3').innerHTML = createThaiElement("ตอนเที่ยง กิน ข้าว ที่ไหน?", "ton thiang kin khao tee-nai", "At noon, where do you eat lunch?");

            // Story 3: Evening
            document.getElementById('header-story3').innerHTML = createThaiElement("3. ตอนเย็น (Evening)", "ton yen", "3. Evening");
            document.getElementById('prompt-story3').innerHTML = createThaiElement("หลัง ทำงาน คุณ ชอบ ทำ อะไร?", "lang tham-ngan khun chop tham a-rai", "After work, what do you like to do?");
            document.getElementById('q3-1').innerHTML = createThaiElement("คุณ ไป ฟิตเนส บ่อย ไหม?", "khun pai fit-net boi mai", "Do you go to the gym often?");
            document.getElementById('q3-2').innerHTML = createThaiElement("คุณ กลับ บ้าน ทำอาหาร หรือ ซื้อ กิน?", "khun klap ban tham a-han rue suea kin", "Do you return home and cook, or buy to eat?");
            document.getElementById('q3-3').innerHTML = createThaiElement("ก่อน นอน คุณ ดู หนัง ไหม?", "kon non khun doo nang mai", "Before sleep, do you watch movies?");

            // Story 4: Night/Weekend
            document.getElementById('header-story4').innerHTML = createThaiElement("4. กลางคืน และ วันหยุด (Night & Weekend)", "klang-khuen lae wan-yut", "4. Night & Weekend");
            document.getElementById('prompt-story4').innerHTML = createThaiElement("ก่อน นอน ทำ อะไร บ้าง?", "kon non tham a-rai bang", "Before sleep, what do you do?");
            document.getElementById('q4-1').innerHTML = createThaiElement("คุณ อ่านหนังสือ บ่อย ไหม?", "khun an nang-sue boi mai", "Do you read books often?");
            document.getElementById('q4-2').innerHTML = createThaiElement("ทุกวัน คุณ นอน ดึก ไหม?", "thuk-wan khun non duek mai", "Every day, do you sleep late?");
            document.getElementById('q4-3').innerHTML = createThaiElement("วันหยุด คุณ ชอบ ไปเที่ยว ที่ไหน?", "wan-yut khun chop pai thiao tee-nai", "On holidays, where do you like to travel?");
        };
    </script>
</body>
</html>

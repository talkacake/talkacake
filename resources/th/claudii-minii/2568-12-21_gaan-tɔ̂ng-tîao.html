<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Lesson: Traveling</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Google Fonts: Sarabun (for readability) and Kanit -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #F3F4F6;
        }
        h1, h2, h3 {
            font-family: 'Kanit', sans-serif;
        }
        .thai-text {
            line-height: 1.6;
        }
        /* Hide scrollbar for clean UI on mobile */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .btn-active {
            background-color: #dbeafe;
            color: #1e40af;
            border-color: #3b82f6;
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Reusable Component: Interactive Text (TTS + Toggles) ---
        const InteractiveText = ({ thai, ipa, en, textSize = "text-base", color = "text-gray-800" }) => {
            const [showIPA, setShowIPA] = useState(false);
            const [showEN, setShowEN] = useState(false);

            const handleSpeak = (e) => {
                e.stopPropagation();
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(thai);
                    utterance.lang = 'th-TH';
                    utterance.rate = 0.8; 
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert("TTS not supported on this browser.");
                }
            };

            return (
                <div className="flex flex-col items-start w-full">
                    <div className="flex flex-wrap items-center gap-x-2 gap-y-1 w-full">
                        <span 
                            className={`${textSize} font-bold ${color} thai-text cursor-pointer hover:opacity-75 transition-opacity`} 
                            onClick={handleSpeak}
                        >
                            {thai}
                        </span>
                        
                        <div className="flex items-center gap-1">
                            <button 
                                onClick={handleSpeak}
                                className="p-1.5 rounded-full bg-blue-50 text-blue-500 hover:bg-blue-100 active:scale-95 transition-transform shrink-0"
                                aria-label="Listen"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                            </button>

                            <button 
                                onClick={(e) => { e.stopPropagation(); setShowIPA(!showIPA); }}
                                className={`px-2 py-0.5 rounded text-xs font-bold border transition-colors ${showIPA ? 'bg-orange-100 text-orange-700 border-orange-200' : 'bg-white text-gray-400 border-gray-200 hover:bg-gray-50'}`}
                            >
                                IPA
                            </button>
                            <button 
                                onClick={(e) => { e.stopPropagation(); setShowEN(!showEN); }}
                                className={`px-2 py-0.5 rounded text-xs font-bold border transition-colors ${showEN ? 'bg-indigo-100 text-indigo-700 border-indigo-200' : 'bg-white text-gray-400 border-gray-200 hover:bg-gray-50'}`}
                            >
                                EN
                            </button>
                        </div>
                    </div>

                    {(showIPA || showEN) && (
                        <div className="mt-2 pl-2 border-l-2 border-gray-200 w-full animate-fadeIn">
                            {showIPA && (
                                <div className="text-orange-600 font-mono text-sm mb-1">
                                    /{ipa}/
                                </div>
                            )}
                            {showEN && (
                                <div className="text-indigo-600 text-sm font-medium">
                                    {en}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- Data: Static Interface Text ---
        const uiText = {
            mainTitle: { thai: "การท่องเที่ยว", ipa: "gaan-thɔ̂ng-thîao", en: "Travelling" },
            
            section1: {
                title: { thai: "1. อุ่นเครื่อง", ipa: "ùn-khrʉ̂ang", en: "1. Warm Up" },
                subtitle: { thai: "แต่งประโยคจากคำศัพท์", ipa: "dtɛ̀ng bprà-yòok jàak kham-sàp", en: "Make sentences from vocabulary" },
                instruction: { thai: "กดปุ่มเพื่อสุ่มคำศัพท์", ipa: "gòt bpùm phʉ̂a sùm kham-sàp", en: "Press button to randomize a word" },
                btnLabel: { thai: "สุ่มคำศัพท์", ipa: "sùm kham-sàp", en: "Randomize Word" }
            },
            section2: {
                title: { thai: "2. บทสนทนา", ipa: "bòt sǒn-thá-naa", en: "2. Conversation" },
                subtitle: { thai: "คุยเรื่องเที่ยว", ipa: "khuy rʉ̂ang thîao", en: "Talk about traveling" }
            },
            section3: {
                title: { thai: "3. กิจกรรมเสริม", ipa: "gìt-jà-gam sěrm", en: "3. Extension Activities" },
                subtitle: { thai: "บทบาทสมมติ (ตลก)", ipa: "bòt-bàat sǒm-mút (dtà-lòk)", en: "Funny Role-plays" }
            }
        };

        // --- Data: Full Vocabulary List with Emojis ---
        const vocabList = [
            { thai: "ใหม่", ipa: "mày", en: "New", emoji: "✨" },
            { thai: "อ่าน", ipa: "àan", en: "Read", emoji: "📖" },
            { thai: "เพลงรัก", ipa: "pleeng rák", en: "Love songs", emoji: "🎵❤️" },
            { thai: "หนังผี", ipa: "nǎng phǐi", en: "Ghost movies", emoji: "👻🎬" },
            { thai: "เคย", ipa: "khəəy", en: "Used to / ever", emoji: "⏳" },
            { thai: "หนังสือ", ipa: "nang sʉ̌ʉ", en: "Books", emoji: "📚" },
            { thai: "ทำ", ipa: "tam", en: "Do/make", emoji: "🔨" },
            { thai: "ไข่", ipa: "khày", en: "Eggs", emoji: "🥚" },
            { thai: "ฟิตเนส", ipa: "fítnèt", en: "Gym", emoji: "🏋️" },
            { thai: "เดินป่า", ipa: "dəən bpàa", en: "To hike", emoji: "🥾🌲" },
            { thai: "มี", ipa: "mii", en: "Have", emoji: "🤲" },
            { thai: "กี่", ipa: "gìi", en: "How many?", emoji: "🔢" },
            { thai: "คน", ipa: "kon", en: "People", emoji: "👥" },
            { thai: "น้องชาย", ipa: "nɔ́ɔng chaay", en: "Younger brother", emoji: "👦" },
            { thai: "ข้าวต้ม", ipa: "khâao dtôm", en: "Porridge", emoji: "🥣" },
            { thai: "ผลไม้", ipa: "phǒn la máy", en: "Fruit", emoji: "🍎" },
            { thai: "แพ้", ipa: "pɛ́ɛ", en: "Allergic to", emoji: "🤧" },
            { thai: "อิ่ม", ipa: "ìm", en: "Full (stomach)", emoji: "😋" },
            { thai: "สั่ง", ipa: "sàng", en: "Order", emoji: "🗣️📝" },
            { thai: "ร้านอาหาร", ipa: "ráan aa hǎan", en: "Restaurant", emoji: "🍽️" },
            { thai: "เค็ม", ipa: "khem", en: "Salty", emoji: "🧂" },
            { thai: "เงียบ", ipa: "ngîap", en: "Quiet", emoji: "🤫" },
            { thai: "ชอบฟังเพลงร็อค", ipa: "chɔ̂ɔp fang pleeng rɔ́k", en: "Like rock songs", emoji: "🎸🤘" },
            { thai: "บ่อย", ipa: "bɔ̀y", en: "Often", emoji: "🔄" },
            { thai: "ตื่น", ipa: "dtʉ̀ʉn", en: "Wake up", emoji: "⏰" },
            { thai: "ให้", ipa: "hây", en: "Give", emoji: "🎁" },
            { thai: "เพื่อนแม่", ipa: "phʉ̂an mɛ̂ɛ", en: "Mum's friend", emoji: "👩‍🦱🤝" },
            { thai: "พูดง่าย", ipa: "phûut ŋâay", en: "Easy to say", emoji: "🗣️👍" },
            { thai: "ผ่าตัดฟัน", ipa: "pàa-dtàt fan", en: "Tooth surgery", emoji: "🦷⚕️" },
            { thai: "เขียน", ipa: "kǐian", en: "To write", emoji: "✍️" },
            { thai: "แต่ละครั้ง", ipa: "dtàe là kráng", en: "Each time", emoji: "⏱️" },
            { thai: "เยอะ", ipa: "yə́", en: "A lot", emoji: "🔢⬆️" },
            { thai: "อาทิตย์", ipa: "aa-thít", en: "Week", emoji: "📅" },
            { thai: "เมื่อวาน", ipa: "mʉ̂a-waan", en: "Yesterday", emoji: "⏮️" },
            { thai: "ผัก", ipa: "pàk", en: "Vegetable", emoji: "🥬" },
            { thai: "รับ", ipa: "ráp", en: "Receive", emoji: "📥" },
            { thai: "ข้าวเปล่า", ipa: "khâao-plàao", en: "Plain rice", emoji: "🍚" },
            { thai: "เปลี่ยน", ipa: "bplìian", en: "To change", emoji: "🔄" },
            { thai: "เปลี่ยนข้าวเปล่าเป็นข้าวเหนียว", ipa: "pliian... pen khâao nǐaw", en: "Change plain rice to sticky rice", emoji: "🍚➡️🍙" },
            { thai: "มีน้ำอะไร", ipa: "mii náam a-rai", en: "What drinks do you have?", emoji: "🥤❓" },
            { thai: "เอาอีกไหม", ipa: "ao-ìik-mǎi", en: "Want more?", emoji: "➕❓" },
            { thai: "ของหวาน", ipa: "kǎawng wǎan", en: "Dessert", emoji: "🍰" },
            { thai: "แพ็กได้ไหม", ipa: "páek dâai mǎi", en: "Can pack?", emoji: "🥡❓" }
        ];

        // --- Data: Conversation Questions ---
        const conversationData = [
            { id: 1, icon: "🇹🇭", thai: "ทำไม คุณมา ประเทศไทย?", ipa: "tham-may · khun maa · bprà-thêet-thay?", en: "Why did you come to Thailand?" },
            { id: 2, icon: "🗺️", thai: "คุณ ชอบ ไปไหน?", ipa: "khun · chɔ̂ɔp · pay nǎy?", en: "Where do you like to go?" },
            { id: 3, icon: "✈️", thai: "คุณ เคย ไปไหน?", ipa: "khun · khəəy · pay nǎy?", en: "Where have you been (used to go)?" },
            { id: 4, icon: "🍜", thai: "กิน อะไร?", ipa: "gin · a-ray?", en: "What did/do you eat?" },
            { id: 5, icon: "📸", thai: "ทำ อะไร?", ipa: "tham · a-ray?", en: "What did/do you do?" }
        ];

        // --- Data: Checklist Items ---
        const checklistData = {
            title: { thai: "รายการเช็ค", ipa: "raai-gaan chék", en: "Checklist" },
            items: [
                { id: 1, thai: "ภูเขา", ipa: "phuu-khǎo", en: "Mountain" },
                { id: 2, thai: "ทะเล", ipa: "thá-lee", en: "Sea" },
                { id: 3, thai: "วัด", ipa: "wát", en: "Temple" },
                { id: 4, thai: "ตลาด", ipa: "dtà-làat", en: "Market" }
            ]
        };

        // --- Data: Extension Activities ---
        const extensionData = [
            { 
                id: 1, 
                emoji: "🏖️➡️🥦", 
                title: { thai: "สถานการณ์ 1: ผิดที่", ipa: "sà-thǎan-ná-gaan 1: phìt thîi", en: "Scenario 1: Wrong Place" },
                desc: { thai: "คุณอยากไป 'ทะเล' แต่คนขับพาไป 'ตลาด' ... คุณจะพูดอะไร?", ipa: "khun yàak bpai 'thá-lee' dtàe kon-kàp paa bpai 'dtà-làat' ... khun jà phûut à-rai?", en: "You want to go to the 'Sea' but driver takes you to the 'Market'... What do you say?" }
            },
            { 
                id: 2, 
                emoji: "🌶️🔥", 
                title: { thai: "สถานการณ์ 2: เผ็ดมาก!", ipa: "sà-thǎan-ná-gaan 2: phèt mâak!", en: "Scenario 2: Very Spicy!" },
                desc: { thai: "สั่งส้มตำ 'ไม่เผ็ด' แต่ได้ 'เผ็ดมาก' ... ขอน้ำหน่อย!", ipa: "sàng sôm-dtam 'mây phèt' dtàe dâai 'phèt mâak' ... kɔ̌ɔ náam nɔ̀y!", en: "Ordered Som Tum 'not spicy' but got 'very spicy'... Ask for water!" }
            },
            { 
                id: 3, 
                emoji: "👻🏨", 
                title: { thai: "สถานการณ์ 3: ห้องผี", ipa: "sà-thǎan-ná-gaan 3: hɔ̂ng phǐi", en: "Scenario 3: Ghost Room" },
                desc: { thai: "ถามพนักงานโรงแรม: 'ห้องนี้มีผีไหม?' ... ผมกลัวผี!", ipa: "thǎam phá-nák-ngaan roong-raem: 'hɔ̂ng níi mii phǐi mái?' ... phǒm glua phǐi!", en: "Ask hotel staff: 'Does this room have ghosts?' ... I am scared of ghosts!" }
            }
        ];

        // --- Component: Section Header ---
        const SectionHeader = ({ titleData, subtitleData, color }) => (
            <div className={`mb-6 mt-8 pb-4 border-b-2 ${color}`}>
                <div className="mb-2">
                    <InteractiveText {...titleData} textSize="text-2xl" />
                </div>
                <InteractiveText {...subtitleData} textSize="text-sm" color="text-gray-500" />
            </div>
        );

        // --- Component: Question Block ---
        const QuestionBlock = ({ icon, thai, ipa, en }) => (
            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-4 transition-all duration-200 hover:shadow-md">
                <div className="flex items-start gap-3">
                    <div className="text-3xl pt-1 select-none grayscale opacity-80">{icon}</div>
                    <div className="flex-1">
                        <InteractiveText thai={thai} ipa={ipa} en={en} textSize="text-xl" />
                    </div>
                </div>
            </div>
        );

        // --- Component: Role Play Block ---
        const RolePlayBlock = ({ emoji, title, desc }) => (
             <div className="bg-purple-50 rounded-xl border border-purple-100 p-5 mb-4 shadow-sm">
                <div className="text-4xl mb-3">{emoji}</div>
                <div className="mb-2">
                     <InteractiveText {...title} textSize="text-lg font-bold" color="text-purple-800" />
                </div>
                <div className="bg-white bg-opacity-60 p-3 rounded-lg">
                    <InteractiveText {...desc} textSize="text-base" color="text-gray-700" />
                </div>
            </div>
        );


        // --- Main App ---
        const App = () => {
            // Random Word State
            const [currentWord, setCurrentWord] = useState(null);
            
            const randomizeWord = () => {
                const randomIndex = Math.floor(Math.random() * vocabList.length);
                setCurrentWord(vocabList[randomIndex]);
            };

            // Init with one word
            useEffect(() => {
                randomizeWord();
            }, []);

            return (
                <div className="max-w-md mx-auto min-h-screen bg-gray-50 pb-20">
                    {/* Header */}
                    <header className="bg-white p-4 shadow-sm sticky top-0 z-10 border-b border-gray-200">
                        <div className="flex justify-between items-center">
                            <div className="flex-1">
                                <InteractiveText {...uiText.mainTitle} textSize="text-xl" />
                            </div>
                            <div className="text-2xl ml-2">🧳</div>
                        </div>
                    </header>

                    <main className="px-4">
                        
                        {/* Section 1: Review Game */}
                        <SectionHeader 
                            titleData={uiText.section1.title}
                            subtitleData={uiText.section1.subtitle}
                            color="border-yellow-400"
                        />
                        
                        <div className="bg-yellow-50 rounded-xl p-6 border border-yellow-200 text-center shadow-sm mb-6">
                            <div className="mb-4 text-left flex items-center gap-2 text-yellow-800 text-sm">
                                <span>🎲</span>
                                <InteractiveText {...uiText.section1.instruction} textSize="text-sm" color="text-yellow-900" />
                            </div>

                            {/* The Card */}
                            {currentWord && (
                                <div key={currentWord.thai} className="bg-white p-6 rounded-lg shadow-md border-2 border-yellow-100 card-pop mb-6 flex flex-col items-center">
                                    <div className="text-6xl mb-4 animate-fadeIn">{currentWord.emoji}</div>
                                    {/* Enforce Sarabun font specifically for the large card text */}
                                    <h3 
                                        className="text-3xl font-bold text-gray-800 mb-2 thai-text text-center"
                                        style={{ fontFamily: "'Sarabun', sans-serif" }}
                                    >
                                        {currentWord.thai}
                                    </h3>
                                    
                                    {/* Mini Interactive Controls for the card */}
                                    <div className="w-full">
                                        <InteractiveText 
                                            thai={currentWord.thai} 
                                            ipa={currentWord.ipa} 
                                            en={currentWord.en} 
                                            textSize="hidden" // Hiding original text since we showed big header
                                        />
                                    </div>
                                </div>
                            )}

                            <button 
                                onClick={randomizeWord}
                                className="w-full py-3 bg-yellow-400 hover:bg-yellow-500 text-white font-bold rounded-lg shadow-sm active:scale-95 transition-all flex justify-center items-center gap-2"
                            >
                                <span>🔄</span>
                                <span>
                                    {/* Button label logic is static, no TTS needed on button itself usually, but consistent style */}
                                    {uiText.section1.btnLabel.thai}
                                </span>
                            </button>
                        </div>

                        {/* Section 2: Conversation */}
                        <SectionHeader 
                            titleData={uiText.section2.title}
                            subtitleData={uiText.section2.subtitle}
                            color="border-blue-400"
                        />
                        
                        <div className="space-y-4">
                            {conversationData.map(item => (
                                <QuestionBlock key={item.id} {...item} />
                            ))}
                        </div>

                         {/* Section 3: Extension Activities */}
                        <SectionHeader 
                            titleData={uiText.section3.title}
                            subtitleData={uiText.section3.subtitle}
                            color="border-purple-400"
                        />
                        <div className="space-y-4">
                            {extensionData.map(item => (
                                <RolePlayBlock key={item.id} {...item} />
                            ))}
                        </div>

                        {/* Checklist Section */}
                        <div className="mt-8 pt-6 border-t border-gray-200">
                             <div className="flex items-center gap-2 mb-4">
                                <span className="text-2xl">📝</span>
                                <div className="flex-1">
                                    <InteractiveText {...checklistData.title} textSize="text-lg" color="text-gray-600" />
                                </div>
                             </div>
                             <div className="grid grid-cols-2 gap-3">
                                {checklistData.items.map(item => (
                                    <div key={item.id} className="bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                                        <InteractiveText {...item} textSize="text-base" />
                                    </div>
                                ))}
                             </div>
                        </div>

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

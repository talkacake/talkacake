        // ----------------------------------------------------
        // 2. UI GENERATOR FUNCTIONS
        // ----------------------------------------------------
        let synth = window.speechSynthesis;

        function speakText(text) {
            if (synth.speaking) {
                synth.cancel();
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH';
            utterance.rate = 0.85;
            synth.speak(utterance);
        }

        function toggleVisibility(button, type) {
            const container = button.closest('.thai-block');
            const content = container.querySelector(`.${type}-content`);
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                content.classList.add('reveal');
                button.classList.replace('bg-opacity-20', 'bg-opacity-100');
                if(type === 'ipa') button.classList.add('ring-2', 'ring-green-400');
                if(type === 'en') button.classList.add('ring-2', 'ring-blue-400');
            } else {
                content.classList.add('hidden');
                content.classList.remove('reveal');
                if(type === 'ipa') button.classList.remove('ring-2', 'ring-green-400');
                if(type === 'en') button.classList.remove('ring-2', 'ring-blue-400');
            }
        }

        function createBlock(emoji, thaiText, ipaText, enText, isTitle = false, isSmall = false, isAction = false) {
            const textSize = isTitle ? 'text-3xl md:text-4xl' : (isSmall ? 'text-xl md:text-2xl' : 'text-2xl md:text-3xl');
            const bgColor = isTitle ? 'bg-blue-100 border-blue-300' : 'bg-white border-gray-200';
            const safeThai = thaiText.replace(/'/g, "\\'").replace(/"/g, '\\"');

            let html = `
            <div class="thai-block ${bgColor} rounded-2xl p-5 shadow-sm border mb-4 transition-all hover:shadow-md">
                <div class="flex items-start gap-3 mb-4">
                    ${emoji ? `<span class="${textSize}">${emoji}</span>` : ''}
                    <span class="font-bold text-gray-800 ${textSize} leading-snug" lang="th">${thaiText}</span>
                </div>
                
                <div class="flex flex-wrap gap-2 mb-2">
                    <button onclick="speakText('${safeThai}')" class="flex items-center gap-1 bg-red-100 text-red-700 px-4 py-2 rounded-xl font-semibold text-sm hover:bg-red-200 transition shadow-sm active:scale-95">
                        🔊 ฟัง
                    </button>
                    <button onclick="toggleVisibility(this, 'ipa')" class="flex items-center gap-1 bg-green-100 text-green-700 px-4 py-2 rounded-xl font-semibold text-sm hover:bg-green-200 transition shadow-sm active:scale-95">
                        🗣️ IPA
                    </button>
                    <button onclick="toggleVisibility(this, 'en')" class="flex items-center gap-1 bg-blue-100 text-blue-700 px-4 py-2 rounded-xl font-semibold text-sm hover:bg-blue-200 transition shadow-sm active:scale-95">
                        🇬🇧 EN
                    </button>
                </div>

                <div class="ipa-content hidden text-green-800 text-lg md:text-xl font-medium italic mt-3 bg-green-50 p-3 rounded-xl border border-green-100 w-full">
                    ${ipaText}
                </div>
                <div class="en-content hidden text-blue-800 text-lg md:text-xl font-medium mt-2 bg-blue-50 p-3 rounded-xl border border-blue-100 w-full">
                    ${enText}
                </div>`;
            
            if (isAction) {
                html += `
                <div class="mt-4 pt-3 border-t border-gray-100 text-right">
                    <span class="inline-block bg-yellow-100 text-yellow-800 text-sm px-3 py-1 rounded-full font-bold">✨ แต่งประโยค (Make a sentence)</span>
                </div>`;
            }
            
            html += `</div>`;
            return html;
        }

        // ----------------------------------------------------
        // 3. RANDOMIZER LOGIC
        // ----------------------------------------------------
        function randomizeWord() {
            const randomIndex = Math.floor(Math.random() * reviewVocab.length);
            const word = reviewVocab[randomIndex];
            
            const resultDiv = document.getElementById('randomizer-result');
            resultDiv.innerHTML = `<div class="text-center p-8 text-gray-400">🎲 สุ่ม... (sùm... / randomizing...)</div>`;
            
            setTimeout(() => {
                resultDiv.innerHTML = `
                    <div class="mt-4 mb-2 text-center text-sm font-bold text-gray-500 uppercase tracking-widest">คำศัพท์ของคุณ (Your Word)</div>
                    ${createBlock(word.emoji, word.thai, word.ipa, word.en, false, false, true)}
                `;
            }, 300);
        }

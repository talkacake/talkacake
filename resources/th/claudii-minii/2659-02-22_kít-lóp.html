        // ----------------------------------------------------
        // 3. UI GENERATOR FUNCTIONS

        // Ensure iOS TTS loads properly
        let synth = window.speechSynthesis;

        function speakText(text) {
            if (synth.speaking) {
                synth.cancel(); // Stop if already speaking
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH'; // Thai language
            utterance.rate = 0.85; // Slightly slower for A1 student
            synth.speak(utterance);
        }

        function toggleVisibility(button, type) {
            const container = button.closest('.thai-block');
            const content = container.querySelector(`.${type}-content`);
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                content.classList.add('reveal');
                button.classList.replace('bg-opacity-20', 'bg-opacity-100');
                if(type === 'ipa') button.classList.add('ring-2', 'ring-green-400');
                if(type === 'en') button.classList.add('ring-2', 'ring-blue-400');
            } else {
                content.classList.add('hidden');
                content.classList.remove('reveal');
                if(type === 'ipa') button.classList.remove('ring-2', 'ring-green-400');
                if(type === 'en') button.classList.remove('ring-2', 'ring-blue-400');
            }
        }

        // The core function to wrap ALL Thai text with TTS and toggles
        function createBlock(emoji, thaiText, ipaText, enText, isTitle = false, isSmall = false) {
            const textSize = isTitle ? 'text-3xl md:text-4xl' : (isSmall ? 'text-xl md:text-2xl' : 'text-2xl md:text-3xl');
            const bgColor = isTitle ? 'bg-green-100 border-green-300' : 'bg-white border-gray-200';
            
            // Escape quotes for the onclick handler
            const safeThai = thaiText.replace(/'/g, "\\'").replace(/"/g, '\\"');

            return `
            <div class="thai-block ${bgColor} rounded-2xl p-5 shadow-sm border mb-5 transition-all hover:shadow-md">
                <div class="flex items-start gap-3 mb-4">
                    ${emoji ? `<span class="${textSize}">${emoji}</span>` : ''}
                    <span class="font-bold text-gray-800 ${textSize} leading-snug" lang="th">${thaiText}</span>
                </div>
                
                <div class="flex flex-wrap gap-2 mb-2">
                    <button onclick="speakText('${safeThai}')" class="flex items-center gap-1 bg-red-100 text-red-700 px-4 py-2 rounded-xl font-semibold text-sm hover:bg-red-200 transition shadow-sm active:scale-95">
                        🔊 ฟัง
                    </button>
                    <button onclick="toggleVisibility(this, 'ipa')" class="flex items-center gap-1 bg-green-100 text-green-700 px-4 py-2 rounded-xl font-semibold text-sm hover:bg-green-200 transition shadow-sm active:scale-95">
                        🗣️ IPA
                    </button>
                    <button onclick="toggleVisibility(this, 'en')" class="flex items-center gap-1 bg-blue-100 text-blue-700 px-4 py-2 rounded-xl font-semibold text-sm hover:bg-blue-200 transition shadow-sm active:scale-95">
                        🇬🇧 EN
                    </button>
                </div>

                <div class="ipa-content hidden text-green-800 text-lg md:text-xl font-medium italic mt-3 bg-green-50 p-3 rounded-xl border border-green-100 w-full">
                    ${ipaText}
                </div>
                <div class="en-content hidden text-blue-800 text-lg md:text-xl font-medium mt-2 bg-blue-50 p-3 rounded-xl border border-blue-100 w-full">
                    ${enText}
                </div>
            </div>`;
        }

        // ----------------------------------------------------
        // 4. RANDOMIZER LOGIC
        // ----------------------------------------------------
        function randomizeWord() {
            const randomIndex = Math.floor(Math.random() * reviewVocab.length);
            const word = reviewVocab[randomIndex];
            
            const resultDiv = document.getElementById('randomizer-result');
            
            // Add a fun little animation by clearing and redrawing quickly
            resultDiv.innerHTML = `<div class="text-center p-8 text-gray-400">🎲 สุ่ม... (sùm... / randomizing...)</div>`;
            
            setTimeout(() => {
                resultDiv.innerHTML = `
                    <div class="mt-4 mb-2 text-center text-sm font-bold text-gray-500 uppercase tracking-widest">คำศัพท์ของคุณ (Your Word)</div>
                    ${createBlock(word.emoji, word.thai, word.ipa, word.en, false)}
                    <div class="text-center mt-2 mb-4">
                        <span class="inline-block bg-yellow-100 text-yellow-800 text-sm px-3 py-1 rounded-full font-bold">✨ แต่งประโยคเลย! (dtɛ̀ng bprà-yòok ləəy! / Make a sentence!)</span>
                    </div>
                `;
            }, 300);
        }

                     </div>`;

            html += createBlock('🐶', 'มีหมาตัวหนึ่งชื่อดัมโบ้ ดัมโบ้ชอบบ่น', 'mii mǎa dtua nʉ̀ng chʉ̂ʉ dam-bôo. dam-bôo chɔ̂ɔp bòn', 'There is a dog named Dumbo. Dumbo likes to complain.', false, true);
            html += createBlock('🌧️', 'วันนี้ฝนตก ดัมโบ้เครียดและท้อ', 'wan-níi fǒn dtòk. dam-bôo khrîiat lɛ́ thɔ́ɔ', 'Today it rains. Dumbo is stressed and discouraged.', false, true);

            html += createBlock('🛒🍲', 'คุณสั่งอาหาร แต่ได้ของแปลกๆ อย่าโทษพนักงาน!', 'khun sàng aa-hǎan, dtɛ̀ɛ dâai khɔ̌ɔng bplɛ̀ɛk bplɛ̀ɛk. yàa thôot phâ-nák-ngaan!', 'You ordered food, but got weird things. Don\'t blame the staff!', false, true);
            html += `</div>`;

            // --- SECTION 4: EXTENSION ACTIVITIES ---
            html += `<div class="mt-12 mb-4 flex items-center gap-2 border-b-2 border-gray-200 pb-2">

                     </div>`;

            html += createBlock('🧘‍♀️', 'วิธีแก้เครียดเวลาเจอเพื่อนแม่', 'wí-thii gɛ̂ɛ khrîiat wee-laa jəə phʉ̂an mɛ̂ɛ', 'How to relieve stress when meeting mum\'s friend.', false, true);

            // Ext 2: Story telling

            html += `</div>`;

            // Outro
            html += `<div class="mt-12 text-center">`;
            html += createBlock('🎉👏', 'เก่งมาก! เจอกันครั้งหน้าครับ', 'gèng mâak! jəə gan kráng nâa kráp', 'Very good! See you next time.', true);

            app.innerHTML = html;

        // Initialize page on load
        window.onload = renderPage;

    </script>

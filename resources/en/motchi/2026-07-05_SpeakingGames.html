<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Fun & Prep - Level 3</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .bg-castle { background-image: radial-gradient(circle at bottom, #334155 0%, #0f172a 100%); }
    </style>
</head>
<body class="bg-indigo-50 text-slate-800 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- Custom SVG Icons ---
        const Volume2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>;
        const Check = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const PenTool = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>;
        const Eraser = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>;
        const Play = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const Dices = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><circle cx="8" cy="8" r="1.5"></circle><circle cx="16" cy="16" r="1.5"></circle><circle cx="8" cy="16" r="1.5"></circle><circle cx="16" cy="8" r="1.5"></circle><circle cx="12" cy="12" r="1.5"></circle></svg>;
        const Maximize2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>;
        const RefreshCcw = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>;

        // --- Robust TTS Fix ---
        let availableVoices = [];
        const loadVoices = () => { if ('speechSynthesis' in window) availableVoices = window.speechSynthesis.getVoices(); };
        if ('speechSynthesis' in window) {
            loadVoices();
            if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
        }

        // --- Main App Component ---
        function App() {
            const [activeTab, setActiveTab] = useState('draw');

            const speak = (text, rate = 0.85) => {
                if (!('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel(); 
                
                setTimeout(() => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = window.speechSynthesis.getVoices();
                    if (voices.length > 0) {
                        const englishVoice = voices.find(v => v.name.includes('Google US English')) || 
                                             voices.find(v => v.name.includes('English')) ||
                                             voices.find(v => v.lang.startsWith('en'));
                        if (englishVoice) utterance.voice = englishVoice;
                    }
                    utterance.lang = 'en-US';
                    utterance.rate = rate;
                    window._ttsUtterance = utterance; 
                    window.speechSynthesis.speak(utterance);
                }, 50);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans">
                    <div className="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-indigo-200">
                        
                        {/* Header */}
                        <header className="bg-indigo-100 p-6 text-center border-b-4 border-indigo-200">
                            <h1 className="text-3xl font-black text-indigo-700 mb-2">🎤 Interview Level 3: The Speaking Games</h1>
                            <p className="text-indigo-600 mb-6 font-medium">Let's draw, play, and make our answers super long! 🇧🇬</p>
                            
                            <div className="flex flex-wrap justify-center gap-2">
                                <TabButton active={activeTab === 'draw'} onClick={() => setActiveTab('draw')} icon="🎨" label="Draw a Story" />
                                <TabButton active={activeTab === 'games'} onClick={() => setActiveTab('games')} icon="🎲" label="Speaking Games" />
                                <TabButton active={activeTab === 'expander'} onClick={() => setActiveTab('expander')} icon="🪗" label="Sentence Stretcher" />
                                <TabButton active={activeTab === 'castle'} onClick={() => setActiveTab('castle')} icon="🏰" label="Castle Escape" />
                                <TabButton active={activeTab === 'vocab'} onClick={() => setActiveTab('vocab')} icon="📚" label="Extra Vocab" />
                            </div>
                        </header>

                        {/* Content Area */}
                        <div className="p-6">
                            {activeTab === 'draw' && <StoryDrawTab speak={speak} />}
                            {activeTab === 'games' && <SpeakingGamesTab speak={speak} />}
                            {activeTab === 'expander' && <ExpanderTab speak={speak} />}
                            {activeTab === 'castle' && <CastleEscapeTab speak={speak} />}
                            {activeTab === 'vocab' && <VocabTab speak={speak} />}
                        </div>
                    </div>
                </div>
            );
        }

        function TabButton({ active, onClick, icon, label }) {
            return (
                <button
                    onClick={onClick}
                    className={`px-4 py-2 rounded-full font-bold transition-all flex items-center gap-2
                        ${active ? 'bg-indigo-600 text-white shadow-lg scale-105' : 'bg-white text-indigo-700 hover:bg-indigo-50 shadow-sm border border-indigo-100'}`}
                >
                    <span className="text-xl">{icon}</span> {label}
                </button>
            );
        }

        // --- 1. Draw a Story Tab (Updated with Full Sentences) ---
        function StoryDrawTab({ speak }) {
            const [currentPrompt, setCurrentPrompt] = useState(null);
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            const drawPrompts = [
                { emoji: "🐶👖", text: "A dog is wearing pants.", th: "หมาตัวหนึ่งกำลังใส่กางเกง" },
                { emoji: "🍔🌳", text: "A boy is eating a burger on a tree.", th: "เด็กผู้ชายกำลังกินแฮมเบอร์เกอร์บนต้นไม้" },
                { emoji: "⛄🏊‍♀️", text: "A snowman is swimming in a pool.", th: "มนุษย์หิมะกำลังว่ายน้ำในสระ" },
                { emoji: "👽⚽", text: "An alien is playing football.", th: "เอเลี่ยนกำลังเตะฟุตบอล" },
                { emoji: "🐱🧪", text: "A cat is making green slime.", th: "แมวตัวหนึ่งกำลังทำสไลม์สีเขียว" },
            ];

            const startDrawing = (e) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                ctx.beginPath();
                ctx.moveTo(clientX - rect.left, clientY - rect.top);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                ctx.lineTo(clientX - rect.left, clientY - rect.top);
                ctx.strokeStyle = '#0ea5e9'; 
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                ctx.stroke();
            };

            const stopDrawing = () => setIsDrawing(false);
            const clearCanvas = () => {
                const canvas = canvasRef.current;
                if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            };

            return (
                <div className="flex flex-col md:flex-row gap-6">
                    <div className="md:w-1/3 bg-cyan-50 rounded-2xl p-4 border-2 border-cyan-200">
                        <h2 className="text-xl font-bold text-cyan-700 mb-4 flex items-center gap-2"><Play size={20} /> 1. Pick a Crazy Sentence!</h2>
                        <p className="text-sm text-cyan-600 mb-4">อ่านประโยคสุดฮาแล้ววาดรูปตาม</p>
                        <div className="flex flex-col gap-2">
                            {drawPrompts.map((item, idx) => (
                                <button key={idx} onClick={() => { setCurrentPrompt(item); clearCanvas(); }}
                                    className={`p-4 text-left rounded-xl font-bold text-lg transition-all flex justify-between items-center
                                        ${currentPrompt?.text === item.text ? 'bg-cyan-600 text-white shadow-md scale-105' : 'bg-white text-cyan-700 hover:bg-cyan-100 border border-cyan-200'}`}>
                                    <span className="text-2xl mr-2">{item.emoji}</span>
                                    <span className="flex-1 leading-tight">{item.text}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                    <div className="md:w-2/3 flex flex-col items-center">
                        <div className="w-full bg-slate-50 rounded-2xl p-4 border-2 border-slate-200 flex flex-col items-center">
                            <h2 className="text-xl font-bold text-slate-700 mb-2 flex items-center gap-2"><PenTool size={20} /> 2. Draw & Tell!</h2>
                            {currentPrompt ? (
                                <div className="text-center mb-4 w-full">
                                    <div className="flex items-center justify-center gap-3">
                                        <span className="text-xl md:text-2xl font-black text-cyan-600">{currentPrompt.text}</span>
                                        <button onClick={() => speak(currentPrompt.text)} className="p-2 bg-cyan-200 text-cyan-700 hover:bg-cyan-300 rounded-full transition-colors shrink-0"><Volume2 size={20} /></button>
                                    </div>
                                    <p className="text-slate-500 font-medium mt-1">({currentPrompt.th})</p>
                                </div>
                            ) : <p className="text-slate-400 mb-4">เลือกประโยคทางซ้ายมือก่อนนะ 👈</p>}
                            <div className="relative bg-white border-4 border-slate-300 rounded-xl overflow-hidden shadow-inner touch-none w-full">
                                <canvas ref={canvasRef} width={400} height={300} className="cursor-crosshair w-full max-w-full block"
                                    onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing}
                                    onTouchStart={(e) => { e.preventDefault(); startDrawing(e); }} onTouchMove={(e) => { e.preventDefault(); draw(e); }} onTouchEnd={stopDrawing} />
                            </div>
                            <div className="mt-4 flex gap-4 w-full justify-center">
                                <button onClick={clearCanvas} className="flex items-center gap-2 px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-bold transition-colors">
                                    <Eraser size={18} /> Clear
                                </button>
                                {currentPrompt && (
                                    <div className="px-4 py-2 bg-yellow-100 text-yellow-700 rounded-lg font-bold border border-yellow-300 animate-pulse">
                                        👉 วาดเสร็จแล้ว ลองอ่านให้ครูฟังหน่อย!
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 2. Speaking Games Tab ---
        function SpeakingGamesTab({ speak }) {
            const [gameMode, setGameMode] = useState('longer');

            const longerQuestions = [
                { q: "Do you like winter?", teacher: "Yes, I like winter.", hint: "ตอบให้ยาวกว่าครู! (ใช้ Because หรือ But)" },
                { q: "What is your favorite food?", teacher: "My favorite food is chocolate.", hint: "ตอบให้ยาวกว่าครู! (ยกตัวอย่าง For example)" },
                { q: "Do you like Art?", teacher: "Yes, I like Art.", hint: "ตอบให้ยาวกว่าครู! (ใช้ Past/Present/Future)" }
            ];

            const delayQuestions = [
                { q: "What's your name?", note: "ข้อแรกตอบว่า I don't know." },
                { q: "How old are you?", note: "ตอนนี้ให้ตอบชื่อของหนู!" },
                { q: "What is your favorite subject?", note: "ตอนนี้ให้ตอบอายุของหนู!" },
                { q: "Do you have any pets?", note: "ตอนนี้ให้ตอบวิชาที่ชอบ!" }
            ];

            return (
                <div className="space-y-6">
                    <div className="text-center">
                        <h2 className="text-3xl font-black text-rose-600 mb-2 flex items-center justify-center gap-2"><Dices size={32}/> Speaking Games!</h2>
                        <p className="text-rose-500 font-medium">เกมฝึกสมองและฝึกความลื่นไหลในการพูด</p>
                    </div>

                    <div className="flex justify-center gap-4 border-b-2 border-rose-100 pb-4">
                        <button onClick={() => setGameMode('longer')} className={`px-6 py-3 rounded-2xl font-bold text-lg transition-all ${gameMode === 'longer' ? 'bg-orange-500 text-white shadow-lg scale-105' : 'bg-orange-100 text-orange-600 hover:bg-orange-200'}`}>
                            📏 1. Beat the Teacher (ตอบให้ยาวกว่า)
                        </button>
                        <button onClick={() => setGameMode('delay')} className={`px-6 py-3 rounded-2xl font-bold text-lg transition-all ${gameMode === 'delay' ? 'bg-purple-500 text-white shadow-lg scale-105' : 'bg-purple-100 text-purple-600 hover:bg-purple-200'}`}>
                            🧠 2. The Delay Game (เกมตอบข้ามข้อ)
                        </button>
                    </div>

                    {gameMode === 'longer' && (
                        <div className="bg-orange-50 p-6 rounded-3xl border-4 border-orange-200 space-y-6">
                            <h3 className="text-xl font-bold text-orange-800 text-center mb-4">กฎ: ครูจะตอบสั้นๆ 1 ประโยค หนูต้องตอบคำถามเดียวกันให้ "ยาวกว่าครู"!</h3>
                            {longerQuestions.map((item, idx) => (
                                <div key={idx} className="bg-white rounded-2xl p-5 shadow-sm border-2 border-orange-100">
                                    <div className="flex items-center gap-3 mb-4">
                                        <span className="text-2xl">🗣️</span>
                                        <h4 className="font-black text-xl text-slate-800">{item.q}</h4>
                                        <button onClick={() => speak(item.q)} className="p-2 text-orange-500 hover:bg-orange-100 rounded-full"><Volume2 size={20}/></button>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-red-50 p-4 rounded-xl border border-red-200">
                                            <p className="font-bold text-red-600 mb-2">👩‍🏫 Teacher's Short Answer:</p>
                                            <p className="text-lg text-slate-700 italic">"{item.teacher}"</p>
                                        </div>
                                        <div className="bg-green-50 p-4 rounded-xl border border-green-200 shadow-inner">
                                            <p className="font-bold text-green-600 mb-2">👧 Student's Long Answer!</p>
                                            <p className="text-sm text-green-800 bg-green-200 px-3 py-1 rounded-full inline-block animate-pulse">{item.hint}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {gameMode === 'delay' && (
                        <div className="bg-purple-50 p-6 rounded-3xl border-4 border-purple-200 space-y-4">
                            <div className="text-center mb-6">
                                <h3 className="text-xl font-bold text-purple-800">กฎ: สติและสมาธิ! หนูต้องตอบคำถามของ "ข้อที่แล้ว" เสมอ!</h3>
                                <p className="text-purple-600 text-sm mt-2">คำถามข้อแรกให้ตอบว่า "I don't know"</p>
                            </div>
                            <div className="space-y-4 max-w-2xl mx-auto">
                                {delayQuestions.map((item, idx) => (
                                    <div key={idx} className="bg-white rounded-2xl p-4 shadow-sm border-l-8 border-purple-400 flex items-center justify-between">
                                        <div>
                                            <p className="text-xs text-purple-500 font-bold uppercase mb-1">Question {idx + 1}</p>
                                            <h4 className="font-bold text-xl text-slate-800">{item.q}</h4>
                                            <p className="text-sm text-amber-600 font-medium mt-2 bg-amber-50 inline-block px-2 py-1 rounded">💡 Hint: {item.note}</p>
                                        </div>
                                        <button onClick={() => speak(item.q)} className="p-3 text-purple-600 bg-purple-100 hover:bg-purple-200 rounded-full shrink-0"><Volume2 size={24}/></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- 3. Sentence Stretcher Tab ---
        function ExpanderTab({ speak }) {
            const expanderData = [
                {
                    id: 1,
                    base: "I like Science.",
                    th: "ฉันชอบวิทยาศาสตร์",
                    steps: [
                        { btnText: "+ Why?", text: "I like Science because I love experiments.", th: "เพราะฉันชอบการทดลอง", emoji: "🤔" },
                        { btnText: "+ Example?", text: "I like Science because I love experiments. For example, making slime.", th: "ยกตัวอย่างเช่น การทำสไลม์", emoji: "👉" },
                        { btnText: "+ Feeling?", text: "I like Science because I love experiments. For example, making slime. It is very fun!", th: "มันสนุกมากๆ!", emoji: "😄" }
                    ]
                },
                {
                    id: 2,
                    base: "I want to go to Bulgaria.",
                    th: "ฉันอยากไปบัลเกเรีย",
                    steps: [
                        { btnText: "+ Why?", text: "I want to go to Bulgaria because I want to see snow.", th: "เพราะอยากเห็นหิมะ", emoji: "🤔" },
                        { btnText: "+ And?", text: "I want to go to Bulgaria because I want to see snow, and I like the cold.", th: "และฉันก็ชอบความหนาว", emoji: "➕" },
                        { btnText: "+ Future?", text: "I want to go to Bulgaria because I want to see snow, and I like the cold. In the future, I will study there.", th: "ในอนาคต ฉันจะเรียนที่นั่น", emoji: "🔮" }
                    ]
                }
            ];

            const [progress, setProgress] = useState({ 1: 0, 2: 0 });

            const handleExpand = (id, maxSteps) => {
                setProgress(prev => ({
                    ...prev,
                    [id]: Math.min(prev[id] + 1, maxSteps)
                }));
            };

            const handleReset = (id) => {
                setProgress(prev => ({ ...prev, [id]: 0 }));
            };

            return (
                <div className="space-y-8">
                    <div className="text-center">
                        <h2 className="text-3xl font-black text-emerald-600 mb-2 flex items-center justify-center gap-2"><Maximize2 size={32}/> Sentence Stretcher</h2>
                        <p className="text-emerald-500 font-medium">เกมยืดประโยค! ลองกดปุ่มบวกเพื่อเติมคำตอบให้ยาวขึ้นเรื่อยๆ</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {expanderData.map((item) => {
                            const currentStep = progress[item.id];
                            const currentText = currentStep === 0 ? item.base : item.steps[currentStep - 1].text;
                            const currentTh = currentStep === 0 ? item.th : item.steps[currentStep - 1].th;
                            const isMax = currentStep === item.steps.length;

                            return (
                                <div key={item.id} className="bg-emerald-50 p-6 rounded-3xl border-4 border-emerald-200 flex flex-col justify-between">
                                    
                                    {/* Sentence Display Area */}
                                    <div className="bg-white rounded-2xl p-6 shadow-md border-2 border-emerald-100 min-h-[200px] flex flex-col justify-center items-center text-center relative transition-all duration-300">
                                        <button onClick={() => speak(currentText)} className="absolute top-4 right-4 text-emerald-500 hover:bg-emerald-100 p-2 rounded-full transition-colors"><Volume2 size={24}/></button>
                                        
                                        <p className="text-2xl md:text-3xl font-bold text-slate-800 leading-tight mb-4 transition-all">
                                            "{currentText}"
                                        </p>
                                        <p className="text-emerald-600 font-medium bg-emerald-100 px-3 py-1 rounded-full text-sm">
                                            {currentTh}
                                        </p>
                                    </div>

                                    {/* Action Buttons */}
                                    <div className="mt-6 flex flex-wrap gap-3 justify-center">
                                        {!isMax ? (
                                            <button 
                                                onClick={() => {
                                                    handleExpand(item.id, item.steps.length);
                                                    speak(item.steps[currentStep].text);
                                                }} 
                                                className="px-6 py-3 bg-emerald-500 hover:bg-emerald-400 text-white font-black rounded-full shadow-lg transform hover:scale-105 transition-all flex items-center gap-2 text-lg w-full md:w-auto"
                                            >
                                                {item.steps[currentStep].emoji} {item.steps[currentStep].btnText}
                                            </button>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Interview Roleplay: Antarctica! 🐧❄️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* iOS-like light gray background */
            -webkit-tap-highlight-color: transparent;
        }

        .text-card {
            transition: all 0.2s ease-in-out;
        }

        .text-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Smooth reveal for Thai translation */
        .thai-text {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out, margin-top 0.3s ease-out;
        }

        .thai-text.show {
            max-height: 500px; /* arbitrary large max-height */
            opacity: 1;
            margin-top: 0.75rem;
        }

        /* iOS style soft buttons */
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }
        
        .action-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="text-gray-800 antialiased pb-20">

    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-3xl mx-auto px-4 py-5 flex items-center justify-center">
            <h1 class="text-2xl font-bold text-center text-blue-600">
                Job Interview: Antarctica! 🐧❄️
            </h1>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 mt-6" id="lesson-container">
        <!-- Content will be dynamically injected here by JavaScript -->
    </main>

    <footer class="max-w-3xl mx-auto px-4 mt-8 pb-8 text-center text-gray-400 text-sm">
        <p>Adapted from Empower B2 Textbook, page 61. 📚</p>
    </footer>

    <script>
        // Lesson content structured sentence-by-sentence for granular TTS and Translation
        const lessonData = [
            {

                    {

                    },

                        en: "This job is from October to March. 🗓️",

                    },
                    {
                        en: "Would you like this job? 🤔",
                        th: "คุณอยากทำงานตำแหน่งนี้ไหม? 🤔"
                    }
                ]
            },
            {
                sectionIcon: "🧠",
                sectionTitle: "Comprehension Questions",
                items: [
                    {
                        en: "Let's check your understanding of the advert. 🔍",
                        th: "มาตรวจสอบความเข้าใจของคุณเกี่ยวกับโฆษณากันเถอะ 🔍"
                    },
                    {
                        en: "1. What are the main requirements and skills needed for this job? 📋",
                        th: "1. ข้อกำหนดหลักและทักษะที่จำเป็นสำหรับงานนี้คืออะไร? 📋"
                    },
                    {
                        en: "2. How many months will you be working in Antarctica? 🗓️❄️",

                    },
                    {
                        en: "3. Why do you think a \"friendly personality\" is so important for a small team in an isolated place? 😊🌍",
                        th: "3. ทำไมคุณถึงคิดว่า \"บุคลิกภาพที่เป็นมิตร\" จึงสำคัญมากสำหรับทีมเล็กๆ ในสถานที่ที่ห่างไกล? 😊🌍"

            },
            {
                sectionIcon: "🎭",
                sectionTitle: "Task: Role Play Preparation",
                items: [
                    {

                        th: "เตรียมการแสดงบทบาทสมมติในการสัมภาษณ์งานสำหรับตำแหน่งเจ้าหน้าที่สื่อสาร 📝"

                    {
                        en: "Student B: You are the interviewer. 🕵️‍♂️",
                        th: "นักเรียน B: คุณคือผู้สัมภาษณ์ 🕵️‍♂️"
                    },
                    {
                        en: "Think of questions to ask the applicant. Ask about their tech background and how they handle stress. 📋",

                ]
            },
            {
                sectionIcon: "🎬",
                sectionTitle: "Action: Do the Role Play!",
                items: [
                    {
                        en: "Work in pairs. Do the role play! 🗣️",

                    },
                    {
                        en: "After the interview, discuss these questions together: 🔄",

                    },
                    {
                        en: "Student B: Do you think Student A is suitable for the job? Why or why not? 🧐",
                        th: "นักเรียน B: คุณคิดว่านักเรียน A เหมาะสมกับงานนี้ไหม? ทำไมถึงเหมาะสม หรือทำไมถึงไม่เหมาะสม? 🧐"
                    }
                ]
            },
            {
                sectionIcon: "💬",
                sectionTitle: "Discussion Questions",
                items: [
                    {
                        en: "Great job! Now let's discuss some wider topics about extreme jobs. 🌟",
                        th: "ทำได้ดีมาก! ตอนนี้เรามาคุยกันถึงหัวข้อที่กว้างขึ้นเกี่ยวกับงานที่ท้าทายกันเถอะ 🌟"
                    },
                    {
                        en: "1. In the future, do you think AI and new tech will make jobs in extreme places like Antarctica easier? 🤖🌍",
                        th: "1. ในอนาคต คุณคิดว่า AI และเทคโนโลยีใหม่ๆ จะทำให้งานในสถานที่ที่ท้าทายอย่างแอนตาร์กติกาง่ายขึ้นไหม? 🤖🌍"
                    },
                    {
                        en: "2. If you were stuck in Antarctica for 6 months, which 3 books or TV series would you bring? 📚🎬",
                        th: "2. ถ้าคุณต้องติดอยู่ในแอนตาร์กติกาเป็นเวลา 6 เดือน คุณจะนำหนังสือหรือซีรีส์ 3 เรื่องใดไปด้วย? 📚🎬"
                    },
                    {
                        en: "3. How can maintaining a sports and fitness routine prepare someone for difficult work challenges? 🏃‍♂️💼",
                        th: "3. การรักษากิจวัตรการเล่นกีฬาและความฟิตสามารถเตรียมคนให้พร้อมสำหรับความท้าทายในการทำงานที่ยากลำบากได้อย่างไร? 🏃‍♂️💼"
                    }
                ]
            },
            {
                sectionIcon: "🚀",
                sectionTitle: "Extension Activities",
                items: [
                    {
                        en: "Finished early? Let's do some extra practice! 💪",
                        th: "เสร็จก่อนเวลาใช่ไหม? มาฝึกฝนเพิ่มเติมกันเถอะ! 💪"
                    },
                    {
                        en: "Vocabulary Builder: Let's brainstorm 5 tech-related adjectives to describe a modern employee. 🧠",
                        th: "การสร้างคำศัพท์: มาระดมความคิดหาคำคุณศัพท์เกี่ยวกับเทคโนโลยี 5 คำเพื่ออธิบายพนักงานยุคใหม่กันเถอะ 🧠"
                    },
                    {
                        en: "Pronunciation Practice: Practice saying these words clearly: Antarctica, Satellite, Broadcasting, Experience, Suitable. 🗣️",
                        th: "ฝึกการออกเสียง: ฝึกพูดคำเหล่านี้ให้ชัดเจน: แอนตาร์กติกา, ดาวเทียม, การกระจายเสียง, ประสบการณ์, เหมาะสม 🗣️"
                    },
                    {
                        en: "Creative Speaking: Imagine you got the job. Describe a YouTube vlog you would make from Antarctica! 📹⛄",
                        th: "การพูดเชิงสร้างสรรค์: จินตนาการว่าคุณได้งานนี้ จงอธิบาย Vlog บน YouTube ที่คุณจะทำจากแอนตาร์กติกา! 📹⛄"
                    }
                ]
            },
            {
                sectionIcon: "🏠",
                sectionTitle: "Homework",
                items: [
                    {
                        en: "Let's prepare something for our next meeting! 📅",
                        th: "มาเตรียมตัวสำหรับการพบกันครั้งหน้าของเรากันเถอะ! 📅"
                    },
                    {
                        en: "Write a short follow-up email to the interviewer thanking them for their time. 📧",
                        th: "เขียนอีเมลติดตามผลสั้นๆ ถึงผู้สัมภาษณ์เพื่อขอบคุณสำหรับเวลาของพวกเขา 📧"
                    },
                    {
                        en: "In the email, mention one tech book or YouTube channel you plan to watch in Antarctica to show you are ready for the quiet days! 📚📺",
                        th: "ในอีเมล ให้พูดถึงหนังสือเกี่ยวกับเทคโนโลยีหรือช่อง YouTube ที่คุณวางแผนจะดูในแอนตาร์กติกาเพื่อแสดงว่าคุณพร้อมสำหรับวันที่เงียบสงบ! 📚📺"
                    },
                    {
                        en: "Alternatively, record a 1-minute video explaining a simple fitness routine you would do inside the snowy station. 🏋️‍♂️📱",
                        th: "อีกทางเลือกหนึ่ง คือบันทึกวิดีโอความยาว 1 นาทีอธิบายกิจวัตรการออกกำลังกายง่ายๆ ที่คุณจะทำภายในสถานีที่เต็มไปด้วยหิมะ 🏋️‍♂️📱"
                    },
                    {
                        en: "We will review it together in our next class. See you next time! 👋",
                        th: "เราจะทบทวนด้วยกันในชั้นเรียนครั้งต่อไป แล้วพบกันใหม่! 👋"

        ];

        
        // Text-to-Speech function
        function speakText(text) {
            // Cancel any ongoing speech
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; // Standard American English
            utterance.rate = 0.9;     // Slightly slower for learners
            utterance.pitch = 1;
            
            window.speechSynthesis.speak(utterance);
        }

        // Toggle Translation visibility
        function toggleTranslation(id) {
            const thaiElement = document.getElementById(`th-${id}`);
            const btnElement = document.getElementById(`btn-th-${id}`);
            
            if (thaiElement.classList.contains('show')) {
                thaiElement.classList.remove('show');
                btnElement.classList.remove('bg-blue-100', 'text-blue-600');
                btnElement.classList.add('bg-gray-100', 'text-gray-500');
            } else {
                thaiElement.classList.add('show');
                btnElement.classList.remove('bg-gray-100', 'text-gray-500');
                btnElement.classList.add('bg-blue-100', 'text-blue-600');
            }
        }

        // Render the UI
        function renderApp() {
            const container = document.getElementById('lesson-container');
            let htmlContent = '';
            let globalIdCounter = 0;

            lessonData.forEach((section, sectionIndex) => {
                // Section Wrapper
                htmlContent += `
                    <div class="mb-10">
                        <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center border-b-2 border-blue-100 pb-2">
                            <span class="mr-2">${section.sectionIcon}</span> 
                            ${section.sectionTitle}
                        </h2>
                        <div class="space-y-4">
                `;

                // Section Items (Sentences)
                section.items.forEach((item) => {
                    globalIdCounter++;
                    
                    htmlContent += `
                        <div class="text-card bg-white rounded-xl p-4 shadow-sm border border-gray-100">
                            <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4">
                                <!-- English Text -->
                                <p class="text-lg text-gray-800 leading-relaxed flex-1 font-medium">
                                    ${item.en}
                                </p>
                                
                                <!-- Action Buttons -->
                                <div class="flex items-center space-x-2 shrink-0">
                                    <button 
                                        onclick="speakText('${item.en.replace(/'/g, "\\'")}')" 
                                        class="action-btn bg-gray-100 text-gray-600 hover:bg-blue-50 hover:text-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-300"
                                        aria-label="Listen to English pronunciation"
                                        title="Listen"
                                    >
                                        <i class="fas fa-volume-up text-lg"></i>
                                    </button>
                                    
                                    <button 
                                        id="btn-th-${globalIdCounter}"
                                        onclick="toggleTranslation(${globalIdCounter})" 
                                        class="action-btn bg-gray-100 text-gray-500 hover:bg-blue-50 hover:text-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-300"
                                        aria-label="Toggle Thai Translation"
                                        title="Translate to Thai"
                                    >
                                        <span class="font-bold text-sm">TH</span>
                                    </button>
                                </div>
                            </div>
                            
                            <!-- Hidden Thai Translation -->
                            <div id="th-${globalIdCounter}" class="thai-text border-l-4 border-blue-400 pl-3">
                                <p class="text-base text-blue-800 font-medium">${item.th}</p>
                            </div>
                        </div>
                    `;
                });

                htmlContent += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = htmlContent;
        }

        // Initialize App on load
        window.addEventListener('DOMContentLoaded', renderApp);
    </script>
</body>
</html>

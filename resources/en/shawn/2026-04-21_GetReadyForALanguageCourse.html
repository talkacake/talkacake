        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdfa; /* Soft teal/blue aesthetic */
            background-image: radial-gradient(#ccfbf1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .thai-text {
            font-family: 'Kanit', sans-serif;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .task-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(14, 116, 144, 0.1), 0 8px 10px -6px rgba(14, 116, 144, 0.1);
        }
        .speaker-btn {
            min-width: 2.5rem;
        }
        .highlight-word {
            color: #0369a1; /* Sky 700 */
            font-weight: 800;
            background-color: #e0f2fe; /* Sky 100 */
            padding: 0 0.25rem;
            border-radius: 0.25rem;
        }
        .error-word {
            color: #94a3b8; /* Slate 400 */
            font-weight: 800;
            text-decoration: line-through;
            background-color: #f1f5f9;
            padding: 0 0.25rem;
            border-radius: 0.25rem;
        }
        .correct-word {
            color: #16a34a; /* Green 600 */
            font-weight: 800;
            background-color: #dcfce7;
            padding: 0 0.25rem;
            border-radius: 0.25rem;
        }
    </style>

                description: { eng: "Our target words from the video and lesson!", th: "คำศัพท์เป้าหมายจากวิดีโอและบทเรียนในวันนี้!" },
                items: [
                    { eng: "currently ⏳📍", th: "ในปัจจุบัน / ขณะนี้" },
                    { eng: "diploma 📜🎓", th: "อนุปริญญา / ประกาศนียบัตร" },
                    { eng: "instructor 👨‍🏫👩‍🏫", th: "ผู้ฝึกสอน / อาจารย์" },
                    { eng: "staff 👨‍💼👩‍💼", th: "พนักงาน / เจ้าหน้าที่ (ออกเสียง สระอา/แอะ กว้างๆ)" },
                    { eng: "stuff 🎒📦", th: "สิ่งของ / ของใช้ (ออกเสียง สระอะ สั้นๆ)" },
                    { eng: "pathway 🛤️🎓", th: "เส้นทาง / หลักสูตรเตรียมความพร้อม" },
                    { eng: "wanna (want to) 🙏✨", th: "อยากจะ (ตามด้วย V1 เสมอ เช่น wanna go, wanna eat)" }
                ]
            }
        ];

        // 3. Helper Functions
        let idCounter = 0;

        function cleanTextForTTS(text) {
            let clean = text.replace(/<[^>]*>?/gm, ''); 
            clean = clean.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '');
            return clean.replace(/"/g, '').replace(/'/g, '').replace(/❌/g, '').replace(/✅/g, '').replace(/➡️/g, '').trim();
        }

        function speakText(text) {
            if (!text || text.length === 0) return;

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; 
                utterance.rate = 0.85; 
                utterance.pitch = 1.0;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Sorry, your browser does not support Text-to-Speech.");
            }
        }

        function toggleThai(elementId) {
            const thaiElement = document.getElementById(elementId);
            if (thaiElement.style.display === "none" || thaiElement.style.display === "") {
                thaiElement.style.display = "block";
            } else {
                thaiElement.style.display = "none";
            }
        }

        function getControlsHtml(cleanText, thaiId, isSmall = false) {
            const sizeClass = isSmall ? "w-8 h-8" : "w-10 h-10";
            const iconSize = isSmall ? "h-4 w-4" : "h-6 w-6";
            const textClass = isSmall ? "text-xs px-2 h-8" : "font-bold px-3 h-10";
            
            const hasVideoLink = cleanText.includes("Watch Video") || cleanText.includes("Assignment:");
            
            return `
                <div class="flex flex-row gap-2 flex-shrink-0 items-center">
                    ${!hasVideoLink ? `
                    <button onclick="speakText('${cleanText}')" 
                            class="flex items-center justify-center ${sizeClass} rounded-full bg-blue-100 text-blue-600 hover:bg-blue-200 transition-colors focus:outline-none speaker-btn"
                            title="Listen to English">
                        <svg xmlns="http://www.w3.org/2000/svg" class="${iconSize}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2.586l3.707 3.707a1 1 0 001.707-.707V4.908a1 1 0 00-1.707-.707L9.586 8H7a2 2 0 00-2 2z" />
                        </svg>
                    </button>` : ''}
                    <button onclick="toggleThai('${thaiId}')" 
                            class="flex items-center justify-center rounded-lg bg-pink-100 text-pink-600 hover:bg-pink-200 transition-colors focus:outline-none ${textClass}"
                            title="Show/Hide Thai Translation">
                        TH
                    </button>
                </div>
            `;
        }

        // 4. Render the UI
        function renderLesson() {
            const container = document.getElementById('lesson-container');
            let htmlContent = '';

            lessonData.forEach((section) => {
                if (section.sectionType === "divider") {
                    const titleId = `dyn-th-${idCounter++}`;
                    const descId = `dyn-th-${idCounter++}`;
                    
                    htmlContent += `
                        <div class="mt-16 mb-8 text-center flex flex-col items-center">
                            <div class="flex flex-col sm:flex-row items-center justify-center gap-3 mb-1">
                                <h2 class="text-3xl font-extrabold text-cyan-700">${section.title.eng}</h2>
                                ${getControlsHtml(cleanTextForTTS(section.title.eng), titleId, true)}
                            </div>
                            <div id="${titleId}" class="thai-text mb-4">
                                <p class="text-xl text-cyan-600 font-bold">${section.title.th}</p>
                            </div>
                            
                            <div class="flex flex-col sm:flex-row items-center justify-center gap-3 mb-1">
                                <p class="text-gray-500 font-medium">${section.description.eng}</p>
                                ${getControlsHtml(cleanTextForTTS(section.description.eng), descId, true)}
                            </div>
                            <div id="${descId}" class="thai-text mb-2">
                                <p class="text-[1.05rem] text-gray-400 font-medium">${section.description.th}</p>
                            </div>
                            <div class="w-24 h-1 bg-cyan-300 mx-auto mt-4 rounded-full"></div>
                        </div>
                    `;
                } else if (section.sectionType === "reading-split") {
                    // --- SIDE-BY-SIDE LAYOUT FOR READING ---
                    const titleId = `dyn-th-${idCounter++}`;
                    const descId = `dyn-th-${idCounter++}`;
                    
                    htmlContent += `
                        <div class="task-card bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-sky-100 mb-8">
                            <div class="flex flex-col mb-4">
                                <div class="flex items-start justify-between gap-4 mb-1">
                                    <h2 class="text-2xl font-bold text-gray-800">${section.title.eng}</h2>
                                    ${getControlsHtml(cleanTextForTTS(section.title.eng), titleId, true)}
                                </div>
                                <div id="${titleId}" class="thai-text">
                                    <p class="text-[1.15rem] text-gray-600 font-bold">${section.title.th}</p>
                                </div>
                            </div>
                            <div class="flex flex-col mb-6 border-l-4 border-cyan-500 pl-4">
                                <div class="flex items-start justify-between gap-4 mb-1">
                                    <p class="text-sky-700 font-semibold">${section.description.eng}</p>
                                    ${getControlsHtml(cleanTextForTTS(section.description.eng), descId, true)}
                                </div>
                                <div id="${descId}" class="thai-text">
                                    <p class="text-[1.05rem] text-sky-600 font-medium">${section.description.th}</p>
                                </div>
                            </div>

                            <!-- Side-by-side Grid -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <!-- Left Side: Passage -->
                                <div class="bg-sky-50 rounded-2xl p-5 border border-sky-100">
                                    <h3 class="text-xl font-bold text-sky-800 mb-4 border-b border-sky-200 pb-2">Passage 📖</h3>
                                    <div class="space-y-4">
                    `;
                    
                    section.passage.forEach(item => {
                        const itemId = `dyn-th-${idCounter++}`;
                        htmlContent += `
                            <div class="flex flex-col gap-1">
                                <div class="flex items-start justify-between gap-2">
                                    <p class="text-md text-gray-800 leading-relaxed w-full">${item.eng}</p>
                                    ${getControlsHtml(cleanTextForTTS(item.eng), itemId, true)}
                                </div>
                                <div id="${itemId}" class="thai-text">
                                    <p class="text-sm text-gray-600">${item.th}</p>
                                </div>
                            </div>
                        `;
                    });

                    htmlContent += `
                                    </div>
                                </div>
                                <!-- Right Side: Questions -->
                                <div class="bg-cyan-50 rounded-2xl p-5 border border-cyan-100">
                                    <h3 class="text-xl font-bold text-cyan-800 mb-4 border-b border-cyan-200 pb-2">Questions 🤔</h3>
                                    <div class="space-y-6">
                    `;

                    section.questions.forEach(item => {
                        const itemId = `dyn-th-${idCounter++}`;
                        htmlContent += `
                            <div class="flex flex-col gap-2">
                                <div class="flex items-start justify-between gap-2">
                                    <p class="text-md font-bold text-gray-800 leading-relaxed w-full">${item.eng}</p>
                                    ${getControlsHtml(cleanTextForTTS(item.eng), itemId, true)}
                                </div>
                                <div id="${itemId}" class="thai-text">
                                    <p class="text-sm text-gray-600">${item.th}</p>
                                </div>
                            </div>
                        `;
                    });

                    htmlContent += `
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;

                } else {
                    // --- STANDARD LAYOUT ---
                    const titleId = `dyn-th-${idCounter++}`;
                    let descHtml = '';

                    if (section.description) {
                        const descId = `dyn-th-${idCounter++}`;
                        descHtml = `
                            <div class="flex flex-col mb-6 border-l-4 border-cyan-500 pl-4">
                                <div class="flex items-start justify-between gap-4 mb-1">
                                    <p class="text-sky-700 font-semibold">${section.description.eng}</p>
                                    ${getControlsHtml(cleanTextForTTS(section.description.eng), descId, true)}
                                </div>
                                <div id="${descId}" class="thai-text">
                                    <p class="text-[1.05rem] text-sky-600 font-medium">${section.description.th}</p>
                                </div>
                            </div>
                        `;
                    } else {
                        descHtml = '<div class="mb-4"></div>';
                    }

                    htmlContent += `
                        <div class="task-card bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-sky-100 mb-8">
                            <div class="flex flex-col mb-4">
                                <div class="flex items-start justify-between gap-4 mb-1">
                                    <h2 class="text-2xl font-bold text-gray-800">${section.title.eng}</h2>
                                    ${getControlsHtml(cleanTextForTTS(section.title.eng), titleId, true)}
                                </div>
                                <div id="${titleId}" class="thai-text">
                                    <p class="text-[1.15rem] text-gray-600 font-bold">${section.title.th}</p>
                                </div>
                            </div>
                            ${descHtml}
                            
                            <div class="space-y-4">
                    `;

                    section.items.forEach(item => {
                        const itemId = `dyn-th-${idCounter++}`;
                        
                        let highlightedEng = item.eng;
                        // Avoid double-span issues in grammar/pronunciation sections
                        if (!highlightedEng.includes("<span") && !highlightedEng.includes("<div") && !highlightedEng.includes("<a")) {
                             highlightedEng = highlightedEng
                                .replace(/Staff/g, '<span class="highlight-word">Staff</span>')
                                .replace(/Stuff/g, '<span class="highlight-word">Stuff</span>');
                        }

                        htmlContent += `
                            <div class="bg-gray-50 rounded-2xl p-4 md:p-5 border border-gray-100">
                                <div class="flex items-start justify-between gap-4">
                                    <div class="text-lg md:text-xl text-gray-800 font-medium leading-relaxed w-full">${highlightedEng}</div>
                                    ${getControlsHtml(cleanTextForTTS(item.eng), itemId, false)}
                                </div>
                                <div id="${itemId}" class="thai-text mt-4 pt-4 border-t border-gray-200">
                                    <p class="text-[1.1rem] text-gray-600 leading-relaxed">${item.th}</p>
                                </div>
                            </div>
                        `;
                    });

                    htmlContent += `
                            </div>
                        </div>
                    `;
                }
            });

            container.innerHTML = htmlContent;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', renderLesson);
    </script>
</body>
</html>

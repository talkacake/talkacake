<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Debrief: Spill the Tea! ☕🗣️</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f5f3ff; /* Light indigo/purple aesthetic for evening vibes */
            background-image: radial-gradient(#ddd6fe 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .thai-text {
            font-family: 'Kanit', sans-serif;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .task-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.1), 0 8px 10px -6px rgba(99, 102, 241, 0.1);
        }
        .speaker-btn {
            min-width: 2.5rem;
        }
        .highlight-word {
            color: #4f46e5; /* Indigo 600 */
            font-weight: 800;
            background-color: #e0e7ff; /* Indigo 100 */
            padding: 0 0.25rem;
            border-radius: 0.25rem;
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen pb-16">

    <!-- Header Section -->
    <header class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white py-12 px-4 shadow-md mb-10 rounded-b-[3rem]">
        <div class="max-w-3xl mx-auto text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">The Daily Debrief ☕🗣️</h1>
            <p class="text-lg md:text-xl font-medium opacity-90">Spill the tea about your day! 🏢📱</p>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-3xl mx-auto px-4">
        
        <!-- Random Vocab Review Section -->
        <div class="task-card bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-indigo-50 mb-8" id="review-section">
            <div class="flex flex-col mb-4">
                <div class="flex items-start justify-between gap-4 mb-1">
                    <h2 class="text-2xl font-bold text-gray-800">Warm-up: Vocabulary Review 🔄🧠</h2>
                    <div class="flex flex-row gap-2 flex-shrink-0 items-center">
                        <button onclick="speakText('Warm-up: Vocabulary Review')" class="flex items-center justify-center w-8 h-8 rounded-full bg-blue-100 text-blue-600 hover:bg-blue-200 transition-colors focus:outline-none speaker-btn" title="Listen to English">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2.586l3.707 3.707a1 1 0 001.707-.707V4.908a1 1 0 00-1.707-.707L9.586 8H7a2 2 0 00-2 2z" /></svg>
                        </button>
                        <button onclick="toggleThai('thai-title-review')" class="flex items-center justify-center h-8 px-2 rounded-lg bg-pink-100 text-pink-600 text-xs font-bold hover:bg-pink-200 transition-colors focus:outline-none">TH</button>
                    </div>
                </div>
                <div id="thai-title-review" class="thai-text"><p class="text-[1.15rem] text-gray-600 font-bold">อุ่นเครื่อง: ทบทวนคำศัพท์ 🔄🧠</p></div>
            </div>

            <div class="flex flex-col mb-6">
                <div class="flex items-start justify-between gap-4 mb-1">
                    <p class="text-indigo-500 font-semibold">Click the button to get a random word from our last lessons. Make a sentence with it! 🗣️</p>
                    <div class="flex flex-row gap-2 flex-shrink-0 items-center">
                        <button onclick="speakText('Click the button to get a random word from our last lessons. Make a sentence with it!')" class="flex items-center justify-center w-8 h-8 rounded-full bg-blue-100 text-blue-600 hover:bg-blue-200 transition-colors focus:outline-none speaker-btn" title="Listen to English">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2.586l3.707 3.707a1 1 0 001.707-.707V4.908a1 1 0 00-1.707-.707L9.586 8H7a2 2 0 00-2 2z" /></svg>
                        </button>
                        <button onclick="toggleThai('thai-desc-review')" class="flex items-center justify-center h-8 px-2 rounded-lg bg-pink-100 text-pink-600 text-xs font-bold hover:bg-pink-200 transition-colors focus:outline-none">TH</button>
                    </div>
                </div>
                <div id="thai-desc-review" class="thai-text"><p class="text-[1.05rem] text-indigo-600 font-medium">คลิกปุ่มเพื่อสุ่มคำศัพท์จากบทเรียนที่แล้ว แล้วแต่งประโยคจากคำนั้น! 🗣️</p></div>
            </div>

            <div class="text-center py-4">
                <button onclick="generateRandomWord()" class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-bold py-3 px-8 rounded-full hover:shadow-lg hover:scale-105 transition-all mb-6 text-lg">
                    Draw a Word! 🎲
                </button>
                
                <div id="random-word-display" class="hidden bg-gray-50 rounded-2xl p-5 border border-indigo-100 max-w-lg mx-auto">
                    <div class="flex items-center justify-between gap-4">
                        <p id="random-word-eng" class="text-2xl text-gray-800 font-bold leading-relaxed"></p>
                        <div class="flex flex-row gap-2 flex-shrink-0">
                            <button id="random-word-tts" class="flex items-center justify-center w-10 h-10 rounded-full bg-blue-100 text-blue-600 hover:bg-blue-200 transition-colors focus:outline-none speaker-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2.586l3.707 3.707a1 1 0 001.707-.707V4.908a1 1 0 00-1.707-.707L9.586 8H7a2 2 0 00-2 2z" /></svg>
                            </button>
                            <button onclick="toggleThai('random-word-th')" class="flex items-center justify-center h-10 px-3 rounded-xl bg-pink-100 text-pink-600 font-bold hover:bg-pink-200 transition-colors focus:outline-none">TH</button>
                        </div>
                    </div>
                    <div id="random-word-th" class="thai-text mt-4 pt-4 border-t border-gray-200">
                        <p id="random-word-th-text" class="text-xl text-indigo-600 font-bold leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dynamic Lesson Content -->
        <div id="lesson-container"></div>
    </main>

    <script>
        // 1. Vocabulary Data for Review (Updated 19 words)
        const prevVocab = [
            { eng: "recycling materials ♻️📦🍾", th: "วัสดุรีไซเคิล", cleanEng: "recycling materials" },
            { eng: "eels 🐍🌊🍲", th: "ปลาไหล", cleanEng: "eels" },
            { eng: "stir-fried basil 🌿🍳🌶️", th: "ผัดกะเพรา", cleanEng: "stir-fried basil" },
            { eng: "papaya salad 🥗🥢🌶️", th: "ส้มตำ", cleanEng: "papaya salad" },
            { eng: "spicy soup 🥣🔥🌶️", th: "ต้มยำ", cleanEng: "spicy soup" },
            { eng: "spontaneous ⚡🙋‍♂️✨", th: "เป็นธรรมชาติ; ชิลๆ; ปุ๊ปปั๊ป", cleanEng: "spontaneous" },
            { eng: "compromise 🤝🧡⚖️", th: "ประนีประนอม", cleanEng: "compromise" },
            { eng: "quality 💎✨🏆", th: "คุณภาพ", cleanEng: "quality" },
            { eng: "decide ⚖️🧠🎯", th: "ตัดสินใจ", cleanEng: "decide" },
            { eng: "during ⏳🕙⏳", th: "ระหว่าง / ช่วง", cleanEng: "during" },
            { eng: "disciplined 🧘‍♂️📏✅", th: "มีวินัย", cleanEng: "disciplined" },
            { eng: "chores 🧹🧺🧼", th: "งานบ้าน", cleanEng: "chores" },
            { eng: "What took you so long! ⏳🕒💢", th: "ทำไมนานจัง", cleanEng: "What took you so long!" },
            { eng: "usually 🔄🗓️✨", th: "มักจะ", cleanEng: "usually" },
            { eng: "Describe 🗣️📝🖼️", th: "อธิบาย", cleanEng: "Describe" },
            { eng: "couples 👩‍❤️‍👨👩‍❤️‍👩👨‍❤️‍👨", th: "คู่รัก", cleanEng: "couples" },
            { eng: "hobbies 🎨🎸⚽", th: "งานอดิเรก", cleanEng: "hobbies" },
            { eng: "Pitch ⚾🏟️📢", th: "ขายไอเดีย", cleanEng: "Pitch" },
            { eng: "waterfall 🌊⛰️⛲", th: "น้ำตก", cleanEng: "waterfall" }
        ];

        function generateRandomWord() {
            const displayBox = document.getElementById('random-word-display');
            const engText = document.getElementById('random-word-eng');
            const thText = document.getElementById('random-word-th-text');
            const ttsBtn = document.getElementById('random-word-tts');
            
            const randomItem = prevVocab[Math.floor(Math.random() * prevVocab.length)];
            
            engText.innerText = randomItem.eng;
            thText.innerText = randomItem.th;
            ttsBtn.onclick = () => speakText(randomItem.cleanEng);
            
            document.getElementById('random-word-th').style.display = 'none';
            displayBox.classList.remove('hidden');
        }

        // 2. Main Lesson Content Data Structure
        const lessonData = [
            {
                sectionType: "main",
                title: { eng: "Lead-in: Let's Talk! 🗣️", th: "เกริ่นนำ: มาคุยกันเถอะ! 🗣️" },
                description: { eng: "Before we look at the new words, let's chat about your day!", th: "ก่อนที่เราจะไปดูคำศัพท์ใหม่ มาคุยเรื่องวันของคุณกันก่อนเถอะ!" },
                items: [
                    { 
                        eng: "1. How do you usually feel when you finish work or school? (Happy? Tired?) 😌", 
                        th: "1. ปกติคุณรู้สึกอย่างไรเวลาเลิกงานหรือเลิกเรียน? (มีความสุข? เหนื่อย?)" 
                    },
                    { 
                        eng: "2. Who is the first person you talk to about your day? 📱", 
                        th: "2. ใครคือคนแรกที่คุณคุยด้วยเรื่องวันของคุณ?" 
                    },
                    { 
                        eng: "3. Do you like to share stories about your coworkers or classmates? 🤫", 
                        th: "3. คุณชอบเล่าเรื่องเกี่ยวกับเพื่อนร่วมงานหรือเพื่อนร่วมชั้นไหม?" 
                    }
                ]
            },
            {
                sectionType: "main",
                title: { eng: "New Vocabulary: Spilling the Tea! ☕📱", th: "คำศัพท์ใหม่: เม้าท์มอยเรื่องวันนี้! ☕📱" },
                description: { eng: "Read this text message conversation between you and your boyfriend. Look at the bold words! 👀", th: "อ่านบทสนทนาทางข้อความระหว่างคุณกับแฟนดูสิ สังเกตคำตัวหนานะ! 👀" },
                items: [
                    { 
                        eng: "You: 'Hey babe, I am so EXHAUSTED! 😩'", 
                        th: "คุณ: 'ที่รัก ฉัน เหนื่อยสายตัวแทบขาด เลย!'" 
                    },
                    { 
                        eng: "Boyfriend: 'Oh no! Was work bad today? 🏢'", 
                        th: "แฟน: 'โธ่! วันนี้ที่ทำงานแย่เหรอ?'" 
                    },
                    { 
                        eng: "You: 'It was a very PRODUCTIVE morning, but by the afternoon I was completely STRESSED OUT. 📉'", 
                        th: "คุณ: 'ตอนเช้า ทำงานได้เยอะมาก/มีประสิทธิภาพมาก แต่พอตกบ่ายฉัน เครียดจัด เลย'" 
                    },
                    { 
                        eng: "Boyfriend: 'Did you take a break? 🛋️'", 
                        th: "แฟน: 'ได้พักบ้างไหม?'" 
                    },
                    { 
                        eng: "You: 'Yeah, I GRABBED LUNCH with Sarah and we GOSSIPED about the new manager. 🤫🥗'", 
                        th: "คุณ: 'พักสิ ฉันไป แวะกินข้าวกลางวัน กับซาร่า แล้วเราก็ เม้าท์/นินทา เรื่องผู้จัดการคนใหม่กัน'" 
                    }
                ]
            },
            {
                sectionType: "main",
                title: { eng: "Comprehension Check 🤔💭", th: "ตรวจสอบความเข้าใจ 🤔💭" },
                description: { eng: "Let's see if you understood the text messages! Answer these questions.", th: "มาดูกันว่าคุณเข้าใจข้อความไหม! ตอบคำถามเหล่านี้" },
                items: [
                    { 
                        eng: "1. Why is he feeling EXHAUSTED? 🥱", 
                        th: "1. ทำไมเขาถึงรู้สึกเหนื่อยสายตัวแทบขาด?"

                    { 
                        eng: "2. Was the whole day bad, or just the afternoon? ☀️🌤️", 
                        th: "2. แย่ทั้งวันเลยไหม หรือแค่ช่วงบ่าย?"

                    { 
                        eng: "3. What did he do when he GRABBED LUNCH? 🥪🗣️", 
                        th: "3. เขาทำอะไรตอนที่ไปแวะกินข้าวกลางวัน?"

            {
                sectionType: "main",
                title: { eng: "Real-Life Discussion: Daily Routines 🔄👫", th: "การพูดคุยในชีวิตจริง: กิจวัตรประจำวัน 🔄👫" },
                description: { eng: "Let's talk about how you and your boyfriend check in with each other. (Practicing Present Simple!)", th: "มาคุยกันว่าคุณกับแฟนนัดแนะ/ถามไถ่สารทุกข์สุกดิบกันอย่างไร (ฝึกใช้ Present Simple!)" },
                items: [
                    { 
                        eng: "1. What are 3 questions you ALWAYS ask your boyfriend at the end of the day? ❓❓❓", 
                        th: "1. คำถาม 3 ข้อที่คุณมักจะถามแฟนเสมอตอนหมดวันคืออะไร?" 
                    },
                    { 
                        eng: "2. Between you and your boyfriend, who usually complains more about being STRESSED OUT? 😅", 
                        th: "2. ระหว่างคุณกับแฟน ใครมักจะบ่นว่าเครียดบ่อยกว่ากัน?"

                    { 
                        eng: "3. Do you usually GOSSIP about work, or talk about hobbies like music and fashion? 👗🎵", 
                        th: "3. ปกติพวกคุณมักจะเม้าท์เรื่องงาน หรือคุยเรื่องงานอดิเรกอย่างดนตรีและแฟชั่น?"

            {
                sectionType: "main",

                    }
                ]
            },
            {
                sectionType: "main",
                title: { eng: "Spot the Error: Texting Boyfriend 📱❌", th: "จับผิดข้อความ: ทักหาแฟน 📱❌" },
                description: { eng: "Oh no! Your grammar check is broken. Fix the prepositions (in, on, at) in these text messages to your boyfriend! 🔍", th: "แย่แล้ว! ระบบตรวจสอบไวยากรณ์ของคุณพัง ช่วยแก้คำบุพบท (in, on, at) ในข้อความที่จะส่งหาแฟนให้ถูกต้องหน่อย! 🔍" },
                items: [
                    { 
                        eng: "1. 'Hey babe, I arrived IN the office ON 9 AM today.' 🏢⏰", 
                        th: "1. 'ที่รัก วันนี้ฉันถึงที่ทำงานตอน 9 โมงเช้า' (แก้ IN และ ON ให้ถูกต้อง)" 
                    },
                    { 
                        eng: "2. 'I think I left my house keys IN the kitchen table.' 🔑🍽️", 
                        th: "2. 'ฉันว่าฉันลืมกุญแจบ้านไว้บนโต๊ะกินข้าวนะ' (แก้ IN ให้ถูกต้อง)" 
                    },
                    { 
                        eng: "3. 'Let's GRAB LUNCH IN the new restaurant ON this Friday!' 🥗📅", 
                        th: "3. 'วันศุกร์นี้เราไปแวะกินข้าวกลางวันที่ร้านใหม่กันเถอะ!' (แก้ IN และ ON ให้ถูกต้อง)"

            {
                sectionType: "divider",
                title: { eng: "🌟 Extension Activities 🌟", th: "🌟 กิจกรรมเสริม 🌟" },

            },
            {
                sectionType: "extension",
                title: { eng: "Funny Storytelling: Lunch Drama 🥪😲", th: "เล่าเรื่องสุดตลก: ดราม่ามื้อเที่ยง 🥪😲" },

                        eng: "Tell me about a time you GRABBED LUNCH and something crazy or funny happened (Maybe someone dropped their spicy soup?) 🥣💥",

            {
                sectionType: "extension",

                    { 
                        eng: "Debate topic: Is it better to be EXHAUSTED from working too hard, or STRESSED OUT from having absolutely nothing to do all day? 😴 vs 🤯",

                ]
            },
            {
                sectionType: "extension",
                title: { eng: "Funny Presentation 📊🤪", th: "นำเสนอสุดฮา 📊🤪" },
                items: [
                    { 
                        eng: "Pitch a crazy idea for a new mobile app that helps couples GOSSIP secretly about their coworkers. What is it called and how does it work? 📱🤫",

                items: [
                    { 
                        eng: "Office Edition! Tell 3 short stories about things that happened at work recently. I will guess the lie! 🏢✨", 
                        th: "ฉบับชาวออฟฟิศ! เล่าเรื่องสั้นๆ 3 เรื่องที่เพิ่งเกิดขึ้นที่ทำงาน ฉันจะทายเองว่าเรื่องไหนโกหก!" 
                    }
                ]
            },
            {
                sectionType: "extension",
                title: { eng: "Funny Interview 🎤😂", th: "สัมภาษณ์สุดฮา 🎤😂" },
                items: [
                    { 
                        eng: "You are applying for the job of 'Professional Lunch Grabber'. Why are you the best person to GRAB LUNCH for the whole office? 🥪💼", 
                        th: "คุณกำลังสมัครงานในตำแหน่ง 'นักซื้อข้าวเที่ยงมืออาชีพ' ทำไมคุณถึงเป็นคนที่เหมาะสมที่สุดที่จะไปซื้อข้าวเที่ยงให้คนทั้งออฟฟิศ?" 
                    }
                ]
            },
            {
                sectionType: "extension",
                title: { eng: "Funny Discussion 🤔💬", th: "การสนทนาสุดฮา 🤔💬" },
                items: [
                    { 
                        eng: "If you could force your boss to do one of your daily chores at home, what would it be? Why? 🧹👔", 
                        th: "ถ้าคุณบังคับให้เจ้านายทำงานบ้านของคุณได้หนึ่งอย่าง คุณจะให้ทำอะไร? เพราะอะไร?" 
                    }
                ]
            },
            {
                sectionType: "extension",
                title: { eng: "Additional Vocabulary 📚", th: "คำศัพท์เพิ่มเติม 📚" },
                description: { eng: "Our target words for today!", th: "คำศัพท์เป้าหมายของเราในวันนี้!" },
                items: [
                    { eng: "exhausted 😩💤", th: "เหนื่อยสายตัวแทบขาด / หมดแรง" },
                    { eng: "productive 📈✅", th: "มีประสิทธิผล / ทำงานได้เยอะ" },
                    { eng: "stressed out 🤯📉", th: "เครียดจัด / กดดัน" },
                    { eng: "gossiped 🤫🗣️", th: "นินทา / เม้าท์มอย" },
                    { eng: "grabbed lunch 🥪🏃‍♂️", th: "แวะกินข้าวกลางวัน (แบบด่วนๆ/ชิลๆ)" }
                ]
            }
        ];

        // 3. Helper Functions
        let idCounter = 0;

        function cleanTextForTTS(text) {
            // Remove emojis and single quotes for clean TTS reading
            return text.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '').replace(/"/g, '').replace(/'/g, '');
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; 
                utterance.rate = 0.9; 
                utterance.pitch = 1.0;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Sorry, your browser does not support Text-to-Speech.");
            }
        }

        function toggleThai(elementId) {
            const thaiElement = document.getElementById(elementId);
            if (thaiElement.style.display === "none" || thaiElement.style.display === "") {
                thaiElement.style.display = "block";
            } else {
                thaiElement.style.display = "none";
            }
        }

        function getControlsHtml(cleanText, thaiId, isSmall = false) {
            const sizeClass = isSmall ? "w-8 h-8" : "w-10 h-10";
            const iconSize = isSmall ? "h-4 w-4" : "h-6 w-6";
            const textClass = isSmall ? "text-xs px-2 h-8" : "font-bold px-3 h-10";
            
            return `
                <div class="flex flex-row gap-2 flex-shrink-0 items-center">
                    <button onclick="speakText('${cleanText}')" 
                            class="flex items-center justify-center ${sizeClass} rounded-full bg-blue-100 text-blue-600 hover:bg-blue-200 transition-colors focus:outline-none speaker-btn"
                            title="Listen to English">
                        <svg xmlns="http://www.w3.org/2000/svg" class="${iconSize}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2.586l3.707 3.707a1 1 0 001.707-.707V4.908a1 1 0 00-1.707-.707L9.586 8H7a2 2 0 00-2 2z" />
                        </svg>
                    </button>
                    <button onclick="toggleThai('${thaiId}')" 
                            class="flex items-center justify-center rounded-lg bg-pink-100 text-pink-600 hover:bg-pink-200 transition-colors focus:outline-none ${textClass}"
                            title="Show/Hide Thai Translation">
                        TH
                    </button>
                </div>
            `;
        }

        // 4. Render the UI
        function renderLesson() {
            const container = document.getElementById('lesson-container');
            let htmlContent = '';

            lessonData.forEach((section) => {
                if (section.sectionType === "divider") {
                    const titleId = `dyn-th-${idCounter++}`;
                    const descId = `dyn-th-${idCounter++}`;
                    
                    htmlContent += `
                        <div class="mt-16 mb-8 text-center flex flex-col items-center">
                            <div class="flex flex-col sm:flex-row items-center justify-center gap-3 mb-1">
                                <h2 class="text-3xl font-extrabold text-indigo-600">${section.title.eng}</h2>
                                ${getControlsHtml(cleanTextForTTS(section.title.eng), titleId, true)}
                            </div>
                            <div id="${titleId}" class="thai-text mb-4">
                                <p class="text-xl text-indigo-500 font-bold">${section.title.th}</p>
                            </div>
                            
                            <div class="flex flex-col sm:flex-row items-center justify-center gap-3 mb-1">
                                <p class="text-gray-500 font-medium">${section.description.eng}</p>
                                ${getControlsHtml(cleanTextForTTS(section.description.eng), descId, true)}
                            </div>
                            <div id="${descId}" class="thai-text mb-2">
                                <p class="text-[1.05rem] text-gray-400 font-medium">${section.description.th}</p>
                            </div>
                            <div class="w-24 h-1 bg-indigo-200 mx-auto mt-4 rounded-full"></div>
                        </div>
                    `;
                } else {
                    const titleId = `dyn-th-${idCounter++}`;
                    let descHtml = '';

                    if (section.description) {
                        const descId = `dyn-th-${idCounter++}`;
                        descHtml = `
                            <div class="flex flex-col mb-6 border-l-4 border-indigo-300 pl-4">
                                <div class="flex items-start justify-between gap-4 mb-1">
                                    <p class="text-indigo-600 font-semibold">${section.description.eng}</p>
                                    ${getControlsHtml(cleanTextForTTS(section.description.eng), descId, true)}
                                </div>
                                <div id="${descId}" class="thai-text">
                                    <p class="text-[1.05rem] text-indigo-500 font-medium">${section.description.th}</p>
                                </div>
                            </div>
                        `;
                    } else {
                        descHtml = '<div class="mb-4"></div>';
                    }

                    htmlContent += `
                        <div class="task-card bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-indigo-50 mb-8">
                            <div class="flex flex-col mb-4">
                                <div class="flex items-start justify-between gap-4 mb-1">
                                    <h2 class="text-2xl font-bold text-gray-800">${section.title.eng}</h2>
                                    ${getControlsHtml(cleanTextForTTS(section.title.eng), titleId, true)}
                                </div>
                                <div id="${titleId}" class="thai-text">
                                    <p class="text-[1.15rem] text-gray-600 font-bold">${section.title.th}</p>
                                </div>
                            </div>
                            ${descHtml}
                            
                            <div class="space-y-4">
                    `;

                    section.items.forEach(item => {
                        const itemId = `dyn-th-${idCounter++}`;
                        
                        // Bold target words highlighting
                        let highlightedEng = item.eng
                            .replace(/EXHAUSTED/g, '<span class="highlight-word">EXHAUSTED</span>')
                            .replace(/PRODUCTIVE/g, '<span class="highlight-word">PRODUCTIVE</span>')
                            .replace(/STRESSED OUT/g, '<span class="highlight-word">STRESSED OUT</span>')
                            .replace(/GOSSIPED/g, '<span class="highlight-word">GOSSIPED</span>')
                            .replace(/GOSSIP/g, '<span class="highlight-word">GOSSIP</span>')
                            .replace(/GRABBED LUNCH/g, '<span class="highlight-word">GRABBED LUNCH</span>')
                            .replace(/GRAB LUNCH/g, '<span class="highlight-word">GRAB LUNCH</span>');

                        htmlContent += `
                            <div class="bg-gray-50 rounded-2xl p-4 md:p-5 border border-gray-100">
                                <div class="flex items-start justify-between gap-4">
                                    <p class="text-lg md:text-xl text-gray-800 font-medium leading-relaxed">${highlightedEng}</p>
                                    ${getControlsHtml(cleanTextForTTS(item.eng), itemId, false)}
                                </div>
                                <div id="${itemId}" class="thai-text mt-4 pt-4 border-t border-gray-200">
                                    <p class="text-[1.1rem] text-gray-600 leading-relaxed">${item.th}</p>
                                </div>
                            </div>
                        `;
                    });

                    htmlContent += `
                            </div>
                        </div>
                    `;
                }
            });

            container.innerHTML = htmlContent;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', renderLesson);
    </script>
</body>
</html>

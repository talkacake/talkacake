<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Lesson: สั่งน้ำ</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #fffbeb; }
        .thai-font { font-family: 'Sarabun', sans-serif; }
        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ฟังก์ชันเล่นเสียงทีละไฟล์ (Sequence)
        const playSequence = async (urls) => {
            for (const url of urls.filter(u => u)) {
                await new Promise((resolve) => {
                    const audio = new Audio(url);
                    audio.onended = resolve;
                    audio.onerror = resolve; // ข้ามถ้าโหลดไม่สำเร็จ
                    audio.play().catch(e => { console.error(e); resolve(); });
                });
            }
        };

        const playAudio = (url) => {
            if (!url) return;
            new Audio(url).play().catch(e => console.error(e));
        };

        // --- DATA ---
        const speakers = {
            staff: { thai: "พนักงาน", ipa: "phá-nák-ngaan", en: "Staff" },
            lin: { thai: "ลิน", ipa: "lin", en: "Lin" }
        };

        const audioBank = {
            hot: "https://docs.google.com/uc?export=open&id=17BEeZb103upSlae1nklzH6evTaZP9duO",
            glass: "https://docs.google.com/uc?export=open&id=1efVcpE-vsEjkhtxH5zOXuEaGFqMRJgLH",
            order: "https://docs.google.com/uc?export=open&id=13ZuiGkQFkXHbpRDaTZDG4wiuhLzI3UnB",
            sugar: "https://docs.google.com/uc?export=open&id=1ekEByr7UJqxKwFH-rjLYQq577i2-1smB",
            no_sugar: "https://docs.google.com/uc?export=open&id=1t4ucYjYsY0NagpErXbeYKy32D9k-qDrO"
        };

        const newVocab = [
            { thai: "แก้ว", ipa: "gâeo", en: "glass/cup", emoji: "🥤", audio: audioBank.glass },
            { thai: "ร้อน", ipa: "rón", en: "hot", emoji: "🔥", audio: audioBank.hot },
            { thai: "น้ำตาล", ipa: "nám-dtaan", en: "sugar", emoji: "🍬", audio: "https://docs.google.com/uc?export=open&id=1ZOhRFYt-_F2i6pl6n40O0TAHgLb5dcUZ" },
            { thai: "บาท", ipa: "bàat", en: "Baht", emoji: "฿", audio: "https://docs.google.com/uc?export=open&id=1egQ8xNATKrYOQqq2CftbPNthTxyZaOLT" },
            { thai: "รับ", ipa: "ráp", en: "receive", emoji: "🤲", audio: "https://docs.google.com/uc?export=open&id=1lAIzXH6r8bctsNTS3P0H5vcZm0-ziEHJ" },
        ];

        const dialogueScript = [
            { speaker: speakers.staff, thai: "สวัสดีค่ะ รับอะไรดีคะ", ipa: "sà-wàt-dii khâ...", en: "Hello, what would you like?", emoji: "👩‍🍳", audio: "https://docs.google.com/uc?export=open&id=13JL_2lWb3oQYP1pbRjHSosp4yTe9xsqk" },
            { speaker: speakers.lin, thai: "เอาอเมริกาโน่ร้อน 2 แก้ว", ipa: "ao a-mee-ri-gaa-nôo...", en: "I want 2 hot Americanos.", emoji: "☕🔥", audio: "https://docs.google.com/uc?export=open&id=1uo_hFlnoCdnXh9iO-rvreCPN4jDnfO54" },
            { speaker: speakers.lin, thai: "ไม่น้ำตาลค่ะ", ipa: "mâi nám-dtaan khâ", en: "No sugar.", emoji: "🚫🍬", audio: "https://docs.google.com/uc?export=open&id=1l26mgL4JgP3nM2t2wLmAlSj5EMDLXG_S" },
            { speaker: speakers.staff, thai: "ได้ค่ะ", ipa: "dâai khâ", en: "Okay.", emoji: "👌", audio: "https://docs.google.com/uc?export=open&id=1X0E-FjcVKffkSgMxGWZnrSbMKBE66b7c" },
            { speaker: speakers.staff, thai: "ขอบคุณค่ะ", ipa: "khòop-khun khâ", en: "Thank you.", emoji: "🙏", audio: "https://docs.google.com/uc?export=open&id=1n5IwWKDV6ofszRFnu19hlctf1PkO7EXT" },
        ];

        const drinks = [
            { id: 'americano', thai: "อเมริกาโน่", emoji: "☕", audio: "https://docs.google.com/uc?export=open&id=1k72ESn-9KRln8xnu5jxiOinVMjiDIs2A" },
            { id: 'cocoa', thai: "ช็อกโกแล็ต", emoji: "🍫", audio: "https://docs.google.com/uc?export=open&id=18aRobpOkjpc9HjQBEV2tIF-CLAMoiGDx" },
            { id: 'matcha', thai: "มัทฉะ", emoji: "🍵", audio: "https://docs.google.com/uc?export=open&id=1ZLC1RsPTSqm_1sRllwoT9wTAk1eqZIdf" },
        ];

        // --- COMPONENTS ---
        const DrinkBuilder = () => {
            const [drink, setDrink] = useState(null);
            const [isHot, setIsHot] = useState(false);
            const [sugar, setSugar] = useState(null);
            const [amount, setAmount] = useState(1);

            const handlePlayOrder = () => {
                if (!drink) return;
                const sequence = [
                    drink.audio,
                    isHot ? audioBank.hot : null,
                    // Note: สำหรับเลข 1-10 จะใช้เสียง Google TTS จนกว่าจะอัพโหลดไฟล์เพิ่ม
                    audioBank.glass, 
                    sugar === 'no' ? audioBank.no_sugar : (sugar === 'yes' ? audioBank.sugar : null)
                ];
                playSequence(sequence);
            };

            return (
                <div className="bg-white rounded-xl shadow-lg border-2 border-orange-100 p-4">
                    <div className="bg-orange-50 rounded-lg p-4 text-center mb-4 min-h-[100px] flex flex-col justify-center items-center">
                        <div className="text-xl font-bold text-gray-800 thai-font">
                            {drink ? `${drink.thai}${isHot ? ' ร้อน' : ''} ${amount} แก้ว ${sugar==='no'?'ไม่ใส่น้ำตาล':(sugar==='yes'?'หวาน':'')}` : "ลองสั่งเครื่องดื่มดูค่ะ"}
                        </div>
                        {drink && (
                            <button onClick={handlePlayOrder} className="mt-2 bg-orange-200 text-orange-800 p-2 rounded-full hover:bg-orange-300">
                                <i className="ph ph-speaker-high text-xl"></i>
                            </button>
                        )}
                    </div>

                    <div className="space-y-4">
                        <div className="flex gap-2">
                            {drinks.map(d => (
                                <button key={d.id} onClick={() => {setDrink(d); playAudio(d.audio);}} className={`flex-1 p-2 rounded border text-sm flex flex-col items-center ${drink?.id === d.id ? 'bg-orange-100 border-orange-400' : 'border-gray-200'}`}>
                                    <span className="text-xl">{d.emoji}</span>
                                    <span className="text-xs">{d.thai}</span>
                                </button>
                            ))}
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => {setIsHot(!isHot); playAudio(audioBank.hot);}} className={`flex-1 p-2 rounded border ${isHot ? 'bg-red-100 border-red-400 text-red-600' : 'border-gray-200'}`}>🔥 ร้อน</button>
                            <div className="flex-1 flex items-center justify-around border rounded bg-gray-50">
                                <button onClick={() => setAmount(Math.max(1, amount-1))} className="p-1">-</button>
                                <span className="font-bold">{amount}</span>
                                <button onClick={() => setAmount(amount+1)} className="p-1">+</button>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => {setSugar('no'); playAudio(audioBank.no_sugar);}} className={`flex-1 p-2 rounded border text-xs ${sugar === 'no' ? 'bg-purple-100 border-purple-400' : 'border-gray-200'}`}>🚫 ไม่ใส่น้ำตาล</button>
                            <button onClick={() => {setSugar('yes'); playAudio(audioBank.sugar);}} className={`flex-1 p-2 rounded border text-xs ${sugar === 'yes' ? 'bg-purple-100 border-purple-400' : 'border-gray-200'}`}>🍬 หวาน</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => (
            <div className="max-w-md mx-auto min-h-screen pb-20 bg-gray-50">
                <header className="bg-amber-500 text-white p-6 rounded-b-3xl shadow-md mb-6">
                    <h1 className="text-2xl font-bold thai-font">🥤 สั่งน้ำ (Ordering Drinks)</h1>
                </header>
                <div className="px-4 space-y-8">
                    <section>
                        <h2 className="text-lg font-bold mb-3 flex items-center gap-2 text-amber-600"><i className="ph ph-lightbulb"></i> คำศัพท์ใหม่</h2>
                        <div className="grid grid-cols-2 gap-2">
                            {newVocab.map((item, idx) => (
                                <div key={idx} className="bg-white p-3 rounded-lg border border-amber-100 flex items-center justify-between">
                                    <span className="thai-font">{item.emoji} {item.thai}</span>
                                    <button onClick={() => playAudio(item.audio)} className="text-amber-500"><i className="ph ph-speaker-high"></i></button>
                                </div>
                            ))}
                        </div>
                    </section>
                    <section>
                        <h2 className="text-lg font-bold mb-3 flex items-center gap-2 text-amber-600"><i className="ph ph-chats-circle"></i> บทสนทนา</h2>
                        {dialogueScript.map((item, idx) => (
                            <div key={idx} className={`p-3 rounded-lg mb-2 border-l-4 ${item.speaker.en === 'Lin' ? 'bg-blue-50 border-blue-400' : 'bg-white border-amber-500'}`}>
                                <div className="flex justify-between items-center mb-1">
                                    <span className="text-xs font-bold text-gray-400">{item.speaker.thai}</span>
                                    <button onClick={() => playAudio(item.audio)} className="text-amber-500"><i className="ph ph-speaker-high"></i></button>
                                </div>
                                <div className="thai-font font-bold">{item.thai} {item.emoji}</div>
                            </div>
                        ))}
                    </section>
                    <section>
                        <h2 className="text-lg font-bold mb-3 flex items-center gap-2 text-orange-600"><i className="ph ph-coffee"></i> ฝึกสั่งน้ำ</h2>
                        <DrinkBuilder />
                    </section>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
